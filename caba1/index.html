<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CasaVerdeCanas | Cabaña 1</title>
    
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <header>
        <div class="top-nav">
            <div class="langs">
                <button onclick="changeLanguage('es')">ES</button>
                <button onclick="changeLanguage('pt')">PT</button>
                <button onclick="changeLanguage('en')">EN</button>
            </div>
            <button class="admin-btn" onclick="toggleAdmin()">⚙️</button>
        </div>
        <h1 data-key="welcome">CasaVerdeCanas</h1>
    </header>

    <main>
        <section id="detail-view">
            <h2 id="detail-title" data-key="cabin-1-name">Cabaña 1: Vista al Bosque</h2>
            <p id="detail-desc" data-key="cabin-1-desc">Cargando descripción...</p>

            <div id="photo-gallery" class="gallery">
                </div>
            
            <button id="add-img" class="admin-only hidden" onclick="addPhoto()">+ Agregar Foto</button>

            <div class="cal-container">
                <h3 data-key="cal-label">Calendario de Disponibilidad</h3>
                <div id="calendar"></div>
            </div>

            <a id="wa-link" href="https://wa.me/5548999999999" target="_blank" class="wa-button">
                <span data-key="btn-book-wa">Consultar por WhatsApp</span>
            </a>
        </section>
    </main>

    <script src="languages.js"></script>
    <script src="occupancy.js"></script>
</body>
</html>
