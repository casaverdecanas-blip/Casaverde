<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CasaVerdeCanas Posada</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
</head>
<body>
    <header>
        <div class="top-bar">
            <div class="language-picker">
                <button onclick="changeLanguage('es')">ES</button>
                <button onclick="changeLanguage('en')">EN</button>
                <button onclick="changeLanguage('pt')">PT</button>
            </div>
            <button class="admin-btn" onclick="toggleAdmin()">⚙️</button>
        </div>
        <h1 data-key="welcome">CasaVerdeCanas</h1>
    </header>

    <main id="main-content">
        <div id="grid-wrapper">
            <section class="cabins-grid">
                <div class="cabin-card" onclick="showCabinDetails('cabin-1')">
                    <div id="thumb-cabin-1" class="thumb-slot"></div>
                    <h3 data-key="cabin-1-name">Cabaña 1</h3>
                </div>
                <div class="cabin-card" onclick="showCabinDetails('cabin-2')">
                    <div id="thumb-cabin-2" class="thumb-slot"></div>
                    <h3 data-key="cabin-2-name">Cabaña 2</h3>
                </div>
            </section>
        </div>

        <div id="detail-wrapper" class="hidden">
            <button class="back-btn" onclick="hideCabinDetails()">← <span data-key="btn-back">Volver</span></button>
            <h2 id="detail-title"></h2>
            <div id="carousel-photos" class="photo-carousel"></div>
            <button id="add-photo-btn" class="hidden" style="margin:10px;">+ Agregar Foto</button>
            <div id="calendar-render"></div>
            <a id="wa-booking" href="#" target="_blank" class="wa-btn">WhatsApp Reservas</a>
        </div>
    </main>

    <script src="languages.js"></script>
    <script src="occupancy.js"></script>
</body>
</html>
