<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Firebase - Escritura</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f0f4f0;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        button {
            background: #2d5a27;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #1e3f1a;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            text-align: left;
            background: #f5f5f5;
            overflow-x: auto;
        }
        .success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div class="card">
        <h2>🧪 Test de Escritura en Firebase</h2>
        <p>Prueba que puedes escribir datos en tu Realtime Database</p>
        
        <button onclick="escribirDatosPrueba()">✍️ Escribir datos de prueba</button>
        <button onclick="leerDatos()">📖 Leer datos</button>
        <button onclick="borrarDatosPrueba()">🗑️ Borrar datos de prueba</button>
        
        <div id="status" class="status info">⚡ Listo para probar</div>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN FIREBASE (TUS DATOS)
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4",
            authDomain: "casaverdecanas-199.firebaseapp.com",
            databaseURL: "https://casaverdecanas-199-default-rtdb.firebaseio.com",
            projectId: "casaverdecanas-199",
            storageBucket: "casaverdecanas-199.firebasestorage.app",
            messagingSenderId: "417825635316",
            appId: "1:417825635316:web:ff7f4fe52edcab43d8d7a1"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function mostrarStatus(mensaje, tipo) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = mensaje;
            statusDiv.className = `status ${tipo}`;
            console.log(`[${tipo.toUpperCase()}] ${mensaje}`);
        }

        // ============================================
        // ESCRIBIR DATOS DE PRUEBA
        // ============================================
        async function escribirDatosPrueba() {
            mostrarStatus('✍️ Escribiendo datos de prueba...', 'info');
            
            try {
                // Datos de prueba: una foto de ejemplo
                const datosPrueba = {
                    nombre: "Foto de prueba",
                    url: "https://i.postimg.cc/76njWKKq/IMG-20250110-WA0001.jpg",
                    descripcion: "Esta es una foto de prueba",
                    fecha: new Date().toISOString(),
                    fuente: "test_manual"
                };
                
                // Escribir en la ruta /test/
                const referencia = db.ref('test/miFotoPrueba');
                await referencia.set(datosPrueba);
                
                mostrarStatus(
                    '✅ ¡DATOS ESCRITOS CORRECTAMENTE!<br><br>' +
                    '<strong>Ruta:</strong> /test/miFotoPrueba<br>' +
                    '<strong>Datos escritos:</strong><br>' +
                    JSON.stringify(datosPrueba, null, 2),
                    'success'
                );
                
                // Verificar que se escribieron
                const snapshot = await referencia.once('value');
                console.log('Datos verificados:', snapshot.val());
                
            } catch (error) {
                mostrarStatus(
                    '❌ ERROR AL ESCRIBIR:<br>' +
                    error.message + '<br><br>' +
                    'Posibles causas:<br>' +
                    '- Verifica que la URL de Firebase es correcta<br>' +
                    '- Revisa las reglas de seguridad en Firebase Console<br>' +
                    '- Asegúrate de que tu proyecto está en plan Blaze (si es necesario)',
                    'error'
                );
                console.error('Error detallado:', error);
            }
        }
        
        // ============================================
        // LEER DATOS
        // ============================================
        async function leerDatos() {
            mostrarStatus('📖 Leyendo datos...', 'info');
            
            try {
                const snapshot = await db.ref('test').once('value');
                const datos = snapshot.val();
                
                if (datos) {
                    mostrarStatus(
                        '✅ DATOS ENCONTRADOS EN /test/<br><br>' +
                        '<strong>Contenido:</strong><br>' +
                        JSON.stringify(datos, null, 2),
                        'success'
                    );
                } else {
                    mostrarStatus(
                        '📭 No hay datos en la ruta /test/<br><br>' +
                        'Haz clic en "Escribir datos de prueba" primero.',
                        'info'
                    );
                }
            } catch (error) {
                mostrarStatus('❌ Error al leer: ' + error.message, 'error');
            }
        }
        
        // ============================================
        // BORRAR DATOS DE PRUEBA
        // ============================================
        async function borrarDatosPrueba() {
            if (!confirm('¿Borrar los datos de prueba en /test/? Esta acción no se puede deshacer.')) {
                return;
            }
            
            mostrarStatus('🗑️ Borrando datos de prueba...', 'info');
            
            try {
                await db.ref('test').remove();
                mostrarStatus('✅ Datos de prueba eliminados correctamente', 'success');
            } catch (error) {
                mostrarStatus('❌ Error al borrar: ' + error.message, 'error');
            }
        }
        
        // Verificar conexión a Firebase al cargar
        db.ref('.info/connected').on('value', (snap) => {
            if (snap.val() === true) {
                mostrarStatus('✅ Conectado a Firebase. Listo para probar.', 'success');
            } else {
                mostrarStatus('⚠️ Desconectado de Firebase. Verifica tu conexión a internet.', 'info');
            }
        });
    </script>
</body>
</html>
