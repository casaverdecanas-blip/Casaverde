<!DOCTYPE html>
<html>
<head>
    <title>Test Conexión Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <h2>Test de Conexión Firebase</h2>
    <div id="resultado"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4",
            authDomain: "casaverdecanas-199.firebaseapp.com",
            databaseURL: "https://casaverdecanas-199-default-rtdb.firebaseio.com",
            projectId: "casaverdecanas-199",
            storageBucket: "casaverdecanas-199.firebasestorage.app",
            messagingSenderId: "417825635316",
            appId: "1:417825635316:web:ff7f4fe52edcab43d8d7a1"
        };

        const resultDiv = document.getElementById('resultado');
        
        function log(msg) {
            resultDiv.innerHTML += msg + '<br>';
            console.log(msg);
        }

        log('🚀 Iniciando prueba...');
        log('📡 Configuración cargada');
        
        try {
            firebase.initializeApp(firebaseConfig);
            log('✅ Firebase inicializado');
        } catch (e) {
            log('❌ Error inicializando: ' + e.message);
        }
        
        const db = firebase.database();
        
        // Prueba 1: Verificar conexión
        db.ref('.info/connected').on('value', (snap) => {
            if (snap.val() === true) {
                log('✅ CONECTADO a Firebase');
            } else {
                log('⚠️ Desconectado - esperando conexión...');
            }
        });
        
        // Prueba 2: Intentar leer datos
        setTimeout(() => {
            log('📖 Intentando leer datos...');
            db.ref('test').once('value')
                .then((snap) => {
                    log('✅ Lectura exitosa. Datos: ' + JSON.stringify(snap.val()));
                })
                .catch((err) => {
                    log('❌ Error de lectura: ' + err.message);
                });
        }, 2000);
        
        // Prueba 3: Intentar escribir
        setTimeout(() => {
            log('✍️ Intentando escribir datos...');
            db.ref('test_conexion').set({
                mensaje: 'Hola desde test',
                timestamp: Date.now()
            })
            .then(() => {
                log('✅ Escritura exitosa!');
            })
            .catch((err) => {
                log('❌ Error de escritura: ' + err.message);
            });
        }, 3000);
    </script>
</body>
</html>
