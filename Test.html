        async function cargarDatos() {
            log.textContent = '⏳ Conectando a Firebase...';
            
            try {
                // Verificar conexión
                const connected = await db.ref('.info/connected').once('value');
                if (!connected.val()) {
                    log.textContent = '❌ No hay conexión con Firebase. Verifica tu internet.';
                    return;
                }
                
                log.textContent = '✅ Conectado. Cargando datos...\n';
                
                // Cargar todos los datos
                await db.ref().set(datosCompletos);
                
                log.textContent += '✅ ¡DATOS CARGADOS CORRECTAMENTE!\n\n';
                log.textContent += '📦 Verifica en Firebase Console que aparezcan los datos.\n';
                log.textContent += '🔗 https://console.firebase.google.com/project/casaverdecanas-199/database/casaverdecanas-199-default-rtdb/data\n';
                
                // Leer para confirmar
                const snapshot = await db.ref('apartments/cabin-1/name').once('value');
                log.textContent += `\n📋 Confirmación: cabin-1.name = "${snapshot.val()}"`;
                
            } catch (error) {
                log.textContent = '❌ ERROR: ' + error.message;
                console.error(error);
            }
        }
        
        cargarDatos();
    </script>
