<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <title>Casa Verde Canas | Alquiler de Temporada en Canasvieiras, Florianópolis</title>
    
    <meta name="description" content="Casas de alquiler vacacional en Canasvieiras, Florianópolis. Un refugio familiar con piscina, parrilla y estacionamiento. A 3 cuadras de la playa. ¡Reserva directa!">
    
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/0yng0gtW/1775451127405_2.jpg">
    
    <style>
        /* Paleta de colores de la marca */
        :root {
            --casa-green: #A3C9A8;
            --forest-green: #2E5A31;
            --warm-yellow: #F9D976;
            --warm-brown: #C19A6B;
            --charcoal: #4A4A4A;
            --starry-white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Tipografía más amigable y rústica */
        body { 
            font-family: 'Quicksand', 'Segoe UI', sans-serif; 
            background: #fdfdfd; 
            color: var(--charcoal); 
            line-height: 1.6; 
        }
        
        .hero {
            /* Degradado basado en tu Forest Green */
            background: linear-gradient(135deg, #2E5A31, #1e3f1a);
            color: white;
            padding: 80px 20px;
            text-align: center;
            position: relative;
        }

        /* Contenedor del Logo en el Hero */
        .brand-container {
            max-width: 450px;
            margin: 0 auto 20px;
        }
        .main-logo {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
        }
        
        .lang-picker {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .lang-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .lang-btn:hover, .lang-btn.active { 
            background: var(--warm-yellow); 
            color: var(--forest-green); 
            border-color: var(--warm-yellow);
        }
        
        .trust-badges {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
        }
        .trust-badges span {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
        }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        
        section h2 {
            text-align: center;
            font-size: 2rem;
            color: var(--forest-green);
            margin-bottom: 40px;
        }
        
        /* Cards actualizadas */
        .cabin-card {
            background: white;
            border-radius: 25px; /* Bordes más orgánicos */
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid #eee;
            transition: all 0.3s ease;
        }
        .cabin-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(46, 90, 49, 0.15);
        }
        
        .cabin-content h3 { color: var(--forest-green); margin-bottom: 10px; }

        .btn {
            background: var(--forest-green);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:hover { 
            background: #254a28; 
            transform: scale(1.05);
        }

        /* Estilo de los espacios comunes */
        .category-section {
            background: #f4f8f4;
            border-radius: 30px;
            border-left: 8px solid var(--casa-green);
        }
        
        footer {
            background: var(--charcoal);
            color: var(--starry-white);
            padding: 50px 20px;
            text-align: center;
        }
        .footer-logo {
            max-width: 180px;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .hero { padding: 60px 15px; }
            .brand-container { max-width: 280px; }
        }
    </style>
</head>
<body>
    <header class="hero">
        <div class="lang-picker">
            <button class="lang-btn" data-lang="es" onclick="changeLanguage('es')">ES</button>
            <button class="lang-btn" data-lang="pt" onclick="changeLanguage('pt')">PT</button>
            <button class="lang-btn" data-lang="en" onclick="changeLanguage('en')">EN</button>
        </div>
        
        <div class="brand-container">
            <img src="https://i.postimg.cc/cLhqBqDm/1775451075247_2.jpg" alt="Casa Verde Canas" class="main-logo">
        </div>

        <p id="site-subtitle" class="subtitle">Tu refugio familiar en el norte de la isla</p>
        
        <div class="trust-badges">
            <span id="badge-beach">🏖️ A 3 cuadras de la playa</span>
            <span id="badge-parking">🅿️ Estacionamiento</span>
            <span id="badge-pool">🏊‍♀️ Piscina y solárium</span>
            <span id="badge-bbq">🔥 Parrilla individual</span>
        </div>
    </header>

    <main class="container">
        <section id="cabins-section">
            <h2 id="cabins-title">Nuestras Casas</h2>
            <div id="cabins-container" class="cabins-grid"></div>
        </section>

        <section id="common-section">
            <h2 id="common-title">Espacios del Predio</h2>
            <div id="common-container"></div>
        </section>
    </main>

    <footer>
        <img src="https://i.postimg.cc/BnpWBWhC/1775451091779_2.jpg" alt="Casa Verde Canas" class="footer-logo">
        <p id="footer-text">Alquiler de temporada en Canasvieiras, Florianópolis</p>
        <p style="margin-top:15px; color: var(--casa-green);">Directo con sus dueños</p>
        <div style="margin-top:20px; opacity:0.7;">
            <small>📍 Florianópolis - SC, Brasil</small>
        </div>
    </footer>

            },
            en: {

</body>
</html>
