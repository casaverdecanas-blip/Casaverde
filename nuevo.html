<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <title>Casa Verde Canas | Alquiler de Temporada en Canasvieiras, Florianópolis</title>
    <meta name="description" content="Alquiler vacacional familiar en Canasvieiras, Florianópolis. Casas con piscina, parrilla y estacionamiento a 3 cuadras de la playa. ¡Reserva directa!">
    
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/0yng0gtW/1775451127405_2.jpg">
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --casa-green: #A3C9A8;
            --forest-green: #2E5A31;
            --warm-yellow: #F9D976;
            --charcoal: #4A4A4A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Quicksand', sans-serif; background: #fdfdfd; color: var(--charcoal); line-height: 1.6; }
        
        .hero {
            background: linear-gradient(135deg, #2E5A31, #1e3f1a);
            color: white;
            padding: 80px 20px;
            text-align: center;
            position: relative;
        }

        .brand-container { max-width: 400px; margin: 0 auto 15px; }
        .main-logo { width: 100%; height: auto; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }
        
        .lang-picker { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; z-index: 10; }
        .lang-btn {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4);
            color: white; padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .lang-btn.active { background: var(--warm-yellow); color: var(--forest-green); border-color: var(--warm-yellow); }
        
        .trust-badges { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 25px; }
        .trust-badges span { background: rgba(255,255,255,0.15); padding: 8px 15px; border-radius: 50px; font-size: 0.8rem; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        section h2 { text-align: center; font-size: 1.8rem; color: var(--forest-green); margin-bottom: 30px; }
        
        /* Grid de Cabañas/Casas */
        .cabins-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .cabin-card {
            background: white; border-radius: 25px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: 0.3s;
            display: flex; flex-direction: column;
        }
        .cabin-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(46,90,49,0.15); }
        
        .cabin-slider { position: relative; width: 100%; height: 260px; background: #eee; }
        .cabin-slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: 0.8s; background-size: cover; background-position: center; }
        .cabin-slide.active { opacity: 1; }
        
        .cabin-content { padding: 25px; text-align: center; }
        .cabin-content h3 { color: var(--forest-green); font-size: 1.5rem; margin-bottom: 10px; }
        .btn {
            display: inline-block; background: var(--forest-green); color: white;
            padding: 10px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 15px;
        }

        /* Espacios Comunes */
        .category-section { background: #f4f8f4; border-radius: 25px; padding: 25px; margin-bottom: 30px; border-left: 6px solid var(--casa-green); }
        .slider-container { position: relative; overflow: hidden; border-radius: 15px; height: 300px; }
        .slider-track { display: flex; transition: 0.5s ease; height: 100%; }
        .slider-slide { flex: 0 0 100%; height: 100%; position: relative; }
        .slider-slide img { width: 100%; height: 100%; object-fit: cover; }
        
        .whatsapp-float {
            position: fixed; bottom: 25px; right: 25px; background: #25d366;
            width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000;
        }
        
        footer { background: #1e3f1a; color: white; text-align: center; padding: 40px 20px; }
        .footer-logo { max-width: 150px; margin-bottom: 20px; }

        @media (max-width: 768px) { .brand-container { max-width: 280px; } .hero { padding: 60px 20px; } }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <header class="hero">
        <div class="lang-picker">
            <button class="lang-btn" data-lang="es" onclick="changeLanguage('es')">ES</button>
            <button class="lang-btn" data-lang="pt" onclick="changeLanguage('pt')">PT</button>
            <button class="lang-btn" data-lang="en" onclick="changeLanguage('en')">EN</button>
        </div>
        <div class="brand-container">
            <img src="https://i.postimg.cc/cLhqBqDm/1775451075247_2.jpg" alt="Casa Verde Canas" class="main-logo">
        </div>
        <p id="site-subtitle" class="subtitle">Cargando...</p>
        <div class="trust-badges">
            <span id="badge-beach">🏖️</span> <span id="badge-parking">🅿️</span> <span id="badge-pool">🏊‍♀️</span> <span id="badge-bbq">🔥</span>
        </div>
    </header>

    <main class="container">
        <section>
            <h2 id="cabins-title">Nuestras Casas</h2>
            <div id="cabins-container" class="cabins-grid">
                <div class="loading">Buscando disponibilidad...</div>
            </div>
        </section>

        <section>
            <h2 id="common-title">Espacios Compartidos</h2>
            <div id="common-container"></div>
        </section>
    </main>

    <a href="https://wa.me/5548991181246" class="whatsapp-float" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/124/124034.png" width="35">
    </a>

    <footer>
        <img src="https://i.postimg.cc/BnpWBWhC/1775451091779_2.jpg" alt="Logo" class="footer-logo">
        <p id="footer-text">Alquiler directo con dueños</p>
        <p>📞 +55 48 99118-1246</p>
    </footer>

    <script>
        // CONFIG FIREBASE (Tus credenciales intactas)
        const firebaseConfig = {
            apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4",
            authDomain: "casaverdecanas-199.firebaseapp.com",
            databaseURL: "https://casaverdecanas-199-default-rtdb.firebaseio.com",
            projectId: "casaverdecanas-199",
            storageBucket: "casaverdecanas-199.firebasestorage.app",
            appId: "1:417825635316:web:ff7f4fe52edcab43d8d7a1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const TRANSLATIONS = {
            es: { 
                subtitle: "Tu refugio familiar en Canasvieiras, Florianópolis",
                beach: "🏖️ A 3 cuadras de la playa", parking: "🅿️ Estacionamiento",
                pool: "🏊‍♀️ Piscina compartida", bbq: "🔥 Parrilla",
                cabins: "Nuestras Casas", common: "El Predio",
                footer: "Alquiler de temporada familiar", more: "Ver detalles"
            },
            pt: { 
                subtitle: "Seu refúgio familiar em Canasvieiras, Florianópolis",
                beach: "🏖️ A 3 quadras da praia", parking: "🅿️ Estacionamento",
                pool: "🏊‍♀️ Piscina compartilhada", bbq: "🔥 Churrasqueira",
                cabins: "Nossas Casas", common: "O Pátio",
                footer: "Aluguel de temporada familiar", more: "Ver mais"
            },
            en: { 
                subtitle: "Your family retreat in Canasvieiras, Florianópolis",
                beach: "🏖️ 3 blocks from the beach", parking: "🅿️ Free parking",
                pool: "🏊‍♀️ Shared pool", bbq: "🔥 BBQ area",
                cabins: "Our Houses", common: "Shared Spaces",
                footer: "Family vacation rental", more: "View details"
            }
        };

        let currentLang = localStorage.getItem('lang') || 'es';

        function updateUI() {
            const t = TRANSLATIONS[currentLang];
            document.getElementById('site-subtitle').textContent = t.subtitle;
            document.getElementById('badge-beach').textContent = t.beach;
            document.getElementById('badge-parking').textContent = t.parking;
            document.getElementById('badge-pool').textContent = t.pool;
            document.getElementById('badge-bbq').textContent = t.bbq;
            document.getElementById('cabins-title').textContent = t.cabins;
            document.getElementById('common-title').textContent = t.common;
            document.getElementById('footer-text').textContent = t.footer;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
        }

        function getText(obj) {
            return obj[currentLang] || obj['es'] || "";
        }

        async function loadData() {
            const snap = await db.ref('siteData').once('value');
            const data = snap.val();
            
            // Render Cabañas
            const cabinsGrid = document.getElementById('cabins-container');
            cabinsGrid.innerHTML = '';
            
            ['cabin-1', 'cabin-2', 'cabin-3'].forEach(id => {
                const cabin = data.apartments[id];
                if(!cabin) return;
                
                let allPhotos = [];
                Object.values(cabin.categories || {}).forEach(c => allPhotos.push(...(c.photos || [])));

                const card = document.createElement('div');
                card.className = 'cabin-card';
                card.innerHTML = `
                    <div class="cabin-slider" id="slider-${id}">
                        ${allPhotos.map((p, i) => `<div class="cabin-slide ${i===0?'active':''}" style="background-image:url('${p.url}')"></div>`).join('')}
                    </div>
                    <div class="cabin-content">
                        <h3>${getText(cabin.name)}</h3>
                        <p>${getText(cabin.description)}</p>
                        <a href="cabanas/${id}.html" class="btn">${TRANSLATIONS[currentLang].more}</a>
                    </div>
                `;
                cabinsGrid.appendChild(card);
                startAutoSlide(id, allPhotos.length);
            });

            // Render Comunes (Similar lógica a tu código anterior)
            // ... (AQUÍ REUTILIZAMOS TU LÓGICA DE CATEGORY-SECTION)
        }

        function startAutoSlide(id, total) {
            let current = 0;
            if(total <= 1) return;
            setInterval(() => {
                const slides = document.querySelectorAll(`#slider-${id} .cabin-slide`);
                slides[current].classList.remove('active');
                current = (current + 1) % total;
                slides[current].classList.add('active');
            }, 4000 + Math.random()*2000);
        }

        function changeLanguage(l) {
            currentLang = l; localStorage.setItem('lang', l);
            updateUI(); loadData();
        }

        document.addEventListener('DOMContentLoaded', () => { updateUI(); loadData(); });
    </script>
</body>
</html>
