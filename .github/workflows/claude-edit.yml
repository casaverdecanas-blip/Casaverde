name: Claude Edit via Issue

on:
  issues:
    types: [opened, edited]

jobs:
  claude-edit:
    if: startsWith(github.event.issue.title, '[EDIT]')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      - name: Run Claude edit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node .github/workflows/claude-edit.js

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          git config user.name "Claude Bot"
          git config user.email "claude-bot@casaverdecanas.com.br"
          BRANCH_NAME="claude-edit/issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH_NAME"
          if git diff --quiet && git diff --staged --quiet; then
            echo "Sin cambios"
            exit 0
          fi
          git add -A
          SUMMARY=$(cat /tmp/edit_summary.txt 2>/dev/null || echo "Cambios via Claude")
          git commit -m "✏️ [Claude] ${SUMMARY}"
          git push origin "$BRANCH_NAME"
          gh pr create \
            --title "✏️ [Claude] ${ISSUE_TITLE}" \
            --body "Solicitado en Issue #${ISSUE_NUMBER}. Closes #${ISSUE_NUMBER}" \
            --base main \
            --head "$BRANCH_NAME"

      - name: Comment on Issue
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          SUMMARY=$(cat /tmp/edit_summary.txt 2>/dev/null || echo "Sin resumen disponible")
          gh issue comment "${ISSUE_NUMBER}" --body "## ✅ Claude completó los cambios

          **Resumen:** ${SUMMARY}

          El Pull Request ya está abierto y listo para tu revisión."