<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Actualizar Features - Casa Verde</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e3c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #2E5A31; margin-bottom: 5px; font-size: 1.5rem; }
        h2 { color: #555; font-size: 0.9rem; margin-bottom: 20px; }
        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            font-size: 0.8rem;
        }
        .success {
            background: #d4edda;
            border-left: 4px solid #27ae60;
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            font-size: 0.8rem;
        }
        .error {
            background: #f8d7da;
            border-left: 4px solid #e74c3c;
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            font-size: 0.8rem;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }
        button {
            background: #2E5A31;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
            transition: 0.2s;
        }
        button:hover { background: #1e3c2c; transform: translateY(-2px); }
        button:disabled { background: #999; transform: none; cursor: not-allowed; }
        .btn-success { background: #27ae60; }
        .login-box {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .log {
            background: #1e1e1e;
            color: #0f0;
            padding: 12px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 11px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
            display: none;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
            display: none;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #27ae60;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏷️ Actualizar Features y Notas</h1>
        <h2>Casa Verde Canas - Características y observaciones por cabaña</h2>
        
        <div class="warning">
            ⚠️ Esta herramienta agregará o actualizará:<br>
            • Features (lista de características con iconos)<br>
            • SpecialNote (nota especial como la accesibilidad del loft)<br>
            Los datos existentes NO se perderán.
        </div>
        
        <div class="login-box">
            <input type="email" id="email" placeholder="Email" autocomplete="email">
            <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password">
            <button id="btn-login" onclick="login()">🔐 Iniciar sesión</button>
            <div id="login-error" style="color:#e74c3c; margin-top:10px; font-size:0.8rem;"></div>
        </div>
        
        <div id="panel-migracion" style="display:none;">
            <div id="progress-bar" class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <button id="btn-actualizar" class="btn-success" onclick="ejecutarActualizacion()">🚀 Actualizar cabañas</button>
            <div id="log" class="log"></div>
            <div id="resultado" style="display:none;"></div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4",
            authDomain: "casaverdecanas-199.firebaseapp.com",
            databaseURL: "https://casaverdecanas-199-default-rtdb.firebaseio.com",
            projectId: "casaverdecanas-199",
            storageBucket: "casaverdecanas-199.firebasestorage.app",
            appId: "1:417825635316:web:ff7f4fe52edcab43d8d7a1"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUser = null;
        let isAdmin = false;
        
        function mostrarLog(mensaje, tipo = 'info') {
            const logDiv = document.getElementById('log');
            logDiv.style.display = 'block';
            const fecha = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${fecha}] ${mensaje}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
            
            const resultadoDiv = document.getElementById('resultado');
            if (tipo === 'success') {
                resultadoDiv.style.display = 'block';
                resultadoDiv.className = 'success';
                resultadoDiv.innerHTML = mensaje;
            } else if (tipo === 'error') {
                resultadoDiv.style.display = 'block';
                resultadoDiv.className = 'error';
                resultadoDiv.innerHTML = mensaje;
            }
        }
        
        function actualizarProgreso(porcentaje, texto) {
            const fill = document.getElementById('progress-fill');
            const progressBar = document.getElementById('progress-bar');
            progressBar.style.display = 'block';
            if (fill) fill.style.width = porcentaje + '%';
            if (texto) mostrarLog(texto);
        }
        
        // Login
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            
            if (!email || !password) {
                errorDiv.textContent = '❌ Ingresa email y contraseña';
                return;
            }
            
            try {
                const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                const userDoc = await firebase.firestore().collection('usuarios').doc(user.uid).get();
                
                if (userDoc.exists && userDoc.data().rol === 'admin') {
                    currentUser = user;
                    isAdmin = true;
                    errorDiv.textContent = '';
                    document.getElementById('panel-migracion').style.display = 'block';
                    mostrarLog('✅ Autenticación exitosa como administrador');
                } else {
                    errorDiv.textContent = '❌ No tienes permisos de administrador';
                    await firebase.auth().signOut();
                }
            } catch (err) {
                errorDiv.textContent = '❌ ' + (err.message || 'Error de autenticación');
            }
        }
        
        // Features y notas especiales para cada cabaña
        function getDefaultFeatures(cabinId) {
            const data = {
                "cabin-1": {
                    features: {
                        es: ["👥 6-7 huéspedes", "🛏️ 2 dormitorios", "🚿 1 baño", "🍳 Cocina completa", "🌿 Terraza privada"],
                        pt: ["👥 6-7 hóspedes", "🛏️ 2 quartos", "🚿 1 banheiro", "🍳 Cozinha completa", "🌿 Terraço privado"],
                        en: ["👥 6-7 guests", "🛏️ 2 bedrooms", "🚿 1 bathroom", "🍳 Full kitchen", "🌿 Private terrace"]
                    },
                    specialNote: {
                        es: "",
                        pt: "",
                        en: ""
                    }
                },
                "cabin-2": {
                    features: {
                        es: ["👥 6 huéspedes", "🏠 Dormitorios en entrepiso", "🚿 1 baño", "🍳 Cocina completa", "🌿 Terraza privada"],
                        pt: ["👥 6 hóspedes", "🏠 Quartos no mezanino", "🚿 1 banheiro", "🍳 Cozinha completa", "🌿 Terraço privado"],
                        en: ["👥 6 guests", "🏠 Bedrooms in mezzanine", "🚿 1 bathroom", "🍳 Full kitchen", "🌿 Private terrace"]
                    },
                    specialNote: {
                        es: "💡 El loft cuenta con un entrepiso al que se accede por escaleras de madera de estilo marinero, de paso algo estrecho. Puede no ser completamente cómodo para personas con dificultades de movilidad o niños muy pequeños sin supervisión. Lo recomendamos con cariño para viajeros activos que buscan un espacio con carácter.",
                        pt: "💡 O loft possui um mezanino acessado por escadas de madeira estilo marinheiro, de passagem um pouco estreita. Pode não ser totalmente confortável para pessoas com mobilidade reduzida ou crianças muito pequenas sem supervisão. Recomendamos com carinho para viajantes ativos que buscam um espaço com personalidade.",
                        en: "💡 The loft has a mezzanine accessed by wooden sailor-style stairs, somewhat narrow. It may not be completely comfortable for people with reduced mobility or very young children without supervision. We lovingly recommend it for active travelers looking for a space with character."
                    }
                },
                "cabin-3": {
                    features: {
                        es: ["👥 4 huéspedes", "🛏️ 2 dormitorios", "🚿 1 baño", "🍳 Cocina completa", "🌿 Terraza privada en planta"],
                        pt: ["👥 4 hóspedes", "🛏️ 2 quartos", "🚿 1 banheiro", "🍳 Cozinha completa", "🌿 Terraço privado no térreo"],
                        en: ["👥 4 guests", "🛏️ 2 bedrooms", "🚿 1 bathroom", "🍳 Full kitchen", "🌿 Private ground-floor terrace"]
                    },
                    specialNote: {
                        es: "",
                        pt: "",
                        en: ""
                    }
                }
            };
            
            return data[cabinId] || {
                features: {
                    es: ["👥 4 huéspedes", "🚿 1 baño", "🍳 Cocina completa"],
                    pt: ["👥 4 hóspedes", "🚿 1 banheiro", "🍳 Cozinha completa"],
                    en: ["👥 4 guests", "🚿 1 bathroom", "🍳 Full kitchen"]
                },
                specialNote: { es: "", pt: "", en: "" }
            };
        }
        
        async function ejecutarActualizacion() {
            if (!isAdmin) {
                mostrarLog('❌ No estás autenticado como administrador', 'error');
                return;
            }
            
            const btn = document.getElementById('btn-actualizar');
            btn.disabled = true;
            btn.textContent = '⏳ Actualizando...';
            
            try {
                mostrarLog('📥 Cargando datos desde Firebase...');
                const snapshot = await db.ref('siteData').once('value');
                const siteData = snapshot.val() || {};
                
                if (!siteData.apartments) {
                    mostrarLog('❌ No se encontraron cabañas en la base de datos', 'error');
                    return;
                }
                
                let actualizadas = 0;
                const total = Object.keys(siteData.apartments).length;
                
                for (const [cabinId, cabin] of Object.entries(siteData.apartments)) {
                    const defaultData = getDefaultFeatures(cabinId);
                    
                    // Actualizar features (si no existen o si queremos forzar actualización)
                    if (!cabin.features) {
                        cabin.features = defaultData.features;
                        actualizadas++;
                        mostrarLog(`✅ Agregados features a ${cabinId}`);
                    } else {
                        mostrarLog(`ℹ️ ${cabinId} ya tenía features, se mantienen`);
                    }
                    
                    // Actualizar specialNote (si no existe)
                    if (!cabin.specialNote && defaultData.specialNote && 
                        (defaultData.specialNote.es || defaultData.specialNote.pt || defaultData.specialNote.en)) {
                        cabin.specialNote = defaultData.specialNote;
                        actualizadas++;
                        mostrarLog(`✅ Agregada nota especial a ${cabinId}`);
                    } else if (!cabin.specialNote) {
                        cabin.specialNote = { es: "", pt: "", en: "" };
                    }
                    
                    const porcentaje = (Object.keys(siteData.apartments).indexOf(cabinId) + 1) / total * 100;
                    actualizarProgreso(porcentaje);
                }
                
                if (actualizadas > 0) {
                    mostrarLog('💾 Guardando cambios en Firebase...');
                    await db.ref('siteData').set(siteData);
                    mostrarLog(`✅ ¡Completado! Se actualizaron ${actualizadas} cabañas.`, 'success');
                } else {
                    mostrarLog(`ℹ️ Todas las cabañas ya estaban actualizadas. No se realizaron cambios.`, 'success');
                }
                
            } catch (error) {
                mostrarLog(`❌ Error: ${error.message}`, 'error');
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Actualizar cabañas';
            }
        }
        
        // Verificar sesión
        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const userDoc = await firebase.firestore().collection('usuarios').doc(user.uid).get();
                    if (userDoc.exists && userDoc.data().rol === 'admin') {
                        currentUser = user;
                        isAdmin = true;
                        document.getElementById('panel-migracion').style.display = 'block';
                        mostrarLog('✅ Sesión reanudada como administrador');
                    }
                } catch (err) {}
            }
        });
        
        window.login = login;
        window.ejecutarActualizacion = ejecutarActualizacion;
    </script>
</body>
</html>
