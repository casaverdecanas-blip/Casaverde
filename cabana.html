<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <title id="page-title">Cabaña | Casa Verde Canas</title>
    <meta id="meta-description" name="description" content="Cabaña rústica en Canasvieiras, Florianópolis. Espacio privado con acceso a piscina y áreas comunes. ¡Reserva directa!">
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Favicon con el logo -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='100' cy='100' r='85' fill='none' stroke='%235A3A1F' stroke-width='4'/%3E%3Cpath d='M50 140 C35 110, 40 80, 65 65 C55 95, 55 120, 50 140 Z' fill='%232E7D55'/%3E%3Cpath d='M150 140 C165 110, 160 80, 135 65 C145 95, 145 120, 150 140 Z' fill='%232E7D55'/%3E%3Cpolygon points='65,75 100,50 135,75' fill='none' stroke='%235A3A1F' stroke-width='4'/%3E%3Crect x='70' y='75' width='60' height='40' fill='none' stroke='%235A3A1F' stroke-width='4'/%3E%3Crect x='85' y='85' width='30' height='20' fill='none' stroke='%235A3A1F' stroke-width='3'/%3E%3Cline x1='70' y1='115' x2='130' y2='115' stroke='%235A3A1F' stroke-width='4'/%3E%3Cline x1='80' y1='115' x2='80' y2='145' stroke='%235A3A1F' stroke-width='4'/%3E%3Cline x1='100' y1='115' x2='100' y2='145' stroke='%235A3A1F' stroke-width='4'/%3E%3Cline x1='120' y1='115' x2='120' y2='145' stroke='%235A3A1F' stroke-width='4'/%3E%3C/svg%3E">
    
    <style>
        :root {
            --casa-green: #A3C9A8;
            --forest-green: #2E5A31;
            --warm-yellow: #F9D976;
            --charcoal: #4A4A4A;
            --starry-white: #FFFFFF;
            --earth-brown: #5A3A1F;
            --leaf-green: #2E7D55;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: #FDFDFD; 
            color: var(--charcoal); 
            line-height: 1.6; 
        }
        
        /* Header consistente con index */
        .hero {
            background: linear-gradient(135deg, var(--forest-green) 0%, #1a3a1c 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            border-bottom: 8px solid var(--casa-green);
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100" fill="none"><path d="M0,0 C200,20 300,40 500,40 C700,40 800,20 1000,0 L1000,100 L0,100 Z" fill="rgba(255,255,255,0.05)"/></svg>') repeat-x bottom;
            background-size: 1000px 100px;
            opacity: 0.3;
            pointer-events: none;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }
        
        .logo-svg svg {
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25));
            transition: all 0.4s ease;
        }
        
        .logo-svg svg:hover {
            transform: scale(1.05) rotate(2deg);
        }
        
        .logo-text {
            text-align: left;
        }
        
        .logo-text h1 {
            font-size: 2rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, var(--warm-yellow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .lang-picker {
            position: absolute; 
            top: 20px; 
            right: 25px; 
            display: flex; 
            gap: 10px;
            z-index: 10;
        }
        
        .lang-btn {
            background: rgba(255,255,255,0.15); 
            border: 1px solid rgba(255,255,255,0.4); 
            color: white;
            padding: 6px 15px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        .lang-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .lang-btn.active { 
            background: var(--warm-yellow); 
            color: var(--forest-green); 
            border-color: var(--warm-yellow);
        }
        
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 40px 24px; 
        }
        
        .back-link { margin-bottom: 25px; }
        .back-link a { 
            color: var(--forest-green); 
            text-decoration: none; 
            font-weight: 600; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
            transition: 0.2s;
        }
        .back-link a:hover { gap: 12px; }
        
        .cabin-title { 
            text-align: center; 
            margin: 10px 0 20px; 
            color: var(--forest-green); 
            font-size: 2.2rem; 
            font-weight: 700;
        }
        
        .error-message {
            text-align: center;
            padding: 60px 20px;
            background: #f8d7da;
            border-radius: 20px;
            margin: 40px 0;
        }
        .error-message h2 { color: #721c24; margin-bottom: 15px; }
        .error-message a { color: var(--forest-green); }
        
        .airbnb-link {
            display: inline-flex; 
            align-items: center; 
            padding: 10px 24px;
            background: white; 
            border: 2px solid #ff5a5f; 
            color: #ff5a5f;
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 0.9rem; 
            transition: 0.2s;
            gap: 8px;
        }
        .airbnb-link:hover { background: #ff5a5f; color: white; transform: translateY(-2px); }
        
        .description { 
            font-size: 1.1rem; 
            margin: 30px auto; 
            color: #555; 
            text-align: center; 
            max-width: 800px; 
            line-height: 1.7;
        }
        
        /* Features grid - DINÁMICO */
        .features-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 20px; 
            margin: 40px 0; 
        }
        .feature-card { 
            background: #f4f8f4; 
            padding: 18px 12px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid #eef3ee;
            transition: 0.2s;
        }
        .feature-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .feature-card .icon { font-size: 1.8rem; margin-bottom: 8px; }
        .feature-card span { font-size: 0.9rem; font-weight: 500; color: var(--charcoal); }
        
        /* Nota especial */
        .special-note {
            background: #fef9e6;
            border-left: 4px solid var(--warm-yellow);
            padding: 20px 25px;
            border-radius: 16px;
            margin: 30px 0;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        .special-note .note-icon {
            font-size: 1.8rem;
        }
        .special-note .note-text {
            flex: 1;
            font-style: italic;
            color: #7a6a3a;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        
        /* Sliders */
        .category-group { 
            background: white; 
            border-radius: 25px; 
            padding: 30px; 
            margin-bottom: 35px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); 
            border: 1px solid #f0f0f0; 
        }
        .category-group h2 { 
            color: var(--forest-green); 
            font-size: 1.5rem; 
            margin-bottom: 20px; 
            border-left: 5px solid var(--casa-green); 
            padding-left: 18px; 
        }
        
        .slider-container { 
            position: relative; 
            overflow-x: auto;
            scroll-behavior: smooth;
            border-radius: 20px;
        }
        .slider-track { 
            display: flex; 
            gap: 16px; 
            padding: 5px 0;
        }
        .slider-slide { 
            flex: 0 0 calc(33.333% - 11px); 
            min-width: 250px;
            aspect-ratio: 4/3; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #eee;
            transition: 0.3s;
        }
        .slider-slide img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .slider-slide img:hover { transform: scale(1.05); }
        
        .shared-spaces { 
            background: linear-gradient(135deg, var(--casa-green) 0%, #c5e0c9 100%);
            color: var(--forest-green); 
            padding: 35px; 
            border-radius: 25px; 
            margin: 45px 0; 
            text-align: center;
        }
        .shared-spaces h3 { font-size: 1.6rem; margin-bottom: 15px; }
        
        #calendar-container { 
            width: 100%; 
            margin: 25px 0; 
            border-radius: 20px; 
            overflow: hidden;
            background: white;
        }
        #calendar-container iframe { 
            width: 100%; 
            border: none; 
            min-height: 550px; 
        }
        
        .btn-whatsapp { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px;
            background: #25d366; 
            color: white; 
            padding: 16px 40px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.1rem; 
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
            transition: 0.2s;
        }
        .btn-whatsapp:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(37, 211, 102, 0.4); }
        
        footer { 
            background: var(--forest-green); 
            color: white; 
            padding: 45px 20px 35px; 
            text-align: center; 
            border-top: 5px solid var(--casa-green);
            margin-top: 60px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: var(--forest-green);
            font-size: 1.1rem;
        }
        
        @media (max-width: 768px) {
            .lang-picker {
                position: relative;
                top: 0;
                right: 0;
                justify-content: center;
                margin-bottom: 15px;
            }
            .logo-container {
                flex-direction: column;
                text-align: center;
            }
            .logo-text {
                text-align: center;
            }
            .logo-text h1 { font-size: 1.5rem; }
            .logo-svg svg { width: 70px; height: 70px; }
            .cabin-title { font-size: 1.6rem; }
            .slider-slide { flex: 0 0 calc(50% - 8px); min-width: 200px; }
            #calendar-container iframe { min-height: 400px; }
            .container { padding: 25px 16px; }
            .features-grid { grid-template-columns: repeat(2, 1fr); }
            .special-note { flex-direction: column; }
        }
        
        @media (max-width: 480px) {
            .slider-slide { flex: 0 0 100%; }
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <header class="hero">
        <div class="lang-picker">
            <button class="lang-btn" data-lang="es" onclick="changeLanguage('es')">ES</button>
            <button class="lang-btn" data-lang="pt" onclick="changeLanguage('pt')">PT</button>
            <button class="lang-btn" data-lang="en" onclick="changeLanguage('en')">EN</button>
        </div>
        
        <div class="logo-container">
            <div class="logo-svg">
                <svg width="80" height="80" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="100" cy="100" r="85" fill="none" stroke="#F9D976" stroke-width="3.5"/>
                    <path d="M50 140 C35 110, 40 80, 65 65 C55 95, 55 120, 50 140 Z" fill="#A3C9A8"/>
                    <path d="M150 140 C165 110, 160 80, 135 65 C145 95, 145 120, 150 140 Z" fill="#A3C9A8"/>
                    <polygon points="65,75 100,50 135,75" fill="none" stroke="#F9D976" stroke-width="3.5"/>
                    <rect x="70" y="75" width="60" height="40" fill="none" stroke="#F9D976" stroke-width="3.5"/>
                    <rect x="85" y="85" width="30" height="20" fill="none" stroke="#F9D976" stroke-width="2.5"/>
                    <line x1="70" y1="115" x2="130" y2="115" stroke="#F9D976" stroke-width="3.5"/>
                    <line x1="80" y1="115" x2="80" y2="145" stroke="#F9D976" stroke-width="3.5"/>
                    <line x1="100" y1="115" x2="100" y2="145" stroke="#F9D976" stroke-width="3.5"/>
                    <line x1="120" y1="115" x2="120" y2="145" stroke="#F9D976" stroke-width="3.5"/>
                </svg>
            </div>
            <div class="logo-text">
                <h1>Casa Verde Canas</h1>
            </div>
        </div>
    </header>

    <div class="container" id="main-container">
        <div class="back-link">
            <a href="../index.html">← Volver al inicio</a>
        </div>
        
        <div id="dynamic-content">
            <div class="loading">🌿 Cargando información de la cabaña...</div>
        </div>
    </div>

    <footer>
        <p>🌿 Casa Verde Canas - Florianópolis, Brasil</p>
        <p style="margin-top: 8px; opacity: 0.8; font-size: 0.8rem;">📍 Canasvieiras - Tu refugio en la isla</p>
    </footer>

    <script>
        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4",
            authDomain: "casaverdecanas-199.firebaseapp.com",
            databaseURL: "https://casaverdecanas-199-default-rtdb.firebaseio.com",
            projectId: "casaverdecanas-199",
            storageBucket: "casaverdecanas-199.firebasestorage.app",
            appId: "1:417825635316:web:ff7f4fe52edcab43d8d7a1"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // Obtener el ID de la cabaña desde la URL
        const urlParams = new URLSearchParams(window.location.search);
        const CABIN_ID = urlParams.get('id');
        
        let currentLang = localStorage.getItem('lang') || 'es';
        let cabinData = null;

        function getText(obj) {
            if (!obj) return '';
            if (typeof obj === 'string') return obj;
            return obj[currentLang] || obj.es || Object.values(obj)[0] || '';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
        }

        function showError(message) {
            const container = document.getElementById('dynamic-content');
            container.innerHTML = `
                <div class="error-message">
                    <h2>⚠️ ${message}</h2>
                    <p>Volvé al <a href="../index.html">inicio</a> para ver nuestras cabañas disponibles.</p>
                </div>
            `;
        }

        async function loadCabinData() {
            if (!CABIN_ID) {
                showError('No se especificó qué cabaña ver.');
                return;
            }
            
            try {
                const snapshot = await db.ref(`siteData/apartments/${CABIN_ID}`).once('value');
                cabinData = snapshot.val();
                
                if (!cabinData) {
                    showError(`No encontramos la cabaña "${CABIN_ID}".`);
                    return;
                }
                
                renderCabinPage();
                
            } catch (error) {
                console.error('Error cargando cabaña:', error);
                showError('Error al cargar la información. Por favor, recargá la página.');
            }
        }

        function renderCabinPage() {
            const container = document.getElementById('dynamic-content');
            const cabinName = getText(cabinData.name) || 'Cabaña';
            const description = getText(cabinData.description) || 'Descripción no disponible';
            
            // Actualizar título y meta
            document.title = `${cabinName} | Casa Verde Canas`;
            const metaDesc = document.getElementById('meta-description');
            if (metaDesc) {
                metaDesc.setAttribute('content', `${cabinName} - Cabaña rústica en Canasvieiras, Florianópolis. Espacio privado con acceso a piscina y áreas comunes.`);
            }
            
            // Obtener features (dinámicos)
            const features = cabinData.features ? getText(cabinData.features) : [];
            const featuresArray = Array.isArray(features) ? features : 
                                  (typeof features === 'string' ? [features] : []);
            
            // Obtener nota especial
            const specialNote = cabinData.specialNote ? getText(cabinData.specialNote) : '';
            
            // Construir HTML de features
            let featuresHtml = '';
            if (featuresArray.length > 0) {
                featuresHtml = `
                    <div class="features-grid">
                        ${featuresArray.map(feature => {
                            // Detectar si el texto ya tiene ícono o agregar uno por defecto
                            const hasIcon = feature.match(/[🔹🔸👥🛏️🚿🍳🌿🏠❄️💡]/);
                            const displayText = hasIcon ? feature : `🔹 ${feature}`;
                            return `<div class="feature-card"><div class="icon">${displayText.charAt(0)}</div><span>${escapeHtml(displayText.substring(2))}</span></div>`;
                        }).join('')}
                    </div>
                `;
            }
            
            // Construir HTML de nota especial
            let specialNoteHtml = '';
            if (specialNote && specialNote.trim() !== '') {
                specialNoteHtml = `
                    <div class="special-note">
                        <div class="note-icon">💡</div>
                        <div class="note-text">${escapeHtml(specialNote).replace(/\n/g, '<br>')}</div>
                    </div>
                `;
            }
            
            let html = `
                <h1 class="cabin-title">${escapeHtml(cabinName)}</h1>
                
                <div style="text-align: center; margin-bottom: 25px;">
                    <a id="airbnb-link" href="${escapeHtml(cabinData.airbnb_url || '#')}" target="_blank" class="airbnb-link">
                        📅 Ver disponibilidad en Airbnb
                    </a>
                </div>
                
                <p class="description">${escapeHtml(description).replace(/\n/g, '<br>')}</p>
                
                ${featuresHtml}
                ${specialNoteHtml}
                
                <div id="categories-container"></div>
                
                <div class="shared-spaces">
                    <h3>🌳 Espacios compartidos</h3>
                    <p>Disfruta de nuestra piscina, zona de parrilla techada, living comunitario y hamacas entre los árboles. Un entorno fresco y familiar diseñado para tu comodidad y el encuentro respetuoso.</p>
                </div>

                <div id="calendar-container" class="category-group">
                    <h2>📅 Disponibilidad</h2>
                    <div id="calendar-loading" class="loading">Cargando calendario...</div>
                </div>

                <div style="text-align: center; margin: 45px 0;">
                    <a id="whatsapp-link" href="#" class="btn-whatsapp">
                        <img src="https://cdn-icons-png.flaticon.com/512/124/124034.png" width="28" alt="WhatsApp">
                        Reservar con precio directo
                    </a>
                    <p style="margin-top: 12px; color: #888;">Sin comisiones, trato directo con los dueños</p>
                </div>
            `;
            
            container.innerHTML = html;
            
            // Cargar categorías y fotos
            renderCategories();
            
            // Cargar calendario
            renderCalendar();
            
            // Configurar WhatsApp
            setupWhatsApp(cabinName);
        }
        
        function renderCalendar() {
            const calendarContainer = document.getElementById('calendar-container');
            if (cabinData.google_calendar_iframe && cabinData.google_calendar_iframe.trim() !== '') {
                calendarContainer.innerHTML = `
                    <h2>📅 Disponibilidad</h2>
                    <div style="margin-top: 15px;">${cabinData.google_calendar_iframe}</div>
                `;
            } else {
                calendarContainer.innerHTML = `
                    <h2>📅 Disponibilidad</h2>
                    <p style="padding: 20px; text-align: center; color: #666;">Próximamente disponible. Consultanos por WhatsApp.</p>
                `;
            }
        }

        function renderCategories() {
            const container = document.getElementById('categories-container');
            const categories = cabinData.categories || {};
            container.innerHTML = '';
            
            const sortedCategories = Object.entries(categories).sort((a, b) => (a[1].order || 0) - (b[1].order || 0));
            
            if (sortedCategories.length === 0) {
                container.innerHTML = '<div class="loading">📸 Próximamente más imágenes</div>';
                return;
            }
            
            for (const [catId, catData] of sortedCategories) {
                const photos = catData.photos || [];
                if (photos.length === 0) continue;
                
                const categoryName = getText(catData.name) || catId;
                const section = document.createElement('div');
                section.className = 'category-group';
                
                section.innerHTML = `
                    <h2>${escapeHtml(categoryName)}</h2>
                    <div class="slider-container">
                        <div class="slider-track" id="track-${CABIN_ID}-${catId}"></div>
                    </div>
                `;
                container.appendChild(section);
                
                const track = document.getElementById(`track-${CABIN_ID}-${catId}`);
                if (track) {
                    photos.sort((a, b) => (a.order || 0) - (b.order || 0)).forEach(photo => {
                        const slide = document.createElement('div');
                        slide.className = 'slider-slide';
                        slide.innerHTML = `<img src="${escapeHtml(photo.url)}" alt="${escapeHtml(getText(photo.desc))}" onclick="openModal('${escapeHtml(photo.url)}')" onerror="this.src='https://via.placeholder.com/400x300?text=Error+de+carga'">`;
                        track.appendChild(slide);
                    });
                }
            }
        }

        function setupWhatsApp(cabinName) {
            const whatsappLink = document.getElementById('whatsapp-link');
            if (whatsappLink) {
                whatsappLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    const message = `Hola! Me interesa la cabaña: ${cabinName}. Me gustaría consultar disponibilidad y precios.`;
                    window.open(`https://wa.me/5548991181246?text=${encodeURIComponent(message)}`, '_blank');
                });
            }
        }

        function openModal(url) {
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer;';
            modal.innerHTML = `<img src="${url}" style="max-width:90%;max-height:90%;border-radius:10px;object-fit:contain;">`;
            modal.onclick = () => modal.remove();
            document.body.appendChild(modal);
        }

        function changeLanguage(lang) {
            localStorage.setItem('lang', lang);
            currentLang = lang;
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.getAttribute('data-lang') === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            loadCabinData();
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.getAttribute('data-lang') === currentLang) {
                    btn.classList.add('active');
                }
            });
            
            loadCabinData();
        });
        
        window.changeLanguage = changeLanguage;
        window.openModal = openModal;
    </script>
</body>
</html>
