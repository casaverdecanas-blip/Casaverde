<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title id="page-title">Cabaña | Casa Verde Canas</title>
    <meta name="description" content="Apartamento rústico en Canasvieiras, Florianópolis. Naturaleza, piscina y playa.">

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

    <style>
        :root {
            --verde:       #2E5A31;
            --verde-claro: #A3C9A8;
            --amarillo:    #F9D976;
            --carbon:      #2c3e50;
            --gris:        #6c757d;
            --fondo:       #FAFDF9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Quicksand', sans-serif; background: var(--fondo); color: var(--carbon); line-height: 1.6; }

        /* HERO */
        .hero { background: linear-gradient(160deg, var(--verde) 0%, #1a3a1c 100%); color: white; padding: 44px 24px 60px; text-align: center; position: relative; overflow: hidden; }
        .hero::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:50px; background:var(--fondo); clip-path:ellipse(55% 100% at 50% 100%); }
        .lang-picker { position:absolute; top:18px; right:22px; display:flex; gap:8px; z-index:10; }
        .lang-btn { background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.3); color:white; padding:6px 14px; border-radius:30px; cursor:pointer; font-weight:700; font-size:13px; font-family:'Quicksand',sans-serif; transition:all 0.25s; }
        .lang-btn.active { background:var(--amarillo); color:var(--verde); border-color:var(--amarillo); }
        .logo-wrap { display:flex; align-items:center; justify-content:center; gap:18px; margin-bottom:14px; flex-wrap:wrap; position:relative; z-index:2; }
        .logo-text h1 { font-family:'Playfair Display',serif; font-size:clamp(1.6rem,5vw,2.2rem); background:linear-gradient(135deg,#fff 0%,var(--amarillo) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .cabin-hero-name { font-family:'Playfair Display',serif; font-size:clamp(1.1rem,3vw,1.6rem); color:rgba(255,255,255,0.88); margin-top:6px; position:relative; z-index:2; font-style:italic; }

        /* LAYOUT */
        .container { max-width: 1060px; margin: 0 auto; padding: 48px 24px; }
        .back-link { margin-bottom: 28px; }
        .back-link a { color:var(--verde); text-decoration:none; font-weight:600; display:inline-flex; align-items:center; gap:6px; transition:gap 0.2s; }
        .back-link a:hover { gap:10px; }

        /* FOTOS */
        .fotos-slider { position:relative; border-radius:22px; overflow:hidden; height:380px; background:#c8dfc8; margin-bottom:40px; box-shadow:0 12px 36px rgba(46,90,49,0.15); }
        .foto-slide { position:absolute; inset:0; opacity:0; transition:opacity 0.9s ease-in-out; background-size:cover; background-position:center; }
        .foto-slide.active { opacity:1; }
        .foto-nav { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); display:flex; gap:8px; z-index:5; }
        .foto-dot { width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,0.5); cursor:pointer; transition:background 0.3s; border:none; }
        .foto-dot.active { background:white; }
        .foto-arrow { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.3); color:white; border:none; width:42px; height:42px; border-radius:50%; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center; z-index:5; transition:background 0.2s; }
        .foto-arrow:hover { background:rgba(0,0,0,0.55); }
        .foto-arrow.prev { left:14px; }
        .foto-arrow.next { right:14px; }
        .sin-foto { display:flex; align-items:center; justify-content:center; height:100%; color:#a3c9a8; font-size:3rem; }

        /* INFO GRID */
        .cabin-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:28px; margin-bottom:36px; }
        .info-card { background:white; border-radius:20px; padding:26px; box-shadow:0 4px 16px rgba(46,90,49,0.07); border:1px solid rgba(163,201,168,0.25); }
        .info-card h2 { font-family:'Playfair Display',serif; color:var(--verde); font-size:1.2rem; margin-bottom:14px; }
        .descripcion-text { font-size:0.95rem; color:#555; line-height:1.8; }
        .detalles-list { display:flex; flex-direction:column; gap:10px; }
        .detalle-item { display:flex; align-items:center; gap:10px; font-size:14px; color:#444; }
        .detalle-icon { font-size:18px; }
        .comodidades-wrap { display:flex; flex-wrap:wrap; gap:7px; margin-top:14px; }
        .comod-tag { background:#f0f9f0; color:var(--verde); padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; border:1px solid rgba(163,201,168,0.4); }

        /* SECCIÓN CARD */
        .section-card { background:white; border-radius:22px; padding:28px; margin-bottom:28px; box-shadow:0 4px 16px rgba(46,90,49,0.07); border:1px solid rgba(163,201,168,0.2); }
        .section-card h2 { font-family:'Playfair Display',serif; color:var(--verde); font-size:1.3rem; margin-bottom:6px; }
        .section-subtitle { font-size:13px; color:var(--gris); margin-bottom:18px; }
        .cal-leyenda { display:flex; gap:18px; flex-wrap:wrap; margin-bottom:16px; font-size:13px; }
        .cal-legend-item { display:flex; align-items:center; gap:6px; font-weight:600; color:#555; }
        .cal-dot { width:12px; height:12px; border-radius:3px; }

        /* FORMULARIO */
        .form-group { margin-bottom:15px; }
        .form-group label { display:block; margin-bottom:5px; font-weight:700; font-size:13px; color:#555; }
        .form-group input, .form-group select { width:100%; padding:11px 14px; border:1.5px solid #ddd; border-radius:12px; font-size:14px; font-family:'Quicksand',sans-serif; outline:none; transition:border-color 0.2s; background:white; }
        .form-group input:focus, .form-group select:focus { border-color:var(--verde); }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

        /* PRECIO */
        .precio-result { background:linear-gradient(135deg,#e8f5e9,#f0f9f0); border:1.5px solid #c8e6c9; border-radius:16px; padding:18px 20px; margin:18px 0; display:none; }
        .precio-linea { display:flex; justify-content:space-between; font-size:14px; padding:3px 0; color:#555; }
        .precio-total { display:flex; justify-content:space-between; font-size:20px; font-weight:800; color:var(--verde); border-top:2px solid #c8e6c9; margin-top:8px; padding-top:10px; }

        /* AVISO */
        .aviso-confirmacion { background:#fff8e1; border:1.5px solid #ffe082; border-radius:12px; padding:12px 16px; margin-bottom:18px; font-size:13px; color:#7a6a3a; line-height:1.6; }

        /* BOTONES */
        .btn { display:inline-flex; align-items:center; gap:8px; padding:13px 28px; border-radius:30px; border:2px solid transparent; font-weight:700; font-size:14px; cursor:pointer; font-family:'Quicksand',sans-serif; transition:all 0.25s; }
        .btn:hover { transform:translateY(-2px); }
        .btn-calcular { background:white; color:var(--verde); border-color:var(--verde); margin-bottom:8px; }
        .btn-calcular:hover { background:var(--verde); color:white; }
        .btn-wa { background:#25D366; color:white; border-color:#25D366; width:100%; justify-content:center; font-size:15px; margin-top:4px; }
        .btn-wa:hover { background:transparent; color:#25D366; }
        .btn-wa:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

        /* WA FLOAT */
        .wa-float { position:fixed; bottom:26px; right:26px; width:58px; height:58px; background:#25D366; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(37,211,102,0.4); z-index:999; animation:waPulse 2.5s infinite; text-decoration:none; }
        @keyframes waPulse { 0%,100%{box-shadow:0 8px 24px rgba(37,211,102,0.4);}50%{box-shadow:0 8px 36px rgba(37,211,102,0.65);} }

        /* FOOTER */
        footer { background:#111a11; color:rgba(255,255,255,0.7); padding:40px 24px 28px; text-align:center; }
        footer strong { color:white; }
        footer p { font-size:13px; margin-top:6px; }

        .loading-state { text-align:center; padding:50px; color:var(--verde); font-size:1.1rem; }
        .error-state { text-align:center; padding:50px; background:#fdecea; border-radius:20px; margin:40px 0; }
        .error-state h2 { color:#c0392b; margin-bottom:12px; }

        @media (max-width:768px) {
            .hero { padding:36px 16px 50px; }
            .lang-picker { position:relative; top:0; right:0; justify-content:center; margin-bottom:14px; }
            .logo-wrap { flex-direction:column; gap:10px; }
            .container { padding:36px 16px; }
            .cabin-info-grid { grid-template-columns:1fr; }
            .form-row { grid-template-columns:1fr; }
            .fotos-slider { height:240px; }
            .wa-float { width:50px; height:50px; bottom:18px; right:18px; }
        }
    </style>
</head>
<body>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const FIREBASE_CONFIG = {
    apiKey:    "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4",
    authDomain:"casaverdecanas-199.firebaseapp.com",
    projectId: "casaverdecanas-199"
};
const GOOGLE_API_KEY = "AIzaSyBnfunjUkUXiRjKCPRotpFHE9tGgn6tV8E";
const WA_NUMBER      = "5548991181246";

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

// ── PARAMS ──────────────────────────────────────────────────
const CABANA_ID = parseInt(new URLSearchParams(window.location.search).get('id'));

// ── ESTADO ──────────────────────────────────────────────────
let currentLang  = localStorage.getItem('cvLang') || 'es';
let cabanaData   = null;
let calendar     = null;
let sliderIdx    = 0;
let ultimoPrecio = null;

// ── i18n ────────────────────────────────────────────────────
const i18n = {
    back:         { es:'← Volver al inicio',     pt:'← Voltar ao início',    en:'← Back to home' },
    descripcion:  { es:'Descripción',             pt:'Descrição',             en:'Description' },
    detalles:     { es:'Detalles',                pt:'Detalhes',              en:'Details' },
    comodidades:  { es:'Comodidades',             pt:'Comodidades',           en:'Amenities' },
    personas:     { es:'personas',                pt:'pessoas',               en:'people' },
    camasD:       { es:'camas dobles',            pt:'camas de casal',        en:'double beds' },
    camasI:       { es:'camas individuales',      pt:'camas de solteiro',     en:'single beds' },
    playa:        { es:'cuadras de la playa',     pt:'quadras da praia',      en:'blocks to beach' },
    piscina:      { es:'Piscina',                 pt:'Piscina',               en:'Pool' },
    estac:        { es:'Estacionamiento',         pt:'Estacionamento',        en:'Parking' },
    desde:        { es:'Desde',                   pt:'A partir de',           en:'From' },
    noche:        { es:'/noche',                  pt:'/noite',                en:'/night' },
    disponib:     { es:'Disponibilidad',          pt:'Disponibilidade',       en:'Availability' },
    disponibSub:  { es:'Fechas en rojo = reservadas. Seleccioná un rango para calcular precio.', pt:'Datas em vermelho = reservadas. Selecione um intervalo para calcular o preço.', en:'Red dates = booked. Select a range to calculate price.' },
    reservadoDir: { es:'Reservado (Directo)',     pt:'Reservado (Direto)',    en:'Booked (Direct)' },
    reservadoAir: { es:'Reservado (Airbnb)',      pt:'Reservado (Airbnb)',    en:'Booked (Airbnb)' },
    presupuesto:  { es:'Pedir presupuesto',       pt:'Pedir orçamento',       en:'Request a quote' },
    tuNombre:     { es:'Tu nombre *',             pt:'Seu nome *',            en:'Your name *' },
    nombrePH:     { es:'Tu nombre completo',      pt:'Seu nome completo',     en:'Your full name' },
    checkin:      { es:'Check-in',                pt:'Check-in',              en:'Check-in' },
    checkout:     { es:'Check-out',               pt:'Check-out',             en:'Check-out' },
    adultos:      { es:'Adultos',                 pt:'Adultos',               en:'Adults' },
    ninos:        { es:'Niños',                   pt:'Crianças',              en:'Children' },
    calcular:     { es:'Calcular precio',         pt:'Calcular preço',        en:'Calculate price' },
    noches:       { es:'Noches',                  pt:'Noites',                en:'Nights' },
    alojamiento:  { es:'Alojamiento',             pt:'Hospedagem',            en:'Accommodation' },
    limpieza:     { es:'Limpieza',                pt:'Limpeza',               en:'Cleaning' },
    total:        { es:'Total estimado',          pt:'Total estimado',        en:'Estimated total' },
    aviso:        { es:'⚠️ Este presupuesto es orientativo y está sujeto a confirmación de disponibilidad. No constituye una reserva hasta que recibas confirmación de nuestra parte.', pt:'⚠️ Este orçamento é orientativo e sujeito à confirmação de disponibilidade. Não constitui uma reserva até você receber nossa confirmação.', en:'⚠️ This quote is indicative and subject to availability confirmation. It does not constitute a booking until you receive our confirmation.' },
    enviarWA:     { es:'📲 Enviar consulta por WhatsApp', pt:'📲 Enviar consulta pelo WhatsApp', en:'📲 Send inquiry via WhatsApp' },
    calcPrimero:  { es:'Calculá el precio primero', pt:'Calcule o preço primeiro', en:'Calculate price first' },
    ingresaNombre:{ es:'Por favor ingresá tu nombre', pt:'Por favor insira seu nome', en:'Please enter your name' },
};

function t(key) { return i18n[key]?.[currentLang] || i18n[key]?.es || ''; }
function getText(obj) { if(!obj) return ''; if(typeof obj==='string') return obj; return obj[currentLang]||obj.es||Object.values(obj)[0]||''; }
function escHtml(s) { if(!s) return ''; return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]||m)); }
function locale() { return currentLang==='pt'?'pt-BR':currentLang==='en'?'en-US':'es-AR'; }

// ── CARGAR CABAÑA ────────────────────────────────────────────
async function cargarCabana() {
    if (!CABANA_ID) { mostrarError('No se especificó qué cabaña ver.'); return; }
    try {
        const doc = await db.collection('cabanas').doc(CABANA_ID.toString()).get();
        if (!doc.exists) { mostrarError('Cabaña no encontrada.'); return; }
        cabanaData = { id: doc.id, ...doc.data() };
        renderCabana();
    } catch(e) {
        console.error(e);
        mostrarError('Error al cargar. Intentá más tarde.');
    }
}

function mostrarError(msg) {
    document.getElementById('mainContent').innerHTML = `
        <div class="error-state">
            <h2>⚠️ ${escHtml(msg)}</h2>
            <p>Volvé al <a href="index.html" style="color:var(--verde);">inicio</a> para ver nuestras cabañas.</p>
        </div>`;
}

// ── RENDER PRINCIPAL ─────────────────────────────────────────
function renderCabana() {
    const nombre   = getText(cabanaData.nombre);
    const desc     = getText(cabanaData.descripcion);
    // Fotos pueden ser array de strings o array de objetos {url, ...}
    const fotosRaw = cabanaData.fotos || [];
    const fotos    = fotosRaw.map(f => typeof f === 'string' ? f : f?.url).filter(Boolean);
    const capBase  = cabanaData.capacidad?.base || 2;
    const capMax   = cabanaData.capacidad?.max  || 4;
    const camasD   = cabanaData.camas?.dobles   || 0;
    const camasI   = cabanaData.camas?.individuales || 0;
    const precio   = cabanaData.tarifas?.precioBase;
    const comos    = cabanaData.comodidades || [];
    const hoy      = new Date().toISOString().split('T')[0];

    document.title = `${nombre} | Casa Verde Canas`;
    document.getElementById('cabinHeroName').textContent = nombre;
    document.getElementById('backLink').textContent = t('back');
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));

    // Slides
    const slidesHtml = fotos.length
        ? fotos.map((url,i) => `<div class="foto-slide ${i===0?'active':''}" style="background-image:url('${escHtml(url)}')"></div>`).join('')
        : '<div class="foto-slide active"><div class="sin-foto">🏠</div></div>';
    const dotsHtml   = fotos.length > 1 ? fotos.map((_,i) => `<button class="foto-dot ${i===0?'active':''}" onclick="irSlide(${i})"></button>`).join('') : '';
    const arrowsHtml = fotos.length > 1 ? `<button class="foto-arrow prev" onclick="cambiarSlide(-1)">‹</button><button class="foto-arrow next" onclick="cambiarSlide(1)">›</button>` : '';

    document.getElementById('mainContent').innerHTML = `
        <!-- FOTOS -->
        <div class="fotos-slider" id="fotosSlider">
            ${slidesHtml}${arrowsHtml}
            <div class="foto-nav">${dotsHtml}</div>
        </div>

        <!-- INFO -->
        <div class="cabin-info-grid">
            <div class="info-card">
                <h2>${t('descripcion')}</h2>
                <p class="descripcion-text">${escHtml(desc).replace(/\n/g,'<br>')}</p>
            </div>
            <div class="info-card">
                <h2>${t('detalles')}</h2>
                <div class="detalles-list">
                    <div class="detalle-item"><span class="detalle-icon">👥</span> ${capBase}–${capMax} ${t('personas')}</div>
                    ${camasD ? `<div class="detalle-item"><span class="detalle-icon">🛏️</span> ${camasD} ${t('camasD')}</div>` : ''}
                    ${camasI ? `<div class="detalle-item"><span class="detalle-icon">🛏️</span> ${camasI} ${t('camasI')}</div>` : ''}
                    ${precio  ? `<div class="detalle-item"><span class="detalle-icon">💰</span> ${t('desde')} R$ ${precio}${t('noche')}</div>` : ''}
                    <div class="detalle-item"><span class="detalle-icon">🏖️</span> 3 ${t('playa')}</div>
                    <div class="detalle-item"><span class="detalle-icon">🏊</span> ${t('piscina')}</div>
                    <div class="detalle-item"><span class="detalle-icon">🅿️</span> ${t('estac')}</div>
                </div>
                ${comos.length ? `
                    <div style="margin-top:16px;">
                        <strong style="font-size:13px;color:#555;">${t('comodidades')}</strong>
                        <div class="comodidades-wrap">
                            ${comos.map(c=>`<span class="comod-tag">${escHtml(c)}</span>`).join('')}
                        </div>
                    </div>` : ''}
            </div>
        </div>

        <!-- CALENDARIO -->
        <div class="section-card">
            <h2>📅 ${t('disponib')}</h2>
            <p class="section-subtitle">${t('disponibSub')}</p>
            <div class="cal-leyenda">
                <div class="cal-legend-item"><div class="cal-dot" style="background:#e74c3c;"></div> ${t('reservadoAir')}</div>
                <div class="cal-legend-item"><div class="cal-dot" style="background:#2d5a27;"></div> ${t('reservadoDir')}</div>
            </div>
            <div id="calendar"></div>
        </div>

        <!-- PRESUPUESTO -->
        <div class="section-card">
            <h2>💰 ${t('presupuesto')}</h2>

            <div class="form-group">
                <label>${t('tuNombre')}</label>
                <input type="text" id="clienteNombre" placeholder="${t('nombrePH')}">
            </div>
            <div class="form-row">
                <div class="form-group"><label>${t('checkin')}</label><input type="date" id="checkIn" min="${hoy}" onchange="calcularPrecio()"></div>
                <div class="form-group"><label>${t('checkout')}</label><input type="date" id="checkOut" min="${hoy}" onchange="calcularPrecio()"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>${t('adultos')}</label><input type="number" id="adultos" value="2" min="1" max="${capMax}" onchange="calcularPrecio()"></div>
                <div class="form-group"><label>${t('ninos')}</label><input type="number" id="ninos" value="0" min="0" max="${capMax}" onchange="calcularPrecio()"></div>
            </div>

            <button class="btn btn-calcular" onclick="calcularPrecio()">🧮 ${t('calcular')}</button>

            <div id="precioResult" class="precio-result"></div>

            <div class="aviso-confirmacion">${t('aviso')}</div>

            <button class="btn btn-wa" id="btnWA" onclick="enviarWhatsApp()" disabled>
                ${t('enviarWA')}
            </button>
        </div>
    `;

    if (fotos.length > 1) setInterval(() => cambiarSlide(1), 5000);
    iniciarCalendario();
}

// ── SLIDER ───────────────────────────────────────────────────
window.cambiarSlide = function(dir) {
    const slides = document.querySelectorAll('.foto-slide');
    const dots   = document.querySelectorAll('.foto-dot');
    if (!slides.length) return;
    slides[sliderIdx].classList.remove('active');
    if(dots[sliderIdx]) dots[sliderIdx].classList.remove('active');
    sliderIdx = (sliderIdx + dir + slides.length) % slides.length;
    slides[sliderIdx].classList.add('active');
    if(dots[sliderIdx]) dots[sliderIdx].classList.add('active');
};
window.irSlide = function(idx) {
    const slides = document.querySelectorAll('.foto-slide');
    const dots   = document.querySelectorAll('.foto-dot');
    slides[sliderIdx].classList.remove('active');
    if(dots[sliderIdx]) dots[sliderIdx].classList.remove('active');
    sliderIdx = idx;
    slides[sliderIdx].classList.add('active');
    if(dots[sliderIdx]) dots[sliderIdx].classList.add('active');
};

// ── CALENDARIO ───────────────────────────────────────────────
async function iniciarCalendario() {
    const calEl = document.getElementById('calendar');
    if (!calEl) return;
    const [evFirestore, evGoogle] = await Promise.all([
        cargarEventosFirestore(),
        cargarEventosGoogle()
    ]);
    const todos = [...evFirestore, ...evGoogle];

    calendar = new FullCalendar.Calendar(calEl, {
        initialView:  'dayGridMonth',
        locale:       currentLang,
        height:       'auto',
        headerToolbar: { left:'prev,next today', center:'title', right:'' },
        selectable:   true,
        selectMirror: true,
        validRange:   { start: new Date().toISOString().split('T')[0] },
        select: (info) => {
            document.getElementById('checkIn').value  = info.startStr;
            const endDate = new Date(info.endStr);
            endDate.setDate(endDate.getDate() - 1);
            document.getElementById('checkOut').value = endDate.toISOString().split('T')[0];
            calcularPrecio();
            document.getElementById('clienteNombre').scrollIntoView({ behavior:'smooth', block:'center' });
        },
        events:       todos,
        eventDisplay: 'block'
    });
    calendar.render();
}

async function cargarEventosFirestore() {
    try {
        const snap = await db.collection('reservas')
            .where('caba', '==', CABANA_ID)
            .where('estado', 'in', ['confirmada', 'pendiente'])
            .get();
        return snap.docs.map(doc => {
            const r = doc.data();
            const start = r.checkIn?.toDate  ? r.checkIn.toDate().toISOString().split('T')[0]  : r.checkIn;
            const end   = r.checkOut?.toDate ? r.checkOut.toDate().toISOString().split('T')[0] : r.checkOut;
            return { title: t('reservadoDir'), start, end, allDay:true, color:'#2d5a27', textColor:'white' };
        });
    } catch(e) { console.error('Firestore:', e); return []; }
}

async function cargarEventosGoogle() {
    const calId = cabanaData.google_calendar_id;
    if (!calId || !calId.includes('@')) return [];

    const hoy     = new Date();
    const enUnAno = new Date(hoy);
    enUnAno.setFullYear(enUnAno.getFullYear() + 1);

    const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events?key=${GOOGLE_API_KEY}&timeMin=${hoy.toISOString()}&timeMax=${enUnAno.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=250`;

    try {
        const res  = await fetch(url);
        const data = await res.json();
        if (!data.items) return [];
        return data.items
            .filter(ev => ev.status !== 'cancelled')
            .filter(ev => {
                // Filtrar bloques "Not available" de Airbnb (ventana de reservas)
                const titulo = (ev.summary || '').toLowerCase();
                return !titulo.includes('not available') &&
                       !titulo.includes('no disponible') &&
                       !titulo.includes('indisponível') &&
                       !titulo.includes('unavailable');
            })
            .map(ev => ({
                title:    t('reservadoAir'),
                start:    ev.start.date || ev.start.dateTime?.split('T')[0],
                end:      ev.end.date   || ev.end.dateTime?.split('T')[0],
                allDay:   true,
                color:    '#e74c3c',
                textColor:'white'
            }));
    } catch(e) { console.error('Google Calendar:', e); return []; }
}

// ── CALCULAR PRECIO ──────────────────────────────────────────
window.calcularPrecio = function() {
    const checkIn  = document.getElementById('checkIn')?.value;
    const checkOut = document.getElementById('checkOut')?.value;
    const adultos  = parseInt(document.getElementById('adultos')?.value)  || 0;
    const ninos    = parseInt(document.getElementById('ninos')?.value)    || 0;
    const result   = document.getElementById('precioResult');
    const btnWA    = document.getElementById('btnWA');

    if (!checkIn || !checkOut || checkOut <= checkIn) {
        if(result) result.style.display = 'none';
        if(btnWA)  { btnWA.disabled = true; btnWA.textContent = t('calcPrimero'); }
        ultimoPrecio = null; return;
    }

    const tarifas      = cabanaData.tarifas || {};
    const capBase      = cabanaData.capacidad?.base || 2;
    const personasExtra = Math.max(0, (adultos + ninos) - capBase);
    let subtotal = 0, noches = 0;
    let fecha = new Date(checkIn  + 'T12:00:00');
    const fin = new Date(checkOut + 'T12:00:00');

    while (fecha < fin) {
        const fechaStr  = fecha.toISOString().split('T')[0];
        const intervalo = (tarifas.intervalos || []).find(i => i.desde <= fechaStr && i.hasta >= fechaStr);
        subtotal += (intervalo ? intervalo.precioNoche : (tarifas.precioBase || 0))
                  + (personasExtra * (intervalo ? intervalo.precioExtra : (tarifas.precioExtraPersona || 0)));
        fecha.setDate(fecha.getDate() + 1);
        noches++;
    }

    const limpieza = tarifas.precioLimpieza || 0;
    const total    = subtotal + limpieza;
    ultimoPrecio   = { noches, subtotal, limpieza, total, checkIn, checkOut, adultos, ninos };

    if (result) {
        result.innerHTML = `
            <div class="precio-linea"><span>🌙 ${t('noches')}</span><span>${noches}</span></div>
            <div class="precio-linea"><span>🏠 ${t('alojamiento')}</span><span>R$ ${subtotal.toFixed(2)}</span></div>
            <div class="precio-linea"><span>🧹 ${t('limpieza')}</span><span>R$ ${limpieza.toFixed(2)}</span></div>
            <div class="precio-total"><span>💰 ${t('total')}</span><span>R$ ${total.toFixed(2)}</span></div>`;
        result.style.display = 'block';
    }
    if (btnWA) { btnWA.disabled = false; btnWA.textContent = t('enviarWA'); }
};

// ── ENVIAR WHATSAPP + GUARDAR EN FIRESTORE ───────────────────
window.enviarWhatsApp = async function() {
    const nombre = document.getElementById('clienteNombre')?.value.trim();
    if (!nombre) { alert(t('ingresaNombre')); document.getElementById('clienteNombre').focus(); return; }
    if (!ultimoPrecio) { alert(t('calcPrimero')); return; }

    const cabNombre = getText(cabanaData.nombre);
    const startFmt  = new Date(ultimoPrecio.checkIn  + 'T12:00:00').toLocaleDateString(locale());
    const endFmt    = new Date(ultimoPrecio.checkOut + 'T12:00:00').toLocaleDateString(locale());

    const msgs = {
        es: `Hola, soy ${nombre}. Estaba viendo la ${cabNombre} y quisiera pedir un presupuesto para alojarme del ${startFmt} al ${endFmt} para ${ultimoPrecio.adultos} adulto(s)${ultimoPrecio.ninos ? ` y ${ultimoPrecio.ninos} niño(s)` : ''}. El precio estimado que me mostró el sitio es de R$ ${ultimoPrecio.total.toFixed(2)}. Quedo atento/a a la confirmación de disponibilidad.`,
        pt: `Olá, sou ${nombre}. Estava vendo a ${cabNombre} e gostaria de pedir um orçamento para me hospedar de ${startFmt} a ${endFmt} para ${ultimoPrecio.adultos} adulto(s)${ultimoPrecio.ninos ? ` e ${ultimoPrecio.ninos} criança(s)` : ''}. O preço estimado que o site mostrou é R$ ${ultimoPrecio.total.toFixed(2)}. Aguardo a confirmação de disponibilidade.`,
        en: `Hello, I'm ${nombre}. I was looking at ${cabNombre} and would like to request a quote to stay from ${startFmt} to ${endFmt} for ${ultimoPrecio.adultos} adult(s)${ultimoPrecio.ninos ? ` and ${ultimoPrecio.ninos} child(ren)` : ''}. The estimated price shown on the site is R$ ${ultimoPrecio.total.toFixed(2)}. Looking forward to your availability confirmation.`
    };

    // Guardar en Firestore como presupuesto
    try {
        await db.collection('presupuestos').add({
            caba:            CABANA_ID,
            checkIn:         ultimoPrecio.checkIn,
            checkOut:        ultimoPrecio.checkOut,
            adultos:         ultimoPrecio.adultos,
            ninos:           ultimoPrecio.ninos,
            huespedes:       ultimoPrecio.adultos + ultimoPrecio.ninos,
            totalBRL:        ultimoPrecio.total,
            subtotalBRL:     ultimoPrecio.subtotal,
            costoLimpiezaBRL:ultimoPrecio.limpieza,
            noches:          ultimoPrecio.noches,
            clienteNombre:   nombre,
            estado:          'pendiente',
            origen:          'sitio_web',
            creadoEn:        firebase.firestore.FieldValue.serverTimestamp()
        });
    } catch(e) {
        console.warn('No se pudo guardar el presupuesto en Firestore:', e);
        // No bloqueamos el WhatsApp si falla Firestore
    }

    // Abrir WhatsApp
    window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msgs[currentLang] || msgs.es)}`, '_blank');
};

// ── CAMBIAR IDIOMA ───────────────────────────────────────────
function changeLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('cvLang', lang);
    sliderIdx = 0;
    if (calendar) { calendar.destroy(); calendar = null; }
    if (cabanaData) renderCabana();
    else cargarCabana();
}

document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => changeLanguage(btn.dataset.lang));
});

// ── INIT ─────────────────────────────────────────────────────
document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
cargarCabana();
</script>
