<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Casa Verde Canas</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --verde-casaverde: #74E3AE; /* El color de tu fachada */
            --verde-oscuro: #1e3c2c;
            --madera: #5d4037;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: #f4f7f6;
        }

        /* LOGIN */
        #login-section {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--verde-oscuro);
        }

        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .input-group { margin-bottom: 1rem; text-align: left; }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .btn-admin {
            background-color: var(--verde-casaverde);
            color: var(--verde-oscuro);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        /* PANEL */
        #admin-panel { display: none; }
        header {
            background-color: var(--verde-oscuro);
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
        }

        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }

        .cabana-card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 5px solid var(--verde-casaverde);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-save {
            background-color: var(--verde-oscuro);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <section id="login-section">
        <div class="login-card">
            <span class="material-icons" style="font-size: 48px; color: var(--verde-casaverde);">admin_panel_settings</span>
            <h2>Casa Verde Admin</h2>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="tu-email@gmail.com">
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn-admin" onclick="loginAdmin()">Entrar</button>
        </div>
    </section>

    <section id="admin-panel">
        <header>
            <strong>Casa Verde Canas</strong>
            <button onclick="firebase.auth().signOut()" style="color:white; background:none; border:none; cursor:pointer;">Salir</button>
        </header>

        <div class="container">
            <h2>Gestión de Cabañas</h2>
            <div id="lista-cabanas">Cargando...</div>
        </div>
    </section>

    <script>
        // CONFIGURACIÓN REAL DE CASAVERDE CANAS
        const firebaseConfig = {
            apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4",
            authDomain: "casaverdecanas-199.firebaseapp.com",
            databaseURL: "https://casaverdecanas-199-default-rtdb.firebaseio.com",
            projectId: "casaverdecanas-199",
            storageBucket: "casaverdecanas-199.firebasestorage.app",
            messagingSenderId: "417825635316",
            appId: "1:417825635316:web:ff7f4fe52edcab43d8d7a1"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const fs = firebase.firestore();

        // VALIDACIÓN DE USUARIO Y ROL
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await fs.collection('usuarios').doc(user.uid).get();
                if (doc.exists && doc.data().rol === "admin") {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('admin-panel').style.display = 'block';
                    cargarDatos();
                } else {
                    alert("Acceso denegado: No eres administrador.");
                    auth.signOut();
                }
            } else {
                document.getElementById('login-section').style.display = 'flex';
                document.getElementById('admin-panel').style.display = 'none';
            }
        });

        async function loginAdmin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        // CARGA Y EDICIÓN DE CABAÑAS
        function cargarDatos() {
            const lista = document.getElementById('lista-cabanas');
            db.ref('propiedades').on('value', (snapshot) => {
                const cabanas = snapshot.val();
                lista.innerHTML = '';
                for (let id in cabanas) {
                    const c = cabanas[id];
                    lista.innerHTML += `
                        <div class="cabana-card">
                            <h3>${c.nombre}</h3>
                            <div class="input-group">
                                <label>URL Foto (Postimage/Firebase)</label>
                                <input type="text" id="img-${id}" value="${c.imagenUrl || ''}">
                            </div>
                            <button class="btn-save" onclick="actualizar('${id}')">Guardar Cambios</button>
                        </div>
                    `;
                }
            });
        }

        function actualizar(id) {
            const nuevaUrl = document.getElementById(`img-${id}`).value;
            db.ref('propiedades/' + id).update({ imagenUrl: nuevaUrl })
                .then(() => alert("¡Foto actualizada!"));
        }
    </script>
</body>
</html>
