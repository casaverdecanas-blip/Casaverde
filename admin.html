<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Casa Verde - Diagnóstico</title>
    
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root { --verde: #74E3AE; --oscuro: #1e3c2c; }
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        header { background: var(--oscuro); color: white; padding: 1rem; display: flex; justify-content: space-between; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid var(--verde); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--oscuro); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #login-section { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--oscuro); }
        .login-box { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 80%; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-box">
            <h2>Admin Casa Verde</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="login()" style="width:100%; background:var(--verde); color:var(--oscuro); font-weight:bold;">INGRESAR</button>
        </div>
    </div>

    <div id="admin-panel" style="display:none;">
        <header>
            <strong>Casa Verde Canas</strong>
            <button onclick="firebase.auth().signOut()" style="background:none; border:1px solid white;">Salir</button>
        </header>
        <div class="container">
            <h3>Gestión de Cabañas</h3>
            <div id="lista-cabanas">Buscando datos...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4",
            authDomain: "casaverdecanas-199.firebaseapp.com",
            databaseURL: "https://casaverdecanas-199-default-rtdb.firebaseio.com",
            projectId: "casaverdecanas-199",
            storageBucket: "casaverdecanas-199.firebasestorage.app",
            messagingSenderId: "417825635316",
            appId: "1:417825635316:web:ff7f4fe52edcab43d8d7a1"
        };

        firebase.initializeApp(firebaseConfig);

        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                console.log("Usuario detectado:", user.uid);
                // Verificar en FIRESTORE
                const doc = await firebase.firestore().collection('usuarios').doc(user.uid).get();
                if (doc.exists && doc.data().rol === "admin") {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('admin-panel').style.display = 'block';
                    cargarDatos();
                } else {
                    console.error("El usuario no tiene rol admin en Firestore");
                    alert("Acceso denegado");
                    firebase.auth().signOut();
                }
            } else {
                document.getElementById('login-section').style.display = 'flex';
                document.getElementById('admin-panel').style.display = 'none';
            }
        });

        async function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try { await firebase.auth().signInWithEmailAndPassword(e, p); } 
            catch (err) { console.error("Error de login:", err.message); alert(err.message); }
        }

        function cargarDatos() {
            console.log("Intentando leer 'propiedades' en Realtime Database...");
            const lista = document.getElementById('lista-cabanas');
            
            // Cambiamos a 'siteData' o la raíz si 'propiedades' falla
            firebase.database().ref('propiedades').on('value', (snap) => {
                const data = snap.val();
                console.log("Datos recibidos de DB:", data);
                
                if (!data) {
                    lista.innerHTML = "<p style='color:red;'>⚠️ No se encontraron datos en la carpeta 'propiedades'. Revisa la consola de Eruda.</p>";
                    return;
                }

                lista.innerHTML = '';
                for (let id in data) {
                    lista.innerHTML += `
                        <div class="card">
                            <strong>${data[id].nombre || id}</strong>
                            <input type="text" id="img-${id}" value="${data[id].imagenUrl || ''}">
                            <button onclick="guardar('${id}')">Actualizar Foto</button>
                        </div>
                    `;
                }
            }, (error) => {
                console.error("Error de Realtime Database:", error);
                lista.innerHTML = "Error de permisos: " + error.message;
            });
        }

        function guardar(id) {
            const url = document.getElementById(`img-${id}`).value;
            firebase.database().ref('propiedades/' + id).update({ imagenUrl: url })
                .then(() => alert("¡Actualizado!"));
        }
    </script>
</body>
</html>
