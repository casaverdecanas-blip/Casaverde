    <style>
        :root {
            --casa-green: #A3C9A8;
            --forest-green: #2E5A31;
            --warm-yellow: #F9D976;
            --charcoal: #4A4A4A;
            --starry-white: #FFFFFF;
            --earth-brown: #5A3A1F;
            --leaf-green: #2E7D55;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: #FDFDFD; 
            color: var(--charcoal); 
            line-height: 1.6; 
        }
        
        /* Header Rústico con Logo */
        .hero {
            background: linear-gradient(135deg, var(--forest-green) 0%, #1a3a1c 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
            position: relative;
            border-bottom: 8px solid var(--casa-green);
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100" fill="none"><path d="M0,0 C200,20 300,40 500,40 C700,40 800,20 1000,0 L1000,100 L0,100 Z" fill="rgba(255,255,255,0.05)"/></svg>') repeat-x bottom;
            background-size: 1000px 100px;
            opacity: 0.3;
            pointer-events: none;
        }
        
        .hero h1 { 
            font-size: 2.8rem; 
            margin-bottom: 10px; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .hero .subtitle { 
            font-size: 1.1rem; 
            opacity: 0.95; 
            margin-bottom: 0;
            white-space: pre-line;
        }
        
        /* Logo y header mejorado */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }
        
        .logo-svg svg {
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25));
            transition: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
        }
        
        .logo-svg svg:hover {
            transform: scale(1.05) rotate(2deg);
        }
        
        .logo-text {
            text-align: left;
        }
        
        .logo-text h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, var(--warm-yellow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo-text .subtitle {
            font-size: 1rem;
            opacity: 0.9;
        }
        
        .lang-picker {
            position: absolute; 
            top: 25px; 
            right: 30px; 
            display: flex; 
            gap: 12px;
            z-index: 10;
        }
        
        .lang-btn {
            background: rgba(255,255,255,0.15); 
            border: 1px solid rgba(255,255,255,0.4); 
            color: white;
            padding: 8px 18px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        .lang-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .lang-btn.active { 
            background: var(--warm-yellow); 
            color: var(--forest-green); 
            border-color: var(--warm-yellow);
        }
        
        .trust-badges {
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 15px;
            margin-top: 20px;
            position: relative;
            z-index: 2;
        }
        
        .trust-badges span {
            background: rgba(255,255,255,0.12); 
            padding: 8px 22px; 
            border-radius: 50px;
            font-size: 0.9rem; 
            border: 1px solid rgba(255,255,255,0.25);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }
        
        .trust-badges span:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        
        .container { 
            max-width: 1280px; 
            margin: 0 auto; 
            padding: 60px 24px; 
        }
        
        /* Sección de descripción principal */
        .main-description {
            background: linear-gradient(135deg, #F4F9F4 0%, #EDF5ED 100%);
            border-radius: 32px;
            padding: 50px 40px;
            margin-bottom: 70px;
            text-align: center;
            border: 1px solid #E2EEE2;
        }
        
        .main-description h2 {
            color: var(--forest-green);
            font-size: 2rem;
            margin-bottom: 25px;
            font-weight: 700;
        }
        
        .main-description p {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--charcoal);
            max-width: 900px;
            margin: 0 auto;
            white-space: pre-line;
        }
        
        /* Títulos de sección */
        section h2 {
            text-align: center; 
            font-size: 2.3rem; 
            color: var(--forest-green);
            margin-bottom: 50px; 
            position: relative;
            font-weight: 700;
        }
        
        section h2::after {
            content: ''; 
            display: block; 
            width: 70px; 
            height: 3px; 
            background: linear-gradient(90deg, var(--casa-green), var(--forest-green));
            margin: 18px auto; 
            border-radius: 10px;
        }
        
        /* Grid de Cabañas */
        .cabins-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 35px;
        }
        
        .cabin-card {
            background: white; 
            border-radius: 28px; 
            overflow: hidden;
            box-shadow: 0 12px 35px rgba(0,0,0,0.08); 
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid #F0F0F0;
            display: flex; 
            flex-direction: column;
        }
        
        .cabin-card:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 20px 45px rgba(0,0,0,0.12);
        }
        
        .cabin-slider { 
            height: 280px; 
            position: relative; 
            background: #E8EDE8; 
            overflow: hidden; 
        }
        
        .cabin-slide {
            position: absolute; 
            width: 100%; 
            height: 100%; 
            opacity: 0;
            transition: opacity 0.8s ease-in-out; 
            background-size: cover; 
            background-position: center;
        }
        
        .cabin-slide.active { 
            opacity: 1; 
        }
        
        .cabin-content { 
            padding: 32px 28px; 
            text-align: center; 
        }
        
        .cabin-content h3 { 
            color: var(--forest-green); 
            font-size: 1.7rem; 
            margin-bottom: 12px; 
            font-weight: 700;
        }
        
        .cabin-content p { 
            font-size: 0.95rem; 
            color: #666; 
            margin-bottom: 25px; 
            min-height: 55px;
            line-height: 1.5;
        }
        
        .btn {
            display: inline-block; 
            background: var(--forest-green); 
            color: white;
            padding: 12px 38px; 
            border-radius: 50px; 
            text-decoration: none;
            font-weight: 700; 
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .btn:hover { 
            background: transparent; 
            border-color: var(--forest-green);
            color: var(--forest-green);
            transform: translateY(-2px);
        }
        
        /* Espacios Comunes */
        .common-category {
            background: linear-gradient(135deg, #F4F9F4 0%, #EDF5ED 100%);
            border-radius: 32px; 
            padding: 35px; 
            margin-bottom: 45px;
            border: 1px solid #E2EEE2;
            transition: all 0.3s ease;
        }
        
        .common-category:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }
        
        .common-category h3 { 
            color: var(--forest-green); 
            margin-bottom: 25px; 
            font-size: 1.6rem; 
            font-weight: 700;
            text-align: center;
        }
        
        .slider-container { 
            position: relative; 
            overflow: hidden; 
            border-radius: 24px; 
            height: 380px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        
        .slider-track { 
            display: flex; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            height: 100%; 
        }
        
        .slider-slide { 
            flex: 0 0 100%; 
            height: 100%; 
            position: relative; 
        }
        
        .slider-slide img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        .slider-caption {
            position: absolute; 
            bottom: 25px; 
            left: 25px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 22px; 
            border-radius: 50px; 
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .slider-btn {
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%);
            background: rgba(255,255,255,0.95);
            border: none; 
            width: 48px; 
            height: 48px;
            border-radius: 50%; 
            cursor: pointer; 
            z-index: 10; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--forest-green);
            transition: all 0.3s ease;
        }
        
        .slider-btn:hover {
            background: var(--forest-green);
            color: white;
            transform: translateY(-50%) scale(1.05);
        }
        
        .slider-prev { left: 20px; }
        .slider-next { right: 20px; }
        
        /* WhatsApp Float */
        .whatsapp-float {
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            width: 65px; 
            height: 65px;
            background: #25D366; 
            border-radius: 50%; 
            display: flex; 
            align-items: center;
            justify-content: center; 
            box-shadow: 0 8px 25px rgba(37,211,102,0.35);
            z-index: 999;
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }
        
        .whatsapp-float:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(37,211,102,0.5);
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 8px 25px rgba(37,211,102,0.35); }
            50% { box-shadow: 0 8px 35px rgba(37,211,102,0.6); }
            100% { box-shadow: 0 8px 25px rgba(37,211,102,0.35); }
        }
        
        /* Footer */
        footer { 
            background: var(--forest-green); 
            color: white; 
            padding: 55px 20px 40px; 
            text-align: center;
            border-top: 5px solid var(--casa-green);
        }
        
        footer p:first-child {
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        footer p:last-child {
            opacity: 0.8;
            font-size: 0.9rem;
        }

        /* Estilos Redes Sociales Footer */
        .social-footer {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 18px;
        }

        .social-footer a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px;
        }

        .social-footer svg {
            fill: var(--casa-green);
            width: 24px;
            height: 24px;
        }

        .social-footer a:hover {
            background: var(--warm-yellow);
            transform: scale(1.1) rotate(5deg);
            border-color: var(--warm-yellow);
        }

        .social-footer a:hover svg {
            fill: var(--forest-green);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hero {
                padding: 40px 16px 50px;
            }
            
            .logo-container {
                flex-direction: column;
                text-align: center;
                gap: 18px;
                margin-top: 15px;
            }
            
            .logo-text {
                text-align: center;
            }
            
            .logo-text h1 {
                font-size: 1.8rem;
            }
            
            .logo-svg svg {
                width: 90px;
                height: 90px;
            }
            
            .lang-picker {
                position: relative;
                top: 0;
                right: 0;
                justify-content: center;
                margin-bottom: 20px;
            }
            
            .slider-container { 
                height: 260px; 
            }
            
            .container {
                padding: 40px 16px;
            }
            
            section h2 {
                font-size: 1.8rem;
            }
            
            .main-description {
                padding: 30px 20px;
            }
            
            .main-description h2 {
                font-size: 1.5rem;
            }
            
            .main-description p {
                font-size: 1rem;
            }
            
            .cabin-card {
                margin: 0 8px;
            }
            
            .whatsapp-float {
                width: 55px;
                height: 55px;
                bottom: 20px;
                right: 20px;
            }
            
            .whatsapp-float img {
                width: 28px;
            }
        }
        
        @media (max-width: 480px) {
            .trust-badges span {
                font-size: 0.75rem;
                padding: 6px 14px;
            }
            
            .cabin-content {
                padding: 24px 20px;
            }
            
            .cabin-content h3 {
                font-size: 1.4rem;
            }
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 50px;
            color: var(--forest-green);
            font-size: 1.2rem;
        }
        
        html {
            scroll-behavior: smooth;
        }
    </style>

        const FIXED_TRANSLATIONS = {
            es: { beach: "🏖️ 3 cuadras de la playa", pool: "🏊‍♀️ Piscina", park: "🅿️ Estacionamiento" },
            pt: { beach: "🏖️ 3 quadras da praia", pool: "🏊‍♀️ Piscina", park: "🅿️ Estacionamento" },
            en: { beach: "🏖️ 3 blocks to beach", pool: "🏊‍♀️ Pool", park: "🅿️ Free Parking" }
        };
        
        function getText(obj) {
            if (!obj) return '';
            return obj[currentLang] || obj.es || Object.values(obj)[0] || '';
        }
        
        function updateUILanguage() {
            const badges = document.querySelectorAll('.trust-badges span');
            if (badges.length >= 3) {
                badges[0].textContent = FIXED_TRANSLATIONS[currentLang].beach;
                badges[1].textContent = FIXED_TRANSLATIONS[currentLang].pool;
                badges[2].textContent = FIXED_TRANSLATIONS[currentLang].park;
            }
            
            if (siteContent?.sectionTitles) {
                document.getElementById('cabins-title').textContent = getText(siteContent.sectionTitles.cabins) || "Nuestras Cabañas";
                document.getElementById('common-title').textContent = getText(siteContent.sectionTitles.common) || "Espacios Compartidos";
            }
            
            if (siteContent?.hero?.subtitle) {
                document.getElementById('site-subtitle').textContent = getText(siteContent.hero.subtitle);
            }
            
            if (siteContent?.address?.displayText) {
                document.getElementById('footer-address').textContent = getText(siteContent.address.displayText);
            }
            
            if (siteContent?.mainDescription) { renderMainDescription(); }
            if (siteData) { renderCabins(); renderCommonAreas(); }
        }
        
        function renderMainDescription() {
            const container = document.getElementById('main-description-container');
            if (!siteContent?.mainDescription) { container.innerHTML = ''; return; }
            const title = getText(siteContent.mainDescription.title);
            const body = getText(siteContent.mainDescription.body);
            if (!title && !body) { container.innerHTML = ''; return; }
            container.innerHTML = `
                <div class="main-description">
                    <h2>${escapeHtml(title)}</h2>
                    <p>${escapeHtml(body).replace(/\n/g, '<br>')}</p>
                </div>
            `;
        }
        
        function renderCabins() {
            const container = document.getElementById('cabins-container');
            if (!siteData?.apartments) { container.innerHTML = ''; return; }
            container.innerHTML = '';
            for (const [id, cabin] of Object.entries(siteData.apartments)) {
                const photos = [];
                if (cabin.categories) {
                    for (const cat of Object.values(cabin.categories)) {
                        if (cat.photos) photos.push(...cat.photos.map(p => p.url));
                    }
                }
                const name = getText(cabin.name) || id;
                const description = getText(cabin.description) || '';
                container.innerHTML += `
                    <div class="cabin-card" id="card-${id}">
                        <div class="cabin-slider" id="slider-${id}">
                            ${photos.slice(0,5).map((url, i) => `
                                <div class="cabin-slide ${i===0?'active':''}" style="background-image:url('${escapeHtml(url)}')"></div>
                            `).join('')}
                        </div>
                        <div class="cabin-content">
                            <h3>${escapeHtml(name)}</h3>
                            <p>${escapeHtml(description.substring(0, 100))}${description.length > 100 ? '...' : ''}</p>
                            <a href="cabana.html?id=${id}" class="btn">${getText({ es: "Ver Detalles", pt: "Ver Detalhes", en: "View Details" })}</a>
                        </div>
                    </div>
                `;
                startAutoSlide(id);
            }
        }
        
        function renderCommonAreas() {
            const container = document.getElementById('common-container');
            if (!siteData?.common?.categories) { container.innerHTML = ''; return; }
            container.innerHTML = '';
            const sorted = Object.entries(siteData.common.categories).sort((a, b) => (a[1].order || 0) - (b[1].order || 0));
            for (const [cid, category] of sorted) {
                if (!category.photos) continue;
                const name = getText(category.name) || cid;
                container.innerHTML += `
                    <div class="common-category">
                        <h3>${escapeHtml(name)}</h3>
                        <div class="slider-container" id="cont-${cid}">
                            <button class="slider-btn slider-prev" onclick="moveSlide('${cid}', -1)">❮</button>
                            <div class="slider-track" id="track-${cid}">
                                ${category.photos.map(photo => `
                                    <div class="slider-slide">
                                        <img src="${escapeHtml(photo.url)}" alt="${escapeHtml(getText(photo.desc))}">
                                        <div class="slider-caption">${escapeHtml(getText(photo.desc))}</div>
                                    </div>
                                `).join('')}
                            </div>
                            <button class="slider-btn slider-next" onclick="moveSlide('${cid}', 1)">❯</button>
                        </div>
                    </div>
                `;
                if (!window.sliderPositions) window.sliderPositions = {};
                window.sliderPositions[cid] = 0;
            }
        }
        
        let slideIntervals = {};
        function startAutoSlide(id) {
            if (slideIntervals[id]) clearInterval(slideIntervals[id]);
            let cur = 0;
            slideIntervals[id] = setInterval(() => {
                const slides = document.querySelectorAll(`#slider-${id} .cabin-slide`);
                if (!slides.length) return;
                slides[cur].classList.remove('active');
                cur = (cur + 1) % slides.length;
                slides[cur].classList.add('active');
            }, 4500);
        }
        
        function moveSlide(id, dir) {
            const track = document.getElementById(`track-${id}`);
            const total = track.children.length;
            window.sliderPositions[id] = (window.sliderPositions[id] + dir + total) % total;
            track.style.transform = `translateX(-${window.sliderPositions[id] * 100}%)`;
        }
        
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
            });
            updateUILanguage();
        }
        
        async function loadAllData() {
            try {
                const snapshot = await db.ref('siteData').once('value');
                siteData = snapshot.val() || {};
                siteContent = siteData.siteContent || null;
                updateUILanguage();
            } catch (error) {
                console.error("Error:", error);
            }
        }
        
        window.changeLanguage = changeLanguage;
        window.moveSlide = moveSlide;
        
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.getAttribute('data-lang') === currentLang) btn.classList.add('active');
            });
            loadAllData();
        });
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
        }
    </script>
</body>
</html>
