<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CasaVerdeCanas - Posada en Canasvieiras</title>
    
    <!-- CSS básico -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; color: #333; }
        header { background: #2d5a27; color: white; padding: 60px 20px; text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        h1 { font-size: 3rem; margin-bottom: 1rem; }
        .subtitle { font-size: 1.3rem; opacity: 0.9; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-decoration: none; color: #333; transition: transform 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card-img { width: 100%; height: 220px; object-fit: cover; background: #ddd; }
        .card-content { padding: 20px; text-align: center; }
        .card-content h2 { color: #2d5a27; margin-bottom: 10px; }
        .btn { display: inline-block; background: #2d5a27; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-top: 15px; }
        .loading { text-align: center; padding: 40px; color: #666; }
        footer { text-align: center; padding: 40px; background: #1e3f1a; color: white; }
        .lang-picker { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .lang-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100; }
        .whatsapp-float img { width: 35px; height: 35px; }
    </style>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <header style="position: relative;">
        <div class="lang-picker">
            <button class="lang-btn" onclick="changeLanguage('es')">ES</button>
            <button class="lang-btn" onclick="changeLanguage('pt')">PT</button>
            <button class="lang-btn" onclick="changeLanguage('en')">EN</button>
        </div>
        <h1 id="site-title">CasaVerdeCanas</h1>
        <p id="site-subtitle" class="subtitle">Tu refugio en Canasvieiras, Florianópolis</p>
    </header>

    <div class="container">
        <h2 style="text-align: center; color: #2d5a27; margin-bottom: 40px;">Nuestras Cabañas</h2>
        <div id="cabins-container" class="grid">
            <div class="loading">Cargando cabañas...</div>
        </div>
    </div>

    <footer>
        <p>© 2026 CasaVerdeCanas - Todos los derechos reservados</p>
    </footer>

    <a href="https://wa.me/5548999999999" class="whatsapp-float" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/124/124034.png" alt="WhatsApp">
    </a>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4",
            authDomain: "casaverdecanas-199.firebaseapp.com",
            databaseURL: "https://casaverdecanas-199-default-rtdb.firebaseio.com",
            projectId: "casaverdecanas-199",
            storageBucket: "casaverdecanas-199.firebasestorage.app",
            messagingSenderId: "417825635316",
            appId: "1:417825635316:web:ff7f4fe52edcab43d8d7a1"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Traducciones simples
        const translations = {
            es: { title: "CasaVerdeCanas", subtitle: "Tu refugio en Canasvieiras, Florianópolis" },
            pt: { title: "CasaVerdeCanas", subtitle: "Seu refúgio em Canasvieiras, Florianópolis" },
            en: { title: "CasaVerdeCanas", subtitle: "Your refuge in Canasvieiras, Florianópolis" }
        };

        let currentLang = localStorage.getItem('lang') || 'es';

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.getElementById('site-title').textContent = translations[lang].title;
            document.getElementById('site-subtitle').textContent = translations[lang].subtitle;
        }

        // Cargar cabañas
        document.addEventListener('DOMContentLoaded', () => {
            changeLanguage(currentLang);
            
            db.ref('fotos').on('value', (snapshot) => {
                const fotos = snapshot.val() || {};
                const container = document.getElementById('cabins-container');
                container.innerHTML = '';
                
                const cabins = [
                    { id: 'cabin-1', name: 'Cabaña Vista al Bosque', desc: 'Tranquilidad y naturaleza' },
                    { id: 'cabin-2', name: 'Cabaña Familiar Premium', desc: 'Espacio para toda la familia' },
                    { id: 'cabin-3', name: 'Refugio del Sol', desc: 'Calidez y confort' },
                    { id: 'cabin-4', name: 'Loft Moderno', desc: 'Estilo y diseño' }
                ];
                
                cabins.forEach(cabin => {
                    const cabinFotos = fotos[cabin.id] || {};
                    const primeraFoto = Object.values(cabinFotos)[0] || 'https://via.placeholder.com/400x250?text=CasaVerde';
                    
                    const card = document.createElement('a');
                    card.href = `cabanas/cabana-${cabin.id.split('-')[1]}.html`;
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${primeraFoto}" class="card-img" alt="${cabin.name}">
                        <div class="card-content">
                            <h2>${cabin.name}</h2>
                            <p>${cabin.desc}</p>
                            <span class="btn">Ver disponibilidad</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        });
    </script>
</body>
</html>
