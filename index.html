    <style>
        :root {
            --casa-green: #A3C9A8;
            --forest-green: #2E5A31;
            --warm-yellow: #F9D976;
            --charcoal: #4A4A4A;
            --starry-white: #FFFFFF;
            --earth-brown: #5A3A1F;
            --leaf-green: #2E7D55;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Quicksand', sans-serif; background: #FDFDFD; color: var(--charcoal); line-height: 1.6; }
        .hero {
            background: linear-gradient(135deg, var(--forest-green) 0%, #1a3a1c 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
            position: relative;
            border-bottom: 8px solid var(--casa-green);
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100" fill="none"><path d="M0,0 C200,20 300,40 500,40 C700,40 800,20 1000,0 L1000,100 L0,100 Z" fill="rgba(255,255,255,0.05)"/></svg>') repeat-x bottom;
            background-size: 1000px 100px;
            opacity: 0.3;
            pointer-events: none;
        }
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }
        .logo-svg svg { filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25)); transition: all 0.4s; }
        .logo-text h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #fff 0%, var(--warm-yellow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .lang-picker {
            position: absolute; top: 25px; right: 30px; display: flex; gap: 12px; z-index: 10;
        }
        .lang-btn {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4); color: white;
            padding: 8px 18px; border-radius: 50px; cursor: pointer; font-weight: 600;
            transition: all 0.3s ease; backdrop-filter: blur(5px);
        }
        .lang-btn.active { background: var(--warm-yellow); color: var(--forest-green); border-color: var(--warm-yellow); }
        .trust-badges {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; position: relative; z-index: 2;
        }
        .trust-badges span {
            background: rgba(255,255,255,0.12); padding: 8px 22px; border-radius: 50px; font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.25); backdrop-filter: blur(4px);
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 60px 24px; }
        .main-description {
            background: linear-gradient(135deg, #F4F9F4 0%, #EDF5ED 100%);
            border-radius: 32px;
            padding: 50px 40px;
            margin-bottom: 70px;
            text-align: center;
        }
        .main-description h2 { color: var(--forest-green); font-size: 2rem; margin-bottom: 25px; font-weight: 700; }
        .main-description p { font-size: 1.1rem; line-height: 1.7; max-width: 900px; margin: 0 auto; white-space: pre-line; }
        section h2 {
            text-align: center; font-size: 2.3rem; color: var(--forest-green); margin-bottom: 50px; font-weight: 700;
        }
        section h2::after {
            content: ''; display: block; width: 70px; height: 3px;
            background: linear-gradient(90deg, var(--casa-green), var(--forest-green));
            margin: 18px auto; border-radius: 10px;
        }
        .cabins-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 35px;
        }
        .cabin-card {
            background: white; border-radius: 28px; overflow: hidden;
            box-shadow: 0 12px 35px rgba(0,0,0,0.08); transition: all 0.4s;
            border: 1px solid #F0F0F0; display: flex; flex-direction: column;
        }
        .cabin-card:hover { transform: translateY(-12px); box-shadow: 0 20px 45px rgba(0,0,0,0.12); }
        .cabin-slider { height: 280px; position: relative; background: #E8EDE8; overflow: hidden; }
        .cabin-slide {
            position: absolute; width: 100%; height: 100%; opacity: 0;
            transition: opacity 0.8s ease-in-out; background-size: cover; background-position: center;
        }
        .cabin-slide.active { opacity: 1; }
        .cabin-content { padding: 32px 28px; text-align: center; }
        .cabin-content h3 { color: var(--forest-green); font-size: 1.7rem; margin-bottom: 12px; font-weight: 700; }
        .cabin-content p { font-size: 0.95rem; color: #666; margin-bottom: 25px; min-height: 55px; line-height: 1.5; }
        .btn {
            display: inline-block; background: var(--forest-green); color: white;
            padding: 12px 38px; border-radius: 50px; text-decoration: none;
            font-weight: 700; transition: all 0.3s ease; border: 2px solid transparent;
        }
        .btn:hover { background: transparent; border-color: var(--forest-green); color: var(--forest-green); transform: translateY(-2px); }
        .btn-outline {
            background: transparent; border-color: var(--forest-green); color: var(--forest-green);
            margin-left: 10px;
        }
        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px;
            background: #25D366; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 8px 25px rgba(37,211,102,0.35);
            z-index: 999; transition: all 0.3s ease; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 8px 25px rgba(37,211,102,0.35); }
            50% { box-shadow: 0 8px 35px rgba(37,211,102,0.6); }
            100% { box-shadow: 0 8px 25px rgba(37,211,102,0.35); }
        }
        footer {
            background: var(--forest-green); color: white; padding: 55px 20px 40px; text-align: center;

        .social-footer {

        .social-footer a:hover svg { fill: var(--forest-green); }
        
        /* Modal de disponibilidad */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;

        }
        .modal-content {
            background: white;
            border-radius: 28px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 25px;
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 15px;
        }
        .modal-header h3 { color: var(--forest-green); }
        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }
        .rango-seleccionado {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 16px;
            text-align: center;
        }
        .loading { text-align: center; padding: 50px; color: var(--forest-green); font-size: 1.2rem; }
        @media (max-width: 768px) {
            .hero { padding: 40px 16px 50px; }
            .logo-container { flex-direction: column; text-align: center; gap: 18px; }
            .lang-picker { position: relative; top: 0; right: 0; justify-content: center; margin-bottom: 20px; }
            .container { padding: 40px 16px; }
            .cabins-grid { grid-template-columns: 1fr; }
            .whatsapp-float { width: 55px; height: 55px; bottom: 20px; right: 20px; }
        }
    </style>
</head>

<script>
    // ==================== CONFIGURACIÓN FIREBASE ====================
    const firebaseConfig = {
        apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4",
        authDomain: "casaverdecanas-199.firebaseapp.com",
        projectId: "casaverdecanas-199"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ==================== MULTILENGUAJE ====================
    let currentLang = localStorage.getItem('lang') || 'es';
    let cabanas = [];
    let currentCabanaId = null;
    let calendar = null;
    let selectedRange = null; // { start, end }

    const badgeTranslations = {
        es: { beach: "🏖️ 3 cuadras de la playa", pool: "🏊‍♀️ Piscina", park: "🅿️ Estacionamiento" },
        pt: { beach: "🏖️ 3 quadras da praia", pool: "🏊‍♀️ Piscina", park: "🅿️ Estacionamento" },
        en: { beach: "🏖️ 3 blocks to beach", pool: "🏊‍♀️ Pool", park: "🅿️ Free Parking" }
    };

    function getText(obj) {
        if (!obj) return '';
        return obj[currentLang] || obj.es || Object.values(obj)[0] || '';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    // ==================== CARGAR CABAÑAS DESDE FIRESTORE ====================
    async function cargarCabanas() {
        const container = document.getElementById('cabins-container');
        container.innerHTML = '<div class="loading">🌿 Cargando cabañas...</div>';
        try {
            const snapshot = await db.collection('cabanas').where('activa', '==', true).orderBy('orden').get();
            cabanas = [];
            snapshot.forEach(doc => cabanas.push({ id: doc.id, ...doc.data() }));
            renderizarCabanas();
        } catch (error) {
            console.error("Error cargando cabañas:", error);
            container.innerHTML = '<div class="loading">❌ Error al cargar las cabañas. Intente más tarde.</div>';
        }
    }

    function renderizarCabanas() {
        const container = document.getElementById('cabins-container');
        if (!cabanas.length) {
            container.innerHTML = '<div class="loading">🏠 No hay cabañas disponibles en este momento.</div>';
            return;
        }
        let html = '';
        cabanas.forEach(cab => {
            const nombre = getText(cab.nombre);
            const descripcion = getText(cab.descripcion);
            const fotos = cab.fotos || [];
            const slides = fotos.map((url, i) => `<div class="cabin-slide ${i===0?'active':''}" style="background-image:url('${escapeHtml(url)}')"></div>`).join('');
            html += `
                <div class="cabin-card" data-id="${cab.id}">
                    <div class="cabin-slider" id="slider-${cab.id}">
                        ${slides || '<div class="cabin-slide active" style="background-image:url(\'https://via.placeholder.com/400x280?text=Sin+foto\')"></div>'}
                    </div>
                    <div class="cabin-content">
                        <h3>${escapeHtml(nombre)}</h3>
                        <p>${escapeHtml(descripcion ? descripcion.substring(0, 100) : '')}${descripcion && descripcion.length > 100 ? '...' : ''}</p>
                        <button class="btn" onclick="mostrarDisponibilidad(${cab.id})">${currentLang === 'es' ? 'Ver disponibilidad' : (currentLang === 'pt' ? 'Ver disponibilidade' : 'Check availability')}</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        cabanas.forEach(cab => {
            if (cab.fotos && cab.fotos.length > 1) iniciarSlider(cab.id, cab.fotos.length);
        });
    }

    function iniciarSlider(id, total) {
        let current = 0;
        setInterval(() => {
            const slides = document.querySelectorAll(`#slider-${id} .cabin-slide`);
            if (!slides.length) return;
            slides[current].classList.remove('active');
            current = (current + 1) % total;
            slides[current].classList.add('active');
        }, 4500);
    }

    // ==================== DISPONIBILIDAD ====================
    async function mostrarDisponibilidad(cabanaId) {
        currentCabanaId = cabanaId;
        const cabana = cabanas.find(c => c.id == cabanaId);
        const nombreCabana = getText(cabana.nombre);
        document.getElementById('modalTitle').innerHTML = `📅 Disponibilidad - ${escapeHtml(nombreCabana)}`;
        
        // Cargar eventos (reservas confirmadas) para esta cabaña
        const eventos = await cargarEventosReservas(cabanaId);
        
        // Inicializar o refrescar el calendario
        const calendarEl = document.getElementById('calendar');
        if (calendar) {
            calendar.destroy();
        }
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: currentLang,
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek'
            },
            selectable: true,
            selectMirror: true,
            select: (info) => {
                // Permitir selección de rango de fechas
                selectedRange = { start: info.startStr, end: info.endStr };
                const startDate = new Date(info.startStr).toLocaleDateString(currentLang === 'es' ? 'es-ES' : (currentLang === 'pt' ? 'pt-BR' : 'en-US'));
                const endDate = new Date(info.endStr).toLocaleDateString(currentLang === 'es' ? 'es-ES' : (currentLang === 'pt' ? 'pt-BR' : 'en-US'));
                document.getElementById('rangoTexto').innerHTML = `${currentLang === 'es' ? 'Fechas seleccionadas:' : (currentLang === 'pt' ? 'Datas selecionadas:' : 'Selected dates:')} ${startDate} → ${endDate}`;
                document.getElementById('rangoInfo').style.display = 'block';
            },
            events: eventos,
            eventColor: '#e74c3c',
            eventDisplay: 'block',
            businessHours: false
        });
        calendar.render();
        document.getElementById('modalDisponibilidad').style.display = 'flex';
    }

    async function cargarEventosReservas(cabanaId) {
        // Obtener todas las reservas confirmadas (estado = 'confirmada' o 'verificada' o cualquier estado que indique ocupado)
        // También considerar presupuestos convertidos en reserva (estado 'confirmada')
        try {
            const snapshot = await db.collection('reservas')
                .where('caba', '==', parseInt(cabanaId))
                .get();
            const eventos = [];
            snapshot.forEach(doc => {
                const r = doc.data();
                // Solo si la reserva está confirmada (no pendiente o presupuesto)
                if (r.estado === 'confirmada' || r.estado === 'verificada' || r.estado === 'pagada') {
                    const startDate = r.checkIn.toDate ? r.checkIn.toDate().toISOString().split('T')[0] : r.checkIn;
                    const endDate = r.checkOut.toDate ? r.checkOut.toDate().toISOString().split('T')[0] : r.checkOut;
                    eventos.push({
                        title: `Reservado`,
                        start: startDate,
                        end: endDate,
                        allDay: true,
                        color: '#e74c3c'
                    });
                }
            });
            return eventos;
        } catch (error) {
            console.error("Error cargando reservas:", error);
            return [];
        }
    }

    function cerrarModal() {
        document.getElementById('modalDisponibilidad').style.display = 'none';
        if (calendar) {
            calendar.destroy();
            calendar = null;
        }
        selectedRange = null;
        document.getElementById('rangoInfo').style.display = 'none';
    }

    function enviarConsultaWhatsApp() {
        if (!selectedRange || !currentCabanaId) {
            alert(currentLang === 'es' ? 'Selecciona un rango de fechas primero' : (currentLang === 'pt' ? 'Selecione um intervalo de datas primeiro' : 'Select a date range first'));
            return;
        }
        const cabana = cabanas.find(c => c.id == currentCabanaId);
        const nombreCabana = getText(cabana.nombre);
        const startDate = new Date(selectedRange.start).toLocaleDateString(currentLang === 'es' ? 'es-ES' : (currentLang === 'pt' ? 'pt-BR' : 'en-US'));
        const endDate = new Date(selectedRange.end).toLocaleDateString(currentLang === 'es' ? 'es-ES' : (currentLang === 'pt' ? 'pt-BR' : 'en-US'));
        let mensaje = '';
        if (currentLang === 'es') {
            mensaje = `Hola, quiero consultar disponibilidad para ${nombreCabana} desde ${startDate} hasta ${endDate}. ¿Podrían confirmarme precio y disponibilidad?`;
        } else if (currentLang === 'pt') {
            mensaje = `Olá, gostaria de consultar disponibilidade para ${nombreCabana} de ${startDate} a ${endDate}. Podem confirmar preço e disponibilidade?`;
        } else {
            mensaje = `Hello, I would like to check availability for ${nombreCabana} from ${startDate} to ${endDate}. Could you confirm price and availability?`;
        }
        const url = `https://wa.me/5548991181246?text=${encodeURIComponent(mensaje)}`;
        window.open(url, '_blank');
        cerrarModal();
    }

    // ==================== CONTENIDO DEL SITIO (estático por ahora) ====================
    function cargarContenidoSitio() {
        document.getElementById('site-subtitle').textContent = currentLang === 'es' ? "Pequeño oasis compartido a pasos de la playa" : (currentLang === 'pt' ? "Pequeno oásis compartilhado a poucos passos da praia" : "Small shared oasis steps from the beach");
        document.getElementById('footer-address').textContent = currentLang === 'es' ? "Rua das Gaivotas, 123 - Canasvieiras, Florianópolis" : (currentLang === 'pt' ? "Rua das Gaivotas, 123 - Canasvieiras, Florianópolis" : "Rua das Gaivotas, 123 - Canasvieiras, Florianópolis");
        const descContainer = document.getElementById('main-description-container');
        descContainer.innerHTML = `
            <div class="main-description">
                <h2>${currentLang === 'es' ? 'Un lugar para descansar y conectar' : (currentLang === 'pt' ? 'Um lugar para descansar e conectar' : 'A place to rest and connect')}</h2>
                <p>${currentLang === 'es' ? 'Casa Verde Canas te ofrece apartamentos rústicos completamente equipados, en un ambiente familiar y rodeado de naturaleza. A solo 3 cuadras de la playa de Canasvieiras, con piscina, estacionamiento y una atención personalizada.' : (currentLang === 'pt' ? 'Casa Verde Canas oferece apartamentos rústicos totalmente equipados, em um ambiente familiar e rodeado pela natureza. A apenas 3 quadras da praia de Canasvieiras, com piscina, estacionamento e atendimento personalizado.' : 'Casa Verde Canas offers fully equipped rustic apartments in a family environment surrounded by nature. Just 3 blocks from Canasvieiras beach, with pool, parking and personalized attention.')}</p>
            </div>
        `;
        document.getElementById('badge-beach').textContent = badgeTranslations[currentLang].beach;
        document.getElementById('badge-pool').textContent = badgeTranslations[currentLang].pool;
        document.getElementById('badge-parking').textContent = badgeTranslations[currentLang].park;
        document.getElementById('cabins-title').textContent = currentLang === 'es' ? 'Nuestras Cabañas' : (currentLang === 'pt' ? 'Nossas Cabanas' : 'Our Cabins');
    }

    function changeLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
        });
        cargarContenidoSitio();
        renderizarCabanas();
    }

    // ==================== INICIALIZACIÓN ====================
    window.changeLanguage = changeLanguage;
    window.mostrarDisponibilidad = mostrarDisponibilidad;
    window.cerrarModal = cerrarModal;
    window.enviarConsultaWhatsApp = enviarConsultaWhatsApp;

    (async function init() {
        cargarContenidoSitio();
        await cargarCabanas();
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if (btn.getAttribute('data-lang') === currentLang) btn.classList.add('active');
        });
    })();
</script>
