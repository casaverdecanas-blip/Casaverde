<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CasaVerdeCanas Posada</title>
    <link rel="stylesheet" href="styles.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
</head>
<body>
    <header>
        <div class="language-picker">
            <button onclick="changeLanguage('es')">ES</button>
            <button onclick="changeLanguage('en')">EN</button>
            <button onclick="changeLanguage('pt')">PT</button>
        </div>
        <h1 data-key="welcome">Bienvenido a CasaVerdeCanas Posada</h1>
        <nav>
            <ul>
                <li><a href="#about" data-key="nav-about">Sobre Nosotros</a></li>
                <li><a href="#cabins" data-key="nav-cabins">Cabañas</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div id="main-content-wrapper">
            <section id="cabins">
                <h2 data-key="cabins-title">Nuestras Cabañas</h2>
                <div class="cabins-grid">
                    <div class="cabin-card" onclick="showCabinDetails('cabin-1')">
                        <div id="thumb-cabin-1" class="thumb-container"></div>
                        <h3 data-key="cabin-1-name">Cabaña 1: Vista al Bosque</h3>
                    </div>
                    <div class="cabin-card" onclick="showCabinDetails('cabin-2')">
                        <div id="thumb-cabin-2" class="thumb-container"></div>
                        <h3 data-key="cabin-2-name">Cabaña 2: Familiar Premium</h3>
                    </div>
                </div>
            </section>
        </div>

        <div id="cabin-details-wrapper" style="display: none;">
            <section class="cabin-detail-section">
                <h2 id="detail-title"></h2>
                
                <div class="carousel-container">
                    <div id="carousel-photos" class="photos-wrapper"></div>
                    <button id="add-photo-btn" class="admin-btn" style="display:none;">+ Agregar Foto (URL)</button>
                </div>

                <p id="detail-desc" class="cabin-description"></p>
                
                <div class="calendar-container">
                    <h3 data-key="occupancy-title">Disponibilidad</h3>
                    <div id="calendar-render"></div>
                </div>

                <a id="wa-link" href="#" target="_blank" class="whatsapp-btn">
                    <span data-key="btn-book-wa">Reservar por WhatsApp</span>
                </a>
            </section>

            <button class="back-button" onclick="hideCabinDetails()">
                &larr; <span data-key="btn-back">Volver</span>
            </button>
        </div>
    </main>

    <footer>
        <button onclick="toggleAdmin()" class="admin-login-link">Admin Login</button>
        <p>&copy; 2026 CasaVerdeCanas</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script src="languages.js"></script>
    <script src="occupancy.js"></script>
</body>
</html>
