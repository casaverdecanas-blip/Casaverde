<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <title>Casa Verde Canas | Posada Rústica en Canasvieiras</title>
    <meta name="description" content="Tu refugio familiar en Canasvieiras, Florianópolis. Cabañas rústicas con piscina a 3 cuadras de la playa.">
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --casa-green: #A3C9A8;
            --forest-green: #2E5A31;
            --warm-yellow: #F9D976;
            --charcoal: #4A4A4A;
            --starry-white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: #FDFDFD; 
            color: var(--charcoal); 
            line-height: 1.6; 
        }
        
        /* Header Rústico */
        .hero {
            background: var(--forest-green);
            color: white;
            padding: 80px 20px;
            text-align: center;
            position: relative;
            border-bottom: 8px solid var(--casa-green);
        }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; font-weight: 700; }
        .hero .subtitle { font-size: 1.2rem; opacity: 0.9; margin-bottom: 25px; }
        
        .lang-picker {
            position: absolute; top: 20px; right: 20px; display: flex; gap: 10px;
        }
        .lang-btn {
            background: rgba(255,255,255,0.15); border: 1px solid white; color: white;
            padding: 8px 15px; border-radius: 50px; cursor: pointer; font-weight: 600;
            transition: 0.3s;
        }
        .lang-btn.active { background: var(--warm-yellow); color: var(--forest-green); border-color: var(--warm-yellow); }
        
        .trust-badges {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
        }
        .trust-badges span {
            background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 50px;
            font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.3);
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 50px 20px; }
        
        /* Títulos */
        section h2 {
            text-align: center; font-size: 2.2rem; color: var(--forest-green);
            margin-bottom: 40px; position: relative;
        }
        section h2::after {
            content: ''; display: block; width: 80px; height: 4px; 
            background: var(--casa-green); margin: 15px auto; border-radius: 10px;
        }
        
        /* Grid de Cabañas */
        .cabins-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 30px;
        }
        .cabin-card {
            background: white; border-radius: 25px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s;
            border: 1px solid #F0F0F0; display: flex; flex-direction: column;
        }
        .cabin-card:hover { transform: translateY(-10px); box-shadow: 0 15px 45px rgba(0,0,0,0.1); }
        
        .cabin-slider { height: 280px; position: relative; background: #EEE; overflow: hidden; }
        .cabin-slide {
            position: absolute; width: 100%; height: 100%; opacity: 0;
            transition: opacity 1s; background-size: cover; background-position: center;
        }
        .cabin-slide.active { opacity: 1; }
        
        .cabin-content { padding: 30px; text-align: center; }
        .cabin-content h3 { color: var(--forest-green); font-size: 1.6rem; margin-bottom: 12px; }
        .cabin-content p { font-size: 1rem; color: #666; margin-bottom: 20px; min-height: 50px; }
        
        .btn {
            display: inline-block; background: var(--forest-green); color: white;
            padding: 12px 35px; border-radius: 50px; text-decoration: none;
            font-weight: 700; transition: 0.3s;
        }
        .btn:hover { background: var(--casa-green); color: var(--forest-green); }

        /* Espacios Comunes (Sliders Horizontales) */
        .common-category {
            background: #F4F9F4; border-radius: 30px; padding: 30px; margin-bottom: 40px;
            border: 1px solid #EAF2EA;
        }
        .common-category h3 { color: var(--forest-green); margin-bottom: 20px; font-size: 1.5rem; }
        
        .slider-container { position: relative; overflow: hidden; border-radius: 20px; height: 350px; }
        .slider-track { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .slider-slide { flex: 0 0 100%; height: 100%; position: relative; }
        .slider-slide img { width: 100%; height: 100%; object-fit: cover; }
        
        .slider-caption {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(255,255,255,0.9); color: var(--forest-green);
            padding: 8px 20px; border-radius: 50px; font-weight: 600;
        }

        .slider-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: white; border: none; width: 45px; height: 45px;
            border-radius: 50%; cursor: pointer; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .slider-prev { left: 15px; }
        .slider-next { right: 15px; }

        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px;
            background: #25D366; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 10px 25px rgba(37,211,102,0.3); z-index: 999;
        }

        footer { background: var(--forest-green); color: white; padding: 50px 20px; text-align: center; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.2rem; }
            .slider-container { height: 250px; }
            .lang-picker { position: relative; top: 0; right: 0; justify-content: center; margin-bottom: 20px; }
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <header class="hero">
        <div class="lang-picker">
            <button class="lang-btn" data-lang="es" onclick="changeLanguage('es')">ES</button>
            <button class="lang-btn" data-lang="pt" onclick="changeLanguage('pt')">PT</button>
            <button class="lang-btn" data-lang="en" onclick="changeLanguage('en')">EN</button>
        </div>
        <h1 id="site-title">Casa Verde Canas</h1>
        <p id="site-subtitle" class="subtitle">Eco-Lodge Familiar en Florianópolis</p>
        <div class="trust-badges">
            <span id="badge-beach">🏖️ 3 cuadras de la playa</span>
            <span id="badge-pool">🏊‍♀️ Piscina</span>
            <span id="badge-parking">🅿️ Estacionamiento</span>
        </div>
    </header>

    <main class="container">
        <section>
            <h2 id="cabins-title">Nuestras Cabañas</h2>
            <div id="cabins-container" class="cabins-grid">
                </div>
        </section>

        <section style="margin-top: 80px;">
            <h2 id="common-title">Espacios Compartidos</h2>
            <div id="common-container">
                </div>
        </section>
    </main>

    <a href="https://wa.me/5548991181246" class="whatsapp-float" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/124/124034.png" width="35">
    </a>

    <footer>
        <p><strong>Casa Verde Canas</strong> - Florianópolis, Brasil</p>
        <p style="margin-top:10px; opacity: 0.8;">Calle de las Palmeras, Canasvieiras</p>
    </footer>

    <script>
        // FIREBASE CONFIG (Tu configuración original)
        const firebaseConfig = {
            apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4",
            authDomain: "casaverdecanas-199.firebaseapp.com",
            databaseURL: "https://casaverdecanas-199-default-rtdb.firebaseio.com",
            projectId: "casaverdecanas-199",
            storageBucket: "casaverdecanas-199.firebasestorage.app",
            appId: "1:417825635316:web:ff7f4fe52edcab43d8d7a1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // TRADUCCIONES
        const TRANSLATIONS = {
            es: { cabins: "Nuestras Cabañas", common: "Espacios Compartidos", view: "Ver Detalles", beach: "🏖️ 3 cuadras de la playa", pool: "🏊‍♀️ Piscina", park: "🅿️ Estacionamiento" },
            pt: { cabins: "Nossas Cabanas", common: "Espaços Comuns", view: "Ver Detalhes", beach: "🏖️ 3 quadras da praia", pool: "🏊‍♀️ Piscina", park: "🅿️ Estacionamento" },
            en: { cabins: "Our Cabins", common: "Shared Spaces", view: "View Details", beach: "🏖️ 3 blocks to beach", pool: "🏊‍♀️ Pool", park: "🅿️ Free Parking" }
        };

        let currentLang = localStorage.getItem('lang') || 'es';

        function getText(obj) {
            if (!obj) return '';
            return obj[currentLang] || obj.es || Object.values(obj)[0] || '';
        }

        // CARGA DE DATOS
        async function loadContent() {
            const snapshot = await db.ref('siteData').once('value');
            const data = snapshot.val();
            
            // Render Cabañas
            const cabinsGrid = document.getElementById('cabins-container');
            cabinsGrid.innerHTML = '';
            
            ['cabin-1', 'cabin-2', 'cabin-3'].forEach(id => {
                const cabin = data.apartments[id];
                if(!cabin) return;
                
                const photos = [];
                Object.values(cabin.categories || {}).forEach(c => photos.push(...(c.photos || [])));

                cabinsGrid.innerHTML += `
                    <div class="cabin-card" id="card-${id}">
                        <div class="cabin-slider" id="slider-${id}">
                            ${photos.slice(0,5).map((p, i) => `
                                <div class="cabin-slide ${i===0?'active':''}" style="background-image:url('${p.url}')"></div>
                            `).join('')}
                        </div>
                        <div class="cabin-content">
                            <h3>${getText(cabin.name)}</h3>
                            <p>${getText(cabin.description).substring(0, 80)}...</p>
                            <a href="cabanas/${id}.html" class="btn">${TRANSLATIONS[currentLang].view}</a>
                        </div>
                    </div>
                `;
                startAutoSlide(id);
            });

            // Render Comunes
            const commonCont = document.getElementById('common-container');
            commonCont.innerHTML = '';
            Object.entries(data.common?.categories || {}).sort((a,b)=>a[1].order-b[1].order).forEach(([cid, c]) => {
                if(!c.photos) return;
                commonCont.innerHTML += `
                    <div class="common-category">
                        <h3>${getText(c.name)}</h3>
                        <div class="slider-container" id="cont-${cid}">
                            <button class="slider-btn slider-prev" onclick="moveSlide('${cid}', -1)">❮</button>
                            <div class="slider-track" id="track-${cid}">
                                ${c.photos.map(p => `
                                    <div class="slider-slide">
                                        <img src="${p.url}">
                                        <div class="slider-caption">${getText(p.desc)}</div>
                                    </div>
                                `).join('')}
                            </div>
                            <button class="slider-btn slider-next" onclick="moveSlide('${cid}', 1)">❯</button>
                        </div>
                    </div>
                `;
            });
        }

        // LÓGICA DE SLIDERS
        function startAutoSlide(id) {
            let cur = 0;
            setInterval(() => {
                const slides = document.querySelectorAll(`#slider-${id} .cabin-slide`);
                if(!slides.length) return;
                slides[cur].classList.remove('active');
                cur = (cur + 1) % slides.length;
                slides[cur].classList.add('active');
            }, 4000);
        }

        let tracks = {};
        function moveSlide(id, dir) {
            if(!tracks[id]) tracks[id] = 0;
            const track = document.getElementById(`track-${id}`);
            const total = track.children.length;
            tracks[id] = (tracks[id] + dir + total) % total;
            track.style.transform = `translateX(-${tracks[id] * 100}%)`;
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            location.reload();
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector(`[data-lang="${currentLang}"]`).classList.add('active');
            loadContent();
        });
    </script>
</body>
</html>
