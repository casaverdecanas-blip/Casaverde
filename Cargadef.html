        // Función para cargar datos (igual que el test)
        async function cargarDatos() {
            log('⏳ Esperando conexión...');
            
            // Esperar conexión (como en el test)
            const connected = await new Promise((resolve) => {
                const ref = db.ref('.info/connected');
                ref.once('value', (snap) => {
                    resolve(snap.val());
                });
                setTimeout(() => resolve(false), 5000);
            });
            
            if (!connected) {
                log('❌ No hay conexión con Firebase', 'error');
                return;
            }
            
            log('✅ Conectado a Firebase', 'success');
            log('📦 Cargando datos completos...');
            
            try {
                // Cargar todos los datos
                await db.ref().set(datosCompletos);
                log('✅ ¡DATOS CARGADOS CORRECTAMENTE!', 'success');
                
                // Verificar
                const cabin1 = await db.ref('apartments/cabin-1/name').once('value');
                log(`📋 Confirmación: cabin-1.name = "${cabin1.val()}"`, 'success');
                
                const common = await db.ref('common/categories').once('value');
                const commonCount = Object.keys(common.val() || {}).length;
                log(`📋 Espacios comunes: ${commonCount} categorías`, 'success');
                
                log('\n🔗 Verifica en Firebase Console:', 'info');
                log('https://console.firebase.google.com/project/casaverdecanas-199/database/casaverdecanas-199-default-rtdb/data', 'info');
                
            } catch (err) {
                log('❌ Error al cargar: ' + err.message, 'error');
            }
        }
        
        // Ejecutar después de 1 segundo
        setTimeout(cargarDatos, 1000);
