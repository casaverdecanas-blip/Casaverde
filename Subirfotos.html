<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Clasificador de Imágenes - CasaVerdeCanas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f0;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            background: #2d5a27;
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .header h1 {
            margin-bottom: 8px;
            font-size: 1.5rem;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
        
        .stats {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .stat-badge {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
        }
        
        /* Botones de acción */
        .action-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #2d5a27;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1e3f1a;
        }
        
        .btn-secondary {
            background: #3498db;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #2980b9;
        }
        
        .btn-warning {
            background: #e67e22;
            color: white;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        /* Grid de imágenes */
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .image-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        
        .image-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        
        .image-preview {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #e0e0e0;
        }
        
        .image-info {
            padding: 12px;
        }
        
        .image-url {
            font-size: 10px;
            color: #888;
            word-break: break-all;
            margin-bottom: 8px;
            background: #f5f5f5;
            padding: 4px;
            border-radius: 4px;
        }
        
        .image-name-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .image-select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 10px;
            background: white;
        }
        
        .image-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            text-align: center;
        }
        
        .status-classified {
            background: #d4edda;
            color: #155724;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        /* Modal de exportación */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 90%;
            width: 800px;
            max-height: 80%;
            overflow: auto;
            padding: 20px;
        }
        
        .modal-content pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 11px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        @media (max-width: 600px) {
            .images-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏷️ Clasificador de Imágenes - CasaVerdeCanas</h1>
            <p>Asigna un nombre y una ubicación a cada imagen. Los datos se guardan automáticamente.</p>
            <div class="stats">
                <span class="stat-badge" id="total-count">Total: 0</span>
                <span class="stat-badge" id="classified-count">Clasificadas: 0</span>
                <span class="stat-badge" id="pending-count">Pendientes: 0</span>
            </div>
        </div>
        
        <div class="action-bar">
            <button class="btn btn-primary" onclick="exportData()">📤 Exportar Datos para Firebase</button>
            <button class="btn btn-secondary" onclick="downloadHTML()">📄 Generar HTML Completo</button>
            <button class="btn btn-warning" onclick="resetAll()">🔄 Reiniciar Todo</button>
        </div>
        
        <div id="images-container" class="images-grid">
            <div class="loading">Cargando imágenes...</div>
        </div>
    </div>
    
    <!-- Modal de exportación -->
    <div id="export-modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px;">📋 Datos para Firebase</h3>
            <pre id="export-data"></pre>
            <button class="btn btn-primary" onclick="copyToClipboard()">📋 Copiar al portapapeles</button>
            <button class="btn btn-danger" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

        // Opciones de destino
        const destinations = [
            { value: "index", label: "🏠 Página Principal (portada)" },
            { value: "cabin1", label: "🌲 Cabaña 1 - Vista al Bosque" },
            { value: "cabin2", label: "🏢 Cabaña 2 - Loft en Canasvieiras" },
            { value: "cabin3", label: "👨‍👩‍👧‍👦 Cabaña 3 - Familiar Premium" }
        ];
        
        // Estado de clasificación
        let classification = {};
        
        // Cargar datos guardados
        function loadData() {
            const saved = localStorage.getItem('casaverde_classification');
            if (saved) {
                classification = JSON.parse(saved);
            } else {
                // Inicializar
                urls.forEach((url, index) => {
                    classification[url] = {
                        name: `img_${index + 1}`,
                        destination: ""
                    };
                });
                saveData();
            }
            updateStats();
        }
        
        function saveData() {
            localStorage.setItem('casaverde_classification', JSON.stringify(classification));
            updateStats();
        }
        
        function updateStats() {
            const total = urls.length;
            const classified = Object.values(classification).filter(c => c.destination && c.destination !== "").length;
            const pending = total - classified;
            
            document.getElementById('total-count').textContent = `Total: ${total}`;
            document.getElementById('classified-count').textContent = `Clasificadas: ${classified}`;
            document.getElementById('pending-count').textContent = `Pendientes: ${pending}`;
        }
        
        function updateImageName(url, newName) {
            if (classification[url]) {
                classification[url].name = newName;
                saveData();
            }
        }
        
        function updateDestination(url, destination) {
            if (classification[url]) {
                classification[url].destination = destination;
                saveData();
                // Actualizar el estilo visual de la tarjeta
                const card = document.getElementById(`card-${url.replace(/[^a-zA-Z0-9]/g, '_')}`);
                if (card) {
                    const statusSpan = card.querySelector('.image-status');
                    if (destination) {
                        statusSpan.textContent = '✓ Clasificada';
                        statusSpan.className = 'image-status status-classified';
                    } else {
                        statusSpan.textContent = '⏳ Pendiente';
                        statusSpan.className = 'image-status status-pending';
                    }
                }
            }
        }
        
        function renderImages() {
            const container = document.getElementById('images-container');
            container.innerHTML = '';
            
            urls.forEach(url => {
                const data = classification[url] || { name: '', destination: '' };
                const urlSafe = url.replace(/[^a-zA-Z0-9]/g, '_');
                
                const card = document.createElement('div');
                card.className = 'image-card';
                card.id = `card-${urlSafe}`;
                
                card.innerHTML = `
                    <img class="image-preview" src="${url}" alt="Imagen" onerror="this.src='https://via.placeholder.com/280x180?text=Error+de+carga'">
                    <div class="image-info">
                        <div class="image-url">${url.substring(url.lastIndexOf('/') + 1)}</div>
                        <input type="text" class="image-name-input" value="${escapeHtml(data.name)}" placeholder="Nombre descriptivo" onchange="updateImageName('${escapeJs(url)}', this.value)">
                        <select class="image-select" onchange="updateDestination('${escapeJs(url)}', this.value)">
                            <option value="">-- Seleccionar ubicación --</option>
                            ${destinations.map(d => `<option value="${d.value}" ${data.destination === d.value ? 'selected' : ''}>${d.label}</option>`).join('')}
                        </select>
                        <div class="image-status ${data.destination ? 'status-classified' : 'status-pending'}">
                            ${data.destination ? '✓ Clasificada' : '⏳ Pendiente'}
                        </div>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }
        
        // Helper para escapar
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function escapeJs(str) {
            return str.replace(/'/g, "\\'");
        }
        
        // Exportar datos para Firebase
        function exportData() {
            const exportObj = {};
            
            // Organizar por destino
            for (const [url, data] of Object.entries(classification)) {
                if (data.destination && data.destination !== "") {
                    if (!exportObj[data.destination]) {
                        exportObj[data.destination] = {};
                    }
                    exportObj[data.destination][data.name] = url;
                }
            }
            
            const modal = document.getElementById('export-modal');
            const pre = document.getElementById('export-data');
            pre.textContent = JSON.stringify(exportObj, null, 2);
            modal.classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('export-modal').classList.remove('active');
        }
        
        function copyToClipboard() {
            const pre = document.getElementById('export-data');
            const text = pre.textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Datos copiados al portapapeles');
            }).catch(() => {
                alert('❌ No se pudo copiar, selecciona manualmente');
            });
        }
        
        // Generar HTML completo
        function downloadHTML() {
            const html = generateFullHTML();
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'casaverdecanas-completo.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        function generateFullHTML() {
            // Organizar por destino
            const indexPhotos = [];
            const cabin1Photos = [];
            const cabin2Photos = [];
            const cabin3Photos = [];
            
            for (const [url, data] of Object.entries(classification)) {
                if (!data.destination) continue;
                const photo = { url, name: data.name };
                if (data.destination === 'index') indexPhotos.push(photo);
                else if (data.destination === 'cabin1') cabin1Photos.push(photo);
                else if (data.destination === 'cabin2') cabin2Photos.push(photo);
                else if (data.destination === 'cabin3') cabin3Photos.push(photo);
            }
            
            return `<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CasaVerdeCanas - Posada en Canasvieiras</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        h1 { color: #2d5a27; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏡 CasaVerdeCanas</h1>
        
        <h2>📸 Fotos para Index (Portadas)</h2>
        <div class="gallery">
            ${indexPhotos.map(p => `<div><img src="${p.url}" alt="${p.name}"><p>${p.name}</p></div>`).join('')}
        </div>
        
        <h2>🌲 Cabaña 1 - Vista al Bosque</h2>
        <div class="gallery">
            ${cabin1Photos.map(p => `<div><img src="${p.url}" alt="${p.name}"><p>${p.name}</p></div>`).join('')}
        </div>
        
        <h2>🏢 Cabaña 2 - Loft en Canasvieiras</h2>
        <div class="gallery">
            ${cabin2Photos.map(p => `<div><img src="${p.url}" alt="${p.name}"><p>${p.name}</p></div>`).join('')}
        </div>
        
        <h2>👨‍👩‍👧‍👦 Cabaña 3 - Familiar Premium</h2>
        <div class="gallery">
            ${cabin3Photos.map(p => `<div><img src="${p.url}" alt="${p.name}"><p>${p.name}</p></div>`).join('')}
        </div>
    </div>
</body>
</html>`;
        }
        
        function resetAll() {
            if (confirm('⚠️ ¿Estás seguro de reiniciar toda la clasificación? Se perderán todos los nombres y asignaciones.')) {
                classification = {};
                urls.forEach((url, index) => {
                    classification[url] = {
                        name: `img_${index + 1}`,
                        destination: ""
                    };
                });
                saveData();
                renderImages();
            }
        }
        
        // Inicializar
        loadData();
        renderImages();
        
        // Exponer funciones globales
        window.updateImageName = updateImageName;
        window.updateDestination = updateDestination;
        window.exportData = exportData;
        window.closeModal = closeModal;
        window.copyToClipboard = copyToClipboard;
        window.downloadHTML = downloadHTML;
