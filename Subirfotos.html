<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Firebase - CasaVerdeCanas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f0;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            background: #2d5a27;
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .header h1 {
            margin-bottom: 8px;
            font-size: 1.5rem;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
        
        .stats {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .stat-badge {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
        }
        
        /* Botones de acción */
        .action-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #2d5a27;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1e3f1a;
        }
        
        .btn-success {
            background: #27ae60;
            color: white;
        }
        
        .btn-success:hover {
            background: #219a52;
        }
        
        .btn-warning {
            background: #e67e22;
            color: white;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        /* Estado de conexión */
        .connection-status {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 10px 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .connection-status.connected {
            background: #d4edda;
            border-left-color: #28a745;
        }
        
        /* Grid de imágenes */
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .image-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        
        .image-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        
        .image-preview {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #e0e0e0;
        }
        
        .image-info {
            padding: 12px;
        }
        
        .image-url {
            font-size: 10px;
            color: #888;
            word-break: break-all;
            margin-bottom: 8px;
            background: #f5f5f5;
            padding: 4px;
            border-radius: 4px;
        }
        
        .image-name-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .image-select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 10px;
            background: white;
        }
        
        .image-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            text-align: center;
        }
        
        .status-saved {
            background: #d4edda;
            color: #155724;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 90%;
            width: 500px;
            padding: 20px;
            text-align: center;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        @media (max-width: 600px) {
            .images-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

</head>

            { value: "cabin-1", label: "🌲 Cabaña 1 - Vista al Bosque" },

        // ============================================
        // FUNCIONES DE FIREBASE
        // ============================================
        
        // Verificar conexión
        function checkConnection() {
            const statusDiv = document.getElementById('connection-status');
            const connectedRef = firebase.database().ref(".info/connected");
            
            connectedRef.on("value", (snap) => {
                if (snap.val() === true) {
                    statusDiv.innerHTML = "✅ Conectado a Firebase Realtime Database";
                    statusDiv.className = "connection-status connected";
                } else {
                    statusDiv.innerHTML = "⚠️ Desconectado de Firebase. Verifica tu conexión a internet.";
                    statusDiv.className = "connection-status";
                }
            });
        }
        
        // Cargar datos existentes desde Firebase
        async function loadFromFirebase() {
            const statusDiv = document.getElementById('connection-status');
            statusDiv.innerHTML = "📥 Cargando datos desde Firebase...";
            
            try {
                const snapshot = await db.ref('fotos').once('value');
                const firebaseData = snapshot.val() || {};
                
                let loadedCount = 0;
                
                // Para cada URL, verificar si ya existe en Firebase
                for (const url of urls) {
                    // Buscar si esta URL ya está guardada en alguna cabaña
                    let found = false;
                    for (const cabinId of ['cabin-1', 'cabin-2', 'cabin-3']) {
                        if (firebaseData[cabinId]) {
                            for (const [name, savedUrl] of Object.entries(firebaseData[cabinId])) {
                                if (savedUrl === url) {
                                    classification[url] = {
                                        name: name,
                                        destination: cabinId
                                    };
                                    found = true;
                                    loadedCount++;
                                    break;
                                }
                            }
                        }
                        if (found) break;
                    }
                    
                    if (!found && !classification[url]) {
                        // Inicializar si no existe
                        const defaultName = url.substring(url.lastIndexOf('/') + 1).replace(/\.(jpg|jpeg|png)$/i, '');
                        classification[url] = {
                            name: defaultName,
                            destination: ""
                        };
                    }
                }
                
                saveLocalData();
                renderImages();
                updateStats();
                statusDiv.innerHTML = `✅ Cargados ${loadedCount} registros desde Firebase`;
                setTimeout(() => {
                    statusDiv.innerHTML = "✅ Conectado a Firebase Realtime Database";
                    statusDiv.className = "connection-status connected";
                }, 2000);
                
            } catch (error) {
                console.error("Error cargando desde Firebase:", error);
                statusDiv.innerHTML = `❌ Error al cargar: ${error.message}`;
            }
        }
        
        // Guardar TODAS las imágenes clasificadas en Firebase
        async function saveAllToFirebase() {
            const statusDiv = document.getElementById('connection-status');
            const total = Object.keys(classification).length;
            let saved = 0;
            let errors = 0;
            
            statusDiv.innerHTML = "💾 Guardando datos en Firebase...";
            
            // Primero, obtener datos actuales para no sobrescribir lo que no se modifica
            const updates = {};
            
            for (const [url, data] of Object.entries(classification)) {
                if (data.destination && data.destination !== "") {
                    // Esta imagen está asignada a una cabaña
                    const path = `fotos/${data.destination}/${data.name}`;
                    updates[path] = url;
                    saved++;
                }
            }
            
            // También necesitamos limpiar imágenes que ya no están asignadas
            // Para simplificar, vamos a leer lo que hay y luego actualizar
            try {
                const snapshot = await db.ref('fotos').once('value');
                const currentData = snapshot.val() || {};
                
                // Marcar para eliminar imágenes que ya no están en nuestra clasificación
                for (const cabinId of ['cabin-1', 'cabin-2', 'cabin-3']) {
                    if (currentData[cabinId]) {
                        for (const [name, url] of Object.entries(currentData[cabinId])) {
                            // Verificar si esta URL sigue en nuestra clasificación con la misma asignación
                            const classificationEntry = Object.entries(classification).find(
                                ([imgUrl, data]) => imgUrl === url && data.destination === cabinId && data.name === name
                            );
                            if (!classificationEntry) {
                                // Esta imagen ya no está asignada, marcarla para eliminar
                                updates[`fotos/${cabinId}/${name}`] = null;
                            }
                        }
                    }
                }
                
                // Ejecutar todas las actualizaciones
                await db.ref().update(updates);
                
                statusDiv.innerHTML = `✅ Guardados ${saved} registros en Firebase (${errors} errores)`;
                setTimeout(() => {
                    statusDiv.innerHTML = "✅ Conectado a Firebase Realtime Database";
                    statusDiv.className = "connection-status connected";
                }, 2000);
                
                showModal("✅ Éxito", `Se guardaron ${saved} imágenes en Firebase correctamente.`);
                
            } catch (error) {
                console.error("Error guardando:", error);
                statusDiv.innerHTML = `❌ Error al guardar: ${error.message}`;
                showModal("❌ Error", `No se pudo guardar: ${error.message}`);
            }
        }
        
        // ============================================
        // FUNCIONES LOCALES
        // ============================================
        
        function saveLocalData() {
            localStorage.setItem('casaverde_admin_classification', JSON.stringify(classification));
        }
        
        function loadLocalData() {
            const saved = localStorage.getItem('casaverde_admin_classification');
            if (saved) {
                classification = JSON.parse(saved);
            } else {
                // Inicializar con nombres por defecto
                urls.forEach((url, index) => {
                    const defaultName = url.substring(url.lastIndexOf('/') + 1).replace(/\.(jpg|jpeg|png)$/i, '');
                    classification[url] = {
                        name: defaultName,
                        destination: ""
                    };
                });
                saveLocalData();
            }
            updateStats();
        }
        
        function clearLocal() {
            if (confirm('⚠️ ¿Borrar todos los cambios locales? Esto no afecta a Firebase.')) {
                loadLocalData();
                renderImages();
                showModal("🗑️ Limpiado", "Los cambios locales han sido restablecidos.");
            }
        }
        
        function updateStats() {
            const total = urls.length;
            const saved = Object.values(classification).filter(c => c.destination && c.destination !== "").length;
            const pending = total - saved;
            
            document.getElementById('total-count').textContent = `Total: ${total}`;
            document.getElementById('saved-count').textContent = `Asignadas: ${saved}`;
            document.getElementById('pending-count').textContent = `Pendientes: ${pending}`;
        }
        
        function updateImageName(url, newName) {
            if (classification[url]) {
                classification[url].name = newName;
                saveLocalData();
            }
        }
        
        function updateDestination(url, destination) {
            if (classification[url]) {
                classification[url].destination = destination;
                saveLocalData();
                updateStats();
                
                // Actualizar estilo visual de la tarjeta
                const card = document.getElementById(`card-${url.replace(/[^a-zA-Z0-9]/g, '_')}`);
                if (card) {
                    const statusSpan = card.querySelector('.image-status');
                    if (destination) {
                        statusSpan.textContent = '✓ Asignada';
                        statusSpan.className = 'image-status status-saved';
                    } else {
                        statusSpan.textContent = '⏳ Pendiente';
                        statusSpan.className = 'image-status status-pending';
                    }
                }
            }
        }
        
        function renderImages() {
            const container = document.getElementById('images-container');
            container.innerHTML = '';
            
            urls.forEach(url => {
                const data = classification[url] || { name: '', destination: '' };
                const urlSafe = url.replace(/[^a-zA-Z0-9]/g, '_');
                
                const card = document.createElement('div');
                card.className = 'image-card';
                card.id = `card-${urlSafe}`;
                
                card.innerHTML = `
                    <img class="image-preview" src="${url}" alt="Imagen" onerror="this.src='https://via.placeholder.com/280x180?text=Error+de+carga'">
                    <div class="image-info">
                        <div class="image-url">${url.substring(url.lastIndexOf('/') + 1)}</div>
                        <input type="text" class="image-name-input" value="${escapeHtml(data.name)}" placeholder="Nombre descriptivo" onchange="updateImageName('${escapeJs(url)}', this.value)">
                        <select class="image-select" onchange="updateDestination('${escapeJs(url)}', this.value)">
                            <option value="">-- Seleccionar cabaña --</option>
                            ${destinations.map(d => `<option value="${d.value}" ${data.destination === d.value ? 'selected' : ''}>${d.label}</option>`).join('')}
                        </select>
                        <div class="image-status ${data.destination ? 'status-saved' : 'status-pending'}">
                            ${data.destination ? '✓ Asignada' : '⏳ Pendiente'}
                        </div>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }
        
        function showModal(title, message) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('result-modal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('result-modal').classList.remove('active');
        }
        
        // Helpers
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function escapeJs(str) {
            return str.replace(/'/g, "\\'");
        }
        
        // ============================================
        // INICIALIZACIÓN
        // ============================================
        
        loadLocalData();
        checkConnection();
        renderImages();
        
        // Cargar datos desde Firebase automáticamente al inicio
        setTimeout(() => {
            loadFromFirebase();
        }, 1000);
        
        // Exponer funciones globales
        window.updateImageName = updateImageName;
        window.updateDestination = updateDestination;
        window.saveAllToFirebase = saveAllToFirebase;
        window.loadFromFirebase = loadFromFirebase;
        window.clearLocal = clearLocal;
        window.closeModal = closeModal;
    </script>
</body>
</html>
