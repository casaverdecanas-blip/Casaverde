<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Extractor para CasaVerde 2.0</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<style>
  body { font-family: system-ui, sans-serif; background: #f7f9f5; color: #22301f; margin: 0; }
  .caja { max-width: 640px; margin: 30px auto; background: #fff; border: 1px solid #dde5da; border-radius: 12px; padding: 20px; }
  .fila { padding: 7px 0; border-bottom: 1px dashed #dde5da; font-size: .92rem; }
  button { font: inherit; background: #2d5a27; color: #fff; border: 0; border-radius: 8px; padding: 12px 18px; cursor: pointer; }
  button:disabled { opacity: .5; }
  .gris { color: #6b7566; font-size: .85rem; }
</style>
</head>
<body>
<div class="caja">
  <h1>🌿 Extractor → CasaVerde 2.0</h1>
  <p class="gris">SOLO LECTURA: este archivo no modifica nada del sistema viejo.
  Lee cabañas, contenido y configuración, y descarga un JSON para importar en el 2.0.
  Tenés que estar logueado en el panel viejo (si no, abrí login.html primero).</p>
  <p><button id="btn" onclick="extraer()">Extraer y descargar JSON</button></p>
  <div id="log"></div>
</div>

<script src="utils.js"></script>
<script>
function linea(txt) {
  var d = document.createElement('div');
  d.className = 'fila';
  d.textContent = txt;
  document.getElementById('log').appendChild(d);
}

// Documentos de config que NO se exportan (claves y tokens)
var CONFIG_EXCLUIR = { integraciones: 1, github: 1, tokens_contador: 1 };

function extraer() {
  var user = firebase.auth().currentUser;
  if (!user) {
    linea('⚠ No hay sesión: abrí login.html del panel viejo, entrá, y volvé a esta página.');
    return;
  }
  document.getElementById('btn').disabled = true;
  linea('Sesión: ' + (user.email || user.uid));

  var salida = { exportadoEn: new Date().toISOString(), origen: 'casaverdecanas-199' };

  db.collection('cabanas').get()
    .then(function (snap) {
      var arr = [];
      snap.forEach(function (d) {
        var x = d.data();
        x.__id = d.id;
        arr.push(x);
      });
      salida.cabanas = arr;
      linea('✓ cabanas: ' + arr.length + ' documento(s)');
      return db.collection('contenido').get().catch(function () { return null; });
    })
    .then(function (snap) {
      var arr = [];
      if (snap) {
        snap.forEach(function (d) {
          var x = d.data();
          x.__id = d.id;
          arr.push(x);
        });
      }
      salida.contenido = arr;
      linea('✓ contenido: ' + arr.length + ' documento(s)');
      return db.collection('config').get().catch(function () { return null; });
    })
    .then(function (snap) {
      var cfg = {};
      var n = 0;
      if (snap) {
        snap.forEach(function (d) {
          if (!CONFIG_EXCLUIR[d.id]) { cfg[d.id] = d.data(); n++; }
        });
      }
      salida.config = cfg;
      linea('✓ config: ' + n + ' documento(s) (claves excluidas)');

      var blob = new Blob([JSON.stringify(salida, null, 2)], { type: 'application/json' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'export-casaverde-viejo.json';
      document.body.appendChild(a);
      a.click();
      linea('⬇ Descargado: export-casaverde-viejo.json — llevalo al importador del 2.0');
      document.getElementById('btn').disabled = false;
    })
    .catch(function (e) {
      linea('✗ Error: ' + (e.code || e.message));
      document.getElementById('btn').disabled = false;
    });
}
</script>
</body>
</html>
