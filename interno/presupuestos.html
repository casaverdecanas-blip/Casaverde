<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuestos - Casa Verde Canas</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f7fa; }
        .admin-header { background: #2d5a27; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .admin-nav { background: white; padding: 0 25px; display: flex; gap: 5px; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
        .nav-item { padding: 14px 20px; background: none; border: none; cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; color: #6c757d; text-decoration: none; }
        .nav-item.active { color: #2d5a27; border-bottom: 3px solid #2d5a27; }
        .admin-content { max-width: 1400px; margin: 30px auto; padding: 0 25px; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h2 { color: #2d5a27; margin-bottom: 20px; border-bottom: 2px solid #e8f5e9; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
        .btn-primary { background: #2d5a27; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .presupuesto-card { background: #f8f9fa; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #f39c12; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-pendiente { background: #fff3e0; color: #f39c12; }
        .badge-confirmado { background: #e8f5e9; color: #27ae60; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:white; padding:30px; border-radius:20px; width:90%; max-width:500px; }
        @media (max-width:768px){ .form-row{ grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div id="loginContainer" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div style="background:white; padding:40px; border-radius:24px; width:350px; text-align:center;">
        <h2>📊 Presupuestos</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>
        <div id="loginError" style="color:red;"></div>
    </div>
</div>
<div id="mainPanel" style="display:none;">
    <div class="admin-header"><h1>📊 Presupuestos</h1><div><span id="userEmail"></span><button class="btn-secondary" onclick="logout()">Salir</button></div></div>
    <div class="admin-nav">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="reservas.html" class="nav-item">Reservas</a>
        <a href="presupuestos.html" class="nav-item active">Presupuestos</a>
        <a href="cabanas-admin.html" class="nav-item">Cabañas</a>
        <a href="clientes.html" class="nav-item">Clientes</a>
        <a href="pagos.html" class="nav-item">Pagos</a>
    </div>
    <div class="admin-content">
        <div class="card"><h2>Nuevo Presupuesto</h2>
            <div class="form-row"><div class="form-group"><label>Cabaña</label><select id="cabañaSelect"></select></div><div class="form-group"><label>Check-in</label><input type="date" id="checkIn"></div><div class="form-group"><label>Check-out</label><input type="date" id="checkOut"></div></div>
            <div class="form-row"><div class="form-group"><label>Adultos</label><input type="number" id="adultos" value="2"></div><div class="form-group"><label>Niños</label><input type="number" id="ninos" value="0"></div></div>
            <div class="form-group"><label>Nombre del cliente</label><input type="text" id="clienteNombre" placeholder="Opcional"></div>
            <div class="form-group"><label>Notas / requerimientos</label><textarea id="notas" rows="2"></textarea></div>
            <div id="precioPreview" style="background:#e8f5e9; padding:10px; border-radius:8px; margin:10px 0;"></div>
            <button class="btn-primary" onclick="calcularPresupuesto()">Calcular</button>
            <button class="btn-success" onclick="guardarPresupuesto()">Guardar Presupuesto</button>
        </div>
        <div class="card"><h2>Presupuestos Guardados</h2><div id="presupuestosList"></div></div>
    </div>
</div>
<!-- Modal para registrar pago y convertir en reserva -->
<div id="modalPago" class="modal">
    <div class="modal-content">
        <h3>💰 Registrar Pago y Confirmar Reserva</h3>
        <input type="hidden" id="presupuestoId">
        <div class="form-group"><label>Monto recibido (R$)</label><input type="number" id="montoPago" step="0.01"></div>
        <div class="form-group"><label>Método de pago</label><select id="metodoPago"><option value="pix">PIX</option><option value="transferencia">Transferencia</option><option value="efectivo">Efectivo</option><option value="tarjeta">Tarjeta</option></select></div>
        <div class="form-group"><label>Observaciones</label><input type="text" id="obsPago"></div>
        <button class="btn-success" onclick="confirmarReservaConPago()">Confirmar Reserva</button>
        <button class="btn-secondary" onclick="cerrarModalPago()">Cancelar</button>
    </div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4", authDomain: "casaverdecanas-199.firebaseapp.com", projectId: "casaverdecanas-199" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUser = null;
    let cabanas = [];
    let ultimoCalculo = null;

    async function login() {
        const email = document.getElementById('email').value, password = document.getElementById('password').value;
        try {
            const cred = await auth.signInWithEmailAndPassword(email, password);
            const userDoc = await db.collection('usuarios').doc(cred.user.uid).get();
            if(userDoc.exists && userDoc.data().rol === 'admin') {
                currentUser = cred.user;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                document.getElementById('userEmail').textContent = email;
                cargarCabanasSelect();
                cargarPresupuestos();
            } else alert('No eres admin');
        } catch(e) { document.getElementById('loginError').innerText = e.message; }
    }
    function logout() { auth.signOut().then(()=>location.reload()); }
    async function cargarCabanasSelect() {
        const snap = await db.collection('cabanas').where('activa','==',true).orderBy('orden').get();
        cabanas = snap.docs.map(d=>({ id: d.id, ...d.data() }));
        const select = document.getElementById('cabañaSelect');
        select.innerHTML = cabanas.map(c=>`<option value="${c.id}">${c.nombre?.es||c.id}</option>`).join('');
    }
    async function calcularPresupuesto() {
        const cabaId = parseInt(document.getElementById('cabañaSelect').value);
        const checkIn = document.getElementById('checkIn').value;
        const checkOut = document.getElementById('checkOut').value;
        const adultos = parseInt(document.getElementById('adultos').value)||0;
        const ninos = parseInt(document.getElementById('ninos').value)||0;
        if(!checkIn || !checkOut) { alert('Selecciona fechas'); return; }
        const cabana = cabanas.find(c=>c.id==cabaId);
        if(!cabana) return;
        const tarifas = cabana.tarifas;
        const personasExtra = Math.max(0, (adultos+ninos) - (cabana.capacidad?.base||2));
        let totalNoches = 0;
        let fecha = new Date(checkIn);
        const fin = new Date(checkOut);
        while(fecha < fin) {
            const fechaStr = fecha.toISOString().split('T')[0];
            const intervalo = (tarifas.intervalos || []).find(i=> i.desde <= fechaStr && i.hasta >= fechaStr);
            const precioNoche = intervalo ? intervalo.precioNoche : tarifas.precioBase;
            const precioExtra = intervalo ? intervalo.precioExtra : tarifas.precioExtraPersona;
            totalNoches += precioNoche + (personasExtra * precioExtra);
            fecha.setDate(fecha.getDate()+1);
        }
        const total = totalNoches + tarifas.precioLimpieza;
        document.getElementById('precioPreview').innerHTML = `💰 Total: R$ ${total.toFixed(2)} (${Math.ceil((new Date(checkOut)-new Date(checkIn))/(86400000))} noches)`;
        ultimoCalculo = { cabaId, checkIn, checkOut, adultos, ninos, totalNoches, total, limpieza: tarifas.precioLimpieza };
    }
    async function guardarPresupuesto() {
        if(!ultimoCalculo) { alert('Primero calcula el presupuesto'); return; }
        const clienteNombre = document.getElementById('clienteNombre').value.trim() || 'Cliente sin nombre';
        const notas = document.getElementById('notas').value;
        await db.collection('presupuestos').add({
            ...ultimoCalculo,
            clienteNombre,
            notas,
            estado: 'pendiente',
            creadoEn: firebase.firestore.FieldValue.serverTimestamp(),
            creadoPor: currentUser.uid
        });
        alert('Presupuesto guardado');
        document.getElementById('clienteNombre').value = '';
        document.getElementById('notas').value = '';
        ultimoCalculo = null;
        document.getElementById('precioPreview').innerHTML = '';
        cargarPresupuestos();
    }
    async function cargarPresupuestos() {
        const snap = await db.collection('presupuestos').orderBy('creadoEn','desc').get();
        const container = document.getElementById('presupuestosList');
        if(snap.empty) { container.innerHTML='<div>No hay presupuestos</div>'; return; }
        container.innerHTML = snap.docs.map(doc=>{
            const p = doc.data();
            return `<div class="presupuesto-card">
                <strong>${p.clienteNombre}</strong> - Cabaña ${p.cabaId}<br>
                ${p.checkIn} → ${p.checkOut}<br>
                Adultos: ${p.adultos}, Niños: ${p.ninos}<br>
                <strong>Total: R$ ${p.total.toFixed(2)}</strong><br>
                <span class="badge badge-pendiente">Pendiente</span><br>
                <button class="btn-sm btn-success" onclick="abrirModalPago('${doc.id}', ${p.total.toFixed(2)})">Registrar pago y confirmar</button>
                <button class="btn-sm btn-danger" onclick="eliminarPresupuesto('${doc.id}')">Eliminar</button>
            </div>`;
        }).join('');
    }
    function abrirModalPago(id, total) {
        document.getElementById('presupuestoId').value = id;
        document.getElementById('montoPago').value = total;
        document.getElementById('metodoPago').value = 'pix';
        document.getElementById('obsPago').value = '';
        document.getElementById('modalPago').style.display = 'flex';
    }
    function cerrarModalPago() { document.getElementById('modalPago').style.display = 'none'; }
    async function confirmarReservaConPago() {
        const presupuestoId = document.getElementById('presupuestoId').value;
        const monto = parseFloat(document.getElementById('montoPago').value);
        const metodo = document.getElementById('metodoPago').value;
        const obs = document.getElementById('obsPago').value;
        if(isNaN(monto) || monto<=0) { alert('Monto válido requerido'); return; }
        const docPresup = await db.collection('presupuestos').doc(presupuestoId).get();
        if(!docPresup.exists) return;
        const p = docPresup.data();
        // Crear reserva
        const reservaData = {
            caba: p.cabaId,
            nombre: p.clienteNombre,
            checkIn: firebase.firestore.Timestamp.fromDate(new Date(p.checkIn)),
            checkOut: firebase.firestore.Timestamp.fromDate(new Date(p.checkOut)),
            adultos: p.adultos, ninos: p.ninos, huespedes: p.adultos+p.ninos,
            origen: 'presupuesto',
            estado: 'confirmada',
            totalBRL: p.total,
            subtotalBRL: p.totalNoches,
            costoLimpiezaBRL: p.limpieza,
            notas: p.notas,
            creadoEn: firebase.firestore.FieldValue.serverTimestamp(),
            creadoPor: currentUser.uid
        };
        const reservaRef = await db.collection('reservas').add(reservaData);
        // Registrar pago
        await db.collection('pagos').add({
            reservaId: reservaRef.id,
            clienteNombre: p.clienteNombre,
            monto: monto,
            moneda: 'BRL',
            metodo: metodo,
            tipo: 'total',
            observaciones: obs,
            creadoEn: firebase.firestore.FieldValue.serverTimestamp(),
            creadoPor: currentUser.uid
        });
        // Crear tarea de limpieza automática
        await crearTareaLimpieza(reservaRef.id, reservaData);
        // Marcar presupuesto como confirmado
        await db.collection('presupuestos').doc(presupuestoId).update({ estado: 'confirmado', reservaId: reservaRef.id });
        alert(`✅ Reserva confirmada para ${p.clienteNombre}\n💰 Total R$ ${p.total.toFixed(2)}\n🧹 Tarea de limpieza generada`);
        cerrarModalPago();
        cargarPresupuestos();
        cargarReservasEnDashboard();
    }
    async function crearTareaLimpieza(reservaId, reserva) {
        const checkOut = reserva.checkOut.toDate();
        const checkIn = reserva.checkIn.toDate();
        const fechaFin = new Date(checkIn);
        fechaFin.setHours(checkIn.getHours()-1);
        const descripcion = `Check-out: ${checkOut.toLocaleString()}\nCheck-in: ${checkIn.toLocaleString()}\nHuéspedes: ${reserva.huespedes}\nMonto limpieza: R$ ${reserva.costoLimpiezaBRL}`;
        await db.collection('tareas').add({
            nombre: `🧹 Limpiar Cabaña ${reserva.caba} - ${reserva.nombre}`,
            descripcion: descripcion,
            tipo: 'limpieza',
            prioridad: 'alta',
            fechaInicio: fechaFin.toISOString().split('T')[0],
            recurrencia: 0,
            activa: true,
            completada: false,
            reservaId: reservaId,
            cabaña: reserva.caba,
            montoLimpieza: reserva.costoLimpiezaBRL,
            colaboradores: [],
            creadoEn: firebase.firestore.FieldValue.serverTimestamp()
        });
    }
    async function eliminarPresupuesto(id) { if(confirm('¿Eliminar presupuesto?')){ await db.collection('presupuestos').doc(id).delete(); cargarPresupuestos(); } }
    async function cargarReservasEnDashboard() { /* opcional, solo refresca */ }
    window.calcularPresupuesto = calcularPresupuesto; window.guardarPresupuesto = guardarPresupuesto;
    window.abrirModalPago = abrirModalPago; window.cerrarModalPago = cerrarModalPago; window.confirmarReservaConPago = confirmarReservaConPago;
    window.eliminarPresupuesto = eliminarPresupuesto;
    window.login = login; window.logout = logout;
    auth.onAuthStateChanged(user=>{ if(user) login(); });
</script>
</body>
</html>
