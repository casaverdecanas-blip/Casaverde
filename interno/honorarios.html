<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honorarios · Casa Verde Canas</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        input[type="number"].form-control {
            appearance: auto;
            -webkit-appearance: auto;
        }
        .balance-header {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: var(--space-3);
            margin-bottom: var(--space-5);
        }
        .balance-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            position: relative;
            overflow: hidden;
        }
        .balance-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .balance-card.ingreso::before  { background: var(--color-success); }
        .balance-card.egreso::before   { background: var(--color-danger); }
        .balance-card.honorario::before{ background: var(--color-warning); }
        .balance-card.neto::before     { background: var(--color-primary); }
        .balance-card.neto {
            background: var(--color-primary-xlight);
            border-color: var(--color-primary-light);
        }
        .balance-card__label {
            font-size: var(--text-xs);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--color-text-muted);
            margin-bottom: var(--space-2);
            display: flex;
            align-items: center;
            gap: var(--space-1);
        }
        .balance-card__label .material-icons { font-size: 14px; }
        .balance-card__monto {
            font-size: var(--text-xl);
            font-weight: 800;
            font-family: var(--font-mono);
            color: var(--color-text-primary);
            line-height: 1.1;
        }
        .balance-card.ingreso  .balance-card__monto { color: var(--color-success); }
        .balance-card.egreso   .balance-card__monto { color: var(--color-danger); }
        .balance-card.honorario .balance-card__monto{ color: var(--color-warning); }
        .balance-card__sub {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            margin-top: var(--space-1);
        }
        .fila-monto  { font-family: var(--font-mono); font-weight: 700; }
        .fila-ingreso{ color: var(--color-success); }
        .fila-egreso { color: var(--color-danger); }
        .saldo-box {
            background: var(--color-warning-bg);
            border: 1.5px solid rgba(224,123,0,.2);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
            font-size: var(--text-sm);
            line-height: 2;
            display: none;
        }
        .saldo-pendiente {
            font-size: var(--text-xl);
            font-weight: 800;
            color: var(--color-warning);
        }
        .colab-section { margin-bottom: var(--space-6); }
        .colab-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: var(--space-3);
            padding-bottom: var(--space-3);
            margin-bottom: var(--space-3);
            border-bottom: 1px solid var(--color-border);
        }
        .colab-header strong { font-size: var(--text-md); }
        .colab-stats {
            display: flex;
            gap: var(--space-4);
            font-size: var(--text-sm);
            font-weight: 600;
        }
        .text-deuda { color: var(--color-danger); }
        .text-ok    { color: var(--color-success); }
        .honorario-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-3) 0;
            border-bottom: 1px solid var(--color-border-light);
            flex-wrap: wrap;
            gap: var(--space-3);
        }
        .honorario-row:last-child { border-bottom: none; }
        .mi-balance {
            background: linear-gradient(135deg, var(--color-primary-dark), var(--color-primary-mid));
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            color: white;
            margin-bottom: var(--space-5);
            text-align: center;
        }
        .mi-balance__label  { font-size: var(--text-sm); opacity: .8; margin-bottom: var(--space-2); }
        .mi-balance__monto  { font-size: var(--text-3xl); font-weight: 800; font-family: var(--font-mono); }
        .mi-balance__sub    { font-size: var(--text-xs); opacity: .7; margin-top: var(--space-2); }
        .filtro-mes {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            margin-bottom: var(--space-4);
            flex-wrap: wrap;
        }
        .filtro-mes label {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--color-text-secondary);
        }
        .filtro-mes select {
            font-size: var(--text-sm);
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-border);
            background: var(--color-surface);
        }
        /* ── Circuito radio buttons ── */
        .circuito-radio {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: var(--space-4);
        }
        .circuito-radio label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 13px;
            padding: 7px 14px;
            border: 0.5px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-surface-2);
            transition: all 0.15s;
        }
        .circuito-radio label:has(input:checked) {
            border-color: var(--color-primary);
            background: var(--color-primary-xlight);
        }
        /* ── Comprobante inline ── */
        .comp-zone {
            border: 1.5px dashed var(--color-border);
            border-radius: var(--radius-md);
            padding: 14px;
            text-align: center;
            cursor: pointer;
            position: relative;
            background: var(--color-surface-2);
        }
        .comp-zone input[type=file] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<header class="admin-header">
    <div class="admin-header__brand">
        <span class="material-icons">cottage</span>
        Casa Verde Canas
    </div>
    <div class="admin-header__actions">
        <div class="user-chip">
            <span class="material-icons">person</span>
            <span id="userName">—</span>
        </div>
        <button class="btn-logout" onclick="CVC.cerrarSesion()">
            <span class="material-icons">logout</span>
            Salir
        </button>
    </div>
</header>

<nav class="admin-nav" id="appNav"></nav>

<main class="admin-content">

    <div id="miBalanceBox" style="display:none;">
        <div class="mi-balance">
            <div class="mi-balance__label">Mis honorarios pendientes de cobro</div>
            <div class="mi-balance__monto" id="miBalanceMonto">R$ 0</div>
            <div class="mi-balance__sub"   id="miBalanceSub">—</div>
        </div>
    </div>

    <!-- Tab: Honorarios -->
    <div id="tabHonorarios">
        <div class="card">
            <div class="card__header">
                <h2 class="card__title">
                    <span class="material-icons">engineering</span>
                    Honorarios a colaboradores
                </h2>
                <button class="btn btn-primary" id="btnNuevoHonorario" onclick="abrirModalHonorario()" style="display:none;">
                    <span class="material-icons">add</span> Nuevo honorario
                </button>
            </div>
            <div id="honorariosContainer">
                <div class="state-loading"><div class="spinner"></div><span>Cargando...</span></div>
            </div>
        </div>
    </div>

</main>


<!-- ── MODAL: Registrar ingreso ───────────────────────────────── -->
<div class="modal-overlay" id="modalHonorario" style="display:none;" onclick="cerrarModalHonorario(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal__header">
            <div class="modal__title">
                <span class="material-icons">engineering</span>
                Registrar honorario
            </div>
            <button class="modal__close" onclick="cerrarModalHonorario()">
                <span class="material-icons">close</span>
            </button>
        </div>
        <div class="modal__body">
            <div class="form-group">
                <label class="form-label">Colaborador <span class="required">*</span></label>
                <select id="hColaborador" class="form-control"></select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Monto <span class="required">*</span></label>
                    <input type="number" id="hMonto" class="form-control" step="0.01" min="0.01">
                </div>
                <div class="form-group">
                    <label class="form-label">Horas</label>
                    <input type="number" id="hHoras" class="form-control" step="0.25" min="0">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Concepto <span class="required">*</span></label>
                <input type="text" id="hConcepto" class="form-control" placeholder="Descripción del trabajo">
            </div>
            <div class="form-group">
                <label class="form-label">Estado</label>
                <select id="hEstado" class="form-control">
                    <option value="pendiente">Pendiente de pago</option>
                    <option value="pagado">Pagado</option>
                </select>
            </div>
            <div class="alert alert-error" id="hError" style="display:none;">
                <span class="material-icons">error_outline</span>
                <span id="hErrorText"></span>
            </div>
        </div>
        <div class="modal__footer">
            <button class="btn btn-ghost" onclick="cerrarModalHonorario()">Cancelar</button>
            <button class="btn btn-primary" id="hBtnGuardar" onclick="guardarHonorario()">
                <span class="material-icons">save</span>
                <span id="hBtnText">Guardar honorario</span>
            </button>
        </div>
    </div>
</div>


<!-- ══ MODAL: NUEVO GASTO UNIFICADO ═══════════════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="utils.js"></script>
<script>
(async () => {
    window.onerror = function(msg, src, line, col, err) {
        console.error('HONORARIOS ERROR:', msg, 'linea:'+line, err ? err.message : '');
    };
    // CORREGIDO: usar await correctamente
    var { user, userData } = await CVC.verificarAuth(['admin', 'user']);
    document.getElementById('userName').textContent = userData.nombre || user.email;

    var db      = CVC.db;
    var esAdmin = userData.rol === 'admin';
    var { escapeHtml, formatFecha, formatHoras, showEmpty, showError, showToast,
            subirComprobante, abrirComprobante } = CVC;

    CVC.renderNav('honorarios.html', userData.rol);
    if (typeof CVC.initAyuda === 'function') CVC.initAyuda('honorarios.html');

    // (sin parámetros de URL en esta página)

    // -- Visibilidad por rol -----------------------------------
    if (esAdmin) {
        document.getElementById('btnNuevoHonorario').style.display = 'inline-flex';
    } else {
        document.getElementById('miBalanceBox').style.display = 'block';
    }

    // -- Estado local ------------------------------------------
    var reservasCache     = [];
    var ingresosCache     = [];
    var egresosCache      = [];
    var honorariosCache   = [];
    var presupuestosCache = [];
    var retirosCache      = [];
    var usuariosCache     = [];
    var cuentasCache      = [];
    var mesFiltro         = null;
    var _eComprobanteFile = null;

    var fmt     = function(n) { return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); };
    var CATS    = { limpieza:'Limpieza', mantenimiento:'Mantenimiento', servicios:'Servicios',
                      jardineria:'Jardinería', administrativo:'Administrativo',
                      alimentacion:'Alimentación', transporte:'Transporte', otro:'Otro' };

    // -- Tabs --------------------------------------------------
    document.querySelectorAll('.tab-btn-card').forEach(function(btn) {
        btn.addEventListener('click', function() {
            // Reset todos los botones
            document.querySelectorAll('.tab-btn-card').forEach(function(b) {
                b.style.borderColor = 'var(--color-border)';
                b.style.background  = 'var(--color-surface-2)';
                b.querySelectorAll('span').forEach(function(s) { s.style.color = 'var(--color-text-muted)'; });
            });
            // Activar el tocado
            btn.style.borderColor = 'var(--color-primary)';
            btn.style.background  = 'var(--color-primary-xlight)';
            btn.querySelectorAll('span').forEach(function(s) { s.style.color = 'var(--color-primary)'; });
            ['Ingresos', 'Egresos', 'Honorarios', 'Retiros'].forEach(function(nombre) {
                var elTab = document.getElementById('tab' + nombre);
                if (elTab) elTab.style.display = btn.dataset.tab === nombre.toLowerCase() ? 'block' : 'none';
            });
            if (btn.dataset.tab === 'retiros') { poblarSelectRetiro(); cargarRetiros(); }
        });
    });

    // -- Filtro de mes -----------------------------------------
    function poblarSelectMes() {
        var meses = new Set();
        var agregarFechas = function(arr) {
            arr.forEach(function(p) {
                var f = p.creadoEn && p.creadoEn.toDate ? p.creadoEn.toDate() : (p.fecha ? new Date(p.fecha) : null);
                if (f) meses.add(f.getFullYear() + '-' + String(f.getMonth() + 1).padStart(2, '0'));
            });
        };
        agregarFechas(ingresosCache);
        agregarFechas(egresosCache);
        agregarFechas(honorariosCache);
        var sel = document.getElementById('selectMes');
        sel.innerHTML = '<option value="">Todos los meses</option>'
            + Array.from(meses).sort().reverse().map(function(m) {
                var parts = m.split('-');
                return '<option value="' + m + '">'
                    + new Date(parts[0], parts[1] - 1).toLocaleDateString('es-AR', { month: 'long', year: 'numeric' })
                    + '</option>';
            }).join('');
    }

    window.aplicarFiltroMes = function() {
        mesFiltro = document.getElementById('selectMes').value || null;
        renderIngresos(); renderEgresos(); renderBalance();
    };

    function enMes(item) {
        if (!mesFiltro) return true;
        var f = item.creadoEn && item.creadoEn.toDate ? item.creadoEn.toDate() : (item.fecha ? new Date(item.fecha) : null);
        if (!f) return false;
        return f.getFullYear() + '-' + String(f.getMonth() + 1).padStart(2, '0') === mesFiltro;
    }

    // -- Carga de datos ----------------------------------------
    async function cargarTodo() {
        try {
            if (esAdmin) {
                var honSA = await db.collection('honorarios').get();
                honorariosCache = honSA.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); })
                    .filter(function(h) { return h.estado !== 'pagado'; })
                    .sort(function(a, b) {
                        return (b.creadoEn && b.creadoEn.toDate ? b.creadoEn.toDate().getTime() : 0)
                             - (a.creadoEn && a.creadoEn.toDate ? a.creadoEn.toDate().getTime() : 0);
                    });
                renderHonorarios();
            } else {
                var honS = await db.collection('honorarios')
                    .where('uid', '==', user.uid).get();
                honorariosCache = honS.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); })
                    .filter(function(h) { return h.estado !== 'pagado'; });
                renderMiBalance(); renderHonorarios();
            }
        } catch(e) {
            console.error('cargarTodo error:', e);
            // Mostrar error en el contenedor activo
            var msg = 'Error: ' + (e.message || e.code || String(e));
            var contenedores = ['#egresosContainer','#ingresosContainer','#honorariosContainer'];
            contenedores.forEach(function(sel) {
                var el = document.querySelector(sel);
                if (el) el.innerHTML = '<div style="color:#A32D2D;padding:16px;font-size:13px;">'
                    + '<strong>Error al cargar datos</strong><br>' + msg
                    + '<br><br><button onclick="cargarTodo()" style="background:#2d6a2d;color:white;'+ 'border:none;padding:8px 16px;border-radius:6px;cursor:pointer;">Reintentar</button>'
                    + '</div>';
            });
        }
    }

    // -- Render: Balance ---------------------------------------
    function renderBalance() {
        var ing = ingresosCache.filter(enMes);
        var egr = egresosCache.filter(function(g) { return enMes(g) && (g.circuito || 'fiscal') === 'fiscal'; });
        var hon = honorariosCache.filter(enMes);
        var tIng = ing.reduce(function(a, p) { return a + (p.monto || 0); }, 0);
        var tEgr = egr.reduce(function(a, g) { return a + (g.monto || 0); }, 0);
        var tHon = hon.reduce(function(a, h) { return a + (h.monto || 0); }, 0);
        var neto = tIng - tEgr - tHon;
        document.getElementById('balanceHeader').innerHTML =
            '<div class="balance-card ingreso"><div class="balance-card__label"><span class="material-icons">trending_up</span> Ingresos</div><div class="balance-card__monto">' + fmt(tIng) + '</div><div class="balance-card__sub">' + ing.length + ' cobros</div></div>' +
            '<div class="balance-card egreso"><div class="balance-card__label"><span class="material-icons">trending_down</span> Egresos fiscales</div><div class="balance-card__monto">' + fmt(tEgr) + '</div><div class="balance-card__sub">' + egr.length + ' gastos</div></div>' +
            '<div class="balance-card honorario"><div class="balance-card__label"><span class="material-icons">engineering</span> Honorarios pend.</div><div class="balance-card__monto">' + fmt(tHon) + '</div><div class="balance-card__sub">' + hon.length + ' pendientes</div></div>' +
            '<div class="balance-card neto"><div class="balance-card__label"><span class="material-icons">account_balance</span> Balance neto</div><div class="balance-card__monto" style="color:' + (neto >= 0 ? 'var(--color-success)' : 'var(--color-danger)') + '">' + (neto < 0 ? '-' : '') + fmt(Math.abs(neto)) + '</div><div class="balance-card__sub">Ing - Egr - Hon</div></div>';
    }

    function renderMiBalance() {
        var pend  = honorariosCache.filter(function(h) { return h.estado !== 'pagado'; });
        var total = pend.reduce(function(a, h) { return a + (h.monto || 0); }, 0);
        var hs    = honorariosCache.reduce(function(a, h) { return a + (h.horas || 0); }, 0);
        document.getElementById('miBalanceMonto').textContent = fmt(total);
        document.getElementById('miBalanceSub').textContent   =
            pend.length + ' tareas pendientes . ' + formatHoras(hs) + ' acumuladas';
    }

    // -- Render: Ingresos --------------------------------------
    function renderIngresos() {
        var container = document.getElementById('ingresosContainer');
        var lista     = ingresosCache.filter(enMes);
        if (!lista.length) { showEmpty(container, 'Sin ingresos', 'No hay cobros en este período.', 'trending_up'); return; }
        var sumaBRL = lista.filter(function(p) { return p.moneda === 'BRL'; }).reduce(function(a, p) { return a + (p.monto || 0); }, 0);
        var rows = lista.map(function(p) {
            var res = reservasCache.find(function(r) { return r.id === p.reservaId; });
            return '<tr>' +
                '<td>' + escapeHtml(p.fecha || (p.creadoEn && p.creadoEn.toDate ? p.creadoEn.toDate().toLocaleDateString('es-AR') : '--')) + '</td>' +
                '<td><strong>' + escapeHtml(p.clienteNombre || (res ? res.nombre : '--')) + '</strong></td>' +
                '<td>' + escapeHtml(p.tipo || '--') + '</td>' +
                '<td class="fila-monto fila-ingreso">' + (p.moneda !== 'BRL' ? p.moneda + ' ' : 'R$ ') + (p.monto || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 }) + '</td>' +
                '<td>' + escapeHtml(p.metodo || '--') + '</td>' +
                '<td class="text-muted text-xs">' + escapeHtml(p.observaciones || '--') + '</td>' +
                '<td><button class="btn btn-danger btn-sm" onclick="eliminarIngreso(\'' + p.id + '\')"><span class="material-icons">delete</span></button></td>' +
                '</tr>';
        }).join('');
        container.innerHTML = '<div class="table-container"><table class="table table-responsive"><thead><tr><th>Fecha</th><th>Cliente</th><th>Tipo</th><th>Monto</th><th>Método</th><th>Obs.</th><th></th></tr></thead><tbody>' + rows + '</tbody><tfoot><tr style="background:var(--color-success-bg);"><td colspan="3" style="font-weight:700;padding:var(--space-3) var(--space-4);">TOTAL</td><td class="fila-monto fila-ingreso" style="padding:var(--space-3) var(--space-4);">R$ ' + sumaBRL.toLocaleString('pt-BR', { minimumFractionDigits: 2 }) + '</td><td colspan="3"></td></tfoot></table></div>';
    }

    // -- Render: Egresos ---------------------------------------
    function renderEgresos() {
        var container = document.getElementById('egresosContainer');
        var lista     = egresosCache.filter(enMes);
        if (!lista.length) { showEmpty(container, 'Sin gastos', 'No hay gastos en este período.', 'trending_down'); return; }
        var sumaBRL = lista.filter(function(g) { return g.moneda === 'BRL' && (g.circuito || 'fiscal') === 'fiscal'; })
            .reduce(function(a, g) { return a + (g.monto || 0); }, 0);
        var rows = lista.map(function(g) {
            var sim = g.moneda === 'USD' ? 'US$' : g.moneda === 'UYU' ? '$U' : g.moneda === 'ARS' ? '$' : 'R$';
            var circuito = g.circuito || 'fiscal';
            var circBadge = circuito === 'personal'
                ? '<span style="font-size:10px;background:#E6F1FB;color:#185FA5;padding:2px 6px;border-radius:3px;">personal</span>'
                : circuito === 'mixto'
                ? '<span style="font-size:10px;background:#FAEEDA;color:#854F0B;padding:2px 6px;border-radius:3px;">mixto</span>'
                : '';
            var compBtn = g.comprobanteUrl
                ? '<button class="btn btn-ghost btn-sm" onclick="abrirComprobante(\'' + g.comprobanteUrl + '\')" title="Ver comprobante"><span class="material-icons" style="font-size:16px;">attach_file</span></button>'
                : '';
            return '<tr>' +
                '<td>' + escapeHtml(g.fecha || '--') + '</td>' +
                '<td><strong>' + escapeHtml(g.concepto || '--') + '</strong> ' + circBadge + '</td>' +
                '<td>' + escapeHtml(CATS[g.categoria] || g.categoria || '--') + '</td>' +
                '<td class="fila-monto fila-egreso">' + sim + ' ' + (g.monto || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 }) + '</td>' +
                '<td>' + escapeHtml(g.metodo || '--') + '</td>' +
                '<td class="text-muted text-xs">' + escapeHtml(g.responsableNom || g.proveedor || '--') + '</td>' +
                '<td style="white-space:nowrap;">' + compBtn + '<button class="btn btn-danger btn-sm" onclick="eliminarEgreso(\'' + g.id + '\')"><span class="material-icons">delete</span></button></td>' +
                '</tr>';
        }).join('');

    // -- Render: Honorarios ------------------------------------
    function renderHonorarios() {
        var container = document.getElementById('honorariosContainer');
        if (!honorariosCache.length) { showEmpty(container, 'Sin honorarios', 'No hay honorarios pendientes.', 'engineering'); return; }
        var porColab = {};
        honorariosCache.forEach(function(h) {
            var uid = h.uid || h.colaboradorId || 'sin_uid';
            var nom = h.nombre || h.colaboradorNombre || 'Sin nombre';
            if (!porColab[uid]) porColab[uid] = { nombre: nom, items: [], total: 0, horas: 0 };
            porColab[uid].items.push(h);
            porColab[uid].total += h.monto || 0;
            porColab[uid].horas += h.horas || 0;
        });
        container.innerHTML = Object.values(porColab).map(function(c) {
            var rows = c.items.map(function(h) {
                return '<div class="honorario-row">' +
                    '<div><div style="font-size:var(--text-sm);font-weight:600;">' + escapeHtml(h.concepto || h.tareaNombre || '--') + '</div>' +
                    '<div style="font-size:var(--text-xs);color:var(--color-text-muted);">' + formatHoras(h.horas) + ' . ' + (h.creadoEn && h.creadoEn.toDate ? h.creadoEn.toDate().toLocaleDateString('es-AR') : '--') + '</div></div>' +
                    '<div style="display:flex;align-items:center;gap:var(--space-2);">' +
                    '<span class="fila-monto text-deuda">R$ ' + (h.monto || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 }) + '</span>' +
                    (esAdmin ? '<button class="btn btn-primary btn-sm" onclick="marcarHonorarioPagado(\'' + h.id + '\',\'' + escapeHtml(c.nombre) + '\',' + (h.monto || 0) + ')"><span class="material-icons">check</span></button>' : '') +
                    '</div></div>';
            }).join('');
            return '<div class="colab-section"><div class="colab-header"><strong>' + escapeHtml(c.nombre) + '</strong>' +
                '<div class="colab-stats"><span class="text-deuda">R$ ' + c.total.toLocaleString('pt-BR', { minimumFractionDigits: 2 }) + '</span>' +
                '<span style="color:var(--color-text-muted);">' + formatHoras(c.horas) + '</span></div></div>' + rows + '</div>';
        }).join('');
    }

    // -- Render: Retiros ---------------------------------------
    function renderRetiros() {
        var container = document.getElementById('retirosContainer');
        if (!retirosCache.length) { showEmpty(container, 'Sin retiros', 'No hay retiros personales registrados.', 'person'); return; }
        var balancePorPersona = {};
        retirosCache.forEach(function(r) {
            var nom = r.usuarioNom || 'Sin asignar';
            if (!balancePorPersona[nom]) balancePorPersona[nom] = { total: 0, cant: 0 };
            balancePorPersona[nom].total += r.monto || 0;
            balancePorPersona[nom].cant  += 1;
        });
        var balanceHtml = Object.keys(balancePorPersona).map(function(key) { var entry = [key, balancePorPersona[key]];
            return '<div class="stat-chip"><div class="stat-chip__val">R$ ' +
                Math.round(entry[1].total).toLocaleString('pt-BR') + '</div>' +
                '<div class="stat-chip__label">' + escapeHtml(entry[0]) + ' (' + entry[1].cant + ')</div></div>';
        }).join('');
        var rows = retirosCache.map(function(r) {
            var mon = r.moneda === 'UYU' ? '$U ' : r.moneda === 'USD' ? 'US$ ' : 'R$ ';
            var tieneComp = !!r.comprobanteUrl;
            var compBtn = tieneComp
                ? '<button class="btn btn-ghost btn-sm" onclick="abrirComprobante(\'' + r.comprobanteUrl + '\')"><span class="material-icons" style="font-size:16px;">attach_file</span></button>'
                : '<span style="font-size:11px;color:var(--color-text-muted);">sin foto</span>';
            var reclasif = r.reclasificado
                ? '<span style="font-size:11px;background:#E1F5EE;color:#0F6E56;padding:2px 7px;border-radius:3px;">Reclasificado ' + (r.pctReclasif || 0) + '%</span>'
                : '';
            return '<tr><td>' + escapeHtml(r.fecha || '--') + '</td>' +
                '<td><strong>' + escapeHtml(r.usuarioNom || '--') + '</strong></td>' +
                '<td>' + escapeHtml(r.concepto || '--') + '</td>' +
                '<td style="text-align:right;font-family:var(--font-mono);">' + mon + (r.monto || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 }) + '</td>' +
                '<td>' + escapeHtml(r.tipoFondo || '--') + '</td>' +
                '<td>' + compBtn + '</td>' +
                '<td>' + reclasif + '</td>' +
                '</tr>';
        }).join('');
        container.innerHTML =
            '<div class="stats-row" style="margin-bottom:var(--space-3);">' + balanceHtml + '</div>' +
            '<div class="table-container"><table class="table table-responsive"><thead><tr>' +
            '<th>Fecha</th><th>Persona</th><th>Concepto</th><th>Monto</th><th>Fondo</th><th>Comprobante</th><th></th>' +
            '</tr></thead><tbody>' + rows + '</tbody></table></div>';
    }

        var monto     = parseFloat(document.getElementById('eMonto').value);
        var fecha     = document.getElementById('eFecha').value;
        var circuito  = document.querySelector('input[name="eCircuito"]:checked') ?
            document.querySelector('input[name="eCircuito"]:checked').value : 'fiscal';

        if (!fecha)               { mostrarErrorEgreso('Seleccioná una fecha.'); return; }
        var btn  = document.getElementById('eBtnGuardar');
        var text = document.getElementById('eBtnText');
        btn.disabled = true; text.textContent = 'Guardando...';
        try {
            var pctFiscal    = circuito === 'mixto' ? parseInt(document.getElementById('ePctFiscal').value || '50') : (circuito === 'fiscal' ? 100 : 0);
            var montoFiscal  = parseFloat((monto * pctFiscal / 100).toFixed(2));
            var montoPersonal = parseFloat((monto - montoFiscal).toFixed(2));
            var selResp = document.getElementById('eResponsable');
            var responsableId  = selResp.value || '';
            var responsableNom = selResp.options[selResp.selectedIndex] ? (selResp.options[selResp.selectedIndex].dataset.nom || '') : '';
            var selCuenta = document.getElementById('eCuentaOrigen');
            var cuentaOrigenId  = selCuenta.value || '';
            var cuentaOrigenNom = selCuenta.options[selCuenta.selectedIndex] ? (selCuenta.options[selCuenta.selectedIndex].dataset.nom || '') : '';
            var docData = {
                concepto, monto, moneda: document.getElementById('eMoneda').value,
                categoria:   document.getElementById('eCategoria').value,
                metodo:      document.getElementById('eMetodo').value,
                proveedor:   document.getElementById('eProveedor').value.trim(),
                notas:       document.getElementById('eNotas').value.trim(),
                fecha, circuito, responsableId, responsableNom, cuentaOrigenId, cuentaOrigenNom,
                tipoFondo:   document.getElementById('eTipoFondo').value,
                deducible:   circuito === 'fiscal' ? document.getElementById('eDeducible').value === 'true' : false,
                referenciaComprobante: document.getElementById('eReferencia').value.trim(),
                pctFiscal, montoFiscal, montoPersonal,
                notasPersonales: document.getElementById('eNotasPersonales').value.trim(),
                comprobanteUrl: null, origen: 'manual',
                creadoEn: firebase.firestore.FieldValue.serverTimestamp(),
                creadoPor: user.uid
            };
            var docRef = await db.collection('gastos').add(docData);
            if (_eComprobanteFile) {
                text.textContent = 'Subiendo foto...';
                try {
                    var url = await subirComprobante(_eComprobanteFile, 'gastos', docRef.id);
                    await docRef.update({ comprobanteUrl: url });
                } catch(se) { console.warn('Storage:', se.message); }
            }
            if (circuito === 'mixto' && montoPersonal > 0) {
                await db.collection('retiros').add({
                    usuarioId: responsableId, usuarioNom: responsableNom,
                    monto: montoPersonal, moneda: docData.moneda, fecha,
                    cuentaOrigenId, cuentaOrigenNom,
                    concepto: concepto + ' (parte personal)', destino: 'uso_personal',
                    tipoFondo: docData.tipoFondo, comprobanteUrl: null,
                    gastoFiscalId: docRef.id, reclasificado: false, pctReclasif: pctFiscal,
                    creadoEn: firebase.firestore.FieldValue.serverTimestamp(), creadoPor: user.uid

                concepto, estado, moneda: 'BRL',
                fechaPago:  estado === 'pagado' ? firebase.firestore.FieldValue.serverTimestamp() : null,
                pagadoPor:  estado === 'pagado' ? user.uid : null,
                creadoEn:   firebase.firestore.FieldValue.serverTimestamp(), creadoPor: user.uid
            });
            showToast('Honorario registrado.', 'success');
            document.getElementById('modalHonorario').style.display = 'none';
            await cargarTodo();
        } catch(e) { mostrarErrorHonorario('Error: ' + e.message); }
        finally { btn.disabled = false; text.textContent = 'Guardar honorario'; }
    };
    window.marcarHonorarioPagado = async function(id, nombre, monto) {
        if (!confirm('¿Marcar como pagado el honorario de ' + nombre + ' (R$ ' + monto.toFixed(2) + ')?')) return;
        try {
            await db.collection('honorarios').doc(id).update({
                estado: 'pagado', fechaPago: firebase.firestore.FieldValue.serverTimestamp(), pagadoPor: user.uid
            });
            showToast('Honorario marcado como pagado.', 'success');
            await cargarTodo();
        } catch(e) { showToast('Error: ' + e.message, 'error'); }
    };

    // -- Helpers de error --------------------------------------
    function mostrarErrorIngreso(msg) {
        document.getElementById('iErrorText').textContent = msg;
        document.getElementById('iError').style.display  = 'flex';
    }
    function mostrarErrorEgreso(msg) {
        document.getElementById('eErrorText').textContent = msg;
        document.getElementById('eError').style.display   = 'flex';
    }
    function mostrarErrorHonorario(msg) {
        document.getElementById('hErrorText').textContent = msg;
        document.getElementById('hError').style.display   = 'flex';
    }

    // -- Init --------------------------------------------------
    await cargarTodo();


    // == NUEVO MODAL DE GASTO UNIFICADO =======================================

    var _ngModo        = 'rapido';
    var _ngComprobanteFile = null;
    var _ngFotoFile    = null;
    var _ngCuentasCache = [];

    // Abrir modal
    window.abrirNuevoGasto = async function() {
        // Reset
        _ngModo = 'rapido';
        _ngComprobanteFile = null;
        _ngFotoFile = null;
        document.getElementById('ngMonto').value    = '';
        document.getElementById('ngConcepto').value = '';
        document.getElementById('ngProveedor') && (document.getElementById('ngProveedor').value = '');
        document.getElementById('ngOpcionales').style.display = 'none';
        document.getElementById('ngToggleBtn').textContent = '+ Mas detalles (opcional)';
        document.getElementById('seccionRapida').style.display = 'block';
        document.getElementById('seccionFoto').style.display   = 'none';
        document.getElementById('ngFotoPreview').style.display = 'none';
        document.getElementById('ngFotoLog').style.display     = 'none';
        document.getElementById('ngFotoExtraido').style.display = 'none';
        document.getElementById('ngError').style.display       = 'none';
        document.getElementById('ngFecha') && (document.getElementById('ngFecha').value = new Date().toISOString().split('T')[0]);
        setModoGasto('rapido');

        // Cargar cuentas si no estan cargadas
        if (_ngCuentasCache.length === 0) {
            try {
                var snap = await db.collection('cuentas').where('activa','==',true).get();
                _ngCuentasCache = snap.docs.map(function(d) {
                    return { id: d.id, nombre: d.data().nombre || d.id, moneda: d.data().moneda || '' };
                });
            } catch(e) { _ngCuentasCache = []; }
        }

        // Poblar selects de cuentas
        ['ngCuenta', 'ngFCuenta'].forEach(function(selectId) {
            var sel = document.getElementById(selectId);
            if (!sel) return;
            sel.innerHTML = '<option value="">-- Pendiente de asignar --</option>';
            _ngCuentasCache.forEach(function(c) {
                var opt = document.createElement('option');
                opt.value = c.id;
                opt.dataset.nom = c.nombre;
                opt.textContent = c.nombre + ' (' + c.moneda + ')';
                sel.appendChild(opt);
            });
        });

        document.getElementById('modalNuevoGasto').style.display = 'flex';
        setTimeout(function() { document.getElementById('ngMonto').focus(); }, 150);
    };

    window.cerrarNuevoGasto = function(e) {
        if (e && e.target !== document.getElementById('modalNuevoGasto')) return;
        document.getElementById('modalNuevoGasto').style.display = 'none';
    };

    window.setModoGasto = function(modo) {
        _ngModo = modo;
        var esFoto = modo === 'foto';
        document.getElementById('seccionRapida').style.display = esFoto ? 'none' : 'block';
        document.getElementById('seccionFoto').style.display   = esFoto ? 'block' : 'none';
        // Estilos botones
        var btnR = document.getElementById('modoRapidoBtn');
        var btnF = document.getElementById('modoFotoBtn');
        if (btnR) {
            btnR.style.background   = esFoto ? 'var(--color-surface-2)' : 'var(--color-primary)';
            btnR.style.color        = esFoto ? 'var(--color-text-secondary)' : 'white';
            btnR.style.borderColor  = esFoto ? 'var(--color-border)' : 'var(--color-primary)';
        }
        if (btnF) {
            btnF.style.background   = esFoto ? 'var(--color-primary)' : 'var(--color-surface-2)';
            btnF.style.color        = esFoto ? 'white' : 'var(--color-text-secondary)';
            btnF.style.borderColor  = esFoto ? 'var(--color-primary)' : 'var(--color-border)';
        }
    };

    window.toggleNgOpcionales = function() {
        var el  = document.getElementById('ngOpcionales');
        var btn = document.getElementById('ngToggleBtn');
        var visible = el.style.display !== 'none';
        el.style.display  = visible ? 'none' : 'block';
        btn.textContent   = visible ? '+ Mas detalles (opcional)' : '- Ocultar detalles';
    };

    window.ngPreviewFoto = function(input) {
        var file = input.files[0];
        if (!file) return;
        _ngComprobanteFile = file;
        var img = document.getElementById('ngComprobantePreview');
        img.src = URL.createObjectURL(file);
        img.style.display = 'block';
    };

    // Procesar foto con IA
    window.ngProcesarFoto = async function(input) {
        var file = input.files[0];
        if (!file) return;
        _ngFotoFile = file;

        var preview = document.getElementById('ngFotoPreview');
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';

        var logEl = document.getElementById('ngFotoLog');
        logEl.style.display = 'block';
        logEl.innerHTML = '';

        function flog(msg, color) {
            logEl.innerHTML += '<span style="color:' + (color||'#93c5fd') + '">' + msg + '</span>\n';
            logEl.scrollTop = logEl.scrollHeight;
        }

        document.getElementById('ngUpZone').style.display = 'none';
        flog('Procesando imagen...');

        try {
            // Comprimir imagen
            var b64 = await new Promise(function(res, rej) {
                var canvas = document.createElement('canvas');
                var img2   = new Image();
                img2.onload = function() {
                    var max = 1200;
                    var w = img2.width, h = img2.height;
                    if (w > max) { h = h * max / w; w = max; }
                    if (h > max) { w = w * max / h; h = max; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img2, 0, 0, w, h);
                    res(canvas.toDataURL('image/jpeg', 0.75).split(',')[1]);
                };
                img2.onerror = rej;
                img2.src = URL.createObjectURL(file);
            });

            flog('Enviando a Gemini IA...', '#fbbf24');

            var PROMPT = 'Sos un extractor de datos de facturas y recibos de compra en Brasil.' +
                ' Extrae todos los datos posibles del comprobante y responde UNICAMENTE con JSON valido, sin texto adicional:' +
                ' {"proveedor":"","fecha":"YYYY-MM-DD","monto_total":0,"moneda":"BRL","concepto":"",' +
                '"numero_factura":"","categoria_sugerida":"","metodo_pago_sugerido":"",' +
                '"items":[{"descripcion":"","cantidad":1,"precio":0}]}.' +
                ' Numeros BRL: eliminar R$, puntos de miles, cambiar coma por punto. R$1.234,56 -> 1234.56.' +
                ' metodo_pago_sugerido: pix, efectivo, debito, credito o transferencia.' +
                ' categoria_sugerida: Materiales, Limpieza, Mantenimiento, Servicios, Alimentos, Transporte u Otro.';

            var resp = await fetch('https://serene-scone-76bd4e.netlify.app/.netlify/functions/claude-proxy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'gemini-2.5-flash-lite',
                    max_tokens: 1500,
                    messages: [{
                        role: 'user',
                        content: [
                            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
                            { type: 'text',  text: PROMPT }
                        ]
                    }]
                })
            });

            var data = await resp.json();
            if (!resp.ok) { flog('Error: ' + (data.error || resp.status), '#f87171'); return; }

            var raw = data.content && data.content[0] ? data.content[0].text : '';
            flog('Interpretando datos...', '#4ade80');

            var ext;
            try {
                var bt=String.fromCharCode(96); var cleanRaw=raw.split(bt).join('').split(bt+'json').join('').replace('json','').trim(); ext=JSON.parse(cleanRaw);
            } catch(e) {
                flog('Error al interpretar JSON: ' + e.message, '#f87171');
                return;
            }

            // Poblar campos
            if (ext.monto_total)  document.getElementById('ngFMonto').value    = ext.monto_total;
            if (ext.concepto)     document.getElementById('ngFConcepto').value  = ext.concepto;
            if (ext.proveedor)    document.getElementById('ngFProveedor').value = ext.proveedor;
            if (ext.fecha)        document.getElementById('ngFFecha').value     = ext.fecha;
            if (ext.numero_factura) document.getElementById('ngFReferencia').value = ext.numero_factura;

            // Metodo de pago
            if (ext.metodo_pago_sugerido) {
                var sel = document.getElementById('ngFMetodo');
                var vals = ['pix','efectivo','debito','credito','transferencia'];
                if (vals.indexOf(ext.metodo_pago_sugerido) !== -1) sel.value = ext.metodo_pago_sugerido;
            }

            // Categoria
            if (ext.categoria_sugerida) {
                var catMap = {
                    'materiales':'materiales','limpieza':'limpieza','mantenimiento':'mantenimiento',
                    'servicios':'servicios','alimentos':'alimentos','transporte':'transporte','otro':'otro'
                };
                var catSel = document.getElementById('ngFCategoria');
                var catKey = ext.categoria_sugerida.toLowerCase();
                if (catMap[catKey]) catSel.value = catMap[catKey];
            }

            // Items
            if (ext.items) {
                var itemsTxt = '';
                if (Array.isArray(ext.items)) {
                    itemsTxt = ext.items.map(function(it) {
                        if (typeof it === 'string') return it;
                        var partes = [];
                        if (it.descripcion || it.description) partes.push(it.descripcion || it.description);
                        if (it.cantidad && it.cantidad !== 1) partes.push('x' + it.cantidad);
                        if (it.precio)  partes.push('R$ ' + it.precio);
                        return partes.join(' - ');
                    }).filter(Boolean).join('\n');
                } else {
                    itemsTxt = String(ext.items);
                }
                document.getElementById('ngFItems').value = itemsTxt;
            }

            flog('Datos extraidos correctamente', '#4ade80');
            document.getElementById('ngFotoExtraido').style.display = 'block';

        } catch(e) {
            document.getElementById('ngUpZone').style.display = 'block';
            flog('Error: ' + e.message, '#f87171');
        }
    };

    // Guardar nuevo gasto
    window.guardarNuevoGasto = async function() {
        var esFoto   = _ngModo === 'foto';
        var monto    = parseFloat(esFoto ? document.getElementById('ngFMonto').value : document.getElementById('ngMonto').value);
        var concepto = (esFoto ? document.getElementById('ngFConcepto').value : document.getElementById('ngConcepto').value).trim();
        var selCta   = document.getElementById(esFoto ? 'ngFCuenta' : 'ngCuenta');
        var cuentaId  = selCta ? selCta.value : '';
        var cuentaNom = selCta && selCta.options[selCta.selectedIndex] ? (selCta.options[selCta.selectedIndex].dataset.nom || '') : '';

        if (!monto || monto <= 0) {
            document.getElementById('ngErrorText').textContent = 'Ingresa un monto valido.';
            document.getElementById('ngError').style.display = 'flex'; return;
        }
        if (!concepto) {
            document.getElementById('ngErrorText').textContent = 'Ingresa un concepto o para que fue el gasto.';
            document.getElementById('ngError').style.display = 'flex'; return;
        }

        var btn = document.getElementById('ngBtnGuardar');
        var txt = document.getElementById('ngBtnTxt');
        btn.disabled = true; txt.textContent = 'Guardando...';
        document.getElementById('ngError').style.display = 'none';

        try {
            var fecha    = (esFoto ? document.getElementById('ngFFecha').value : document.getElementById('ngFecha').value)
                           || new Date().toISOString().split('T')[0];
            var metodo   = (esFoto ? document.getElementById('ngFMetodo').value : document.getElementById('ngMetodo').value) || 'pix';
            var circuito = (esFoto ? document.getElementById('ngFCircuito').value : document.getElementById('ngCircuito').value) || '';
            var proveedor = (esFoto ? document.getElementById('ngFProveedor').value : document.getElementById('ngProveedor').value || '').trim();
            var items    = esFoto ? (document.getElementById('ngFItems').value || '') : '';
            var ref      = esFoto ? (document.getElementById('ngFReferencia').value || '') : '';
            var cat      = esFoto ? document.getElementById('ngFCategoria').value : 'otro';

            var docData = {
                concepto: concepto,
                monto:    monto,
                moneda:   'BRL',
                fecha:    fecha,
                metodo:   metodo,
                circuito: circuito || null,
                deducible: circuito === 'fiscal' || circuito === 'mixto',
                proveedor: proveedor,
                categoria: cat,
                cuentaOrigenId:  cuentaId,
                cuentaOrigenNom: cuentaNom,
                sinCuenta: !cuentaId,
                items:     items,
                referenciaComprobante: ref,
                notas:     '',
                comprobanteUrl: null,
                origen:    esFoto ? 'factura_ia' : 'manual',
                creadoEn:  firebase.firestore.FieldValue.serverTimestamp(),
                creadoPor: user.uid
            };

            var docRef = await db.collection('gastos').add(docData);

            // Subir foto si hay
            var fotoFile = esFoto ? _ngFotoFile : _ngComprobanteFile;
            if (fotoFile) {
                txt.textContent = 'Subiendo foto...';
                try {
                    var url = await CVC.subirComprobante(fotoFile, 'gastos', docRef.id);
                    await docRef.update({ comprobanteUrl: url });
                } catch(se) { console.warn('Foto:', se.message); }
            }

            CVC.showToast('Gasto registrado.' + (!cuentaId ? ' Pendiente asignar cuenta.' : ''), 'success');
            document.getElementById('modalNuevoGasto').style.display = 'none';
            await cargarTodo();

        } catch(e) {
            document.getElementById('ngErrorText').textContent = 'Error: ' + e.message;
            document.getElementById('ngError').style.display = 'flex';
        } finally {
            btn.disabled = false; txt.textContent = 'Guardar gasto';
        }
    };
    // == FIN NUEVO MODAL =======================================================
})();
</script>
