<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Colaborador - Casa Verde</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <nav style="background:#2d5a27; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;">
        <span><b>CASA VERDE COLABORADORES</b></span>
        <button onclick="logout()" style="background:none; border:none; color:white; cursor:pointer;"><span class="material-icons">logout</span></button>
    </nav>

    <div style="padding:20px; max-width:500px; margin:0 auto;">
        <h2 id="saludo" style="color:#2d5a27; margin-bottom:20px;">Hola...</h2>
        
        <div id="listaTareas"></div>

        <div class="card" style="margin-top:30px; border:2px dashed #2d5a27; background:#f0f7f0;">
            <h4 style="color:#2d5a27; margin-bottom:10px;">¿Surgió algo nuevo?</h4>
            <input type="text" id="extraTaskName" placeholder="Ej: Cambiar foco pasillo" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;">
            <button onclick="crearTareaExtra()" class="btn-cv" style="width:100%">Reportar y Marcar Hecho</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/auth-core.js"></script>
    <script>
        async function cargarTareas() {
            const container = document.getElementById('listaTareas');
            const ahora = new Date();
            document.getElementById('saludo').textContent = `Hola, ${sessionStorage.getItem('userName')}`;

            const [tareasSnap, historialSnap] = await Promise.all([
                db.collection('tareas').where('activa', '==', true).get(),
                db.collection('historial').orderBy('timestamp', 'desc').get()
            ]);

            const historial = historialSnap.docs.map(d => d.data());
            let html = '';

            tareasSnap.forEach(doc => {
                const t = doc.data();
                const ultimo = historial.find(h => h.tareaId === doc.id);
                let alDia = false;

                if (ultimo && ultimo.timestamp) {
                    const diffDias = (ahora - ultimo.timestamp.toDate()) / (1000 * 60 * 60 * 24);
                    if (diffDias < (t.recurrencia || 1)) alDia = true;
                }

                html += `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left:5px solid ${alDia ? '#ccc' : '#2d5a27'}; opacity:${alDia ? 0.5 : 1}">
                    <div>
                        <b style="${alDia ? 'text-decoration:line-through; color:#999' : ''}">${t.nombre}</b>
                        <p style="font-size:0.8rem; color:#666">${alDia ? 'Completada' : (t.descripcion || '')}</p>
                    </div>
                    ${alDia ? '<span class="material-icons" style="color:#27ae60">check_circle</span>' : 
                    `<button onclick="completar('${doc.id}', '${t.nombre}')" class="btn-cv" style="padding:8px; border-radius:50%;"><span class="material-icons">done</span></button>`}
                </div>`;
            });
            container.innerHTML = html;
        }

        async function completar(id, nombre) {
            if(!confirm(`¿Confirmas ${nombre}?`)) return;
            await db.collection('historial').add({
                tareaId: id,
                usuarioId: auth.currentUser.uid,
                colaboradorNombre: sessionStorage.getItem('userName'),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            cargarTareas();
        }

        async function crearTareaExtra() {
            const nombre = document.getElementById('extraTaskName').value;
            if(!nombre) return;
            const ref = await db.collection('tareas').add({
                nombre: nombre,
                descripcion: "Tarea extra reportada",
                recurrencia: 99, // Para que no se repita pronto
                activa: true,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            await completar(ref.id, nombre);
            document.getElementById('extraTaskName').value = "";
        }

        window.onload = () => setTimeout(cargarTareas, 1000);
    </script>
</body>
</html>
