<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Colaborador - Casa Verde</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body style="display:block;">
    <nav style="background:var(--dark); color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:bold; letter-spacing:1px;">CASA VERDE</span>
        <button onclick="logout()" style="background:none; border:none; color:white; cursor:pointer;"><span class="material-icons">logout</span></button>
    </nav>

    <div style="padding:25px; max-width:550px; margin:0 auto;">
        <div style="margin-bottom:25px;">
            <h1 id="saludo" style="color:var(--primary); font-size:1.5rem;">Hola...</h1>
            <p id="fechaHoy" style="color:#64748b; text-transform:capitalize;"></p>
        </div>
        <div id="listaTareas"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/auth-core.js"></script>
    <script>
        async function loadTasks() {
            const container = document.getElementById('listaTareas');
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            
            document.getElementById('saludo').textContent = `Hola, ${sessionStorage.getItem('userName')}`;
            document.getElementById('fechaHoy').textContent = new Date().toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'});

            const [tareas, hechos] = await Promise.all([
                db.collection('tareas').where('activa','==',true).get(),
                db.collection('historial').where('timestamp','>=',hoy).get()
            ]);

            const hechosIds = hechos.docs.map(d => d.data().tareaId);
            let html = '';

            tareas.forEach(doc => {
                const t = doc.data();
                const done = hechosIds.includes(doc.id);
                html += `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left:6px solid ${done ? '#cbd5e1' : '#2d5a27'}; opacity:${done?0.6:1}">
                    <div>
                        <b style="${done ? 'text-decoration:line-through; color:#94a3b8' : ''}">${t.nombre}</b>
                        <p style="font-size:0.85rem; color:#64748b; margin-top:4px;">${t.descripcion || 'Sin descripción'}</p>
                    </div>
                    ${done ? '<span class="material-icons" style="color:#22c55e">check_circle</span>' : 
                    `<button onclick="done('${doc.id}','${t.nombre}')" class="btn-cv" style="padding:10px; border-radius:50%; display:flex;"><span class="material-icons">done</span></button>`}
                </div>`;
            });
            container.innerHTML = html || '<p>No hay tareas hoy.</p>';
        }

        async function done(id, nombre) {
            if(!confirm(`¿Finalizaste ${nombre}?`)) return;
            await db.collection('historial').add({
                tareaId: id,
                colaboradorNombre: sessionStorage.getItem('userName'),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            loadTasks();
        }
        window.onload = () => setTimeout(loadTasks, 1000);
    </script>
</body>
</html>
