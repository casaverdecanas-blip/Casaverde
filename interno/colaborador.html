<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colaborador - Casa Verde</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body style="display:block; background:#f4f7f6;">
    <nav style="background:#2d5a27; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;">
        <span><b>CASA VERDE COLABORADORES</b></span>
        <button onclick="logout()" style="background:none; border:none; color:white;"><span class="material-icons">logout</span></button>
    </nav>

    <div style="padding:20px; max-width:500px; margin:0 auto;">
        <h2 id="saludoColab" style="color:#2d5a27; margin-bottom:15px;"></h2>
        <div id="listaTareas"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/auth-core.js"></script>
    <script>
        async function cargarTareas() {
            const container = document.getElementById('listaTareas');
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            
            document.getElementById('saludoColab').textContent = `Hola, ${sessionStorage.getItem('userName')}`;

            // Traemos tareas e historial de hoy simultáneamente
            const [tareasSnap, historialSnap] = await Promise.all([
                db.collection('tareas').where('activa', '==', true).get(),
                db.collection('historial').where('timestamp', '>=', hoy).get()
            ]);

            const hechasHoyIds = historialSnap.docs.map(d => d.data().tareaId);
            let html = '';

            tareasSnap.forEach(doc => {
                const t = doc.data();
                const terminada = hechasHoyIds.includes(doc.id);
                html += `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left:5px solid ${terminada ? '#ccc':'#2d5a27'}; opacity:${terminada ? 0.6 : 1}">
                        <div>
                            <b style="${terminada ? 'text-decoration:line-through; color:#999' : ''}">${t.nombre}</b>
                            <p style="font-size:0.8rem; color:#666">${t.descripcion || ''}</p>
                        </div>
                        ${terminada ? 
                            '<span class="material-icons" style="color:#27ae60">check_circle</span>' : 
                            `<button onclick="completar('${doc.id}', '${t.nombre}')" class="btn-cv" style="padding:8px; border-radius:50%; display:flex;"><span class="material-icons">done</span></button>`
                        }
                    </div>`;
            });
            container.innerHTML = html || '<p>No hay tareas pendientes.</p>';
        }

        async function completar(id, nombre) {
            if(!confirm(`¿Terminaste ${nombre}?`)) return;
            try {
                await db.collection('historial').add({
                    tareaId: id,
                    usuarioId: auth.currentUser.uid, // Guardamos el UID como en tu imagen
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                cargarTareas();
            } catch (e) { alert("Error al registrar"); }
        }
        window.onload = () => setTimeout(cargarTareas, 1000);
    </script>
</body>
</html>
