<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        input, select, textarea { width: 100%; padding: 8px; margin: 5px 0 15px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .task { background: #f9f9f9; padding: 10px; margin: 5px 0; border-left: 4px solid #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📋 Gestor de Tareas (Versión Simple)</h2>
        
        <!-- Login -->
        <div id="loginDiv">
            <h3>Login</h3>
            <input type="email" id="email" placeholder="Email" value="test@test.com">
            <input type="password" id="password" placeholder="Contraseña" value="123456">
            <button onclick="login()">Login / Registrarse</button>
            <div id="loginStatus"></div>
        </div>

        <!-- Área de tareas (oculta inicialmente) -->
        <div id="tasksDiv" style="display: none;">
            <h3>Usuario: <span id="userEmail"></span></h3>
            <button onclick="logout()" style="background: #e74c3c;">Cerrar sesión</button>
            
            <hr>
            
            <h4>Crear nueva tarea</h4>
            <input type="text" id="titulo" placeholder="Título" value="Tarea de prueba">
            <textarea id="descripcion" placeholder="Descripción"></textarea>
            <select id="prioridad">
                <option value="alta">Alta</option>
                <option value="media" selected>Media</option>
                <option value="baja">Baja</option>
            </select>
            <input type="date" id="fecha" value="2026-03-19">
            <button onclick="crearTarea()">Crear Tarea</button>
            
            <hr>
            
            <h4>Lista de tareas</h4>
            <div id="listaTareas"></div>
            
            <hr>
            
            <h4>Botón de prueba directa</h4>
            <button onclick="testDirecto()">Prueba Directa</button>
            <div id="testOutput"></div>
        </div>
    </div>

    <script>
        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDluIIBwIJVkO9DEX4ghJQYhzJAnXtQoKs",
            authDomain: "tatareas-d8a80.firebaseapp.com",
            projectId: "tatareas-d8a80",
            storageBucket: "tatareas-d8a80.firebasestorage.app",
            messagingSenderId: "709332495480",
            appId: "1:709332495480:web:7060b2c75984352354918d"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Elementos DOM
        const loginDiv = document.getElementById('loginDiv');
        const tasksDiv = document.getElementById('tasksDiv');
        const userEmail = document.getElementById('userEmail');
        const loginStatus = document.getElementById('loginStatus');
        const listaTareas = document.getElementById('listaTareas');

        // ============================================
        // AUTENTICACIÓN
        // ============================================
        auth.onAuthStateChanged((user) => {
            if (user) {
                loginDiv.style.display = 'none';
                tasksDiv.style.display = 'block';
                userEmail.textContent = user.email;
                cargarTareas();
            } else {
                loginDiv.style.display = 'block';
                tasksDiv.style.display = 'none';
            }
        });

        window.login = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
                loginStatus.textContent = '✅ Login exitoso';
            } catch (error) {
                if (error.code === 'auth/user-not-found') {
                    try {
                        await auth.createUserWithEmailAndPassword(email, password);
                        loginStatus.textContent = '✅ Usuario creado';
                    } catch (e) {
                        loginStatus.textContent = '❌ Error: ' + e.message;
                    }
                } else {
                    loginStatus.textContent = '❌ Error: ' + error.message;
                }
            }
        };

        window.logout = () => auth.signOut();

        // ============================================
        // CREAR TAREA (VERSIÓN SIMPLE)
        // ============================================
        window.crearTarea = async () => {
            if (!auth.currentUser) {
                alert('No hay usuario');
                return;
            }
            
            const tarea = {
                titulo: document.getElementById('titulo').value,
                descripcion: document.getElementById('descripcion').value,
                prioridad: document.getElementById('prioridad').value,
                fechaInicio: document.getElementById('fecha').value,
                activa: true,
                creadaPor: auth.currentUser.email,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            try {
                const docRef = await db.collection('tareas').add(tarea);
                alert('✅ Tarea creada con ID: ' + docRef.id);
                document.getElementById('titulo').value = '';
                document.getElementById('descripcion').value = '';
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        };

        // ============================================
        // CARGAR TAREAS
        // ============================================
        async function cargarTareas() {
            try {
                const snapshot = await db.collection('tareas')
                    .where('activa', '==', true)
                    .get();
                
                let html = '';
                snapshot.forEach(doc => {
                    const t = doc.data();
                    html += `
                        <div class="task">
                            <strong>${t.titulo}</strong><br>
                            <small>${t.descripcion || ''}</small><br>
                            <small>Prioridad: ${t.prioridad} | Fecha: ${t.fechaInicio}</small>
                        </div>
                    `;
                });
                
                listaTareas.innerHTML = html || '<p>No hay tareas</p>';
            } catch (error) {
                listaTareas.innerHTML = '❌ Error: ' + error.message;
            }
        }

        // ============================================
        // PRUEBA DIRECTA (LA MISMA QUE FUNCIONÓ)
        // ============================================
        window.testDirecto = async () => {
            const output = document.getElementById('testOutput');
            output.innerHTML = '🔄 Probando...';
            
            try {
                const docRef = await db.collection('tareas').add({
                    titulo: 'Tarea desde prueba directa',
                    fechaInicio: new Date().toISOString().split('T')[0],
                    prioridad: 'media',
                    activa: true,
                    test: true
                });
                
                output.innerHTML = '✅ Tarea creada: ' + docRef.id;
                cargarTareas(); // Recargar lista
            } catch (error) {
                output.innerHTML = '❌ Error: ' + error.message;
            }
        };
    </script>
</body>
</html>
