<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <h2>🔧 Test Mínimo</h2>
    <button onclick="testMinimo()">Probar Firebase</button>
    <div id="resultado" style="margin-top: 20px; padding: 10px; background: #f0f0f0;"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDluIIBwIJVkO9DEX4ghJQYhzJAnXtQoKs",
            authDomain: "tatareas-d8a80.firebaseapp.com",
            projectId: "tatareas-d8a80",
            storageBucket: "tatareas-d8a80.firebasestorage.app",
            messagingSenderId: "709332495480",
            appId: "1:709332495480:web:7060b2c75984352354918d"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.testMinimo = async () => {
            const resultado = document.getElementById('resultado');
            resultado.innerHTML = '🔄 Probando...';
            
            try {
                // Test 1: Escribir un documento
                const docRef = await db.collection('test').add({
                    mensaje: 'Hola Mundo',
                    timestamp: new Date().toISOString()
                });
                
                resultado.innerHTML += '<br>✅ Test 1: Escritura OK - ID: ' + docRef.id;
                
                // Test 2: Leer el documento
                const doc = await db.collection('test').doc(docRef.id).get();
                
                if (doc.exists) {
                    resultado.innerHTML += '<br>✅ Test 2: Lectura OK - Datos: ' + JSON.stringify(doc.data());
                } else {
                    resultado.innerHTML += '<br>❌ Test 2: No se encontró el documento';
                }
                
                // Test 3: Intentar crear en colección tareas
                const tareaRef = await db.collection('tareas').add({
                    titulo: 'Tarea de prueba',
                    fechaInicio: new Date().toISOString().split('T')[0],
                    prioridad: 'media',
                    recurrencia: 'none',
                    activa: true
                });
                
                resultado.innerHTML += '<br>✅ Test 3: Tarea creada - ID: ' + tareaRef.id;
                
            } catch (error) {
                resultado.innerHTML += '<br>❌ ERROR: ' + error.message;
                console.error('Error completo:', error);
            }
        };
    </script>
</body>
</html>
