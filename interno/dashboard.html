<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Casa Verde Canas</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f7fa; }
        .admin-header { background: #2d5a27; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .admin-header h1 { display: flex; align-items: center; gap: 10px; font-size: 1.3rem; }
        .user-info { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.2); padding: 6px 15px; border-radius: 40px; }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 30px; cursor: pointer; }
        .admin-nav { background: white; padding: 0 25px; display: flex; gap: 5px; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
        .nav-item { padding: 14px 20px; background: none; border: none; cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; color: #6c757d; }
        .nav-item.active { color: #2d5a27; border-bottom: 3px solid #2d5a27; }
        .admin-content { max-width: 1400px; margin: 30px auto; padding: 0 25px; }
        .panel { display: none; }
        .panel.active { display: block; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h2 { color: #2d5a27; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e8f5e9; padding-bottom: 12px; font-size: 1.2rem; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: white; padding: 20px; border-radius: 16px; text-align: center; border-left: 4px solid #2d5a27; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .kpi-number { font-size: 32px; font-weight: bold; color: #2d5a27; }
        .kpi-label { color: #6c757d; margin-top: 5px; font-size: 14px; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
<div id="loginContainer" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div style="background:white; padding:40px; border-radius:24px; width:350px; text-align:center;">
        <h2 style="color:#2d5a27;">📊 Admin</h2>
        <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin:10px 0;">
        <input type="password" id="password" placeholder="Contraseña" style="width:100%; padding:12px; margin:10px 0;">
        <button onclick="login()" style="width:100%; padding:12px; background:#2d5a27; color:white; border:none; border-radius:12px;">Ingresar</button>
        <div id="loginError" style="color:red; margin-top:10px;"></div>
    </div>
</div>
<div id="mainPanel" style="display:none;">
    <div class="admin-header">
        <h1><span class="material-icons">dashboard</span> Dashboard Admin</h1>
        <div class="user-info"><span id="userName"></span><button class="logout-btn" onclick="logout()">Salir</button></div>
    </div>
    <div class="admin-nav">
        <button class="nav-item active" data-tab="dashboard">Dashboard</button>
        <button class="nav-item" data-tab="reservas">Reservas</button>
        <button class="nav-item" data-tab="presupuestos">Presupuestos</button>
        <button class="nav-item" data-tab="tareas">Tareas</button>
        <button class="nav-item" data-tab="cabanas">Cabañas</button>
        <button class="nav-item" data-tab="clientes">Clientes</button>
        <button class="nav-item" data-tab="pagos">Pagos</button>
        <button class="nav-item" data-tab="calendario">Calendario</button>
    </div>
    <div class="admin-content">
        <div id="dashboardPanel" class="panel active"><div class="card"><h2>Resumen</h2><div class="kpi-grid" id="kpis"></div></div><div class="card"><h2>Próximos check-ins</h2><div id="proximosCheckins"></div></div></div>
        <div id="reservasPanel" class="panel"><div class="card"><h2>Reservas</h2><div id="reservasList"></div></div></div>
        <div id="presupuestosPanel" class="panel"><div class="card"><h2>Presupuestos</h2><div id="presupuestosList"></div></div></div>
        <div id="tareasPanel" class="panel"><div class="card"><h2>Tareas</h2><div id="tareasList"></div></div></div>
        <div id="cabanasPanel" class="panel"><div class="card"><h2>Cabañas</h2><div id="cabanasList"></div></div></div>
        <div id="clientesPanel" class="panel"><div class="card"><h2>Clientes</h2><div id="clientesList"></div></div></div>
        <div id="pagosPanel" class="panel"><div class="card"><h2>Pagos</h2><div id="pagosList"></div></div></div>
        <div id="calendarioPanel" class="panel"><div class="card"><h2>Calendario de ocupación</h2><div id="calendar"></div></div></div>
    </div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4", authDomain: "casaverdecanas-199.firebaseapp.com", projectId: "casaverdecanas-199" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUser = null;

    async function login() {
        const email = document.getElementById('email').value, password = document.getElementById('password').value, errorDiv = document.getElementById('loginError');
        try {
            const cred = await auth.signInWithEmailAndPassword(email, password);
            const userDoc = await db.collection('usuarios').doc(cred.user.uid).get();
            if (userDoc.exists && userDoc.data().rol === 'admin') {
                currentUser = cred.user;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                document.getElementById('userName').textContent = userDoc.data().nombre || email;
                cargarDatos();
            } else errorDiv.textContent = 'No eres administrador';
        } catch(e) { errorDiv.textContent = 'Error: ' + e.message; }
    }
    function logout() { auth.signOut().then(() => location.reload()); }
    async function cargarDatos() {
        const reservasSnap = await db.collection('reservas').get();
        const tareasSnap = await db.collection('tareas').get();
        const cabanasSnap = await db.collection('cabanas').get();
        const clientesSnap = await db.collection('clientes').get();
        const pagosSnap = await db.collection('pagos').get();
        document.getElementById('kpis').innerHTML = `
            <div class="kpi-card"><div class="kpi-number">${reservasSnap.size}</div><div class="kpi-label">Reservas</div></div>
            <div class="kpi-card"><div class="kpi-number">${tareasSnap.docs.filter(d=>!d.data().completada).length}</div><div class="kpi-label">Tareas pendientes</div></div>
            <div class="kpi-card"><div class="kpi-number">${cabanasSnap.size}</div><div class="kpi-label">Cabañas</div></div>
            <div class="kpi-card"><div class="kpi-number">${clientesSnap.size}</div><div class="kpi-label">Clientes</div></div>
        `;
        const hoy = new Date();
        const proximos = reservasSnap.docs.filter(d => d.data().checkIn?.toDate?.() >= hoy).slice(0,5);
        document.getElementById('proximosCheckins').innerHTML = proximos.length ? proximos.map(d=>`<div>${d.data().nombre} - ${d.data().checkIn.toDate().toLocaleDateString()}</div>`).join('') : '<div class="empty-state">Sin próximos check-ins</div>';
        document.getElementById('reservasList').innerHTML = reservasSnap.docs.map(d=>`<div>${d.data().nombre} - ${d.data().caba}</div>`).join('');
        document.getElementById('tareasList').innerHTML = tareasSnap.docs.map(d=>`<div>${d.data().nombre} - ${d.data().completada ? '✅' : '⏳'}</div>`).join('');
        document.getElementById('cabanasList').innerHTML = cabanasSnap.docs.map(d=>`<div>${d.data().nombre?.es || d.id}</div>`).join('');
        document.getElementById('clientesList').innerHTML = clientesSnap.docs.map(d=>`<div>${d.data().nombre}</div>`).join('');
        document.getElementById('pagosList').innerHTML = pagosSnap.docs.map(d=>`<div>R$ ${d.data().monto}</div>`).join('');
    }
    document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>{
        document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`${btn.dataset.tab}Panel`).classList.add('active');
    }));
    auth.onAuthStateChanged(user=>{if(user)login();});
</script>
</body>
</html>
