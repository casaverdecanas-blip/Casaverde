<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CasaVerdeCanas</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin-style.css">
    
    <style>
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .kpi-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 4px solid #2d5a27;
        }
        .kpi-number {
            font-size: 32px;
            font-weight: bold;
            color: #2d5a27;
        }
        .kpi-label {
            color: #6c757d;
            margin-top: 5px;
        }
        .recent-item {
            padding: 12px 0;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
    </style>
</head>
<body>

<div id="loginContainer" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #1e3c2c 0%, #2d5a27 100%);">
    <div style="background: white; padding: 40px; border-radius: 24px; width: 350px; text-align: center;">
        <h2 style="color: #2d5a27;">📊 Dashboard</h2>
        <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:12px;">
        <input type="password" id="password" placeholder="Contraseña" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:12px;">
        <button onclick="login()" style="width:100%; padding:12px; background:#2d5a27; color:white; border:none; border-radius:12px;">Ingresar</button>
        <div id="loginError" style="color:red; margin-top:10px;"></div>
    </div>
</div>

<div id="mainPanel" style="display: none;">
    <div class="admin-header">
        <h1><span class="material-icons">dashboard</span> Dashboard</h1>
        <div class="user-info">
            <span class="material-icons">account_circle</span>
            <span id="userEmail"></span>
            <button class="logout-btn" onclick="logout()"><span class="material-icons">logout</span> Salir</button>
        </div>
    </div>
    
    <div class="admin-nav">
        <a href="dashboard.html" class="nav-item active"><span class="material-icons">dashboard</span> Dashboard</a>
        <a href="calendario.html" class="nav-item"><span class="material-icons">calendar_month</span> Calendario</a>
        <a href="reservas.html" class="nav-item"><span class="material-icons">add_circle</span> Nueva Reserva</a>
        <a href="clientes.html" class="nav-item"><span class="material-icons">people</span> Clientes</a>
        <a href="pagos.html" class="nav-item"><span class="material-icons">payments</span> Pagos</a>
    </div>
    
    <div class="admin-content">
        <div class="kpi-grid" id="kpiContainer">
            <div class="kpi-card"><div class="kpi-number">-</div><div class="kpi-label">Total Reservas</div></div>
            <div class="kpi-card"><div class="kpi-number">-</div><div class="kpi-label">Reservas Activas</div></div>
            <div class="kpi-card"><div class="kpi-number">-</div><div class="kpi-label">Clientes</div></div>
            <div class="kpi-card"><div class="kpi-number">-</div><div class="kpi-label">Pagos (BRL)</div></div>
        </div>
        
        <div class="card">
            <h2><span class="material-icons">event</span> Próximos Check-ins</h2>
            <div id="proximosCheckins"></div>
        </div>
        
        <div class="card">
            <h2><span class="material-icons">receipt</span> Últimos Pagos</h2>
            <div id="ultimosPagos"></div>
        </div>
    </div>
</div>

<script src="/js/auth-core.js"></script>
<script>
    async function cargarDashboard() {
        // Reservas
        const reservasSnap = await db.collection('reservas').get();
        const reservasActivas = await db.collection('reservas').where('checkOut', '>=', new Date()).get();
        
        // Clientes
        const clientesSnap = await db.collection('clientes').get();
        
        // Pagos
        const pagosSnap = await db.collection('pagos').get();
        let totalPagosBRL = 0;
        pagosSnap.forEach(p => {
            const data = p.data();
            if (data.moneda === 'BRL') totalPagosBRL += data.monto;
            else totalPagosBRL += (data.monto * data.tipoCambio);
        });
        
        document.getElementById('kpiContainer').innerHTML = `
            <div class="kpi-card"><div class="kpi-number">${reservasSnap.size}</div><div class="kpi-label">Total Reservas</div></div>
            <div class="kpi-card"><div class="kpi-number">${reservasActivas.size}</div><div class="kpi-label">Reservas Activas</div></div>
            <div class="kpi-card"><div class="kpi-number">${clientesSnap.size}</div><div class="kpi-label">Clientes</div></div>
            <div class="kpi-card"><div class="kpi-number">R$ ${totalPagosBRL.toFixed(0)}</div><div class="kpi-label">Pagos (BRL)</div></div>
        `;
        
        // Próximos check-ins
        const hoy = new Date();
        const proximos = [];
        reservasSnap.forEach(doc => {
            const r = doc.data();
            const checkIn = r.checkIn?.toDate?.() || new Date(r.checkIn);
            if (checkIn >= hoy) proximos.push({ ...r, checkIn });
        });
        proximos.sort((a, b) => a.checkIn - b.checkIn);
        
        const container = document.getElementById('proximosCheckins');
        if (proximos.length === 0) {
            container.innerHTML = '<div class="empty-state">📭 No hay check-ins próximos</div>';
        } else {
            container.innerHTML = proximos.slice(0, 10).map(r => `
                <div class="recent-item">
                    <span><strong>${escapeHtml(r.nombre)}</strong> - Cabaña ${r.caba}</span>
                    <span>📅 ${formatDate(r.checkIn)}</span>
                </div>
            `).join('');
        }
        
        // Últimos pagos
        const pagos = [];
        pagosSnap.forEach(doc => pagos.push({ id: doc.id, ...doc.data() }));
        pagos.sort((a, b) => (b.creadoEn?.toDate?.() || 0) - (a.creadoEn?.toDate?.() || 0));
        
        const pagosContainer = document.getElementById('ultimosPagos');
        if (pagos.length === 0) {
            pagosContainer.innerHTML = '<div class="empty-state">💰 No hay pagos registrados</div>';
        } else {
            pagosContainer.innerHTML = pagos.slice(0, 10).map(p => {
                const montoStr = p.moneda === 'USD' ? `USD ${p.monto.toFixed(2)}` : `R$ ${p.monto.toFixed(2)}`;
                return `
                    <div class="recent-item">
                        <span><strong>${escapeHtml(p.clienteNombre)}</strong> - ${p.tipo}</span>
                        <span>${montoStr} | ${p.metodo}</span>
                    </div>
                `;
            }).join('');
        }
    }
    
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('loginError');
        const result = await loginAdmin(email, password);
        if (result.success) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            document.getElementById('userEmail').textContent = result.user.email;
            cargarDashboard();
        } else {
            errorDiv.textContent = result.error;
        }
    }
    
    async function logout() {
        await logoutAdmin();
        window.location.reload();
    }
    
    checkAdmin().then(isAdmin => {
        if (isAdmin) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            document.getElementById('userEmail').textContent = currentUser.email;
            cargarDashboard();
        }
    });
    
    window.login = login;
    window.logout = logout;
</script>
</body>
</html>
