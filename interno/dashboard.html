<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin - Casa Verde</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="sidebar">
        <h2><span class="material-icons">park</span> Casa Verde</h2>
        <a href="dashboard.html" class="nav-link active"><span class="material-icons">dashboard</span> Dashboard</a>
        <a href="reservas.html" class="nav-link"><span class="material-icons">event</span> Reservas</a>
        <a href="clientes.html" class="nav-link"><span class="material-icons">groups</span> Clientes</a>
        <button onclick="logout()" class="nav-link" style="background:none; border:none; width:100%; cursor:pointer; color:#f87171;"><span class="material-icons">logout</span> Salir</button>
    </div>

    <div class="main-content">
        <h1>Resumen de Operaciones</h1>
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin:25px 0;">
            <div class="card"><h3>Tareas Hoy</h3><h2 id="taskCount" style="color:var(--primary)">0/0</h2></div>
            <div class="card"><h3>Arribos</h3><h2 style="color:var(--primary)">2</h2></div>
            <div class="card"><h3>Ocupación</h3><h2 style="color:var(--primary)">66%</h2></div>
        </div>

        <div class="card">
            <h3>Actividad de Colaboradores (Hoy)</h3>
            <table style="margin-top:15px;">
                <thead><tr><th>Tarea</th><th>Estado</th><th>Colaborador</th><th>Hora</th></tr></thead>
                <tbody id="monitorBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/auth-core.js"></script>
    <script>
        async function updateMonitor() {
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            const [tareas, hechos] = await Promise.all([
                db.collection('tareas').where('activa','==',true).get(),
                db.collection('historial').where('timestamp','>=',hoy).get()
            ]);

            const hechosData = hechos.docs.map(d => d.data());
            let html = '';
            let count = 0;

            tareas.forEach(doc => {
                const h = hechosData.find(d => d.tareaId === doc.id);
                if(h) count++;
                html += `<tr>
                    <td><b>${doc.data().nombre}</b></td>
                    <td>${h ? '<span style="color:#22c55e">✅ Hecho</span>' : '<span style="color:#f87171">⏳ Pendiente</span>'}</td>
                    <td>${h ? h.colaboradorNombre : '--'}</td>
                    <td>${h ? h.timestamp.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--'}</td>
                </tr>`;
            });
            document.getElementById('monitorBody').innerHTML = html;
            document.getElementById('taskCount').textContent = `${count}/${tareas.size}`;
        }
        window.onload = () => setTimeout(updateMonitor, 1000);
    </script>
</body>
</html>
