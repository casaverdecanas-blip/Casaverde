<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Casa Verde</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .alerta-roja { background-color: #fee2e2 !important; }
        .modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); z-index:1000; width:400px; background:white; padding:20px; border-radius:15px; box-shadow:0 0 20px rgba(0,0,0,0.3); }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Casa Verde</h2>
        <a href="dashboard.html" class="nav-link active"><span class="material-icons">dashboard</span> Dashboard</a>
        <a href="clientes.html" class="nav-link"><span class="material-icons">people</span> Clientes</a>
        <button onclick="logout()" class="nav-link" style="background:none; border:none; width:100%; color:#f87171; cursor:pointer; margin-top:auto;"><span class="material-icons">logout</span> Salir</button>
    </div>

    <div class="main-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Mantenimiento</h1>
            <button class="btn-cv" onclick="abrirModal()"><span class="material-icons">add</span> Nueva Tarea</button>
        </div>

        <div class="card" style="margin-top:20px;">
            <table>
                <thead>
                    <tr><th>Tarea</th><th>Frecuencia</th><th>Última vez</th><th>Por</th><th>Acciones</th></tr>
                </thead>
                <tbody id="monitorBody"></tbody>
            </table>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="cerrarModal()"></div>
    <div class="modal" id="modalTarea">
        <h3 id="modalTitle">Tarea</h3>
        <input type="hidden" id="editId">
        <input type="text" id="taskName" placeholder="Nombre" style="width:100%; margin:10px 0; padding:8px;">
        <input type="number" id="taskRec" placeholder="Recurrencia (días)" style="width:100%; margin:10px 0; padding:8px;">
        <textarea id="taskDesc" placeholder="Descripción" style="width:100%; margin:10px 0; padding:8px;"></textarea>
        <button onclick="guardarTarea()" class="btn-cv" style="width:100%">Guardar</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/auth-core.js"></script>
    <script>
        async function updateMonitor() {
            const [tareasSnap, historialSnap] = await Promise.all([
                db.collection('tareas').where('activa', '==', true).get(),
                db.collection('historial').orderBy('timestamp', 'desc').get()
            ]);
            const historial = historialSnap.docs.map(d => d.data());
            const ahora = new Date();
            let html = '';

            tareasSnap.forEach(doc => {
                const t = doc.data();
                const ultimo = historial.find(h => h.tareaId === doc.id);
                let fechaTxt = "Nunca";
                let quien = "--";
                let roja = true;

                if (ultimo) {
                    fechaTxt = ultimo.timestamp.toDate().toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'});
                    quien = ultimo.colaboradorNombre || "Admin";
                    const diff = (ahora - ultimo.timestamp.toDate()) / (1000 * 60 * 60 * 24);
                    if (diff < (t.recurrencia || 1)) roja = false;
                }

                html += `<tr class="${roja ? 'alerta-roja' : ''}">
                    <td><b>${t.nombre}</b></td>
                    <td>Cada ${t.recurrencia} d</td>
                    <td>${fechaTxt}</td>
                    <td>${quien}</td>
                    <td>
                        <button onclick="abrirModal('${doc.id}', '${t.nombre}', ${t.recurrencia}, '${t.descripcion}')"><span class="material-icons">edit</span></button>
                        <button onclick="eliminar('${doc.id}')"><span class="material-icons">delete</span></button>
                    </td>
                </tr>`;
            });
            document.getElementById('monitorBody').innerHTML = html;
        }

        function abrirModal(id='', nom='', rec=1, desc='') {
            document.getElementById('editId').value = id;
            document.getElementById('taskName').value = nom;
            document.getElementById('taskRec').value = rec;
            document.getElementById('taskDesc').value = desc;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modalTarea').style.display = 'block';
        }

        function cerrarModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('modalTarea').style.display = 'none';
        }

        async function guardarTarea() {
            const id = document.getElementById('editId').value;
            const data = {
                nombre: document.getElementById('taskName').value,
                recurrencia: parseInt(document.getElementById('taskRec').value),
                descripcion: document.getElementById('taskDesc').value,
                activa: true,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };
            if(id) await db.collection('tareas').doc(id).update(data);
            else await db.collection('tareas').add(data);
            cerrarModal(); updateMonitor();
        }

        async function eliminar(id) {
            if(confirm("¿Eliminar?")) {
                await db.collection('tareas').doc(id).update({activa:false});
                updateMonitor();
            }
        }

        window.onload = () => setTimeout(updateMonitor, 1000);
    </script>
</body>
</html>
