<!DOCTYPE html>
<html>
<head>
    <title>Admin - Casa Verde</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="sidebar">
        <h2>Casa Verde</h2>
        <a href="dashboard.html" class="nav-link active"><span class="material-icons">dashboard</span> Resumen</a>
        <a href="reservas.html" class="nav-link"><span class="material-icons">event</span> Reservas</a>
        <a href="clientes.html" class="nav-link"><span class="material-icons">people</span> Clientes</a>
        <button onclick="logout()" class="nav-link" style="background:none; border:none; width:100%; cursor:pointer; color:#ff8a80;"><span class="material-icons">logout</span> Salir</button>
    </div>

    <div class="main-content">
        <h1>Monitor de Operaciones</h1>
        <div class="card" style="margin-top:20px;">
            <h3>Tareas Realizadas Hoy</h3>
            <table style="width:100%; margin-top:15px;">
                <thead><tr><th>Actividad</th><th>Estado</th><th>Hora</th></tr></thead>
                <tbody id="monitorBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/auth-core.js"></script>
    <script>
        async function updateAdminView() {
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            
            const [tareasSnap, historialSnap] = await Promise.all([
                db.collection('tareas').where('activa','==',true).get(),
                db.collection('historial').where('timestamp','>=',hoy).get()
            ]);

            const hechos = historialSnap.docs.map(d => d.data());
            let html = '';

            tareasSnap.forEach(doc => {
                const registro = hechos.find(h => h.tareaId === doc.id);
                html += `<tr>
                    <td><b>${doc.data().nombre}</b></td>
                    <td>${registro ? '<span style="color:#27ae60">✅ Hecho</span>' : '<span style="color:#e74c3c">⏳ Pendiente</span>'}</td>
                    <td>${registro ? registro.timestamp.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--'}</td>
                </tr>`;
            });
            document.getElementById('monitorBody').innerHTML = html;
        }
        window.onload = () => setTimeout(updateAdminView, 1000);
    </script>
</body>
</html>
