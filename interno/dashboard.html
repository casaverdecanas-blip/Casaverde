<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Casa Verde</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { display: flex; margin: 0; background: #f4f7f6; font-family: sans-serif; }
        .sidebar { width: 250px; position: fixed; height: 100vh; background: #2d5a27; color: white; z-index: 100; }
        .main-content { margin-left: 260px; width: calc(100% - 280px); padding: 20px; }
        
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        .btn-edit { background: #3b82f6; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; margin-left: 5px; }
        
        .alerta-roja { background-color: #fee2e2 !important; border-left: 4px solid #ef4444; }
        .modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); z-index:1001; width:400px; background:white; padding:30px; border-radius:15px; box-shadow:0 0 40px rgba(0,0,0,0.4); }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; }
        
        #filtroColab { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 1rem; }
        .historial-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: white; margin-bottom: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="text-align:center; padding:20px;">Casa Verde</h2>
        <a href="dashboard.html" class="nav-link active"><span class="material-icons">dashboard</span> Tareas</a>
        <a href="calendario.html" class="nav-link"><span class="material-icons">calendar_view_day</span> Ocupación</a>
        <a href="reservas.html" class="nav-link"><span class="material-icons">list</span> Reservas</a>
        <a href="clientes.html" class="nav-link"><span class="material-icons">people</span> Clientes</a>
        <button onclick="logout()" class="nav-link" style="background:none; border:none; width:100%; color:#f87171; cursor:pointer; margin-top:auto; text-align:left; padding:15px;"><span class="material-icons">logout</span> Salir</button>
    </div>

    <div class="main-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h1>Panel de Operaciones</h1>
            <button class="btn-cv" onclick="abrirModal()" style="padding: 12px 20px;"><span class="material-icons">add</span> NUEVA TAREA</button>
        </div>

        <div class="card">
            <h3>Monitor de Mantenimiento</h3>
            <table>
                <thead>
                    <tr><th>Tarea</th><th>Frecuencia</th><th>Última vez</th><th>Responsable</th><th>Acciones</th></tr>
                </thead>
                <tbody id="monitorBody"></tbody>
            </table>
        </div>

        <div class="card" style="margin-top:30px;">
            <h3><span class="material-icons" style="vertical-align:middle">history</span> Historial por Colaborador</h3>
            <select id="filtroColab" onchange="cargarHistorialColaborador()">
                <option value="">Selecciona un colaborador...</option>
            </select>
            <div id="listaHistorialIndividual" style="max-height: 300px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 8px;">
                <p style="text-align:center; color:#999;">Selecciona a alguien para ver su actividad...</p>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="cerrarModal()"></div>
    <div class="modal" id="modalTarea">
        <h3 id="modalTitle">Configurar Tarea</h3>
        <input type="hidden" id="editId">
        <label>Nombre:</label>
        <input type="text" id="taskName" style="width:100%; padding:10px; margin:10px 0;">
        <label>Días para repetir:</label>
        <input type="number" id="taskRec" value="1" style="width:100%; padding:10px; margin:10px 0;">
        <label>Notas:</label>
        <textarea id="taskDesc" style="width:100%; padding:10px; margin:10px 0; height:60px;"></textarea>
        <button onclick="guardarTarea()" class="btn-cv" style="width:100%; padding:12px; margin-top:10px;">GUARDAR</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/auth-core.js"></script>

    <script>
        async function loadDashboard() {
            const ahora = new Date();
            const [tSnap, hSnap] = await Promise.all([
                db.collection('tareas').where('activa', '==', true).get(),
                db.collection('historial').orderBy('timestamp', 'desc').get()
            ]);

            const historial = hSnap.docs.map(d => d.data());
            
            // Render Tabla
            let html = '';
            tSnap.forEach(doc => {
                const t = doc.data();
                const ultimo = historial.find(h => h.tareaId === doc.id);
                let vencida = true;
                if (ultimo && ultimo.timestamp) {
                    const diff = (ahora - ultimo.timestamp.toDate()) / (1000 * 60 * 60 * 24);
                    if (diff < (t.recurrencia || 1)) vencida = false;
                }

                html += `<tr class="${vencida ? 'alerta-roja' : ''}">
                    <td><b>${t.nombre}</b></td>
                    <td>Cada ${t.recurrencia}d</td>
                    <td>${ultimo ? ultimo.timestamp.toDate().toLocaleDateString() : '⚠️ Pendiente'}</td>
                    <td>${ultimo ? (ultimo.colaboradorNombre || 'Staff') : '--'}</td>
                    <td>
                        <button class="btn-edit" onclick="abrirModal('${doc.id}','${t.nombre}',${t.recurrencia},'${t.descripcion}')"><span class="material-icons">edit</span></button>
                        <button class="btn-delete" onclick="eliminarTarea('${doc.id}')"><span class="material-icons">delete</span></button>
                    </td>
                </tr>`;
            });
            document.getElementById('monitorBody').innerHTML = html;

            // Llenar Filtro
            const nombres = [...new Set(historial.map(h => h.colaboradorNombre).filter(n => n))];
            let options = '<option value="">Selecciona un colaborador...</option>';
            nombres.forEach(n => options += `<option value="${n}">${n}</option>`);
            document.getElementById('filtroColab').innerHTML = options;
        }

        async function cargarHistorialColaborador() {
            const nombre = document.getElementById('filtroColab').value;
            const container = document.getElementById('listaHistorialIndividual');
            if(!nombre) return;

            const [hSnap, tSnap] = await Promise.all([
                db.collection('historial').where('colaboradorNombre', '==', nombre).get(),
                db.collection('tareas').get()
            ]);

            const nombresT = {}; tSnap.forEach(d => nombresT[d.id] = d.data().nombre);
            const regs = hSnap.docs.map(d => d.data()).sort((a,b) => (b.timestamp?.toDate() || 0) - (a.timestamp?.toDate() || 0));

            container.innerHTML = regs.map(h => `
                <div class="historial-item">
                    <span><b>${nombresT[h.tareaId] || 'Tarea'}</b></span>
                    <small>${h.timestamp ? h.timestamp.toDate().toLocaleString() : '--'}</small>
                </div>
            `).join('') || '<p>Sin registros.</p>';
        }

        function abrirModal(id='', n='', r=1, d='') {
            document.getElementById('editId').value = id;
            document.getElementById('taskName').value = n;
            document.getElementById('taskRec').value = r;
            document.getElementById('taskDesc').value = d;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modalTarea').style.display = 'block';
        }

        function cerrarModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('modalTarea').style.display = 'none'; }

        async function guardarTarea() {
            const id = document.getElementById('editId').value;
            const data = {
                nombre: document.getElementById('taskName').value,
                recurrencia: parseInt(document.getElementById('taskRec').value) || 1,
                descripcion: document.getElementById('taskDesc').value,
                activa: true,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };
            if(id) await db.collection('tareas').doc(id).update(data);
            else await db.collection('tareas').add(data);
            cerrarModal(); loadDashboard();
        }

        async function eliminarTarea(id) {
            if(confirm("¿Eliminar tarea?")) { await db.collection('tareas').doc(id).update({activa:false}); loadDashboard(); }
        }

        window.onload = () => setTimeout(loadDashboard, 1000);
    </script>
</body>
</html>
