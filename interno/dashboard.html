<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Casa Verde</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .alerta-roja { background-color: #fee2e2 !important; }
        .modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); z-index:1000; width:400px; background:white; padding:20px; border-radius:15px; box-shadow:0 0 20px rgba(0,0,0,0.3); }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Casa Verde</h2>
        <a href="dashboard.html" class="nav-link active"><span class="material-icons">dashboard</span> Tareas</a>
        <a href="reservas.html" class="nav-link"><span class="material-icons">event_available</span> Reservas</a>
        <a href="clientes.html" class="nav-link"><span class="material-icons">people</span> Clientes</a>
        <button onclick="logout()" class="nav-link" style="background:none; border:none; width:100%; color:#f87171; cursor:pointer; margin-top:auto;"><span class="material-icons">logout</span> Salir</button>
    </div>

    <div class="main-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Mantenimiento y Tareas</h1>
            <button class="btn-cv" onclick="abrirModal()"><span class="material-icons">add</span> Nueva Tarea</button>
        </div>

        <div class="card" style="margin-top:20px;">
            <table>
                <thead><tr><th>Tarea</th><th>Frecuencia</th><th>Última vez</th><th>Por</th><th>Acciones</th></tr></thead>
                <tbody id="monitorBody"></tbody>
            </table>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:40px;">
            <div class="card">
                <h3><span class="material-icons">analytics</span> Desempeño Colaboradores</h3>
                <table id="rankingBody"></table>
            </div>
            <div class="card">
                <h3><span class="material-icons">warning</span> Alerta Olvidadas</h3>
                <table id="olvidadasBody"></table>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="cerrarModal()"></div>
    <div class="modal" id="modalTarea">
        <h3 id="modalTitle">Tarea</h3>
        <input type="hidden" id="editId">
        <input type="text" id="taskName" placeholder="Nombre" style="width:100%; margin:10px 0; padding:8px;">
        <input type="number" id="taskRec" placeholder="Recurrencia (días)" style="width:100%; margin:10px 0; padding:8px;">
        <textarea id="taskDesc" placeholder="Descripción" style="width:100%; margin:10px 0; padding:8px;"></textarea>
        <button onclick="guardarTarea()" class="btn-cv" style="width:100%">Guardar</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/auth-core.js"></script>
    <script>
        async function loadAll() {
            const [tSnap, hSnap] = await Promise.all([
                db.collection('tareas').where('activa', '==', true).get(),
                db.collection('historial').orderBy('timestamp', 'desc').get()
            ]);
            const hist = hSnap.docs.map(d => d.data());
            const ahora = new Date();
            
            // Monitor Principal
            let html = '';
            tSnap.forEach(doc => {
                const t = doc.data();
                const u = hist.find(h => h.tareaId === doc.id);
                let roja = true;
                if (u) {
                    const diff = (ahora - u.timestamp.toDate()) / (1000 * 60 * 60 * 24);
                    if (diff < (t.recurrencia || 1)) roja = false;
                }
                html += `<tr class="${roja ? 'alerta-roja' : ''}">
                    <td><b>${t.nombre}</b></td>
                    <td>Cada ${t.recurrencia}d</td>
                    <td>${u ? u.timestamp.toDate().toLocaleDateString() : 'Nunca'}</td>
                    <td>${u ? (u.colaboradorNombre || 'Admin') : '--'}</td>
                    <td><button onclick="abrirModal('${doc.id}','${t.nombre}',${t.recurrencia},'${t.descripcion}')">E</button></td>
                </tr>`;
            });
            document.getElementById('monitorBody').innerHTML = html;

            // Reportes
            const des = {}; hist.forEach(r => { let n = r.colaboradorNombre || 'Sist'; des[n] = (des[n] || 0) + 1; });
            document.getElementById('rankingBody').innerHTML = Object.entries(des).map(([n,v]) => `<tr><td>${n}</td><td>${v}</td></tr>`).join('');
        }
        function abrirModal(id='',n='',r=1,d=''){ 
            document.getElementById('editId').value=id; document.getElementById('taskName').value=n;
            document.getElementById('taskRec').value=r; document.getElementById('taskDesc').value=d;
            document.getElementById('overlay').style.display='block'; document.getElementById('modalTarea').style.display='block';
        }
        function cerrarModal(){ document.getElementById('overlay').style.display='none'; document.getElementById('modalTarea').style.display='none'; }
        async function guardarTarea(){
            const id = document.getElementById('editId').value;
            const data = { nombre: document.getElementById('taskName').value, recurrencia: parseInt(document.getElementById('taskRec').value), descripcion: document.getElementById('taskDesc').value, activa: true, timestamp: firebase.firestore.FieldValue.serverTimestamp() };
            if(id) await db.collection('tareas').doc(id).update(data); else await db.collection('tareas').add(data);
            cerrarModal(); loadAll();
        }
        window.onload = () => setTimeout(loadAll, 1000);
    </script>
</body>
</html>
