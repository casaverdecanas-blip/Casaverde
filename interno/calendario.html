<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - CasaVerdeCanas</title>
    
    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin-style.css">
</head>
<body>

<div id="loginContainer" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #1e3c2c 0%, #2d5a27 100%);">
    <div style="background: white; padding: 40px; border-radius: 24px; width: 350px; text-align: center;">
        <h2 style="color: #2d5a27; margin-bottom: 20px;">🗓️ Calendario</h2>
        <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:12px;">
        <input type="password" id="password" placeholder="Contraseña" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:12px;">
        <button onclick="login()" style="width:100%; padding:12px; background:#2d5a27; color:white; border:none; border-radius:12px; cursor:pointer;">Ingresar</button>
        <div id="loginError" style="color:red; margin-top:10px;"></div>
    </div>
</div>

<div id="mainPanel" style="display: none;">
    <div class="admin-header">
        <h1><span class="material-icons">calendar_month</span> Calendario de Ocupación</h1>
        <div class="user-info">
            <span class="material-icons">account_circle</span>
            <span id="userEmail"></span>
            <button class="logout-btn" onclick="logout()"><span class="material-icons">logout</span> Salir</button>
        </div>
    </div>
    
    <div class="admin-nav">
        <a href="dashboard.html" class="nav-item"><span class="material-icons">dashboard</span> Dashboard</a>
        <a href="calendario.html" class="nav-item active"><span class="material-icons">calendar_month</span> Calendario</a>
        <a href="reservas.html" class="nav-item"><span class="material-icons">add_circle</span> Nueva Reserva</a>
        <a href="clientes.html" class="nav-item"><span class="material-icons">people</span> Clientes</a>
        <a href="pagos.html" class="nav-item"><span class="material-icons">payments</span> Pagos</a>
    </div>
    
    <div class="admin-content">
        <div class="card">
            <div id="calendar"></div>
            <div class="calendar-legend">
                <div><span class="legend-color" style="background:#FF9800;"></span> Cabaña 1 (Frente)</div>
                <div><span class="legend-color" style="background:#3498db;"></span> Cabaña 2 (Depa abajo)</div>
                <div><span class="legend-color" style="background:#2ecc71;"></span> Cabaña 3 (Loft)</div>
                <div><span class="legend-color" style="background:#9b59b6;"></span> Reservas Manuales</div>
            </div>
        </div>
    </div>
</div>

<script src="/js/auth-core.js"></script>
<script>
    let calendar = null;
    
    // Función que FUNCIONA para obtener eventos de Google Calendar
    async function fetchGoogleEvents(calendarId, apiKey, color, title) {
        const now = new Date();
        const startDate = new Date(now.getFullYear(), now.getMonth() - 2, 1).toISOString();
        const endDate = new Date(now.getFullYear(), now.getMonth() + 6, 0).toISOString();
        
        const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events?key=${apiKey}&timeMin=${startDate}&timeMax=${endDate}&singleEvents=true&orderBy=startTime`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.error) return [];
            return data.items.map(event => ({
                title: event.summary || title,
                start: event.start.dateTime || event.start.date,
                end: event.end.dateTime || event.end.date,
                color: color,
                textColor: 'white',
                extendedProps: { origen: 'google' }
            }));
        } catch (error) {
            return [];
        }
    }
    
    async function fetchManualReservas() {
        try {
            const snapshot = await db.collection('reservas').where('origen', '==', 'directa').get();
            const reservas = [];
            snapshot.forEach(doc => {
                const r = doc.data();
                const checkIn = r.checkIn?.toDate?.() || new Date(r.checkIn);
                const checkOut = r.checkOut?.toDate?.() || new Date(r.checkOut);
                reservas.push({
                    title: `${r.nombre} (Manual)`,
                    start: checkIn,
                    end: checkOut,
                    color: '#9b59b6',
                    textColor: 'white',
                    extendedProps: { origen: 'manual' }
                });
            });
            return reservas;
        } catch (error) {
            return [];
        }
    }
    
    async function cargarEventos() {
        const calendarEl = document.getElementById('calendar');
        calendarEl.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Cargando reservas...</p></div>';
        
        let allEvents = [];
        for (const cal of GOOGLE_CALENDARS) {
            const events = await fetchGoogleEvents(cal.id, GOOGLE_API_KEY, cal.color, cal.title);
            allEvents.push(...events);
        }
        
        const manualEvents = await fetchManualReservas();
        allEvents.push(...manualEvents);
        
        if (calendar) {
            calendar.removeAllEvents();
            calendar.addEventSource(allEvents);
        } else {
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek'
                },
                firstDay: 1,
                height: 'auto',
                timeZone: 'America/Sao_Paulo',
                events: allEvents,
                eventClick: function(info) {
                    alert(`📅 ${info.event.title}\n📆 ${info.event.start.toLocaleDateString('es-ES')} - ${info.event.end.toLocaleDateString('es-ES')}`);
                }
            });
            calendar.render();
        }
    }
    
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('loginError');
        const result = await loginAdmin(email, password);
        if (result.success) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            document.getElementById('userEmail').textContent = result.user.email;
            cargarEventos();
        } else {
            errorDiv.textContent = result.error;
        }
    }
    
    async function logout() {
        await logoutAdmin();
        window.location.reload();
    }
    
    // Verificar autenticación
    checkAdmin().then(isAdmin => {
        if (isAdmin) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            document.getElementById('userEmail').textContent = currentUser.email;
            cargarEventos();
        }
    });
    
    window.login = login;
    window.logout = logout;
</script>
</body>
</html>
