<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ocupación Casa Verde</title>
    <link rel="stylesheet" href="../css/admin-style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.15/index.global.min.js"></script>
    
    <style>
        body { display: flex; margin: 0; background: #f4f7f6; }
        .sidebar { width: 250px; position: fixed; height: 100vh; background: #2d5a27; color: white; z-index: 100; }
        .main-content { margin-left: 260px; width: calc(100% - 280px); padding: 20px; }
        #calendar { background: white; padding: 15px; border-radius: 12px; height: 85vh; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .fc-event-google { background-color: #ff5a5f !important; border: none !important; }
        .fc-event-manual { background-color: #2d5a27 !important; border: none !important; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="text-align:center; padding:20px;">Casa Verde</h2>
        <a href="dashboard.html" class="nav-link"><span class="material-icons">dashboard</span> Tareas</a>
        <a href="calendario.html" class="nav-link active"><span class="material-icons">calendar_view_day</span> Ocupación</a>
        <a href="reservas.html" class="nav-link"><span class="material-icons">list</span> Reservas</a>
    </div>

    <div class="main-content">
        <h1>Calendario de Disponibilidad</h1>
        <div id="calendar"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/auth-core.js"></script>

    <script>
        const GOOGLE_API_KEY = 'AIzaSyDluIIBwIJVkO9DEX4ghJQYhzJAnXtQoKs';
        const CALENDARS = [
            { id: 'h5a1h0a8dg9rl0oufvq19hn05r4gbubg@import.calendar.google.com', resId: 'Cabaña 1' },
            { id: '60n7foetdu2qvsn16mi7is8j6i4ugm66@import.calendar.google.com', resId: 'Cabaña 2' },
            { id: '8i3hl5ppqi6al50kf7casj5n5vl9sp1j@import.calendar.google.com', resId: 'Suite' }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'resourceTimelineMonth',
                locale: 'es',
                schedulerLicenseKey: 'GPL-My-Project-Is-Open-Source',
                resources: [
                    { id: 'Cabaña 1', title: 'Cabaña 1' },
                    { id: 'Cabaña 2', title: 'Cabaña 2' },
                    { id: 'Suite', title: 'Suite' }
                ],
                events: async function(info, successCallback) {
                    let events = [];
                    // 1. Cargar Google
                    for (const cal of CALENDARS) {
                        const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?key=${GOOGLE_API_KEY}&timeMin=${info.startStr}&timeMax=${info.endStr}&singleEvents=true`;
                        const res = await fetch(url);
                        const data = await res.json();
                        if(data.items) {
                            events.push(...data.items.map(e => ({
                                resourceId: cal.resId,
                                title: e.summary || 'Ocupado',
                                start: e.start.dateTime || e.start.date,
                                end: e.end.dateTime || e.end.date,
                                className: 'fc-event-google'
                            })));
                        }
                    }
                    // 2. Cargar Firebase (Manuales)
                    const snap = await db.collection('reservas').get();
                    snap.forEach(doc => {
                        const d = doc.data();
                        events.push({
                            id: doc.id,
                            resourceId: d.cabana,
                            title: d.nombre,
                            start: d.checkIn,
                            end: d.checkOut,
                            className: 'fc-event-manual'
                        });
                    });
                    successCallback(events);
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>
