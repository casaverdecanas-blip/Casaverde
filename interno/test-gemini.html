<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Gemini · Casa Verde</title>
    <style>
        body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 20px; font-size: 13px; }
        h2 { color: #7dd3fc; margin-bottom: 20px; }
        button {
            background: #2563eb; color: white; border: none; padding: 10px 20px;
            border-radius: 6px; cursor: pointer; font-size: 14px; margin: 6px 4px;
        }
        button:hover { background: #1d4ed8; }
        button.green { background: #16a34a; }
        button.green:hover { background: #15803d; }
        #log {
            background: #1e293b; border: 1px solid #334155;
            border-radius: 8px; padding: 16px; margin-top: 16px;
            min-height: 200px; max-height: 600px; overflow-y: auto;
            white-space: pre-wrap; line-height: 1.8;
        }
        .ok   { color: #4ade80; }
        .info { color: #93c5fd; }
        .warn { color: #fbbf24; }
        .err  { color: #f87171; }
        .sep  { color: #475569; }
        input[type=text] {
            background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
            border-radius: 6px; padding: 8px 12px; width: 100%; max-width: 500px;
            font-size: 13px; font-family: monospace; margin: 4px 0;
        }
    </style>
</head>
<body>
<h2>🔬 Diagnóstico Gemini API</h2>

<div style="margin-bottom:12px">
    <div style="color:#94a3b8;margin-bottom:6px">URL del proxy Netlify:</div>
    <input type="text" id="proxyUrl" value="https://serene-scone-76bd4e.netlify.app/.netlify/functions/claude-proxy">
</div>

<div>
    <button onclick="test1()">1 · Ping proxy (OPTIONS)</button>
    <button onclick="test2()">2 · Test texto simple</button>
    <button class="green" onclick="test3()">3 · Test con imagen</button>
    <button onclick="clearLog()" style="background:#475569">Limpiar</button>
</div>

<div id="log"><span class="sep">— Resultados aparecerán aquí —</span></div>

<script>
const proxyUrl = () => document.getElementById('proxyUrl').value.trim();

function log(msg, tipo='info') {
    const el = document.getElementById('log');
    const cls = {ok:'ok',info:'info',warn:'warn',err:'err'}[tipo]||'info';
    const ts = new Date().toLocaleTimeString('es-AR');
    el.innerHTML += `<span class="${cls}">[${ts}] ${msg}</span>\n`;
    el.scrollTop = el.scrollHeight;
}

function clearLog() {
    document.getElementById('log').innerHTML = '<span class="sep">— Limpiado —</span>\n';
}

function sep(titulo) {
    log(`\n${'─'.repeat(40)}`, 'sep');
    log(`TEST: ${titulo}`, 'info');
    log('─'.repeat(40), 'sep');
}

// TEST 1: OPTIONS preflight
async function test1() {
    sep('Ping proxy OPTIONS');
    const url = proxyUrl();
    log(`URL: ${url}`, 'info');
    try {
        const res = await fetch(url, { method: 'OPTIONS' });
        log(`Status: ${res.status} ${res.statusText}`, res.status < 300 ? 'ok' : 'err');
        const headers = {};
        res.headers.forEach((v,k) => headers[k] = v);
        log(`Headers CORS: ${JSON.stringify({
            'access-control-allow-origin': headers['access-control-allow-origin'],
            'access-control-allow-methods': headers['access-control-allow-methods']
        }, null, 2)}`, 'info');
        if (res.status === 204 || res.status === 200) {
            log('✅ Proxy responde correctamente a OPTIONS', 'ok');
        } else {
            log('⚠ Respuesta inesperada en OPTIONS', 'warn');
        }
    } catch(e) {
        log(`❌ Error: ${e.message}`, 'err');
        log('Posible causa: CORS bloqueado o proxy no desplegado', 'warn');
    }
}

// TEST 2: POST con texto simple (sin PDF)
async function test2() {
    sep('Texto simple via proxy');
    const url = proxyUrl();
    log(`Enviando "Respondé solo: OK" al proxy...`, 'info');
    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'gemini-2.0-flash-lite',
                max_tokens: 100,
                messages: [{
                    role: 'user',
                    content: 'Respondé solo con la palabra: OK'
                }]
            })
        });

        log(`Status HTTP: ${res.status}`, res.ok ? 'ok' : 'err');
        const data = await res.json();
        log(`Respuesta completa:\n${JSON.stringify(data, null, 2)}`, res.ok ? 'ok' : 'err');

        if (res.ok && data.content?.[0]?.text) {
            log(`✅ Gemini respondió: "${data.content[0].text.trim()}"`, 'ok');
        } else if (data.error) {
            log(`❌ Error del proxy: ${data.error}`, 'err');
            if (data.details) {
                log(`Detalle Gemini:\n${JSON.stringify(data.details, null, 2)}`, 'err');
            }
        }
    } catch(e) {
        log(`❌ Fetch error: ${e.message}`, 'err');
    }
}

// TEST 3: POST con imagen pequeña (1x1 pixel PNG en base64)
async function test3() {
    sep('Imagen base64 via proxy');
    const url = proxyUrl();
    // PNG 1x1 pixel rojo — imagen mínima válida
    const pixel = 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwADhQGAWjR9awAAAABJRU5ErkJggg==';
    log('Enviando imagen 1x1px con texto "¿Qué ves en esta imagen? Respondé en una línea."', 'info');
    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'gemini-2.0-flash-lite',
                max_tokens: 200,
                messages: [{
                    role: 'user',
                    content: [
                        {
                            type: 'image',
                            source: {
                                type: 'base64',
                                media_type: 'image/png',
                                data: pixel
                            }
                        },
                        {
                            type: 'text',
                            text: '¿Qué ves en esta imagen? Respondé en una línea.'
                        }
                    ]
                }]
            })
        });

        log(`Status HTTP: ${res.status}`, res.ok ? 'ok' : 'err');
        const data = await res.json();
        log(`Respuesta:\n${JSON.stringify(data, null, 2)}`, res.ok ? 'ok' : 'err');

        if (res.ok && data.content?.[0]?.text) {
            log(`✅ Gemini procesó imagen: "${data.content[0].text.trim()}"`, 'ok');
            log('🎉 El proxy funciona con imágenes. El PDF debería funcionar igual.', 'ok');
        } else if (data.error) {
            log(`❌ Error: ${data.error}`, 'err');
            if (data.details) {
                log(`Detalle:\n${JSON.stringify(data.details, null, 2)}`, 'err');
            }
        }
    } catch(e) {
        log(`❌ Fetch error: ${e.message}`, 'err');
    }
}
</script>
</body>
</html>
