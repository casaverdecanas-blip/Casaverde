<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CasaVerdeCanas</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #1e3c2c 0%, #2d5a27 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 24px;
            width: 380px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .login-box h2 {
            color: #2d5a27;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .login-box input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
        }
        
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #2d5a27;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .error-msg {
            color: #e74c3c;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .info-msg {
            color: #6c757d;
            margin-top: 15px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2><span class="material-icons">cottage</span> CasaVerdeCanas</h2>
        <input type="email" id="email" placeholder="Email" autocomplete="email">
        <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password">
        <button onclick="login()">Ingresar</button>
        <div id="loginError" class="error-msg"></div>
        <div class="info-msg">
            💡 Acceso para administradores y colaboradores
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDluIIBwIJVkO9DEX4ghJQYhzJAnXtQoKs",
            authDomain: "tatareas-d8a80.firebaseapp.com",
            projectId: "tatareas-d8a80",
            storageBucket: "tatareas-d8a80.firebasestorage.app",
            messagingSenderId: "709332495480",
            appId: "1:709332495480:web:7060b2c75984352354918d"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            if (!email || !password) {
                errorDiv.textContent = 'Ingresa email y contraseña';
                return;
            }
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const userDoc = await db.collection('usuarios').doc(userCredential.user.uid).get();
                
                if (!userDoc.exists) {
                    await auth.signOut();
                    errorDiv.textContent = 'Usuario no registrado';
                    return;
                }
                
                const rol = userDoc.data().rol;
                const nombre = userDoc.data().nombre || email;
                
                // Guardar datos en sessionStorage para el panel
                sessionStorage.setItem('userName', nombre);
                sessionStorage.setItem('userEmail', email);
                sessionStorage.setItem('userRol', rol);
                sessionStorage.setItem('userId', userCredential.user.uid);
                
                if (rol === 'admin') {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'colaborador.html';
                }
            } catch (error) {
                errorDiv.textContent = 'Email o contraseña incorrectos';
            }
        }
        
        window.login = login;
    </script>
</body>
</html>
