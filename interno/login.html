<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CasaVerdeCanas</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c2c 0%, #2d5a27 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .login-container h2 {
            color: #2d5a27;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group span {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9aa6b5;
        }

        .input-group input {
            width: 100%;
            padding: 14px 14px 14px 48px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #2d5a27;
            box-shadow: 0 0 0 3px rgba(45,90,39,0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2d5a27 0%, #1e3f1a 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        .info-message {
            color: #6c757d;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>
            <span class="material-icons">eco</span>
            CasaVerdeCanas
        </h2>
        <form id="loginForm">
            <div class="input-group">
                <span class="material-icons">email</span>
                <input type="email" id="email" placeholder="Email" required autocomplete="email">
            </div>
            <div class="input-group">
                <span class="material-icons">lock</span>
                <input type="password" id="password" placeholder="Contraseña" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn" id="loginBtn">
                <span class="material-icons">login</span> Ingresar
            </button>
            <div id="loginError" class="error-message"></div>
        </form>
        <div class="info-message">
            💡 Ingresa con tus credenciales de acceso
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDluIIBwIJVkO9DEX4ghJQYhzJAnXtQoKs",
            authDomain: "tatareas-d8a80.firebaseapp.com",
            projectId: "tatareas-d8a80",
            storageBucket: "tatareas-d8a80.firebasestorage.app",
            messagingSenderId: "709332495480",
            appId: "1:709332495480:web:7060b2c75984352354918d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading"></span> Ingresando...';
            loginError.style.display = 'none';
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const userDoc = await db.collection('usuarios').doc(userCredential.user.uid).get();
                
                if (!userDoc.exists) {
                    throw new Error('Usuario no registrado');
                }
                
                const userData = userDoc.data();
                const rol = userData.rol || 'user';
                const nombre = userData.nombre || userData.email.split('@')[0];
                
                // Guardar datos en sessionStorage para el colaborador
                sessionStorage.setItem('userName', nombre);
                sessionStorage.setItem('userEmail', email);
                sessionStorage.setItem('userRol', rol);
                sessionStorage.setItem('userId', userCredential.user.uid);
                
                // Redirigir según rol
                if (rol === 'admin') {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'colaborador.html';
                }
                
            } catch (error) {
                console.error('Login error:', error);
                loginError.textContent = error.message === 'Usuario no registrado' 
                    ? 'Usuario no autorizado. Contacta al administrador.'
                    : 'Email o contraseña incorrectos';
                loginError.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span class="material-icons">login</span> Ingresar';
            }
        });
    </script>
</body>
</html>
