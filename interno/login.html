<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Casa Verde</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, var(--dark) 0%, var(--primary) 100%);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }
        .login-card h2 {
            color: var(--primary);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card login-card">
        <h2><span class="material-icons">lock</span> Casa Verde</h2>
        <p style="color: #64748b; margin-bottom: 25px;">Panel de Gestión Interna</p>
        
        <div id="loader" class="loader"></div>
        <div id="error" class="error-msg">Email o contraseña incorrectos</div>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit" class="btn-cv" style="width: 100%; margin-top: 10px;">Ingresar</button>
        </form>

        <div style="margin-top: 25px; border-top: 1px solid #f1f5f9; padding-top: 20px;">
            <a href="../index.html" style="color: var(--primary); text-decoration: none; font-size: 0.9rem;">
                ← Volver al sitio público
            </a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="js/auth-core.js"></script>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorDiv = document.getElementById('error');
        const loader = document.getElementById('loader');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Limpiar estados previos
            errorDiv.style.display = 'none';
            loader.style.display = 'block';

            try {
                // El auth-core.js se encargará de la redirección 
                // una vez que el estado de Auth cambie exitosamente.
                await auth.signInWithEmailAndPassword(email, password);
            } catch (error) {
                loader.style.display = 'none';
                errorDiv.style.display = 'block';
                console.error("Error de login:", error.message);
            }
        });
    </script>
</body>
</html>
