<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso · Casa Verde Canas</title>
    <link rel="stylesheet" href="design-system.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body {
            margin: 0;
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-4);
        }
        .login-wrap {
            width: 100%;
            max-width: 360px;
        }
        .login-brand {
            text-align: center;
            margin-bottom: var(--space-6);
        }
        .login-logo {
            width: 64px;
            height: 64px;
            border-radius: var(--radius-lg);
            background: var(--color-primary);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--space-3);
            box-shadow: 0 6px 18px rgba(45,90,39,0.28);
        }
        .login-logo .material-icons { font-size: 34px; }
        .login-brand h1 {
            font-size: var(--text-xl);
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.01em;
        }
        .login-brand p {
            font-size: var(--text-sm);
            color: var(--color-text-muted);
            margin: var(--space-1) 0 0;
        }
        .login-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: var(--space-6);
        }
        .login-field { margin-bottom: var(--space-4); }
        .login-field label {
            display: block;
            font-size: var(--text-xs);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-muted);
            margin-bottom: var(--space-2);
        }
        .login-field input {
            width: 100%;
            box-sizing: border-box;
            font-size: var(--text-base);
            padding: 11px var(--space-3);
            border: 1.5px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-surface-2);
            transition: border-color .15s, box-shadow .15s;
        }
        .login-field input:focus {
            outline: none;
            border-color: var(--color-primary);
            background: var(--color-surface);
            box-shadow: var(--shadow-focus);
        }
        .btn-login {
            width: 100%;
            height: 44px;
            font-size: var(--text-md);
            margin-top: var(--space-2);
        }
        .login-error {
            display: none;
            background: var(--color-danger-bg);
            color: var(--color-danger);
            border: 1px solid var(--color-danger-light);
            font-size: var(--text-sm);
            padding: var(--space-3);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-4);
        }
        .login-foot {
            text-align: center;
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            margin-top: var(--space-5);
        }
        .btn-login .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-login.loading .spinner { display: inline-block; }
        .btn-login.loading .btn-label { opacity: .8; }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-brand">
            <div class="login-logo"><span class="material-icons">cottage</span></div>
            <h1>Casa Verde Canas</h1>
            <p>Panel de gestión interno</p>
        </div>

        <div class="login-card">
            <div class="login-error" id="loginError"></div>

            <div class="login-field">
                <label for="email">Email</label>
                <input type="email" id="email" autocomplete="username" placeholder="tu@email.com">
            </div>

            <div class="login-field">
                <label for="pass">Contraseña</label>
                <input type="password" id="pass" autocomplete="current-password" placeholder="••••••••">
            </div>

            <button class="btn btn-primary btn-login" id="btnLogin" onclick="login()">
                <span class="spinner"></span>
                <span class="btn-label">Entrar</span>
            </button>
        </div>

        <div class="login-foot">Acceso restringido al equipo de Casa Verde Canas</div>
    </div>

    <script>
        firebase.initializeApp({
            apiKey: 'AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4',
            authDomain: 'casaverdecanas-199.firebaseapp.com',
            projectId: 'casaverdecanas-199'
        });
        var auth = firebase.auth();
        var db   = firebase.firestore();

        var btn      = document.getElementById('btnLogin');
        var errorBox = document.getElementById('loginError');

        function mostrarError(msg) {
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
            setCargando(false);
        }
        function setCargando(on) {
            if (on) { btn.classList.add('loading'); btn.disabled = true; }
            else    { btn.classList.remove('loading'); btn.disabled = false; }
        }

        // -- Redirección según rol -----------------------------------
        function destinoPorRol(rol) {
            // El colaborador y el admin entran al dashboard, que se adapta
            // al rol. Centralizado acá para cambiarlo fácil a futuro.
            if (rol === 'admin') return 'dashboard.html';
            return 'dashboard.html';
        }

        function login() {
            var email = document.getElementById('email').value.trim();
            var pass  = document.getElementById('pass').value;
            errorBox.style.display = 'none';

            if (!email || !pass) { mostrarError('Ingresá email y contraseña.'); return; }
            setCargando(true);

            auth.signInWithEmailAndPassword(email, pass)
                .then(function(cred) {
                    return db.collection('usuarios').doc(cred.user.uid).get()
                        .then(function(doc) {
                            var datos = doc.exists ? doc.data() : {};
                            if (datos.activo === false) {
                                return auth.signOut().then(function() {
                                    mostrarError('Tu cuenta está desactivada. Contactá al administrador.');
                                });
                            }
                            window.location.href = destinoPorRol(datos.rol);
                        })
                        .catch(function() {
                            // Si no se puede leer el perfil, igual deja entrar:
                            // el dashboard revalidará con verificarAuth().
                            window.location.href = 'dashboard.html';
                        });
                })
                .catch(function(e) {
                    var msg = 'No pudimos iniciar sesión. Revisá tus datos.';
                    if (e && e.code === 'auth/wrong-password')      msg = 'Contraseña incorrecta.';
                    else if (e && e.code === 'auth/user-not-found')  msg = 'No existe una cuenta con ese email.';
                    else if (e && e.code === 'auth/invalid-email')   msg = 'El email no tiene un formato válido.';
                    else if (e && e.code === 'auth/too-many-requests') msg = 'Demasiados intentos. Esperá unos minutos.';
                    mostrarError(msg);
                });
        }

        // Enter para enviar
        ['email', 'pass'].forEach(function(id) {
            document.getElementById(id).addEventListener('keydown', function(ev) {
                if (ev.key === 'Enter') login();
            });
        });

        // Si ya hay sesión activa, saltar directo al panel
        auth.onAuthStateChanged(function(u) {
            if (u) window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
