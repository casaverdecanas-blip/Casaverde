<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gestión de Cabañas - Casa Verde Canas</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f7fa; }
        .admin-header { background: #2d5a27; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .admin-nav { background: white; padding: 0 25px; display: flex; gap: 5px; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
        .nav-item { padding: 14px 20px; background: none; border: none; cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; color: #6c757d; text-decoration: none; }
        .nav-item.active { color: #2d5a27; border-bottom: 3px solid #2d5a27; }
        .admin-content { max-width: 1400px; margin: 30px auto; padding: 0 25px; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h2 { color: #2d5a27; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e8f5e9; padding-bottom: 12px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .lang-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; margin: 5px; }
        .btn-primary { background: #2d5a27; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .fotos-grid { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .foto-item { position: relative; width: 100px; height: 100px; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; }
        .foto-item img { width: 100%; height: 100%; object-fit: cover; }
        .foto-item button { position: absolute; top: 2px; right: 2px; background: #e74c3c; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; }
        .intervalo-card { background: #f8f9fa; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .status { padding: 12px; border-radius: 12px; margin: 15px 0; display: none; }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .login-box { background: white; padding: 40px; border-radius: 24px; max-width: 400px; margin: 50px auto; text-align: center; }
        @media (max-width: 768px) { .lang-row, .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div id="loginContainer" class="login-box">
    <h2>🏠 Gestión de Cabañas</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
    <div id="loginError" style="color:red;"></div>
</div>
<div id="mainPanel" style="display:none;">
    <div class="admin-header">
        <h1><span class="material-icons">holiday_village</span> Cabañas</h1>
        <div><span id="userEmail"></span> <button class="btn btn-secondary" onclick="logout()">Salir</button></div>
    </div>
    <div class="admin-nav">
        <button class="nav-item active" data-tab="cabanas">Cabañas</button>
        <button class="nav-item" data-tab="tarifas">Tarifas por temporada</button>
    </div>
    <div class="admin-content">
        <div id="cabanasPanel" class="tab-panel active">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                    <h2>Listado de Cabañas</h2>
                    <button class="btn btn-primary" onclick="nuevaCabana()">+ Nueva Cabaña</button>
                </div>
                <div id="cabanasList" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:20px; margin-top:20px;"></div>
            </div>
            <div class="card" id="formularioCard" style="display:none;">
                <h2 id="formTitle">Editar Cabaña</h2>
                <input type="hidden" id="editId">
                <div class="form-row">
                    <div class="form-group"><label>ID</label><input type="number" id="cabanaId" required></div>
                    <div class="form-group"><label>Orden</label><input type="number" id="orden" value="0"></div>
                    <div class="form-group"><label>Activa</label><select id="activa"><option value="true">Activa</option><option value="false">Inactiva</option></select></div>
                </div>
                <div class="lang-row">
                    <div class="form-group"><label>Nombre ES</label><input type="text" id="nombreEs"></div>
                    <div class="form-group"><label>Nome PT</label><input type="text" id="nombrePt"></div>
                    <div class="form-group"><label>Name EN</label><input type="text" id="nombreEn"></div>
                </div>
                <div class="lang-row">
                    <div class="form-group"><label>Descripción ES</label><textarea id="descEs" rows="2"></textarea></div>
                    <div class="form-group"><label>Descrição PT</label><textarea id="descPt" rows="2"></textarea></div>
                    <div class="form-group"><label>Description EN</label><textarea id="descEn" rows="2"></textarea></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Capacidad base</label><input type="number" id="capacidadBase" value="2"></div>
                    <div class="form-group"><label>Capacidad máxima</label><input type="number" id="capacidadMax" value="4"></div>
                    <div class="form-group"><label>Camas dobles</label><input type="number" id="camasDobles" value="1"></div>
                    <div class="form-group"><label>Camas individuales</label><input type="number" id="camasIndividuales" value="0"></div>
                </div>
                <div class="form-group"><label>Comodidades (una por línea)</label><textarea id="comodidades" rows="3"></textarea></div>
                <div class="form-group"><label>Fotos (URLs, una por línea)</label><textarea id="fotosUrls" rows="3"></textarea></div>
                <div id="fotosPreview" class="fotos-grid"></div>
                <div class="form-row">
                    <div class="form-group"><label>Precio base noche (R$)</label><input type="number" id="precioBase" step="10" value="250"></div>
                    <div class="form-group"><label>Extra por persona (R$/noche)</label><input type="number" id="precioExtra" step="10" value="50"></div>
                    <div class="form-group"><label>Precio limpieza (R$)</label><input type="number" id="precioLimpieza" step="10" value="150"></div>
                </div>
                <div class="form-group"><label>Airbnb URL</label><input type="url" id="airbnbUrl"></div>
                <div class="form-group"><label>Google Calendar iframe</label><textarea id="googleCalendar" rows="2"></textarea></div>
                <div style="display:flex; gap:10px;"><button class="btn btn-primary" onclick="guardarCabana()">Guardar</button><button class="btn btn-secondary" onclick="cancelarEdicion()">Cancelar</button></div>
            </div>
        </div>
        <div id="tarifasPanel" class="tab-panel" style="display:none;">
            <div class="card">
                <h2>Tarifas por temporada</h2>
                <div class="form-group"><label>Cabaña</label><select id="tarifaCabanaSelect"></select></div>
                <div id="intervalosContainer"></div>
                <button class="btn btn-primary" onclick="agregarIntervalo()">+ Agregar período</button>
                <button class="btn btn-success" onclick="guardarIntervalos()">Guardar todas</button>
            </div>
        </div>
    </div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4", authDomain: "casaverdecanas-199.firebaseapp.com", projectId: "casaverdecanas-199" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUser = null;
    let cabanasCache = [];
    let intervalosActuales = [];

    async function login() {
        const email = document.getElementById('email').value, password = document.getElementById('password').value, errorDiv = document.getElementById('loginError');
        try {
            const cred = await auth.signInWithEmailAndPassword(email, password);
            const userDoc = await db.collection('usuarios').doc(cred.user.uid).get();
            if (userDoc.exists && userDoc.data().rol === 'admin') {
                currentUser = cred.user;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                document.getElementById('userEmail').innerText = email;
                cargarCabanas();
                cargarSelectCabanas();
            } else errorDiv.innerText = 'No eres administrador';
        } catch(e) { errorDiv.innerText = e.message; }
    }
    function logout() { auth.signOut().then(() => location.reload()); }
    async function cargarCabanas() {
        const snap = await db.collection('cabanas').orderBy('orden').get();
        cabanasCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const container = document.getElementById('cabanasList');
        if (!cabanasCache.length) { container.innerHTML = '<div class="status info">No hay cabañas</div>'; return; }
        let html = '';
        cabanasCache.forEach(c => {
            html += `<div class="card" style="padding:15px;"><h3>${c.nombre?.es || c.nombre || c.id}</h3><p>ID: ${c.id} | Capacidad: ${c.capacidad?.base}/${c.capacidad?.max}</p><p>Precio base: R$ ${c.tarifas?.precioBase || 0}/noche</p><div><button class="btn btn-primary btn-sm" onclick="editarCabana('${c.id}')">Editar</button><button class="btn btn-danger btn-sm" onclick="eliminarCabana('${c.id}')">Eliminar</button></div></div>`;
        });
        container.innerHTML = html;
    }
    function nuevaCabana() {
        document.getElementById('formularioCard').style.display = 'block';
        document.getElementById('editId').value = '';
        document.getElementById('cabanaId').value = '';
        document.getElementById('orden').value = '0';
        document.getElementById('activa').value = 'true';
        document.getElementById('nombreEs').value = ''; document.getElementById('nombrePt').value = ''; document.getElementById('nombreEn').value = '';
        document.getElementById('descEs').value = ''; document.getElementById('descPt').value = ''; document.getElementById('descEn').value = '';
        document.getElementById('capacidadBase').value = '2'; document.getElementById('capacidadMax').value = '4';
        document.getElementById('camasDobles').value = '1'; document.getElementById('camasIndividuales').value = '0';
        document.getElementById('comodidades').value = ''; document.getElementById('fotosUrls').value = '';
        document.getElementById('precioBase').value = '250'; document.getElementById('precioExtra').value = '50'; document.getElementById('precioLimpieza').value = '150';
        document.getElementById('airbnbUrl').value = ''; document.getElementById('googleCalendar').value = '';
        actualizarPreviewFotos();
    }
    async function editarCabana(id) {
        const doc = await db.collection('cabanas').doc(id).get();
        const c = doc.data();
        document.getElementById('editId').value = id;
        document.getElementById('cabanaId').value = c.id;
        document.getElementById('orden').value = c.orden || 0;
        document.getElementById('activa').value = c.activa ? 'true' : 'false';
        document.getElementById('nombreEs').value = c.nombre?.es || ''; document.getElementById('nombrePt').value = c.nombre?.pt || ''; document.getElementById('nombreEn').value = c.nombre?.en || '';
        document.getElementById('descEs').value = c.descripcion?.es || ''; document.getElementById('descPt').value = c.descripcion?.pt || ''; document.getElementById('descEn').value = c.descripcion?.en || '';
        document.getElementById('capacidadBase').value = c.capacidad?.base || 2; document.getElementById('capacidadMax').value = c.capacidad?.max || 4;
        document.getElementById('camasDobles').value = c.camas?.dobles || 1; document.getElementById('camasIndividuales').value = c.camas?.individuales || 0;
        document.getElementById('comodidades').value = (c.comodidades || []).join('\n');
        document.getElementById('fotosUrls').value = (c.fotos || []).join('\n');
        document.getElementById('precioBase').value = c.tarifas?.precioBase || 250;
        document.getElementById('precioExtra').value = c.tarifas?.precioExtraPersona || 50;
        document.getElementById('precioLimpieza').value = c.tarifas?.precioLimpieza || 150;
        document.getElementById('airbnbUrl').value = c.airbnb_url || '';
        document.getElementById('googleCalendar').value = c.google_calendar_iframe || '';
        actualizarPreviewFotos();
        document.getElementById('formularioCard').style.display = 'block';
    }
    function actualizarPreviewFotos() {
        const urls = document.getElementById('fotosUrls').value.split('\n').filter(u=>u.trim());
        const container = document.getElementById('fotosPreview');
        container.innerHTML = urls.map((url,i)=>`<div class="foto-item"><img src="${url}" onerror="this.src='https://via.placeholder.com/100?text=Error'"><button onclick="eliminarFoto(${i})">✖</button></div>`).join('');
    }
    function eliminarFoto(idx) {
        let urls = document.getElementById('fotosUrls').value.split('\n').filter(u=>u.trim());
        urls.splice(idx,1);
        document.getElementById('fotosUrls').value = urls.join('\n');
        actualizarPreviewFotos();
    }
    async function guardarCabana() {
        const id = document.getElementById('editId').value;
        const idNum = parseInt(document.getElementById('cabanaId').value);
        if (!idNum) { alert('ID requerido'); return; }
        const fotos = document.getElementById('fotosUrls').value.split('\n').filter(u=>u.trim());
        const comodidades = document.getElementById('comodidades').value.split('\n').filter(l=>l.trim());
        const data = {
            id: idNum,
            orden: parseInt(document.getElementById('orden').value) || idNum,
            activa: document.getElementById('activa').value === 'true',
            nombre: { es: document.getElementById('nombreEs').value, pt: document.getElementById('nombrePt').value, en: document.getElementById('nombreEn').value },
            descripcion: { es: document.getElementById('descEs').value, pt: document.getElementById('descPt').value, en: document.getElementById('descEn').value },
            capacidad: { base: parseInt(document.getElementById('capacidadBase').value), max: parseInt(document.getElementById('capacidadMax').value) },
            camas: { dobles: parseInt(document.getElementById('camasDobles').value), individuales: parseInt(document.getElementById('camasIndividuales').value) },
            comodidades: comodidades,
            fotos: fotos,
            tarifas: {
                precioBase: parseFloat(document.getElementById('precioBase').value),
                precioExtraPersona: parseFloat(document.getElementById('precioExtra').value),
                precioLimpieza: parseFloat(document.getElementById('precioLimpieza').value),
                intervalos: []
            },
            airbnb_url: document.getElementById('airbnbUrl').value,
            google_calendar_iframe: document.getElementById('googleCalendar').value,
            actualizadoEn: firebase.firestore.FieldValue.serverTimestamp()
        };
        if (!id) data.creadoEn = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('cabanas').doc(id || idNum.toString()).set(data, { merge: true });
        alert('Guardado');
        cancelarEdicion();
        cargarCabanas();
        cargarSelectCabanas();
    }
    function cancelarEdicion() { document.getElementById('formularioCard').style.display = 'none'; }
    async function eliminarCabana(id) { if(confirm('¿Eliminar?')) { await db.collection('cabanas').doc(id).delete(); cargarCabanas(); cargarSelectCabanas(); } }
    async function cargarSelectCabanas() {
        const snap = await db.collection('cabanas').orderBy('orden').get();
        const select = document.getElementById('tarifaCabanaSelect');
        select.innerHTML = '<option value="">Selecciona cabaña</option>';
        snap.forEach(doc=>{ const c=doc.data(); select.innerHTML+=`<option value="${doc.id}">${c.nombre?.es||c.id}</option>`; });
        select.onchange = () => cargarIntervalos(select.value);
    }
    async function cargarIntervalos(cabanaId) {
        if(!cabanaId) { document.getElementById('intervalosContainer').innerHTML = ''; return; }
        const doc = await db.collection('cabanas').doc(cabanaId).get();
        intervalosActuales = doc.data().tarifas?.intervalos || [];
        renderizarIntervalos();
    }
    function renderizarIntervalos() {
        const container = document.getElementById('intervalosContainer');
        if(!intervalosActuales.length) { container.innerHTML = '<p>Sin períodos especiales</p>'; return; }
        let html='';
        intervalosActuales.forEach((int,idx)=>{
            html+=`<div class="intervalo-card"><div class="form-row"><div class="form-group"><label>Desde</label><input type="date" class="int-desde" data-idx="${idx}" value="${int.desde||''}"></div><div class="form-group"><label>Hasta</label><input type="date" class="int-hasta" data-idx="${idx}" value="${int.hasta||''}"></div><div class="form-group"><label>Precio noche</label><input type="number" step="10" class="int-precio" data-idx="${idx}" value="${int.precioNoche||0}"></div><div class="form-group"><label>Extra persona</label><input type="number" step="10" class="int-extra" data-idx="${idx}" value="${int.precioExtra||0}"></div></div><button class="btn btn-danger btn-sm" onclick="eliminarIntervalo(${idx})">Eliminar</button></div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.int-desde').forEach(inp=>inp.addEventListener('change',e=>intervalosActuales[e.target.dataset.idx].desde=e.target.value));
        document.querySelectorAll('.int-hasta').forEach(inp=>inp.addEventListener('change',e=>intervalosActuales[e.target.dataset.idx].hasta=e.target.value));
        document.querySelectorAll('.int-precio').forEach(inp=>inp.addEventListener('change',e=>intervalosActuales[e.target.dataset.idx].precioNoche=parseFloat(e.target.value)));
        document.querySelectorAll('.int-extra').forEach(inp=>inp.addEventListener('change',e=>intervalosActuales[e.target.dataset.idx].precioExtra=parseFloat(e.target.value)));
    }
    function agregarIntervalo() { intervalosActuales.push({ desde:'', hasta:'', precioNoche:0, precioExtra:0 }); renderizarIntervalos(); }
    function eliminarIntervalo(idx) { intervalosActuales.splice(idx,1); renderizarIntervalos(); }
    async function guardarIntervalos() {
        const cabanaId = document.getElementById('tarifaCabanaSelect').value;
        if(!cabanaId) { alert('Selecciona cabaña'); return; }
        await db.collection('cabanas').doc(cabanaId).update({ 'tarifas.intervalos': intervalosActuales, actualizadoEn: firebase.firestore.FieldValue.serverTimestamp() });
        alert('Intervalos guardados');
    }
    document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>{
        document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p=>p.style.display='none');
        btn.classList.add('active');
        document.getElementById(`${btn.dataset.tab}Panel`).style.display='block';
        if(btn.dataset.tab==='tarifas') cargarSelectCabanas();
    }));
    auth.onAuthStateChanged(user=>{if(user)login();});
    window.login=login; window.logout=logout; window.nuevaCabana=nuevaCabana; window.editarCabana=editarCabana; window.guardarCabana=guardarCabana; window.eliminarCabana=eliminarCabana; window.cancelarEdicion=cancelarEdicion; window.eliminarFoto=eliminarFoto; window.agregarIntervalo=agregarIntervalo; window.eliminarIntervalo=eliminarIntervalo; window.guardarIntervalos=guardarIntervalos;
</script>
</body>
</html>
