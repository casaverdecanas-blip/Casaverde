<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Cabañas - Casa Verde Canas</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f7fa; }
        .admin-header { background: #2d5a27; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .admin-nav { background: white; padding: 0 25px; display: flex; gap: 5px; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
        .nav-item { padding: 14px 20px; background: none; border: none; cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; color: #6c757d; }
        .nav-item.active { color: #2d5a27; border-bottom: 3px solid #2d5a27; }
        .admin-content { max-width: 1400px; margin: 30px auto; padding: 0 25px; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h2 { color: #2d5a27; margin-bottom: 20px; border-bottom: 2px solid #e8f5e9; padding-bottom: 12px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap: 15px; }
        .lang-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
        .btn-primary { background: #2d5a27; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .fotos-grid { display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0; }
        .foto-item { position: relative; width: 100px; height: 100px; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; }
        .foto-item img { width: 100%; height: 100%; object-fit: cover; }
        .foto-item button { position: absolute; top: 5px; right: 5px; background: #e74c3c; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; }
        .intervalo-card { background: #f8f9fa; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        @media (max-width:768px){ .lang-row{ grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div id="loginContainer" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div style="background:white; padding:40px; border-radius:24px; width:350px; text-align:center;">
        <h2 style="color:#2d5a27;">🏠 Gestionar Cabañas</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>
        <div id="loginError" style="color:red;"></div>
    </div>
</div>
<div id="mainPanel" style="display:none;">
    <div class="admin-header"><h1>🏠 Cabañas</h1><div><span id="userEmail"></span><button class="btn-secondary" onclick="logout()">Salir</button></div></div>
    <div class="admin-nav">
        <button class="nav-item active" data-tab="cabanas">Cabañas</button>
        <button class="nav-item" data-tab="tarifas">Tarifas por temporada</button>
    </div>
    <div class="admin-content">
        <div id="cabanasPanel" class="tab-panel active">
            <div class="card"><h2>Listado de Cabañas</h2><div id="cabanasList"></div><button class="btn-primary" onclick="nuevaCabana()">+ Nueva Cabaña</button></div>
            <div class="card" id="formCard" style="display:none;"><h2 id="formTitle">Editar Cabaña</h2><input type="hidden" id="editId"><div class="form-row"><div class="form-group"><label>ID numérico</label><input type="number" id="idNum" required></div><div class="form-group"><label>Orden</label><input type="number" id="orden"></div><div class="form-group"><label>Activa</label><select id="activa"><option value="true">Activa</option><option value="false">Inactiva</option></select></div></div><div class="lang-row"><div class="form-group"><label>Nombre ES</label><input id="nombreEs"></div><div class="form-group"><label>Nome PT</label><input id="nombrePt"></div><div class="form-group"><label>Name EN</label><input id="nombreEn"></div></div><div class="lang-row"><div class="form-group"><label>Descripción ES</label><textarea id="descEs" rows="2"></textarea></div><div class="form-group"><label>Descrição PT</label><textarea id="descPt" rows="2"></textarea></div><div class="form-group"><label>Description EN</label><textarea id="descEn" rows="2"></textarea></div></div><div class="form-row"><div class="form-group"><label>Capacidad base</label><input type="number" id="capBase" value="2"></div><div class="form-group"><label>Capacidad máxima</label><input type="number" id="capMax" value="4"></div><div class="form-group"><label>Camas dobles</label><input type="number" id="camasDobles" value="1"></div><div class="form-group"><label>Camas individuales</label><input type="number" id="camasIndiv" value="0"></div></div><div class="form-group"><label>Comodidades (una por línea)</label><textarea id="comodidades" rows="3"></textarea></div><div class="form-group"><label>Fotos (URLs, una por línea)</label><textarea id="fotosUrls" rows="3"></textarea><div id="fotosPreview" class="fotos-grid"></div></div><div class="form-row"><div class="form-group"><label>Precio base por noche (R$)</label><input type="number" id="precioBase" step="10" value="250"></div><div class="form-group"><label>Extra por persona (R$/noche)</label><input type="number" id="precioExtra" step="10" value="50"></div><div class="form-group"><label>Precio limpieza (R$)</label><input type="number" id="precioLimpieza" step="10" value="150"></div></div><div class="form-group"><label>Airbnb URL</label><input type="url" id="airbnbUrl"></div><div class="form-group"><label>Google Calendar iframe</label><textarea id="googleCalendar" rows="2"></textarea></div><div><button class="btn-primary" onclick="guardarCabana()">Guardar</button><button class="btn-secondary" onclick="cancelarEdicion()">Cancelar</button></div></div>
        </div>
        <div id="tarifasPanel" class="tab-panel">
            <div class="card"><h2>Tarifas por temporada</h2><div class="form-group"><label>Cabaña</label><select id="tarifaCabanaSelect"></select></div><div id="intervalosContainer"></div><button class="btn-primary" onclick="agregarIntervalo()">+ Agregar período</button><button class="btn-primary" onclick="guardarIntervalos()">Guardar intervalos</button></div>
        </div>
    </div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4", authDomain: "casaverdecanas-199.firebaseapp.com", projectId: "casaverdecanas-199" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUser = null;
    let cabanasCache = [];
    let intervalosActuales = [];

    async function login() {
        const email = document.getElementById('email').value, password = document.getElementById('password').value;
        try {
            const cred = await auth.signInWithEmailAndPassword(email, password);
            const userDoc = await db.collection('usuarios').doc(cred.user.uid).get();
            if (userDoc.exists && userDoc.data().rol === 'admin') {
                currentUser = cred.user;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                document.getElementById('userEmail').textContent = email;
                cargarCabanas();
                cargarSelectCabanas();
            } else { alert('No eres admin'); auth.signOut(); }
        } catch(e) { document.getElementById('loginError').innerText = e.message; }
    }
    function logout() { auth.signOut().then(() => location.reload()); }
    async function cargarCabanas() {
        const snap = await db.collection('cabanas').orderBy('orden').get();
        cabanasCache = snap.docs.map(d=> ({ id: d.id, ...d.data() }));
        const container = document.getElementById('cabanasList');
        if (!cabanasCache.length) { container.innerHTML = '<div>No hay cabañas</div>'; return; }
        container.innerHTML = cabanasCache.map(c => `<div style="border:1px solid #ddd; margin-bottom:10px; padding:10px; border-radius:12px;"><strong>${c.nombre?.es || c.id}</strong> (ID ${c.id}) - ${c.activa ? 'Activa' : 'Inactiva'} <button class="btn-sm btn-primary" onclick="editarCabana('${c.id}')">Editar</button> <button class="btn-sm btn-danger" onclick="eliminarCabana('${c.id}')">Eliminar</button></div>`).join('');
    }
    function nuevaCabana() {
        document.getElementById('formCard').style.display = 'block';
        document.getElementById('formTitle').innerText = 'Nueva Cabaña';
        document.getElementById('editId').value = '';
        document.getElementById('idNum').value = '';
        document.getElementById('orden').value = '';
        document.getElementById('activa').value = 'true';
        ['nombreEs','nombrePt','nombreEn','descEs','descPt','descEn','comodidades','fotosUrls','airbnbUrl','googleCalendar'].forEach(id=>document.getElementById(id).value='');
        document.getElementById('capBase').value = '2';
        document.getElementById('capMax').value = '4';
        document.getElementById('camasDobles').value = '1';
        document.getElementById('camasIndiv').value = '0';
        document.getElementById('precioBase').value = '250';
        document.getElementById('precioExtra').value = '50';
        document.getElementById('precioLimpieza').value = '150';
        actualizarPreviewFotos();
    }
    async function editarCabana(id) {
        const doc = await db.collection('cabanas').doc(id).get();
        if(!doc.exists) return;
        const c = doc.data();
        document.getElementById('formCard').style.display = 'block';
        document.getElementById('formTitle').innerText = 'Editar Cabaña';
        document.getElementById('editId').value = id;
        document.getElementById('idNum').value = c.id;
        document.getElementById('orden').value = c.orden || '';
        document.getElementById('activa').value = c.activa ? 'true' : 'false';
        document.getElementById('nombreEs').value = c.nombre?.es || '';
        document.getElementById('nombrePt').value = c.nombre?.pt || '';
        document.getElementById('nombreEn').value = c.nombre?.en || '';
        document.getElementById('descEs').value = c.descripcion?.es || '';
        document.getElementById('descPt').value = c.descripcion?.pt || '';
        document.getElementById('descEn').value = c.descripcion?.en || '';
        document.getElementById('capBase').value = c.capacidad?.base || 2;
        document.getElementById('capMax').value = c.capacidad?.max || 4;
        document.getElementById('camasDobles').value = c.camas?.dobles || 1;
        document.getElementById('camasIndiv').value = c.camas?.individuales || 0;
        document.getElementById('comodidades').value = (c.comodidades || []).join('\n');
        document.getElementById('fotosUrls').value = (c.fotos || []).join('\n');
        document.getElementById('precioBase').value = c.tarifas?.precioBase || 250;
        document.getElementById('precioExtra').value = c.tarifas?.precioExtraPersona || 50;
        document.getElementById('precioLimpieza').value = c.tarifas?.precioLimpieza || 150;
        document.getElementById('airbnbUrl').value = c.airbnb_url || '';
        document.getElementById('googleCalendar').value = c.google_calendar_iframe || '';
        actualizarPreviewFotos();
    }
    function actualizarPreviewFotos() {
        const urls = document.getElementById('fotosUrls').value.split('\n').filter(u=>u.trim());
        const container = document.getElementById('fotosPreview');
        container.innerHTML = urls.map((url,i)=>`<div class="foto-item"><img src="${url}" onerror="this.src='https://via.placeholder.com/100'"><button onclick="eliminarFoto(${i})">✖</button></div>`).join('');
    }
    function eliminarFoto(idx) {
        let urls = document.getElementById('fotosUrls').value.split('\n').filter(u=>u.trim());
        urls.splice(idx,1);
        document.getElementById('fotosUrls').value = urls.join('\n');
        actualizarPreviewFotos();
    }
    async function guardarCabana() {
        const id = document.getElementById('editId').value;
        const idNum = parseInt(document.getElementById('idNum').value);
        if(!idNum) { alert('ID numérico requerido'); return; }
        const fotos = document.getElementById('fotosUrls').value.split('\n').filter(u=>u.trim());
        const comodidades = document.getElementById('comodidades').value.split('\n').filter(l=>l.trim());
        const data = {
            id: idNum,
            orden: parseInt(document.getElementById('orden').value) || idNum,
            activa: document.getElementById('activa').value === 'true',
            nombre: { es: document.getElementById('nombreEs').value, pt: document.getElementById('nombrePt').value, en: document.getElementById('nombreEn').value },
            descripcion: { es: document.getElementById('descEs').value, pt: document.getElementById('descPt').value, en: document.getElementById('descEn').value },
            capacidad: { base: parseInt(document.getElementById('capBase').value), max: parseInt(document.getElementById('capMax').value) },
            camas: { dobles: parseInt(document.getElementById('camasDobles').value), individuales: parseInt(document.getElementById('camasIndiv').value) },
            comodidades: comodidades,
            fotos: fotos,
            tarifas: {
                precioBase: parseFloat(document.getElementById('precioBase').value),
                precioExtraPersona: parseFloat(document.getElementById('precioExtra').value),
                precioLimpieza: parseFloat(document.getElementById('precioLimpieza').value),
                intervalos: []  // se maneja aparte
            },
            airbnb_url: document.getElementById('airbnbUrl').value,
            google_calendar_iframe: document.getElementById('googleCalendar').value,
            actualizadoEn: firebase.firestore.FieldValue.serverTimestamp()
        };
        if(!id) data.creadoEn = firebase.firestore.FieldValue.serverTimestamp();
        try {
            if(id) await db.collection('cabanas').doc(id).update(data);
            else await db.collection('cabanas').doc(idNum.toString()).set(data);
            alert('Guardado');
            cancelarEdicion();
            cargarCabanas();
            cargarSelectCabanas();
        } catch(e) { alert('Error: '+e.message); }
    }
    function cancelarEdicion() { document.getElementById('formCard').style.display = 'none'; }
    async function eliminarCabana(id) { if(confirm('¿Eliminar?')){ await db.collection('cabanas').doc(id).delete(); cargarCabanas(); cargarSelectCabanas(); } }

    // Tarifas por temporada
    async function cargarSelectCabanas() {
        const snap = await db.collection('cabanas').orderBy('orden').get();
        const select = document.getElementById('tarifaCabanaSelect');
        select.innerHTML = '<option value="">Seleccionar</option>';
        snap.forEach(doc=>{ const c=doc.data(); select.innerHTML+=`<option value="${doc.id}">${c.nombre?.es||c.id}</option>`; });
        select.onchange = () => cargarIntervalos(select.value);
    }
    async function cargarIntervalos(cabanaId) {
        if(!cabanaId) { document.getElementById('intervalosContainer').innerHTML=''; return; }
        const doc = await db.collection('cabanas').doc(cabanaId).get();
        intervalosActuales = doc.data().tarifas?.intervalos || [];
        renderIntervalos();
    }
    function renderIntervalos() {
        const container = document.getElementById('intervalosContainer');
        if(!intervalosActuales.length){ container.innerHTML='<p>Sin intervalos</p>'; return; }
        container.innerHTML = intervalosActuales.map((int,idx)=>`
            <div class="intervalo-card">
                <div class="form-row">
                    <div><label>Desde</label><input type="date" class="int-desde" data-idx="${idx}" value="${int.desde||''}"></div>
                    <div><label>Hasta</label><input type="date" class="int-hasta" data-idx="${idx}" value="${int.hasta||''}"></div>
                    <div><label>Precio noche</label><input type="number" step="10" class="int-precio" data-idx="${idx}" value="${int.precioNoche||0}"></div>
                    <div><label>Extra persona</label><input type="number" step="10" class="int-extra" data-idx="${idx}" value="${int.precioExtra||0}"></div>
                </div>
                <button class="btn-sm btn-danger" onclick="eliminarIntervalo(${idx})">Eliminar</button>
            </div>
        `).join('');
        document.querySelectorAll('.int-desde').forEach(i=>i.addEventListener('change',e=>{ intervalosActuales[e.target.dataset.idx].desde = e.target.value; }));
        document.querySelectorAll('.int-hasta').forEach(i=>i.addEventListener('change',e=>{ intervalosActuales[e.target.dataset.idx].hasta = e.target.value; }));
        document.querySelectorAll('.int-precio').forEach(i=>i.addEventListener('change',e=>{ intervalosActuales[e.target.dataset.idx].precioNoche = parseFloat(e.target.value); }));
        document.querySelectorAll('.int-extra').forEach(i=>i.addEventListener('change',e=>{ intervalosActuales[e.target.dataset.idx].precioExtra = parseFloat(e.target.value); }));
    }
    function agregarIntervalo() { intervalosActuales.push({ desde:'', hasta:'', precioNoche:0, precioExtra:0 }); renderIntervalos(); }
    function eliminarIntervalo(idx) { intervalosActuales.splice(idx,1); renderIntervalos(); }
    async function guardarIntervalos() {
        const cabanaId = document.getElementById('tarifaCabanaSelect').value;
        if(!cabanaId) { alert('Selecciona una cabaña'); return; }
        await db.collection('cabanas').doc(cabanaId).update({ 'tarifas.intervalos': intervalosActuales });
        alert('Intervalos guardados');
    }
    window.eliminarFoto = eliminarFoto;
    window.nuevaCabana = nuevaCabana; window.editarCabana = editarCabana; window.guardarCabana = guardarCabana; window.cancelarEdicion = cancelarEdicion; window.eliminarCabana = eliminarCabana;
    window.agregarIntervalo = agregarIntervalo; window.eliminarIntervalo = eliminarIntervalo; window.guardarIntervalos = guardarIntervalos;
    window.login = login; window.logout = logout;
    document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>{
        document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab+'Panel').classList.add('active');
        if(btn.dataset.tab === 'tarifas') cargarSelectCabanas();
    }));
    auth.onAuthStateChanged(user=>{ if(user) login(); });
</script>
</body>
</html>
