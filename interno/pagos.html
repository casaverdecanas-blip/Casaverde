<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos - Casa Verde Canas</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f7fa; }
        .admin-header { background: #2d5a27; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .admin-nav { background: white; padding: 0 25px; display: flex; gap: 5px; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
        .nav-item { padding: 14px 20px; background: none; border: none; cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; color: #6c757d; text-decoration: none; }
        .nav-item.active { color: #2d5a27; border-bottom: 3px solid #2d5a27; }
        .admin-content { max-width: 1400px; margin: 30px auto; padding: 0 25px; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h2 { color: #2d5a27; margin-bottom: 20px; border-bottom: 2px solid #e8f5e9; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
        .btn-primary { background: #2d5a27; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid #e9ecef; }
        .data-table th { background: #f8f9fa; color: #2d5a27; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:white; padding:30px; border-radius:20px; width:90%; max-width:500px; }
        @media (max-width:768px){ .form-row{ grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div id="loginContainer" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div style="background:white; padding:40px; border-radius:24px; width:350px; text-align:center;">
        <h2>💰 Pagos</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>
        <div id="loginError" style="color:red;"></div>
    </div>
</div>
<div id="mainPanel" style="display:none;">
    <div class="admin-header"><h1>💰 Pagos</h1><div><span id="userEmail"></span><button class="btn-secondary" onclick="logout()">Salir</button></div></div>
    <div class="admin-nav">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="reservas.html" class="nav-item">Reservas</a>
        <a href="presupuestos.html" class="nav-item">Presupuestos</a>
        <a href="cabanas-admin.html" class="nav-item">Cabañas</a>
        <a href="clientes.html" class="nav-item">Clientes</a>
        <a href="pagos.html" class="nav-item active">Pagos</a>
    </div>
    <div class="admin-content">
        <div class="card"><h2>Registro de Pagos</h2><button class="btn-primary" onclick="nuevoPago()">+ Nuevo Pago</button><div id="pagosList"></div></div>
    </div>
</div>
<!-- Modal Pago -->
<div id="modalPago" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Registrar Pago</h3>
        <input type="hidden" id="pagoId">
        <div class="form-group"><label>Reserva (cliente)</label><select id="reservaSelect"></select></div>
        <div class="form-row"><div class="form-group"><label>Monto</label><input type="number" id="monto" step="0.01"></div><div class="form-group"><label>Moneda</label><select id="moneda"><option value="BRL">BRL</option><option value="USD">USD</option></select></div></div>
        <div class="form-row"><div class="form-group"><label>Método</label><select id="metodo"><option value="pix">PIX</option><option value="transferencia">Transferencia</option><option value="efectivo">Efectivo</option><option value="tarjeta">Tarjeta</option></select></div><div class="form-group"><label>Tipo</label><select id="tipo"><option value="seña">Seña</option><option value="parcial">Parcial</option><option value="total">Total</option></select></div></div>
        <div class="form-group"><label>Observaciones</label><input type="text" id="observaciones"></div>
        <div><button class="btn-success" onclick="guardarPago()">Guardar</button><button class="btn-secondary" onclick="cerrarModal()">Cancelar</button></div>
    </div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4", authDomain: "casaverdecanas-199.firebaseapp.com", projectId: "casaverdecanas-199" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUser = null;
    let reservasCache = [];

    async function login() {
        const email = document.getElementById('email').value, password = document.getElementById('password').value;
        try {
            const cred = await auth.signInWithEmailAndPassword(email, password);
            const userDoc = await db.collection('usuarios').doc(cred.user.uid).get();
            if(userDoc.exists && userDoc.data().rol === 'admin') {
                currentUser = cred.user;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                document.getElementById('userEmail').textContent = email;
                cargarReservasSelect();
                cargarPagos();
            } else alert('No eres admin');
        } catch(e) { document.getElementById('loginError').innerText = e.message; }
    }
    function logout() { auth.signOut().then(()=>location.reload()); }
    async function cargarReservasSelect() {
        const snap = await db.collection('reservas').orderBy('checkIn','desc').get();
        reservasCache = snap.docs.map(d=>({ id: d.id, ...d.data() }));
        const select = document.getElementById('reservaSelect');
        select.innerHTML = reservasCache.map(r=>`<option value="${r.id}">${r.nombre} - Cabaña ${r.caba} (${r.checkIn?.toDate?.()?.toLocaleDateString()||''})</option>`).join('');
    }
    async function cargarPagos() {
        const snap = await db.collection('pagos').orderBy('creadoEn','desc').get();
        const container = document.getElementById('pagosList');
        if(snap.empty) { container.innerHTML='<div>No hay pagos registrados</div>'; return; }
        let totalBRL=0, totalUSD=0;
        let html = `<table class="data-table"><thead><th>Fecha</th><th>Reserva</th><th>Cliente</th><th>Monto</th><th>Método</th><th>Tipo</th></thead><tbody>`;
        for(const doc of snap.docs){
            const p = doc.data();
            const fecha = p.creadoEn?.toDate?.()?.toLocaleDateString() || '';
            if(p.moneda === 'USD') totalUSD += p.monto;
            else totalBRL += p.monto;
            html += `<tr><td>${fecha}</td><td>${p.reservaId}</td><td>${p.clienteNombre||''}</td><td>${p.moneda==='USD'?'USD':'R$'} ${p.monto?.toFixed(2)}</td><td>${p.metodo}</td><td>${p.tipo}</td></tr>`;
        }
        html += `<tr style="background:#e8f5e9; font-weight:bold;"><td colspan="3">TOTALES</td><td>R$ ${totalBRL.toFixed(2)}</td><td colspan="2">USD ${totalUSD.toFixed(2)}</td></tr>`;
        html += `</tbody></table>`;
        container.innerHTML = html;
    }
    function nuevoPago() {
        document.getElementById('pagoId').value = '';
        document.getElementById('monto').value = '';
        document.getElementById('moneda').value = 'BRL';
        document.getElementById('metodo').value = 'pix';
        document.getElementById('tipo').value = 'total';
        document.getElementById('observaciones').value = '';
        document.getElementById('modalPago').style.display = 'flex';
    }
    function cerrarModal() { document.getElementById('modalPago').style.display = 'none'; }
    async function guardarPago() {
        const reservaId = document.getElementById('reservaSelect').value;
        if(!reservaId) { alert('Selecciona una reserva'); return; }
        const monto = parseFloat(document.getElementById('monto').value);
        if(isNaN(monto) || monto<=0) { alert('Monto válido'); return; }
        const reserva = reservasCache.find(r=>r.id===reservaId);
        await db.collection('pagos').add({
            reservaId: reservaId,
            clienteNombre: reserva.nombre,
            monto: monto,
            moneda: document.getElementById('moneda').value,
            metodo: document.getElementById('metodo').value,
            tipo: document.getElementById('tipo').value,
            observaciones: document.getElementById('observaciones').value,
            creadoEn: firebase.firestore.FieldValue.serverTimestamp(),
            creadoPor: currentUser.uid
        });
        alert('Pago registrado');
        cerrarModal();
        cargarPagos();
    }
    window.nuevoPago = nuevoPago; window.guardarPago = guardarPago; window.cerrarModal = cerrarModal;
    window.login = login; window.logout = logout;
    auth.onAuthStateChanged(user=>{ if(user) login(); });
</script>
</body>
</html>
