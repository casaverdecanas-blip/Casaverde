<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarifas - Casa Verde Canas</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f7fa; }
        .admin-header { background: #2d5a27; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .admin-nav { background: white; padding: 0 25px; display: flex; gap: 5px; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
        .nav-item { padding: 14px 20px; background: none; border: none; cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; color: #6c757d; text-decoration: none; }
        .nav-item.active { color: #2d5a27; border-bottom: 3px solid #2d5a27; }
        .admin-content { max-width: 1200px; margin: 30px auto; padding: 0 25px; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h2 { color: #2d5a27; margin-bottom: 20px; border-bottom: 2px solid #e8f5e9; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        
        .btn-primary { background: #2d5a27; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-secondary { background: #95a5a6; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-sm { padding: 5px 10px; font-size: 12px; margin: 2px; }
        
        .tabla-tarifas { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .tabla-tarifas th, .tabla-tarifas td { padding: 12px; text-align: left; border-bottom: 1px solid #e9ecef; }
        .tabla-tarifas th { background: #f8f9fa; color: #2d5a27; }
        
        .intervalo-row { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; }
        
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loginContainer" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #1e3c2c 0%, #2d5a27 100%);">
    <div style="background: white; padding: 40px; border-radius: 24px; width: 350px; text-align: center;">
        <h2 style="color: #2d5a27;">💰 Tarifas</h2>
        <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin:10px 0;">
        <input type="password" id="password" placeholder="Contraseña" style="width:100%; padding:12px; margin:10px 0;">
        <button onclick="login()" style="width:100%; padding:12px; background:#2d5a27; color:white; border:none; border-radius:12px;">Ingresar</button>
        <div id="loginError" style="color:red; margin-top:10px;"></div>
    </div>
</div>

<div id="mainPanel" style="display: none;">
    <div class="admin-header">
        <h1><span class="material-icons">attach_money</span> Tarifas por Cabaña</h1>
        <div class="user-info"><span id="userEmail"></span><button class="logout-btn" onclick="logout()">Salir</button></div>
    </div>
    <div class="admin-nav">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="calendario.html" class="nav-item">Calendario</a>
        <a href="reservas.html" class="nav-item">Reservas</a>
        <a href="presupuestos.html" class="nav-item">Presupuestos</a>
        <a href="tarifas.html" class="nav-item active">Tarifas</a>
        <a href="tareas-limpieza.html" class="nav-item">Limpieza</a>
    </div>
    
    <div class="admin-content">
        <div class="card">
            <h2>🏠 Tarifas Base por Cabaña</h2>
            <div id="tarifasContainer"></div>
            <button class="btn-primary" onclick="abrirModalNuevaTarifa()">+ Nueva Tarifa</button>
        </div>
    </div>
</div>

<!-- Modal para editar tarifa -->
<div id="modalTarifa" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">💰 Configurar Tarifa</h3>
        <input type="hidden" id="tarifaId">
        
        <div class="form-group"><label>🏠 Cabaña</label><select id="cabaña"><option value="1">Cabaña 1 (Naranja)</option><option value="2">Cabaña 2 (Azul)</option><option value="3">Cabaña 3 (Verde)</option></select></div>
        <div class="form-group"><label>👥 Cantidad base de personas</label><input type="number" id="personasBase" value="2" min="1"></div>
        <div class="form-group"><label>💰 Precio por noche (base)</label><input type="number" id="precioBase" step="10" value="250"></div>
        <div class="form-group"><label>➕ Precio por persona extra (por noche)</label><input type="number" id="precioExtraPersona" step="10" value="50"></div>
        <div class="form-group"><label>🧹 Precio de limpieza (por reserva)</label><input type="number" id="precioLimpieza" step="10" value="150"></div>
        
        <h4 style="margin: 15px 0 10px;">📅 Tarifas por temporada (intervalos)</h4>
        <div id="intervalosContainer"></div>
        <button type="button" class="btn-secondary btn-sm" onclick="agregarIntervalo()">+ Agregar intervalo</button>
        
        <div class="modal-buttons" style="margin-top: 20px; display: flex; gap: 10px;">
            <button class="btn-secondary" onclick="cerrarModalTarifa()">Cancelar</button>
            <button class="btn-primary" onclick="guardarTarifa()">Guardar</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4",
        authDomain: "casaverdecanas-199.firebaseapp.com",
        projectId: "casaverdecanas-199"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    let currentUser = null;
    let tarifasCache = [];
    let intervalosTemp = [];
    
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            const cred = await auth.signInWithEmailAndPassword(email, password);
            const userDoc = await db.collection('usuarios').doc(cred.user.uid).get();
            if (userDoc.exists && userDoc.data().rol === 'admin') {
                currentUser = cred.user;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                document.getElementById('userEmail').textContent = email;
                cargarTarifas();
            } else { alert('No eres administrador'); auth.signOut(); }
        } catch(e) { document.getElementById('loginError').textContent = 'Error: ' + e.message; }
    }
    
    function logout() { auth.signOut().then(() => location.reload()); }
    
    async function cargarTarifas() {
        const snap = await db.collection('tarifas').get();
        tarifasCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderizarTarifas();
    }
    
    function renderizarTarifas() {
        const container = document.getElementById('tarifasContainer');
        if (!tarifasCache.length) {
            container.innerHTML = '<div class="empty-state">No hay tarifas configuradas</div>';
            return;
        }
        
        let html = `<table class="tabla-tarifas"><thead><th>Cabaña</th><th>Base personas</th><th>Precio noche</th><th>Persona extra</th><th>Limpieza</th><th>Acciones</th></thead><tbody>`;
        for (const t of tarifasCache) {
            html += `<tr>
                <td>Cabaña ${t.cabaña}</td>
                <td>${t.personasBase}</td>
                <td>R$ ${t.precioBase}</td>
                <td>R$ ${t.precioExtraPersona}</td>
                <td>R$ ${t.precioLimpieza}</td>
                <td><button class="btn-sm btn-primary" onclick="editarTarifa('${t.id}')">Editar</button></td>
            </tr>`;
        }
        html += `</tbody></table>`;
        container.innerHTML = html;
    }
    
    function abrirModalNuevaTarifa() {
        document.getElementById('modalTitle').innerHTML = '💰 Nueva Tarifa';
        document.getElementById('tarifaId').value = '';
        document.getElementById('cabaña').value = '1';
        document.getElementById('personasBase').value = '2';
        document.getElementById('precioBase').value = '250';
        document.getElementById('precioExtraPersona').value = '50';
        document.getElementById('precioLimpieza').value = '150';
        intervalosTemp = [];
        renderizarIntervalos();
        document.getElementById('modalTarifa').style.display = 'flex';
    }
    
    async function editarTarifa(id) {
        const tarifa = tarifasCache.find(t => t.id === id);
        if (!tarifa) return;
        document.getElementById('modalTitle').innerHTML = '✏️ Editar Tarifa';
        document.getElementById('tarifaId').value = id;
        document.getElementById('cabaña').value = tarifa.cabaña;
        document.getElementById('personasBase').value = tarifa.personasBase;
        document.getElementById('precioBase').value = tarifa.precioBase;
        document.getElementById('precioExtraPersona').value = tarifa.precioExtraPersona;
        document.getElementById('precioLimpieza').value = tarifa.precioLimpieza;
        intervalosTemp = tarifa.intervalos || [];
        renderizarIntervalos();
        document.getElementById('modalTarifa').style.display = 'flex';
    }
    
    function renderizarIntervalos() {
        const container = document.getElementById('intervalosContainer');
        if (intervalosTemp.length === 0) {
            container.innerHTML = '<p style="color:#999;">No hay intervalos configurados</p>';
            return;
        }
        
        let html = '';
        intervalosTemp.forEach((int, idx) => {
            html += `<div class="intervalo-row">
                <div class="form-row">
                    <div class="form-group"><label>Desde</label><input type="date" value="${int.desde}" data-idx="${idx}" class="intervalo-desde"></div>
                    <div class="form-group"><label>Hasta</label><input type="date" value="${int.hasta}" data-idx="${idx}" class="intervalo-hasta"></div>
                    <div class="form-group"><label>Precio noche</label><input type="number" value="${int.precioNoche}" data-idx="${idx}" class="intervalo-precio"></div>
                    <div class="form-group"><label>Precio extra</label><input type="number" value="${int.precioExtra}" data-idx="${idx}" class="intervalo-extra"></div>
                </div>
                <button class="btn-sm btn-secondary" onclick="eliminarIntervalo(${idx})">Eliminar</button>
            </div>`;
        });
        container.innerHTML = html;
        
        // Bind events
        document.querySelectorAll('.intervalo-desde').forEach(inp => {
            inp.addEventListener('change', (e) => { intervalosTemp[e.target.dataset.idx].desde = e.target.value; });
        });
        document.querySelectorAll('.intervalo-hasta').forEach(inp => {
            inp.addEventListener('change', (e) => { intervalosTemp[e.target.dataset.idx].hasta = e.target.value; });
        });
        document.querySelectorAll('.intervalo-precio').forEach(inp => {
            inp.addEventListener('change', (e) => { intervalosTemp[e.target.dataset.idx].precioNoche = parseFloat(e.target.value); });
        });
        document.querySelectorAll('.intervalo-extra').forEach(inp => {
            inp.addEventListener('change', (e) => { intervalosTemp[e.target.dataset.idx].precioExtra = parseFloat(e.target.value); });
        });
    }
    
    function agregarIntervalo() {
        intervalosTemp.push({ desde: '', hasta: '', precioNoche: 0, precioExtra: 0 });
        renderizarIntervalos();
    }
    
    function eliminarIntervalo(idx) {
        intervalosTemp.splice(idx, 1);
        renderizarIntervalos();
    }
    
    async function guardarTarifa() {
        const id = document.getElementById('tarifaId').value;
        const data = {
            cabaña: parseInt(document.getElementById('cabaña').value),
            personasBase: parseInt(document.getElementById('personasBase').value),
            precioBase: parseFloat(document.getElementById('precioBase').value),
            precioExtraPersona: parseFloat(document.getElementById('precioExtraPersona').value),
            precioLimpieza: parseFloat(document.getElementById('precioLimpieza').value),
            intervalos: intervalosTemp,
            actualizadoEn: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        if (id) {
            await db.collection('tarifas').doc(id).update(data);
        } else {
            await db.collection('tarifas').add(data);
        }
        
        cerrarModalTarifa();
        cargarTarifas();
        alert('✅ Tarifa guardada');
    }
    
    function cerrarModalTarifa() { document.getElementById('modalTarifa').style.display = 'none'; }
    
    window.login = login; window.logout = logout;
    window.abrirModalNuevaTarifa = abrirModalNuevaTarifa;
    window.editarTarifa = editarTarifa;
    window.guardarTarifa = guardarTarifa;
    window.cerrarModalTarifa = cerrarModalTarifa;
    window.agregarIntervalo = agregarIntervalo;
    window.eliminarIntervalo = eliminarIntervalo;
    
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            const userDoc = await db.collection('usuarios').doc(user.uid).get();
            if (userDoc.exists && userDoc.data().rol === 'admin') {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                document.getElementById('userEmail').textContent = user.email;
                cargarTarifas();
            }
        }
    });
</script>
</body>
</html>
