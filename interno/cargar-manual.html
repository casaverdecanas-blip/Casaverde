<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cargar Manual · Casa Verde Canas</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<style>
  body { font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; padding: 24px; background: #f4f4f4; }
  .card { background: white; border-radius: 12px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
  h1 { color: #2d6a4f; font-size: 1.4rem; margin-bottom: 8px; }
  p  { color: #555; font-size: .9rem; margin-bottom: 24px; }
  button {
    width: 100%; padding: 16px; font-size: 1rem; font-weight: 700;
    background: #2d6a4f; color: white; border: none; border-radius: 8px;
    cursor: pointer; margin-bottom: 12px;
  }
  button:disabled { background: #aaa; cursor: not-allowed; }
  button.danger { background: #dc2626; }
  #estado {
    margin-top: 16px; padding: 14px; border-radius: 8px;
    font-size: .9rem; font-weight: 600; display: none;
  }
  #estado.ok    { background: #d1fae5; color: #065f46; }
  #estado.error { background: #fee2e2; color: #991b1b; }
  #estado.info  { background: #e0f2fe; color: #075985; }
  .sep { border: none; border-top: 1px solid #eee; margin: 24px 0; }
  #loginBox { margin-bottom: 24px; }
  input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: .9rem; box-sizing: border-box; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="card">
  <h1>🌿 Cargar Manual del Sistema</h1>
  <p>Esta página carga el contenido del manual directamente en Firestore (<code>config/manual</code>). Usála una sola vez desde el iPad sin necesidad de copiar y pegar.</p>

  <div id="loginBox">
    <input type="email" id="email" placeholder="Tu email de admin">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Iniciar sesión</button>
  </div>

  <button id="btnCargar" onclick="cargarManual()" disabled>
    📥 Cargar contenido del manual en Firestore
  </button>

  <button id="btnVerificar" onclick="verificar()" disabled class="danger">
    ✅ Verificar que se guardó
  </button>

  <div id="estado"></div>
</div>

<script>
firebase.initializeApp({
  apiKey:    'AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4',
  authDomain:'casaverdecanas-199.firebaseapp.com',
  projectId: 'casaverdecanas-199'
});
const db   = firebase.firestore();
const auth = firebase.auth();

function mostrar(msg, tipo) {
  var el = document.getElementById('estado');
  el.textContent = msg;
  el.className = tipo;
  el.style.display = 'block';
}

async function login() {
  var email = document.getElementById('email').value;
  var pass  = document.getElementById('pass').value;
  if (!email || !pass) { mostrar('Completá email y contraseña.', 'error'); return; }
  try {
    mostrar('Iniciando sesión...', 'info');
    await auth.signInWithEmailAndPassword(email, pass);
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('btnCargar').disabled = false;
    document.getElementById('btnVerificar').disabled = false;
    mostrar('✅ Sesión iniciada. Ahora tocá el botón para cargar el manual.', 'ok');
  } catch(e) {
    mostrar('Error de login: ' + e.message, 'error');
  }
}

async function cargarManual() {
  var btn = document.getElementById('btnCargar');
  btn.disabled = true;
  btn.textContent = '⏳ Cargando...';
  mostrar('Guardando contenido en Firestore...', 'info');

  try {
    await db.collection('config').doc('manual').set({
      html: CONTENIDO_MANUAL,
      actualizadoEn: firebase.firestore.FieldValue.serverTimestamp(),
      actualizadoPor: auth.currentUser?.uid || 'admin'
    });
    mostrar('✅ Manual cargado correctamente en Firestore (config/manual). Ya podés ir a manual-sistema.html para verlo.', 'ok');
    btn.textContent = '✅ Manual cargado';
  } catch(e) {
    mostrar('❌ Error: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '📥 Cargar contenido del manual en Firestore';
  }
}

async function verificar() {
  mostrar('Verificando...', 'info');
  try {
    var snap = await db.collection('config').doc('manual').get();
    if (snap.exists && snap.data().html && snap.data().html.length > 100) {
      mostrar('✅ El manual está en Firestore. Longitud del HTML: ' + snap.data().html.length + ' caracteres. Todo OK.', 'ok');
    } else {
      mostrar('⚠️ El documento existe pero el contenido parece vacío o incompleto.', 'error');
    }
  } catch(e) {
    mostrar('❌ Error al verificar: ' + e.message, 'error');
  }
}

// ── CONTENIDO DEL MANUAL ──────────────────────────────────────────────────────
// Generado automáticamente. No editar manualmente.
var CONTENIDO_MANUAL = "<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     MANUAL CASA VERDE CANAS \u2014 Contenido para guardar en config/manual\n     Este HTML va dentro del div#manualContent. No incluye <html> ni <body>.\n     Versi\u00f3n 4.2 \u2014 Mayo 2026\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n\n<!-- \u2500\u2500 1. DASHBOARD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n<details class=\"manual-modulo\" open>\n<summary>\n  <div class=\"manual-modulo__icon\"><span class=\"material-icons\">dashboard</span></div>\n  <span>Dashboard \u2014 Inicio del panel</span>\n  <span class=\"rol-admin\">Solo admin</span>\n  <span class=\"material-icons manual-modulo__chevron\">expand_more</span>\n</summary>\n<div class=\"manual-body\">\n  <p class=\"manual-intro\">\n    El Dashboard es la primera pantalla que ves al ingresar al panel. Concentra toda la informaci\u00f3n cr\u00edtica del d\u00eda: reservas activas, tareas urgentes, posici\u00f3n bancaria y alertas del sistema. Se actualiza autom\u00e1ticamente y sincroniza Airbnb al abrirse.\n  </p>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">info</span> Qu\u00e9 muestra el Dashboard</summary>\n    <div class=\"manual-sub__body\">\n      <table class=\"manual-tabla\">\n        <thead><tr><th>Secci\u00f3n</th><th>Qu\u00e9 muestra</th></tr></thead>\n        <tbody>\n          <tr><td><strong>Alertas</strong></td><td>Problemas que requieren atenci\u00f3n inmediata: tareas atrasadas, limpieza sin asignar, honorarios vencidos, presupuestos sin respuesta, obligaciones fiscales.</td></tr>\n          <tr><td><strong>KPIs</strong></td><td>Reservas activas, pendientes de confirmaci\u00f3n, tareas urgentes, clientes totales, ingresos del mes en BRL.</td></tr>\n          <tr><td><strong>Posici\u00f3n bancaria</strong></td><td>Saldo consolidado de todas las cuentas en BRL, desglosado por pa\u00eds. Click en cada cuenta lleva a sus movimientos.</td></tr>\n          <tr><td><strong>Pr\u00f3ximos check-ins</strong></td><td>Reservas confirmadas con fecha de entrada pr\u00f3xima.</td></tr>\n          <tr><td><strong>Tareas pendientes</strong></td><td>Las 6 m\u00e1s urgentes, con sem\u00e1foro de color y d\u00edas de atraso.</td></tr>\n          <tr><td><strong>Pendientes de confirmaci\u00f3n</strong></td><td>Reservas en estado \"pendiente\" que a\u00fan no tienen pago registrado.</td></tr>\n        </tbody>\n      </table>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">sync</span> Sincronizaci\u00f3n autom\u00e1tica de Airbnb</summary>\n    <div class=\"manual-sub__body\">\n      <p>Al abrir el Dashboard, el sistema sincroniza autom\u00e1ticamente los calendarios de Google Calendar de las 3 caba\u00f1as. Tambi\u00e9n pod\u00e9s hacerlo manualmente con el bot\u00f3n \"Sincronizar Airbnb\".</p>\n      <div class=\"flujo\">\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">1</div><div class=\"flujo-paso__text\"><strong>Airbnb actualiza el calendario iCal</strong><em>Ocurre autom\u00e1ticamente cuando se confirma o cancela una reserva en Airbnb</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">2</div><div class=\"flujo-paso__text\"><strong>Google Calendar importa el iCal</strong><em>Cada caba\u00f1a tiene un Google Calendar ID configurado en Config \u2192 Caba\u00f1as</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">3</div><div class=\"flujo-paso__text\"><strong>El sistema lee los eventos via Google Calendar API</strong><em>Lee eventos de los pr\u00f3ximos 12 meses. Filtra autom\u00e1ticamente los bloqueos \"Not available\"</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">4</div><div class=\"flujo-paso__text\"><strong>Se crean reservas nuevas con estado airbnb_activa</strong><em>Solo las que no existen todav\u00eda. Las ya importadas se omiten</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">5</div><div class=\"flujo-paso__text\"><strong>Se detectan cancelaciones</strong><em>Si un evento desaparece del calendario \u2192 la reserva pasa a airbnb_cancelada y se libera el calendario</em></div></div>\n      </div>\n      <div class=\"info-box warning\">\n        <span class=\"material-icons\">warning</span>\n        <span><strong>Importante:</strong> Las tareas de limpieza NO se generan autom\u00e1ticamente al importar. El admin las crea manualmente al completar los datos de la reserva Airbnb.</span>\n      </div>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">build</span> Mantenimiento del sistema</summary>\n    <div class=\"manual-sub__body\">\n      <p>En la parte inferior del Dashboard, colapsado, hay una secci\u00f3n de Mantenimiento con dos herramientas:</p>\n      <ul style=\"margin:8px 0; padding-left:20px; line-height:2\">\n        <li><strong>Manual del sistema</strong> \u2014 acceso directo a esta p\u00e1gina.</li>\n        <li><strong>Sincronizar disponibilidad</strong> \u2014 reconstruye la colecci\u00f3n p\u00fablica <code>disponibilidad</code> desde cero. Usarlo solo si el calendario p\u00fablico muestra fechas incorrectas.</li>\n      </ul>\n    </div>\n  </details>\n</div>\n</details>\n\n<!-- \u2500\u2500 2. RESERVAS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n<details class=\"manual-modulo\">\n<summary>\n  <div class=\"manual-modulo__icon\"><span class=\"material-icons\">event</span></div>\n  <span>Reservas</span>\n  <span class=\"rol-admin\">Solo admin</span>\n  <span class=\"material-icons manual-modulo__chevron\">expand_more</span>\n</summary>\n<div class=\"manual-body\">\n  <p class=\"manual-intro\">\n    Gesti\u00f3n completa del ciclo de vida de cada reserva: desde la consulta inicial hasta el checkout. Existen dos tipos: reservas directas (contacto propio) y reservas de Airbnb (importadas del calendario).\n  </p>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">circle</span> Estados de una reserva</summary>\n    <div class=\"manual-sub__body\">\n      <table class=\"manual-tabla\">\n        <thead><tr><th>Estado</th><th>Significado</th><th>\u00bfBloquea calendario?</th></tr></thead>\n        <tbody>\n          <tr><td><strong>pendiente</strong></td><td>Creada sin pago confirmado. El hu\u00e9sped pregunt\u00f3 pero a\u00fan no reserv\u00f3.</td><td>No</td></tr>\n          <tr><td><strong>confirmada</strong></td><td>Pago registrado. Reserva firme.</td><td>S\u00ed \u2705</td></tr>\n          <tr><td><strong>airbnb_activa</strong></td><td>Importada de Airbnb via Google Calendar.</td><td>S\u00ed \u2705</td></tr>\n          <tr><td><strong>airbnb_cancelada</strong></td><td>Cancelada por el hu\u00e9sped en Airbnb.</td><td>No</td></tr>\n          <tr><td><strong>finalizada</strong></td><td>El hu\u00e9sped ya se fue. Ciclo completo.</td><td>No</td></tr>\n          <tr><td><strong>anulada</strong></td><td>Cancelada manualmente.</td><td>No</td></tr>\n        </tbody>\n      </table>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">home</span> Flujo: Reserva directa paso a paso</summary>\n    <div class=\"manual-sub__body\">\n      <div class=\"flujo\">\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">1</div><div class=\"flujo-paso__text\"><strong>Hu\u00e9sped consulta disponibilidad</strong><em>Por WhatsApp, email o el formulario del sitio p\u00fablico</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">2</div><div class=\"flujo-paso__text\"><strong>Admin crea un presupuesto</strong><em>Men\u00fa Reservas \u2192 Presupuestos \u2192 Nueva. El precio se calcula autom\u00e1ticamente seg\u00fan tarifas y temporada</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">3</div><div class=\"flujo-paso__text\"><strong>Hu\u00e9sped acepta y paga la se\u00f1a</strong><em>Admin registra el pago en Finanzas \u2192 Ingresos/Egresos</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">4</div><div class=\"flujo-paso__text\"><strong>Admin confirma la reserva</strong><em>Estado cambia a \"confirmada\" \u2192 bloquea el calendario p\u00fablico autom\u00e1ticamente</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">5</div><div class=\"flujo-paso__text\"><strong>Admin crea la tarea de limpieza</strong><em>Desde el detalle de la reserva, bot\u00f3n \"Generar tarea de limpieza\". Incluye datos del hu\u00e9sped saliente y entrante</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">6</div><div class=\"flujo-paso__text\"><strong>Hu\u00e9sped llega y se va</strong><em>El admin puede registrar notas, hora de llegada</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">7</div><div class=\"flujo-paso__text\"><strong>Admin marca como finalizada</strong><em>El calendario se libera autom\u00e1ticamente para futuras reservas</em></div></div>\n      </div>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">airplanemode_active</span> Flujo: Reserva Airbnb paso a paso</summary>\n    <div class=\"manual-sub__body\">\n      <div class=\"flujo\">\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">1</div><div class=\"flujo-paso__text\"><strong>Airbnb confirma la reserva y el pago</strong><em>El hu\u00e9sped paga directamente en la plataforma</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">2</div><div class=\"flujo-paso__text\"><strong>Google Calendar se actualiza autom\u00e1ticamente</strong><em>Airbnb publica el evento en el calendario sincronizado</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">3</div><div class=\"flujo-paso__text\"><strong>El sistema importa la reserva</strong><em>Al sincronizar (autom\u00e1tico al abrir el Dashboard), aparece con estado airbnb_activa y bloquea el calendario</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">4</div><div class=\"flujo-paso__text\"><strong>Admin completa los datos del hu\u00e9sped</strong><em>Abre la reserva y carga: nombre, contacto, cantidad de personas, mascotas, necesidades especiales, hora de llegada</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">5</div><div class=\"flujo-paso__text\"><strong>Admin genera la tarea de limpieza</strong><em>Con los datos completos del hu\u00e9sped, el sistema genera la tarea con toda la informaci\u00f3n para el equipo</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">6</div><div class=\"flujo-paso__text\"><strong>Airbnb liquida mensualmente</strong><em>Admin sube el PDF del informe en Finanzas \u2192 Informes Airbnb para registrar el ingreso real</em></div></div>\n      </div>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">calculate</span> Presupuestos \u2014 c\u00f3mo calcular el precio</summary>\n    <div class=\"manual-sub__body\">\n      <p>Al crear un presupuesto o una reserva directa, el precio se calcula autom\u00e1ticamente. Los factores son:</p>\n      <ul style=\"margin:8px 0; padding-left:20px; line-height:2\">\n        <li><strong>Tarifa base por noche</strong> \u2014 configurada en cada caba\u00f1a</li>\n        <li><strong>Tarifas especiales de temporada</strong> \u2014 per\u00edodos con precio diferente (ej: enero, carnaval, semana santa)</li>\n        <li><strong>Cargo por persona extra</strong> \u2014 sobre la capacidad base configurada</li>\n        <li><strong>Cargo de limpieza</strong> \u2014 fijo por estad\u00eda, independiente de las noches</li>\n      </ul>\n      <div class=\"info-box tip\">\n        <span class=\"material-icons\">lightbulb</span>\n        <span>Si hay un per\u00edodo de temporada que cubre parte de las fechas, el sistema aplica el precio especial solo a esas noches y el precio base al resto.</span>\n      </div>\n    </div>\n  </details>\n</div>\n</details>\n\n<!-- \u2500\u2500 3. TAREAS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n<details class=\"manual-modulo\">\n<summary>\n  <div class=\"manual-modulo__icon\"><span class=\"material-icons\">checklist</span></div>\n  <span>Tareas operativas</span>\n  <span class=\"rol-todos\">Admin + Colaborador</span>\n  <span class=\"material-icons manual-modulo__chevron\">expand_more</span>\n</summary>\n<div class=\"manual-body\">\n  <p class=\"manual-intro\">\n    Las tareas son el motor operativo del sistema. Registran limpieza, mantenimiento y cualquier trabajo del equipo, con cron\u00f3metro incorporado y distribuci\u00f3n autom\u00e1tica de honorarios seg\u00fan horas trabajadas. Hay dos vistas: <strong>tareas.html</strong> (vista operativa para todos) y <strong>tareas-admin.html</strong> (gesti\u00f3n y estad\u00edsticas, solo admin).\n  </p>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">traffic</span> El sem\u00e1foro de urgencia</summary>\n    <div class=\"manual-sub__body\">\n      <table class=\"manual-tabla\">\n        <thead><tr><th>Color</th><th>Condici\u00f3n</th><th>Qu\u00e9 hacer</th></tr></thead>\n        <tbody>\n          <tr><td>\u26ab Gris</td><td>La fecha de inicio es futura</td><td>Programada, no requiere acci\u00f3n ahora</td></tr>\n          <tr><td>\ud83d\udfe2 Verde</td><td>La tarea es para hoy o est\u00e1 en curso</td><td>Normal \u2014 atender en el momento indicado</td></tr>\n          <tr><td>\ud83d\udfe1 Amarillo</td><td>Atrasada dentro del primer ciclo de recurrencia</td><td>Atenci\u00f3n \u2014 completar pronto</td></tr>\n          <tr><td>\ud83d\udd34 Rojo</td><td>Super\u00f3 el ciclo de recurrencia o lleva m\u00e1s de 10 d\u00edas sin completar</td><td>Urgente \u2014 aparece en las alertas del Dashboard</td></tr>\n        </tbody>\n      </table>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">play_arrow</span> Ciclo de vida de una tarea \u2014 paso a paso</summary>\n    <div class=\"manual-sub__body\">\n      <div class=\"flujo\">\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">1</div><div class=\"flujo-paso__text\"><strong>Tarea creada \u2014 estado: pendiente</strong><em>Por el admin en tareas-admin.html, o autom\u00e1ticamente al confirmar una reserva (limpieza)</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">2</div><div class=\"flujo-paso__text\"><strong>Colaborador abre la tarea y toca \"Iniciar\"</strong><em>Se registra el timestamp de inicio en la subcolecci\u00f3n de sesiones. La tarea pasa a \"en curso\"</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">3</div><div class=\"flujo-paso__text\"><strong>El cron\u00f3metro corre en pantalla</strong><em>Solo visible para el colaborador activo en esa tarea. Muestra hh:mm:ss desde que inici\u00f3</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">4</div><div class=\"flujo-paso__text\"><strong>Si hay interrupci\u00f3n \u2192 \"Pausar\"</strong><em>Se cierra la sesi\u00f3n activa. Se puede retomar con \"Iniciar\" nuevamente, abriendo una nueva sesi\u00f3n</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">5</div><div class=\"flujo-paso__text\"><strong>Admin o colaborador toca \"Finalizar\"</strong><em>Se cierran todas las sesiones abiertas. El sistema suma todas las sesiones de cada colaborador</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">6</div><div class=\"flujo-paso__text\"><strong>C\u00e1lculo autom\u00e1tico de honorarios</strong><em>Si la tarea tiene monto asignado, se distribuye proporcionalmente seg\u00fan horas de cada colaborador</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">7</div><div class=\"flujo-paso__text\"><strong>Registro en historial_tareas</strong><em>Queda un registro permanente con todos los participantes, horas y montos. La tarea desaparece de la lista activa</em></div></div>\n      </div>\n      <div class=\"info-box tip\">\n        <span class=\"material-icons\">lightbulb</span>\n        <span><strong>Regla de sesiones:</strong> Las sesiones de menos de 5 minutos no acumulan horas. Las sesiones abiertas por m\u00e1s de 8 horas se cierran autom\u00e1ticamente por inactividad.</span>\n      </div>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">cleaning_services</span> Tareas de limpieza \u2014 c\u00f3mo funcionan</summary>\n    <div class=\"manual-sub__body\">\n      <p>Las tareas de limpieza son el tipo m\u00e1s importante. Siempre aparecen al tope de la lista. Se generan desde el detalle de una reserva (no autom\u00e1ticamente) y contienen:</p>\n      <ul style=\"margin:8px 0; padding-left:20px; line-height:2\">\n        <li>Nombre y datos del hu\u00e9sped que <strong>sale</strong> (caba\u00f1a, fecha, hora, notas)</li>\n        <li>Nombre y datos del hu\u00e9sped que <strong>entra</strong> (si hay reserva siguiente registrada)</li>\n        <li>Alertas especiales: mascotas \ud83d\udc3e, ni\u00f1os peque\u00f1os \ud83d\udc76</li>\n        <li>Monto de limpieza para distribuci\u00f3n de honorarios</li>\n      </ul>\n      <div class=\"info-box warning\">\n        <span class=\"material-icons\">warning</span>\n        <span>Si el Dashboard muestra \"Sin tarea de limpieza\" para un check-in en menos de 48hs, es porque falta generarla. Entr\u00e1 a la reserva y toc\u00e1 \"Generar tarea de limpieza\".</span>\n      </div>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">bar_chart</span> Admin Tareas \u2014 gesti\u00f3n y estad\u00edsticas</summary>\n    <div class=\"manual-sub__body\">\n      <p>La p\u00e1gina <strong>tareas-admin.html</strong> tiene 4 pesta\u00f1as:</p>\n      <table class=\"manual-tabla\">\n        <thead><tr><th>Pesta\u00f1a</th><th>Qu\u00e9 tiene</th></tr></thead>\n        <tbody>\n          <tr><td><strong>Lista y gesti\u00f3n</strong></td><td>Todas las tareas activas ordenadas por urgencia. Bot\u00f3n \"Nueva tarea\" para crear manualmente. Bot\u00f3n editar en cada tarea.</td></tr>\n          <tr><td><strong>Estad\u00edsticas</strong></td><td>Desempe\u00f1o por colaborador: tareas realizadas, horas totales, monto cobrado, promedio por tarea. Filtro por mes.</td></tr>\n          <tr><td><strong>Historial por tarea</strong></td><td>Seleccion\u00e1s una tarea y ves todos sus registros hist\u00f3ricos, qui\u00e9n particip\u00f3 cada vez y cu\u00e1ntas horas.</td></tr>\n          <tr><td><strong>Notificaciones</strong></td><td>Configurar alertas por email via EmailJS para tareas atrasadas.</td></tr>\n        </tbody>\n      </table>\n    </div>\n  </details>\n</div>\n</details>\n\n<!-- \u2500\u2500 4. PENDIENTES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n<details class=\"manual-modulo\">\n<summary>\n  <div class=\"manual-modulo__icon\"><span class=\"material-icons\">pending_actions</span></div>\n  <span>Pendientes</span>\n  <span class=\"rol-todos\">Admin + Colaborador</span>\n  <span class=\"material-icons manual-modulo__chevron\">expand_more</span>\n</summary>\n<div class=\"manual-body\">\n  <p class=\"manual-intro\">\n    Los pendientes son \u00edtems simples sin estructura de trabajo: compras a hacer, gestiones, recordatorios. A diferencia de las tareas, no tienen cron\u00f3metro ni honorarios \u2014 son simplemente cosas que hay que resolver y marcar como hechas.\n  </p>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">compare_arrows</span> Diferencias entre Pendientes y Tareas</summary>\n    <div class=\"manual-sub__body\">\n      <table class=\"manual-tabla\">\n        <thead><tr><th>Caracter\u00edstica</th><th>Pendientes</th><th>Tareas</th></tr></thead>\n        <tbody>\n          <tr><td>\u00bfTienen cron\u00f3metro?</td><td>No</td><td>S\u00ed</td></tr>\n          <tr><td>\u00bfGeneran honorarios?</td><td>No</td><td>S\u00ed (si tienen monto)</td></tr>\n          <tr><td>\u00bfTienen fecha programada?</td><td>No</td><td>S\u00ed</td></tr>\n          <tr><td>\u00bfQui\u00e9n puede crear?</td><td>Admin y colaboradores</td><td>Solo admin (o autom\u00e1tico)</td></tr>\n          <tr><td>\u00bfTienen visibilidad?</td><td>S\u00ed: \"todos\" o \"solo admin\"</td><td>Todos la ven</td></tr>\n          <tr><td>Uso t\u00edpico</td><td>Comprar detergente, llamar al plomero</td><td>Limpiar caba\u00f1a, podar jard\u00edn</td></tr>\n        </tbody>\n      </table>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">add_circle</span> C\u00f3mo agregar un pendiente</summary>\n    <div class=\"manual-sub__body\">\n      <ol style=\"margin:8px 0; padding-left:20px; line-height:2.2\">\n        <li>Ir a Operaciones \u2192 Pendientes.</li>\n        <li>Escribir el texto en el campo \"Nuevo pendiente\".</li>\n        <li>Si sos admin, elegir visibilidad: <strong>\"Todos\"</strong> (lo ven todos) o <strong>\"Solo admin\"</strong> (solo lo ven los admins).</li>\n        <li>Tocar \"Agregar\" o presionar Enter.</li>\n      </ol>\n      <div class=\"info-box tip\">\n        <span class=\"material-icons\">lightbulb</span>\n        <span>Los colaboradores siempre crean pendientes con visibilidad \"Todos\". No pueden ver ni modificar los pendientes marcados como \"Solo admin\".</span>\n      </div>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">check_circle</span> Marcar como realizado y editar</summary>\n    <div class=\"manual-sub__body\">\n      <ul style=\"margin:8px 0; padding-left:20px; line-height:2\">\n        <li>Tocar el <strong>checkbox</strong> a la izquierda del pendiente para marcarlo como realizado. Queda tachado y registra qui\u00e9n lo hizo y cu\u00e1ndo.</li>\n        <li>Para <strong>editar</strong> el texto, tocar el \u00edcono de l\u00e1piz (solo en pendientes no realizados).</li>\n        <li>Para <strong>eliminar</strong>, tocar el \u00edcono de basura (solo admin).</li>\n        <li>La pesta\u00f1a <strong>\"Realizados\"</strong> guarda el historial de todos los completados.</li>\n      </ul>\n    </div>\n  </details>\n</div>\n</details>\n\n<!-- \u2500\u2500 5. CABA\u00d1AS (Config) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n<details class=\"manual-modulo\">\n<summary>\n  <div class=\"manual-modulo__icon\"><span class=\"material-icons\">cottage</span></div>\n  <span>Caba\u00f1as \u2014 Configuraci\u00f3n del sitio p\u00fablico</span>\n  <span class=\"rol-admin\">Solo admin</span>\n  <span class=\"material-icons manual-modulo__chevron\">expand_more</span>\n</summary>\n<div class=\"manual-body\">\n  <p class=\"manual-intro\">\n    La p\u00e1gina de configuraci\u00f3n de caba\u00f1as (Config \u2192 Caba\u00f1as) controla todo lo que aparece en el sitio p\u00fablico: nombre, fotos, descripciones en tres idiomas, tarifas y conexi\u00f3n con Airbnb via Google Calendar. Cualquier cambio ac\u00e1 se refleja en el sitio p\u00fablico inmediatamente.\n  </p>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">photo_camera</span> C\u00f3mo cargar fotos</summary>\n    <div class=\"manual-sub__body\">\n      <p>Las fotos se suben directamente desde la p\u00e1gina de configuraci\u00f3n de la caba\u00f1a:</p>\n      <ol style=\"margin:8px 0; padding-left:20px; line-height:2.2\">\n        <li>Ir a Config \u2192 Caba\u00f1as y abrir la caba\u00f1a a editar.</li>\n        <li>En la secci\u00f3n de fotos, tocar <strong>\"Subir foto\"</strong>. Se abre el selector de archivos.</li>\n        <li>Seleccionar la imagen (formatos: JPG, PNG, WebP).</li>\n        <li>La foto se sube a Firebase Storage y se agrega a la galer\u00eda de la caba\u00f1a.</li>\n        <li>Se pueden reordenar arrastrando. La primera foto es la foto principal.</li>\n        <li>Tocar el \u00edcono de basura para eliminar una foto de la galer\u00eda.</li>\n      </ol>\n      <div class=\"info-box tip\">\n        <span class=\"material-icons\">lightbulb</span>\n        <span>Formato recomendado: horizontal, m\u00ednimo 1200px de ancho. Las fotos se comprimen autom\u00e1ticamente para el sitio p\u00fablico.</span>\n      </div>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">translate</span> Descripciones en tres idiomas (ES / PT / EN)</summary>\n    <div class=\"manual-sub__body\">\n      <p>El sitio p\u00fablico es multiling\u00fce. Cada caba\u00f1a tiene nombre y descripci\u00f3n en espa\u00f1ol, portugu\u00e9s e ingl\u00e9s:</p>\n      <table class=\"manual-tabla\">\n        <thead><tr><th>Campo</th><th>Cu\u00e1ndo aparece</th></tr></thead>\n        <tbody>\n          <tr><td><strong>Nombre ES</strong></td><td>Cuando el visitante navega en espa\u00f1ol (idioma por defecto)</td></tr>\n          <tr><td><strong>Nombre PT</strong></td><td>Cuando el visitante selecciona portugu\u00e9s (Brasil)</td></tr>\n          <tr><td><strong>Nombre EN</strong></td><td>Cuando el visitante selecciona ingl\u00e9s</td></tr>\n          <tr><td><strong>Descripci\u00f3n corta</strong></td><td>Aparece en la tarjeta de listado de caba\u00f1as</td></tr>\n          <tr><td><strong>Descripci\u00f3n larga</strong></td><td>Aparece en el detalle de la caba\u00f1a, con toda la informaci\u00f3n</td></tr>\n          <tr><td><strong>Amenidades</strong></td><td>Lista de comodidades (WiFi, pileta, parrilla, etc.) \u2014 tambi\u00e9n traducidas</td></tr>\n        </tbody>\n      </table>\n      <div class=\"info-box tip\">\n        <span class=\"material-icons\">lightbulb</span>\n        <span>Si un idioma queda vac\u00edo, el sitio cae al espa\u00f1ol como respaldo. Siempre completar al menos ES y PT, ya que la mayor\u00eda de visitantes son argentinos o brasile\u00f1os.</span>\n      </div>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">payments</span> Tarifas \u2014 c\u00f3mo actualizar precios</summary>\n    <div class=\"manual-sub__body\">\n      <p>Cada caba\u00f1a tiene su estructura de tarifas independiente:</p>\n      <table class=\"manual-tabla\">\n        <thead><tr><th>Campo</th><th>Descripci\u00f3n</th></tr></thead>\n        <tbody>\n          <tr><td><strong>Precio base / noche</strong></td><td>Tarifa est\u00e1ndar por noche fuera de temporada</td></tr>\n          <tr><td><strong>Capacidad base</strong></td><td>Personas incluidas en el precio base (generalmente 2)</td></tr>\n          <tr><td><strong>Precio por persona extra</strong></td><td>Cargo adicional por persona sobre la capacidad base</td></tr>\n          <tr><td><strong>Precio de limpieza</strong></td><td>Cargo fijo \u00fanico por estad\u00eda, no por noche</td></tr>\n          <tr><td><strong>Tarifas de temporada</strong></td><td>Per\u00edodos espec\u00edficos con precio especial: definir \"desde\", \"hasta\", \"precio noche\" y \"precio persona extra\" para esas fechas</td></tr>\n        </tbody>\n      </table>\n      <div class=\"info-box warning\">\n        <span class=\"material-icons\">warning</span>\n        <span>Cuando actualices tarifas de temporada, verific\u00e1 que los per\u00edodos no se superpongan. El sistema usa el primero que coincide con la fecha.</span>\n      </div>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">calendar_month</span> Calendario de ocupaci\u00f3n \u2014 Google Calendar ID</summary>\n    <div class=\"manual-sub__body\">\n      <p>Cada caba\u00f1a tiene un campo <strong>Google Calendar ID</strong> que conecta el sistema con Airbnb:</p>\n      <ol style=\"margin:8px 0; padding-left:20px; line-height:2.2\">\n        <li>En Airbnb, ir a Calendario de la caba\u00f1a \u2192 Exportar \u2192 copiar el link iCal.</li>\n        <li>Crear un Google Calendar nuevo y configurarlo para importar ese iCal (se actualiza autom\u00e1ticamente).</li>\n        <li>Copiar el ID del Google Calendar (formato: <code>xxx@import.calendar.google.com</code>).</li>\n        <li>Pegarlo en el campo \"Google Calendar ID\" de la caba\u00f1a en Config \u2192 Caba\u00f1as.</li>\n      </ol>\n      <div class=\"info-box tip\">\n        <span class=\"material-icons\">lightbulb</span>\n        <span>Una vez configurado, el sistema lee ese calendario cada vez que se sincroniza Airbnb. Sin este ID, la caba\u00f1a no se sincroniza autom\u00e1ticamente.</span>\n      </div>\n    </div>\n  </details>\n</div>\n</details>\n\n<!-- \u2500\u2500 6. FINANZAS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n<details class=\"manual-modulo\">\n<summary>\n  <div class=\"manual-modulo__icon\"><span class=\"material-icons\">payments</span></div>\n  <span>Finanzas</span>\n  <span class=\"rol-admin\">Solo admin</span>\n  <span class=\"material-icons manual-modulo__chevron\">expand_more</span>\n</summary>\n<div class=\"manual-body\">\n  <p class=\"manual-intro\">\n    El m\u00f3dulo financiero cubre ingresos, egresos, cuentas bancarias, movimientos de extractos y la importaci\u00f3n de informes Airbnb via IA. Todo en BRL como moneda base, con soporte para USD y UYU.\n  </p>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">trending_up</span> Ingresos / Egresos \u2014 c\u00f3mo registrar</summary>\n    <div class=\"manual-sub__body\">\n      <p>En <strong>Finanzas \u2192 Ingresos / Egresos</strong> se registran manualmente:</p>\n      <table class=\"manual-tabla\">\n        <thead><tr><th>Tipo</th><th>Cu\u00e1ndo registrarlo</th></tr></thead>\n        <tbody>\n          <tr><td><strong>Ingreso de reserva</strong></td><td>Cuando el hu\u00e9sped paga la se\u00f1a o el saldo. Se vincula a la reserva correspondiente.</td></tr>\n          <tr><td><strong>Gasto operativo</strong></td><td>Compras, servicios, mantenimiento. Puede marcarse como deducible (para el IRPF).</td></tr>\n          <tr><td><strong>Honorarios</strong></td><td>Los genera el sistema autom\u00e1ticamente al finalizar una tarea con monto. Tambi\u00e9n se pueden registrar manualmente.</td></tr>\n        </tbody>\n      </table>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">summarize</span> Informes Airbnb \u2014 c\u00f3mo importar el PDF</summary>\n    <div class=\"manual-sub__body\">\n      <p>Airbnb liquida mensualmente. El proceso para registrar ese ingreso:</p>\n      <div class=\"flujo\">\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">1</div><div class=\"flujo-paso__text\"><strong>Descargar el PDF de liquidaci\u00f3n desde Airbnb</strong><em>Panel de Airbnb \u2192 Pagos \u2192 Historial de pagos \u2192 Descargar</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">2</div><div class=\"flujo-paso__text\"><strong>Subir el PDF en Finanzas \u2192 Informes Airbnb</strong><em>Bot\u00f3n \"Subir PDF\". El sistema lo procesa con IA (Claude API)</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">3</div><div class=\"flujo-paso__text\"><strong>La IA extrae todos los campos</strong><em>Per\u00edodo, ingreso bruto, comisi\u00f3n Airbnb, neto, impuestos, desglose por caba\u00f1a</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">4</div><div class=\"flujo-paso__text\"><strong>Admin revisa y corrige si hay diferencias</strong><em>Los campos son editables antes de guardar</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">5</div><div class=\"flujo-paso__text\"><strong>Admin asigna la cuenta receptora y guarda</strong><em>\u00bfA qu\u00e9 cuenta bancaria llegar\u00e1 el dep\u00f3sito de Airbnb?</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">6</div><div class=\"flujo-paso__text\"><strong>Conciliaci\u00f3n cuando llega el dep\u00f3sito</strong><em>En Movimientos, vincular el dep\u00f3sito bancario con el informe \u2192 estado pasa a \"conciliado\"</em></div></div>\n      </div>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">account_balance</span> Cuentas bancarias \u2014 c\u00f3mo configurar</summary>\n    <div class=\"manual-sub__body\">\n      <p>En <strong>Finanzas \u2192 Cuentas</strong> se registran las cuentas bancarias:</p>\n      <ul style=\"margin:8px 0; padding-left:20px; line-height:2\">\n        <li>Nombre, banco, moneda (BRL / USD / UYU / ARS), pa\u00eds.</li>\n        <li>Tipo de cambio respecto al BRL (para consolidar el saldo total).</li>\n        <li>Saldo actual \u2014 se actualiza al importar extractos.</li>\n      </ul>\n      <p>El widget del Dashboard muestra el <strong>saldo consolidado en BRL</strong> de todas las cuentas activas.</p>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">receipt_long</span> Movimientos \u2014 c\u00f3mo importar extractos bancarios</summary>\n    <div class=\"manual-sub__body\">\n      <div class=\"flujo\">\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">1</div><div class=\"flujo-paso__text\"><strong>Descargar el extracto del banco</strong><em>Formato texto o CSV seg\u00fan el banco (BTG, Ita\u00fa, Santander, etc.)</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">2</div><div class=\"flujo-paso__text\"><strong>Ir a Finanzas \u2192 Cuentas \u2192 \"Importar extracto\"</strong><em>Pegar el texto del extracto en el campo correspondiente</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">3</div><div class=\"flujo-paso__text\"><strong>Preview con detecci\u00f3n de duplicados</strong><em>El sistema marca en amarillo los movimientos que ya existen para evitar dobles entradas</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">4</div><div class=\"flujo-paso__text\"><strong>Admin confirma y guarda</strong><em>Los movimientos quedan en Finanzas \u2192 Movimientos para categorizar</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">5</div><div class=\"flujo-paso__text\"><strong>Categorizar cada movimiento</strong><em>Asignar categor\u00eda (Ingresos Airbnb, Limpieza, Servicios, etc.) para el an\u00e1lisis financiero</em></div></div>\n      </div>\n      <div class=\"info-box tip\">\n        <span class=\"material-icons\">lightbulb</span>\n        <span>Los movimientos sin categor\u00eda disparan una alerta en el Dashboard. Categorizarlos mejora los reportes de balance mensual.</span>\n      </div>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">label</span> Categor\u00edas \u2014 c\u00f3mo organizar los gastos</summary>\n    <div class=\"manual-sub__body\">\n      <p>En <strong>Finanzas \u2192 Categor\u00edas</strong> se definen las categor\u00edas de ingresos y egresos. Las categor\u00edas marcadas como <strong>\"deducible IRPF\"</strong> se usan autom\u00e1ticamente en el m\u00f3dulo Fiscal para calcular la base tributaria.</p>\n    </div>\n  </details>\n</div>\n</details>\n\n<!-- \u2500\u2500 7. FISCAL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n<details class=\"manual-modulo\">\n<summary>\n  <div class=\"manual-modulo__icon\"><span class=\"material-icons\">receipt</span></div>\n  <span>M\u00f3dulo Fiscal</span>\n  <span class=\"rol-admin\">Solo admin</span>\n  <span class=\"material-icons manual-modulo__chevron\">expand_more</span>\n</summary>\n<div class=\"manual-body\">\n  <p class=\"manual-intro\">\n    El m\u00f3dulo fiscal ayuda a gestionar las obligaciones tributarias como locador de temporada en Brasil. Calcula estimaciones de Carn\u00ea-Le\u00e3o / DARF, gestiona el acceso temporal para la contadora y genera el informe fiscal completo.\n  </p>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">calculate</span> Panel fiscal \u2014 qu\u00e9 hace cada pesta\u00f1a</summary>\n    <div class=\"manual-sub__body\">\n      <table class=\"manual-tabla\">\n        <thead><tr><th>Pesta\u00f1a</th><th>Funci\u00f3n</th></tr></thead>\n        <tbody>\n          <tr><td><strong>Ingresos y gastos</strong></td><td>Tabla mensual de ingresos del a\u00f1o y lista de gastos deducibles. Bot\u00f3n para registrar nuevos gastos con flag \"deducible IRPF\".</td></tr>\n          <tr><td><strong>C\u00e1lculo IRPF</strong></td><td>Seleccion\u00e1s el mes, el sistema lee los datos reales y calcula la base tributaria y el impuesto estimado seg\u00fan la tabla IRPF 2026. Muestra la fecha de vencimiento del Carn\u00ea-Le\u00e3o.</td></tr>\n          <tr><td><strong>Calendario fiscal</strong></td><td>Los 12 meses del a\u00f1o con estado: sin registrar, pendiente, pagado, vencido. Click en cualquier mes para registrar el pago del DARF.</td></tr>\n          <tr><td><strong>Simulador</strong></td><td>Sliders para probar distintos escenarios de ingresos y gastos sin afectar los datos reales.</td></tr>\n          <tr><td><strong>Tipos de cambio</strong></td><td>Actualizar USD/BRL, USD/UYU, UYU/BRL. Se usan en todos los reportes multimoneda.</td></tr>\n        </tbody>\n      </table>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">vpn_key</span> Acceso para la contadora \u2014 c\u00f3mo generar el link</summary>\n    <div class=\"manual-sub__body\">\n      <div class=\"flujo\">\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">1</div><div class=\"flujo-paso__text\"><strong>Ir a Fiscal \u2192 Acceso contador</strong></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">2</div><div class=\"flujo-paso__text\"><strong>Escribir una etiqueta identificatoria</strong><em>Ej: \"Contadora Mar\u00eda \u2014 junio 2026\"</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">3</div><div class=\"flujo-paso__text\"><strong>Elegir cu\u00e1ntos d\u00edas dura el acceso</strong><em>Opciones: 3, 7, 14 o 30 d\u00edas</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">4</div><div class=\"flujo-paso__text\"><strong>Tocar \"Generar link\"</strong><em>Se crea un token \u00fanico de 24 caracteres guardado en Firestore</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">5</div><div class=\"flujo-paso__text\"><strong>Copiar y enviar por WhatsApp</strong><em>El link tiene acceso sin login \u2014 la contadora abre directamente el informe fiscal en portugu\u00e9s</em></div></div>\n        <span class=\"flujo-flecha\">\u2193</span>\n        <div class=\"flujo-paso\"><div class=\"flujo-num\">6</div><div class=\"flujo-paso__text\"><strong>Revocar si es necesario</strong><em>Desde la misma p\u00e1gina, bot\u00f3n \"Revocar\" en el token activo. El link deja de funcionar inmediatamente</em></div></div>\n      </div>\n    </div>\n  </details>\n</div>\n</details>\n\n<!-- \u2500\u2500 8. CALENDARIO \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n<details class=\"manual-modulo\">\n<summary>\n  <div class=\"manual-modulo__icon\"><span class=\"material-icons\">calendar_month</span></div>\n  <span>Calendario de ocupaci\u00f3n</span>\n  <span class=\"rol-admin\">Solo admin</span>\n  <span class=\"material-icons manual-modulo__chevron\">expand_more</span>\n</summary>\n<div class=\"manual-body\">\n  <p class=\"manual-intro\">\n    El Calendario muestra la ocupaci\u00f3n mensual de las 3 caba\u00f1as en forma visual. Permite ver de un vistazo qu\u00e9 d\u00edas est\u00e1n bloqueados, qu\u00e9 reservas coinciden y sincronizar Airbnb manualmente.\n  </p>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">palette</span> Qu\u00e9 representa cada color</summary>\n    <div class=\"manual-sub__body\">\n      <table class=\"manual-tabla\">\n        <thead><tr><th>Color</th><th>Significado</th></tr></thead>\n        <tbody>\n          <tr><td>\ud83d\udfe9 Verde / color de caba\u00f1a</td><td>Reserva confirmada (propia)</td></tr>\n          <tr><td>\ud83d\udfe6 Azul / trama diferente</td><td>Reserva Airbnb activa</td></tr>\n          <tr><td>\u2b1c Blanco</td><td>D\u00edas libres \u2014 disponibles para reservar</td></tr>\n        </tbody>\n      </table>\n      <p style=\"margin-top:8px\">Al hacer click en un d\u00eda ocupado se abre el detalle de la reserva. Al hacer click en un d\u00eda libre se puede iniciar una nueva reserva.</p>\n    </div>\n  </details>\n</div>\n</details>\n\n<!-- \u2500\u2500 9. USUARIOS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n<details class=\"manual-modulo\">\n<summary>\n  <div class=\"manual-modulo__icon\"><span class=\"material-icons\">manage_accounts</span></div>\n  <span>Usuarios y accesos</span>\n  <span class=\"rol-admin\">Solo admin</span>\n  <span class=\"material-icons manual-modulo__chevron\">expand_more</span>\n</summary>\n<div class=\"manual-body\">\n  <p class=\"manual-intro\">\n    En Config \u2192 Usuarios se gestionan todos los accesos al panel. Hay dos roles: <strong>admin</strong> (acceso completo) y <strong>user</strong> (solo tareas y mis cobros).\n  </p>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">person_add</span> Crear un usuario nuevo</summary>\n    <div class=\"manual-sub__body\">\n      <ol style=\"margin:8px 0; padding-left:20px; line-height:2.2\">\n        <li>Ir a Config \u2192 Usuarios \u2192 \"Nuevo usuario\".</li>\n        <li>Ingresar nombre, email y elegir rol (admin o colaborador).</li>\n        <li>El sistema crea la cuenta en Firebase Auth y env\u00eda el email de bienvenida con la contrase\u00f1a temporal.</li>\n        <li>El colaborador debe cambiar la contrase\u00f1a al primer ingreso.</li>\n      </ol>\n      <div class=\"info-box warning\">\n        <span class=\"material-icons\">warning</span>\n        <span>Para <strong>desactivar</strong> un usuario, usar el toggle \"Activo\" en la lista. No eliminar \u2014 desactivar mantiene el historial de sus tareas y sesiones.</span>\n      </div>\n    </div>\n  </details>\n\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">shield</span> Qu\u00e9 puede hacer cada rol</summary>\n    <div class=\"manual-sub__body\">\n      <table class=\"manual-tabla\">\n        <thead><tr><th>Funci\u00f3n</th><th>Admin</th><th>Colaborador</th></tr></thead>\n        <tbody>\n          <tr><td>Ver y trabajar tareas</td><td>\u2705</td><td>\u2705</td></tr>\n          <tr><td>Ver mis honorarios</td><td>\u2705</td><td>\u2705</td></tr>\n          <tr><td>Crear / editar tareas</td><td>\u2705</td><td>\u274c</td></tr>\n          <tr><td>Ver pendientes \"todos\"</td><td>\u2705</td><td>\u2705</td></tr>\n          <tr><td>Ver pendientes \"solo admin\"</td><td>\u2705</td><td>\u274c</td></tr>\n          <tr><td>Reservas, finanzas, fiscal</td><td>\u2705</td><td>\u274c</td></tr>\n          <tr><td>Configuraci\u00f3n de caba\u00f1as</td><td>\u2705</td><td>\u274c</td></tr>\n        </tbody>\n      </table>\n    </div>\n  </details>\n</div>\n</details>\n\n<!-- \u2500\u2500 10. CLIENTES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n<details class=\"manual-modulo\">\n<summary>\n  <div class=\"manual-modulo__icon\"><span class=\"material-icons\">people</span></div>\n  <span>Clientes</span>\n  <span class=\"rol-admin\">Solo admin</span>\n  <span class=\"material-icons manual-modulo__chevron\">expand_more</span>\n</summary>\n<div class=\"manual-body\">\n  <p class=\"manual-intro\">\n    El directorio de clientes guarda el historial de hu\u00e9spedes. Se crea autom\u00e1ticamente al confirmar una reserva directa, o se puede crear manualmente. Permite ver todas las reservas anteriores de un hu\u00e9sped y agregar notas.\n  </p>\n  <details class=\"manual-sub\">\n    <summary><span class=\"material-icons\" style=\"font-size:16px\">history</span> Historial por cliente</summary>\n    <div class=\"manual-sub__body\">\n      <p>Desde la ficha de cada cliente se ve: todas las reservas anteriores (fechas, caba\u00f1a, monto), estad\u00edsticas de estancia (noches totales, gasto total) y notas libres. \u00datil para identificar clientes recurrentes o con requerimientos especiales.</p>\n    </div>\n  </details>\n</div>\n</details>\n\n<!-- \u2500\u2500 FOOTER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n<div style=\"text-align:center; padding:var(--space-6) 0; color:var(--color-text-muted); font-size:var(--text-xs); border-top:1px solid var(--color-border); margin-top:var(--space-4)\">\n  Casa Verde Canas \u00b7 Manual del Sistema v4.2 \u00b7 Mayo 2026<br>\n  Para dudas o profundizaci\u00f3n sobre alguna funci\u00f3n, contactar al administrador.\n</div>\n";
</script>
