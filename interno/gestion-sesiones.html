<style>
  .gs-wrap { max-width: 1100px; margin: 0 auto; }
  .gs-fbar { 
    display: flex; gap: 8px; flex-wrap: wrap; align-items: end;
    padding: 12px 14px; background: #f8faf7; border-radius: 12px; margin-bottom: 12px;
  }
  .gs-fg { display: flex; flex-direction: column; gap: 2px; }
  .gs-fg label { font-size: 11px; color: #66735f; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .gs-fg select { 
    padding: 6px 8px; border: 1px solid #dfe6dd; border-radius: 7px; font-size: 12.5px; 
    background: #fff; min-width: 130px;
  }
  .gs-totbar { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .gs-totcard {
    flex: 1; min-width: 90px; padding: 12px 14px; border-radius: 10px;
    background: #fff; border: 1px solid #e7ece4; text-align: center;
  }
  .gs-totcard .num { font-size: 20px; font-weight: 700; color: #2d5a27; }
  .gs-totcard .lbl { font-size: 11px; color: #66735f; margin-top: 2px; }

  .gs-tree { border: 1px solid #e7ece4; border-radius: 12px; overflow: hidden; background: #fff; }
  .gs-node { border-bottom: 1px solid #eef2ec; }
  .gs-node:last-child { border-bottom: none; }
  .gs-nhead { 
    display: flex; align-items: center; gap: 8px; padding: 9px 12px; 
    cursor: pointer; transition: background 0.1s;
  }
  .gs-nhead:hover { background: #f7faf6; }
  .gs-nhead.open { background: #f1f6f0; }
  .gs-caret { width: 22px; color: #5a6a55; font-size: 18px; text-align: center; user-select: none; flex: 0 0 auto; }
  .gs-caret.has { color: #2d5a27; }
  .gs-nicon { font-size: 18px; flex: 0 0 auto; width: 26px; text-align: center; }
  .gs-ninfo { flex: 1; min-width: 0; }
  .gs-nname { font-weight: 600; font-size: 13px; color: #2a3328; }
  .gs-nruta { font-size: 10.5px; color: #889985; margin-top: 1px; }
  .gs-nhrs { font-weight: 700; font-size: 14px; color: #2d5a27; font-variant-numeric: tabular-nums; flex: 0 0 auto; }
  .gs-nbadge { font-size: 10px; padding: 1px 6px; border-radius: 999px; font-weight: 600; flex: 0 0 auto; }
  .gs-nbadge.migrado { background: #fdf4dd; color: #8a5d00; }

  .gs-children { margin-left: 16px; padding-left: 10px; border-left: 3px solid #aebeaa; background: rgba(45,90,39,0.015); }
  .gs-children .gs-children { background: rgba(45,90,39,0.03); }

  .gs-seslist { padding: 4px 10px 8px 44px; }
  .gs-sesion { 
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    border: 1px solid #eef2ec; border-radius: 7px; margin-bottom: 4px;
    background: #fafcf9; flex-wrap: wrap; font-size: 12.5px;
  }
  .gs-sesion.en_curso { border-left: 3px solid #1f5fb0; background: #f0f6ff; }
  .gs-sesion.finalizada { border-left: 3px solid #16a34a; }
  .gs-sesion .su { font-weight: 600; color: #2a3328; min-width: 80px; }
  .gs-sesion .sh { font-weight: 700; font-variant-numeric: tabular-nums; color: #2d5a27; }
  .gs-sesion .sf { font-size: 10.5px; color: #889985; }
  .gs-sesion .se { font-size: 10px; padding: 1px 6px; border-radius: 999px; font-weight: 600; }
  .gs-sesion .sacc { display: flex; gap: 3px; margin-left: auto; }
  .gs-sesion .sacc button {
    background: none; border: 1px solid #dfe6dd; padding: 3px 7px;
    border-radius: 5px; cursor: pointer; font-size: 11px; color: #5a6a55;
  }
  .gs-sesion .sacc button:hover { background: #f0f4ee; }
  .gs-sesion .sacc .del { color: #c0271f; border-color: #fde8e8; }

  .gs-empty { text-align: center; color: #868e96; font-size: .85rem; padding: 24px 0; }

  .gs-modal-over {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: none; z-index: 2000;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .gs-modal-over.show { display: block; }
  .gs-modal-box {
    background: #fff; border-radius: 14px; padding: 20px;
    width: 92%; max-width: 500px; margin: 40px auto 20px auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }
  .gs-modal-box h3 { margin: 0 0 14px; font-size: 17px; }
  .gs-modal-foot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .gs-frow { display: flex; gap: 8px; }
  .gs-frow > div { flex: 1; }
</style>

  <div class="admin-header__brand">
    <span class="material-icons">schedule</span>
    Gestor de Sesiones
  </div>
  <div class="admin-header__actions">
    <div class="user-chip"><span class="material-icons">person</span><span id="userName">—</span></div>

<nav class="admin-nav" id="appNav"></nav>

<main class="admin-content">

    <div class="gs-fbar">

      </button>

<!-- MODAL -->
<div id="gsModal" class="gs-modal-over" onclick="if(event.target===this)window.cerrarModal()">
  <div class="gs-modal-box">
    <h3 id="gsModalTitulo">Nuevo registro manual</h3>
    <input type="hidden" id="mId">
    
    <div class="form-group"><label class="form-label">Proyecto</label><select id="mProy" class="form-control" onchange="filtrarActividadesPorProyecto()"><option value="">Elegí un proyecto...</option></select></div>
    <div class="form-group"><label class="form-label">Actividad</label><select id="mAct" class="form-control"><option value="">Primero elegí un proyecto</option></select></div>
    <div class="form-group"><label class="form-label">Usuario</label><select id="mUsr" class="form-control"></select></div>
    
    <div class="gs-frow">
      <div><label class="form-label">Fecha</label><input type="date" id="mFecha" class="form-control" onchange="actualizarInicioFin()"></div>
      <div><label class="form-label">Hora inicio</label><input type="time" id="mInicio" class="form-control" onchange="calcHoras()"></div>
      <div><label class="form-label">Hora fin</label><input type="time" id="mFin" class="form-control" onchange="calcHoras()"></div>
    </div>
    
    <div class="form-group" style="margin-top:8px">
      <label class="form-label">Horas calculadas</label>
      <input type="text" id="mHoras" class="form-control" readonly style="font-weight:700;color:#2d5a27;background:#f8faf7;">
    </div>
    
    <div class="form-group"><label class="form-label">Notas (opcional)</label><input type="text" id="mNotas" class="form-control" placeholder="Detalle de lo hecho..."></div>
    
    <div class="gs-modal-foot">
      <button class="btn btn-secondary" type="button" onclick="window.cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" id="btnGuardar" onclick="guardarSesion()">Guardar</button>
    </div>
  </div>
</div>

<script type="module">

var sesion = await CVC.verificarAuth(['admin', 'user']);
var user = sesion.user;
var userData = sesion.userData;
var esAdmin = userData.rol === 'admin';
var uid = user.uid;

document.getElementById('userName').textContent = userData.nombre || user.email;
CVC.renderNav('gestion-sesiones.html');
if (typeof CVC.initAyuda === 'function') CVC.initAyuda('gestion-sesiones.html');

var db = CVC.db;

// ── Estado ──────────────────────────────────────────────────
var todasSesiones = [];
var actIdx = {};        // actividadId -> {nombre, parentId, tipo, tipoRaiz}
var childrenOf = {};    // parentId -> [objeto actividad plana con .id]
var actRoots = [];      // IDs de proyectos raíz
var usuarios = [];
var abiertos = {};
var actividadesPorProyecto = {};  // proyId -> [{id, nombre, ruta}]  TODAS las actividades

// ── Paleta de proyectos (compartida con horas-stats) ─────────
// Cada proyecto raíz recibe un par {a: acento, p: pastel} asignado
// por orden alfabético de proyectos — mismo criterio en ambas
// páginas, así un proyecto tiene siempre el mismo color.
var PALETA_PROY = [
    { a: '#2a9d8f', p: '#e2f2f0' },
    { a: '#e76f51', p: '#fdeae3' },
    { a: '#4361ee', p: '#e7ecfd' },
    { a: '#b8860b', p: '#faf1d8' },
    { a: '#7209b7', p: '#f2e4fa' },
    { a: '#2d5a27', p: '#e6f0e4' },
    { a: '#c2185b', p: '#fae2ec' },
    { a: '#00838f', p: '#dff1f3' },
    { a: '#6d4c41', p: '#f0e8e5' },
    { a: '#546e7a', p: '#e8edf0' }
];
function colorProy(rootId) {
    var i = actRoots.indexOf(rootId);
    if (i < 0) return { a: '#9aa69a', p: '#f1f3f0' };
    return PALETA_PROY[i % PALETA_PROY.length];
}

// ── Helpers ──────────────────────────────────────────────────
function esc(s) { return CVC.escapeHtml ? CVC.escapeHtml(String(s == null ? '' : s)) : String(s == null ? '' : s); }
function fmtHM(horas) { var h = Math.floor(horas), m = Math.round((horas - h) * 60); return h === 0 ? m + 'm' : h + 'h ' + m + 'm'; }
function fmtDMY(ts) {
    if (!ts) return '—';
    var d = ts.toDate ? ts.toDate() : new Date(ts);
    if (isNaN(d.getTime())) return '—';
    return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
}
function raizDe(actId) {
    if (!actId || !actIdx[actId]) return null;
    var cur = actId, guard = 0;
    while (cur && actIdx[cur] && actIdx[cur].parentId && guard < 20) { 
        cur = actIdx[cur].parentId; 
        guard++;
    }
    return cur || null;
}
function rutaDeTexto(actId) {
    var partes = [], cur = actId, guard = 0;
    while (cur && actIdx[cur] && guard < 15) {
        partes.unshift(actIdx[cur].nombre || cur);
        cur = actIdx[cur].parentId || null;
        guard++;
    }
    return partes.join(' › ');
}

// ── Carga ───────────────────────────────────────────────────
async function cargarTodo() {
    // Usuarios
    var uSnap = await db.collection('usuarios').get();
    usuarios = [];
    uSnap.forEach(function(d) {
        var u = d.data();
        if (u.activo === false) return;
        usuarios.push({ uid: d.id, nombre: u.nombre || u.email || d.id });
    });

    var fUsr = document.getElementById('fUsr');
    var mUsr = document.getElementById('mUsr');
    fUsr.innerHTML = '<option value="">Todos</option>';
    mUsr.innerHTML = '';
    for (var i = 0; i < usuarios.length; i++) {
        var u = usuarios[i];
        if (esAdmin || u.uid === uid) fUsr.innerHTML += '<option value="' + u.uid + '">' + u.nombre + '</option>';
        if (esAdmin || u.uid === uid) mUsr.innerHTML += '<option value="' + u.uid + '"' + (u.uid === uid ? ' selected' : '') + '>' + u.nombre + '</option>';
    }
    if (!esAdmin) { fUsr.value = uid; fUsr.disabled = true; mUsr.value = uid; mUsr.disabled = true; }

    // Actividades — IDÉNTICO a actividades.html
    var aSnap = await db.collection('actividades').get();
    actIdx = {};
    childrenOf = {};
    actRoots = [];
    actividadesPorProyecto = {};

    aSnap.forEach(function(d) {
        var a = d.data();
        a.id = d.id;
        actIdx[d.id] = {
            nombre: a.nombre || a.titulo || '',
            parentId: a.parentId || null,
            tipo: a.tipo || '',
            tipoRaiz: a.tipoRaiz || ''
        };
        var p = a.parentId || '';
        if (!childrenOf[p]) childrenOf[p] = [];
        childrenOf[p].push(a);
    });

    // Proyectos raíz
    for (var id in actIdx) {
        if (!actIdx[id].parentId && actIdx[id].tipoRaiz === 'proyecto') {
            actRoots.push(id);
        }
    }
    actRoots.sort(function(a, b) { return (actIdx[a].nombre || '').localeCompare(actIdx[b].nombre || ''); });

    // RECOLECTAR TODAS LAS ACTIVIDADES en ORDEN DE ÁRBOL con nivel
    // v5.2: todas las actividades pueden registrar tiempo (tronco,
    // ramas y hojas). Solo quedan afuera los renglones estructurales
    // del chequeo de inventario.
    var TIPOS_NO_CRONO = ['categoria-chequeo', 'item-chequeo'];

    function hijosOrdenados(nodoId) {
        var arr = (childrenOf[nodoId] || []).slice();
        arr.sort(function(a, b) {
            var oa = a.orden || 0, ob = b.orden || 0;
            if (oa !== ob) return oa - ob;
            return String(a.nombre || a.titulo || '').localeCompare(String(b.nombre || b.titulo || ''));
        });
        return arr;
    }

    function recolectarArbol(nodoId, nivel, visitados) {
        visitados = visitados || {};
        if (visitados[nodoId]) return [];
        visitados[nodoId] = true;

        var hijos = hijosOrdenados(nodoId);
        var resultado = [];

        for (var i = 0; i < hijos.length; i++) {
            var hijo = hijos[i];
            var hid = hijo.id;
            var tipo = hijo.tipo || '';

            if (TIPOS_NO_CRONO.indexOf(tipo) !== -1) continue;

            resultado.push({
                id: hid,
                nombre: hijo.nombre || hijo.titulo || hid,
                nivel: nivel,
                tieneHijos: !!childrenOf[hid] && childrenOf[hid].length > 0
            });

            var sub = recolectarArbol(hid, nivel + 1, visitados);
            for (var s = 0; s < sub.length; s++) {
                resultado.push(sub[s]);
            }
        }

        return resultado;
    }

    for (var p = 0; p < actRoots.length; p++) {
        var pid = actRoots[p];
        // El proyecto raíz también puede registrar tiempo: va primero
        var todas = [{
            id: pid,
            nombre: (actIdx[pid].nombre || pid) + ' (el proyecto en sí)',
            nivel: 0,
            tieneHijos: true,
            esRaiz: true
        }];
        var arbol = recolectarArbol(pid, 1);
        for (var t = 0; t < arbol.length; t++) todas.push(arbol[t]);
        actividadesPorProyecto[pid] = todas;
    }

    // Huérfanas
    var huerfanas = [];
    for (var aid in actIdx) {
        var a = actIdx[aid];
        if (!a.parentId) continue;
        var tipo = a.tipo || '';
        if (TIPOS_NO_CRONO.indexOf(tipo) !== -1) continue;
        var rz = raizDe(aid);
        if (!rz) {
            huerfanas.push({ id: aid, nombre: a.nombre, nivel: 0, tieneHijos: false });
        }
    }
    if (huerfanas.length > 0) {
        actividadesPorProyecto['__sin'] = huerfanas;
    }

    // Selector de filtro: árbol completo tabulado — se puede filtrar
    // por el proyecto o por cualquier subcategoría anidada
    var fProy = document.getElementById('fProy');
    var fHtml = '<option value="">Todos los proyectos</option>';
    for (var j = 0; j < actRoots.length; j++) {
        var pid2 = actRoots[j];
        var lista2 = actividadesPorProyecto[pid2] || [];
        for (var l2 = 0; l2 < lista2.length; l2++) {
            var a2 = lista2[l2];
            var sang2 = '';
            for (var n2 = 0; n2 < (a2.nivel || 0); n2++) sang2 += '\u00A0\u00A0\u00A0\u00A0';
            var pref2 = a2.esRaiz ? '🏠 ' : (a2.tieneHijos ? '📂 ' : '📋 ');
            var nom2 = a2.esRaiz ? (actIdx[pid2].nombre || pid2) : a2.nombre;
            fHtml += '<option value="' + a2.id + '">' + sang2 + pref2 + esc(nom2) + '</option>';
        }
    }
    fProy.innerHTML = fHtml;

    // Selector de proyectos (modal)
    var mProy = document.getElementById('mProy');
    mProy.innerHTML = '<option value="">Elegí un proyecto...</option>';
    for (var k = 0; k < actRoots.length; k++) {
        var pid3 = actRoots[k];
        mProy.innerHTML += '<option value="' + pid3 + '">' + (actIdx[pid3].nombre || pid3) + '</option>';
    }
    if (actividadesPorProyecto['__sin'] && actividadesPorProyecto['__sin'].length > 0) {
        mProy.innerHTML += '<option value="__sin">⚠️ Sin proyecto</option>';
    }

    // Sesiones
    await cargarSesiones();
    aplicarFiltros();
}

async function cargarSesiones() {
    todasSesiones = [];
    try {
        var snap = await db.collection('sesiones').orderBy('inicio', 'desc').get();
        snap.forEach(function(d) {
            var s = d.data();
            s.id = d.id;
            todasSesiones.push(s);
        });
    } catch (e) { console.warn('Error /sesiones/:', e.message); }

    // v5.2: fuente única — solo la colección raíz /sesiones/
}

// ── Filtros ─────────────────────────────────────────────────
function pathContiene(actId, nodoId) {
    var cur = actId, guard = 0;
    while (cur && guard < 25) {
        if (cur === nodoId) return true;
        cur = actIdx[cur] ? (actIdx[cur].parentId || null) : null;
        guard++;
    }
    return false;
}

function sesionesFiltradas() {
    var fUsr = document.getElementById('fUsr').value;
    var fProy = document.getElementById('fProy').value;

    var out = [];
    for (var i = 0; i < todasSesiones.length; i++) {
        var s = todasSesiones[i];
        if (fUsr && s.uid !== fUsr) continue;

        // El filtro acepta un proyecto raíz o cualquier subcategoría:
        // pasa si el nodo elegido está en el camino de la actividad
        if (fProy && !pathContiene(s.actividadId, fProy)) continue;

        out.push(s);
    }

    out.sort(function(a, b) {
        var am = a.inicio ? (a.inicio.toMillis ? a.inicio.toMillis() : a.inicio) : 0;
        var bm = b.inicio ? (b.inicio.toMillis ? b.inicio.toMillis() : b.inicio) : 0;
        return bm - am;
    });

    return out;
}

function aplicarFiltros() {
    var filtradas = sesionesFiltradas();

    var totalH = 0;
    for (var i = 0; i < filtradas.length; i++) {
        totalH += filtradas[i].horas || 0;
    }
    document.getElementById('gsTotales').innerHTML =
        '<div class="gs-totcard"><div class="num">' + filtradas.length + '</div><div class="lbl">Sesiones</div></div>' +
        '<div class="gs-totcard"><div class="num">' + fmtHM(totalH) + '</div><div class="lbl">Total horas</div></div>';

    renderArbol(filtradas);
}

// ── Render árbol ────────────────────────────────────────────
function renderArbol(filtradas) {
    var fProy = document.getElementById('fProy').value;
    var el = document.getElementById('gsArbol');

    // Si hay filtro de proyecto, mostrar solo ese proyecto con sus sesiones
    var sesPorProy = {};
    var sinProy = [];

    for (var i = 0; i < filtradas.length; i++) {
        var s = filtradas[i];
        var rz = raizDe(s.actividadId);
        if (rz) {
            if (!sesPorProy[rz]) sesPorProy[rz] = [];
            sesPorProy[rz].push(s);
        } else {
            sinProy.push(s);
        }
    }

    var html = '';

    // Las sesiones filtradas ya vienen restringidas por el filtro de
    // proyecto/subcategoría, así que se agrupa siempre por raíz.
    for (var r = 0; r < actRoots.length; r++) {
        var rid = actRoots[r];
        var ses = sesPorProy[rid] || [];
        if (ses.length === 0) continue;
        var hrs = 0;
        for (var s = 0; s < ses.length; s++) hrs += ses[s].horas || 0;
        html += nodoProyecto(rid, ses, hrs);
    }

    if (sinProy.length > 0 && !fProy) {
        var hrsSin = 0;
        for (var si = 0; si < sinProy.length; si++) hrsSin += sinProy[si].horas || 0;
        html += nodoSinProyecto(sinProy, hrsSin);
    }

    if (!html) html = fProy ? '<div class="gs-empty">No hay sesiones en lo seleccionado.</div>' : '<div class="gs-empty">No hay sesiones registradas.</div>';

    el.innerHTML = html;
}

function nodoSinProyecto(sesiones, horas) {
    var html = '<div class="gs-node">';
    html += '<div class="gs-nhead" onclick="toggleAbierto(\'__sin\')">';
    html += '<span class="gs-caret has">' + (abiertos['__sin'] ? '▾' : '▸') + '</span>';
    html += '<span class="gs-nicon">⚠️</span>';
    html += '<span class="gs-ninfo"><span class="gs-nname" style="color:#c0271f;">Sin proyecto / eliminadas</span></span>';
    html += '<span class="gs-nhrs">' + fmtHM(horas) + '</span>';
    html += '<span class="gs-nbadge" style="background:#fde8e8;color:#c0271f;">' + sesiones.length + ' ses.</span>';
    html += '</div>';

    if (abiertos['__sin']) {
        html += '<div class="gs-children">';
        var porAct = {};
        for (var i = 0; i < sesiones.length; i++) {
            var aid = sesiones[i].actividadId || '__unk';
            if (!porAct[aid]) porAct[aid] = [];
            porAct[aid].push(sesiones[i]);
        }
        for (var ak in porAct) {
            var hrsA = 0;
            for (var sa = 0; sa < porAct[ak].length; sa++) hrsA += porAct[ak][sa].horas || 0;
            html += nodoActividad(ak, porAct[ak], hrsA, false);
        }
        html += '</div>';
    }
    html += '</div>';
    return html;
}

function nodoProyecto(proyId, sesiones, horas) {
    var proy = actIdx[proyId];
    var nombre = proy ? (proy.nombre || proyId) : proyId;
    var ab = !!abiertos[proyId];
    var col = colorProy(proyId);

    var html = '<div class="gs-node" style="border-left:5px solid ' + col.a + ';">';
    html += '<div class="gs-nhead' + (ab ? ' open' : '') + '" style="background:' + col.p + ';" onclick="toggleAbierto(\'' + proyId + '\')">';
    html += '<span class="gs-caret has" style="color:' + col.a + ';">' + (ab ? '▾' : '▸') + '</span>';
    html += '<span class="gs-nicon">📁</span>';
    html += '<span class="gs-ninfo"><span class="gs-nname">' + esc(nombre) + '</span></span>';
    html += '<span class="gs-nhrs" style="color:' + col.a + ';">' + fmtHM(horas) + '</span>';
    html += '<span class="gs-nbadge" style="background:#fff;color:' + col.a + ';border:1px solid ' + col.a + ';">' + sesiones.length + ' ses.</span>';
    html += '</div>';

    if (ab) {
        html += '<div class="gs-children" style="border-left-color:' + col.a + ';background:' + col.p + '55;">';
        // Agrupar sesiones por el primer hijo del path
        var grupos = {};
        for (var i = 0; i < sesiones.length; i++) {
            var aid = sesiones[i].actividadId;
            var path = [];
            var cur = aid, g = 0;
            while (cur && actIdx[cur] && g < 20) {
                if (cur === proyId) break;
                path.unshift(cur);
                cur = actIdx[cur].parentId || null;
                g++;
            }
            var key = path.length > 0 ? path[0] : aid;
            if (!grupos[key]) grupos[key] = [];
            grupos[key].push(sesiones[i]);
        }

        for (var key in grupos) {
            var hrsG = 0;
            for (var gi = 0; gi < grupos[key].length; gi++) hrsG += grupos[key][gi].horas || 0;
            
            // Si el key es una actividad hoja (no tiene hijos en actIdx)
            var esCategoria = childrenOf[key] && childrenOf[key].length > 0;
            
            if (esCategoria) {
                html += nodoCategoria(key, grupos[key], hrsG);
            } else {
                html += nodoActividad(key, grupos[key], hrsG, false);
            }
        }
        html += '</div>';
    }
    html += '</div>';
    return html;
}

function nodoCategoria(catId, sesiones, horas) {
    var cat = actIdx[catId];
    var nombre = cat ? (cat.nombre || catId) : catId;
    var ab = !!abiertos[catId];

    var html = '<div class="gs-node">';
    html += '<div class="gs-nhead' + (ab ? ' open' : '') + '" onclick="toggleAbierto(\'' + catId + '\')">';
    html += '<span class="gs-caret has">' + (ab ? '▾' : '▸') + '</span>';
    html += '<span class="gs-nicon">📂</span>';
    html += '<span class="gs-ninfo"><span class="gs-nname">' + esc(nombre) + '</span></span>';
    html += '<span class="gs-nhrs">' + fmtHM(horas) + '</span>';
    html += '</div>';

    if (ab) {
        html += '<div class="gs-children">';
        var porAct = {};
        for (var i = 0; i < sesiones.length; i++) {
            var aid = sesiones[i].actividadId;
            if (!porAct[aid]) porAct[aid] = [];
            porAct[aid].push(sesiones[i]);
        }
        for (var ak in porAct) {
            var hrsA = 0;
            for (var sa = 0; sa < porAct[ak].length; sa++) hrsA += porAct[ak][sa].horas || 0;
            html += nodoActividad(ak, porAct[ak], hrsA, false);
        }
        html += '</div>';
    }
    html += '</div>';
    return html;
}

function nodoActividad(actId, sesiones, horas, abiertoForzado) {
    var act = actIdx[actId];
    var nombre = act ? (act.nombre || actId) : (sesiones[0] ? (sesiones[0].actividadNombre || actId) : actId);
    var eliminada = !act;
    var ab = abiertoForzado || !!abiertos['act-' + actId];

    var html = '<div class="gs-node">';
    html += '<div class="gs-nhead' + (ab ? ' open' : '') + '" onclick="toggleAbierto(\'act-' + actId + '\')">';
    html += '<span class="gs-caret has">' + (ab ? '▾' : '▸') + '</span>';
    html += '<span class="gs-nicon">' + (eliminada ? '❓' : '📋') + '</span>';
    html += '<span class="gs-ninfo">';
    html += '<span class="gs-nname' + (eliminada ? '" style="color:#c0271f' : '') + '">' + esc(nombre) + (eliminada ? ' (eliminada)' : '') + '</span>';
    if (act) {
        html += '<span class="gs-nruta">' + esc(rutaDeTexto(actId)) + '</span>';
    }
    html += '</span>';
    html += '<span class="gs-nhrs">' + fmtHM(horas) + '</span>';
    html += '<span class="gs-nbadge" style="background:#eef2ee;color:#5a6a55;">' + sesiones.length + ' ses.</span>';
    html += '</div>';

    if (ab) {
        html += '<div class="gs-seslist">';
        for (var i = 0; i < sesiones.length; i++) {
            var s = sesiones[i];
            var ini = s.inicio ? (s.inicio.toDate ? s.inicio.toDate() : new Date(s.inicio)) : null;
            var fin = s.fin ? (s.fin.toDate ? s.fin.toDate() : new Date(s.fin)) : null;
            var claseEst = (s.estado === 'en_curso') ? 'en_curso' : 'finalizada';
            var labelEst = s.estado === 'en_curso' ? '▶ Curso' : '✓ Fin';
            var colorEst = claseEst === 'en_curso' ? '#d4edda;color:#155724' : '#eef2ee;color:#5a6a55';
            var migrado = s._migradoDe ? true : false;
            var tipoBadge = s.tipo === 'manual' ? '📝' : (s.tipo === 'tilde' ? '✔' : '⏱');

            html += '<div class="gs-sesion ' + claseEst + '">';
            html += '<span class="su">' + esc(s.nombre || s.uid || '—') + '</span>';
            html += '<span class="sh">' + fmtHM(s.horas || 0) + '</span>';
            html += '<span class="sf">' + fmtDMY(ini) + ' ' + (ini ? String(ini.getHours()).padStart(2,'0') + ':' + String(ini.getMinutes()).padStart(2,'0') : '') + (fin ? ' → ' + String(fin.getHours()).padStart(2,'0') + ':' + String(fin.getMinutes()).padStart(2,'0') : '') + '</span>';
            html += '<span class="se" style="background:' + colorEst + '">' + labelEst + '</span>';
            html += '<span style="font-size:10px;">' + tipoBadge + '</span>';
            if (migrado) html += '<span class="gs-nbadge migrado">📦</span>';
            if (s.notas) html += '<span style="font-size:10px;color:#889985;font-style:italic;">' + esc(s.notas) + '</span>';
            html += '<span class="sacc">';
            html += '<button onclick="editarSesion(\'' + s.id + '\')">✏️</button>';
            html += '<button class="del" onclick="eliminarSesion(\'' + s.id + '\')">🗑️</button>';
            html += '</span>';
            html += '</div>';
        }
        html += '</div>';
    }
    html += '</div>';
    return html;
}

// ── Toggle ───────────────────────────────────────────────────
window.toggleAbierto = function(id) {
    abiertos[id] = !abiertos[id];
    aplicarFiltros();
};

// ── Selector en cascada (CORREGIDO) ─────────────────────────
window.filtrarActividadesPorProyecto = function() {
    var proyId = document.getElementById('mProy').value;
    var mAct = document.getElementById('mAct');
    
    if (!proyId) {
        mAct.innerHTML = '<option value="">Primero elegí un proyecto</option>';
        return;
    }

    var actividades = actividadesPorProyecto[proyId] || [];
    if (actividades.length === 0) {
        mAct.innerHTML = '<option value="">Sin actividades en este proyecto</option>';
        return;
    }

    // Tabulaciones que representan el anidado del proyecto
    var html = '<option value="">Elegí una actividad...</option>';
    for (var i = 0; i < actividades.length; i++) {
        var a = actividades[i];
        var sangria = '';
        for (var n = 0; n < (a.nivel || 0); n++) sangria += '\u00A0\u00A0\u00A0\u00A0';
        var prefijo = a.esRaiz ? '🏠 ' : (a.tieneHijos ? '📂 ' : '📋 ');
        html += '<option value="' + a.id + '">' + sangria + prefijo + esc(a.nombre) + '</option>';
    }
    mAct.innerHTML = html;
};

// ── Modal ────────────────────────────────────────────────────
window.cerrarModal = function() {
    document.getElementById('gsModal').classList.remove('show');
};

function actualizarInicioFin() {
    var fecha = document.getElementById('mFecha').value;
    if (fecha) {
        if (!document.getElementById('mInicio').value) document.getElementById('mInicio').value = '08:00';
        if (!document.getElementById('mFin').value) document.getElementById('mFin').value = '12:00';
    }
    calcHoras();
}

function calcHoras() {
    var fecha = document.getElementById('mFecha').value;
    var ini = document.getElementById('mInicio').value;
    var fin = document.getElementById('mFin').value;
    if (fecha && ini && fin) {
        var dIni = new Date(fecha + 'T' + ini + ':00');
        var dFin = new Date(fecha + 'T' + fin + ':00');
        if (dFin <= dIni) dFin.setDate(dFin.getDate() + 1);
        var diff = (dFin - dIni) / 3600000;
        document.getElementById('mHoras').value = fmtHM(Math.max(0, diff));
    }
}

window.mostrarFormManual = function() {
    document.getElementById('mId').value = '';
    document.getElementById('gsModalTitulo').textContent = 'Nuevo registro manual';
    document.getElementById('mProy').value = '';
    document.getElementById('mAct').innerHTML = '<option value="">Primero elegí un proyecto</option>';
    document.getElementById('mFecha').value = new Date().toISOString().split('T')[0];
    document.getElementById('mInicio').value = '';
    document.getElementById('mFin').value = '';
    document.getElementById('mHoras').value = '';
    document.getElementById('mNotas').value = '';
    document.getElementById('gsModal').classList.add('show');
};

window.editarSesion = async function(sesionId) {
    var snap = await db.collection('sesiones').doc(sesionId).get();
    if (!snap.exists) { alert('Sesión no encontrada.'); return; }

    var s = snap.data();
    document.getElementById('mId').value = sesionId;
    document.getElementById('gsModalTitulo').textContent = 'Editar registro';

    if (s.actividadId) {
        var rz = raizDe(s.actividadId);
        if (rz) {
            document.getElementById('mProy').value = rz;
            window.filtrarActividadesPorProyecto();
        }
        document.getElementById('mAct').value = s.actividadId;
    }
    if (s.uid) document.getElementById('mUsr').value = s.uid;
    document.getElementById('mNotas').value = s.notas || '';

    if (s.inicio) {
        var ini = s.inicio.toDate ? s.inicio.toDate() : new Date(s.inicio);
        document.getElementById('mFecha').value = ini.toISOString().split('T')[0];
        document.getElementById('mInicio').value = String(ini.getHours()).padStart(2,'0') + ':' + String(ini.getMinutes()).padStart(2,'0');
    }
    if (s.fin) {
        var fin = s.fin.toDate ? s.fin.toDate() : new Date(s.fin);
        document.getElementById('mFin').value = String(fin.getHours()).padStart(2,'0') + ':' + String(fin.getMinutes()).padStart(2,'0');
    }

    calcHoras();
    document.getElementById('gsModal').classList.add('show');
};

window.guardarSesion = async function() {
    var sesionId = document.getElementById('mId').value;
    var fecha = document.getElementById('mFecha').value;
    var ini = document.getElementById('mInicio').value;
    var fin = document.getElementById('mFin').value;
    var actId = document.getElementById('mAct').value;

    if (!fecha || !ini || !fin) { alert('Completá fecha, inicio y fin.'); return; }
    if (!actId) { alert('Elegí un proyecto y una actividad.'); return; }

    var dIni = new Date(fecha + 'T' + ini + ':00');
    var dFin = new Date(fecha + 'T' + fin + ':00');
    if (dFin <= dIni) dFin.setDate(dFin.getDate() + 1);
    var horas = Math.max(0, (dFin - dIni) / 3600000);

    // Nombre desde el índice de actividades (el texto de la opción tiene sangría y prefijos)
    var actNombre = (actIdx[actId] && actIdx[actId].nombre) ? actIdx[actId].nombre : '';
    var usrId = document.getElementById('mUsr').value;
    var usrNombre = document.getElementById('mUsr').options[document.getElementById('mUsr').selectedIndex].text;

    var datos = {
        actividadId: actId,
        actividadNombre: actNombre,
        uid: usrId,
        nombre: usrNombre,
        inicio: firebase.firestore.Timestamp.fromDate(dIni),
        fin: firebase.firestore.Timestamp.fromDate(dFin),
        horas: Math.round(horas * 100) / 100,
        notas: document.getElementById('mNotas').value,
        estado: 'finalizada',
        tipo: 'manual',
        actualizadoEn: firebase.firestore.Timestamp.now()
    };

    try {
        if (sesionId) {
            await db.collection('sesiones').doc(sesionId).update(datos);
        } else {
            await db.collection('sesiones').add(Object.assign({}, datos, {
                creadoPor: uid,
                creadoEn: firebase.firestore.Timestamp.now()
            }));
        }
        window.cerrarModal();
        await cargarSesiones();
        aplicarFiltros();
    } catch (e) { alert('Error: ' + e.message); }
};

window.eliminarSesion = async function(sesionId) {
    if (!confirm('¿Eliminar esta sesión permanentemente?')) return;
    if (!confirm('¿Estás seguro?')) return;
    try {
        await db.collection('sesiones').doc(sesionId).delete();
        await cargarSesiones();
        aplicarFiltros();
    } catch (e) { alert('Error: ' + e.message); }
};

// ── Init ────────────────────────────────────────────────────
window.aplicarFiltros = aplicarFiltros;
await cargarTodo();

</script>
