<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reservas - Casa Verde</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .pago-pendiente { color: #ef4444; font-weight: bold; background: #fee2e2; padding: 2px 5px; border-radius: 4px; }
        .pago-ok { color: #166534; background: #dcfce7; padding: 2px 5px; border-radius: 4px; }
        .status-ready { display: flex; align-items: center; gap: 5px; color: #2ecc71; font-weight: bold; }
        .status-wait { display: flex; align-items: center; gap: 5px; color: #999; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Casa Verde</h2>
        <a href="dashboard.html" class="nav-link"><span class="material-icons">dashboard</span> Tareas</a>
        <a href="reservas.html" class="nav-link active"><span class="material-icons">event_available</span> Reservas</a>
        <a href="clientes.html" class="nav-link"><span class="material-icons">people</span> Clientes</a>
    </div>

    <div class="main-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Calendario y Cobros</h1>
            <button class="btn-cv" onclick="document.getElementById('modalReserva').style.display='block'"><span class="material-icons">add</span> Nueva Reserva</button>
        </div>

        <div class="card" style="margin-top:20px;">
            <table>
                <thead>
                    <tr><th>Huésped</th><th>Check-in</th><th>Origen</th><th>Total</th><th>Saldo</th><th>¿Casa Preparada?</th></tr>
                </thead>
                <tbody id="reservaBody"></tbody>
            </table>
        </div>
    </div>

    <div id="modalReserva" class="modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:450px; background:white; padding:25px; z-index:1100; border-radius:15px;">
        <h3>Registrar Nueva Reserva</h3>
        <input type="text" id="resNombre" placeholder="Nombre completo" style="width:100%; margin:8px 0; padding:10px;">
        <div style="display:flex; gap:10px;">
            <div style="flex:1"><label>Entrada:</label><input type="date" id="resIn" style="width:100%; padding:10px;"></div>
            <div style="flex:1"><label>Salida:</label><input type="date" id="resOut" style="width:100%; padding:10px;"></div>
        </div>
        <label>Plataforma:</label>
        <select id="resOrigen" style="width:100%; margin:8px 0; padding:10px;">
            <option value="Airbnb">Airbnb</option>
            <option value="Directo">WhatsApp / Directo</option>
            <option value="Booking">Booking.com</option>
        </select>
        <div style="display:flex; gap:10px;">
            <div style="flex:1"><label>Precio Total:</label><input type="number" id="resTotal" value="0" style="width:100%; padding:10px;"></div>
            <div style="flex:1"><label>Seña/Pagado:</label><input type="number" id="resPagado" value="0" style="width:100%; padding:10px;"></div>
        </div>
        <button onclick="guardarReserva()" class="btn-cv" style="width:100%; margin-top:20px;">Confirmar Reserva</button>
        <button onclick="document.getElementById('modalReserva').style.display='none'" style="width:100%; margin-top:8px; background:none; border:none; color:gray;">Cerrar</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/auth-core.js"></script>
    <script>
        async function loadReservas() {
            const snap = await db.collection('reservas').orderBy('checkIn', 'desc').get();
            let html = '';
            snap.forEach(doc => {
                const r = doc.data();
                const saldo = r.total - r.pagado;
                const listo = r.preparada === true;
                html += `<tr>
                    <td><b>${r.nombre}</b></td>
                    <td>${r.checkIn}</td>
                    <td>${r.origen}</td>
                    <td>$${r.total}</td>
                    <td><span class="${saldo > 0 ? 'pago-pendiente' : 'pago-ok'}">$${saldo}</span></td>
                    <td>
                        <div class="${listo ? 'status-ready' : 'status-wait'}">
                            <span class="material-icons">${listo ? 'task_alt' : 'hourglass_empty'}</span>
                            ${listo ? '¡Lista!' : 'Pendiente'}
                        </div>
                    </td>
                </tr>`;
            });
            document.getElementById('reservaBody').innerHTML = html;
        }

        async function guardarReserva() {
            await db.collection('reservas').add({
                nombre: document.getElementById('resNombre').value,
                checkIn: document.getElementById('resIn').value,
                checkOut: document.getElementById('resOut').value,
                origen: document.getElementById('resOrigen').value,
                total: parseFloat(document.getElementById('resTotal').value),
                pagado: parseFloat(document.getElementById('resPagado').value),
                preparada: false, // Por defecto al crearla
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            location.reload();
        }

        window.onload = () => setTimeout(loadReservas, 1000);
    </script>
</body>
</html>
