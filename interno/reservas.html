<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Reserva - CasaVerdeCanas</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin-style.css">
</head>
<body>

<div id="loginContainer" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #1e3c2c 0%, #2d5a27 100%);">
    <div style="background: white; padding: 40px; border-radius: 24px; width: 350px; text-align: center;">
        <h2 style="color: #2d5a27;">➕ Nueva Reserva</h2>
        <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:12px;">
        <input type="password" id="password" placeholder="Contraseña" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:12px;">
        <button onclick="login()" style="width:100%; padding:12px; background:#2d5a27; color:white; border:none; border-radius:12px;">Ingresar</button>
        <div id="loginError" style="color:red; margin-top:10px;"></div>
    </div>
</div>

<div id="mainPanel" style="display: none;">
    <div class="admin-header">
        <h1><span class="material-icons">add_circle</span> Nueva Reserva Directa</h1>
        <div class="user-info">
            <span class="material-icons">account_circle</span>
            <span id="userEmail"></span>
            <button class="logout-btn" onclick="logout()"><span class="material-icons">logout</span> Salir</button>
        </div>
    </div>
    
    <div class="admin-nav">
        <a href="dashboard.html" class="nav-item"><span class="material-icons">dashboard</span> Dashboard</a>
        <a href="calendario.html" class="nav-item"><span class="material-icons">calendar_month</span> Calendario</a>
        <a href="reservas.html" class="nav-item active"><span class="material-icons">add_circle</span> Nueva Reserva</a>
        <a href="clientes.html" class="nav-item"><span class="material-icons">people</span> Clientes</a>
        <a href="pagos.html" class="nav-item"><span class="material-icons">payments</span> Pagos</a>
    </div>
    
    <div class="admin-content">
        <div class="card">
            <h2><span class="material-icons">hotel</span> Datos de la Reserva</h2>
            
            <div class="form-row">
                <div class="form-group">
                    <label>👤 Nombre del cliente *</label>
                    <input type="text" id="nombre" placeholder="Nombre completo" required>
                </div>
                <div class="form-group">
                    <label>📱 WhatsApp</label>
                    <input type="text" id="whatsapp" placeholder="+55 11 99999-9999">
                </div>
                <div class="form-group">
                    <label>🌎 Nacionalidad</label>
                    <input type="text" id="nacionalidad" placeholder="Ej: Argentina, Brasil">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>🏠 Cabaña *</label>
                    <select id="cabaña">
                        <option value="1">Cabaña 1 (Naranja) - Frente</option>
                        <option value="2">Cabaña 2 (Azul) - Depa abajo</option>
                        <option value="3">Cabaña 3 (Verde) - Loft</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📅 Check-in *</label>
                    <input type="date" id="checkIn" required>
                </div>
                <div class="form-group">
                    <label>📅 Check-out *</label>
                    <input type="date" id="checkOut" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>👥 Cantidad de huéspedes</label>
                    <input type="number" id="huespedes" min="1" max="20" value="2">
                </div>
                <div class="form-group">
                    <label>💰 Precio por día (BRL)</label>
                    <input type="number" id="precioDiario" value="250" step="10">
                </div>
                <div class="form-group">
                    <label>🧹 Costo limpieza (BRL)</label>
                    <input type="number" id="costoLimpieza" value="150" step="10">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>💱 Tipo de cambio (1 USD = ? BRL)</label>
                    <input type="number" id="tipoCambio" value="5.30" step="0.01">
                </div>
                <div class="form-group">
                    <label>👤 Usuario que gestiona</label>
                    <select id="gestion"></select>
                </div>
            </div>
            
            <div class="form-group">
                <label>📝 Observaciones</label>
                <textarea id="observaciones" rows="3" placeholder="Notas adicionales..."></textarea>
            </div>
            
            <div id="preview" style="background: #e8f5e9; padding: 15px; border-radius: 12px; margin: 20px 0;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span>🏠 Estadía:</span>
                    <span id="diasPreview">0 días</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span>💰 Subtotal (BRL):</span>
                    <span id="subtotalPreview">R$ 0,00</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span>🧹 Limpieza:</span>
                    <span id="limpiezaPreview">R$ 150,00</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1rem; margin-top: 8px; padding-top: 8px; border-top: 1px solid #c8e6c9;">
                    <span>💵 TOTAL:</span>
                    <span id="totalPreview">R$ 0,00</span>
                </div>
                <div id="usdPreview" style="font-size: 12px; color: #2d5a27; text-align: right; margin-top: 8px;"></div>
            </div>
            
            <div style="display: flex; gap: 15px; justify-content: flex-end;">
                <button class="btn-secondary" onclick="limpiarFormulario()"><span class="material-icons">refresh</span> Limpiar</button>
                <button class="btn-primary" onclick="guardarReserva()"><span class="material-icons">save</span> Guardar Reserva</button>
            </div>
        </div>
    </div>
</div>

<script src="/js/auth-core.js"></script>
<script>
    let usuariosList = [];
    
    function calcularDias() {
        const checkIn = document.getElementById('checkIn').value;
        const checkOut = document.getElementById('checkOut').value;
        if (checkIn && checkOut) {
            const inicio = new Date(checkIn);
            const fin = new Date(checkOut);
            const diff = Math.ceil((fin - inicio) / (1000 * 60 * 60 * 24));
            return diff > 0 ? diff : 0;
        }
        return 0;
    }
    
    function actualizarPreview() {
        const dias = calcularDias();
        const precioDiario = parseFloat(document.getElementById('precioDiario').value) || 0;
        const costoLimpieza = parseFloat(document.getElementById('costoLimpieza').value) || 0;
        const tipoCambio = parseFloat(document.getElementById('tipoCambio').value) || 5.30;
        
        const subtotal = dias * precioDiario;
        const total = subtotal + costoLimpieza;
        const totalUSD = total / tipoCambio;
        
        document.getElementById('diasPreview').textContent = `${dias} ${dias === 1 ? 'día' : 'días'}`;
        document.getElementById('subtotalPreview').textContent = `R$ ${subtotal.toFixed(2)}`;
        document.getElementById('limpiezaPreview').textContent = `R$ ${costoLimpieza.toFixed(2)}`;
        document.getElementById('totalPreview').textContent = `R$ ${total.toFixed(2)}`;
        document.getElementById('usdPreview').innerHTML = `≈ USD ${totalUSD.toFixed(2)} (1 USD = R$ ${tipoCambio.toFixed(2)})`;
    }
    
    async function cargarUsuarios() {
        try {
            const snapshot = await db.collection('usuarios').get();
            usuariosList = [];
            snapshot.forEach(doc => usuariosList.push({ id: doc.id, ...doc.data() }));
            const select = document.getElementById('gestion');
            select.innerHTML = '<option value="">Seleccionar usuario...</option>';
            usuariosList.forEach(u => {
                const nombre = u.nombre || u.email || u.id;
                select.innerHTML += `<option value="${u.id}">${escapeHtml(nombre)}</option>`;
            });
        } catch (error) {
            console.error('Error cargando usuarios:', error);
        }
    }
    
    async function guardarReserva() {
        const nombre = document.getElementById('nombre').value.trim();
        if (!nombre) { alert('Ingresa el nombre del cliente'); return; }
        
        const checkIn = document.getElementById('checkIn').value;
        const checkOut = document.getElementById('checkOut').value;
        if (!checkIn || !checkOut) { alert('Ingresa las fechas'); return; }
        
        const dias = calcularDias();
        if (dias <= 0) { alert('Check-out debe ser posterior a check-in'); return; }
        
        const precioDiario = parseFloat(document.getElementById('precioDiario').value) || 0;
        const costoLimpieza = parseFloat(document.getElementById('costoLimpieza').value) || 0;
        const tipoCambio = parseFloat(document.getElementById('tipoCambio').value) || 5.30;
        const subtotal = dias * precioDiario;
        const totalBRL = subtotal + costoLimpieza;
        const totalUSD = totalBRL / tipoCambio;
        
        const data = {
            caba: document.getElementById('cabaña').value,
            nombre: nombre,
            checkIn: firebase.firestore.Timestamp.fromDate(new Date(checkIn)),
            checkOut: firebase.firestore.Timestamp.fromDate(new Date(checkOut)),
            huespedes: document.getElementById('huespedes').value,
            observaciones: document.getElementById('observaciones').value,
            origen: 'directa',
            gestion: document.getElementById('gestion').value,
            precioDiarioBRL: precioDiario,
            costoLimpiezaBRL: costoLimpieza,
            subtotalBRL: subtotal,
            totalBRL: totalBRL,
            totalUSD: totalUSD,
            tipoCambio: tipoCambio,
            creadoEn: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        // Guardar también en clientes si no existe
        const clienteExistente = await db.collection('clientes').where('nombre', '==', nombre).get();
        if (clienteExistente.empty) {
            await db.collection('clientes').add({
                nombre: nombre,
                whatsapp: document.getElementById('whatsapp').value,
                nacionalidad: document.getElementById('nacionalidad').value,
                creadoEn: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
        
        await db.collection('reservas').add(data);
        alert(`✅ Reserva creada para ${nombre}\nTotal: R$ ${totalBRL.toFixed(2)} (USD ${totalUSD.toFixed(2)})`);
        limpiarFormulario();
    }
    
    function limpiarFormulario() {
        document.getElementById('nombre').value = '';
        document.getElementById('whatsapp').value = '';
        document.getElementById('nacionalidad').value = '';
        document.getElementById('cabaña').value = '1';
        document.getElementById('checkIn').value = '';
        document.getElementById('checkOut').value = '';
        document.getElementById('huespedes').value = '2';
        document.getElementById('precioDiario').value = '250';
        document.getElementById('costoLimpieza').value = '150';
        document.getElementById('tipoCambio').value = '5.30';
        document.getElementById('observaciones').value = '';
        document.getElementById('gestion').value = '';
        actualizarPreview();
    }
    
    document.getElementById('checkIn').addEventListener('change', actualizarPreview);
    document.getElementById('checkOut').addEventListener('change', actualizarPreview);
    document.getElementById('precioDiario').addEventListener('input', actualizarPreview);
    document.getElementById('costoLimpieza').addEventListener('input', actualizarPreview);
    document.getElementById('tipoCambio').addEventListener('input', actualizarPreview);
    
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('loginError');
        const result = await loginAdmin(email, password);
        if (result.success) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            document.getElementById('userEmail').textContent = result.user.email;
            cargarUsuarios();
            actualizarPreview();
        } else {
            errorDiv.textContent = result.error;
        }
    }
    
    async function logout() {
        await logoutAdmin();
        window.location.reload();
    }
    
    checkAdmin().then(isAdmin => {
        if (isAdmin) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            document.getElementById('userEmail').textContent = currentUser.email;
            cargarUsuarios();
            actualizarPreview();
        }
    });
    
    window.login = login;
    window.logout = logout;
    window.limpiarFormulario = limpiarFormulario;
    window.guardarReserva = guardarReserva;
</script>
</body>
</html>
