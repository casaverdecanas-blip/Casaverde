<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga Masiva de Tareas</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
        }

        .login-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 200px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .user-info {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .user-info span:first-child {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .task-list {
            margin: 20px 0;
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }

        .task-header {
            display: grid;
            grid-template-columns: 2fr 3fr 1fr 1fr;
            background: #667eea;
            color: white;
            padding: 12px;
            font-weight: 500;
            font-size: 14px;
        }

        .task-row {
            display: grid;
            grid-template-columns: 2fr 3fr 1fr 1fr;
            padding: 12px;
            border-bottom: 1px solid #eee;
            align-items: start;
            gap: 10px;
        }

        .task-row:hover {
            background: #f5f5f5;
        }

        .task-row input, .task-row select, .task-row textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }

        .task-row textarea {
            resize: vertical;
            min-height: 60px;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn-secondary {
            background: #95a5a6;
        }

        .btn-success {
            background: #27ae60;
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-info {
            background: #3498db;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            white-space: pre-line;
            line-height: 1.6;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .status-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .task-counter {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .task-header, .task-row {
                grid-template-columns: 1fr;
            }
            
            .login-section {
                flex-direction: column;
                align-items: stretch;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .actions button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span class="material-icons">playlist_add</span>
            Carga Masiva de Tareas
            <span class="task-counter" id="taskCounter">0</span>
        </h1>

        <!-- Sección de Login -->
        <div id="loginSection" class="login-section">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" value="admin@casaverde.com" placeholder="Email">
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password" value="123456" placeholder="Contraseña">
            </div>
            <button onclick="login()" id="loginBtn">
                <span class="material-icons">login</span> Iniciar Sesión
            </button>
        </div>

        <!-- Información de Usuario -->
        <div id="userInfo" class="user-info" style="display: none;">
            <span>
                <span class="material-icons">account_circle</span>
                <span id="userEmail"></span>
            </span>
            <button onclick="logout()" class="btn-secondary">
                <span class="material-icons">logout</span> Cerrar Sesión
            </button>
        </div>

        <!-- Lista de Tareas Prellenadas -->
        <div id="tasksSection" style="display: none;">
            <h2 style="margin-bottom: 15px; color: #333; display: flex; align-items: center; gap: 10px;">
                <span class="material-icons">edit_note</span>
                Tareas a Cargar
            </h2>

            <div class="task-list" id="taskList">
                <!-- Las tareas se generarán dinámicamente -->
            </div>

            <!-- Acciones -->
            <div class="actions">
                <button onclick="cargarTareas()" class="btn-success">
                    <span class="material-icons">upload</span> Cargar Todas las Tareas
                </button>
                <button onclick="verificarTareasExistentes()" class="btn-info">
                    <span class="material-icons">search</span> Verificar Existentes
                </button>
                <button onclick="limpiarFormulario()" class="btn-secondary">
                    <span class="material-icons">refresh</span> Restaurar Original
                </button>
            </div>

            <!-- Mensaje de Estado -->
            <div id="statusMessage" class="status-message"></div>
        </div>
    </div>

    <script>
        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDluIIBwIJVkO9DEX4ghJQYhzJAnXtQoKs",
            authDomain: "tatareas-d8a80.firebaseapp.com",
            projectId: "tatareas-d8a80",
            storageBucket: "tatareas-d8a80.firebasestorage.app",
            messagingSenderId: "709332495480",
            appId: "1:709332495480:web:7060b2c75984352354918d"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        const adminEmail = 'admin@casaverde.com';

        // ============================================
        // LISTA DE TAREAS PRELLENADAS (VERSIÓN FINAL)
        // ============================================
        const tareasBase = [
            {
                titulo: "Barrer patio",
                descripcion: "Barrer todo el patio, eliminar hojas y residuos",
                recurrencia: "daily",
                prioridad: "media"
            },
            {
                titulo: "Limpiar Piscina",
                descripcion: "Limpiar piscina: barrer los bordes y pasar calderín en el agua",
                recurrencia: "daily",
                prioridad: "alta"
            },
            {
                titulo: "Barrer frente",
                descripcion: "Barrer frente, incluye cuidado de pasto y plantas del frente",
                recurrencia: "biweekly",
                prioridad: "media"
            },
            {
                titulo: "Regar las plantas",
                descripcion: "Regar todas las plantas del hogar",
                recurrencia: "biweekly",
                prioridad: "media"
            },
            {
                titulo: "Limpieza de pasillos",
                descripcion: "Mantener libre de basura y hojas, despejado de objetos",
                recurrencia: "biweekly",
                prioridad: "baja"
            },
            {
                titulo: "Aspirar piscina",
                descripcion: "Aspirar hacia depósito y devolver el agua decantada a la noche",
                recurrencia: "weekly",
                prioridad: "alta"
            },
            {
                titulo: "Cloro al agua",
                descripcion: "Una medida de cloro espolvoreada por la superficie de la piscina - garantiza el control de mosquitos",
                recurrencia: "biweekly",
                prioridad: "alta"
            },
            {
                titulo: "Limpieza del baño",
                descripcion: "Limpieza con desinfectante sobre pisos y paredes. Revisar cortina y accesorios para controlar acumulación de moho",
                recurrencia: "biweekly",
                prioridad: "alta"
            },
            {
                titulo: "Tirar la basura",
                descripcion: "Revisar en todos los lugares que se almacenen bolsas con desperdicios. Sacar a la calle si es día de recolección en horario adecuado para evitar enchastre en la vereda",
                recurrencia: "daily",
                prioridad: "alta"
            },
            {
                titulo: "Limpieza de cocina y pileta",
                descripcion: "Limpieza profunda de la pileta y la cocina. Mantenimiento diario de espacios comunes para cuidar la proliferación de bichitos",
                recurrencia: "biweekly",
                prioridad: "alta"
            },
            {
                titulo: "Barrer vereda",
                descripcion: "Barrer vereda una vez por semana, juntar y embolsar las suciedades acumuladas. Mantener los pies de los arbustos limpios y el borde de la calle sin acumulación. Si no fue necesario una intervención por algún desastre ocasionado por algún accidente, igual realizar limpieza preventiva.",
                recurrencia: "weekly",
                prioridad: "media"
            },
            {
                titulo: "Limpieza filtros de lavarropas",
                descripcion: "Mantener limpios los filtros de lavarropas es necesario para su correcto funcionamiento. Revisar y limpiar dos veces por semana para evitar acumulación de residuos y malos olores.",
                recurrencia: "biweekly",
                prioridad: "media"
            },
            {
                titulo: "Control de plagas",
                descripcion: "Semanalmente revisar trampas y/o venenos de ratones, cucarachas, cupins, mosquitos. Quedará a discreción y criterio personal la técnica a emplear pero es muy importante mantener un control periódico para evitar infestaciones.",
                recurrencia: "weekly",
                prioridad: "alta"
            },
            {
                titulo: "Control plantas trepadoras",
                descripcion: "Es necesario verificar y cuidar el control de las trepadoras una vez al mes, ya que suelen capturar las ventanas y maltratar otras instalaciones como las tejas, las canaletas y otros elementos de la estructura.",
                recurrencia: "monthly",
                prioridad: "media"
            }
        ];

        // ============================================
        // AUTENTICACIÓN
        // ============================================
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('tasksSection').style.display = 'block';
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('taskCounter').textContent = tareasBase.length;
                
                if (user.email !== adminEmail) {
                    mostrarMensaje('⚠️ No eres administrador. Solo puedes ver las tareas, no cargarlas.', 'warning');
                }
                
                renderizarTareas();
            } else {
                currentUser = null;
                document.getElementById('loginSection').style.display = 'flex';
                document.getElementById('userInfo').style.display = 'none';
                document.getElementById('tasksSection').style.display = 'none';
            }
        });

        window.login = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner" style="width:20px;height:20px;"></span> Procesando...';
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch (error) {
                if (error.code === 'auth/user-not-found') {
                    try {
                        await auth.createUserWithEmailAndPassword(email, password);
                    } catch (createError) {
                        alert('Error al crear usuario: ' + createError.message);
                    }
                } else {
                    alert('Error de login: ' + error.message);
                }
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span class="material-icons">login</span> Iniciar Sesión';
            }
        };

        window.logout = () => {
            auth.signOut();
        };

        // ============================================
        // RENDERIZAR TAREAS
        // ============================================
        function renderizarTareas() {
            const taskList = document.getElementById('taskList');
            let html = `
                <div class="task-header">
                    <div>Título</div>
                    <div>Descripción</div>
                    <div>Recurrencia</div>
                    <div>Prioridad</div>
                </div>
            `;
            
            tareasBase.forEach((tarea, index) => {
                html += `
                    <div class="task-row" id="task-${index}">
                        <input type="text" value="${escapeHtml(tarea.titulo)}" placeholder="Título" data-index="${index}" class="titulo-input">
                        <textarea placeholder="Descripción" data-index="${index}" class="descripcion-input" rows="3">${escapeHtml(tarea.descripcion)}</textarea>
                        <select data-index="${index}" class="recurrencia-select">
                            <option value="none" ${tarea.recurrencia === 'none' ? 'selected' : ''}>Sin repetición</option>
                            <option value="daily" ${tarea.recurrencia === 'daily' ? 'selected' : ''}>Diariamente</option>
                            <option value="weekly" ${tarea.recurrencia === 'weekly' ? 'selected' : ''}>Semanalmente</option>
                            <option value="biweekly" ${tarea.recurrencia === 'biweekly' ? 'selected' : ''}>Dos veces por semana</option>
                            <option value="monthly" ${tarea.recurrencia === 'monthly' ? 'selected' : ''}>Mensualmente</option>
                        </select>
                        <select data-index="${index}" class="prioridad-select">
                            <option value="alta" ${tarea.prioridad === 'alta' ? 'selected' : ''}>Alta</option>
                            <option value="media" ${tarea.prioridad === 'media' ? 'selected' : ''}>Media</option>
                            <option value="baja" ${tarea.prioridad === 'baja' ? 'selected' : ''}>Baja</option>
                        </select>
                    </div>
                `;
            });
            
            taskList.innerHTML = html;
            document.getElementById('taskCounter').textContent = tareasBase.length;
        }

        // ============================================
        // OBTENER TAREAS DEL FORMULARIO
        // ============================================
        function obtenerTareasDelFormulario() {
            const tareas = [];
            const titulos = document.querySelectorAll('.titulo-input');
            
            titulos.forEach((input, index) => {
                const titulo = input.value.trim();
                if (!titulo) return;
                
                const descripcion = document.querySelector(`.descripcion-input[data-index="${index}"]`).value.trim();
                const recurrencia = document.querySelector(`.recurrencia-select[data-index="${index}"]`).value;
                const prioridad = document.querySelector(`.prioridad-select[data-index="${index}"]`).value;
                
                tareas.push({
                    titulo,
                    descripcion,
                    recurrencia,
                    prioridad
                });
            });
            
            return tareas;
        }

        // ============================================
        // VERIFICAR TAREAS EXISTENTES
        // ============================================
        window.verificarTareasExistentes = async () => {
            if (!currentUser) {
                mostrarMensaje('❌ Debes iniciar sesión', 'error');
                return;
            }
            
            mostrarMensaje('🔍 Verificando tareas existentes...', 'info');
            
            try {
                const snapshot = await db.collection('tareas')
                    .where('activa', '==', true)
                    .get();
                
                const tareasExistentes = new Set();
                snapshot.forEach(doc => {
                    tareasExistentes.add(doc.data().titulo);
                });
                
                const tareasForm = obtenerTareasDelFormulario();
                const nuevas = [];
                const existentes = [];
                
                tareasForm.forEach(t => {
                    if (tareasExistentes.has(t.titulo)) {
                        existentes.push(t.titulo);
                    } else {
                        nuevas.push(t.titulo);
                    }
                });
                
                let mensaje = `📊 TOTAL: ${tareasForm.length} tareas en el formulario\n\n`;
                mensaje += `✅ NUEVAS (${nuevas.length}):\n`;
                if (nuevas.length > 0) {
                    mensaje += nuevas.map(t => `   • ${t}`).join('\n') + '\n\n';
                } else {
                    mensaje += '   No hay tareas nuevas\n\n';
                }
                
                mensaje += `⏳ YA EXISTENTES (${existentes.length}):\n`;
                if (existentes.length > 0) {
                    mensaje += existentes.map(t => `   • ${t}`).join('\n');
                } else {
                    mensaje += '   No hay tareas duplicadas';
                }
                
                mostrarMensaje(mensaje, existentes.length > 0 ? 'warning' : 'success');
                
            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('❌ Error al verificar tareas: ' + error.message, 'error');
            }
        };

        // ============================================
        // CARGAR TAREAS
        // ============================================
        window.cargarTareas = async () => {
            if (!currentUser) {
                mostrarMensaje('❌ Debes iniciar sesión', 'error');
                return;
            }
            
            if (currentUser.email !== adminEmail) {
                mostrarMensaje('❌ Solo el administrador puede cargar tareas', 'error');
                return;
            }
            
            const tareas = obtenerTareasDelFormulario();
            
            if (tareas.length === 0) {
                mostrarMensaje('❌ No hay tareas para cargar', 'error');
                return;
            }
            
            const confirmar = confirm(`¿Cargar ${tareas.length} tareas en la base de datos?\n\nSe verificarán duplicados automáticamente.`);
            if (!confirmar) return;
            
            mostrarMensaje('🔄 Cargando tareas... Por favor espera.', 'info');
            
            try {
                let cargadas = 0;
                let duplicadas = 0;
                let errores = 0;
                const resultados = [];
                
                for (const tarea of tareas) {
                    try {
                        // Verificar si ya existe
                        const snapshot = await db.collection('tareas')
                            .where('titulo', '==', tarea.titulo)
                            .where('activa', '==', true)
                            .get();
                        
                        if (snapshot.empty) {
                            // No existe, crear
                            await db.collection('tareas').add({
                                titulo: tarea.titulo,
                                descripcion: tarea.descripcion || '',
                                prioridad: tarea.prioridad,
                                recurrencia: tarea.recurrencia,
                                fechaInicio: new Date().toISOString().split('T')[0],
                                activa: true,
                                creadaPor: currentUser.email,
                                timestamp: firebase.firestore.FieldValue.serverTimestamp()
                            });
                            cargadas++;
                            resultados.push(`✅ ${tarea.titulo}`);
                        } else {
                            duplicadas++;
                            resultados.push(`⏳ ${tarea.titulo} (duplicada)`);
                        }
                    } catch (e) {
                        errores++;
                        resultados.push(`❌ ${tarea.titulo} (error)`);
                        console.error('Error en tarea:', tarea.titulo, e);
                    }
                }
                
                let mensaje = `✅ CARGA COMPLETADA:\n\n`;
                mensaje += `• Cargadas exitosamente: ${cargadas} tareas\n`;
                mensaje += `• Omitidas (duplicadas): ${duplicadas} tareas\n`;
                if (errores > 0) {
                    mensaje += `• Errores: ${errores} tareas\n`;
                }
                
                if (cargadas > 0) {
                    mensaje += `\n✨ Revisa la app principal para ver las nuevas tareas.\n\n`;
                    mensaje += `📋 Detalle:\n${resultados.join('\n')}`;
                }
                
                mostrarMensaje(mensaje, cargadas > 0 ? 'success' : 'warning');
                
            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('❌ Error al cargar tareas: ' + error.message, 'error');
            }
        };

        // ============================================
        // LIMPIAR FORMULARIO
        // ============================================
        window.limpiarFormulario = () => {
            if (confirm('¿Restaurar los valores originales del formulario?')) {
                renderizarTareas();
                mostrarMensaje('✅ Formulario restaurado a su estado original', 'success');
            }
        };

        // ============================================
        // FUNCIONES AUXILIARES
        // ============================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function mostrarMensaje(mensaje, tipo) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = mensaje;
            statusDiv.className = `status-message status-${tipo}`;
            statusDiv.style.display = 'block';
            
            setTimeout(() => {
                if (tipo !== 'error') {
                    statusDiv.style.display = 'none';
                }
            }, 15000);
        }

        // Inicializar fecha por defecto
        document.addEventListener('DOMContentLoaded', () => {
            if (document.getElementById('tasksSection').style.display === 'block') {
                renderizarTareas();
            }
        });
    </script>
</body>
</html>
