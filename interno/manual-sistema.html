<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual del Sistema · Casa Verde Canas</title>
    <link rel="stylesheet" href="design-system.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ── Layout dos columnas ─────────────────────────────── */
        .manual-layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: var(--space-6);
            align-items: start;
        }
        @media (max-width: 900px) {
            .manual-layout { grid-template-columns: 1fr; }
            .manual-toc    { display: none; }
        }

        /* ── Índice lateral ──────────────────────────────────── */
        .manual-toc {
            position: sticky;
            top: 80px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }
        .manual-toc__title {
            font-size: var(--text-xs);
            font-weight: 700;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: var(--space-3);
        }
        .manual-toc a {
            display: block;
            padding: var(--space-1) 0;
            text-decoration: none;
            color: var(--color-text-secondary);
            font-size: var(--text-sm);
            transition: color var(--transition-fast);
            border-left: 2px solid transparent;
            padding-left: var(--space-2);
        }
        .manual-toc a:hover,
        .manual-toc a.active { color: var(--color-primary); border-left-color: var(--color-primary); }
        .manual-toc a.nivel-2 { padding-left: var(--space-4); font-size: var(--text-xs); }

        /* ── Modal índice móvil ──────────────────────────────── */
        .toc-fab {
            display: none;
            position: fixed;
            bottom: var(--space-5);
            left: var(--space-4);
            z-index: 200;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }
        @media (max-width: 900px) { .toc-fab { display: flex; } }

        .toc-modal-overlay {
            display: none;
            position: fixed; inset: 0; z-index: 300;
            background: rgba(0,0,0,.5);
            align-items: flex-end;
        }
        .toc-modal-overlay.open { display: flex; }
        .toc-modal-panel {
            background: var(--color-surface);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            width: 100%;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
        }
        .toc-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-4) var(--space-5);
            border-bottom: 1px solid var(--color-border);
        }
        .toc-modal-header button {
            background: none; border: none; cursor: pointer;
            color: var(--color-text-secondary);
        }
        .toc-modal-links {
            overflow-y: auto;
            padding: 0 var(--space-5);
            -webkit-overflow-scrolling: touch;
        }
        .toc-modal-links a {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-3) 0;
            border-bottom: 1px solid var(--color-border-light);
            text-decoration: none;
            color: var(--color-text-secondary);
            font-size: var(--text-sm);
            font-weight: 500;
            transition: color var(--transition-fast);
        }
        .toc-modal-links a:last-child { border-bottom: none; }
        .toc-modal-links a:hover,
        .toc-modal-links a.active { color: var(--color-primary); }
        .toc-modal-links a .material-icons { font-size: 15px; opacity: .6; flex-shrink: 0; }
        .toc-modal-links a.nivel-2 {
            padding-left: var(--space-5);
            font-size: var(--text-xs);
            font-weight: 400;
        }

        /* ── Contenido del manual ────────────────────────────── */
        .manual-content {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-6) var(--space-8);
            line-height: 1.8;
        }
        @media (max-width: 600px) {
            .manual-content { padding: var(--space-4); }
        }

        .manual-content h1 {
            font-size: var(--text-2xl);
            font-weight: 800;
            color: var(--color-primary-dark);
            margin-bottom: var(--space-2);
            padding-bottom: var(--space-3);
            border-bottom: 2px solid var(--color-primary-light);
        }
        .manual-content h2 {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--color-primary);
            margin-top: var(--space-8);
            margin-bottom: var(--space-3);
            padding-bottom: var(--space-2);
            border-bottom: 1px solid var(--color-border);
            scroll-margin-top: 80px;
        }
        .manual-content h3 {
            font-size: var(--text-md);
            font-weight: 700;
            color: var(--color-text-primary);
            margin-top: var(--space-5);
            margin-bottom: var(--space-2);
            scroll-margin-top: 80px;
        }
        .manual-content h4 {
            font-size: var(--text-sm);
            font-weight: 700;
            color: var(--color-text-secondary);
            margin-top: var(--space-4);
            margin-bottom: var(--space-1);
            text-transform: uppercase;
            letter-spacing: .05em;
        }
        .manual-content p  { margin-bottom: var(--space-3); color: var(--color-text-secondary); }
        .manual-content ul,
        .manual-content ol { margin: var(--space-3) 0 var(--space-3) var(--space-5); }
        .manual-content li { margin-bottom: var(--space-1); color: var(--color-text-secondary); }
        .manual-content strong { color: var(--color-text-primary); }
        .manual-content code {
            background: var(--color-surface-2);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            padding: 1px 6px;
            font-family: var(--font-mono);
            font-size: .9em;
            color: var(--color-primary-dark);
        }
        .manual-content pre {
            background: var(--color-surface-2);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            overflow-x: auto;
            margin: var(--space-4) 0;
        }
        .manual-content pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: var(--text-xs);
            line-height: 1.7;
        }
        .manual-content table {
            width: 100%;
            border-collapse: collapse;
            margin: var(--space-4) 0;
            font-size: var(--text-sm);
        }
        .manual-content th {
            background: var(--color-primary-xlight);
            color: var(--color-primary-dark);
            font-weight: 700;
            text-align: left;
            padding: var(--space-2) var(--space-3);
            border: 1px solid var(--color-border);
        }
        .manual-content td {
            padding: var(--space-2) var(--space-3);
            border: 1px solid var(--color-border);
            color: var(--color-text-secondary);
            vertical-align: top;
        }
        .manual-content tr:nth-child(even) td { background: var(--color-surface-2); }

        .semaforo { display: flex; gap: var(--space-3); flex-wrap: wrap; margin: var(--space-3) 0; }
        .semaforo-item {
            display: flex; align-items: center; gap: var(--space-2);
            font-size: var(--text-sm); font-weight: 600;
        }
        .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }

        .flujo {
            background: var(--color-surface-2);
            border-left: 4px solid var(--color-primary);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            padding: var(--space-4);
            margin: var(--space-4) 0;
            font-size: var(--text-sm);
        }
        .flujo ol { margin-left: var(--space-4); }
        .flujo li { margin-bottom: var(--space-2); }

        .manual-note {
            background: var(--color-info-bg);
            border: 1px solid var(--color-info-light);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            margin: var(--space-4) 0;
            font-size: var(--text-sm);
            color: var(--color-info);
            display: flex;
            gap: var(--space-2);
            align-items: flex-start;
        }
        .manual-note .material-icons { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

        .manual-warning {
            background: var(--color-warning-bg);
            border: 1px solid rgba(224,123,0,.2);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            margin: var(--space-4) 0;
            font-size: var(--text-sm);
            color: var(--color-warning);
            display: flex;
            gap: var(--space-2);
            align-items: flex-start;
        }
        .manual-warning .material-icons { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

        /* ── Editor (solo admin) ─────────────────────────────── */
        .editor-bar {
            background: var(--color-primary-dark);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            margin-bottom: var(--space-4);
            display: flex;
            align-items: center;
            gap: var(--space-3);
            flex-wrap: wrap;
        }
        .editor-bar span { color: rgba(255,255,255,.7); font-size: var(--text-xs); flex: 1; }

        #editorTextarea {
            width: 100%;
            min-height: 600px;
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            line-height: 1.7;
            padding: var(--space-4);
            border: 1.5px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-surface-2);
            color: var(--color-text-primary);
            resize: vertical;
            display: none;
        }

        .manual-meta {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            margin-bottom: var(--space-5);
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }
        .manual-meta span { display: flex; align-items: center; gap: 4px; }
        .manual-meta .material-icons { font-size: 13px; }

        /* ── Subir archivo ───────────────────────────────────── */
        .upload-area {
            border: 2px dashed var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            text-align: center;
            margin-bottom: var(--space-4);
            cursor: pointer;
            transition: border-color var(--transition-fast), background var(--transition-fast);
        }
        .upload-area:hover,
        .upload-area.drag-over {
            border-color: var(--color-primary);
            background: var(--color-primary-xlight);
        }
        .upload-area .material-icons { font-size: 40px; color: var(--color-primary); margin-bottom: var(--space-2); }
        .upload-area p { color: var(--color-text-secondary); font-size: var(--text-sm); margin: 0; }
        #inputArchivo { display: none; }
    </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────── -->
<header class="admin-header">
    <div class="admin-header__brand">
        <span class="material-icons">cottage</span>
        Casa Verde Canas
    </div>
    <div class="admin-header__actions">
        <div class="user-chip">
            <span class="material-icons">person</span>
            <span id="userName">—</span>
        </div>
        <button class="btn-logout" onclick="CVC.cerrarSesion()">
            <span class="material-icons">logout</span>
            Salir
        </button>
    </div>
</header>

<!-- ── NAVEGACIÓN ──────────────────────────────────────────── -->
<nav class="admin-nav" id="appNav"></nav>

<!-- ── CONTENIDO ───────────────────────────────────────────── -->
<main class="admin-content">

    <!-- Barra de admin (solo visible para admins) -->
    <div id="editorBar" class="editor-bar" style="display:none;">
        <span class="material-icons" style="color:rgba(255,255,255,.7); font-size:18px;">edit</span>
        <span id="editorStatus">Modo lectura</span>
        <button class="btn btn-secondary btn-sm" id="btnSubir" onclick="document.getElementById('inputArchivo').click()">
            <span class="material-icons">upload_file</span> Subir .md / .html
        </button>
        <button class="btn btn-secondary btn-sm" id="btnEditar" onclick="activarEditor()">
            <span class="material-icons">edit</span> Editar HTML directo
        </button>
        <button class="btn btn-primary btn-sm" id="btnGuardar" onclick="guardarManual()" style="display:none;">
            <span class="material-icons">save</span>
            <span id="btnGuardarText">Guardar versión</span>
        </button>
        <button class="btn btn-ghost btn-sm" id="btnCancelar" onclick="cancelarEdicion()" style="display:none; color:rgba(255,255,255,.7);">
            Cancelar
        </button>
        <input type="file" id="inputArchivo" accept=".md,.html,.htm" style="display:none;">
    </div>

    <div class="manual-layout">

        <!-- Índice lateral (desktop) -->
        <nav class="manual-toc" id="manualToc">
            <div class="manual-toc__title">Contenido</div>
            <div id="tocLinks">
                <div class="state-loading" style="padding:8px 0;">
                    <div class="spinner spinner-sm"></div>
                </div>
            </div>
        </nav>

        <!-- Contenido del manual -->
        <div>
            <!-- Textarea de edición (oculto por defecto) -->
            <textarea id="editorTextarea" placeholder="Escribí el contenido del manual en HTML..."></textarea>

            <!-- Contenido renderizado -->
            <div class="manual-content" id="manualContent">
                <div class="state-loading" style="grid-column:1/-1;">
                    <div class="spinner"></div>
                    <span>Cargando manual...</span>
                </div>
            </div>
        </div>

    </div>

</main>

<!-- ── BOTÓN FLOTANTE (solo móvil) ──────────────────────────── -->
<button class="toc-fab" id="tocFab" onclick="abrirTocModal()" title="Ver índice">
    <span class="material-icons">toc</span>
</button>

<!-- ── PANEL MODAL DEL ÍNDICE (móvil) ───────────────────────── -->
<div class="toc-modal-overlay" id="tocModalOverlay" onclick="cerrarTocModal(event)">
    <div class="toc-modal-panel" onclick="event.stopPropagation()">
        <div class="toc-modal-header">
            <strong>📋 Contenido del manual</strong>
            <button onclick="cerrarTocModal()">
                <span class="material-icons">close</span>
            </button>
        </div>
        <div class="toc-modal-links" id="tocModalLinks">
            <!-- Se llena dinámicamente igual que el índice desktop -->
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="utils.js"></script>
<script>
(async () => {
    // ── Auth — accesible para admin y user ───────────────────
    const { user, userData } = await CVC.verificarAuth(['admin', 'user']);
    document.getElementById('userName').textContent = userData.nombre || user.email;
    CVC.renderNav('manual-sistema.html', userData.rol);
    CVC.initAyuda('manual-sistema.html');

    const db      = CVC.db;
    const esAdmin = userData.rol === 'admin';

    if (esAdmin) {
        document.getElementById('editorBar').style.display = 'flex';
    }

    let contenidoActual = '';

    // ── PARSER DE CÉLULAS DE AYUDA CONTEXTUAL ────────────────

    async function parsearYGuardarCelulas(htmlManual, autorNombre) {
        var RE_CELULA = /<!--\s*celula:\s*([\s\S]*?)-->([\s\S]*?)<!--\s*\/celula\s*-->/gi;
        var celulas = {};
        var match;

        while ((match = RE_CELULA.exec(htmlManual)) !== null) {
            var headerRaw = match[1];
            var contenido = match[2].trim();
            var attrs = parsearAtributosCelula(headerRaw);
            var id = headerRaw.split('\n')[0].trim();

            if (!id || !attrs.titulo || !attrs.resumen) {
                console.warn('[celulas] Célula incompleta ignorada:', id || '(sin id)');
                continue;
            }

            celulas[id] = {
                titulo:    attrs.titulo.trim(),
                resumen:   attrs.resumen.trim(),
                contenido: limpiarHtmlCelula(contenido),
                paginas:   (attrs.paginas || '').split(',').map(function(p) { return p.trim(); }).filter(Boolean),
                boton:     attrs.boton ? attrs.boton.trim() : null,
                actualizadoEn:  firebase.firestore.FieldValue.serverTimestamp(),
                actualizadoPor: autorNombre
            };
        }

        var ids = Object.keys(celulas);

        if (ids.length === 0) {
            console.info('[celulas] No se encontraron células en el manual.');
            return { ok: true, cantidad: 0, ids: [] };
        }

        try {
            var docRef = db.collection('config').doc('ayuda');
            var update = {
                ultimaActualizacion: firebase.firestore.FieldValue.serverTimestamp(),
                actualizadoPor: autorNombre
            };
            ids.forEach(function(id) {
                update['celulas.' + id] = celulas[id];
            });
            await docRef.set(update, { merge: true });
            console.info('[celulas] Guardadas ' + ids.length + ' células:', ids);
            return { ok: true, cantidad: ids.length, ids: ids };
        } catch (e) {
            console.error('[celulas] Error al guardar en Firestore:', e.message);
            return { ok: false, cantidad: 0, ids: [], error: e.message };
        }
    }

    function parsearAtributosCelula(headerRaw) {
        var attrs  = {};
        var lineas = headerRaw.split('\n');
        for (var i = 1; i < lineas.length; i++) {
            var linea = lineas[i].trim();
            if (!linea) continue;
            var sep   = linea.indexOf(':');
            if (sep === -1) continue;
            var clave = linea.substring(0, sep).trim().toLowerCase();
            var valor = linea.substring(sep + 1).trim();
            attrs[clave] = valor;
        }
        return attrs;
    }

    function limpiarHtmlCelula(html) {
        if (!html) return '';
        if (html.indexOf('<') === -1) return html.trim();
        return html
            .replace(/<br\s*\/?>/gi, '\n')
            .replace(/<\/p>/gi, '\n')
            .replace(/<\/li>/gi, '\n')
            .replace(/<\/h[1-6]>/gi, '\n')
            .replace(/<li>/gi, '• ')
            .replace(/<[^>]+>/g, '')
            .replace(/&amp;/g,  '&')
            .replace(/&lt;/g,   '<')
            .replace(/&gt;/g,   '>')
            .replace(/&quot;/g, '"')
            .replace(/&#39;/g,  "'")
            .replace(/\n{3,}/g, '\n\n')
            .trim();
    }

    // ── Cargar manual desde Firestore ────────────────────────
    async function cargarManual() {
        try {
            const docSnap = await db.collection('config').doc('manual').get();
            if (docSnap.exists && docSnap.data().contenidoHtml) {
                contenidoActual = docSnap.data().contenidoHtml;
                renderManual(contenidoActual, docSnap.data());
            } else {
                contenidoActual = CONTENIDO_INICIAL;
                renderManual(contenidoActual, null);
                if (esAdmin) await guardarEnFirestore(contenidoActual);
            }
        } catch(e) {
            document.getElementById('manualContent').innerHTML =
                '<div class="alert alert-error"><span class="material-icons">error</span>Error al cargar el manual: ' + CVC.escapeHtml(e.message) + '</div>';
        }
    }

    function renderManual(html, meta) {
        document.getElementById('manualContent').innerHTML = html;

        if (meta && meta.actualizadoEn) {
            const fecha = meta.actualizadoEn.toDate().toLocaleDateString('es-AR');
            const autor = meta.actualizadoPor || '—';
            const metaEl = document.createElement('div');
            metaEl.className = 'manual-meta';
            metaEl.innerHTML =
                '<span><span class="material-icons">update</span>Actualizado: ' + fecha + '</span>' +
                '<span><span class="material-icons">person</span>Por: ' + CVC.escapeHtml(autor) + '</span>' +
                (meta.version ? '<span><span class="material-icons">bookmark</span>' + CVC.escapeHtml(meta.version) + '</span>' : '');
            const content = document.getElementById('manualContent');
            content.insertBefore(metaEl, content.firstChild);
        }

        construirIndice();
    }

    // ── Índice de navegación ─────────────────────────────────
    function construirIndice() {
        const headings = document.querySelectorAll('#manualContent h2, #manualContent h3');
        const linksEl  = document.getElementById('tocLinks');
        const modalEl  = document.getElementById('tocModalLinks');
        linksEl.innerHTML  = '';
        modalEl.innerHTML  = '';

        headings.forEach(function(h, i) {
            if (!h.id) h.id = 'sec-' + i;
            const esH3    = h.tagName === 'H3';
            const clase   = esH3 ? 'nivel-2' : '';
            const icono   = esH3 ? 'subdirectory_arrow_right' : 'article';

            const aDesktop = document.createElement('a');
            aDesktop.href      = '#' + h.id;
            aDesktop.className = clase;
            aDesktop.textContent = h.textContent;
            aDesktop.addEventListener('click', function(ev) {
                ev.preventDefault();
                navegarA(h.id);
            });
            linksEl.appendChild(aDesktop);

            const aModal = document.createElement('a');
            aModal.href      = '#' + h.id;
            aModal.className = clase;
            aModal.innerHTML = '<span class="material-icons">' + icono + '</span>' + h.textContent;
            aModal.addEventListener('click', function(ev) {
                ev.preventDefault();
                navegarYCerrar(h.id);
            });
            modalEl.appendChild(aModal);
        });
    }

    function navegarA(id) {
        const target = document.getElementById(id);
        if (!target) return;
        const offset = window.innerWidth <= 900 ? 70 : 115;
        const top    = target.getBoundingClientRect().top + window.scrollY - offset;
        window.scrollTo({ top: top, behavior: 'smooth' });
    }

    window.navegarYCerrar = function(id) {
        cerrarTocModal();
        setTimeout(function() { navegarA(id); }, 180);
    };

    window.abrirTocModal = function() {
        document.getElementById('tocModalOverlay').classList.add('open');
        document.body.style.overflow = 'hidden';
    };

    window.cerrarTocModal = function(e) {
        if (e && e.target !== document.getElementById('tocModalOverlay')) return;
        document.getElementById('tocModalOverlay').classList.remove('open');
        document.body.style.overflow = '';
    };

    // ── Subir archivo .md o .html ────────────────────────────
    document.getElementById('inputArchivo').addEventListener('change', function(ev) {
        var file = ev.target.files[0];
        if (!file) return;

        var reader = new FileReader();
        reader.onload = function(e) {
            var texto    = e.target.result;
            var esMarkdown = file.name.toLowerCase().endsWith('.md');
            var htmlConvertido = esMarkdown ? marked.parse(texto) : texto;

            // Mostrar preview en el textarea para revisión
            document.getElementById('editorTextarea').value   = htmlConvertido;
            document.getElementById('editorTextarea').style.display = 'block';
            document.getElementById('manualContent').style.display  = 'none';
            document.getElementById('manualToc').style.display      = 'none';
            document.getElementById('btnEditar').style.display      = 'none';
            document.getElementById('btnSubir').style.display       = 'none';
            document.getElementById('btnGuardar').style.display     = 'inline-flex';
            document.getElementById('btnCancelar').style.display    = 'inline-flex';
            document.getElementById('btnGuardarText').textContent   = 'Guardar manual y actualizar ayuda (?)';
            document.getElementById('editorStatus').textContent     = '📄 ' + file.name + ' listo para guardar';
        };
        reader.readAsText(file, 'UTF-8');
        // Limpiar el input para permitir subir el mismo archivo de nuevo
        ev.target.value = '';
    });

    // ── Editor HTML directo ──────────────────────────────────
    window.activarEditor = function() {
        document.getElementById('tocModalOverlay').classList.remove('open');
        document.body.style.overflow = '';
        document.getElementById('editorTextarea').value             = contenidoActual;
        document.getElementById('editorTextarea').style.display     = 'block';
        document.getElementById('manualContent').style.display      = 'none';
        document.getElementById('manualToc').style.display          = 'none';
        document.getElementById('btnEditar').style.display          = 'none';
        document.getElementById('btnSubir').style.display           = 'none';
        document.getElementById('btnGuardar').style.display         = 'inline-flex';
        document.getElementById('btnCancelar').style.display        = 'inline-flex';
        document.getElementById('btnGuardarText').textContent       = 'Guardar versión';
        document.getElementById('editorStatus').textContent         = '✏️ Editando HTML directo...';
    };

    window.cancelarEdicion = function() {
        document.getElementById('editorTextarea').style.display     = 'none';
        document.getElementById('manualContent').style.display      = 'block';
        document.getElementById('manualToc').style.display          = 'block';
        document.getElementById('btnEditar').style.display          = 'inline-flex';
        document.getElementById('btnSubir').style.display           = 'inline-flex';
        document.getElementById('btnGuardar').style.display         = 'none';
        document.getElementById('btnCancelar').style.display        = 'none';
        document.getElementById('editorStatus').textContent         = 'Modo lectura';
        document.getElementById('tocModalOverlay').classList.remove('open');
        document.body.style.overflow = '';
    };

    // ── Guardar manual + parsear células ─────────────────────
    window.guardarManual = async function() {
        const nuevoContenido = document.getElementById('editorTextarea').value.trim();
        if (!nuevoContenido) { CVC.showToast('El manual no puede estar vacío.', 'error'); return; }

        const btn  = document.getElementById('btnGuardar');
        const text = document.getElementById('btnGuardarText');
        btn.disabled = true; text.textContent = 'Guardando...';

        try {
            await guardarEnFirestore(nuevoContenido);
            contenidoActual = nuevoContenido;
            renderManual(nuevoContenido, {
                actualizadoEn: { toDate: function() { return new Date(); } },
                actualizadoPor: userData.nombre || user.email,
                version: new Date().toLocaleDateString('es-AR', { month: 'long', year: 'numeric' })
            });
            cancelarEdicion();

            // Parsear y guardar células de ayuda contextual
            const resultadoCelulas = await parsearYGuardarCelulas(nuevoContenido, userData.nombre || user.email);
            if (resultadoCelulas.ok && resultadoCelulas.cantidad > 0) {
                CVC.showToast('Manual guardado · ' + resultadoCelulas.cantidad + ' células de ayuda actualizadas.', 'success');
            } else {
                CVC.showToast('Manual guardado correctamente.', 'success');
            }
        } catch(e) {
            CVC.showToast('Error al guardar: ' + e.message, 'error');
        } finally {
            btn.disabled = false; text.textContent = 'Guardar versión';
        }
    };

    async function guardarEnFirestore(html) {
        await db.collection('config').doc('manual').set({
            contenidoHtml:  html,
            version:        new Date().toLocaleDateString('es-AR', { month: 'long', year: 'numeric' }),
            actualizadoEn:  firebase.firestore.FieldValue.serverTimestamp(),
            actualizadoPor: userData.nombre || user.email
        });
    }

    // ── Init ──────────────────────────────────────────────────
    await cargarManual();

    // ── CONTENIDO INICIAL ─────────────────────────────────────
    const CONTENIDO_INICIAL = '<h1>Manual del sistema · Casa Verde Canas</h1><p>Cargando contenido inicial...</p>';

})();
</script>
</body>
</html>
