<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual del sistema · Casa Verde Canas</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        /* ── Layout de dos paneles ───────────────────────────── */
        .manual-layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: var(--space-6);
            align-items: start;
        }
        @media (max-width: 768px) {
            .manual-layout { grid-template-columns: 1fr; }
            .manual-toc    { display: none; }
        }

        /* ── Índice lateral ──────────────────────────────────── */
        .manual-toc {
            position: sticky;
            top: var(--space-4);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            font-size: var(--text-xs);
        }
        .manual-toc__title {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--color-text-muted);
            margin-bottom: var(--space-3);
        }
        .manual-toc a {
            display: block;
            color: var(--color-text-secondary);
            text-decoration: none;
            padding: 3px 0;
            border-left: 2px solid transparent;
            padding-left: var(--space-2);
            transition: all var(--transition-fast);
        }
        .manual-toc a:hover,
        .manual-toc a.active {
            color: var(--color-primary);
            border-left-color: var(--color-primary);
        }
        .manual-toc a.nivel-2 { padding-left: var(--space-4); font-size: 11px; }

        /* ── Contenido del manual ────────────────────────────── */
        .manual-content {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-6) var(--space-8);
            line-height: 1.8;
        }
        @media (max-width: 600px) {
            .manual-content { padding: var(--space-4); }
        }

        /* Tipografía del manual */
        .manual-content h1 {
            font-size: var(--text-2xl);
            font-weight: 800;
            color: var(--color-primary-dark);
            margin-bottom: var(--space-2);
            padding-bottom: var(--space-3);
            border-bottom: 2px solid var(--color-primary-light);
        }
        .manual-content h2 {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--color-primary);
            margin-top: var(--space-8);
            margin-bottom: var(--space-3);
            padding-bottom: var(--space-2);
            border-bottom: 1px solid var(--color-border);
            scroll-margin-top: 80px;
        }
        .manual-content h3 {
            font-size: var(--text-md);
            font-weight: 700;
            color: var(--color-text-primary);
            margin-top: var(--space-5);
            margin-bottom: var(--space-2);
            scroll-margin-top: 80px;
        }
        .manual-content h4 {
            font-size: var(--text-sm);
            font-weight: 700;
            color: var(--color-text-secondary);
            margin-top: var(--space-4);
            margin-bottom: var(--space-1);
            text-transform: uppercase;
            letter-spacing: .05em;
        }
        .manual-content p  { margin-bottom: var(--space-3); color: var(--color-text-secondary); }
        .manual-content ul,
        .manual-content ol { margin: var(--space-3) 0 var(--space-3) var(--space-5); }
        .manual-content li { margin-bottom: var(--space-1); color: var(--color-text-secondary); }
        .manual-content strong { color: var(--color-text-primary); }
        .manual-content code {
            background: var(--color-surface-2);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            padding: 1px 6px;
            font-family: var(--font-mono);
            font-size: .9em;
            color: var(--color-primary-dark);
        }
        .manual-content pre {
            background: var(--color-surface-2);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            overflow-x: auto;
            margin: var(--space-4) 0;
        }
        .manual-content pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: var(--text-xs);
            line-height: 1.7;
        }
        .manual-content table {
            width: 100%;
            border-collapse: collapse;
            margin: var(--space-4) 0;
            font-size: var(--text-sm);
        }
        .manual-content th {
            background: var(--color-primary-xlight);
            color: var(--color-primary-dark);
            font-weight: 700;
            text-align: left;
            padding: var(--space-2) var(--space-3);
            border: 1px solid var(--color-border);
        }
        .manual-content td {
            padding: var(--space-2) var(--space-3);
            border: 1px solid var(--color-border);
            color: var(--color-text-secondary);
            vertical-align: top;
        }
        .manual-content tr:nth-child(even) td { background: var(--color-surface-2); }

        /* Semáforo visual */
        .semaforo { display: flex; gap: var(--space-3); flex-wrap: wrap; margin: var(--space-3) 0; }
        .semaforo-item {
            display: flex; align-items: center; gap: var(--space-2);
            font-size: var(--text-sm); font-weight: 600;
        }
        .dot {
            width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
        }

        /* Flujo de pasos */
        .flujo {
            background: var(--color-surface-2);
            border-left: 4px solid var(--color-primary);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            padding: var(--space-4);
            margin: var(--space-4) 0;
            font-size: var(--text-sm);
        }
        .flujo ol { margin-left: var(--space-4); }
        .flujo li { margin-bottom: var(--space-2); }

        /* Alerta info dentro del manual */
        .manual-note {
            background: var(--color-info-bg);
            border: 1px solid var(--color-info-light);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            margin: var(--space-4) 0;
            font-size: var(--text-sm);
            color: var(--color-info);
            display: flex;
            gap: var(--space-2);
            align-items: flex-start;
        }
        .manual-note .material-icons { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

        .manual-warning {
            background: var(--color-warning-bg);
            border: 1px solid rgba(224,123,0,.2);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            margin: var(--space-4) 0;
            font-size: var(--text-sm);
            color: var(--color-warning);
            display: flex;
            gap: var(--space-2);
            align-items: flex-start;
        }
        .manual-warning .material-icons { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

        /* ── Editor (solo admin) ─────────────────────────────── */
        .editor-bar {
            background: var(--color-primary-dark);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            margin-bottom: var(--space-4);
            display: flex;
            align-items: center;
            gap: var(--space-3);
            flex-wrap: wrap;
        }
        .editor-bar span { color: rgba(255,255,255,.7); font-size: var(--text-xs); flex: 1; }

        #editorTextarea {
            width: 100%;
            min-height: 600px;
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            line-height: 1.7;
            padding: var(--space-4);
            border: 1.5px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-surface-2);
            color: var(--color-text-primary);
            resize: vertical;
            display: none;
        }

        /* ── Versión y fecha ─────────────────────────────────── */
        .manual-meta {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            margin-bottom: var(--space-5);
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }
        .manual-meta span { display: flex; align-items: center; gap: 4px; }
        .manual-meta .material-icons { font-size: 13px; }
    </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────── -->
<header class="admin-header">
    <div class="admin-header__brand">
        <span class="material-icons">cottage</span>
        Casa Verde Canas
    </div>
    <div class="admin-header__actions">
        <div class="user-chip">
            <span class="material-icons">person</span>
            <span id="userName">—</span>
        </div>
        <button class="btn-logout" onclick="CVC.cerrarSesion()">
            <span class="material-icons">logout</span>
            Salir
        </button>
    </div>
</header>

<!-- ── NAVEGACIÓN ──────────────────────────────────────────── -->
<nav class="admin-nav" id="appNav"></nav>

<!-- ── CONTENIDO ───────────────────────────────────────────── -->
<main class="admin-content">

    <!-- Barra de admin (solo visible para admins) -->
    <div id="editorBar" class="editor-bar" style="display:none;">
        <span class="material-icons" style="color:rgba(255,255,255,.7); font-size:18px;">edit</span>
        <span id="editorStatus">Modo lectura</span>
        <button class="btn btn-secondary btn-sm" id="btnEditar" onclick="activarEditor()">
            <span class="material-icons">edit</span> Editar manual
        </button>
        <button class="btn btn-primary btn-sm" id="btnGuardar" onclick="guardarManual()" style="display:none;">
            <span class="material-icons">save</span>
            <span id="btnGuardarText">Guardar versión</span>
        </button>
        <button class="btn btn-ghost btn-sm" id="btnCancelar" onclick="cancelarEdicion()" style="display:none; color:rgba(255,255,255,.7);">
            Cancelar
        </button>
    </div>

    <div class="manual-layout">

        <!-- Índice lateral -->
        <nav class="manual-toc" id="manualToc">
            <div class="manual-toc__title">Contenido</div>
            <div id="tocLinks">
                <div class="state-loading" style="padding:8px 0;">
                    <div class="spinner spinner-sm"></div>
                </div>
            </div>
        </nav>

        <!-- Contenido del manual -->
        <div>
            <!-- Textarea de edición (oculto por defecto) -->
            <textarea id="editorTextarea" placeholder="Escribí el contenido del manual en HTML..."></textarea>

            <!-- Contenido renderizado -->
            <div class="manual-content" id="manualContent">
                <div class="state-loading" style="grid-column:1/-1;">
                    <div class="spinner"></div>
                    <span>Cargando manual...</span>
                </div>
            </div>
        </div>

    </div>

</main>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="utils.js"></script>
<script>
(async () => {
    // ── Auth — accesible para admin y user ───────────────────
    const { user, userData } = await CVC.verificarAuth(['admin', 'user']);
    document.getElementById('userName').textContent = userData.nombre || user.email;
    CVC.renderNav('manual-sistema.html', userData.rol);

    const db      = CVC.db;
    const esAdmin = userData.rol === 'admin';

    // Mostrar barra de edición solo para admin
    if (esAdmin) {
        document.getElementById('editorBar').style.display = 'flex';
    }

    // ── Cargar manual desde Firestore ────────────────────────
    //    El manual se guarda en config/manual como un doc con:
    //    { contenidoHtml: '...', version: 'Mayo 2026', actualizadoEn: Timestamp, actualizadoPor: '...' }
    let contenidoActual = '';

    async function cargarManual() {
        try {
            const docSnap = await db.collection('config').doc('manual').get();
            if (docSnap.exists && docSnap.data().contenidoHtml) {
                contenidoActual = docSnap.data().contenidoHtml;
                const meta = docSnap.data();
                renderManual(contenidoActual, meta);
            } else {
                // Primera vez — mostrar contenido inicial hardcodeado
                contenidoActual = CONTENIDO_INICIAL;
                renderManual(contenidoActual, null);
                // Si es admin, guardar el inicial automáticamente
                if (esAdmin) await guardarEnFirestore(contenidoActual);
            }
        } catch(e) {
            document.getElementById('manualContent').innerHTML =
                `<div class="alert alert-error"><span class="material-icons">error</span>Error al cargar el manual: ${e.message}</div>`;
        }
    }

    function renderManual(html, meta) {
        document.getElementById('manualContent').innerHTML = html;

        // Meta info de versión
        if (meta?.actualizadoEn) {
            const fecha = meta.actualizadoEn.toDate().toLocaleDateString('es-AR');
            const autor = meta.actualizadoPor || '—';
            const metaEl = document.createElement('div');
            metaEl.className = 'manual-meta';
            metaEl.innerHTML = `
                <span><span class="material-icons">update</span>Actualizado: ${fecha}</span>
                <span><span class="material-icons">person</span>Por: ${CVC.escapeHtml(autor)}</span>
                ${meta.version ? `<span><span class="material-icons">bookmark</span>${CVC.escapeHtml(meta.version)}</span>` : ''}`;
            document.getElementById('manualContent').prepend(metaEl);
        }

        // Generar índice desde los h2 y h3 del contenido
        generarIndice();

        // Scroll suave para links del índice
        document.querySelectorAll('.manual-toc a').forEach(a => {
            a.addEventListener('click', e => {
                e.preventDefault();
                const target = document.querySelector(a.getAttribute('href'));
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        });
    }

    function generarIndice() {
        const headings = document.querySelectorAll('#manualContent h2, #manualContent h3');
        if (!headings.length) { document.getElementById('manualToc').style.display = 'none'; return; }

        let html = '';
        headings.forEach((h, i) => {
            if (!h.id) h.id = 'sec-' + i;
            const nivel = h.tagName === 'H2' ? '' : ' nivel-2';
            html += `<a href="#${h.id}" class="${nivel}">${h.textContent}</a>`;
        });
        document.getElementById('tocLinks').innerHTML = html;
    }

    // ── Editor (solo admin) ───────────────────────────────────
    window.activarEditor = function() {
        document.getElementById('editorTextarea').value   = contenidoActual;
        document.getElementById('editorTextarea').style.display = 'block';
        document.getElementById('manualContent').style.display  = 'none';
        document.getElementById('manualToc').style.display      = 'none';
        document.getElementById('btnEditar').style.display      = 'none';
        document.getElementById('btnGuardar').style.display     = 'inline-flex';
        document.getElementById('btnCancelar').style.display    = 'inline-flex';
        document.getElementById('editorStatus').textContent     = '✏️ Editando...';
    };

    window.cancelarEdicion = function() {
        document.getElementById('editorTextarea').style.display = 'none';
        document.getElementById('manualContent').style.display  = 'block';
        document.getElementById('manualToc').style.display      = 'block';
        document.getElementById('btnEditar').style.display      = 'inline-flex';
        document.getElementById('btnGuardar').style.display     = 'none';
        document.getElementById('btnCancelar').style.display    = 'none';
        document.getElementById('editorStatus').textContent     = 'Modo lectura';
    };

    window.guardarManual = async function() {
        const nuevoContenido = document.getElementById('editorTextarea').value.trim();
        if (!nuevoContenido) { CVC.showToast('El manual no puede estar vacío.', 'error'); return; }

        const btn  = document.getElementById('btnGuardar');
        const text = document.getElementById('btnGuardarText');
        btn.disabled = true; text.textContent = 'Guardando...';

        try {
            await guardarEnFirestore(nuevoContenido);
            contenidoActual = nuevoContenido;
            renderManual(nuevoContenido, {
                actualizadoEn: { toDate: () => new Date() },
                actualizadoPor: userData.nombre || user.email,
                version: new Date().toLocaleDateString('es-AR', { month: 'long', year: 'numeric' })
            });
            cancelarEdicion();
            CVC.showToast('Manual actualizado correctamente.', 'success');
        } catch(e) {
            CVC.showToast('Error al guardar: ' + e.message, 'error');
        } finally {
            btn.disabled = false; text.textContent = 'Guardar versión';
        }
    };

    async function guardarEnFirestore(html) {
        await db.collection('config').doc('manual').set({
            contenidoHtml:  html,
            version:        new Date().toLocaleDateString('es-AR', { month: 'long', year: 'numeric' }),
            actualizadoEn:  firebase.firestore.FieldValue.serverTimestamp(),
            actualizadoPor: userData.nombre || user.email
        });
    }

    // ── Init ──────────────────────────────────────────────────
    await cargarManual();


    // ── CONTENIDO INICIAL DEL MANUAL ─────────────────────────
    //    Se guarda en Firestore en el primer acceso.
    //    A partir de ahí, el admin lo edita desde esta pantalla.
    const CONTENIDO_INICIAL = `
<h1>Manual del sistema · Casa Verde Canas</h1>

<h2 id="intro">¿Para qué sirve este sistema?</h2>
<p>Este es el panel de administración del complejo <strong>Casa Verde Canas</strong>. Desde acá manejamos todo: reservas, presupuestos, pagos, tareas de limpieza, honorarios del personal y configuración de las cabañas.</p>
<p>Hay dos roles: <strong>Admin</strong> (acceso completo) y <strong>Colaborador</strong> (solo ve sus tareas y sus cobros).</p>

<div class="manual-note">
    <span class="material-icons">info</span>
    <span>Este manual está guardado en la base de datos. El admin puede editarlo y actualizarlo desde esta misma pantalla.</span>
</div>

<h2 id="modulos">Módulos del sistema</h2>

<table>
    <thead><tr><th>Módulo</th><th>Quién accede</th><th>Para qué sirve</th></tr></thead>
    <tbody>
        <tr><td><strong>Dashboard</strong></td><td>Admin</td><td>Vista general: KPIs, check-ins próximos, tareas urgentes</td></tr>
        <tr><td><strong>Reservas</strong></td><td>Admin</td><td>Gestión completa del ciclo de vida de cada reserva</td></tr>
        <tr><td><strong>Presupuestos</strong></td><td>Admin</td><td>Calcular precios y convertirlos en reservas confirmadas</td></tr>
        <tr><td><strong>Finanzas</strong></td><td>Admin y Colaborador</td><td>Ingresos, egresos y honorarios</td></tr>
        <tr><td><strong>Tareas</strong></td><td>Admin y Colaborador</td><td>Gestión del trabajo operativo y limpiezas</td></tr>
        <tr><td><strong>Calendario</strong></td><td>Admin</td><td>Vista mensual de ocupación + crear reservas rápidas</td></tr>
        <tr><td><strong>Cabañas</strong></td><td>Admin</td><td>Configuración de cabañas, tarifas y fotos</td></tr>
        <tr><td><strong>Clientes</strong></td><td>Admin</td><td>Directorio de contactos con historial de reservas</td></tr>
        <tr><td><strong>Usuarios</strong></td><td>Admin</td><td>Gestión de accesos y roles del personal</td></tr>
    </tbody>
</table>

<h2 id="reservas">Reservas</h2>

<h3 id="estados-reserva">Estados de una reserva</h3>
<table>
    <thead><tr><th>Estado</th><th>Bloquea calendario</th><th>Significado</th></tr></thead>
    <tbody>
        <tr><td><code>pendiente</code></td><td>No</td><td>Creada sin pago confirmado</td></tr>
        <tr><td><code>confirmada</code></td><td>Sí ✅</td><td>Pago registrado, reserva activa</td></tr>
        <tr><td><code>airbnb_activa</code></td><td>Sí ✅</td><td>Importada de Airbnb via Google Calendar</td></tr>
        <tr><td><code>airbnb_cancelada</code></td><td>No</td><td>Estaba en Airbnb pero fue cancelada</td></tr>
        <tr><td><code>finalizada</code></td><td>No</td><td>El huésped ya se fue</td></tr>
        <tr><td><code>anulada</code></td><td>No</td><td>Cancelada manualmente</td></tr>
    </tbody>
</table>

<h3 id="flujo-reserva">Flujo normal: Presupuesto → Reserva</h3>
<div class="flujo">
    <ol>
        <li>Cliente consulta → admin crea <strong>presupuesto</strong> en Presupuestos.</li>
        <li>Cliente acepta → admin hace clic en "Registrar pago y confirmar".</li>
        <li>El sistema crea la reserva, registra el pago y genera la tarea de limpieza automáticamente.</li>
        <li>El calendario público queda bloqueado para esas fechas de inmediato.</li>
        <li>Admin completa los datos del huésped en Reservas.</li>
    </ol>
</div>

<h3 id="flujo-airbnb">Flujo Airbnb</h3>
<div class="flujo">
    <ol>
        <li>Huésped reserva en Airbnb → Airbnb actualiza Google Calendar (puede demorar ~1 hora).</li>
        <li>Admin abre el Dashboard → el sistema sincroniza automáticamente.</li>
        <li>La reserva aparece como "Reserva Airbnb — completar" en el listado.</li>
        <li>Admin completa los datos del huésped.</li>
        <li>Si el huésped cancela en Airbnb → en la próxima sync la reserva se marca como cancelada y el calendario se libera.</li>
    </ol>
</div>

<h2 id="tareas">Tareas y limpiezas</h2>

<h3 id="semaforo">Semáforo de urgencia</h3>
<div class="semaforo">
    <div class="semaforo-item"><div class="dot" style="background:#bdc3bc;"></div> Gris — fecha futura, no corresponde aún</div>
    <div class="semaforo-item"><div class="dot" style="background:#2e7d32;"></div> Verde — es hoy o está en curso</div>
    <div class="semaforo-item"><div class="dot" style="background:#e07b00;"></div> Amarillo — atrasada pero dentro del ciclo</div>
    <div class="semaforo-item"><div class="dot" style="background:#c0392b;"></div> Rojo — muy atrasada, requiere atención inmediata</div>
</div>

<h3 id="flujo-limpieza">Flujo de una limpieza</h3>
<div class="flujo">
    <ol>
        <li>Al confirmar una reserva, el sistema crea la tarea de limpieza automáticamente con los datos del huésped.</li>
        <li>El día del checkout, la tarea aparece primera en la lista (tipo limpieza = prioridad absoluta).</li>
        <li>Colaborador presiona <strong>Iniciar</strong> → se registra la hora de inicio.</li>
        <li>Puede pausar y reanudar. Cada sesión queda registrada.</li>
        <li>Al terminar, admin presiona <strong>Finalizar</strong>.</li>
        <li>El sistema calcula las horas de cada colaborador y genera los honorarios proporcionales.</li>
        <li>La tarea se mueve al historial.</li>
    </ol>
</div>

<div class="manual-note">
    <span class="material-icons">info</span>
    <span>Si editás una reserva después de confirmada, la tarea de limpieza se actualiza automáticamente con los nuevos datos del huésped.</span>
</div>

<h2 id="finanzas">Finanzas</h2>

<h3 id="ingresos">Ingresos</h3>
<p>Cada pago de huésped se registra vinculado a una reserva. El sistema muestra el saldo en tiempo real (total − pagado). Se puede registrar en BRL, USD o ARS.</p>

<h3 id="honorarios">Honorarios</h3>
<p>Se generan automáticamente al finalizar una tarea con monto asignado. El admin los marca como pagados desde la pestaña Honorarios en Finanzas.</p>
<p>Los colaboradores ven solo sus propios honorarios desde el mismo módulo.</p>

<h2 id="cabanas">Configuración de cabañas</h2>
<p>Todo lo que aparece en el sitio público (fotos, precios, descripción, disponibilidad) se administra desde <strong>Cabañas</strong> en el panel.</p>

<h3 id="tarifas">Tarifas por temporada</h3>
<p>En la pestaña "Tarifas por temporada" podés definir períodos con precios especiales. Las fechas que no caen en ningún período usan el precio base de la cabaña. Los períodos no pueden superponerse.</p>

<h2 id="airbnb-sync">Sincronización con Airbnb</h2>
<p>El sistema lee las reservas de Airbnb a través de Google Calendar. Cada cabaña tiene un Google Calendar ID configurado en Cabañas → Google Calendar ID.</p>

<div class="manual-warning">
    <span class="material-icons">warning</span>
    <span>Para que la sincronización funcione, el calendario de cada cabaña en Google Calendar debe estar configurado como <strong>público</strong>. Si no hay eventos que importen, verificar los permisos del calendario en Google.</span>
</div>

<h2 id="reglas">Reglas importantes del sistema</h2>
<ul>
    <li>Solo las reservas <strong>confirmadas</strong> y <strong>airbnb_activa</strong> bloquean el calendario público. Las pendientes no.</li>
    <li>El sistema valida automáticamente que no haya superposición de fechas al confirmar o crear reservas.</li>
    <li>Nunca modificar directamente la colección <code>disponibilidad</code> en Firestore — se actualiza sola.</li>
    <li>Los honorarios se generan proporcionalmente al tiempo trabajado por cada colaborador.</li>
    <li>Si un colaborador tiene <code>activo: false</code> en Usuarios, no puede ingresar al sistema aunque tenga cuenta.</li>
</ul>
