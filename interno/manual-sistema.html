<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual del Sistema · Casa Verde Canas</title>
<link rel="stylesheet" href="design-system.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="utils.js"></script>
<style>
/* ── MANUAL STYLES ──────────────────────────────────────────────────────── */
.manual-wrap { max-width: 860px; margin: 0 auto; }

/* Módulo = sección principal (acordeón de primer nivel) */
.manual-modulo {
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    margin-bottom: var(--space-3);
    overflow: hidden;
    background: var(--color-surface);
}

.manual-modulo > summary {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-4) var(--space-5);
    cursor: pointer;
    font-weight: 700;
    font-size: var(--text-md);
    color: var(--color-text-primary);
    list-style: none;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: background var(--transition-fast);
}
.manual-modulo > summary::-webkit-details-marker { display: none; }
.manual-modulo > summary:hover { background: var(--color-surface-2); }
.manual-modulo[open] > summary {
    border-bottom-color: var(--color-border);
    background: var(--color-primary-xlight);
    color: var(--color-primary-dark);
}

.manual-modulo__icon {
    width: 36px; height: 36px;
    border-radius: var(--radius-md);
    background: var(--color-primary);
    color: white;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
}
.manual-modulo__icon .material-icons { font-size: 18px; }

.manual-modulo__chevron {
    margin-left: auto;
    font-size: 20px;
    color: var(--color-text-muted);
    transition: transform var(--transition-fast);
    flex-shrink: 0;
}
.manual-modulo[open] .manual-modulo__chevron { transform: rotate(180deg); }

/* Cuerpo del módulo */
.manual-body {
    padding: var(--space-5) var(--space-6);
}

/* Intro del módulo = texto siempre visible al abrir */
.manual-intro {
    font-size: var(--text-sm);
    line-height: 1.8;
    color: var(--color-text-secondary);
    margin-bottom: var(--space-4);
    padding-bottom: var(--space-4);
    border-bottom: 1px solid var(--color-border-light);
}

/* Sub-sección = acordeón de segundo nivel */
.manual-sub {
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    margin-bottom: var(--space-2);
    overflow: hidden;
}
.manual-sub > summary {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-3) var(--space-4);
    cursor: pointer;
    font-weight: 600;
    font-size: var(--text-sm);
    color: var(--color-primary);
    list-style: none;
    user-select: none;
    transition: background var(--transition-fast);
}
.manual-sub > summary::-webkit-details-marker { display: none; }
.manual-sub > summary:hover { background: var(--color-surface-2); }
.manual-sub[open] > summary { background: var(--color-surface-2); }
.manual-sub__body {
    padding: var(--space-4) var(--space-5);
    font-size: var(--text-sm);
    line-height: 1.8;
    color: var(--color-text-secondary);
    border-top: 1px solid var(--color-border-light);
}

/* Diagrama de flujo en texto */
.flujo {
    background: var(--color-surface-2);
    border-radius: var(--radius-md);
    padding: var(--space-4);
    margin: var(--space-3) 0;
    font-size: var(--text-sm);
}
.flujo-paso {
    display: flex;
    align-items: flex-start;
    gap: var(--space-3);
    padding: var(--space-2) 0;
}
.flujo-paso:not(:last-child)::after {
    content: '';
}
.flujo-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--color-primary);
    color: white;
    font-size: 11px;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
}
.flujo-flecha {
    color: var(--color-primary);
    font-weight: 700;
    padding-left: 38px;
    font-size: 18px;
    line-height: 1;
    display: block;
}
.flujo-paso__text { flex: 1; }
.flujo-paso__text strong { color: var(--color-text-primary); }
.flujo-paso__text em { color: var(--color-text-muted); font-style: normal; font-size: var(--text-xs); display: block; margin-top: 2px; }

/* Info box */
.info-box {
    display: flex;
    gap: var(--space-3);
    align-items: flex-start;
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-md);
    margin: var(--space-3) 0;
    font-size: var(--text-sm);
}
.info-box.tip     { background: var(--color-primary-xlight); border-left: 3px solid var(--color-primary); }
.info-box.warning { background: var(--color-warning-bg);     border-left: 3px solid var(--color-warning); color: #92400e; }
.info-box.danger  { background: var(--color-danger-bg);      border-left: 3px solid var(--color-danger);  color: #991b1b; }

/* Tabla compacta */
.manual-tabla { width: 100%; border-collapse: collapse; font-size: var(--text-sm); margin: var(--space-3) 0; }
.manual-tabla th { text-align: left; font-weight: 700; color: var(--color-text-muted); font-size: var(--text-xs); text-transform: uppercase; letter-spacing: .05em; padding: var(--space-2); border-bottom: 2px solid var(--color-border); }
.manual-tabla td { padding: var(--space-2); border-bottom: 1px solid var(--color-border-light); vertical-align: top; }
.manual-tabla tr:last-child td { border-bottom: none; }

/* Rol badge */
.rol-admin { background: var(--color-primary-xlight); color: var(--color-primary); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 99px; }
.rol-todos  { background: var(--color-success-bg);    color: var(--color-success);  font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 99px; }

/* Editor del manual (solo admin) */
.editor-bar {
    display: flex; gap: var(--space-2); align-items: center;
    padding: var(--space-3) var(--space-4);
    background: var(--color-surface-2);
    border-radius: var(--radius-md);
    margin-bottom: var(--space-4);
}
.editor-mode { display: none; }

@media (max-width: 640px) {
    .manual-body { padding: var(--space-4); }
    .manual-sub__body { padding: var(--space-3); }
}
</style>
</head>
<body>

<header class="admin-header">
    <div class="admin-header__brand">
        <span class="material-icons">cottage</span>
        Casa Verde Canas
    </div>
    <div class="admin-header__actions">
        <div class="user-chip">
            <span class="material-icons">person</span>
            <span id="userName">—</span>
        </div>
        <button class="btn-logout" onclick="CVC.cerrarSesion()">
            <span class="material-icons">logout</span>
            Salir
        </button>
    </div>
</header>

<nav class="admin-nav" id="appNav"></nav>

<main class="admin-content">
    <div class="manual-wrap">

        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--space-4); flex-wrap:wrap; gap:var(--space-3)">
            <div>
                <h1 style="font-size:var(--text-2xl); font-weight:800; margin:0">Manual del Sistema</h1>
                <p style="color:var(--color-text-muted); font-size:var(--text-sm); margin:4px 0 0">Casa Verde Canas · Panel Administrativo v4.2</p>
            </div>
            <div id="adminBar" style="display:none">
                <button class="btn btn-secondary btn-sm" onclick="toggleEditor()">
                    <span class="material-icons">edit</span> Editar contenido
                </button>
            </div>
        </div>

        <!-- Editor (solo admin, oculto por defecto) -->
        <div id="editorPanel" class="editor-mode">
            <div class="editor-bar">
                <span class="material-icons" style="color:var(--color-warning)">warning</span>
                <span style="font-size:var(--text-sm); font-weight:600">Modo edición — el contenido HTML se guarda en Firestore (config/manual)</span>
                <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="guardarManual()">
                    <span class="material-icons">save</span> Guardar
                </button>
                <button class="btn btn-ghost btn-sm" onclick="toggleEditor()">Cancelar</button>
            </div>
            <textarea id="editorHTML" class="form-control" rows="24"
                style="font-family:monospace; font-size:13px; resize:vertical"
                placeholder="Pega aquí el HTML del manual..."></textarea>
        </div>

        <!-- Contenido del manual -->
        <div id="manualContent">
            <div class="state-loading"><div class="spinner"></div><span>Cargando manual...</span></div>
        </div>

    </div>
</main>

<script>
(async function() {
    const { user, userData } = await CVC.verificarAuth(['admin', 'user']);
    document.getElementById('userName').textContent = userData.nombre || user.email;
    CVC.renderNav('manual-sistema.html', userData.rol);

    const db      = CVC.db;
    const esAdmin = userData.rol === 'admin';
    if (esAdmin) document.getElementById('adminBar').style.display = 'block';

    // ── Cargar contenido del manual ───────────────────────────────────────
    async function cargarManual() {
        const cont = document.getElementById('manualContent');
        try {
            const snap = await db.collection('config').doc('manual').get();
            if (snap.exists && snap.data().html) {
                cont.innerHTML = snap.data().html;
            } else {
                if (esAdmin) {
                    cont.innerHTML = '<div class="info-box warning"><span class="material-icons">warning</span>'
                        + '<span>El manual todavía no tiene contenido. Usá el botón "Editar contenido" para cargarlo.</span></div>';
                } else {
                    CVC.showEmpty(cont, 'Manual en construcción', 'Próximamente disponible.', 'menu_book');
                }
            }
        } catch(e) {
            CVC.showError(cont, 'Error al cargar el manual', e.message, cargarManual);
        }
    }

    // ── Guardar (solo admin) ──────────────────────────────────────────────
    window.guardarManual = async function() {
        const html = document.getElementById('editorHTML').value.trim();
        if (!html) { CVC.showToast('El contenido no puede estar vacío', 'warning'); return; }
        try {
            await db.collection('config').doc('manual').set({
                html,
                actualizadoEn: firebase.firestore.FieldValue.serverTimestamp(),
                actualizadoPor: user.uid
            });
            CVC.showToast('Manual guardado correctamente', 'success');
            document.getElementById('editorPanel').style.display = 'none';
            document.getElementById('editorHTML').value = '';
            await cargarManual();
        } catch(e) {
            CVC.showToast('Error al guardar: ' + e.message, 'error');
        }
    };

    // ── Toggle editor ─────────────────────────────────────────────────────
    window.toggleEditor = async function() {
        const panel = document.getElementById('editorPanel');
        const isOpen = panel.style.display === 'block';
        if (isOpen) {
            panel.style.display = 'none';
            document.getElementById('editorHTML').value = '';
        } else {
            // Cargar contenido actual en el textarea
            try {
                const snap = await db.collection('config').doc('manual').get();
                if (snap.exists && snap.data().html) {
                    document.getElementById('editorHTML').value = snap.data().html;
                }
            } catch(e) { /* vacío si no existe */ }
            panel.style.display = 'block';
            document.getElementById('editorHTML').scrollIntoView({ behavior: 'smooth' });
        }
    };

    await cargarManual();
})();
</script>
</body>
</html>
