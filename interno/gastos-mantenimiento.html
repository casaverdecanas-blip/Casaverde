<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gasto de mantenimiento · Casa Verde Canas</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        .gm-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            padding: var(--space-5);
            max-width: 560px;
            margin: 0 auto var(--space-5);
        }
        .gm-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2); margin-bottom: var(--space-4); }
        .gm-toggle button {
            border: 1.5px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text-secondary);
            border-radius: var(--radius-md);
            padding: var(--space-3);
            font-family: inherit; font-size: var(--text-sm); font-weight: 600;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: all .15s;
        }
        .gm-toggle button.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
        .gm-field { margin-bottom: var(--space-4); }
        .gm-field label { display: block; font-size: var(--text-xs); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--color-text-muted); margin-bottom: var(--space-2); }
        .gm-input {
            width: 100%; box-sizing: border-box; font-size: var(--text-base); font-family: inherit;
            padding: 10px var(--space-3); border: 1.5px solid var(--color-border);
            border-radius: var(--radius-md); background: var(--color-surface-2);
        }
        .gm-input:focus { outline: none; border-color: var(--color-primary); background: var(--color-surface); box-shadow: var(--shadow-focus); }
        .gm-upzone {
            border: 2px dashed var(--color-border); border-radius: var(--radius-md);
            padding: var(--space-6) var(--space-4); text-align: center; cursor: pointer;
            color: var(--color-text-muted); transition: all .15s; margin-bottom: var(--space-4);
        }
        .gm-upzone:hover { border-color: var(--color-primary); color: var(--color-primary); background: var(--color-primary-xlight); }
        .gm-upzone .material-icons { font-size: 40px; display: block; margin: 0 auto var(--space-2); }
        .gm-log { font-size: var(--text-xs); font-family: var(--font-mono); background: var(--color-surface-2); border-radius: var(--radius-sm); padding: var(--space-2) var(--space-3); margin-bottom: var(--space-3); display: none; }
        .gm-log.visible { display: block; }
        .gm-log .ok  { color: var(--color-success); }
        .gm-log .err { color: var(--color-danger); }
        .gm-preview { max-width: 100%; max-height: 220px; border-radius: var(--radius-md); margin-bottom: var(--space-3); display: none; }
        .gm-fuente { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2); margin-bottom: var(--space-3); }
        .gm-fuente button {
            border: 1.5px solid var(--color-border); background: var(--color-surface);
            color: var(--color-text-secondary); border-radius: var(--radius-md); padding: var(--space-3);
            font-family: inherit; font-size: var(--text-xs); font-weight: 600; cursor: pointer; text-align: left; line-height: 1.3;
            transition: all .15s;
        }
        .gm-fuente button.active { border-color: var(--color-primary); background: var(--color-primary-xlight); color: var(--color-primary-dark); }
        .gm-fuente button .t { display: block; font-size: var(--text-sm); }
        .gm-fuente button .s { display: block; font-size: 10px; color: var(--color-text-muted); margin-top: 2px; }
        .gm-error { display: none; background: var(--color-danger-bg); color: var(--color-danger); border: 1px solid var(--color-danger-light); font-size: var(--text-sm); padding: var(--space-3); border-radius: var(--radius-md); margin-bottom: var(--space-3); }
        .gm-recientes { max-width: 560px; margin: 0 auto; }
        .gm-row { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); margin-bottom: var(--space-2); }
        .gm-row .mono { font-family: var(--font-mono); font-weight: 700; color: var(--color-text-primary); }
        .gm-chip { font-size: 10px; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
        .gm-chip.reembolso { background: var(--color-warning-bg); color: var(--color-warning); }
        .gm-chip.cuenta { background: var(--color-info-bg); color: var(--color-info); }
        .hidden { display: none; }
    </style>
</head>
<body>
<header class="admin-header">
    <div class="admin-header__brand">
        <span class="material-icons">cottage</span>
        Casa Verde Canas
    </div>
    <div class="admin-header__actions">
        <div class="user-chip">
            <span class="material-icons">person</span>
            <span id="userName">—</span>
        </div>
        <button class="btn-logout" onclick="CVC.cerrarSesion()">
            <span class="material-icons">logout</span>
            Salir
        </button>
    </div>
</header>

<nav class="admin-nav" id="appNav"></nav>

<main class="admin-content">

    <div class="db-section-head" style="max-width:560px;margin:0 auto var(--space-4);">
        <div class="db-section-title">
            <span class="material-icons" style="color:var(--color-primary);">build</span>
            Registrar gasto de mantenimiento
        </div>
    </div>

    <div class="gm-card">
        <!-- Modo: Foto IA / Manual -->
        <div class="gm-toggle">
            <button id="btnModoFoto" class="active" onclick="setModo('foto')">
                <span class="material-icons" style="font-size:18px;">document_scanner</span> Con foto (IA)
            </button>
            <button id="btnModoManual" onclick="setModo('manual')">
                <span class="material-icons" style="font-size:18px;">edit</span> Manual
            </button>
        </div>

        <!-- Zona de foto -->
        <div id="seccionFoto">
            <div class="gm-upzone" id="upzone" onclick="CVC.elegirFuenteFoto(function(f){ procesarFoto(f); })">
                <span class="material-icons">add_a_photo</span>
                Tocá para sacar o subir la foto del comprobante
            </div>
            <input type="file" id="fotoInput" accept="image/*" class="hidden" onchange="procesarFoto(this.files[0])">
            <div class="gm-log" id="logBox"></div>
            <img id="preview" class="gm-preview" alt="comprobante">
        </div>

        <!-- Campos (compartidos foto/manual) -->
        <div id="campos">
            <div class="gm-error" id="errorBox"></div>

            <div class="gm-field">
                <label for="concepto">¿Qué compraste / arreglaste?</label>
                <input type="text" id="concepto" class="gm-input" placeholder="Ej: cambio de canilla Loft C3">
            </div>

            <div class="gm-field">
                <label for="monto">Monto (R$)</label>
                <input type="number" id="monto" class="gm-input" step="0.01" min="0" inputmode="decimal" placeholder="0,00">
            </div>

            <div class="gm-field">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" class="gm-input">
            </div>

            <div class="gm-field">
                <label for="categoria">Categoría</label>
                <select id="categoria" class="gm-input">
                    <option value="Mantenimiento">Mantenimiento</option>
                    <option value="Materiales">Materiales</option>
                    <option value="Servicios">Servicios</option>
                    <option value="Limpieza">Limpieza</option>
                    <option value="Transporte">Transporte</option>
                    <option value="Otros">Otros</option>
                </select>
            </div>

            <div class="gm-field">
                <label for="proveedor">Proveedor / comercio</label>
                <input type="text" id="proveedor" class="gm-input" placeholder="Ej: Atacadista, Ferretería…">
            </div>

            <div class="gm-field">
                <label for="referencia">Nº de comprobante (opcional)</label>
                <input type="text" id="referencia" class="gm-input" placeholder="Nº de factura / ticket">
            </div>

            <div class="gm-field">
                <label for="items">Detalle de la compra (ítems)</label>
                <textarea id="items" class="gm-input" style="min-height:90px;resize:vertical;" placeholder="Un ítem por línea. La foto lo completa solo."></textarea>
            </div>

            <!-- Fuente de los fondos -->
            <div class="gm-field">
                <label>¿Con qué dinero pagaste?</label>
                <div class="gm-fuente">
                    <button id="btnFuentePropio" class="active" onclick="setFuente('propio')">
                        <span class="t">Mis fondos</span>
                        <span class="s">Me lo reintegran</span>
                    </button>
                    <button id="btnFuenteCuenta" onclick="setFuente('cuenta')">
                        <span class="t">Cuenta del negocio</span>
                        <span class="s">Pagué con una cuenta</span>
                    </button>
                </div>
                <select id="cuentaSelect" class="gm-input hidden"></select>
            </div>

            <button class="btn btn-primary" id="btnGuardar" onclick="guardar()" style="width:100%;height:44px;">
                <span class="material-icons">save</span>
                <span id="btnGuardarTxt">Registrar gasto</span>
            </button>
        </div>
    </div>

    <!-- Mis gastos recientes -->
    <div class="gm-recientes">
        <div class="db-section-title" style="margin-bottom:var(--space-3);">
            <span class="material-icons" style="font-size:15px;">history</span> Mis gastos recientes
        </div>
        <div id="recientes">
            <div class="state-loading"><div class="spinner"></div><span>Cargando...</span></div>
        </div>
    </div>

</main>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="utils.js"></script>
<script>
(async function() {
    var auth = await CVC.verificarAuth(['admin', 'user']);
    var user = auth.user, userData = auth.userData;
    document.getElementById('userName').textContent = userData.nombre || user.email;
    CVC.renderNav('gastos-mantenimiento.html', userData.rol);
    if (typeof CVC.initAyuda === 'function') CVC.initAyuda('gastos-mantenimiento.html');

    var db = CVC.db;
    var escapeHtml = CVC.escapeHtml;
    var showToast  = CVC.showToast;

    var _modo   = 'foto';
    var _fuente = 'propio';
    var _fotoFile = null;
    var _cuentas  = [];

    document.getElementById('fecha').value = new Date().toISOString().split('T')[0];

    // -- Cuentas para el select (por si pagó con fondos del negocio) ----
    db.collection('cuentas').get().then(function(snap) {
        _cuentas = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
        var sel = document.getElementById('cuentaSelect');
        sel.innerHTML = '<option value="">Elegí la cuenta…</option>' + _cuentas.map(function(c) {
            return '<option value="' + c.id + '" data-nom="' + escapeHtml(c.nombre || c.id) + '" data-pais="' + (c.pais || 'BR') + '">' + escapeHtml(c.nombre || c.id) + '</option>';
        }).join('');
    }).catch(function() {});

    cargarRecientes();

    // -- Modo foto / manual ---------------------------------------------
    window.setModo = function(m) {
        _modo = m;
        document.getElementById('btnModoFoto').classList.toggle('active', m === 'foto');
        document.getElementById('btnModoManual').classList.toggle('active', m === 'manual');
        document.getElementById('seccionFoto').style.display = m === 'foto' ? 'block' : 'none';
    };

    // -- Fuente de fondos ------------------------------------------------
    window.setFuente = function(f) {
        _fuente = f;
        document.getElementById('btnFuentePropio').classList.toggle('active', f === 'propio');
        document.getElementById('btnFuenteCuenta').classList.toggle('active', f === 'cuenta');
        document.getElementById('cuentaSelect').classList.toggle('hidden', f !== 'cuenta');
    };

    var _itemsDetalle = [];
    function normalizeItems(arr) {
        if (!Array.isArray(arr)) return [];
        return arr.map(function(it) {
            if (typeof it === 'string') return { descripcion: it, cantidad: 1, precio: 0, categoria: '' };
            return {
                descripcion: (it.descripcion || it.description || it.nombre || it.item || '').toString(),
                cantidad: parseFloat(it.cantidad || it.qty || 1) || 1,
                precio: parseFloat(it.precio || it.price || it.valor || 0) || 0,
                categoria: (it.categoria || it.category || it.cat || '').toString().trim()
            };
        }).filter(function(x) { return x.descripcion; });
    }

    function consolidarValidar(ext) {
        var items = normalizeItems(ext.items);
        var mapa = {};
        items.forEach(function(it) {
            var k = it.descripcion.trim().toLowerCase();
            if (!mapa[k]) mapa[k] = { descripcion: it.descripcion, cantidad: 0, precio: 0, categoria: it.categoria || '' };
            mapa[k].cantidad += (it.cantidad || 1);
            mapa[k].precio += (it.precio || 0);
            if (!mapa[k].categoria && it.categoria) mapa[k].categoria = it.categoria;
        });
        var consol = Object.keys(mapa).map(function(k) { return mapa[k]; });
        ext.items = consol;
        var suma = consol.reduce(function(a, i) { return a + (i.precio || 0); }, 0);
        ext._sumaItems = suma;
        var total = ext.monto_total || 0;
        ext._descuadre = total > 0 && consol.length > 0 && Math.abs(suma - total) > Math.max(2, total * 0.05);
        return ext;
    }

    // Parser tolerante a JSON truncado (tickets largos)
    function parseFacturaIA(raw) {
        var bt = String.fromCharCode(96);
        var s = (raw || '').split(bt).join('').replace(/^\s*json/i, '').trim();
        var i = s.indexOf('{');
        if (i > 0) s = s.slice(i);
        try { return JSON.parse(s); } catch (e) {}
        var lb = s.lastIndexOf('}');
        if (lb > 0) { try { return JSON.parse(s.slice(0, lb + 1)); } catch (e) {} }
        var obj = {};
        function gs(k) { var m = s.match(new RegExp('"' + k + '"\\s*:\\s*"([^"]*)"')); return m ? m[1] : undefined; }
        function gn(k) { var m = s.match(new RegExp('"' + k + '"\\s*:\\s*([0-9]+(?:\\.[0-9]+)?)')); return m ? parseFloat(m[1]) : undefined; }
        obj.proveedor = gs('proveedor');
        obj.fecha = gs('fecha');
        obj.monto_total = gn('monto_total');
        obj.concepto = gs('concepto');
        obj.numero_factura = gs('numero_factura');
        obj.categoria_sugerida = gs('categoria_sugerida');
        var items = [];
        var re = /"descripcion"\s*:\s*"([^"]*)"(?:[^}]*?"cantidad"\s*:\s*([0-9]+(?:\.[0-9]+)?))?(?:[^}]*?"precio"\s*:\s*([0-9]+(?:\.[0-9]+)?))?/g;
        var mm;
        while ((mm = re.exec(s)) !== null) {
            items.push({ descripcion: mm[1], cantidad: mm[2] ? parseFloat(mm[2]) : 1, precio: mm[3] ? parseFloat(mm[3]) : 0 });
        }
        if (items.length) obj.items = items;
        obj._parcial = true;
        return obj;
    }

    // -- Redimensionar imagen (canvas) ----------------------------------
    function redimensionarImagen(file, maxLado, calidad) {
        return new Promise(function(resolve, reject) {
            var img = new Image();
            img.onload = function() {
                var w = img.width, h = img.height;
                if (w > h && w > maxLado) { h = Math.round(h * maxLado / w); w = maxLado; }
                else if (h >= w && h > maxLado) { w = Math.round(w * maxLado / h); h = maxLado; }
                var canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                canvas.toBlob(function(blob) { resolve(blob || file); }, 'image/jpeg', calidad);
            };
            img.onerror = function() { reject(new Error('No se pudo leer la imagen')); };
            img.src = URL.createObjectURL(file);
        });
    }

    function log(msg, cls) {
        var box = document.getElementById('logBox');
        box.classList.add('visible');
        box.innerHTML += '<div class="' + (cls || '') + '">' + escapeHtml(msg) + '</div>';
    }

    // -- Subida a Cloudinary (autocontenida, preset sin firma) ----------
    async function subirComprobante(file) {
        var fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', 'preset-comprobantes');
        fd.append('folder', 'gastos');
        var resp = await fetch('https://api.cloudinary.com/v1_1/dnwfu8ffn/image/upload', { method: 'POST', body: fd });
        if (!resp.ok) throw new Error('Cloudinary ' + resp.status);
        var data = await resp.json();
        return data.secure_url || data.url;
    }

    // -- Procesar foto con IA (mismo proxy que el admin) ----------------
    window.procesarFoto = async function(file) {
        if (!file) return;
        _fotoFile = file;
        document.getElementById('upzone').style.display = 'none';
        document.getElementById('logBox').innerHTML = '';
        log('Procesando imagen…');
        try {
            var blob = await redimensionarImagen(file, 2000, 0.85);
            _fotoFile = blob;
            var prev = document.getElementById('preview');
            prev.src = URL.createObjectURL(blob);
            prev.style.display = 'block';

            var b64 = await new Promise(function(res, rej) {
                var r = new FileReader();
                r.onload  = function() { res(r.result.split(',')[1]); };
                r.onerror = function() { rej(new Error('Error leyendo archivo')); };
                r.readAsDataURL(blob);
            });

            log('Enviando a la IA…', 'ok');
            var PROMPT = 'Sos un extractor de datos de facturas y recibos de compra en Brasil.' +
                ' Extrae todos los datos posibles del comprobante y responde UNICAMENTE con JSON valido, sin texto adicional ni markdown:' +
                ' {"proveedor":"","fecha":"YYYY-MM-DD","fecha_texto":"","monto_total":0,"moneda":"BRL","concepto":"",' +
                '"numero_factura":"","categoria_sugerida":"",' +
                '"items":[{"descripcion":"","cantidad":1,"precio":0,"categoria":""}]}.' +
                ' Numeros BRL (monto_total y precio): eliminar R$, puntos de miles, cambiar coma por punto. R$1.234,56 -> 1234.56.' +
                ' fecha: el comprobante es de Brasil o Uruguay y las fechas vienen dd/mm/aaaa (dia/mes/año); convertila a YYYY-MM-DD SIN invertir dia y mes. En las NFCe mira "Data de autorizacao" o "Data de emissao". El año casi siempre es el actual o reciente; NUNCA inventes años viejos.' +
                ' fecha_texto: copia textual de la fecha tal como figura en el comprobante (ej "09/06/2026"), para control.' +
                ' La lista tiene columnas: numero, codigo, descripcion, cantidad (Qt), unidad (Un), precio unitario (Vlr) y total del renglon (Tot); el precio figura DOS veces por linea.' +
                ' AGRUPA los productos IGUALES (misma descripcion) en UN SOLO item, sumando cantidades y totales. NO repitas ni inventes lineas: cada producto distinto aparece una sola vez.' +
                ' precio = suma del total (Tot) de ese producto, en reales. monto_total = Valor total de la factura (con descuentos).' +
                ' categoria de cada item: etiqueta corta del producto (ej: Tornilleria, Herramientas, Pintura, Plomeria, Electrico, Madera, Alimentos, Bebidas, Limpieza, Descartables, Otros).' +
                ' concepto: un resumen corto de la compra.' +
                ' categoria_sugerida: una de Mantenimiento, Materiales, Servicios, Limpieza, Transporte, Otros.';

            var resp = await fetch('https://serene-scone-76bd4e.netlify.app/.netlify/functions/claude-proxy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'gemini-2.5-flash',
                    max_tokens: 8000,
                    messages: [{
                        role: 'user',
                        content: [
                            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
                            { type: 'text', text: PROMPT }
                        ]
                    }]
                })
            });
            var data = await resp.json();
            if (!resp.ok) { log('Error del proxy: ' + (data.error || resp.status), 'err'); return; }
            var raw = data.content && data.content[0] ? data.content[0].text : '';

            var ext = parseFacturaIA(raw);
            if (!ext || (!ext.monto_total && !ext.concepto && !(ext.items && ext.items.length))) {
                log('No se pudo interpretar el comprobante. Completá a mano.', 'err');
                return;
            }
            ext = consolidarValidar(ext);

            if (ext.concepto)           document.getElementById('concepto').value   = ext.concepto;
            if (ext.monto_total)        document.getElementById('monto').value      = ext.monto_total;
            if (ext.fecha)              document.getElementById('fecha').value      = ext.fecha;
            (function() {
                var anioF = parseInt(String(ext.fecha || '').slice(0, 4), 10);
                var anioHoy = new Date().getFullYear();
                if (ext.fecha && (!anioF || anioF < anioHoy - 1 || anioF > anioHoy)) {
                    log('\u26a0\ufe0f Revisá la fecha leída: ' + ext.fecha + (ext.fecha_texto ? ' (en el ticket dice: ' + ext.fecha_texto + ')' : '') + '. Confirmala contra el comprobante.', 'err');
                }
            })();
            if (ext.categoria_sugerida) document.getElementById('categoria').value  = ext.categoria_sugerida;
            if (ext.proveedor)          document.getElementById('proveedor').value  = ext.proveedor;
            if (ext.numero_factura)     document.getElementById('referencia').value = ext.numero_factura;
            if (ext.items && ext.items.length) {
                document.getElementById('items').value = ext.items.map(function(it) {
                    if (typeof it === 'string') return it;
                    var p = [];
                    if (it.descripcion || it.description) p.push(it.descripcion || it.description);
                    if (it.cantidad && it.cantidad !== 1) p.push('x' + it.cantidad);
                    if (it.precio) p.push('R$ ' + it.precio);
                    return p.join(' - ');
                }).filter(Boolean).join('\n');
            }
            _itemsDetalle = normalizeItems(ext.items);
            log(ext._parcial ? 'Comprobante largo: extraje lo que pude, revisá los ítems.' : 'Datos extraídos. Revisalos antes de guardar.', ext._parcial ? 'err' : 'ok');
            if (ext._descuadre) log('Atención: los ítems suman R$' + ext._sumaItems.toFixed(2) + ' y el total es R$' + (ext.monto_total || 0).toFixed(2) + '. Revisá los ítems: pudo leer mal una lista larga.', 'err');
        } catch (e) {
            log('Error: ' + e.message, 'err');
        }
    };

    // -- Guardar ---------------------------------------------------------
    function mostrarError(msg) {
        var e = document.getElementById('errorBox');
        e.textContent = msg; e.style.display = 'block';
    }

    window.guardar = async function() {
        document.getElementById('errorBox').style.display = 'none';
        var concepto = document.getElementById('concepto').value.trim();
        var monto    = parseFloat(document.getElementById('monto').value);
        var fecha    = document.getElementById('fecha').value || new Date().toISOString().split('T')[0];
        var cat      = document.getElementById('categoria').value;

        if (!concepto) { mostrarError('Escribí qué compraste o arreglaste.'); return; }
        if (!monto || monto <= 0) { mostrarError('Ingresá un monto válido.'); return; }

        var cuentaId = '', cuentaNom = '', pais = 'BR';
        if (_fuente === 'cuenta') {
            var sel = document.getElementById('cuentaSelect');
            cuentaId = sel.value;
            if (!cuentaId) { mostrarError('Elegí la cuenta del negocio con la que pagaste.'); return; }
            var opt = sel.options[sel.selectedIndex];
            cuentaNom = opt ? (opt.dataset.nom || '') : '';
            pais = opt ? (opt.dataset.pais || 'BR') : 'BR';
        }

        var btn = document.getElementById('btnGuardar');
        var txt = document.getElementById('btnGuardarTxt');
        btn.disabled = true; txt.textContent = 'Guardando…';

        var proveedor  = document.getElementById('proveedor').value.trim();
        var items      = document.getElementById('items').value.trim();
        var referencia = document.getElementById('referencia').value.trim();

        try {
            var docData = {
                concepto: concepto,
                monto: monto,
                moneda: 'BRL',
                fecha: fecha,
                metodo: _fuente === 'propio' ? 'fondos_propios' : 'cuenta',
                circuito: null,
                deducible: false,
                proveedor: proveedor,
                categoria: cat,
                cuentaOrigenId: cuentaId,
                cuentaOrigenNom: cuentaNom,
                pais: pais,
                sinCuenta: _fuente === 'propio',
                items: items,
                itemsDetalle: _itemsDetalle,
                referenciaComprobante: referencia,
                notas: '',
                comprobanteUrl: null,
                origen: _modo === 'foto' ? 'mantenimiento_ia' : 'mantenimiento_manual',
                reembolso: _fuente === 'propio',
                reembolsoA: _fuente === 'propio' ? user.uid : null,
                reembolsoNombre: _fuente === 'propio' ? (userData.nombre || user.email) : null,
                creadoEn: firebase.firestore.FieldValue.serverTimestamp(),
                creadoPor: user.uid
            };

            var docRef = await db.collection('gastos').add(docData);

            if (_fotoFile) {
                txt.textContent = 'Subiendo foto…';
                try {
                    var url = await subirComprobante(_fotoFile);
                    await docRef.update({ comprobanteUrl: url });
                } catch (se) { console.warn('Foto:', se.message); }
            }

            // Si pagó con fondos propios -> generar reembolso a percibir
            if (_fuente === 'propio') {
                await db.collection('honorarios').add({
                    uid: user.uid,
                    nombre: userData.nombre || user.email,
                    tipo: 'reembolso',
                    concepto: 'Reembolso: ' + concepto,
                    monto: monto,
                    moneda: 'BRL',
                    horas: 0,
                    estado: 'pendiente',
                    gastoId: docRef.id,
                    creadoEn: firebase.firestore.FieldValue.serverTimestamp(),
                    creadoPor: user.uid
                });
            }

            showToast(_fuente === 'propio'
                ? 'Gasto registrado. El reembolso quedó en tus cobros a percibir.'
                : 'Gasto registrado con la cuenta del negocio.', 'success');

            // Reset
            document.getElementById('concepto').value = '';
            document.getElementById('monto').value = '';
            document.getElementById('proveedor').value = '';
            document.getElementById('items').value = '';
            document.getElementById('referencia').value = '';
            _itemsDetalle = [];
            document.getElementById('categoria').value = 'Mantenimiento';
            document.getElementById('preview').style.display = 'none';
            document.getElementById('logBox').classList.remove('visible');
            document.getElementById('logBox').innerHTML = '';
            document.getElementById('upzone').style.display = 'block';
            _fotoFile = null;
            setFuente('propio');
            cargarRecientes();

        } catch (e) {
            mostrarError('Error al guardar: ' + e.message);
        } finally {
            btn.disabled = false; txt.textContent = 'Registrar gasto';
        }
    };

    // -- Mis gastos recientes -------------------------------------------
    async function cargarRecientes() {
        var cont = document.getElementById('recientes');
        try {
            var snap = await db.collection('gastos').where('creadoPor', '==', user.uid).get();
            var lista = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); })
                .sort(function(a, b) {
                    var ta = a.creadoEn && a.creadoEn.toDate ? a.creadoEn.toDate().getTime() : 0;
                    var tb = b.creadoEn && b.creadoEn.toDate ? b.creadoEn.toDate().getTime() : 0;
                    return tb - ta;
                })
                .slice(0, 10);

            if (!lista.length) {
                cont.innerHTML = '<div style="text-align:center;color:var(--color-text-muted);font-size:var(--text-sm);padding:var(--space-4);">Todavía no registraste gastos.</div>';
                return;
            }
            cont.innerHTML = lista.map(function(g) {
                var fmt = 'R$ ' + (g.monto || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                var chip = g.reembolso
                    ? '<span class="gm-chip reembolso">Reembolso</span>'
                    : '<span class="gm-chip cuenta">' + escapeHtml(g.cuentaOrigenNom || 'Cuenta') + '</span>';
                return '<div class="gm-row">' +
                    '<span class="material-icons" style="color:var(--color-text-muted);">' + (g.comprobanteUrl ? 'receipt_long' : 'description') + '</span>' +
                    '<div style="flex:1;min-width:0;">' +
                        '<div style="font-weight:600;">' + escapeHtml(g.concepto || '--') + '</div>' +
                        '<div style="font-size:var(--text-xs);color:var(--color-text-muted);">' + escapeHtml(g.fecha || '') + '</div>' +
                    '</div>' +
                    '<div style="text-align:right;">' +
                        '<div class="mono">' + fmt + '</div>' + chip +
                    '</div>' +
                '</div>';
            }).join('');
        } catch (e) {
            cont.innerHTML = '<div style="color:var(--color-danger);font-size:var(--text-sm);">No se pudieron cargar tus gastos.</div>';
        }
    }

})();
</script>
</body>
</html>
