<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login - Email/Contraseña</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .exito {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        hr {
            margin: 20px 0;
            border-color: #eee;
        }
        .datos-sesion {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>
            <span class="material-icons" style="font-size: 24px;">🔐</span>
            Test Login
        </h2>
        
        <form id="loginForm">
            <div class="input-group">
                <label>📧 Email</label>
                <input type="email" id="email" placeholder="usuario@ejemplo.com" required autocomplete="email">
            </div>
            <div class="input-group">
                <label>🔑 Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" id="loginBtn">Iniciar Sesión</button>
        </form>
        
        <div id="resultado" class="resultado"></div>
        
        <hr>
        
        <div id="sesionInfo" style="display: none;">
            <h3 style="font-size: 14px; margin-bottom: 10px;">📋 Sesión actual</h3>
            <div id="infoSesion" class="datos-sesion"></div>
            <button id="logoutBtn" style="margin-top: 10px; background: #e74c3c;">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDluIIBwIJVkO9DEX4ghJQYhzJAnXtQoKs",
            authDomain: "tatareas-d8a80.firebaseapp.com",
            projectId: "tatareas-d8a80",
            storageBucket: "tatareas-d8a80.firebasestorage.app",
            messagingSenderId: "709332495480",
            appId: "1:709332495480:web:7060b2c75984352354918d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const resultadoDiv = document.getElementById('resultado');
        const sesionInfoDiv = document.getElementById('sesionInfo');
        const infoSesionDiv = document.getElementById('infoSesion');
        const logoutBtn = document.getElementById('logoutBtn');

        function mostrarResultado(mensaje, tipo) {
            resultadoDiv.textContent = mensaje;
            resultadoDiv.className = `resultado ${tipo}`;
            resultadoDiv.style.display = 'block';
            setTimeout(() => {
                if (resultadoDiv.style.display === 'block') {
                    resultadoDiv.style.display = 'none';
                }
            }, 5000);
        }

        async function verificarRol(uid) {
            try {
                const userDoc = await db.collection('usuarios').doc(uid).get();
                if (userDoc.exists) {
                    return userDoc.data().rol || 'user';
                }
                return 'no_registrado';
            } catch (error) {
                console.error('Error verificando rol:', error);
                return 'error';
            }
        }

        async function mostrarSesion(user) {
            const rol = await verificarRol(user.uid);
            infoSesionDiv.innerHTML = `
                ✅ <strong>Sesión activa</strong><br>
                📧 Email: ${user.email}<br>
                🔑 UID: ${user.uid}<br>
                👤 Rol: <strong style="color: ${rol === 'admin' ? '#27ae60' : '#e67e22'}">${rol}</strong><br>
                ${rol === 'admin' ? '🎉 Este usuario tiene acceso ADMIN' : '⚠️ Este usuario NO es administrador'}
            `;
            sesionInfoDiv.style.display = 'block';
            loginForm.style.display = 'none';
        }

        function ocultarSesion() {
            sesionInfoDiv.style.display = 'none';
            loginForm.style.display = 'block';
            emailInput.value = '';
            passwordInput.value = '';
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                mostrarResultado('❌ Completa ambos campos', 'error');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading"></span> Verificando...';
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                mostrarResultado(`✅ Login exitoso como ${user.email}`, 'exito');
                await mostrarSesion(user);
                
            } catch (error) {
                console.error('Error de login:', error);
                
                if (error.code === 'auth/user-not-found') {
                    mostrarResultado('❌ Usuario no encontrado. Regístrate primero.', 'error');
                } else if (error.code === 'auth/wrong-password') {
                    mostrarResultado('❌ Contraseña incorrecta', 'error');
                } else if (error.code === 'auth/invalid-email') {
                    mostrarResultado('❌ Email inválido', 'error');
                } else if (error.code === 'auth/too-many-requests') {
                    mostrarResultado('⚠️ Demasiados intentos. Espera un momento.', 'error');
                } else {
                    mostrarResultado(`❌ Error: ${error.message}`, 'error');
                }
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Iniciar Sesión';
            }
        });

        logoutBtn.addEventListener('click', async () => {
            try {
                await auth.signOut();
                ocultarSesion();
                mostrarResultado('✅ Sesión cerrada correctamente', 'info');
            } catch (error) {
                mostrarResultado(`❌ Error al cerrar sesión: ${error.message}`, 'error');
            }
        });

        // Verificar si ya hay sesión activa al cargar
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                await mostrarSesion(user);
            } else {
                ocultarSesion();
            }
        });
    </script>
</body>
</html>
