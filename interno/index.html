<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Verde Canas</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<style>
  body { margin:0; background:#1e4d39; display:flex; align-items:center; justify-content:center; height:100vh; }
  .dot { width:12px; height:12px; border-radius:50%; background:rgba(255,255,255,.4); display:inline-block; margin:0 4px; animation:bounce .8s infinite; }
  .dot:nth-child(2){ animation-delay:.2s; }
  .dot:nth-child(3){ animation-delay:.4s; }
  @keyframes bounce{ 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
</style>
</head>
<body>
  <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
<script>
firebase.initializeApp({
  apiKey:    'AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4',
  authDomain:'casaverdecanas-199.firebaseapp.com',
  projectId: 'casaverdecanas-199'
});

// Timeout de seguridad: si Firebase no responde en 5s, ir al login
var timer = setTimeout(function() {
  window.location.replace('index.html');
}, 5000);

firebase.auth().onAuthStateChanged(function(user) {
  clearTimeout(timer);
  if (!user) {
    // Sin sesión → login
    window.location.replace('index.html');
    return;
  }
  // Con sesión → verificar rol y redirigir
  firebase.firestore().collection('usuarios').doc(user.uid).get()
    .then(function(doc) {
      if (!doc.exists || doc.data().activo === false) {
        firebase.auth().signOut().then(function() {
          window.location.replace('index.html');
        });
        return;
      }
      var rol = doc.data().rol;
      if (rol === 'admin') {
        window.location.replace('dashboard.html');
      } else {
        window.location.replace('tareas.html');
      }
    })
    .catch(function() {
      window.location.replace('dashboard.html'); // fallback si falla Firestore
    });
});
</script>
</body>
</html>
