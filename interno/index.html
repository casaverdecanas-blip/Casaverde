<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Casa Verde Canas · Acceso</title>

    <!-- Firebase SDKs — SIN utils.js -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --verde:        #2d5a27;
            --verde-dark:   #1e3f1a;
            --verde-light:  #e8f5e9;
            --verde-xlight: #f0f7f0;
            --border:       #e0e6de;
            --text:         #1a2e18;
            --text-sub:     #5a6e58;
            --text-muted:   #8a9e88;
            --danger:       #c0392b;
            --radius:       16px;
            --shadow:       0 8px 32px rgba(0,0,0,0.10);
        }

        html, body {
            height: 100%;
            font-family: 'DM Sans', 'Segoe UI', sans-serif;
            background: var(--verde-dark);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ── FONDO ─────────────────────────────────────── */
        .bg {
            position: fixed; inset: 0;
            background: linear-gradient(160deg, #1a3a1c 0%, #0d1f0e 100%);
            overflow: hidden;
            z-index: 0;
        }

        /* Hojas decorativas */
        .bg::before, .bg::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: 0.06;
        }
        .bg::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #4a7c43, transparent);
            top: -150px; right: -150px;
        }
        .bg::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #2d5a27, transparent);
            bottom: -100px; left: -100px;
        }

        /* ── PANTALLA ──────────────────────────────────── */
        .screen {
            position: relative; z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
        }

        /* ── LOGO ──────────────────────────────────────── */
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 72px; height: 72px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            backdrop-filter: blur(8px);
        }

        .logo-icon svg {
            width: 40px; height: 40px;
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .logo p {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            font-weight: 500;
        }

        /* ── CARD ──────────────────────────────────────── */
        .card {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 380px;
            overflow: hidden;
        }

        /* ── BIENVENIDA ────────────────────────────────── */
        .welcome {
            padding: 36px 32px;
            text-align: center;
        }

        .welcome-icon {
            width: 56px; height: 56px;
            background: var(--verde-light);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }

        .welcome-icon .material-icons {
            font-size: 28px;
            color: var(--verde);
        }

        .welcome h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .welcome p {
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .btn-ingresar {
            width: 100%;
            height: 48px;
            background: var(--verde);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.15s;
            letter-spacing: 0.01em;
        }

        .btn-ingresar:hover, .btn-ingresar:active {
            background: var(--verde-dark);
        }

        .btn-ingresar .material-icons {
            font-size: 20px;
        }

        /* ── FORMULARIO LOGIN ──────────────────────────── */
        .login-form {
            padding: 32px 32px 28px;
            display: none;
        }

        .form-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .btn-back {
            width: 32px; height: 32px;
            background: var(--verde-xlight);
            border: none;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--verde);
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .btn-back:hover { background: var(--verde-light); }
        .btn-back .material-icons { font-size: 18px; }

        .form-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            background: #fff;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            -webkit-appearance: none;
        }

        .form-group input:focus {
            border-color: var(--verde);
            box-shadow: 0 0 0 3px rgba(45,90,39,0.12);
        }

        .form-group input.error {
            border-color: var(--danger);
        }

        .error-msg {
            margin-top: 14px;
            padding: 10px 14px;
            background: #fff5f5;
            border: 1px solid rgba(192,57,43,0.2);
            border-radius: 8px;
            font-size: 13px;
            color: var(--danger);
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-msg .material-icons { font-size: 16px; flex-shrink: 0; }

        .btn-login {
            width: 100%;
            height: 48px;
            background: var(--verde);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.15s, opacity 0.15s;
            letter-spacing: 0.01em;
        }

        .btn-login:hover { background: var(--verde-dark); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-login .material-icons { font-size: 18px; }

        /* Spinner dentro del botón */
        .btn-spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── LOADING GLOBAL ────────────────────────────── */
        .loading-overlay {
            position: fixed; inset: 0;
            background: var(--verde-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 999;
            transition: opacity 0.3s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: rgba(255,255,255,0.7);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay p {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }

        /* ── FOOTER ────────────────────────────────────── */
        .footer-link {
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            text-align: center;
        }

        .footer-link a {
            color: inherit;
            text-decoration: none;
        }

        .footer-link a:hover { color: rgba(255,255,255,0.5); }

        @media (max-width: 400px) {
            .welcome, .login-form { padding: 28px 24px; }
        }
    </style>
</head>
<body>

<!-- Loading overlay mientras Firebase verifica sesión -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <p>Verificando sesión...</p>
</div>

<!-- Fondo -->
<div class="bg"></div>

<!-- Pantalla principal -->
<div class="screen">

    <!-- Logo -->
    <div class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 140 C35 110,40 80,65 65 C55 95,55 120,50 140Z" fill="#A3C9A8"/>
                <path d="M150 140 C165 110,160 80,135 65 C145 95,145 120,150 140Z" fill="#A3C9A8"/>
                <polygon points="65,75 100,50 135,75" stroke="#F9D976" stroke-width="8" fill="none" stroke-linejoin="round"/>
                <rect x="70" y="75" width="60" height="40" stroke="#F9D976" stroke-width="7" fill="none"/>
                <rect x="85" y="85" width="30" height="20" stroke="#F9D976" stroke-width="6" fill="none"/>
            </svg>
        </div>
        <h1>Casa Verde Canas</h1>
        <p>Panel de administración</p>
    </div>

    <!-- Card -->
    <div class="card">

        <!-- Pantalla 1: Bienvenida -->
        <div class="welcome" id="screenWelcome">
            <div class="welcome-icon">
                <span class="material-icons">cottage</span>
            </div>
            <h2>¡Bienvenido!</h2>
            <p>Este es el sistema de gestión interno de Casa Verde Canas. Ingresá con tu cuenta para continuar.</p>
            <button class="btn-ingresar" id="btnIngresar">
                <span class="material-icons">login</span>
                Ingresar al sistema
            </button>
        </div>

        <!-- Pantalla 2: Formulario login -->
        <div class="login-form" id="screenLogin">
            <div class="form-header">
                <button class="btn-back" id="btnVolver">
                    <span class="material-icons">arrow_back</span>
                </button>
                <h2>Iniciar sesión</h2>
            </div>

            <div class="form-group">
                <label for="inputEmail">Email</label>
                <input
                    type="email"
                    id="inputEmail"
                    placeholder="tu@email.com"
                    autocomplete="email"
                    autocapitalize="none"
                    autocorrect="off"
                    spellcheck="false"
                >
            </div>

            <div class="form-group">
                <label for="inputPassword">Contraseña</label>
                <input
                    type="password"
                    id="inputPassword"
                    placeholder="••••••••"
                    autocomplete="current-password"
                >
            </div>

            <div class="error-msg" id="errorMsg">
                <span class="material-icons">error_outline</span>
                <span id="errorText">Error al iniciar sesión</span>
            </div>

            <button class="btn-login" id="btnLogin">
                <span class="material-icons" id="loginIcon">lock_open</span>
                <div class="btn-spinner" id="loginSpinner"></div>
                <span id="loginText">Entrar</span>
            </button>
        </div>

    </div>

    <div class="footer-link">
        <a href="/">← Volver al sitio</a>
    </div>

</div>

<script>
// ── FIREBASE — directo, sin utils.js ─────────────────────────
// (utils.js puede fallar en mobile antes de que el DOM esté listo)
var firebaseConfig = {
    apiKey:     'AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4',
    authDomain: 'casaverdecanas-199.firebaseapp.com',
    projectId:  'casaverdecanas-199'
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db   = firebase.firestore();

// ── ELEMENTOS ─────────────────────────────────────────────────
var loadingOverlay = document.getElementById('loadingOverlay');
var screenWelcome  = document.getElementById('screenWelcome');
var screenLogin    = document.getElementById('screenLogin');
var btnIngresar    = document.getElementById('btnIngresar');
var btnVolver      = document.getElementById('btnVolver');
var btnLogin       = document.getElementById('btnLogin');
var inputEmail     = document.getElementById('inputEmail');
var inputPassword  = document.getElementById('inputPassword');
var errorMsg       = document.getElementById('errorMsg');
var errorText      = document.getElementById('errorText');
var loginIcon      = document.getElementById('loginIcon');
var loginSpinner   = document.getElementById('loginSpinner');
var loginText      = document.getElementById('loginText');

// ── VERIFICAR SESIÓN ACTIVA ───────────────────────────────────
// Si ya tiene sesión, redirigir directo sin mostrar login
auth.onAuthStateChanged(function(user) {
    if (!user) {
        // No hay sesión → mostrar pantalla de bienvenida
        loadingOverlay.classList.add('hidden');
        return;
    }

    // Hay sesión → verificar rol y redirigir
    db.collection('usuarios').doc(user.uid).get()
        .then(function(doc) {
            if (!doc.exists) {
                auth.signOut();
                loadingOverlay.classList.add('hidden');
                return;
            }
            var data = doc.data();

            // Solo bloquea si activo === false explícitamente
            if (data.activo === false) {
                auth.signOut();
                loadingOverlay.classList.add('hidden');
                mostrarError('Tu cuenta está desactivada. Contactá al administrador.');
                return;
            }

            // Redirigir por rol
            if (data.rol === 'admin') {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'tareas.html';
            }
        })
        .catch(function(err) {
            console.error('Error verificando usuario:', err);
            loadingOverlay.classList.add('hidden');
        });
});

// ── NAVEGACIÓN ENTRE PANTALLAS ────────────────────────────────
btnIngresar.onclick = function() {
    screenWelcome.style.display = 'none';
    screenLogin.style.display   = 'block';
    inputEmail.focus();
};

btnVolver.onclick = function() {
    screenLogin.style.display   = 'none';
    screenWelcome.style.display = 'block';
    ocultarError();
    inputEmail.value    = '';
    inputPassword.value = '';
};

// ── LOGIN ─────────────────────────────────────────────────────
btnLogin.onclick = function() {
    hacerLogin();
};

// Permitir Enter para enviar
inputPassword.onkeydown = function(e) {
    if (e.key === 'Enter') hacerLogin();
};
inputEmail.onkeydown = function(e) {
    if (e.key === 'Enter') inputPassword.focus();
};

function hacerLogin() {
    var email    = inputEmail.value.trim();
    var password = inputPassword.value;

    // Validación básica
    if (!email || !password) {
        mostrarError('Completá email y contraseña.');
        return;
    }

    ocultarError();
    setLoading(true);

    auth.signInWithEmailAndPassword(email, password)
        .then(function(result) {
            var uid = result.user.uid;
            return db.collection('usuarios').doc(uid).get();
        })
        .then(function(doc) {
            if (!doc.exists) {
                auth.signOut();
                setLoading(false);
                mostrarError('Usuario no encontrado en el sistema.');
                return;
            }
            var data = doc.data();

            if (data.activo === false) {
                auth.signOut();
                setLoading(false);
                mostrarError('Tu cuenta está desactivada. Contactá al administrador.');
                return;
            }

            // Redirigir por rol
            if (data.rol === 'admin') {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'tareas.html';
            }
        })
        .catch(function(err) {
            setLoading(false);
            console.error('Error login:', err);

            var msg = 'Error al iniciar sesión. Intentá de nuevo.';
            var code = err.code || '';
            if (code === 'auth/user-not-found' || code === 'auth/wrong-password' || code === 'auth/invalid-credential') {
                msg = 'Email o contraseña incorrectos.';
            } else if (code === 'auth/invalid-email') {
                msg = 'El formato del email no es válido.';
            } else if (code === 'auth/too-many-requests') {
                msg = 'Demasiados intentos. Esperá unos minutos.';
            } else if (code === 'auth/network-request-failed') {
                msg = 'Sin conexión. Verificá tu internet.';
            }

            mostrarError(msg);
        });
}

// ── HELPERS ───────────────────────────────────────────────────
function setLoading(loading) {
    btnLogin.disabled       = loading;
    loginIcon.style.display    = loading ? 'none' : 'inline';
    loginSpinner.style.display = loading ? 'block' : 'none';
    loginText.textContent      = loading ? 'Ingresando...' : 'Entrar';
}

function mostrarError(msg) {
    errorText.textContent    = msg;
    errorMsg.style.display   = 'flex';
    inputEmail.classList.add('error');
    inputPassword.classList.add('error');
    // Asegurarse que el form está visible
    screenWelcome.style.display = 'none';
    screenLogin.style.display   = 'block';
}

function ocultarError() {
    errorMsg.style.display = 'none';
    inputEmail.classList.remove('error');
    inputPassword.classList.remove('error');
}
</script>
</body>
</html>
