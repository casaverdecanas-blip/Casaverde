<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Interno - Casa Verde Canas</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, #1e3c2c 0%, #2d5a27 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ── PANTALLA DE BIENVENIDA ── */
        .welcome-screen {
            text-align: center;
            color: white;
            animation: fadeIn 0.6s ease;
        }
        .welcome-logo {
            margin-bottom: 28px;
        }
        .welcome-logo svg {
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.3));
        }
        .welcome-screen h1 {
            font-size: clamp(1.8rem, 5vw, 2.4rem);
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .welcome-screen p {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 44px;
        }
        .btn-entrar {
            background: white;
            color: #2d5a27;
            border: none;
            padding: 16px 52px;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-entrar:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.3);
        }
        .btn-entrar .material-icons { font-size: 22px; }

        .back-welcome {
            display: block;
            margin-top: 28px;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-welcome:hover { color: white; }

        /* ── PANTALLA LOGIN ── */
        .login-screen { display: none; }
        .login-box {
            background: white;
            padding: 45px 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 24px 48px rgba(0,0,0,0.25);
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.97); }
            to   { opacity: 1; transform: scale(1); }
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .logo .material-icons { font-size: 36px; color: #2d5a27; }
        .logo h1 { font-size: 1.5rem; color: #2d5a27; font-weight: 700; }
        .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 28px; }

        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 13px 16px; border: 1.5px solid #ddd;
            border-radius: 12px; font-size: 15px; transition: border-color 0.2s; outline: none;
        }
        .form-group input:focus { border-color: #2d5a27; }

        .btn-login {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #2d5a27, #1e3f1a);
            color: white; border: none; border-radius: 12px;
            cursor: pointer; font-weight: 700; font-size: 16px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 8px; transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.92; }
        .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

        .btn-volver {
            width: 100%; padding: 12px;
            background: transparent; color: #aaa;
            border: 1.5px solid #eee; border-radius: 12px;
            cursor: pointer; font-size: 14px; margin-top: 10px;
            transition: all 0.2s;
        }
        .btn-volver:hover { border-color: #2d5a27; color: #2d5a27; }

        .spinner {
            display: none; width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            display: none; background: #fdecea; color: #c0392b;
            padding: 10px 14px; border-radius: 10px; font-size: 13px;
            margin-top: 14px; text-align: left;
        }

        .back-link {
            display: block; margin-top: 20px; color: #aaa;
            font-size: 13px; text-decoration: none; transition: color 0.2s;
        }
        .back-link:hover { color: #2d5a27; }

        @media (max-width: 480px) {
            .login-box { padding: 32px 24px; }
            .btn-entrar { padding: 14px 40px; font-size: 16px; }
        }
    </style>
</head>
<body>

<!-- PANTALLA 1: BIENVENIDA -->
<div id="welcomeScreen" class="welcome-screen">
    <div class="welcome-logo">
        <svg width="110" height="110" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="85" fill="none" stroke="#F9D976" stroke-width="3"/>
            <path d="M50 140 C35 110,40 80,65 65 C55 95,55 120,50 140Z" fill="#A3C9A8"/>
            <path d="M150 140 C165 110,160 80,135 65 C145 95,145 120,150 140Z" fill="#A3C9A8"/>
            <polygon points="65,75 100,50 135,75" fill="none" stroke="#F9D976" stroke-width="3"/>
            <rect x="70" y="75" width="60" height="40" fill="none" stroke="#F9D976" stroke-width="3"/>
            <rect x="85" y="85" width="30" height="20" fill="none" stroke="#F9D976" stroke-width="2.5"/>
            <line x1="70" y1="115" x2="130" y2="115" stroke="#F9D976" stroke-width="3"/>
            <line x1="80" y1="115" x2="80"  y2="145" stroke="#F9D976" stroke-width="3"/>
            <line x1="100" y1="115" x2="100" y2="145" stroke="#F9D976" stroke-width="3"/>
            <line x1="120" y1="115" x2="120" y2="145" stroke="#F9D976" stroke-width="3"/>
        </svg>
    </div>
    <h1>Casa Verde Canas</h1>
    <p>Sistema de gestión interno</p>
    <button class="btn-entrar" onclick="mostrarLogin()">
        <span class="material-icons">login</span>
        Ingresar al sistema
    </button>
    <a href="../index.html" class="back-welcome">← Volver al sitio público</a>
</div>

<!-- PANTALLA 2: LOGIN -->
<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <div class="logo">
            <span class="material-icons">eco</span>
            <h1>Casa Verde Canas</h1>
        </div>
        <p class="subtitle">Acceso al sistema interno</p>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button class="btn-login" id="loginBtn">
            <span id="btnText">Ingresar</span>
            <span class="spinner" id="spinner"></span>
        </button>

        <button class="btn-volver" onclick="volverBienvenida()">← Volver</button>

        <div class="error-msg" id="errorMsg"></div>
        <a href="../index.html" class="back-link">← Volver al sitio público</a>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="utils.js"></script>
<script>
    const { auth, db } = CVC;

    const loginBtn = document.getElementById('loginBtn');
    const spinner  = document.getElementById('spinner');
    const btnText  = document.getElementById('btnText');
    const errorDiv = document.getElementById('errorMsg');

    // ── Mostrar / ocultar pantallas ────────────────────────
    function mostrarLogin() {
        document.getElementById('welcomeScreen').style.display = 'none';
        document.getElementById('loginScreen').style.display  = 'flex';
        setTimeout(() => document.getElementById('email').focus(), 100);
    }

    function volverBienvenida() {
        document.getElementById('loginScreen').style.display  = 'none';
        document.getElementById('welcomeScreen').style.display = 'block';
        errorDiv.style.display = 'none';
    }

    // ── Redirección según rol ──────────────────────────────
    function redirigirSegunRol(rol) {
        if (rol === 'admin') window.location.href = 'dashboard.html';
        else window.location.href = 'tareas.html';
    }

    // ── Login ──────────────────────────────────────────────
    function mostrarError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
    }

    function setLoading(loading) {
        loginBtn.disabled = loading;
        spinner.style.display = loading ? 'inline-block' : 'none';
        btnText.textContent   = loading ? 'Ingresando...' : 'Ingresar';
    }

    async function login() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        errorDiv.style.display = 'none';

        if (!email || !password) {
            mostrarError('Ingresá tu email y contraseña.');
            return;
        }

        setLoading(true);
        try {
            // 1. Autenticar con Firebase
            const cred = await auth.signInWithEmailAndPassword(email, password);

            // 2. Verificar doc en Firestore
            const userDoc = await db.collection('usuarios').doc(cred.user.uid).get();
            if (!userDoc.exists) {
                await auth.signOut();
                mostrarError('Usuario no registrado en el sistema.');
                setLoading(false);
                return;
            }

            const userData = userDoc.data();
            if (userData.activo === false) {
                await auth.signOut();
                mostrarError('Tu cuenta está desactivada. Contactá al administrador.');
                setLoading(false);
                return;
            }

            // 3. Redirigir — la sesión ya está establecida en este punto
            redirigirSegunRol(userData.rol);

        } catch (error) {
            setLoading(false);
            const mensajes = {
                'auth/user-not-found':         'No existe una cuenta con ese email.',
                'auth/wrong-password':         'Contraseña incorrecta.',
                'auth/invalid-email':          'El email no es válido.',
                'auth/invalid-credential':     'Email o contraseña incorrectos.',
                'auth/too-many-requests':      'Demasiados intentos. Intentá más tarde.',
                'auth/network-request-failed': 'Error de red. Verificá tu conexión.'
            };
            mostrarError(mensajes[error.code] || 'Error al ingresar. Intentá de nuevo.');
        }
    }

    loginBtn.addEventListener('click', login);
    document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });
</script>
</body>
</html>
