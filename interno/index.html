<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Autenticación Firebase v9</title>
    
    <!-- Import map para Firebase v9 modular -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
            }
        }
    </script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 400px;
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px 0;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .error {
            color: #e74c3c;
            font-size: 14px;
            margin: 10px 0;
            padding: 10px;
            background: #fde8e8;
            border-radius: 5px;
            display: none;
        }
        
        .success {
            color: #27ae60;
            font-size: 14px;
            margin: 10px 0;
            padding: 10px;
            background: #e8f8e8;
            border-radius: 5px;
            display: none;
        }
        
        .info {
            background: #e8f4fd;
            border-left: 4px solid #3498db;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .user-card {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
            margin: 10px 0;
            border-left: 4px solid #27ae60;
        }
        
        .loading {
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Firebase v9 - Prueba Auth</h2>
        
        <!-- Estado de conexión -->
        <div id="connectionStatus" class="info">
            <span id="statusText">Inicializando Firebase...</span>
        </div>
        
        <!-- Formulario -->
        <div id="authContainer">
            <input type="email" id="email" placeholder="Email" value="test@test.com">
            <input type="password" id="password" placeholder="Contraseña" value="123456">
            
            <div style="display: flex; gap: 10px;">
                <button onclick="handleLogin()" style="flex: 1;">Iniciar Sesión</button>
                <button onclick="handleRegister()" style="flex: 1;">Registrarse</button>
            </div>
            
            <button onclick="handleLogout()" id="logoutBtn" style="display: none; background: #e74c3c;">Cerrar Sesión</button>
        </div>
        
        <!-- Mensajes -->
        <div id="errorMessage" class="error"></div>
        <div id="successMessage" class="success"></div>
        
        <!-- Info del usuario -->
        <div id="userInfo" style="display: none;" class="user-card">
            <p><strong>✅ Usuario autenticado:</strong></p>
            <p>📧 <span id="userEmail"></span></p>
            <p>🆔 <span id="userUid"></span></p>
        </div>
        
        <!-- Loading -->
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Procesando...</p>
        </div>
    </div>

    <script type="module">
        // ============================================
        // IMPORTAR FIREBASE v9 (TU CÓDIGO EXACTO)
        // ============================================
        import { initializeApp } from "firebase/app";
        import { 
            getAuth, 
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            signOut,
            onAuthStateChanged 
        } from "firebase/auth";

        // ============================================
        // TU CONFIGURACIÓN DE FIREBASE (EXACTAMENTE COMO LA TIENES)
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyA_2cvoGzR7e3X4OvEYg6wAAwr7qZUVnE4",
            authDomain: "tareascasaverde.firebaseapp.com",
            projectId: "tareascasaverde",
            storageBucket: "tareascasaverde.firebasestorage.app",
            messagingSenderId: "591794308075",
            appId: "1:591794308075:web:4309b229bbaa2a89438fae"
        };

        // ============================================
        // INICIALIZAR FIREBASE
        // ============================================
        let auth;
        try {
            // Inicializar app
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            
            document.getElementById('statusText').innerHTML = '✅ Firebase conectado correctamente (v9)';
            document.getElementById('connectionStatus').style.borderLeftColor = '#27ae60';
            console.log('✅ Firebase v9 inicializado');
        } catch (error) {
            document.getElementById('statusText').innerHTML = '❌ Error: ' + error.message;
            document.getElementById('connectionStatus').style.borderLeftColor = '#e74c3c';
            console.error('❌ Error:', error);
        }

        // ============================================
        // ELEMENTOS DEL DOM
        // ============================================
        const authContainer = document.getElementById('authContainer');
        const userInfo = document.getElementById('userInfo');
        const userEmail = document.getElementById('userEmail');
        const userUid = document.getElementById('userUid');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const logoutBtn = document.getElementById('logoutBtn');
        const loading = document.getElementById('loading');

        // ============================================
        // OBSERVADOR DE ESTADO DE AUTENTICACIÓN
        // ============================================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Usuario autenticado
                console.log('✅ Usuario autenticado:', user.email);
                authContainer.style.display = 'none';
                userInfo.style.display = 'block';
                logoutBtn.style.display = 'block';
                userEmail.textContent = user.email;
                userUid.textContent = user.uid;
            } else {
                // No hay usuario
                console.log('⏳ No hay usuario autenticado');
                authContainer.style.display = 'block';
                userInfo.style.display = 'none';
                logoutBtn.style.display = 'none';
            }
        });

        // ============================================
        // FUNCIONES DE AUTENTICACIÓN
        // ============================================
        
        // Hacer las funciones globales para los botones
        window.handleLogin = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Validaciones
            if (!email || !password) {
                showError('Email y contraseña requeridos');
                return;
            }
            
            if (password.length < 6) {
                showError('La contraseña debe tener al menos 6 caracteres');
                return;
            }
            
            setLoading(true);
            
            try {
                console.log('🔄 Intentando login con:', email);
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                console.log('✅ Login exitoso:', userCredential.user.email);
                showSuccess('✅ Login exitoso');
            } catch (error) {
                console.error('❌ Error:', error.code, error.message);
                
                // Traducir error
                let errorMessage = getErrorMessage(error.code);
                
                // Si el usuario no existe, sugerir registro
                if (error.code === 'auth/user-not-found') {
                    errorMessage += ' Prueba con "Registrarse"';
                }
                
                showError(errorMessage);
            } finally {
                setLoading(false);
            }
        };

        window.handleRegister = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Validaciones
            if (!email || !password) {
                showError('Email y contraseña requeridos');
                return;
            }
            
            if (password.length < 6) {
                showError('La contraseña debe tener al menos 6 caracteres');
                return;
            }
            
            setLoading(true);
            
            try {
                console.log('🔄 Intentando registro con:', email);
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                console.log('✅ Registro exitoso:', userCredential.user.email);
                showSuccess('✅ Usuario registrado correctamente');
            } catch (error) {
                console.error('❌ Error:', error.code, error.message);
                showError(getErrorMessage(error.code));
            } finally {
                setLoading(false);
            }
        };

        window.handleLogout = async function() {
            setLoading(true);
            try {
                await signOut(auth);
                showSuccess('✅ Sesión cerrada');
            } catch (error) {
                showError('Error al cerrar sesión');
            } finally {
                setLoading(false);
            }
        };

        // ============================================
        // FUNCIONES AUXILIARES
        // ============================================
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        function setLoading(show) {
            loading.style.display = show ? 'block' : 'none';
            
            // Deshabilitar/habilitar botones
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => btn.disabled = show);
        }

        function getErrorMessage(errorCode) {
            const errors = {
                'auth/invalid-email': '❌ Email inválido',
                'auth/user-disabled': '❌ Usuario deshabilitado',
                'auth/user-not-found': '❌ Usuario no encontrado',
                'auth/wrong-password': '❌ Contraseña incorrecta',
                'auth/email-already-in-use': '❌ Este email ya está registrado',
                'auth/weak-password': '❌ La contraseña debe tener al menos 6 caracteres',
                'auth/network-request-failed': '❌ Error de red. Verifica tu conexión',
                'auth/operation-not-allowed': '❌ El método de autenticación no está habilitado en Firebase Console'
            };
            return errors[errorCode] || `❌ Error: ${errorCode}`;
        }
    </script>
</body>
</html>
