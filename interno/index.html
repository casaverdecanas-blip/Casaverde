<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Interno - Casa Verde Canas</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, #1e3c2c 0%, #2d5a27 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            background: white;
            padding: 45px 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 24px 48px rgba(0,0,0,0.25);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .logo .material-icons {
            font-size: 36px;
            color: #2d5a27;
        }
        .logo h1 {
            font-size: 1.6rem;
            color: #2d5a27;
            font-weight: 700;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .form-group {
            position: relative;
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #ddd;
            border-radius: 12px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #2d5a27;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2d5a27, #1e3f1a);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.92; }
        .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            display: none;
            background: #fdecea;
            color: #c0392b;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-top: 14px;
            text-align: left;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #aaa;
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: #2d5a27; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo">
        <span class="material-icons">eco</span>
        <h1>Casa Verde Canas</h1>
    </div>
    <p class="subtitle">Acceso al sistema interno</p>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="loginBtn">
        <span id="btnText">Ingresar</span>
        <span class="spinner" id="spinner"></span>
    </button>

    <div class="error-msg" id="errorMsg"></div>

    <a href="../index.html" class="back-link">← Volver al sitio público</a>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="utils.js"></script>
<script>
    const { auth, db } = CVC;

    const loginBtn = document.getElementById('loginBtn');
    const spinner  = document.getElementById('spinner');
    const btnText  = document.getElementById('btnText');
    const errorDiv = document.getElementById('errorMsg');

    // Si ya hay sesión activa, redirigir directamente
    auth.onAuthStateChanged(async (user) => {
        if (!user) return;
        try {
            const userDoc = await db.collection('usuarios').doc(user.uid).get();
            if (!userDoc.exists || !userDoc.data().activo) return;
            redirigirSegunRol(userDoc.data().rol);
        } catch(e) {
            // sesión inválida, no hacer nada
        }
    });

    function redirigirSegunRol(rol) {
        if (rol === 'admin') window.location.href = 'dashboard.html';
        else window.location.href = 'tareas.html';
    }

    function mostrarError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
    }

    function setLoading(loading) {
        loginBtn.disabled = loading;
        spinner.style.display = loading ? 'inline-block' : 'none';
        btnText.textContent = loading ? 'Ingresando...' : 'Ingresar';
    }

    async function login() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        errorDiv.style.display = 'none';

        if (!email || !password) {
            mostrarError('Ingresá tu email y contraseña.');
            return;
        }

        setLoading(true);
        try {
            const cred = await auth.signInWithEmailAndPassword(email, password);
            const userDoc = await db.collection('usuarios').doc(cred.user.uid).get();

            if (!userDoc.exists) {
                await auth.signOut();
                mostrarError('Usuario no registrado en el sistema.');
                setLoading(false);
                return;
            }

            const userData = userDoc.data();

            if (!userData.activo) {
                await auth.signOut();
                mostrarError('Tu cuenta está desactivada. Contactá al administrador.');
                setLoading(false);
                return;
            }

            redirigirSegunRol(userData.rol);

        } catch (error) {
            setLoading(false);
            const mensajes = {
                'auth/user-not-found':    'No existe una cuenta con ese email.',
                'auth/wrong-password':    'Contraseña incorrecta.',
                'auth/invalid-email':     'El email no es válido.',
                'auth/too-many-requests': 'Demasiados intentos. Intentá más tarde.',
                'auth/network-request-failed': 'Error de red. Verificá tu conexión.'
            };
            mostrarError(mensajes[error.code] || 'Error al ingresar. Intentá de nuevo.');
        }
    }

    loginBtn.addEventListener('click', login);
    document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });
</script>
</body>
</html>
