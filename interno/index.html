<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Actividades - Área Privada</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <!-- Pantalla de Login -->
    <div id="loginContainer" class="login-container">
        <div class="login-box">
            <h2><span class="material-icons">lock</span> Acceso Privado</h2>
            <form id="loginForm">
                <div class="input-group">
                    <span class="material-icons">person</span>
                    <input type="text" id="username" placeholder="Usuario" required>
                </div>
                <div class="input-group">
                    <span class="material-icons">password</span>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="login-btn">
                    <span class="material-icons">login</span> Entrar
                </button>
                <p id="loginError" class="error-message"></p>
            </form>
        </div>
    </div>

    <!-- Área Privada (inicialmente oculta) -->
    <div id="privateArea" class="private-area" style="display: none;">
        <header class="app-header">
            <div class="header-content">
                <h1><span class="material-icons">assignment</span> Mis Actividades Pendientes</h1>
                <button id="logoutBtn" class="logout-btn">
                    <span class="material-icons">logout</span> Cerrar Sesión
                </button>
            </div>
        </header>

        <main class="main-content">
            <!-- Formulario para nueva actividad -->
            <div class="add-task-card">
                <h2>Agregar Nueva Actividad</h2>
                <form id="taskForm">
                    <input type="text" id="taskTitle" placeholder="Título de la actividad" required>
                    <textarea id="taskDescription" placeholder="Descripción (opcional)"></textarea>
                    <div class="form-row">
                        <input type="date" id="taskDate" required>
                        <select id="taskPriority">
                            <option value="alta">Alta Prioridad</option>
                            <option value="media" selected>Media Prioridad</option>
                            <option value="baja">Baja Prioridad</option>
                        </select>
                    </div>
                    <button type="submit" class="add-task-btn">
                        <span class="material-icons">add_task</span> Agregar Actividad
                    </button>
                </form>
            </div>

            <!-- Filtros y búsqueda -->
            <div class="filters-section">
                <div class="search-box">
                    <span class="material-icons">search</span>
                    <input type="text" id="searchTask" placeholder="Buscar actividades...">
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">Todas</button>
                    <button class="filter-btn" data-filter="alta">Alta</button>
                    <button class="filter-btn" data-filter="media">Media</button>
                    <button class="filter-btn" data-filter="baja">Baja</button>
                </div>
            </div>

            <!-- Lista de actividades -->
            <div class="tasks-container">
                <h2>Actividades Pendientes</h2>
                <div id="tasksList" class="tasks-list">
                    <!-- Las actividades se cargarán aquí dinámicamente -->
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
