<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Interno - Casa Verde Canas</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, #1e3c2c 0%, #2d5a27 100%);
            min-height: 100vh;
        }

        /* Pantalla base — centrada */
        .screen {
            display: none;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .screen.active { display: flex; }

        /* ── BIENVENIDA ── */
        .welcome-wrap {
            text-align: center;
            color: white;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:scale(0.97); } to { opacity:1; transform:scale(1); } }

        .welcome-wrap h1 {
            font-size: clamp(1.8rem, 5vw, 2.4rem);
            font-weight: 700;
            margin: 20px 0 8px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .welcome-wrap p { font-size: 1rem; opacity: 0.8; margin-bottom: 40px; }

        .btn-entrar {
            background: white; color: #2d5a27; border: none;
            padding: 16px 52px; border-radius: 50px;
            font-size: 17px; font-weight: 700; cursor: pointer;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            transition: all 0.25s;
            display: inline-flex; align-items: center; gap: 10px;
        }
        .btn-entrar:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.3); }
        .btn-entrar .material-icons { font-size: 22px; }
        .back-pub { display: block; margin-top: 28px; color: rgba(255,255,255,0.6); font-size: 13px; text-decoration: none; }
        .back-pub:hover { color: white; }

        /* ── LOGIN ── */
        .login-box {
            background: white; padding: 45px 40px; border-radius: 28px;
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 24px 48px rgba(0,0,0,0.25);
            animation: slideUp 0.35s ease;
        }
        @keyframes slideUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

        .logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 6px; }
        .logo .material-icons { font-size: 34px; color: #2d5a27; }
        .logo h2 { font-size: 1.45rem; color: #2d5a27; font-weight: 700; }
        .subtitle { color: #888; font-size: 0.88rem; margin-bottom: 26px; }

        .form-group { margin-bottom: 14px; text-align: left; }
        .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #555; margin-bottom: 5px; }
        .form-group input {
            width: 100%; padding: 12px 15px; border: 1.5px solid #ddd;
            border-radius: 12px; font-size: 15px; outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #2d5a27; }

        .btn-login {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #2d5a27, #1e3f1a);
            color: white; border: none; border-radius: 12px;
            cursor: pointer; font-weight: 700; font-size: 16px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 6px; transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.9; }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-back {
            width: 100%; padding: 11px; background: transparent;
            color: #aaa; border: 1.5px solid #eee; border-radius: 12px;
            cursor: pointer; font-size: 14px; margin-top: 10px; transition: all 0.2s;
        }
        .btn-back:hover { border-color: #2d5a27; color: #2d5a27; }

        .spinner {
            display: none; width: 17px; height: 17px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            display: none; background: #fdecea; color: #c0392b;
            padding: 10px 14px; border-radius: 10px; font-size: 13px;
            margin-top: 12px; text-align: left;
        }
        .back-link { display: block; margin-top: 18px; color: #bbb; font-size: 13px; text-decoration: none; }
        .back-link:hover { color: #2d5a27; }

        @media (max-width: 480px) { .login-box { padding: 30px 20px; } }
    </style>
</head>
<body>

<!-- PANTALLA 1: BIENVENIDA -->
<div id="screenBienvenida" class="screen active">
    <div class="welcome-wrap">
        <svg width="100" height="100" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="85" fill="none" stroke="#F9D976" stroke-width="3"/>
            <path d="M50 140 C35 110,40 80,65 65 C55 95,55 120,50 140Z" fill="#A3C9A8"/>
            <path d="M150 140 C165 110,160 80,135 65 C145 95,145 120,150 140Z" fill="#A3C9A8"/>
            <polygon points="65,75 100,50 135,75" fill="none" stroke="#F9D976" stroke-width="3"/>
            <rect x="70" y="75" width="60" height="40" fill="none" stroke="#F9D976" stroke-width="3"/>
            <rect x="85" y="85" width="30" height="20" fill="none" stroke="#F9D976" stroke-width="2.5"/>
            <line x1="70" y1="115" x2="130" y2="115" stroke="#F9D976" stroke-width="3"/>
            <line x1="80" y1="115" x2="80"  y2="145" stroke="#F9D976" stroke-width="3"/>
            <line x1="100" y1="115" x2="100" y2="145" stroke="#F9D976" stroke-width="3"/>
            <line x1="120" y1="115" x2="120" y2="145" stroke="#F9D976" stroke-width="3"/>
        </svg>
        <h1>Casa Verde Canas</h1>
        <p>Sistema de gestión interno</p>
        <button class="btn-entrar" id="btnEntrar">
            <span class="material-icons">login</span>
            Ingresar al sistema
        </button>
        <a href="../index.html" class="back-pub">← Volver al sitio público</a>
    </div>
</div>

<!-- PANTALLA 2: LOGIN -->
<div id="screenLogin" class="screen">
    <div class="login-box">
        <div class="logo">
            <span class="material-icons">eco</span>
            <h2>Casa Verde Canas</h2>
        </div>
        <p class="subtitle">Ingresá tus credenciales</p>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button class="btn-login" id="loginBtn">
            <span id="btnText">Ingresar</span>
            <span class="spinner" id="spinner"></span>
        </button>

        <button class="btn-back" id="btnBack">← Volver</button>

        <div class="error-msg" id="errorMsg"></div>
        <a href="../index.html" class="back-link">← Volver al sitio público</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="utils.js"></script>
<script>
    const { auth, db } = CVC;

    // ── Elementos ──────────────────────────────────────────
    const screenBienvenida = document.getElementById('screenBienvenida');
    const screenLogin      = document.getElementById('screenLogin');
    const loginBtn         = document.getElementById('loginBtn');
    const btnEntrar        = document.getElementById('btnEntrar');
    const btnBack          = document.getElementById('btnBack');
    const spinner          = document.getElementById('spinner');
    const btnText          = document.getElementById('btnText');
    const errorDiv         = document.getElementById('errorMsg');

    // ── Navegación entre pantallas ─────────────────────────
    btnEntrar.addEventListener('click', function() {
        screenBienvenida.classList.remove('active');
        screenLogin.classList.add('active');
        setTimeout(() => document.getElementById('email').focus(), 150);
    });

    btnBack.addEventListener('click', function() {
        screenLogin.classList.remove('active');
        screenBienvenida.classList.add('active');
        errorDiv.style.display = 'none';
    });

    // ── Helpers ────────────────────────────────────────────
    function mostrarError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
    }

    function setLoading(loading) {
        loginBtn.disabled     = loading;
        spinner.style.display = loading ? 'inline-block' : 'none';
        btnText.textContent   = loading ? 'Ingresando...' : 'Ingresar';
    }

    function redirigirSegunRol(rol) {
        if (rol === 'admin') window.location.href = 'dashboard.html';
        else window.location.href = 'tareas.html';
    }

    // ── Login ──────────────────────────────────────────────
    async function login() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        errorDiv.style.display = 'none';

        if (!email || !password) {
            mostrarError('Ingresá tu email y contraseña.');
            return;
        }

        setLoading(true);
        try {
            // Autenticar
            const cred = await auth.signInWithEmailAndPassword(email, password);

            // Verificar en Firestore
            const userDoc = await db.collection('usuarios').doc(cred.user.uid).get();
            if (!userDoc.exists) {
                await auth.signOut();
                mostrarError('Usuario no registrado en el sistema.');
                setLoading(false);
                return;
            }

            const userData = userDoc.data();
            if (userData.activo === false) {
                await auth.signOut();
                mostrarError('Tu cuenta está desactivada. Contactá al administrador.');
                setLoading(false);
                return;
            }

            // Sesión establecida — redirigir
            redirigirSegunRol(userData.rol);

        } catch (error) {
            setLoading(false);
            const mensajes = {
                'auth/user-not-found':         'No existe una cuenta con ese email.',
                'auth/wrong-password':         'Contraseña incorrecta.',
                'auth/invalid-email':          'El email no es válido.',
                'auth/invalid-credential':     'Email o contraseña incorrectos.',
                'auth/too-many-requests':      'Demasiados intentos. Intentá más tarde.',
                'auth/network-request-failed': 'Error de red. Verificá tu conexión.'
            };
            mostrarError(mensajes[error.code] || 'Error al ingresar. Intentá de nuevo.');
        }
    }

    loginBtn.addEventListener('click', login);
    document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });
</script>
</body>
</html>
