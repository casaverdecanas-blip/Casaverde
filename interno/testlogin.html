<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: monospace; }
        body { background: #1a1a2e; color: #e0e0e0; padding: 20px; font-size: 14px; }
        h2 { color: #00d4aa; margin-bottom: 20px; }
        .box { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        .box h3 { color: #0f9b8e; margin-bottom: 12px; font-size: 13px; text-transform: uppercase; }
        input { width: 100%; padding: 10px; margin: 6px 0; background: #222; border: 1px solid #444; border-radius: 8px; color: white; font-size: 14px; font-family: monospace; }
        button { padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; margin: 4px; font-size: 14px; }
        .btn-green  { background: #00d4aa; color: #1a1a2e; }
        .btn-blue   { background: #3498db; color: white; }
        .btn-red    { background: #e74c3c; color: white; }
        .log { background: #0d0d1a; border-radius: 10px; padding: 14px; margin-top: 10px; min-height: 60px; max-height: 300px; overflow-y: auto; }
        .ok   { color: #2ecc71; margin: 3px 0; }
        .err  { color: #e74c3c; margin: 3px 0; }
        .info { color: #3498db; margin: 3px 0; }
        .warn { color: #f39c12; margin: 3px 0; }
        .step { background: #1a2a1a; border-left: 3px solid #00d4aa; padding: 8px 12px; margin: 6px 0; border-radius: 4px; }
    </style>
</head>
<body>

<h2>🔍 Test de Login — Casa Verde Canas</h2>

<!-- PASO 1: Firebase -->
<div class="box">
    <h3>Paso 1 — Cargar Firebase</h3>
    <button class="btn-blue" onclick="paso1()">Verificar Firebase</button>
    <div class="log" id="log1"><span class="info">Esperando...</span></div>
</div>

<!-- PASO 2: Auth -->
<div class="box">
    <h3>Paso 2 — Autenticar</h3>
    <input type="email"    id="email"    placeholder="Email" value="casaverdecanas@gmail.com">
    <input type="password" id="password" placeholder="Contraseña">
    <button class="btn-green" onclick="paso2()">Intentar login</button>
    <div class="log" id="log2"><span class="info">Esperando...</span></div>
</div>

<!-- PASO 3: Firestore -->
<div class="box">
    <h3>Paso 3 — Leer Firestore</h3>
    <button class="btn-blue" onclick="paso3()" id="btn3" disabled>Leer doc usuario</button>
    <div class="log" id="log3"><span class="info">Primero completá el Paso 2...</span></div>
</div>

<!-- PASO 4: Redirección manual -->
<div class="box">
    <h3>Paso 4 — Redirección</h3>
    <button class="btn-green" onclick="irDashboard()" id="btn4" disabled>Ir a dashboard.html</button>
    <button class="btn-blue"  onclick="irTareas()"    id="btn5" disabled>Ir a tareas.html</button>
    <div class="log" id="log4"><span class="info">Primero completá el Paso 3...</span></div>
</div>

<!-- PASO 5: Estado auth en tiempo real -->
<div class="box">
    <h3>Paso 5 — Estado de sesión en tiempo real</h3>
    <button class="btn-blue" onclick="paso5()">Escuchar cambios de sesión</button>
    <button class="btn-red"  onclick="cerrarSesion()">Cerrar sesión</button>
    <div class="log" id="log5"><span class="info">Esperando...</span></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>

const FIREBASE_CONFIG = {
    apiKey:    "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4",
    authDomain:"casaverdecanas-199.firebaseapp.com",
    projectId: "casaverdecanas-199"
};

let db, auth, currentUser;

function log(id, msg, tipo='info') {
    const el = document.getElementById(id);
    const line = document.createElement('div');
    line.className = tipo;
    line.textContent = '[' + new Date().toLocaleTimeString('es-AR') + '] ' + msg;
    if (el.querySelector('.info')?.textContent.includes('Esperando') ||
        el.querySelector('.info')?.textContent.includes('Primero')) {
        el.innerHTML = '';
    }
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
}

// ── PASO 1: Verificar Firebase ────────────────────────────
function paso1() {
    try {
        if (!firebase.apps.length) {
            firebase.initializeApp(FIREBASE_CONFIG);
            log('log1', 'Firebase inicializado ✅', 'ok');
        } else {
            log('log1', 'Firebase ya estaba inicializado ✅', 'ok');
        }
        auth = firebase.auth();
        db   = firebase.firestore();
        log('log1', 'auth y db listos ✅', 'ok');
        log('log1', 'Project: ' + FIREBASE_CONFIG.projectId, 'info');
        log('log1', 'authDomain: ' + FIREBASE_CONFIG.authDomain, 'info');

        // Verificar sesión actual
        const user = auth.currentUser;
        if (user) {
            log('log1', 'Sesión activa detectada: ' + user.email, 'warn');
        } else {
            log('log1', 'Sin sesión activa actualmente', 'info');
        }
    } catch(e) {
        log('log1', 'ERROR: ' + e.message, 'err');
    }
}

// ── PASO 2: Login ─────────────────────────────────────────
async function paso2() {
    if (!auth) { log('log2', 'Primero ejecutá el Paso 1', 'err'); return; }
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { log('log2', 'Ingresá email y contraseña', 'err'); return; }

    log('log2', 'Intentando signInWithEmailAndPassword...', 'info');
    try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        currentUser = cred.user;
        log('log2', '✅ Auth OK', 'ok');
        log('log2', 'UID: ' + cred.user.uid, 'ok');
        log('log2', 'Email: ' + cred.user.email, 'ok');
        log('log2', 'emailVerified: ' + cred.user.emailVerified, 'info');
        document.getElementById('btn3').disabled = false;
        log('log3', 'Listo para Paso 3 — hacé click en el botón ↑', 'info');
    } catch(e) {
        log('log2', '❌ Error: ' + e.message, 'err');
        log('log2', 'Código: ' + (e.code || '—'), 'err');
    }
}

// ── PASO 3: Leer Firestore ────────────────────────────────
async function paso3() {
    if (!currentUser) { log('log3', 'Necesitás loguearte primero', 'err'); return; }
    log('log3', 'Leyendo /usuarios/' + currentUser.uid + '...', 'info');
    try {
        const doc = await db.collection('usuarios').doc(currentUser.uid).get();
        if (!doc.exists) {
            log('log3', '❌ Documento NO existe en Firestore', 'err');
            return;
        }
        const data = doc.data();
        log('log3', '✅ Documento encontrado', 'ok');
        log('log3', 'nombre: ' + (data.nombre || '—'), 'ok');
        log('log3', 'rol: '    + (data.rol    || '—'), 'ok');
        log('log3', 'activo: ' + data.activo, 'ok');
        log('log3', 'email: '  + (data.email  || '—'), 'info');

        if (data.activo === false) {
            log('log3', '⚠️ Usuario INACTIVO — sería bloqueado', 'warn');
        } else {
            log('log3', '✅ Usuario activo — puede ingresar', 'ok');
            document.getElementById('btn4').disabled = false;
            document.getElementById('btn5').disabled = false;
            log('log4', 'Rol detectado: ' + data.rol + ' — elegí destino ↑', 'info');
        }
    } catch(e) {
        log('log3', '❌ Error Firestore: ' + e.message, 'err');
        log('log3', 'Código: ' + (e.code || '—'), 'err');
    }
}

// ── PASO 4: Redirección ───────────────────────────────────
function irDashboard() {
    log('log4', 'Redirigiendo a dashboard.html...', 'info');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
}
function irTareas() {
    log('log4', 'Redirigiendo a tareas.html...', 'info');
    setTimeout(() => { window.location.href = 'tareas.html'; }, 500);
}

// ── PASO 5: Estado en tiempo real ─────────────────────────
function paso5() {
    if (!auth) { log('log5', 'Primero ejecutá el Paso 1', 'err'); return; }
    log('log5', 'Escuchando onAuthStateChanged...', 'info');
    auth.onAuthStateChanged((user) => {
        if (user) {
            log('log5', '🟢 Sesión ACTIVA: ' + user.email, 'ok');
            log('log5', 'UID: ' + user.uid, 'info');
        } else {
            log('log5', '🔴 Sin sesión activa', 'warn');
        }
    });
}

function cerrarSesion() {
    if (!auth) { log('log5', 'Firebase no inicializado', 'err'); return; }
    auth.signOut().then(() => {
        log('log5', '✅ Sesión cerrada', 'ok');
        currentUser = null;
    });
}

// Capturar errores globales
window.onerror = function(msg, src, line, col) {
    document.body.insertAdjacentHTML('afterbegin',
        '<div style="background:#e74c3c;color:white;padding:12px;border-radius:8px;margin-bottom:16px;">❌ ERROR GLOBAL: ' + msg + ' (' + src + ':' + line + ')</div>'
    );
};

// Auto-inicializar Firebase al cargar
window.addEventListener('load', paso1);
</script>
</body>
</html>
