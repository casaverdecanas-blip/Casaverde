<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Datos - Firestore</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background: #0a0a0f; color: #0f0; font-family: monospace; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #0f0; border-bottom: 1px solid #0f0; padding-bottom: 10px; }
        .panel { background: #1a1a2a; padding: 15px; border-radius: 8px; margin: 20px 0; }
        button { background: #0f0; color: #000; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #333; }
        th { color: #ff0; }
        .error { color: #f66; }
        .success { color: #0f0; }
        .warning { color: #f90; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Verificador de Datos - Firestore</h1>
        <div class="panel">
            <h3>🔐 Autenticación</h3>
            <input type="email" id="email" placeholder="Email" style="width: 300px; padding: 8px;">
            <input type="password" id="password" placeholder="Contraseña" style="width: 300px; padding: 8px;">
            <button onclick="login()">Iniciar sesión</button>
            <div id="loginStatus"></div>
        </div>

        <div id="dataPanel" style="display: none;">
            <div class="panel">
                <h3>📚 Colección: <span id="coleccionActual">tareas</span></h3>
                <button onclick="cargarColeccion('tareas')">Ver Tareas</button>
                <button onclick="cargarColeccion('historial')">Ver Historial</button>
                <button onclick="cargarColeccion('usuarios')">Ver Usuarios</button>
                <div id="dataContent"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDluIIBwIJVkO9DEX4ghJQYhzJAnXtQoKs",
            authDomain: "tatareas-d8a80.firebaseapp.com",
            projectId: "tatareas-d8a80",
            storageBucket: "tatareas-d8a80.firebasestorage.app",
            messagingSenderId: "709332495480",
            appId: "1:709332495480:web:7060b2c75984352354918d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const statusDiv = document.getElementById('loginStatus');
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                currentUser = userCredential.user;
                statusDiv.innerHTML = `<div class="success">✅ Conectado como: ${currentUser.email}</div>`;
                document.getElementById('dataPanel').style.display = 'block';
                // Cargar tareas por defecto
                cargarColeccion('tareas');
            } catch (error) {
                statusDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        async function cargarColeccion(coleccion) {
            const contentDiv = document.getElementById('dataContent');
            contentDiv.innerHTML = '<div class="warning">🔄 Cargando...</div>';
            document.getElementById('coleccionActual').innerText = coleccion;

            try {
                const snapshot = await db.collection(coleccion).get();
                if (snapshot.empty) {
                    contentDiv.innerHTML = `<div class="warning">⚠️ La colección "${coleccion}" está vacía.</div>`;
                    return;
                }

                let html = `<table><thead><tr>`;
                // Obtener todos los campos únicos de todos los documentos
                const allFields = new Set();
                snapshot.forEach(doc => {
                    Object.keys(doc.data()).forEach(key => allFields.add(key));
                });
                html += `<th>ID</th>`;
                allFields.forEach(field => html += `<th>${field}</th>`);
                html += `</tr></thead><tbody>`;

                snapshot.forEach(doc => {
                    html += `<tr><td><small>${doc.id.substring(0,12)}...</small></td>`;
                    const data = doc.data();
                    allFields.forEach(field => {
                        let value = data[field];
                        if (value && value.toDate) {
                            value = value.toDate().toLocaleString();
                        } else if (typeof value === 'object') {
                            value = JSON.stringify(value);
                        }
                        html += `<td>${escapeHtml(String(value || '-'))}</td>`;
                    });
                    html += `</tr>`;
                });
                html += `</tbody></table>`;
                contentDiv.innerHTML = html;
            } catch (error) {
                contentDiv.innerHTML = `<div class="error">❌ Error al cargar: ${error.message}</div>`;
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
        }
    </script>
</body>
</html>
