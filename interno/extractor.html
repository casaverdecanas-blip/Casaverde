<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Extractor de Datos - Casa Verde</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef; }
        textarea { width: 100%; height: 250px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        #output { background: #fff; border: 1px solid #ccc; padding: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>1. Pega aquí el texto de "Gastos sin clasificar"</h2>
    <textarea id="input" placeholder="Pega aquí el texto copiado de la web..."></textarea>
    <button onclick="extraer()">Limpiar y preparar para el chat</button>
    
    <h2>2. Copia esto y pégalo en el chat de Gemini</h2>
    <div id="output"></div>

    <script>
        function extraer() {
            const input = document.getElementById('input').value;
            const lineas = input.split('\n');
            let listaLimpia = "LISTA PARA CLASIFICAR:\n";
            
            lineas.forEach(linea => {
                // Filtra líneas que contienen montos (empiezan con - o +)
                if (linea.includes('-R$') || linea.includes('+R$') || linea.includes('-SU') || linea.includes('+SU') || linea.includes('-US$')) {
                    // Limpiamos un poco el texto para que sea legible
                    let texto = linea.trim().replace(/Clasificar/gi, "").replace(/Fijar cotización/gi, "");
                    listaLimpia += texto + "\n";
                }
            });
            document.getElementById('output').innerText = listaLimpia;
        }
    </script>
</body>
</html>
