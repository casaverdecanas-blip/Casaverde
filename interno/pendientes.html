<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendientes · Casa Verde Canas</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        /* ── ITEM PENDIENTE ──────────────────────────────────── */
        .pend-item {
            display: flex;
            align-items: flex-start;
            gap: var(--space-3);
            padding: var(--space-4);
            border-bottom: 1px solid var(--color-border-light);
            transition: background var(--transition-fast);
        }
        .pend-item:last-child { border-bottom: none; }
        .pend-item:hover { background: var(--color-surface-2); }
        .pend-item.realizado { opacity: 0.5; }
        .pend-item.realizado .pend-item__texto { text-decoration: line-through; }

        /* Checkbox grande y claro */
        .pend-check {
            width: 24px;
            height: 24px;
            border: 2px solid var(--color-border);
            border-radius: 6px;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            margin-top: 2px;
        }
        .pend-check:hover { border-color: var(--color-primary); background: var(--color-primary-xlight); }
        .pend-check.checked {
            background: var(--color-success);
            border-color: var(--color-success);
        }
        .pend-check.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .pend-item__body { flex: 1; min-width: 0; }

        .pend-item__texto {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--color-text-primary);
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .pend-item__meta {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-3);
            align-items: center;
        }

        .pend-item__side {
            display: flex;
            align-items: center;
            gap: var(--space-1);
            flex-shrink: 0;
        }

        /* Badge visibilidad */
        .vis-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: var(--radius-full);
        }
        .vis-todos  { background: var(--color-success-bg);  color: var(--color-success);  }
        .vis-admin  { background: var(--color-warning-bg);  color: var(--color-warning);  }

        /* ── FORMULARIO NUEVO PENDIENTE ──────────────────────── */
        .nuevo-form {
            display: flex;
            gap: var(--space-3);
            align-items: flex-end;
            padding: var(--space-4);
            background: var(--color-surface-2);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-4);
            flex-wrap: wrap;
        }

        .nuevo-form .form-group {
            margin: 0;
            flex: 1;
            min-width: 200px;
        }

        /* ── TABS ────────────────────────────────────────────── */
        .tabs-bar {
            display: flex;
            gap: var(--space-1);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-full);
            padding: var(--space-1);
            margin-bottom: var(--space-5);
            width: fit-content;
        }

        .tab-btn {
            padding: var(--space-2) var(--space-5);
            border: none;
            background: transparent;
            border-radius: var(--radius-full);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--color-text-secondary);
            transition: all var(--transition-fast);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .tab-btn .cnt {
            background: var(--color-border);
            color: var(--color-text-muted);
            border-radius: var(--radius-full);
            padding: 1px 7px;
            font-size: var(--text-xs);
            font-weight: 700;
        }

        .tab-btn.active {
            background: var(--color-primary);
            color: white;
        }

        .tab-btn.active .cnt {
            background: rgba(255,255,255,0.25);
            color: white;
        }

        @media (max-width: 600px) {
            .tabs-bar  { width: 100%; }
            .tab-btn   { flex: 1; justify-content: center; }
            .nuevo-form { flex-direction: column; }
            .nuevo-form .form-group { min-width: 100%; }
        }
    </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────── -->
<header class="admin-header">
    <div class="admin-header__brand">
        <span class="material-icons">cottage</span>
        Casa Verde Canas
    </div>
    <div class="admin-header__actions">
        <div class="user-chip">
            <span class="material-icons">person</span>
            <span id="userName">—</span>
        </div>
        <button class="btn-logout" onclick="CVC.cerrarSesion()">
            <span class="material-icons">logout</span>
            Salir
        </button>
    </div>
</header>

<!-- ── NAVEGACIÓN ──────────────────────────────────────────── -->
<nav class="admin-nav" id="appNav"></nav>

<!-- ── CONTENIDO ───────────────────────────────────────────── -->
<main class="admin-content">

    <!-- Formulario nuevo pendiente -->
    <div class="nuevo-form">
        <div class="form-group">
            <label class="form-label">Nuevo pendiente</label>
            <input type="text" id="nuevoPendiente" class="form-control"
                placeholder="Describí el pendiente..."
                onkeydown="if(event.key==='Enter') agregarPendiente()">
        </div>

        <!-- Visibilidad — solo admin puede elegir "solo admin" -->
        <div class="form-group" id="visibilidadGroup" style="min-width:160px; flex:0;">
            <label class="form-label">Visibilidad</label>
            <select id="nuevaVisibilidad" class="form-control">
                <option value="todos">👥 Todos</option>
                <option value="admin">🔒 Solo admin</option>
            </select>
        </div>

        <button class="btn btn-primary" onclick="agregarPendiente()" style="height:40px; flex:0; white-space:nowrap;">
            <span class="material-icons">add</span> Agregar
        </button>
    </div>

    <!-- Tabs -->
    <div class="tabs-bar">
        <button class="tab-btn active" data-tab="activos">
            Pendientes <span class="cnt" id="cntActivos">0</span>
        </button>
        <button class="tab-btn" data-tab="historial">
            Realizados <span class="cnt" id="cntHistorial">0</span>
        </button>
    </div>

    <!-- Lista activos -->
    <div id="tab-activos">
        <div class="card" style="padding:0;">
            <div id="listaActivos">
                <div class="state-loading" style="padding:var(--space-6);">
                    <div class="spinner"></div><span>Cargando...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Lista realizados -->
    <div id="tab-historial" style="display:none;">
        <div class="card" style="padding:0;">
            <div id="listaHistorial">
                <div class="state-loading" style="padding:var(--space-6);">
                    <div class="spinner"></div><span>Cargando...</span>
                </div>
            </div>
        </div>
    </div>

</main>

<!-- ── MODAL EDITAR PENDIENTE ───────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="cerrarModal(event)">
    <div class="modal modal--sm" onclick="event.stopPropagation()">

        <div class="modal__header">
            <div class="modal__title">
                <span class="material-icons">edit</span>
                Editar pendiente
            </div>
            <button class="modal__close" onclick="cerrarModal()">
                <span class="material-icons">close</span>
            </button>
        </div>

        <div class="modal__body">
            <input type="hidden" id="editId">

            <div class="form-group">
                <label class="form-label">Descripción</label>
                <textarea id="editTexto" class="form-control" rows="3"></textarea>
            </div>

            <div class="form-group" id="editVisGroup">
                <label class="form-label">Visibilidad</label>
                <select id="editVisibilidad" class="form-control">
                    <option value="todos">👥 Todos</option>
                    <option value="admin">🔒 Solo admin</option>
                </select>
            </div>

            <div class="alert alert-error" id="editError" style="display:none;">
                <span class="material-icons">error_outline</span>
                <span id="editErrorText"></span>
            </div>
        </div>

        <div class="modal__footer">
            <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="guardarEdicion()">
                <span class="material-icons">save</span> Guardar
            </button>
        </div>

    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="utils.js"></script>
<script>
(async () => {
    const { user, userData } = await CVC.verificarAuth(['admin', 'user']);
    document.getElementById('userName').textContent = userData.nombre || user.email;
    CVC.renderNav('pendientes.html', userData.rol);

    const db      = CVC.db;
    const esAdmin = userData.rol === 'admin';
    const { escapeHtml, showEmpty, showToast } = CVC;

    // Colaboradores solo pueden agregar con visibilidad "todos"
    if (!esAdmin) {
        document.getElementById('visibilidadGroup').style.display = 'none';
        document.getElementById('editVisGroup').style.display     = 'none';
    }

    let pendientesCache = [];
    let tabActual       = 'activos';

    // ── Cargar pendientes ─────────────────────────────────────
    async function cargarPendientes() {
        try {
            let query = db.collection('pendientes').orderBy('creadoEn', 'desc');
            const snap = await query.get();

            // Filtrar por visibilidad: colaboradores no ven los de admin
            pendientesCache = snap.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .filter(p => esAdmin || p.visibilidad !== 'admin');

        } catch(e) {
            CVC.showToast('Error al cargar pendientes: ' + e.message, 'error');
            return;
        }

        renderPendientes();
    }

    // ── Render ────────────────────────────────────────────────
    function renderPendientes() {
        const activos   = pendientesCache.filter(p => !p.realizado);
        const historial = pendientesCache.filter(p =>  p.realizado);

        document.getElementById('cntActivos').textContent   = activos.length;
        document.getElementById('cntHistorial').textContent = historial.length;

        renderLista('listaActivos',   activos,   false);
        renderLista('listaHistorial', historial, true);
    }

    function renderLista(containerId, lista, esHistorial) {
        const container = document.getElementById(containerId);
        if (!lista.length) {
            showEmpty(
                container,
                esHistorial ? 'Sin realizados' : '¡Sin pendientes!',
                esHistorial ? 'Aún no hay ítems realizados.' : 'Todo está al día.',
                esHistorial ? 'history' : 'task_alt'
            );
            return;
        }

        container.innerHTML = lista.map(p => {
            const fecha    = p.creadoEn?.toDate?.()?.toLocaleDateString('es-AR') || '—';
            const autor    = p.autorNombre || '—';
            const visBadge = p.visibilidad === 'admin'
                ? '<span class="vis-badge vis-admin">Solo admin</span>'
                : '<span class="vis-badge vis-todos">Todos</span>';

            // Quién puede editar / marcar: admin siempre, colaborador solo si visibilidad = todos
            const puedeModificar = esAdmin || p.visibilidad !== 'admin';

            const btnCheck = puedeModificar ? `
                <div class="pend-check ${p.realizado ? 'checked' : ''}"
                    onclick="toggleRealizado('${p.id}', ${!p.realizado})"
                    title="${p.realizado ? 'Marcar como pendiente' : 'Marcar como realizado'}">
                </div>` : `
                <div class="pend-check checked" style="cursor:default;"></div>`;

            const btnEditar = puedeModificar && !p.realizado ? `
                <button class="btn btn-ghost btn-sm" onclick="abrirEditar('${p.id}')" title="Editar">
                    <span class="material-icons">edit</span>
                </button>` : '';

            const btnEliminar = esAdmin ? `
                <button class="btn btn-danger btn-sm" onclick="eliminarPendiente('${p.id}')" title="Eliminar">
                    <span class="material-icons">delete</span>
                </button>` : '';

            const realizadoPor = p.realizadoPor
                ? `· Realizado por ${escapeHtml(p.realizadoPor)} el ${p.realizadoEn?.toDate?.()?.toLocaleDateString('es-AR') || '—'}`
                : '';

            return `
            <div class="pend-item ${p.realizado ? 'realizado' : ''}" id="pend-${p.id}">
                ${btnCheck}
                <div class="pend-item__body">
                    <div class="pend-item__texto">${escapeHtml(p.texto)}</div>
                    <div class="pend-item__meta">
                        <span>📅 ${fecha}</span>
                        <span>👤 ${escapeHtml(autor)}</span>
                        ${esAdmin ? visBadge : ''}
                        ${realizadoPor ? `<span style="color:var(--color-success);">${realizadoPor}</span>` : ''}
                    </div>
                </div>
                <div class="pend-item__side">
                    ${btnEditar}
                    ${btnEliminar}
                </div>
            </div>`;
        }).join('');
    }

    // ── Agregar pendiente ─────────────────────────────────────
    window.agregarPendiente = async function() {
        const texto = document.getElementById('nuevoPendiente').value.trim();
        if (!texto) {
            showToast('Escribí el pendiente antes de agregar.', 'error');
            return;
        }

        const visibilidad = esAdmin
            ? (document.getElementById('nuevaVisibilidad').value || 'todos')
            : 'todos';

        try {
            await db.collection('pendientes').add({
                texto,
                visibilidad,
                realizado:      false,
                autorId:        user.uid,
                autorNombre:    userData.nombre || user.email,
                creadoEn:       firebase.firestore.FieldValue.serverTimestamp(),
                realizadoPor:   null,
                realizadoEn:    null
            });

            document.getElementById('nuevoPendiente').value = '';
            if (esAdmin) document.getElementById('nuevaVisibilidad').value = 'todos';
            showToast('Pendiente agregado.', 'success');
            await cargarPendientes();

        } catch(e) {
            showToast('Error: ' + e.message, 'error');
        }
    };

    // ── Marcar realizado / pendiente ──────────────────────────
    window.toggleRealizado = async function(id, realizado) {
        const p = pendientesCache.find(x => x.id === id);
        if (!p) return;

        // Verificar permiso
        if (!esAdmin && p.visibilidad === 'admin') {
            showToast('No tenés permiso para modificar este pendiente.', 'error');
            return;
        }

        try {
            await db.collection('pendientes').doc(id).update({
                realizado,
                realizadoPor: realizado ? (userData.nombre || user.email) : null,
                realizadoEn:  realizado ? firebase.firestore.FieldValue.serverTimestamp() : null
            });
            showToast(realizado ? '✅ Marcado como realizado.' : '↩️ Marcado como pendiente.', 'success');
            await cargarPendientes();
        } catch(e) {
            showToast('Error: ' + e.message, 'error');
        }
    };

    // ── Editar pendiente ──────────────────────────────────────
    window.abrirEditar = function(id) {
        const p = pendientesCache.find(x => x.id === id);
        if (!p) return;

        document.getElementById('editId').value          = id;
        document.getElementById('editTexto').value       = p.texto || '';
        document.getElementById('editVisibilidad').value = p.visibilidad || 'todos';
        document.getElementById('editError').style.display = 'none';
        document.getElementById('modalOverlay').style.display = 'flex';
    };

    window.guardarEdicion = async function() {
        const id    = document.getElementById('editId').value;
        const texto = document.getElementById('editTexto').value.trim();

        document.getElementById('editError').style.display = 'none';
        if (!texto) {
            document.getElementById('editErrorText').textContent = 'El texto no puede estar vacío.';
            document.getElementById('editError').style.display = 'flex';
            return;
        }

        try {
            const updates = {
                texto,
                actualizadoEn: firebase.firestore.FieldValue.serverTimestamp()
            };
            if (esAdmin) {
                updates.visibilidad = document.getElementById('editVisibilidad').value;
            }

            await db.collection('pendientes').doc(id).update(updates);
            showToast('Pendiente actualizado.', 'success');
            document.getElementById('modalOverlay').style.display = 'none';
            await cargarPendientes();
        } catch(e) {
            document.getElementById('editErrorText').textContent = 'Error: ' + e.message;
            document.getElementById('editError').style.display = 'flex';
        }
    };

    // ── Eliminar pendiente (solo admin) ───────────────────────
    window.eliminarPendiente = async function(id) {
        if (!confirm('¿Eliminar este pendiente? No se puede deshacer.')) return;
        try {
            await db.collection('pendientes').doc(id).delete();
            showToast('Pendiente eliminado.', 'warning');
            await cargarPendientes();
        } catch(e) {
            showToast('Error: ' + e.message, 'error');
        }
    };

    window.cerrarModal = function(e) {
        if (e && e.target !== document.getElementById('modalOverlay')) return;
        document.getElementById('modalOverlay').style.display = 'none';
    };

    // ── Tabs ──────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            tabActual = btn.dataset.tab;
            document.getElementById('tab-activos').style.display   = tabActual === 'activos'   ? 'block' : 'none';
            document.getElementById('tab-historial').style.display = tabActual === 'historial' ? 'block' : 'none';
        });
    });

    // ── Reglas de Firestore necesarias ───────────────────────
    // En firestore.rules agregar:
    // match /pendientes/{doc} {
    //   allow read:  if request.auth != null;
    //   allow write: if request.auth != null;
    // }

    // ── Init ──────────────────────────────────────────────────
    await cargarPendientes();

})();
</script>
</body>
</html>
