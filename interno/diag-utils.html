<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnostico utils.js v2</title>
<style>
body { font-family: monospace; background:#111; color:#0f0; padding:16px; font-size:12px; }
.ok{color:#0f0;} .err{color:#f55;font-weight:bold;} .warn{color:#fa0;} .info{color:#8cf;}
#log { white-space: pre-wrap; }
</style>
</head>
<body>
<h2 style="color:#fff">Diagnostico utils.js v2</h2>
<div id="log"></div>
<script>
var log = document.getElementById('log');
function p(msg, cls) {
    log.innerHTML += '<span class="'+(cls||'ok')+'">' + msg + '</span>\n';
    log.scrollTop = log.scrollHeight;
}
p('[1] Pagina cargada','info');

// Capturar TODOS los errores con maximo detalle
window.onerror = function(msg, src, line, col, err) {
    p('[ERROR] ' + msg,'err');
    p('  archivo: ' + src,'err');
    p('  linea: ' + line + ' col: ' + col,'err');
    if (err && err.stack) p('  stack: ' + err.stack.split('\n')[0],'err');
    return false;
};
window.addEventListener('unhandledrejection', function(e) {
    p('[PROMISE ERROR] ' + (e.reason && e.reason.message || e.reason),'err');
});
</script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
p('[2] Firebase scripts cargados','ok');
</script>

<script src="utils.js"></script>

<script>
// Verificar resultado
setTimeout(function() {
    p('[3] Verificando CVC...','info');
    if (typeof window.CVC === 'undefined') {
        p('[3] ERROR: window.CVC no existe','err');
        p('    El script se interrumpio antes de llegar al final','err');
    } else {
        p('[3] window.CVC OK','ok');
        ['verificarAuth','renderNav','db','showToast','initAyuda'].forEach(function(fn) {
            p('  CVC.' + fn + ': ' + (typeof window.CVC[fn] !== 'undefined' ? 'OK' : 'FALTA'),
              typeof window.CVC[fn] !== 'undefined' ? 'ok' : 'err');
        });
        // Probar Firebase
        p('[4] Probando Firestore...','info');
        window.CVC.db.collection('usuarios').limit(1).get()
            .then(function() { p('[4] Firestore OK -- conecta a la BD','ok'); })
            .catch(function(e) { p('[4] Firestore ERROR: ' + e.message,'err'); });
        // Probar Auth
        window.CVC.auth.onAuthStateChanged(function(user) {
            p('[5] Auth: ' + (user ? 'logueado uid:' + user.uid.slice(0,8) : 'sin sesion'),'warn');
        });
    }
}, 300);
</script>
</body>
</html>
