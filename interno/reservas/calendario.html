<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ocupación por Unidad - Casa Verde</title>
    <link rel="stylesheet" href="../css/admin-style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@5.11.3/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@5.11.3/main.min.js"></script>

    <style>
        body { display: flex; margin: 0; background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .sidebar { width: 250px; position: fixed; height: 100vh; background: #2d5a27; color: white; z-index: 100; }
        .main-content { margin-left: 260px; width: calc(100% - 280px); padding: 20px; }
        #calendar { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: 85vh; }
        
        /* Colores según origen (Google/Airbnb vs Manual) */
        .fc-event-google { background-color: #ff5a5f !important; border: none !important; cursor: pointer; border-radius: 4px; }
        .fc-event-manual { background-color: #2d5a27 !important; border: none !important; cursor: pointer; border-radius: 4px; }
        
        .fc-resource-area { width: 180px !important; font-weight: bold; text-transform: uppercase; color: #2d5a27; }
        .fc-timeline-slot-label { font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="text-align:center; padding:20px; border-bottom:1px solid rgba(255,255,255,0.1);">Casa Verde</h2>
        <a href="dashboard.html" class="nav-link"><span class="material-icons">dashboard</span> Tareas</a>
        <a href="calendario.html" class="nav-link active"><span class="material-icons">calendar_view_day</span> Ocupación</a>
        <a href="reservas.html" class="nav-link"><span class="material-icons">list</span> Reservas</a>
        <a href="clientes.html" class="nav-link"><span class="material-icons">people</span> Clientes</a>
    </div>

    <div class="main-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h1>Disponibilidad en Tiempo Real</h1>
            <div style="font-size: 0.85rem; background: white; padding: 10px 20px; border-radius: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                <span style="color:#ff5a5f; font-weight:bold;">● Airbnb (Google)</span> | 
                <span style="color:#2d5a27; font-weight:bold;">● Directo (Manual)</span>
            </div>
        </div>
        <div id="calendar"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/auth-core.js"></script>

    <script>
        // Configuración de Google API (la que ya te funcionó)
        const GOOGLE_API_KEY = 'AIzaSyDluIIBwIJVkO9DEX4ghJQYhzJAnXtQoKs';
        const GOOGLE_CALENDARS = [
            { id: 'h5a1h0a8dg9rl0oufvq19hn05r4gbubg@import.calendar.google.com', resourceId: 'Cabaña 1', title: 'Cabaña 1' },
            { id: '60n7foetdu2qvsn16mi7is8j6i4ugm66@import.calendar.google.com', resourceId: 'Cabaña 2', title: 'Cabaña 2' },
            { id: '8i3hl5ppqi6al50kf7casj5n5vl9sp1j@import.calendar.google.com', resourceId: 'Suite', title: 'Suite' }
        ];

        async function fetchGoogleEvents(cal) {
            const now = new Date();
            const start = new Date(now.getFullYear(), now.getMonth() - 2, 1).toISOString();
            const end = new Date(now.getFullYear(), now.getMonth() + 6, 0).toISOString();
            const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?key=${GOOGLE_API_KEY}&timeMin=${start}&timeMax=${end}&singleEvents=true`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                return (data.items || []).map(event => ({
                    id: event.id,
                    resourceId: cal.resourceId,
                    title: event.summary || 'Ocupado',
                    start: event.start.dateTime || event.start.date,
                    end: event.end.dateTime || event.end.date,
                    className: 'fc-event-google',
                    extendedProps: { origen: 'google' }
                }));
            } catch (e) { console.error("Error en Google Cal:", cal.title, e); return []; }
        }

        async function fetchManualEvents() {
            try {
                const snap = await db.collection('reservas').get();
                return snap.docs.map(doc => {
                    const d = doc.data();
                    return {
                        id: doc.id,
                        resourceId: d.cabana, // Debe coincidir con 'Cabaña 1', 'Cabaña 2' o 'Suite'
                        title: d.nombre + " (Manual)",
                        start: d.checkIn,
                        end: d.checkOut,
                        className: 'fc-event-manual',
                        extendedProps: { origen: 'directa' }
                    };
                });
            } catch (e) { console.error("Error en Firebase:", e); return []; }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                schedulerLicenseKey: 'GPL-My-Project-Is-Open-Source',
                initialView: 'resourceTimelineMonth',
                locale: 'es',
                height: '100%',
                resourceAreaHeaderContent: 'Unidades',
                resources: [
                    { id: 'Cabaña 1', title: 'CABAÑA 1 (Frente)' },
                    { id: 'Cabaña 2', title: 'CABAÑA 2 (Abajo)' },
                    { id: 'Suite', title: 'SUITE (Loft)' }
                ],
                events: async function(info, successCallback, failureCallback) {
                    let allEvents = [];
                    // Cargar Google
                    for (const cal of GOOGLE_CALENDARS) {
                        const events = await fetchGoogleEvents(cal);
                        allEvents.push(...events);
                    }
                    // Cargar Manuales
                    const manual = await fetchManualEvents();
                    allEvents.push(...manual);
                    
                    successCallback(allEvents);
                },
                eventClick: function(info) {
                    const resId = info.event.id;
                    const origen = info.event.extendedProps.origen;
                    if(origen === 'directa') {
                        window.location.href = `pagos.html?id=${resId}`;
                    } else {
                        alert("Reserva de Airbnb: " + info.event.title);
                    }
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>
