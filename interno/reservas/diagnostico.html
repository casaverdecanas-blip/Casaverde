<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Sincronización - Casa Verde</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <style>
        body { font-family: sans-serif; padding: 20px; background: #1e3c2c; color: white; }
        .card { background: white; color: #333; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        pre { background: #222; color: #0f0; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 11px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { width: 100%; padding: 15px; background: #2d5a27; color: white; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h3>🔍 Reparador de Reservas Google</h3>
        <p>Introduce tus datos para analizar por qué aparecen como canceladas.</p>
        <input type="email" id="email" placeholder="Email (el que usas en Mis Tareas)">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btnDiag">Iniciar Diagnóstico y Reparación</button>
    </div>

    <div class="card">
        <h3>Resultados:</h3>
        <pre id="output">Esperando acción...</pre>
    </div>

    <script>
        // TU CONFIGURACIÓN EXACTA
        const firebaseConfig = {
            apiKey: "AIzaSyDluIIBwIJVkO9DEX4ghJQYhzJAnXtQoKs",
            authDomain: "tatareas-d8a80.firebaseapp.com",
            projectId: "tatareas-d8a80",
            storageBucket: "tatareas-d8a80.firebasestorage.app",
            messagingSenderId: "709332495480",
            appId: "1:709332495480:web:7060b2c75984352354918d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('btnDiag').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const output = document.getElementById('output');

            try {
                output.innerText = "Autenticando...";
                await firebase.auth().signInWithEmailAndPassword(email, pass);
                output.innerText = "✅ Conexión exitosa. Analizando base de datos...";

                // Buscamos en la colección de reservas (ajusta el nombre si es distinto)
                // Nota: He puesto 'reservas' porque es el estándar, si el nombre es otro cámbialo aquí abajo:
                const snapshot = await db.collection('reservas').limit(10).get();
                
                if(snapshot.empty) {
                    output.innerText += "\n⚠️ No se encontraron documentos en la colección 'reservas'.";
                    return;
                }

                let analizadas = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    analizadas.push({
                        id: doc.id,
                        nombre: data.nombre || data.summary,
                        status: data.status,
                        origen_google: !!data.googleEventId
                    });
                });

                output.innerText = "Datos encontrados:\n" + JSON.stringify(analizadas, null, 2);

            } catch (error) {
                console.error(error);
                output.innerText = "❌ Error: " + error.message;
            }
        };
    </script>
</body>
</html>
