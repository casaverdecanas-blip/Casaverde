<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Reservas - CasaVerdeCanas</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f5f7fa; min-height: 100vh; }
        
        /* Header */
        .header { background: #2d5a27; color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header h1 { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; }
        .user-info { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 40px; }
        .logout-btn { background: #e74c3c; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; color: white; display: flex; align-items: center; gap: 6px; }
        .back-btn { background: rgba(255,255,255,0.2); border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; color: white; display: flex; align-items: center; gap: 6px; text-decoration: none; }
        
        /* Navegación */
        .nav-tabs { background: white; padding: 0 30px; display: flex; gap: 5px; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
        .nav-tab { padding: 15px 25px; background: none; border: none; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 8px; color: #6c757d; transition: all 0.2s; }
        .nav-tab:hover { background: #f0f2f5; }
        .nav-tab.active { color: #2d5a27; border-bottom: 3px solid #2d5a27; background: white; }
        
        /* Contenido */
        .content { padding: 30px; max-width: 1400px; margin: 0 auto; }
        
        /* Tarjetas KPI */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 4px solid #2d5a27; }
        .kpi-number { font-size: 32px; font-weight: bold; color: #2d5a27; }
        .kpi-label { color: #6c757d; margin-top: 5px; }
        
        /* Lista de presupuestos recientes */
        .recent-list { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .recent-header { padding: 15px 20px; border-bottom: 1px solid #e9ecef; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .recent-header h3 { display: flex; align-items: center; gap: 8px; color: #2d5a27; }
        .btn-primary { background: #2d5a27; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
        .btn-secondary { background: #6c757d; color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; text-decoration: none; }
        
        .presupuesto-item { padding: 15px 20px; border-bottom: 1px solid #e9ecef; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .presupuesto-item:last-child { border-bottom: none; }
        .presupuesto-cliente { font-weight: 600; }
        .presupuesto-datos { font-size: 13px; color: #6c757d; }
        .estado-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .estado-pendiente { background: #fff3e0; color: #f39c12; }
        .estado-aprobado { background: #e8f5e9; color: #27ae60; }
        .estado-expirado { background: #fee2e2; color: #e74c3c; }
        
        .empty-state { text-align: center; padding: 50px; color: #9aa6b5; }
        .loading { text-align: center; padding: 50px; }
        .loading-spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid #e9ecef; border-top-color: #2d5a27; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) { .header { flex-direction: column; text-align: center; } .nav-tabs { justify-content: center; } .content { padding: 20px; } }
    </style>
</head>
<body>

<div id="loginContainer" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #1e3c2c 0%, #2d5a27 100%);">
    <div style="background: white; padding: 40px; border-radius: 24px; width: 350px; text-align: center;">
        <h2 style="color: #2d5a27; margin-bottom: 25px;">🔐 Reservas</h2>
        <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:12px;">
        <input type="password" id="password" placeholder="Contraseña" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:12px;">
        <button onclick="login()" style="width:100%; padding:12px; background:#2d5a27; color:white; border:none; border-radius:12px; cursor:pointer;">Ingresar</button>
        <div id="loginError" style="color:red; margin-top:10px;"></div>
        <div style="margin-top: 20px;">
            <a href="../index.html" style="color:#2d5a27;">← Volver a Mis Tareas</a>
        </div>
    </div>
</div>

<div id="mainPanel" style="display: none;">
    <div class="header">
        <h1><span class="material-icons">inventory</span> Gestión de Reservas</h1>
        <div class="user-info">
            <span class="material-icons">account_circle</span>
            <span id="userEmail"></span>
            <a href="../index.html" class="back-btn"><span class="material-icons">arrow_back</span> Tareas</a>
            <button class="logout-btn" onclick="logout()"><span class="material-icons">logout</span> Salir</button>
        </div>
    </div>
    
    <div class="nav-tabs">
        <button class="nav-tab active" data-tab="dashboard">📊 Dashboard</button>
        <button class="nav-tab" data-tab="presupuestos" onclick="window.location.href='presupuestos.html'">💰 Presupuestos</button>
        <button class="nav-tab" data-tab="nuevo" onclick="window.location.href='nuevo-presupuesto.html'">➕ Nuevo Presupuesto</button>
        <button class="nav-tab" data-tab="reservas" onclick="window.location.href='reservas.html'">📅 Reservas</button>
        <button class="nav-tab" data-tab="calendario" onclick="window.location.href='calendario.html'">🗓️ Calendario</button>
        <button class="nav-tab" data-tab="clientes" onclick="window.location.href='../clientes/index.html'">👥 Clientes</button>
    </div>
    
    <div class="content">
        <!-- KPIs -->
        <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-number" id="totalPresupuestos">0</div><div class="kpi-label">Presupuestos</div></div>
            <div class="kpi-card"><div class="kpi-number" id="presupuestosPendientes">0</div><div class="kpi-label">Pendientes</div></div>
            <div class="kpi-card"><div class="kpi-number" id="totalReservas">0</div><div class="kpi-label">Reservas Confirmadas</div></div>
            <div class="kpi-card"><div class="kpi-number" id="ocupacionActual">0%</div><div class="kpi-label">Ocupación actual</div></div>
        </div>
        
        <!-- Presupuestos Recientes -->
        <div class="recent-list">
            <div class="recent-header">
                <h3><span class="material-icons">receipt</span> Presupuestos Recientes</h3>
                <a href="presupuestos.html" class="btn-secondary">Ver todos →</a>
            </div>
            <div id="presupuestosRecientes"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDluIIBwIJVkO9DEX4ghJQYhzJAnXtQoKs",
        authDomain: "tatareas-d8a80.firebaseapp.com",
        projectId: "tatareas-d8a80",
        storageBucket: "tatareas-d8a80.firebasestorage.app",
        messagingSenderId: "709332495480",
        appId: "1:709332495480:web:7060b2c75984352354918d"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    let currentUser = null;
    
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('loginError');
        try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const userDoc = await db.collection('usuarios').doc(userCredential.user.uid).get();
            if (!userDoc.exists || userDoc.data().rol !== 'admin') {
                await auth.signOut();
                errorDiv.textContent = 'Acceso solo para administradores';
                return;
            }
            currentUser = userCredential.user;
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            document.getElementById('userEmail').textContent = currentUser.email;
            cargarDatos();
        } catch (error) {
            errorDiv.textContent = 'Email o contraseña incorrectos';
        }
    }
    
    function logout() { auth.signOut(); }
    
    async function cargarDatos() {
        try {
            // Cargar presupuestos
            const presupuestosSnap = await db.collection('presupuestos').orderBy('creadoEn', 'desc').limit(5).get();
            const presupuestos = [];
            presupuestosSnap.forEach(doc => presupuestos.push({ id: doc.id, ...doc.data() }));
            
            // Contadores
            const totalSnap = await db.collection('presupuestos').get();
            const pendientesSnap = await db.collection('presupuestos').where('estado', '==', 'pendiente').get();
            const reservasSnap = await db.collection('reservas').where('estado', 'in', ['confirmada', 'pagada_total']).get();
            
            document.getElementById('totalPresupuestos').textContent = totalSnap.size;
            document.getElementById('presupuestosPendientes').textContent = pendientesSnap.size;
            document.getElementById('totalReservas').textContent = reservasSnap.size;
            document.getElementById('ocupacionActual').textContent = Math.floor(Math.random() * 60 + 20) + '%'; // Placeholder
            
            // Renderizar lista
            const container = document.getElementById('presupuestosRecientes');
            if (presupuestos.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 No hay presupuestos aún. <a href="nuevo-presupuesto.html" style="color:#2d5a27;">Crear el primero →</a></div>';
                return;
            }
            
            let html = '';
            for (const p of presupuestos) {
                const checkIn = p.checkIn?.toDate?.() || new Date(p.checkIn);
                const estadoClass = p.estado === 'pendiente' ? 'estado-pendiente' : (p.estado === 'aprobado' ? 'estado-aprobado' : 'estado-expirado');
                const estadoTexto = p.estado === 'pendiente' ? 'Pendiente' : (p.estado === 'aprobado' ? 'Aprobado' : 'Expirado');
                html += `
                    <div class="presupuesto-item">
                        <div>
                            <div class="presupuesto-cliente">${escapeHtml(p.clienteNombre)}</div>
                            <div class="presupuesto-datos">🏠 Cabaña ${p.cabaña} | 📅 ${checkIn.toLocaleDateString('es-ES')} (${p.dias} días)</div>
                            <div class="presupuesto-datos">💰 ${p.moneda === 'USD' ? 'USD' : 'BRL'} ${p.total?.toFixed(2) || p.totalUSD?.toFixed(2) || p.totalBRL?.toFixed(2)}</div>
                        </div>
                        <div>
                            <span class="estado-badge ${estadoClass}">${estadoTexto}</span>
                            <a href="detalle-presupuesto.html?id=${p.id}" class="btn-secondary" style="margin-left: 10px;">Ver</a>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        } catch (error) {
            console.error('Error:', error);
        }
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }
    
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            const userDoc = await db.collection('usuarios').doc(user.uid).get();
            if (userDoc.exists && userDoc.data().rol === 'admin') {
                currentUser = user;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                document.getElementById('userEmail').textContent = currentUser.email;
                cargarDatos();
            } else { auth.signOut(); }
        }
    });
    
    window.login = login;
    window.logout = logout;
</script>
</body>
</html>
