<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Tareas - Casa Verde</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background: #f4f7f6; }
        .sidebar { width: 250px; background: #2d5a27; color: white; position: fixed; height: 100vh; }
        .main-content { margin-left: 250px; width: calc(100% - 250px); padding: 30px; }
        
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        .alerta-roja { background-color: #fee2e2 !important; border-left: 5px solid #ef4444; }
        .btn-cv { background: #2d5a27; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        .historial-item { background: #fff; padding: 12px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Modal simple */
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; }
        .modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); z-index:1001; width:90%; max-width:400px; background:white; padding:25px; border-radius:15px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="padding: 20px; text-align: center;">Casa Verde</h2>
    <a href="dashboard.html" style="color:white; display:block; padding:15px 25px; text-decoration:none; background:rgba(255,255,255,0.1);">Tareas</a>
    <a href="calendario.html" style="color:white; display:block; padding:15px 25px; text-decoration:none;">Calendario</a>
</div>

<div class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h1>Control de Mantenimiento</h1>
        <button class="btn-cv" onclick="abrirModal()"><span class="material-icons">add</span> AGREGAR TAREA</button>
    </div>

    <div class="card">
        <h3>Tareas Activas</h3>
        <table>
            <thead>
                <tr><th>Tarea</th><th>Frecuencia</th><th>Última Vez</th><th>Responsable</th><th>Acciones</th></tr>
            </thead>
            <tbody id="monitorBody"></tbody>
        </table>
    </div>

    <div class="card">
        <h3>Desempeño por Colaborador</h3>
        <select id="filtroColab" onchange="cargarHistorialColaborador()" style="width:100%; padding:12px; margin:15px 0; border-radius:8px; border:1px solid #ddd;">
            <option value="">Selecciona un colaborador...</option>
        </select>
        <div id="listaHistorialIndividual"></div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="cerrarModal()"></div>
<div class="modal" id="modalTarea">
    <h2 id="modalTitle">Nueva Tarea</h2>
    <input type="hidden" id="editId">
    <input type="text" id="taskName" placeholder="Nombre de tarea" style="width:100%; padding:10px; margin:10px 0;">
    <input type="number" id="taskRec" placeholder="Días para repetir" style="width:100%; padding:10px; margin:10px 0;">
    <textarea id="taskDesc" placeholder="Descripción" style="width:100%; padding:10px; margin:10px 0; height:60px;"></textarea>
    <button onclick="guardarTarea()" class="btn-cv" style="width:100%; justify-content:center;">GUARDAR TAREA</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    // Misma configuración Firebase
    firebase.initializeApp({
        apiKey: "AIzaSyDluIIBwIJVkO9DEX4ghJQYhzJAnXtQoKs",
        projectId: "tatareas-d8a80",
    });
    const db = firebase.firestore();

    async function loadDashboard() {
        const ahora = new Date();
        const [tSnap, hSnap] = await Promise.all([
            db.collection('tareas').where('activa', '==', true).get(),
            db.collection('historial').get()
        ]);

        const historial = hSnap.docs.map(d => d.data());
        
        let html = '';
        tSnap.forEach(doc => {
            const t = doc.data();
            const ultimo = historial.filter(h => h.tareaId === doc.id)
                                    .sort((a,b) => b.timestamp?.toDate() - a.timestamp?.toDate())[0];
            
            let vencida = true;
            if(ultimo && ultimo.timestamp) {
                const diff = (ahora - ultimo.timestamp.toDate()) / (1000 * 60 * 60 * 24);
                if(diff < t.recurrencia) vencida = false;
            }

            html += `<tr class="${vencida ? 'alerta-roja' : ''}">
                <td><b>${t.nombre}</b></td>
                <td>Cada ${t.recurrencia} días</td>
                <td>${ultimo ? ultimo.timestamp.toDate().toLocaleDateString() : '⚠️ Nunca'}</td>
                <td>${ultimo ? (ultimo.colaboradorNombre || 'Staff') : '--'}</td>
                <td>
                    <button onclick="abrirModal('${doc.id}','${t.nombre}',${t.recurrencia},'${t.descripcion}')">⚙️</button>
                </td>
            </tr>`;
        });
        document.getElementById('monitorBody').innerHTML = html;

        // Llenar select de colaboradores
        const colabs = [...new Set(historial.map(h => h.colaboradorNombre).filter(n => n))];
        let options = '<option value="">Selecciona un colaborador...</option>';
        colabs.forEach(c => options += `<option value="${c}">${c}</option>`);
        document.getElementById('filtroColab').innerHTML = options;
    }

    async function cargarHistorialColaborador() {
        const nombre = document.getElementById('filtroColab').value;
        const container = document.getElementById('listaHistorialIndividual');
        if(!nombre) { container.innerHTML = ''; return; }

        container.innerHTML = 'Cargando historial completo...';
        
        const [hSnap, tSnap] = await Promise.all([
            db.collection('historial').where('colaboradorNombre', '==', nombre).get(),
            db.collection('tareas').get()
        ]);

        const nombresT = {}; tSnap.forEach(d => nombresT[d.id] = d.data().nombre);
        
        const registros = hSnap.docs.map(d => d.data());
        registros.sort((a,b) => (b.timestamp?.toDate() || 0) - (a.timestamp?.toDate() || 0));

        container.innerHTML = registros.map(h => `
            <div class="historial-item">
                <span><b>${nombresT[h.tareaId] || 'Tarea Especial'}</b></span>
                <small>${h.timestamp ? h.timestamp.toDate().toLocaleString() : '--'}</small>
            </div>
        `).join('') || '<p>No hay registros.</p>';
    }

    function abrirModal(id='', n='', r=1, d='') {
        document.getElementById('editId').value = id;
        document.getElementById('taskName').value = n;
        document.getElementById('taskRec').value = r;
        document.getElementById('taskDesc').value = d;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modalTarea').style.display = 'block';
    }

    function cerrarModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('modalTarea').style.display = 'none'; }

    async function guardarTarea() {
        const id = document.getElementById('editId').value;
        const data = {
            nombre: document.getElementById('taskName').value,
            recurrencia: parseInt(document.getElementById('taskRec').value) || 1,
            descripcion: document.getElementById('taskDesc').value,
            activa: true,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };
        if(id) await db.collection('tareas').doc(id).update(data);
        else await db.collection('tareas').add(data);
        cerrarModal(); loadDashboard();
    }

    window.onload = loadDashboard;
</script>

</body>
</html>
