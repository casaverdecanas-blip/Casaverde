<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migración de Estructura - Tareas</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', monospace; }
        body { background: #0a0a0f; padding: 20px; color: #0f0; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #0f0; margin-bottom: 20px; border-bottom: 1px solid #0f0; padding-bottom: 10px; }
        .panel { background: #1a1a2a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        input, button { padding: 8px 12px; margin: 5px; border-radius: 4px; border: none; }
        button { background: #0f0; color: #000; cursor: pointer; font-weight: bold; }
        button:hover { background: #0c0; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .error { color: #f66; background: #2a1a1a; padding: 10px; border-radius: 4px; border-left: 4px solid #f00; }
        .success { color: #0f0; background: #1a2a1a; padding: 10px; border-radius: 4px; border-left: 4px solid #0f0; }
        .info { color: #ff0; background: #2a2a1a; padding: 10px; border-radius: 4px; border-left: 4px solid #ff0; }
        .warning { color: #f90; background: #2a2a1a; padding: 10px; border-radius: 4px; border-left: 4px solid #f90; }
        .log-area { background: #000; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 11px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { padding: 6px; text-align: left; border-bottom: 1px solid #333; }
        .progress-bar { width: 100%; height: 20px; background: #333; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: #0f0; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 MIGRACIÓN DE ESTRUCTURA</h1>
        <p style="margin-bottom: 20px; color: #aaa;">Este script migrará la estructura de tareas y historial al nuevo formato.</p>
        
        <div class="panel">
            <h3>🔐 Acceso</h3>
            <input type="email" id="email" placeholder="Email" value="casaverdecanas@gmail.com">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="login()">Iniciar Sesión</button>
            <div id="loginMsg"></div>
        </div>
        
        <div id="migracionPanel" style="display: none;">
            <div class="panel">
                <h3>📊 Estado Actual</h3>
                <button onclick="verEstadoActual()">🔍 Ver estado antes de migrar</button>
                <div id="estadoActual"></div>
            </div>
            
            <div class="panel">
                <h3>🚀 Ejecutar Migración</h3>
                <div class="progress-bar" id="progressBar" style="display: none;">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <button id="btnMigrar" onclick="ejecutarMigracion()" style="background: #f90;">▶ EJECUTAR MIGRACIÓN</button>
                <div id="logArea" class="log-area"></div>
            </div>
            
            <div class="panel">
                <h3>✅ Verificar Resultado</h3>
                <button onclick="verificarResultado()">🔍 Verificar después de migrar</button>
                <div id="resultado"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDluIIBwIJVkO9DEX4ghJQYhzJAnXtQoKs",
            authDomain: "tatareas-d8a80.firebaseapp.com",
            projectId: "tatareas-d8a80",
            storageBucket: "tatareas-d8a80.firebasestorage.app",
            messagingSenderId: "709332495480",
            appId: "1:709332495480:web:7060b2c75984352354918d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let logs = [];

        function addLog(msg, tipo = 'info') {
            const time = new Date().toLocaleTimeString();
            const logMsg = `[${time}] ${msg}`;
            logs.push(logMsg);
            const logDiv = document.getElementById('logArea');
            if (logDiv) {
                const color = tipo === 'error' ? '#f66' : (tipo === 'success' ? '#0f0' : (tipo === 'warning' ? '#f90' : '#ff0'));
                logDiv.innerHTML = logs.map(l => `<div style="color: ${color}">${escapeHtml(l)}</div>`).join('');
                logDiv.scrollTop = logDiv.scrollHeight;
            }
            console.log(logMsg);
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('loginMsg');
            
            msgDiv.innerHTML = '<div class="info">🔄 Autenticando...</div>';
            logs = [];
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                currentUser = userCredential.user;
                
                // Verificar si es admin
                const userDoc = await db.collection('usuarios').doc(currentUser.uid).get();
                if (!userDoc.exists || userDoc.data().rol !== 'admin') {
                    msgDiv.innerHTML = '<div class="error">❌ Acceso solo para administradores</div>';
                    return;
                }
                
                msgDiv.innerHTML = `<div class="success">✅ Conectado como admin: ${currentUser.email}</div>`;
                document.getElementById('migracionPanel').style.display = 'block';
                addLog('✅ Sesión iniciada como administrador', 'success');
            } catch (error) {
                msgDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        async function verEstadoActual() {
            const container = document.getElementById('estadoActual');
            container.innerHTML = '<div class="info">🔄 Cargando...</div>';
            
            try {
                const tareasSnap = await db.collection('tareas').get();
                const historialSnap = await db.collection('historial').get();
                
                const valoresRecurrencia = new Set();
                const camposTareas = new Set();
                const camposHistorial = new Set();
                
                tareasSnap.forEach(doc => {
                    Object.keys(doc.data()).forEach(c => camposTareas.add(c));
                    const r = doc.data().recurrencia;
                    if (r !== undefined) valoresRecurrencia.add(r);
                });
                
                historialSnap.forEach(doc => {
                    Object.keys(doc.data()).forEach(c => camposHistorial.add(c));
                });
                
                container.innerHTML = `
                    <div class="success">
                        <strong>📊 ESTADO ACTUAL:</strong><br>
                        📁 Tareas: ${tareasSnap.size} documentos<br>
                        📁 Historial: ${historialSnap.size} documentos<br><br>
                        <strong>📋 Campos en Tareas:</strong> ${[...camposTareas].sort().join(', ')}<br>
                        <strong>🔄 Valores de recurrencia:</strong> ${[...valoresRecurrencia].sort().join(', ')}<br>
                        <strong>📋 Campos en Historial:</strong> ${[...camposHistorial].sort().join(', ')}
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        async function ejecutarMigracion() {
            const btn = document.getElementById('btnMigrar');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            
            if (!confirm('⚠️ ¿Estás seguro de ejecutar la migración? Se modificará la estructura de tareas e historial.')) return;
            
            btn.disabled = true;
            progressBar.style.display = 'block';
            logs = [];
            addLog('🚀 INICIANDO MIGRACIÓN...', 'info');
            
            // Mapa de conversión de recurrencia
            const mapaRecurrencia = {
                'none': 0, 'daily': 1, 'biweekly': 3, 'weekly': 6, 'monthly': 28
            };
            
            // ============================================
            // 1. MIGRAR TAREAS
            // ============================================
            addLog('📁 Migrando colección "tareas"...', 'info');
            const tareasSnap = await db.collection('tareas').get();
            let tareasOk = 0, tareasError = 0;
            let total = tareasSnap.size;
            let procesadas = 0;
            
            for (const doc of tareasSnap.docs) {
                const data = doc.data();
                const updates = {};
                
                // Renombrar titulo → nombre
                if (data.titulo !== undefined) {
                    updates.nombre = data.titulo;
                    updates.titulo = firebase.firestore.FieldValue.delete();
                }
                
                // Convertir recurrencia a número
                if (data.recurrencia !== undefined) {
                    const nuevoValor = mapaRecurrencia[data.recurrencia];
                    if (nuevoValor !== undefined && nuevoValor !== data.recurrencia) {
                        updates.recurrencia = nuevoValor;
                    } else if (nuevoValor === undefined && typeof data.recurrencia !== 'number') {
                        updates.recurrencia = 0;
                    }
                }
                
                // Agregar dependencias si no existe
                if (data.dependencias === undefined) {
                    updates.dependencias = [];
                }
                
                // Asegurar timestamp (usar creadaEn si existe)
                if (data.timestamp === undefined && data.creadaEn !== undefined) {
                    updates.timestamp = data.creadaEn;
                }
                
                // Eliminar creadaEn si es redundante
                if (data.creadaEn !== undefined && data.timestamp !== undefined) {
                    updates.creadaEn = firebase.firestore.FieldValue.delete();
                }
                
                try {
                    if (Object.keys(updates).length > 0) {
                        await doc.ref.update(updates);
                        tareasOk++;
                    }
                } catch (e) {
                    tareasError++;
                    addLog(`❌ Error en tarea ${doc.id}: ${e.message}`, 'error');
                }
                
                procesadas++;
                progressFill.style.width = `${(procesadas / total) * 50}%`;
            }
            addLog(`✅ Tareas: ${tareasOk} actualizadas, ${tareasError} errores`, 'success');
            
            // ============================================
            // 2. MIGRAR HISTORIAL
            // ============================================
            addLog('📁 Migrando colección "historial"...', 'info');
            const historialSnap = await db.collection('historial').get();
            let historialOk = 0, historialError = 0;
            total = historialSnap.size;
            procesadas = 0;
            
            for (const doc of historialSnap.docs) {
                const data = doc.data();
                const updates = {};
                
                // Renombrar completadaPor → usuarioId
                if (data.completadaPor !== undefined) {
                    updates.usuarioId = data.completadaPor;
                    updates.completadaPor = firebase.firestore.FieldValue.delete();
                }
                
                // Eliminar campos redundantes
                const camposEliminar = ['completadaPorEmail', 'completadaPorNombre', 'titulo'];
                camposEliminar.forEach(campo => {
                    if (data[campo] !== undefined) {
                        updates[campo] = firebase.firestore.FieldValue.delete();
                    }
                });
                
                // Renombrar fecha → timestamp
                if (data.fecha !== undefined && data.timestamp === undefined) {
                    updates.timestamp = data.fecha;
                    updates.fecha = firebase.firestore.FieldValue.delete();
                }
                
                try {
                    if (Object.keys(updates).length > 0) {
                        await doc.ref.update(updates);
                        historialOk++;
                    }
                } catch (e) {
                    historialError++;
                    addLog(`❌ Error en historial ${doc.id}: ${e.message}`, 'error');
                }
                
                procesadas++;
                progressFill.style.width = `${50 + (procesadas / total) * 50}%`;
            }
            addLog(`✅ Historial: ${historialOk} actualizados, ${historialError} errores`, 'success');
            
            // ============================================
            // 3. FINALIZAR
            // ============================================
            addLog('🎉 MIGRACIÓN COMPLETADA', 'success');
            addLog('📌 Nueva estructura:', 'info');
            addLog('   tareas: { nombre, descripcion, prioridad, recurrencia (número), activa, dependencias (array), timestamp }', 'info');
            addLog('   historial: { tareaId, usuarioId, timestamp }', 'info');
            addLog('   usuarios: SIN MODIFICAR', 'info');
            
            btn.disabled = false;
            setTimeout(() => { progressBar.style.display = 'none'; }, 2000);
            
            // Actualizar estado
            await verEstadoActual();
        }
        
        async function verificarResultado() {
            const container = document.getElementById('resultado');
            container.innerHTML = '<div class="info">🔄 Verificando...</div>';
            
            try {
                const tareasSnap = await db.collection('tareas').limit(5).get();
                const historialSnap = await db.collection('historial').limit(5).get();
                
                let tareasHtml = '<strong>📁 Ejemplo de tareas migradas:</strong><div class="table-wrapper"><table><thead><th>ID</th><th>nombre</th><th>recurrencia</th><th>dependencias</th></thead><tbody>';
                tareasSnap.forEach(doc => {
                    const data = doc.data();
                    tareasHtml += `<tr>
                        <td><small>${doc.id.substring(0,12)}...</small></td>
                        <td>${escapeHtml(data.nombre || data.titulo || '-')}</td>
                        <td>${data.recurrencia !== undefined ? data.recurrencia : '-'}</td>
                        <td>${data.dependencias ? JSON.stringify(data.dependencias) : '[]'}</td>
                    </tr>`;
                });
                tareasHtml += '</tbody></table></div>';
                
                let historialHtml = '<strong>📁 Ejemplo de historial migrado:</strong><div class="table-wrapper"><table><thead><th>ID</th><th>tareaId</th><th>usuarioId</th><th>timestamp</th></thead><tbody>';
                historialSnap.forEach(doc => {
                    const data = doc.data();
                    historialHtml += `<tr>
                        <td><small>${doc.id.substring(0,12)}...</small></td>
                        <td><small>${data.tareaId ? data.tareaId.substring(0,12) + '...' : '-'}</small></td>
                        <td><small>${data.usuarioId ? data.usuarioId.substring(0,12) + '...' : '-'}</small></td>
                        <td>${data.timestamp ? '✅' : '❌'}</td>
                    </tr>`;
                });
                historialHtml += '</tbody></table></div>';
                
                container.innerHTML = `<div class="success">${tareasHtml}<br><br>${historialHtml}</div>`;
            } catch (error) {
                container.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
