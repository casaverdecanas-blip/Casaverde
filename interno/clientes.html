<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes · Casa Verde Canas</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="design-system.css">
    <style>
        .reserva-mini {
            background: var(--color-surface-2);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            margin-bottom: var(--space-2);
            font-size: var(--text-sm);
            line-height: 1.8;
            border-left: 4px solid var(--color-primary);
        }
        .reserva-mini.anulada    { border-left-color: var(--color-danger);  opacity: 0.7; }
        .reserva-mini.finalizada { border-left-color: var(--color-info); }
        .reserva-mini.pendiente  { border-left-color: var(--color-warning); }

        .wa-link {
            color: #25D366;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: var(--text-sm);
        }
        .wa-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────── -->
<header class="admin-header">
    <div class="admin-header__brand">
        <span class="material-icons">cottage</span>
        Casa Verde Canas
    </div>
    <div class="admin-header__actions">
        <div class="user-chip">
            <span class="material-icons">person</span>
            <span id="userName">—</span>
        </div>
        <button class="btn-logout" onclick="CVC.cerrarSesion()">
            <span class="material-icons">logout</span>
            Salir
        </button>
    </div>
</header>

<!-- ── NAVEGACIÓN ──────────────────────────────────────────── -->
<nav class="admin-nav" id="appNav"></nav>

<!-- ── CONTENIDO ───────────────────────────────────────────── -->
<main class="admin-content">
    <div class="card">
        <div class="card__header">
            <h2 class="card__title">
                <span class="material-icons">people</span>
                Clientes
            </h2>
            <button class="btn btn-primary" onclick="abrirModalNuevo()">
                <span class="material-icons">person_add</span>
                Nuevo cliente
            </button>
        </div>

        <div class="toolbar">
            <div class="toolbar__search">
                <span class="material-icons">search</span>
                <input type="text" id="busqueda" placeholder="Buscar por nombre, email o WhatsApp...">
            </div>
        </div>

        <div id="clientesContainer">
            <div class="state-loading"><div class="spinner"></div><span>Cargando clientes...</span></div>
        </div>
    </div>
</main>

<!-- ── MODAL CLIENTE ────────────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="cerrarModal(event)">
    <div class="modal modal--lg" onclick="event.stopPropagation()">

        <div class="modal__header">
            <div class="modal__title" id="modalTitulo">
                <span class="material-icons">person</span>
                Nuevo cliente
            </div>
            <button class="modal__close" onclick="cerrarModal()">
                <span class="material-icons">close</span>
            </button>
        </div>

        <div class="modal__body">
            <input type="hidden" id="clienteId">

            <div class="form-group">
                <label class="form-label">Nombre completo <span class="required">*</span></label>
                <input type="text" id="nombre" class="form-control" placeholder="Juan García">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">WhatsApp</label>
                    <input type="text" id="whatsapp" class="form-control" placeholder="+55 48 9...">
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="emailCliente" class="form-control" placeholder="juan@email.com">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Nacionalidad</label>
                <input type="text" id="nacionalidad" class="form-control" placeholder="Argentina">
            </div>

            <!-- Historial de reservas (solo al editar) -->
            <div id="historialContainer"></div>

            <div class="alert alert-error" id="errorModal" style="display:none;">
                <span class="material-icons">error_outline</span>
                <span id="errorModalText"></span>
            </div>
        </div>

        <div class="modal__footer">
            <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
            <button class="btn btn-primary" id="btnGuardar" onclick="guardarCliente()">
                <span class="material-icons">save</span>
                <span id="btnGuardarText">Guardar</span>
            </button>
        </div>

    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="utils.js"></script>
<script>
(async () => {
    const { user, userData } = await CVC.verificarAuth(['admin', 'user']);
    document.getElementById('userName').textContent = userData.nombre || user.email;
    CVC.renderNav('clientes.html', userData.rol);
    if (typeof CVC.initAyuda === 'function') CVC.initAyuda('clientes.html');

    const db = CVC.db;
    const { escapeHtml, badgeEstado, formatFecha, showEmpty, showError, showToast } = CVC;

    let clientesCache = [];
    let reservasCache = [];

    // ── Cargar todo en paralelo ───────────────────────────────
    async function cargarTodo() {
        try {
            const [clientesSnap, reservasSnap] = await Promise.all([
                db.collection('clientes').get(),
                db.collection('reservas').get()
            ]);
            // Ordenar en cliente para evitar índices compuestos en Firestore
            clientesCache = clientesSnap.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
            reservasCache = reservasSnap.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .sort((a, b) => (b.checkIn?.toDate?.()?.getTime() || 0) - (a.checkIn?.toDate?.()?.getTime() || 0));
            renderClientes();
        } catch (e) {
            showError('#clientesContainer', 'Error al cargar clientes', e.message, cargarTodo);
        }
    }

    // ── Render tabla ──────────────────────────────────────────
    function renderClientes() {
        const q     = document.getElementById('busqueda').value.toLowerCase().trim();
        const lista = q
            ? clientesCache.filter(c =>
                (c.nombre    || '').toLowerCase().includes(q) ||
                (c.email     || '').toLowerCase().includes(q) ||
                (c.whatsapp  || '').toLowerCase().includes(q))
            : clientesCache;

        const container = document.getElementById('clientesContainer');

        if (!lista.length) {
            showEmpty(container, 'Sin clientes', q ? 'No hay clientes que coincidan con la búsqueda.' : 'Aún no hay clientes registrados.', 'people');
            return;
        }

        // Stats por cliente en memoria
        const reservasPor = {};
        const gastosPor   = {};
        reservasCache.forEach(r => {
            if (!r.clienteId) return;
            reservasPor[r.clienteId] = (reservasPor[r.clienteId] || 0) + 1;
            if (r.estado !== 'anulada') {
                gastosPor[r.clienteId] = (gastosPor[r.clienteId] || 0) + (r.totalBRL || 0);
            }
        });

        const rows = lista.map(c => `
            <tr>
                <td data-label="Nombre"><strong>${escapeHtml(c.nombre || '—')}</strong></td>
                <td data-label="WhatsApp">
                    ${c.whatsapp
                        ? `<a class="wa-link" href="https://wa.me/${c.whatsapp.replace(/\D/g,'')}" target="_blank" rel="noopener">
                               <span class="material-icons" style="font-size:15px;">chat</span>${escapeHtml(c.whatsapp)}
                           </a>`
                        : '<span class="text-muted">—</span>'}
                </td>
                <td data-label="Email" class="text-muted text-sm">${escapeHtml(c.email || '—')}</td>
                <td data-label="País">
                    ${c.nacionalidad ? `<span class="badge badge-neutral">${escapeHtml(c.nacionalidad)}</span>` : '<span class="text-muted">—</span>'}
                </td>
                <td data-label="Reservas" style="font-weight:700; color:var(--color-primary);">
                    ${reservasPor[c.id] || 0}
                </td>
                <td data-label="Total gastado" class="text-mono">
                    ${gastosPor[c.id] ? `R$ ${gastosPor[c.id].toLocaleString('pt-BR',{minimumFractionDigits:2})}` : '<span class="text-muted">—</span>'}
                </td>
                <td data-label="Acciones">
                    <div style="display:flex; gap:var(--space-2);">
                        <button class="btn btn-secondary btn-sm" onclick="abrirModalEditar('${c.id}')"
                            title="Ver y editar cliente">
                            <span class="material-icons">edit</span>
                        </button>
                        <button class="btn btn-danger btn-sm"
                            onclick="eliminarCliente('${c.id}', '${escapeHtml(c.nombre)}')"
                            title="Eliminar cliente">
                            <span class="material-icons">delete</span>
                        </button>
                    </div>
                </td>
            </tr>`).join('');

        container.innerHTML = `
            <div class="table-container">
                <table class="table table-responsive">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>WhatsApp</th>
                            <th>Email</th>
                            <th>País</th>
                            <th>Reservas</th>
                            <th>Total gastado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
    }

    document.getElementById('busqueda').addEventListener('input', renderClientes);

    // ── Modal nuevo ───────────────────────────────────────────
    window.abrirModalNuevo = function() {
        document.getElementById('modalTitulo').innerHTML = '<span class="material-icons">person_add</span> Nuevo cliente';
        document.getElementById('clienteId').value      = '';
        document.getElementById('nombre').value         = '';
        document.getElementById('whatsapp').value       = '';
        document.getElementById('emailCliente').value   = '';
        document.getElementById('nacionalidad').value   = '';
        document.getElementById('historialContainer').innerHTML = '';
        document.getElementById('errorModal').style.display    = 'none';
        document.getElementById('modalOverlay').style.display  = 'flex';
        setTimeout(() => document.getElementById('nombre').focus(), 100);
    };

    // ── Modal editar ──────────────────────────────────────────
    window.abrirModalEditar = function(id) {
        const c = clientesCache.find(x => x.id === id);
        if (!c) return;

        document.getElementById('modalTitulo').innerHTML  = '<span class="material-icons">edit</span> Editar cliente';
        document.getElementById('clienteId').value        = id;
        document.getElementById('nombre').value           = c.nombre       || '';
        document.getElementById('whatsapp').value         = c.whatsapp     || '';
        document.getElementById('emailCliente').value     = c.email        || '';
        document.getElementById('nacionalidad').value     = c.nacionalidad || '';
        document.getElementById('errorModal').style.display = 'none';

        // Historial de reservas en memoria
        const reservasCliente = reservasCache
            .filter(r => r.clienteId === id)
            .sort((a, b) => (b.checkIn?.toDate?.() || 0) - (a.checkIn?.toDate?.() || 0));

        const histEl = document.getElementById('historialContainer');
        if (reservasCliente.length) {
            histEl.innerHTML = `
                <p class="section-title" style="margin-top:var(--space-5);">
                    Historial de reservas (${reservasCliente.length})
                </p>
                ${reservasCliente.map(r => `
                    <div class="reserva-mini ${r.estado}">
                        <strong>Cabaña ${r.caba}</strong>
                        · ${formatFecha(r.checkIn)} → ${formatFecha(r.checkOut)}<br>
                        ${r.huespedes || r.adultos || '?'} huésped(es)
                        · R$ ${(r.totalBRL||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}
                        · ${badgeEstado(r.estado)}
                    </div>`).join('')}`;
        } else {
            histEl.innerHTML = `
                <p class="section-title" style="margin-top:var(--space-5);">Historial de reservas</p>
                <p class="text-muted text-sm">Sin reservas registradas.</p>`;
        }

        document.getElementById('modalOverlay').style.display = 'flex';
    };

    window.cerrarModal = function(e) {
        if (e && e.target !== document.getElementById('modalOverlay')) return;
        document.getElementById('modalOverlay').style.display = 'none';
    };

    // ── Guardar cliente ───────────────────────────────────────
    window.guardarCliente = async function() {
        const id     = document.getElementById('clienteId').value;
        const nombre = document.getElementById('nombre').value.trim();

        document.getElementById('errorModal').style.display = 'none';

        if (!nombre) { mostrarErrorModal('El nombre es obligatorio.'); return; }

        const btn  = document.getElementById('btnGuardar');
        const text = document.getElementById('btnGuardarText');
        btn.disabled     = true;
        text.textContent = 'Guardando...';

        try {
            const data = {
                nombre,
                whatsapp:      document.getElementById('whatsapp').value.trim(),
                email:         document.getElementById('emailCliente').value.trim(),
                nacionalidad:  document.getElementById('nacionalidad').value.trim(),
                actualizadoEn: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (id) {
                await db.collection('clientes').doc(id).update(data);
                showToast('Cliente actualizado.', 'success');
            } else {
                data.creadoEn  = firebase.firestore.FieldValue.serverTimestamp();
                data.creadoPor = user.uid;
                await db.collection('clientes').add(data);
                showToast('Cliente creado.', 'success');
            }

            document.getElementById('modalOverlay').style.display = 'none';
            await cargarTodo();

        } catch (e) {
            mostrarErrorModal('Error: ' + e.message);
        } finally {
            btn.disabled     = false;
            text.textContent = 'Guardar';
        }
    };

    function mostrarErrorModal(msg) {
        document.getElementById('errorModalText').textContent = msg;
        document.getElementById('errorModal').style.display   = 'flex';
    }

    // ── Eliminar cliente ──────────────────────────────────────
    window.eliminarCliente = async function(id, nombre) {
        const cant = reservasCache.filter(r => r.clienteId === id).length;
        const msg  = cant
            ? `¿Eliminar a "${nombre}"?\n\n⚠️ Tiene ${cant} reserva(s) asociada(s). Las reservas no se eliminarán pero quedarán sin referencia al cliente.`
            : `¿Eliminar a "${nombre}"?`;
        if (!confirm(msg)) return;
        try {
            await db.collection('clientes').doc(id).delete();
            showToast('Cliente eliminado.', 'warning');
            await cargarTodo();
        } catch (e) {
            showToast('Error: ' + e.message, 'error');
        }
    };

    // ── Init ──────────────────────────────────────────────────
    await cargarTodo();

    const params = new URLSearchParams(window.location.search);
    if (params.get('nuevo')) abrirModalNuevo();

})();
</script>
</body>
</html>
