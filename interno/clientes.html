<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clientes - Casa Verde</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="sidebar">
        <h2>Casa Verde</h2>
        <a href="dashboard.html" class="nav-link"><span class="material-icons">dashboard</span> Tareas</a>
        <a href="reservas.html" class="nav-link"><span class="material-icons">event_available</span> Reservas</a>
        <a href="clientes.html" class="nav-link active"><span class="material-icons">people</span> Clientes</a>
    </div>

    <div class="main-content">
        <h1>Base de Clientes</h1>
        <div class="card">
            <input type="text" id="searchClient" placeholder="Buscar por nombre o país..." onkeyup="filtrarClientes()" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;">
        </div>
        <div class="card" style="margin-top:20px;">
            <table id="clientTable">
                <thead><tr><th>Nombre</th><th>Email / Tel</th><th>Procedencia</th><th>Notas</th></tr></thead>
                <tbody id="clientBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/auth-core.js"></script>
    <script>
        async function loadClients() {
            // Un truco: también podemos cargar clientes desde la colección de 'reservas' automáticamente
            const snap = await db.collection('reservas').get();
            const uniqueClients = {};
            snap.forEach(doc => {
                const r = doc.data();
                uniqueClients[r.nombre] = { nombre: r.nombre, plataforma: r.origen };
            });

            let html = '';
            Object.values(uniqueClients).forEach(c => {
                html += `<tr>
                    <td><b>${c.nombre}</b></td>
                    <td>--</td>
                    <td>${c.plataforma}</td>
                    <td>Huésped recurrente</td>
                </tr>`;
            });
            document.getElementById('clientBody').innerHTML = html;
        }
        window.onload = () => setTimeout(loadClients, 1000);
    </script>
</body>
</html>
