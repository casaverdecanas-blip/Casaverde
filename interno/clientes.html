<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Casa Verde Canas</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f7fa; }
        .admin-header { background: #2d5a27; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .admin-nav { background: white; padding: 0 25px; display: flex; gap: 5px; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
        .nav-item { padding: 14px 20px; background: none; border: none; cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; color: #6c757d; text-decoration: none; }
        .nav-item.active { color: #2d5a27; border-bottom: 3px solid #2d5a27; }
        .admin-content { max-width: 1400px; margin: 30px auto; padding: 0 25px; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h2 { color: #2d5a27; margin-bottom: 20px; border-bottom: 2px solid #e8f5e9; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
        .btn-primary { background: #2d5a27; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid #e9ecef; }
        .data-table th { background: #f8f9fa; color: #2d5a27; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:white; padding:30px; border-radius:20px; width:90%; max-width:500px; }
        @media (max-width:768px){ .form-row{ grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div id="loginContainer" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div style="background:white; padding:40px; border-radius:24px; width:350px; text-align:center;">
        <h2>👥 Clientes</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>
        <div id="loginError" style="color:red;"></div>
    </div>
</div>
<div id="mainPanel" style="display:none;">
    <div class="admin-header"><h1>👥 Clientes</h1><div><span id="userEmail"></span><button class="btn-secondary" onclick="logout()">Salir</button></div></div>
    <div class="admin-nav">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="reservas.html" class="nav-item">Reservas</a>
        <a href="presupuestos.html" class="nav-item">Presupuestos</a>
        <a href="cabanas-admin.html" class="nav-item">Cabañas</a>
        <a href="clientes.html" class="nav-item active">Clientes</a>
        <a href="pagos.html" class="nav-item">Pagos</a>
    </div>
    <div class="admin-content">
        <div class="card"><h2>Lista de Clientes</h2><button class="btn-primary" onclick="nuevoCliente()">+ Nuevo Cliente</button><div id="clientesList"></div></div>
    </div>
</div>
<!-- Modal Cliente -->
<div id="modalCliente" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Nuevo Cliente</h3>
        <input type="hidden" id="clienteId">
        <div class="form-group"><label>Nombre completo *</label><input type="text" id="nombre"></div>
        <div class="form-row"><div class="form-group"><label>WhatsApp</label><input type="text" id="whatsapp"></div><div class="form-group"><label>Email</label><input type="email" id="emailCliente"></div></div>
        <div class="form-group"><label>Nacionalidad</label><input type="text" id="nacionalidad"></div>
        <div><button class="btn-success" onclick="guardarCliente()">Guardar</button><button class="btn-secondary" onclick="cerrarModal()">Cancelar</button></div>
    </div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4", authDomain: "casaverdecanas-199.firebaseapp.com", projectId: "casaverdecanas-199" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUser = null;

    async function login() {
        const email = document.getElementById('email').value, password = document.getElementById('password').value;
        try {
            const cred = await auth.signInWithEmailAndPassword(email, password);
            const userDoc = await db.collection('usuarios').doc(cred.user.uid).get();
            if(userDoc.exists && userDoc.data().rol === 'admin') {
                currentUser = cred.user;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                document.getElementById('userEmail').textContent = email;
                cargarClientes();
            } else alert('No eres admin');
        } catch(e) { document.getElementById('loginError').innerText = e.message; }
    }
    function logout() { auth.signOut().then(()=>location.reload()); }

    async function cargarClientes() {
        const snap = await db.collection('clientes').orderBy('nombre').get();
        const container = document.getElementById('clientesList');
        if(snap.empty) { container.innerHTML = '<div>No hay clientes</div>'; return; }
        let html = `<table class="data-table"><thead><th>Nombre</th><th>WhatsApp</th><th>Email</th><th>Nacionalidad</th><th>Reservas</th><th>Acciones</th></thead><tbody>`;
        for(const doc of snap.docs){
            const c = doc.data();
            const reservasSnap = await db.collection('reservas').where('nombre','==',c.nombre).get();
            html += `<tr>
                <td>${escapeHtml(c.nombre)}</td><td>${escapeHtml(c.whatsapp||'-')}</td><td>${escapeHtml(c.email||'-')}</td><td>${escapeHtml(c.nacionalidad||'-')}</td>
                <td>${reservasSnap.size}</td><td><button class="btn-sm btn-primary" onclick="editarCliente('${doc.id}')">Editar</button> <button class="btn-sm btn-danger" onclick="eliminarCliente('${doc.id}')">Eliminar</button></td>
            </tr>`;
        }
        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    function nuevoCliente() {
        document.getElementById('modalTitle').innerText = 'Nuevo Cliente';
        document.getElementById('clienteId').value = '';
        document.getElementById('nombre').value = '';
        document.getElementById('whatsapp').value = '';
        document.getElementById('emailCliente').value = '';
        document.getElementById('nacionalidad').value = '';
        document.getElementById('modalCliente').style.display = 'flex';
    }

    async function editarCliente(id) {
        const doc = await db.collection('clientes').doc(id).get();
        if(!doc.exists) return;
        const c = doc.data();
        document.getElementById('modalTitle').innerText = 'Editar Cliente';
        document.getElementById('clienteId').value = id;
        document.getElementById('nombre').value = c.nombre || '';
        document.getElementById('whatsapp').value = c.whatsapp || '';
        document.getElementById('emailCliente').value = c.email || '';
        document.getElementById('nacionalidad').value = c.nacionalidad || '';
        document.getElementById('modalCliente').style.display = 'flex';
    }

    async function guardarCliente() {
        const id = document.getElementById('clienteId').value;
        const nombre = document.getElementById('nombre').value.trim();
        if(!nombre) { alert('El nombre es obligatorio'); return; }
        const data = {
            nombre: nombre,
            whatsapp: document.getElementById('whatsapp').value,
            email: document.getElementById('emailCliente').value,
            nacionalidad: document.getElementById('nacionalidad').value,
            actualizadoEn: firebase.firestore.FieldValue.serverTimestamp()
        };
        if(!id) data.creadoEn = firebase.firestore.FieldValue.serverTimestamp();
        try {
            if(id) await db.collection('clientes').doc(id).update(data);
            else await db.collection('clientes').add(data);
            alert('Cliente guardado');
            cerrarModal();
            cargarClientes();
        } catch(e) { alert('Error: '+e.message); }
    }

    async function eliminarCliente(id) {
        if(confirm('¿Eliminar cliente? Se eliminará de la base de datos, pero las reservas quedarán con el nombre.')) {
            await db.collection('clientes').doc(id).delete();
            cargarClientes();
        }
    }

    function cerrarModal() { document.getElementById('modalCliente').style.display = 'none'; }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]||m));
    }

    window.nuevoCliente = nuevoCliente; window.editarCliente = editarCliente; window.guardarCliente = guardarCliente; window.eliminarCliente = eliminarCliente; window.cerrarModal = cerrarModal;
    window.login = login; window.logout = logout;
    auth.onAuthStateChanged(user=>{ if(user) login(); });
</script>
</body>
</html>
