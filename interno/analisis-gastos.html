<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis de gastos · Casa Verde Canas</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        .ag-filtros { display: flex; gap: var(--space-2); align-items: center; flex-wrap: wrap; margin-bottom: var(--space-4); }
        .ag-filtros select {
            font-family: inherit; font-size: var(--text-sm); padding: 7px var(--space-3);
            border: 1.5px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface);
        }
        .ag-chip {
            border: 1.5px solid var(--color-border); background: var(--color-surface);
            color: var(--color-text-secondary); border-radius: 99px; padding: 5px 14px;
            font-size: var(--text-xs); font-weight: 700; cursor: pointer; font-family: inherit;
        }
        .ag-chip.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
        .ag-total { background: var(--color-primary-xlight); border: 1px solid var(--color-primary-light); border-radius: var(--radius-lg); padding: var(--space-4) var(--space-5); margin-bottom: var(--space-4); }
        .ag-total .n { font-family: var(--font-mono); font-size: 30px; font-weight: 700; color: var(--color-primary-dark); }
        .ag-total .s { font-size: var(--text-sm); color: var(--color-text-muted); }
        .ag-cat { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); margin-bottom: var(--space-2); overflow: hidden; }
        .ag-cat__head { padding: var(--space-3) var(--space-4); cursor: pointer; }
        .ag-cat__top { display: flex; justify-content: space-between; align-items: baseline; gap: var(--space-3); margin-bottom: 6px; }
        .ag-cat__nom { font-weight: 600; text-transform: capitalize; }
        .ag-cat__val { font-family: var(--font-mono); font-weight: 700; color: var(--color-text-primary); }
        .ag-cat__sub { font-size: var(--text-xs); color: var(--color-text-muted); }
        .ag-bar { height: 8px; background: var(--color-surface-2); border-radius: 99px; overflow: hidden; }
        .ag-bar__fill { height: 100%; background: var(--color-primary); border-radius: 99px; }
        .ag-cat__body { display: none; border-top: 1px solid var(--color-border-light); background: var(--color-surface-2); }
        .ag-cat__body.open { display: block; }
        .ag-det { display: flex; justify-content: space-between; gap: var(--space-3); padding: 8px var(--space-4); font-size: var(--text-sm); border-bottom: 1px solid var(--color-border-light); }
        .ag-det:last-child { border-bottom: none; }
        .ag-det__mono { font-family: var(--font-mono); white-space: nowrap; }
        .ag-chippais { font-size: 10px; padding: 1px 6px; border-radius: 99px; background: var(--color-surface); border: 1px solid var(--color-border); }
    </style>
</head>
<body>
<header class="admin-header">
    <div class="admin-header__brand"><span class="material-icons">cottage</span> Casa Verde Canas</div>
    <div class="admin-header__actions">
        <div class="user-chip"><span class="material-icons">person</span> <span id="userName">—</span></div>
        <button class="btn-logout" onclick="CVC.cerrarSesion()"><span class="material-icons">logout</span> Salir</button>
    </div>
</header>

<nav class="admin-nav" id="appNav"></nav>

<main class="admin-content">
    <div class="db-section-head" style="margin-bottom:var(--space-4);">
        <div class="db-section-title">
            <span class="material-icons" style="color:var(--color-primary);">insights</span>
            Análisis de gastos por categoría
        </div>
    </div>

    <div class="ag-filtros">
        <button class="ag-chip active" id="vCat" onclick="setVista('categoria', this)">Por categoría</button>
        <button class="ag-chip" id="vItem" onclick="setVista('item', this)">Por ítem</button>
        <span style="width:10px;"></span>
        <select id="selAnio" onchange="aplicar()"></select>
        <select id="selMes" onchange="aplicar()">
            <option value="">Todo el año</option>
            <option value="01">Enero</option><option value="02">Febrero</option>
            <option value="03">Marzo</option><option value="04">Abril</option>
            <option value="05">Mayo</option><option value="06">Junio</option>
            <option value="07">Julio</option><option value="08">Agosto</option>
            <option value="09">Septiembre</option><option value="10">Octubre</option>
            <option value="11">Noviembre</option><option value="12">Diciembre</option>
        </select>
        <button class="ag-chip active" id="cpTodos" onclick="setPais('', this)">Todos</button>
        <button class="ag-chip" id="cpBR" onclick="setPais('BR', this)">🇧🇷 Brasil</button>
        <button class="ag-chip" id="cpUY" onclick="setPais('UY', this)">🇺🇾 Uruguay</button>
    </div>

    <div id="contenido">
        <div class="state-loading"><div class="spinner"></div><span>Cargando gastos…</span></div>
    </div>
</main>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="utils.js"></script>
<script>
(async function() {
    var sesion = await CVC.verificarAuth(['admin']);
    document.getElementById('userName').textContent = sesion.userData.nombre || sesion.user.email;
    CVC.renderNav('analisis-gastos.html', sesion.userData.rol);
    if (typeof CVC.initAyuda === 'function') CVC.initAyuda('analisis-gastos.html');

    var db = CVC.db;
    var escapeHtml = CVC.escapeHtml;
    var _gastos = [];
    var _pais = '';
    var _vista = 'categoria';

    function fmt(n) { return 'R$ ' + (n || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function capit(s) { s = s || ''; return s.charAt(0).toUpperCase() + s.slice(1); }

    try {
        var snap = await db.collection('gastos').get();
        _gastos = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
    } catch (e) {
        document.getElementById('contenido').innerHTML = '<div style="color:var(--color-danger);">No se pudieron cargar los gastos: ' + escapeHtml(e.message) + '</div>';
        return;
    }

    // Poblar años presentes
    var anios = {};
    _gastos.forEach(function(g) { if (g.fecha) anios[String(g.fecha).slice(0, 4)] = true; });
    var listaAnios = Object.keys(anios).sort().reverse();
    var hoyAnio = String(new Date().getFullYear());
    if (listaAnios.indexOf(hoyAnio) === -1) listaAnios.unshift(hoyAnio);
    document.getElementById('selAnio').innerHTML =
        '<option value="">Todos los años</option>' +
        listaAnios.map(function(a) { return '<option value="' + a + '"' + (a === hoyAnio ? ' selected' : '') + '>' + a + '</option>'; }).join('');

    window.setPais = function(p, btn) {
        _pais = p;
        ['cpTodos', 'cpBR', 'cpUY'].forEach(function(id) { document.getElementById(id).classList.remove('active'); });
        if (btn) btn.classList.add('active');
        aplicar();
    };

    window.setVista = function(v, btn) {
        _vista = v;
        document.getElementById('vCat').classList.toggle('active', v === 'categoria');
        document.getElementById('vItem').classList.toggle('active', v === 'item');
        aplicar();
    };

    window.toggleCat = function(key) {
        var b = document.getElementById('body-' + key);
        if (b) b.classList.toggle('open');
    };

    window.aplicar = function() {
        var anio = document.getElementById('selAnio').value;
        var mes  = document.getElementById('selMes').value;

        var lista = _gastos.filter(function(g) {
            var f = String(g.fecha || '');
            if (anio && f.slice(0, 4) !== anio) return false;
            if (mes && f.slice(5, 7) !== mes) return false;
            if (_pais && (g.pais || 'BR') !== _pais) return false;
            return true;
        });

        var cont = document.getElementById('contenido');
        if (!lista.length) {
            cont.innerHTML = '<div style="text-align:center;color:var(--color-text-muted);padding:var(--space-6);">No hay gastos en este período.</div>';
            return;
        }

        if (_vista === 'item') { renderPorItem(lista, cont); return; }

        // Agrupar por categoría (normalizada)
        var grupos = {};
        var total = 0;
        lista.forEach(function(g) {
            var monto = g.monto || 0;
            total += monto;
            var key = String(g.categoria || 'sin categoría').trim().toLowerCase();
            if (!grupos[key]) grupos[key] = { nombre: key, total: 0, items: [] };
            grupos[key].total += monto;
            grupos[key].items.push(g);
        });
        var arr = Object.keys(grupos).map(function(k) { return grupos[k]; })
            .sort(function(a, b) { return b.total - a.total; });
        var maxCat = arr[0].total || 1;

        var html = '<div class="ag-total"><div class="n">' + fmt(total) + '</div>' +
            '<div class="s">' + lista.length + ' gastos · ' + arr.length + ' categorías</div></div>';

        html += arr.map(function(c) {
            var key = c.nombre.replace(/[^a-z0-9]/g, '_');
            var pct = total ? (c.total / total * 100) : 0;
            var barW = (c.total / maxCat * 100);
            var detalle = c.items.sort(function(a, b) { return (b.monto || 0) - (a.monto || 0); }).map(function(g) {
                var chip = '<span class="ag-chippais">' + (g.pais || 'BR') + '</span>';
                return '<div class="ag-det">' +
                    '<div style="flex:1;min-width:0;">' + escapeHtml(g.concepto || '--') +
                        (g.proveedor ? ' <span style="color:var(--color-text-muted);">· ' + escapeHtml(g.proveedor) + '</span>' : '') +
                        ' <span style="color:var(--color-text-muted);font-size:11px;">' + escapeHtml(g.fecha || '') + '</span> ' + chip +
                    '</div>' +
                    '<div class="ag-det__mono">' + fmt(g.monto) + '</div>' +
                '</div>';
            }).join('');

            return '<div class="ag-cat">' +
                '<div class="ag-cat__head" onclick="toggleCat(\'' + key + '\')">' +
                    '<div class="ag-cat__top">' +
                        '<span class="ag-cat__nom">' + escapeHtml(capit(c.nombre)) + '</span>' +
                        '<span class="ag-cat__val">' + fmt(c.total) + '</span>' +
                    '</div>' +
                    '<div class="ag-bar"><div class="ag-bar__fill" style="width:' + barW + '%;"></div></div>' +
                    '<div class="ag-cat__sub">' + pct.toFixed(1) + '% · ' + c.items.length + ' gastos · tocá para ver el detalle</div>' +
                '</div>' +
                '<div class="ag-cat__body" id="body-' + key + '">' + detalle + '</div>' +
            '</div>';
        }).join('');

        cont.innerHTML = html;
    };

    function renderPorItem(lista, cont) {
        var grupos = {}, total = 0, conDetalle = 0;
        lista.forEach(function(g) {
            var det = Array.isArray(g.itemsDetalle) ? g.itemsDetalle : [];
            if (det.length) conDetalle++;
            det.forEach(function(it) {
                var precio = it.precio || 0;
                total += precio;
                var key = (String(it.categoria || '').trim().toLowerCase()) || 'sin categoría';
                if (!grupos[key]) grupos[key] = { nombre: key, total: 0, items: [] };
                grupos[key].total += precio;
                grupos[key].items.push({ it: it, gasto: g });
            });
        });
        var arr = Object.keys(grupos).map(function(k) { return grupos[k]; })
            .sort(function(a, b) { return b.total - a.total; });
        if (!arr.length) {
            cont.innerHTML = '<div style="text-align:center;color:var(--color-text-muted);padding:var(--space-6);">Ningún gasto de este período tiene detalle de ítems todavía.<br>Se va llenando a medida que cargues facturas con foto.</div>';
            return;
        }
        var maxC = arr[0].total || 1;
        var html = '<div class="ag-total"><div class="n">' + fmt(total) + '</div>' +
            '<div class="s">' + conDetalle + ' de ' + lista.length + ' gasto(s) con detalle · ' + arr.length + ' tipos de ítem</div></div>';
        html += arr.map(function(c) {
            var key = 'i_' + c.nombre.replace(/[^a-z0-9]/g, '_');
            var pct = total ? (c.total / total * 100) : 0;
            var w = (c.total / maxC * 100);
            var detalle = c.items.sort(function(a, b) { return (b.it.precio || 0) - (a.it.precio || 0); }).map(function(r) {
                return '<div class="ag-det">' +
                    '<div style="flex:1;min-width:0;">' + escapeHtml(r.it.descripcion || '--') +
                        (r.it.cantidad && r.it.cantidad !== 1 ? ' <span style="color:var(--color-text-muted);">x' + r.it.cantidad + '</span>' : '') +
                        ' <span style="color:var(--color-text-muted);font-size:11px;">· ' + escapeHtml(r.gasto.proveedor || r.gasto.concepto || '') + ' · ' + escapeHtml(r.gasto.fecha || '') + '</span>' +
                    '</div>' +
                    '<div class="ag-det__mono">' + fmt(r.it.precio) + '</div>' +
                '</div>';
            }).join('');
            return '<div class="ag-cat">' +
                '<div class="ag-cat__head" onclick="toggleCat(\'' + key + '\')">' +
                    '<div class="ag-cat__top"><span class="ag-cat__nom">' + escapeHtml(capit(c.nombre)) + '</span><span class="ag-cat__val">' + fmt(c.total) + '</span></div>' +
                    '<div class="ag-bar"><div class="ag-bar__fill" style="width:' + w + '%;"></div></div>' +
                    '<div class="ag-cat__sub">' + pct.toFixed(1) + '% · ' + c.items.length + ' ítems · tocá para ver el detalle</div>' +
                '</div>' +
                '<div class="ag-cat__body" id="body-' + key + '">' + detalle + '</div>' +
            '</div>';
        }).join('');
        cont.innerHTML = html;
    }

    aplicar();
})();
</script>
</body>
</html>
