<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico y Migración · Casa Verde Canas</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="utils.js"></script>
<style>
  .diag-wrap { max-width: 1100px; margin: 0 auto; }
  .diag-section { 
    background: #fff; border: 1px solid #e7ece4; border-radius: 12px; 
    padding: 16px; margin-bottom: 16px;
  }
  .diag-section h3 { margin: 0 0 12px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
  .diag-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .diag-table th { text-align: left; padding: 8px 10px; background: #f8faf7; color: #46583f; font-weight: 600; border-bottom: 2px solid #dfe6dd; }
  .diag-table td { padding: 7px 10px; border-bottom: 1px solid #eef2ec; }
  .diag-table tr:hover td { background: #fafcf9; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; }
  .badge-ok { background: #e6f5e6; color: #1f7a32; }
  .badge-warn { background: #fdf4dd; color: #8a5d00; }
  .badge-err { background: #fde8e8; color: #c0271f; }
  .badge-info { background: #e7f0fd; color: #1f5fb0; }
  .diag-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .diag-actions button { 
    padding: 8px 16px; border-radius: 8px; border: 1px solid #dfe6dd; 
    background: #fff; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .diag-actions .btn-do { background: #2d5a27; color: #fff; border-color: #2d5a27; }
  .diag-actions .btn-do:hover { background: #234a1f; }
  .diag-actions .btn-danger { background: #c0271f; color: #fff; border-color: #c0271f; }
  .diag-actions .btn-warn { background: #d97706; color: #fff; border-color: #d97706; }
  .diag-log { 
    background: #1a1a1a; color: #a0d8a0; font-family: monospace; font-size: 12px; 
    padding: 12px; border-radius: 8px; max-height: 400px; overflow: auto; 
    white-space: pre-wrap; line-height: 1.5; margin-top: 12px;
  }
  .diag-log .warn { color: #e0a800; }
  .diag-log .err { color: #e06060; }
  .diag-log .info { color: #60a0e0; }
  .diag-log .ok { color: #60e060; }
</style>
</head>
<body>

<header class="admin-header">
  <div class="admin-header__brand">
    <span class="material-icons">biotech</span>
    Diagnóstico y Migración
  </div>
  <div class="admin-header__actions">
    <span id="userName">—</span>
    <button class="btn-logout" onclick="CVC.cerrarSesion()">Salir</button>
  </div>
</header>

<main class="admin-content">
  <div class="diag-wrap">
    
    <div class="diag-section">
      <h3><span class="material-icons">search</span> Estado actual de Firestore</h3>
      <div id="resumen">Cargando...</div>
    </div>

    <div class="diag-section">
      <h3><span class="material-icons">compare_arrows</span> Acciones</h3>
      <div class="diag-actions">
        <button onclick="escanearTodo()" class="btn-do">🔍 Re-escanear todo</button>
        <button onclick="migrarSesiones()" class="btn-do">📦 Migrar sesiones → /sesiones/</button>
        <button onclick="verificarDuplicados()" class="btn-do">🔎 Verificar duplicados</button>
        <button onclick="limpiarSesionesActivas()" class="btn-do">🧹 Limpiar sesionesActivas</button>
        <button onclick="analizarObsoletas()" class="btn-warn">⚠️ Analizar obsoletas</button>
        <button onclick="eliminarColeccionVacia()" class="btn-danger">🗑️ Eliminar colecciones vacías</button>
      </div>
      <div class="diag-log" id="log"></div>
    </div>

  </div>
</main>

<script type="module">

var sesion = await CVC.verificarAuth(['admin']);
var user = sesion.user;
document.getElementById('userName').textContent = 'Admin';

var db = CVC.db;
var logEl = document.getElementById('log');

function log(msg, tipo) {
  var clase = tipo || '';
  logEl.innerHTML += '<span class="' + clase + '">' + msg + '</span>\n';
  logEl.scrollTop = logEl.scrollHeight;
}
function logSep() { log('━'.repeat(50), 'info'); }

// ── TODAS las colecciones con sus NOMBRES REALES ──────────
var COLECCIONES_TODAS = [
  // Producción (las que ves en la UI de Firebase)
  'actividades',
  'cabanas',
  'categorias',
  'categorias_mov',
  'clientes',
  'comunicaciones',
  'config',
  'cuentas',
  'destinos',
  'disponibilidad',
  'espacios_comunes',
  'gastos',
  'historial',
  'historial_tareas',
  'honorarios',
  'informes_airbnb',
  'movimientos',
  'pagos',
  'reservas',
  'resumenes',
  'usuarios',
  // Nombres reales (los que usa el código, Firebase UI los muestra truncados)
  'comunicaciones_lecturas',
  'cotizaciones_historial',
  'actividades_usuario',
  // Previstas por el briefing
  'presupuestos',
  'proyecciones',
  'transferencias',
  'libro_visitas',
  'mov_negocio',
  'gastos_fijos',
  'cierres',
  // NUEVA
  'sesiones',
  // Viejas (posiblemente vacías)
  'tareas',
  'pendientes',
  'agenda'
];

var COLECCIONES_OBSOLETAS = [
  { col: 'tareas', motivo: 'Reemplazada por actividades (v4.28)' },
  { col: 'pendientes', motivo: 'Reemplazada por actividades (v4.28)' },
  { col: 'agenda', motivo: 'Reemplazada por actividades (v4.28)' },
  { col: 'historial', motivo: 'Posible duplicado — verificar si historial_tareas tiene todo' },
  { col: 'resumenes', motivo: 'No referenciada en el briefing ni en el código actual' }
];

// ── ESCANEAR TODO ─────────────────────────────────────────
window.escanearTodo = async function() {
  logEl.innerHTML = '';
  log('🔍 ESCANEANDO ' + COLECCIONES_TODAS.length + ' COLECCIONES...', 'info');
  logSep();

  var resumen = {};
  var totalDocs = 0;

  for (var i = 0; i < COLECCIONES_TODAS.length; i++) {
    var col = COLECCIONES_TODAS[i];
    try {
      var snap = await db.collection(col).limit(1000).get();
      var n = snap.size;
      totalDocs += n;
      resumen[col] = n;

      if (n > 0) {
        log('📁 ' + col + ': ' + n + ' docs', 'info');

        // Detalle por colección
        if (col === 'actividades') {
          var conSesiones = 0;
          snap.forEach(function(d) {
            var a = d.data();
            if (a.sesionesActivas && a.sesionesActivas.length > 0) conSesiones++;
          });
          if (conSesiones > 0) log('   ↳ ' + conSesiones + ' con campo sesionesActivas', 'warn');
        }

        if (col === 'tareas') {
          var conSub = 0;
          for (var t = 0; t < Math.min(snap.docs.length, 5); t++) {
            try {
              var ss = await db.collection('tareas').doc(snap.docs[t].id).collection('sesiones').get();
              if (ss.size > 0) conSub++;
            } catch(e2) {}
          }
          if (conSub > 0) log('   ↳ ¡Subcolección sesiones existe en ' + conSub + '/5!', 'warn');
        }

        if (col === 'sesiones') {
          var estados = {};
          snap.forEach(function(d) {
            var s = d.data();
            var est = s.estado || 'sin_estado';
            estados[est] = (estados[est] || 0) + 1;
          });
          var det = [];
          for (var k in estados) det.push(k + ': ' + estados[k]);
          log('   ↳ Estados: ' + det.join(', '), 'info');
        }

        if (col === 'historial' || col === 'resumenes') {
          var doc = snap.docs[0];
          log('   ↳ Muestra: ' + JSON.stringify(doc.data()).slice(0, 250), 'info');
        }
      }
    } catch (e) {
      if (e.message && e.message.indexOf('Missing or insufficient permissions') > -1) {
        // Sin permiso — probablemente no existe
      } else {
        log('📁 ' + col + ': ERROR — ' + e.message, 'err');
        resumen[col] = 'ERR';
      }
    }
  }

  logSep();
  log('✅ TOTAL: ' + totalDocs + ' documentos', 'ok');

  // Tabla
  var html = '<table class="diag-table"><tr><th>Colección</th><th>Docs</th><th>Estado</th></tr>';
  var keys = Object.keys(resumen).sort();
  for (var j = 0; j < keys.length; j++) {
    var c = keys[j];
    var v = resumen[c];
    var badge = v === 'ERR' ? 'badge-err' : (v === 0 ? 'badge-warn' : 'badge-ok');
    html += '<tr><td>' + c + '</td><td>' + (v === undefined ? '—' : v) + '</td><td><span class="badge ' + badge + '">' + (v === 'ERR' ? 'ERROR' : (v > 0 ? 'OK' : 'Vacía')) + '</span></td></tr>';
  }
  html += '</table>';
  document.getElementById('resumen').innerHTML = html;
};

// ── MIGRAR SESIONES ───────────────────────────────────────
window.migrarSesiones = async function() {
  logEl.innerHTML = '';
  log('📦 MIGRANDO SESIONES...', 'info');
  log('Busca en: tareas/{id}/sesiones y actividades/{id}/sesiones', 'info');
  log('Destino: /sesiones/', 'info');
  logSep();

  var migradas = 0;
  var yaExisten = 0;
  var errores = 0;

  // Ver qué hay ya en /sesiones/
  var snapExistente = await db.collection('sesiones').get();
  var existentes = {};
  snapExistente.forEach(function(d) {
    var s = d.data();
    var key = s.actividadId + '|' + s.uid + '|' + (s.inicio ? s.inicio.toMillis() : 0);
    existentes[key] = true;
  });
  log('   /sesiones/ tiene ' + snapExistente.size + ' docs', 'info');

  // ── Desde tareas ──
  logSep();
  log('📁 tareas...', 'info');
  try {
    var tSnap = await db.collection('tareas').get();
    log('   ' + tSnap.size + ' tareas', 'info');
    for (var i = 0; i < tSnap.docs.length; i++) {
      var tDoc = tSnap.docs[i];
      var tarea = tDoc.data();
      try {
        var sSnap = await db.collection('tareas').doc(tDoc.id).collection('sesiones').get();
        if (sSnap.size === 0) continue;
        log('   ↳ ' + tDoc.id + ': ' + sSnap.size + ' sesiones', 'info');
        for (var j = 0; j < sSnap.docs.length; j++) {
          var s = sSnap.docs[j].data();
          var inicio = s.inicio || firebase.firestore.Timestamp.now();
          var key = tDoc.id + '|' + (s.uid || '') + '|' + (inicio.toMillis ? inicio.toMillis() : 0);
          if (existentes[key]) { yaExisten++; continue; }
          try {
            await db.collection('sesiones').add({
              actividadId: tDoc.id,
              actividadNombre: tarea.nombre || tarea.titulo || '',
              uid: s.uid || '',
              nombre: s.nombre || '',
              inicio: inicio,
              fin: s.fin || null,
              horas: s.horas || 0,
              estado: s.fin ? 'finalizada' : (s.estado || 'en_curso'),
              tipo: s.tipo || 'cronometro',
              creadoPor: s.uid || '',
              creadoEn: inicio,
              actualizadoEn: firebase.firestore.Timestamp.now(),
              _migradoDe: 'tareas/' + tDoc.id + '/sesiones'
            });
            migradas++;
            existentes[key] = true;
          } catch(e) { errores++; log('   ❌ ' + e.message, 'err'); }
        }
      } catch(e2) {}
    }
  } catch(e) { log('❌ ' + e.message, 'err'); }

  // ── Desde actividades ──
  logSep();
  log('📁 actividades...', 'info');
  try {
    var aSnap = await db.collection('actividades').get();
    log('   ' + aSnap.size + ' actividades', 'info');
    var conSub = 0;
    for (var k = 0; k < aSnap.docs.length; k++) {
      var aDoc = aSnap.docs[k];
      var act = aDoc.data();
      try {
        var sSnap2 = await db.collection('actividades').doc(aDoc.id).collection('sesiones').get();
        if (sSnap2.size === 0) continue;
        conSub++;
        log('   ↳ ' + aDoc.id + ': ' + sSnap2.size + ' sesiones', 'info');
        for (var m = 0; m < sSnap2.docs.length; m++) {
          var s2 = sSnap2.docs[m].data();
          var inicio2 = s2.inicio || firebase.firestore.Timestamp.now();
          var key2 = aDoc.id + '|' + (s2.uid || '') + '|' + (inicio2.toMillis ? inicio2.toMillis() : 0);
          if (existentes[key2]) { yaExisten++; continue; }
          try {
            await db.collection('sesiones').add({
              actividadId: aDoc.id,
              actividadNombre: act.titulo || act.nombre || '',
              uid: s2.uid || '',
              nombre: s2.nombre || '',
              inicio: inicio2,
              fin: s2.fin || null,
              horas: s2.horas || 0,
              estado: s2.fin ? 'finalizada' : (s2.estado || 'en_curso'),
              tipo: s2.tipo || 'cronometro',
              creadoPor: s2.uid || '',
              creadoEn: inicio2,
              actualizadoEn: firebase.firestore.Timestamp.now(),
              _migradoDe: 'actividades/' + aDoc.id + '/sesiones'
            });
            migradas++;
            existentes[key2] = true;
          } catch(e) { errores++; }
        }
      } catch(e2) {}
    }
    log('   ' + conSub + ' actividades con subcolección', 'info');
  } catch(e) { log('❌ ' + e.message, 'err'); }

  logSep();
  log('✅ MIGRADAS: ' + migradas + ' | Ya existían: ' + yaExisten + ' | Errores: ' + errores, 'ok');
  log('⚠️ Las originales NO se borraron.', 'warn');
};

// ── VERIFICAR DUPLICADOS ──────────────────────────────────
window.verificarDuplicados = async function() {
  logEl.innerHTML = '';
  log('🔎 Verificando duplicados en /sesiones/', 'info');
  var snap = await db.collection('sesiones').get();
  var map = {};
  snap.forEach(function(d) {
    var s = d.data();
    var key = s.actividadId + '|' + s.uid + '|' + (s.inicio ? s.inicio.toMillis() : 0);
    if (!map[key]) map[key] = [];
    map[key].push({ id: d.id, estado: s.estado });
  });
  var dups = 0;
  for (var k in map) {
    if (map[k].length > 1) {
      dups++;
      log('⚠️ ' + k + ': ' + map[k].length + ' registros', 'warn');
      for (var i = 0; i < map[k].length; i++) log('   ' + map[k][i].id + ' — ' + map[k][i].estado, 'info');
    }
  }
  if (dups === 0) log('✅ Sin duplicados.', 'ok');
  else log('⚠️ ' + dups + ' grupos duplicados. Eliminar manualmente desde gestor-sesiones.html', 'warn');
};

// ── LIMPIAR sesionesActivas ───────────────────────────────
window.limpiarSesionesActivas = async function() {
  logEl.innerHTML = '';
  log('🧹 Limpiando campo sesionesActivas...', 'info');
  var snap = await db.collection('actividades').get();
  var limpio = 0;
  var batch = db.batch();
  var cnt = 0;
  for (var i = 0; i < snap.docs.length; i++) {
    var doc = snap.docs[i];
    var act = doc.data();
    if (act.sesionesActivas && act.sesionesActivas.length > 0) {
      var real = await db.collection('sesiones').where('actividadId','==',doc.id).where('estado','==','en_curso').get();
      if (real.empty) {
        batch.update(doc.ref, { sesionesActivas: [], estado: act.hecho ? 'finalizada' : 'pendiente', sesionActualId: null });
        limpio++; cnt++;
        if (cnt >= 400) { await batch.commit(); batch = db.batch(); cnt = 0; }
      }
    }
  }
  if (cnt > 0) await batch.commit();
  log('✅ ' + limpio + ' actividades limpiadas.', 'ok');
};

// ── ANALIZAR OBSOLETAS ────────────────────────────────────
window.analizarObsoletas = async function() {
  logEl.innerHTML = '';
  log('⚠️ Analizando colecciones candidatas a eliminar...', 'info');
  logSep();
  for (var i = 0; i < COLECCIONES_OBSOLETAS.length; i++) {
    var c = COLECCIONES_OBSOLETAS[i];
    try {
      var snap = await db.collection(c.col).get();
      log('📁 ' + c.col + ': ' + snap.size + ' docs — ' + c.motivo, snap.size > 0 ? 'warn' : 'ok');
      if (snap.size > 0) {
        var doc = snap.docs[0];
        log('   Muestra: ' + JSON.stringify(doc.data()).slice(0, 300), 'info');
      }
    } catch(e) {
      log('📁 ' + c.col + ': no existe o sin acceso', 'info');
    }
    logSep();
  }
};

// ── ELIMINAR COLECCIONES VACÍAS ───────────────────────────
window.eliminarColeccionVacia = async function() {
  logEl.innerHTML = '';
  log('🗑️ Buscando colecciones vacías para eliminar...', 'info');
  log('(Firebase no deja borrar colecciones por API — usá la consola)', 'warn');
  logSep();
  
  var vacias = [];
  for (var i = 0; i < COLECCIONES_TODAS.length; i++) {
    var col = COLECCIONES_TODAS[i];
    try {
      var snap = await db.collection(col).limit(1).get();
      if (snap.size === 0) vacias.push(col);
    } catch(e) {}
  }

  log('Colecciones vacías encontradas:', 'info');
  for (var j = 0; j < vacias.length; j++) {
    log('   📭 ' + vacias[j], 'info');
  }
  logSep();
  log('Para eliminar desde la CLI:', 'info');
  log('firebase firestore:delete --collection NOMBRE --recursive', 'info');
  log('O desde Firebase Console → Firestore → colección → eliminar.', 'info');
};

// ── Init ──────────────────────────────────────────────────
log('📋 Herramienta lista.', 'info');
log('  1. Re-escanear todo', 'info');
log('  2. Migrar sesiones (si hay)', 'info');
log('  3. Verificar duplicados', 'info');
log('  4. Limpiar sesionesActivas', 'info');
log('  5. Analizar obsoletas', 'info');
log('⚠️ Nada se borra sin confirmación.', 'warn');
logSep();
await escanearTodo();

</script>
</body>
</html>
