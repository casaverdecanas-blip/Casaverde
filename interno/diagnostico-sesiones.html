<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico y Migración · Casa Verde Canas</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="utils.js"></script>
<style>
  .diag-wrap { max-width: 1100px; margin: 0 auto; }
  .diag-section { 
    background: #fff; border: 1px solid #e7ece4; border-radius: 12px; 
    padding: 16px; margin-bottom: 16px;
  }
  .diag-section h3 { margin: 0 0 12px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
  .diag-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .diag-table th { text-align: left; padding: 8px 10px; background: #f8faf7; color: #46583f; font-weight: 600; border-bottom: 2px solid #dfe6dd; }
  .diag-table td { padding: 7px 10px; border-bottom: 1px solid #eef2ec; }
  .diag-table tr:hover td { background: #fafcf9; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; }
  .badge-ok { background: #e6f5e6; color: #1f7a32; }
  .badge-warn { background: #fdf4dd; color: #8a5d00; }
  .badge-err { background: #fde8e8; color: #c0271f; }
  .badge-info { background: #e7f0fd; color: #1f5fb0; }
  .diag-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .diag-actions button { 
    padding: 8px 16px; border-radius: 8px; border: 1px solid #dfe6dd; 
    background: #fff; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .diag-actions .btn-do { background: #2d5a27; color: #fff; border-color: #2d5a27; }
  .diag-actions .btn-do:hover { background: #234a1f; }
  .diag-actions .btn-danger { background: #c0271f; color: #fff; border-color: #c0271f; }
  .diag-actions .btn-warn { background: #d97706; color: #fff; border-color: #d97706; }
  .diag-log { 
    background: #1a1a1a; color: #a0d8a0; font-family: monospace; font-size: 12px; 
    padding: 12px; border-radius: 8px; max-height: 400px; overflow: auto; 
    white-space: pre-wrap; line-height: 1.5; margin-top: 12px;
  }
  .diag-log .warn { color: #e0a800; }
  .diag-log .err { color: #e06060; }
  .diag-log .info { color: #60a0e0; }
  .diag-log .ok { color: #60e060; }
  .diag-log .hl { color: #f0a060; }
</style>
</head>
<body>

<header class="admin-header">
  <div class="admin-header__brand">
    <span class="material-icons">biotech</span>
    Diagnóstico y Migración
  </div>
  <div class="admin-header__actions">
    <span id="userName">—</span>
    <button class="btn-logout" onclick="CVC.cerrarSesion()">Salir</button>
  </div>
</header>

<main class="admin-content">
  <div class="diag-wrap">
    
    <div class="diag-section">
      <h3><span class="material-icons">search</span> Estado actual de Firestore</h3>
      <div id="resumen">Cargando...</div>
    </div>

    <div class="diag-section">
      <h3><span class="material-icons">compare_arrows</span> Acciones</h3>
      
      <div style="font-size:12px;color:#66735f;margin-bottom:8px">
        <b>Paso 1:</b> Diagnóstico · 
        <b>Paso 2:</b> Analizar historial_tareas · 
        <b>Paso 3:</b> Migrar historial_tareas → /sesiones/ · 
        <b>Paso 4:</b> Verificar · 
        <b>Paso 5:</b> Limpiar
      </div>

      <div class="diag-actions">
        <button onclick="escanearTodo()" class="btn-do">🔍 Re-escanear todo</button>
        <button onclick="analizarHistorialTareas()" class="btn-do">🔬 Analizar historial_tareas</button>
        <button onclick="migrarHistorialASesiones()" class="btn-warn">📦 Migrar historial_tareas → /sesiones/</button>
        <button onclick="verificarMigracion()" class="btn-do">✅ Verificar migración</button>
      </div>
      <div class="diag-actions" style="margin-top:4px">
        <button onclick="limpiarSesionesActivas()" class="btn-do">🧹 Limpiar sesionesActivas</button>
        <button onclick="analizarObsoletas()" class="btn-warn">⚠️ Analizar obsoletas</button>
      </div>
      <div class="diag-log" id="log"></div>
    </div>

  </div>
</main>

<script type="module">

var sesion = await CVC.verificarAuth(['admin']);
var user = sesion.user;
document.getElementById('userName').textContent = 'Admin';

var db = CVC.db;
var logEl = document.getElementById('log');

function log(msg, tipo) {
  var clase = tipo || '';
  logEl.innerHTML += '<span class="' + clase + '">' + msg + '</span>\n';
  logEl.scrollTop = logEl.scrollHeight;
}
function logSep() { log('━'.repeat(50), 'info'); }

// ── COLECCIONES CON NOMBRES REALES ────────────────────────
var COLECCIONES_TODAS = [
  'actividades', 'cabanas', 'categorias', 'categorias_mov',
  'clientes', 'comunicaciones', 'config', 'cuentas', 'destinos',
  'disponibilidad', 'espacios_comunes', 'gastos', 'historial',
  'historial_tareas', 'honorarios', 'informes_airbnb', 'movimientos',
  'pagos', 'reservas', 'resumenes', 'usuarios',
  'comunicaciones_lecturas', 'cotizaciones_historial', 'actividades_usuario',
  'presupuestos', 'proyecciones', 'transferencias', 'libro_visitas',
  'mov_negocio', 'gastos_fijos', 'cierres', 'sesiones',
  'tareas', 'pendientes', 'agenda'
];

var COLECCIONES_OBSOLETAS = [
  { col: 'tareas', motivo: 'Reemplazada por actividades (v4.28)' },
  { col: 'pendientes', motivo: 'Reemplazada por actividades (v4.28)' },
  { col: 'agenda', motivo: 'Reemplazada por actividades (v4.28)' },
  { col: 'historial', motivo: 'Duplicado parcial de historial_tareas — verificar' },
  { col: 'resumenes', motivo: 'Log diario de eventos — posiblemente obsoleto' }
];

// ── ESCANEAR TODO ─────────────────────────────────────────
window.escanearTodo = async function() {
  logEl.innerHTML = '';
  log('🔍 ESCANEANDO ' + COLECCIONES_TODAS.length + ' COLECCIONES...', 'info');
  logSep();

  var resumen = {};
  var totalDocs = 0;

  for (var i = 0; i < COLECCIONES_TODAS.length; i++) {
    var col = COLECCIONES_TODAS[i];
    try {
      var snap = await db.collection(col).limit(1000).get();
      var n = snap.size;
      totalDocs += n;
      resumen[col] = n;

      if (n > 0) {
        log('📁 ' + col + ': ' + n + ' docs', 'info');

        if (col === 'actividades') {
          var conSesiones = 0;
          snap.forEach(function(d) {
            var a = d.data();
            if (a.sesionesActivas && a.sesionesActivas.length > 0) conSesiones++;
          });
          if (conSesiones > 0) log('   ↳ ' + conSesiones + ' con campo sesionesActivas', 'warn');
        }

        if (col === 'historial_tareas') {
          var porTipo = {};
          snap.forEach(function(d) {
            var h = d.data();
            var tipo = h.tipoRegistro || 'sin_tipo';
            porTipo[tipo] = (porTipo[tipo] || 0) + 1;
          });
          var det = [];
          for (var k in porTipo) det.push(k + ': ' + porTipo[k]);
          log('   ↳ Tipos: ' + det.join(', '), 'hl');
        }

        if (col === 'sesiones') {
          var estados = {};
          snap.forEach(function(d) {
            var s = d.data();
            var est = s.estado || 'sin_estado';
            estados[est] = (estados[est] || 0) + 1;
          });
          var det2 = [];
          for (var ek in estados) det2.push(ek + ': ' + estados[ek]);
          log('   ↳ Estados: ' + det2.join(', '), 'info');
        }
      }
    } catch (e) {
      if (e.message && e.message.indexOf('Missing or insufficient permissions') === -1) {
        log('📁 ' + col + ': ERROR — ' + e.message, 'err');
        resumen[col] = 'ERR';
      }
    }
  }

  logSep();
  log('✅ TOTAL: ' + totalDocs + ' documentos', 'ok');

  var html = '<table class="diag-table"><tr><th>Colección</th><th>Docs</th><th>Estado</th></tr>';
  var keys = Object.keys(resumen).sort();
  for (var j = 0; j < keys.length; j++) {
    var c = keys[j];
    var v = resumen[c];
    var badge = v === 'ERR' ? 'badge-err' : (v === 0 ? 'badge-warn' : 'badge-ok');
    html += '<tr><td>' + c + '</td><td>' + (v === undefined ? '—' : v) + '</td><td><span class="badge ' + badge + '">' + (v === 'ERR' ? 'ERROR' : (v > 0 ? 'OK' : 'Vacía')) + '</span></td></tr>';
  }
  html += '</table>';
  document.getElementById('resumen').innerHTML = html;
};

// ── ANALIZAR historial_tareas A FONDO ─────────────────────
window.analizarHistorialTareas = async function() {
  logEl.innerHTML = '';
  log('🔬 ANALIZANDO historial_tareas...', 'info');
  log('Objetivo: entender la estructura exacta para migrar sin perder datos.', 'info');
  logSep();

  try {
    var snap = await db.collection('historial_tareas').get();
    log('Total: ' + snap.size + ' documentos', 'info');
    logSep();

    // Agrupaciones
    var porTipo = {};
    var porTipoCrono = {};
    var porUsuario = {};
    var porCabana = {};
    var totalHoras = 0;
    var totalMonto = 0;
    var todosCampos = {};
    var muestrasPorTipo = {};

    snap.forEach(function(d) {
      var h = d.data();

      // Tipo de registro
      var tipo = h.tipoRegistro || 'sin_tipo';
      porTipo[tipo] = (porTipo[tipo] || 0) + 1;

      // Con/sin cronómetro
      var cronoKey = h.conCronometro ? 'con_crono' : 'sin_crono';
      if (!porTipoCrono[tipo]) porTipoCrono[tipo] = {};
      porTipoCrono[tipo][cronoKey] = (porTipoCrono[tipo][cronoKey] || 0) + 1;

      // Usuario
      var uid = h.finalizadoPor || 'anonimo';
      var nombre = h.finalizadoNombre || '';
      var keyUsr = nombre || uid;
      if (!porUsuario[keyUsr]) porUsuario[keyUsr] = { count: 0, uid: uid };
      porUsuario[keyUsr].count++;

      // Cabaña
      var cab = h.cabana;
      if (cab !== null && cab !== undefined) {
        porCabana[cab] = (porCabana[cab] || 0) + 1;
      }

      // Totales
      totalHoras += h.totalHoras || 0;
      totalMonto += h.monto || 0;

      // Muestra por tipo (primer doc de cada tipo)
      if (!muestrasPorTipo[tipo]) {
        muestrasPorTipo[tipo] = { id: d.id, data: h };
      }

      // Recolectar todos los campos
      for (var k in h) {
        if (!todosCampos[k]) {
          var val = h[k];
          var tipoVal = typeof val;
          if (val === null) tipoVal = 'null';
          else if (Array.isArray(val)) tipoVal = 'array(' + val.length + ')';
          else if (val.toMillis) tipoVal = 'Timestamp';
          todosCampos[k] = tipoVal;
        }
      }
    });

    // ── Mostrar análisis ──────────────────────────────────

    log('📊 POR TIPO DE REGISTRO:', 'hl');
    var tipos = Object.keys(porTipo).sort();
    for (var i = 0; i < tipos.length; i++) {
      var t = tipos[i];
      var crono = porTipoCrono[t] || {};
      log('   ' + t + ': ' + porTipo[t] + ' docs (⏱ ' + (crono.con_crono || 0) + ' | ✋ ' + (crono.sin_crono || 0) + ')', 'info');
    }
    logSep();

    log('🔑 CAMPOS DETECTADOS en historial_tareas:', 'hl');
    var camposOrdenados = Object.keys(todosCampos).sort();
    for (var c = 0; c < camposOrdenados.length; c++) {
      var campo = camposOrdenados[c];
      log('   ' + campo + ': ' + todosCampos[campo], 'info');
    }
    logSep();

    log('📋 MUESTRAS POR TIPO (primer documento):', 'hl');
    for (var j = 0; j < tipos.length; j++) {
      var tipo = tipos[j];
      var muestra = muestrasPorTipo[tipo];
      log('   ── [' + tipo + '] doc ID: ' + muestra.id + ' ──', 'info');
      log('   ' + JSON.stringify(muestra.data, null, 2), 'info');
      logSep();
    }

    log('👤 POR USUARIO:', 'hl');
    var users = Object.keys(porUsuario).sort(function(a,b) { return porUsuario[b].count - porUsuario[a].count; });
    for (var u = 0; u < users.length; u++) {
      var usr = porUsuario[users[u]];
      log('   ' + users[u] + ' (uid: ' + usr.uid + '): ' + usr.count + ' registros', 'info');
    }
    logSep();

    if (Object.keys(porCabana).length > 0) {
      log('🏠 POR CABAÑA:', 'hl');
      for (var cab in porCabana) {
        log('   ' + cab + ': ' + porCabana[cab] + ' registros', 'info');
      }
      logSep();
    }

    log('💰 TOTALES:', 'ok');
    log('   Horas totales: ' + Math.round(totalHoras * 100) / 100 + 'h', 'ok');
    log('   Monto total: R$ ' + Math.round(totalMonto * 100) / 100, 'ok');
    logSep();

    log('📐 MAPEO PARA MIGRACIÓN A /sesiones/:', 'hl');
    log('   historial_tareas.tareaId        → sesiones.actividadId', 'info');
    log('   historial_tareas.nombre          → sesiones.actividadNombre', 'info');
    log('   historial_tareas.finalizadoPor   → sesiones.uid', 'info');
    log('   historial_tareas.finalizadoNombre→ sesiones.nombre', 'info');
    log('   historial_tareas.totalHoras      → sesiones.horas', 'info');
    log('   historial_tareas.finalizadoEn    → sesiones.inicio (aprox.)', 'info');
    log('   historial_tareas.conCronometro   → sesiones.tipo', 'info');
    log('   historial_tareas.tipoRegistro    → define sesiones.estado', 'info');
    log('   ⚠️ No tiene inicio exacto → se calcula: fin - horas', 'warn');
    log('   ⚠️ colaboradores[] → se crea una sesión POR colaborador', 'warn');
    logSep();
    log('✅ ANÁLISIS COMPLETADO — listo para migrar', 'ok');

  } catch (e) {
    log('❌ Error: ' + e.message, 'err');
  }
};

// ── MIGRAR historial_tareas → /sesiones/ ──────────────────
window.migrarHistorialASesiones = async function() {
  logEl.innerHTML = '';
  log('📦 MIGRANDO historial_tareas → /sesiones/', 'info');
  log('⚠️ historial_tareas NO se borra — solo se copia.', 'warn');
  log('Regla: una sesión por cada colaborador en cada registro.', 'info');
  logSep();

  try {
    var snap = await db.collection('historial_tareas').get();
    log('Total a procesar: ' + snap.size + ' documentos', 'info');
    logSep();

    // Ver qué hay ya en /sesiones/
    var existentesSnap = await db.collection('sesiones').get();
    var existentes = {};
    existentesSnap.forEach(function(d) {
      var s = d.data();
      var key = s.actividadId + '|' + s.uid + '|' + (s.inicio ? s.inicio.toMillis() : 0);
      existentes[key] = true;
    });
    log('   /sesiones/ tiene ' + existentesSnap.size + ' docs actualmente', 'info');
    logSep();

    var creadas = 0;
    var omitidas = 0;
    var errores = 0;
    var sinColaboradores = 0;
    var conColaboradores = 0;

    for (var i = 0; i < snap.docs.length; i++) {
      var doc = snap.docs[i];
      var h = doc.data();

      // Determinar colaboradores
      var colaboradores = h.colaboradores || [];
      if (colaboradores.length === 0) {
        // Sin colaboradores explícitos → usar finalizadoPor
        colaboradores = [{
          uid: h.finalizadoPor || '',
          nombre: h.finalizadoNombre || '',
          horas: h.totalHoras || 0,
          montoRecibido: h.monto || 0
        }];
        sinColaboradores++;
      } else {
        conColaboradores++;
      }

      // Crear una sesión por cada colaborador
      for (var j = 0; j < colaboradores.length; j++) {
        var col = colaboradores[j];
        var uidCol = col.uid || h.finalizadoPor || '';
        var nombreCol = col.nombre || h.finalizadoNombre || '';
        var horasCol = col.horas || 0;

        if (!uidCol) continue; // Sin UID no se puede migrar

        // Calcular inicio aproximado: finalizadoEn - horas
        var fin = h.finalizadoEn || firebase.firestore.Timestamp.now();
        var finMs = fin.toMillis ? fin.toMillis() : Date.now();
        var inicioMs = finMs - (horasCol * 3600000);
        var inicio = firebase.firestore.Timestamp.fromMillis(Math.max(0, inicioMs));

        var key = h.tareaId + '|' + uidCol + '|' + inicio.toMillis();

        if (existentes[key]) {
          omitidas++;
          continue;
        }

        try {
          await db.collection('sesiones').add({
            actividadId: h.tareaId || '',
            actividadNombre: h.nombre || '',
            uid: uidCol,
            nombre: nombreCol,
            inicio: inicio,
            fin: fin,
            horas: Math.round(horasCol * 100) / 100,
            estado: 'finalizada',
            tipo: h.conCronometro ? 'cronometro' : 'manual',
            creadoPor: uidCol,
            creadoEn: inicio,
            actualizadoEn: firebase.firestore.Timestamp.now(),
            notas: h.nota || '',
            _migradoDe: 'historial_tareas/' + doc.id,
            _tipoOriginal: h.tipoRegistro || '',
            _cabana: h.cabana || null,
            _costoLimpiezaBRL: h.costoLimpiezaBRL || 0,
            _montoOriginal: col.montoRecibido || h.monto || 0
          });
          creadas++;
          existentes[key] = true;
        } catch (e) {
          errores++;
          if (errores <= 5) log('   ❌ Error: ' + e.message, 'err');
        }
      }

      // Progreso cada 10 docs
      if ((i + 1) % 10 === 0) {
        log('   Procesados: ' + (i + 1) + '/' + snap.size + ' — Creadas: ' + creadas, 'info');
      }
    }

    logSep();
    log('✅ MIGRACIÓN COMPLETADA', 'ok');
    log('   Documentos procesados: ' + snap.size, 'info');
    log('   Con colaboradores explícitos: ' + conColaboradores, 'info');
    log('   Sin colaboradores (usado finalizadoPor): ' + sinColaboradores, 'info');
    log('   Sesiones creadas: ' + creadas, 'ok');
    log('   Omitidas (ya existían): ' + omitidas, 'info');
    log('   Errores: ' + errores, errores > 0 ? 'err' : 'info');
    logSep();
    log('⚠️ historial_tareas NO fue modificado.', 'warn');
    log('⚠️ Las sesiones migradas tienen campo _migradoDe para trazabilidad.', 'info');

  } catch (e) {
    log('❌ Error general: ' + e.message, 'err');
  }
};

// ── VERIFICAR MIGRACIÓN ───────────────────────────────────
window.verificarMigracion = async function() {
  logEl.innerHTML = '';
  log('✅ VERIFICANDO MIGRACIÓN...', 'info');
  logSep();

  try {
    var htSnap = await db.collection('historial_tareas').get();
    var sesSnap = await db.collection('sesiones').get();

    log('   historial_tareas: ' + htSnap.size + ' docs', 'info');
    log('   /sesiones/: ' + sesSnap.size + ' docs', 'info');
    logSep();

    if (sesSnap.size === 0) {
      log('⚠️ /sesiones/ está vacía — ejecutá la migración primero.', 'warn');
      return;
    }

    // Verificar por tipo
    var porTipo = {};
    var horasHT = 0, horasSes = 0;
    var porEstado = {};

    htSnap.forEach(function(d) {
      var h = d.data();
      horasHT += h.totalHoras || 0;
      var cols = h.colaboradores || [];
      if (cols.length === 0) {
        horasHT += 0; // ya sumado con totalHoras
      }
    });

    sesSnap.forEach(function(d) {
      var s = d.data();
      horasSes += s.horas || 0;
      var est = s.estado || 'sin_estado';
      porEstado[est] = (porEstado[est] || 0) + 1;
      var tipo = s.tipo || 'sin_tipo';
      porTipo[tipo] = (porTipo[tipo] || 0) + 1;
    });

    log('📊 /sesiones/ POR ESTADO:', 'hl');
    for (var k in porEstado) log('   ' + k + ': ' + porEstado[k], 'info');
    logSep();

    log('📊 /sesiones/ POR TIPO:', 'hl');
    for (var t in porTipo) log('   ' + t + ': ' + porTipo[t], 'info');
    logSep();

    log('💰 COMPARACIÓN DE HORAS:', 'hl');
    log('   historial_tareas: ' + Math.round(horasHT * 100) / 100 + 'h', 'info');
    log('   /sesiones/: ' + Math.round(horasSes * 100) / 100 + 'h', 'info');
    log('   Diferencia: ' + Math.round(Math.abs(horasHT - horasSes) * 100) / 100 + 'h', 
        Math.abs(horasHT - horasSes) < 0.5 ? 'ok' : 'warn');
    logSep();

    // Mostrar algunas sesiones migradas
    log('📋 MUESTRAS DE SESIONES MIGRADAS:', 'hl');
    var count = 0;
    sesSnap.forEach(function(d) {
      if (count >= 5) return;
      var s = d.data();
      if (s._migradoDe) {
        count++;
        log('   [' + (s._tipoOriginal || '?') + '] ' + (s.actividadNombre || 'sin nombre') + ' — ' + (s.nombre || '?') + ' — ' + Math.round((s.horas||0)*100)/100 + 'h', 'info');
      }
    });
    logSep();
    log('✅ VERIFICACIÓN COMPLETADA', 'ok');

  } catch (e) {
    log('❌ Error: ' + e.message, 'err');
  }
};

// ── LIMPIAR sesionesActivas ───────────────────────────────
window.limpiarSesionesActivas = async function() {
  logEl.innerHTML = '';
  log('🧹 Limpiando campo sesionesActivas en actividades...', 'info');
  var snap = await db.collection('actividades').get();
  var limpio = 0;
  var batch = db.batch();
  var cnt = 0;
  for (var i = 0; i < snap.docs.length; i++) {
    var doc = snap.docs[i];
    var act = doc.data();
    if (act.sesionesActivas && act.sesionesActivas.length > 0) {
      var real = await db.collection('sesiones').where('actividadId','==',doc.id).where('estado','==','en_curso').get();
      if (real.empty) {
        batch.update(doc.ref, { sesionesActivas: [], estado: act.hecho ? 'finalizada' : 'pendiente', sesionActualId: null });
        limpio++; cnt++;
        if (cnt >= 400) { await batch.commit(); batch = db.batch(); cnt = 0; }
      }
    }
  }
  if (cnt > 0) await batch.commit();
  log('✅ ' + limpio + ' actividades limpiadas.', 'ok');
};

// ── ANALIZAR OBSOLETAS ────────────────────────────────────
window.analizarObsoletas = async function() {
  logEl.innerHTML = '';
  log('⚠️ Analizando colecciones candidatas a eliminar...', 'info');
  logSep();
  for (var i = 0; i < COLECCIONES_OBSOLETAS.length; i++) {
    var c = COLECCIONES_OBSOLETAS[i];
    try {
      var snap = await db.collection(c.col).get();
      log('📁 ' + c.col + ': ' + snap.size + ' docs — ' + c.motivo, snap.size > 0 ? 'warn' : 'ok');
      if (snap.size > 0) {
        var doc = snap.docs[0];
        log('   Muestra: ' + JSON.stringify(doc.data()).slice(0, 300), 'info');
      }
    } catch(e) {
      log('📁 ' + c.col + ': no existe', 'info');
    }
    logSep();
  }
  log('✅ Análisis completado.', 'ok');
};

log('  6. Analizar obsoletas', 'info');
