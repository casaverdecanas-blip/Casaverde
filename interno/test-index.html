<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Tareas - Nueva Estructura</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        body {
            font-family: monospace;
            background: #0a0a0f;
            color: #0f0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .login-box {
            background: #1a1a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        input, button {
            padding: 8px 12px;
            margin: 5px;
            border-radius: 4px;
            border: none;
        }
        button {
            background: #0f0;
            color: #000;
            cursor: pointer;
        }
        .success {
            color: #0f0;
            background: #1a2a1a;
            padding: 10px;
            border-radius: 4px;
        }
        .error {
            color: #f66;
            background: #2a1a1a;
            padding: 10px;
            border-radius: 4px;
        }
        .info {
            color: #ff0;
            background: #2a2a1a;
            padding: 10px;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: #1a1a2a;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background: #0f0;
            color: #000;
        }
        .pendiente {
            background: #1a2a1a;
        }
        .reciente {
            background: #2a1a1a;
        }
        .task-row {
            cursor: pointer;
        }
        .task-row:hover {
            background: #2a2a3a;
        }
        .badge-dependencia {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Mis Tareas (Nueva Estructura)</h1>
        
        <!-- Login -->
        <div class="login-box">
            <input type="email" id="email" placeholder="Email" value="casaverdecanas@gmail.com">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="login()">Iniciar Sesión</button>
            <div id="loginMsg"></div>
        </div>
        
        <!-- Panel de tareas -->
        <div id="tareasPanel" style="display: none;">
            <div id="stats"></div>
            <div id="tareasList"></div>
        </div>
    </div>

    <script>
        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDluIIBwIJVkO9DEX4ghJQYhzJAnXtQoKs",
            authDomain: "tatareas-d8a80.firebaseapp.com",
            projectId: "tatareas-d8a80",
            storageBucket: "tatareas-d8a80.firebasestorage.app",
            messagingSenderId: "709332495480",
            appId: "1:709332495480:web:7060b2c75984352354918d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let tareasCache = [];
        let historialCache = [];
        let usuariosCache = {};

        // ============================================
        // FUNCIONES AUXILIARES
        // ============================================
        
        // Traducir recurrencia (número → texto)
        function traducirRecurrencia(numero) {
            const mapa = {
                0: 'Una vez',
                1: 'Diaria',
                2: 'Cada 2 días',
                3: 'Cada 3 días',
                4: 'Cada 4 días',
                5: 'Cada 5 días',
                6: 'Semanal',
                7: 'Cada 7 días',
                28: 'Mensual'
            };
            return mapa[numero] || `Cada ${numero} días`;
        }

        // Obtener espaciado mínimo por recurrencia (número)
        function getEspaciadoMinimo(recurrencia) {
            if (recurrencia === 0) return 0;      // Única vez
            if (recurrencia === 1) return 1;      // Diaria
            if (recurrencia === 3) return 3;      // Cada 3 días
            if (recurrencia === 6) return 6;      // Semanal
            if (recurrencia === 28) return 28;    // Mensual
            return recurrencia;                    // Cualquier otro número
        }

        // Obtener nombre de usuario por UID
        async function obtenerNombre(uid) {
            if (!uid) return 'Desconocido';
            if (usuariosCache[uid]) return usuariosCache[uid];
            try {
                const doc = await db.collection('usuarios').doc(uid).get();
                if (doc.exists) {
                    const nombre = doc.data().nombre || doc.data().email || uid;
                    usuariosCache[uid] = nombre;
                    return nombre;
                }
                return uid.substring(0, 8);
            } catch(e) {
                return uid.substring(0, 8);
            }
        }

        // Obtener última realización de una tarea (usando nueva estructura)
        async function obtenerUltimaRealizacion(tareaId) {
            try {
                const snap = await db.collection('historial')
                    .where('tareaId', '==', tareaId)
                    .orderBy('timestamp', 'desc')
                    .limit(1)
                    .get();
                if (snap.empty) return null;
                const data = snap.docs[0].data();
                const nombre = await obtenerNombre(data.usuarioId);
                return {
                    fecha: data.timestamp.toDate(),
                    quien: nombre,
                    uid: data.usuarioId
                };
            } catch(e) {
                return null;
            }
        }

        // ============================================
        // AUTENTICACIÓN
        // ============================================
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('loginMsg');
            
            msgDiv.innerHTML = '<div class="info">🔄 Autenticando...</div>';
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                currentUser = userCredential.user;
                msgDiv.innerHTML = `<div class="success">✅ Conectado: ${currentUser.email}</div>`;
                document.getElementById('tareasPanel').style.display = 'block';
                await cargarDatos();
            } catch(error) {
                if (error.code === 'auth/user-not-found') {
                    try {
                        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                        await db.collection('usuarios').doc(userCredential.user.uid).set({
                            email: email, nombre: '', rol: 'user', telefono: '',
                            creadoEn: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        currentUser = userCredential.user;
                        msgDiv.innerHTML = `<div class="success">✅ Usuario creado: ${email}</div>`;
                        document.getElementById('tareasPanel').style.display = 'block';
                        await cargarDatos();
                    } catch(e) {
                        msgDiv.innerHTML = `<div class="error">❌ Error: ${e.message}</div>`;
                    }
                } else {
                    msgDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
                }
            }
        }

        // ============================================
        // CARGA Y CLASIFICACIÓN DE TAREAS
        // ============================================
        async function cargarDatos() {
            // Cargar tareas activas (usando nuevo campo "nombre")
            const tareasSnap = await db.collection('tareas').where('activa', '==', true).get();
            tareasCache = [];
            tareasSnap.forEach(doc => {
                tareasCache.push({ id: doc.id, ...doc.data() });
            });
            
            // Cargar historial (usando nueva estructura con timestamp)
            const historialSnap = await db.collection('historial').get();
            historialCache = [];
            historialSnap.forEach(doc => {
                historialCache.push({ id: doc.id, ...doc.data() });
            });
            
            // Crear mapa de última realización por tareaId
            const ultimaPorTarea = new Map();
            historialCache.forEach(h => {
                const tareaId = h.tareaId;
                if (tareaId) {
                    const fecha = h.timestamp ? h.timestamp.toDate() : null;
                    if (!ultimaPorTarea.has(tareaId) || (fecha && fecha > ultimaPorTarea.get(tareaId).fecha)) {
                        ultimaPorTarea.set(tareaId, {
                            fecha: fecha,
                            usuarioId: h.usuarioId
                        });
                    }
                }
            });
            
            // Clasificar tareas
            const pendientes = [];
            const recientes = [];
            const ahora = new Date();
            
            for (const tarea of tareasCache) {
                const ultima = ultimaPorTarea.get(tarea.id);
                let esReciente = false;
                
                if (ultima && ultima.fecha) {
                    const dias = Math.floor((ahora - ultima.fecha) / 86400000);
                    const espaciado = getEspaciadoMinimo(tarea.recurrencia);
                    if (espaciado > 0 && dias < espaciado) {
                        esReciente = true;
                    }
                }
                
                if (esReciente) {
                    recientes.push({ ...tarea, ultimaFecha: ultima.fecha, ultimoUsuarioId: ultima.usuarioId });
                } else {
                    pendientes.push(tarea);
                }
            }
            
            // Mostrar resultados
            await mostrarResultados(pendientes, recientes);
        }
        
        async function mostrarResultados(pendientes, recientes) {
            const statsDiv = document.getElementById('stats');
            statsDiv.innerHTML = `
                <div class="success">
                    📊 Total tareas: ${tareasCache.length} | 
                    🟢 Pendientes: ${pendientes.length} | 
                    🔴 Realizadas recientemente: ${recientes.length}
                </div>
            `;
            
            let html = '<h2>📋 Tareas Pendientes (click para marcar)</h2>';
            html += '<div class="table-wrapper">';
            html += '<table><thead> <th>Nombre</th><th>Recurrencia</th><th>Prioridad</th><th>Dependencias</th><th>Fecha inicio</th> </thead><tbody>';
            
            for (const t of pendientes) {
                const recurrenciaTexto = traducirRecurrencia(t.recurrencia);
                const dependencias = t.dependencias || [];
                const dependenciasHtml = dependencias.length > 0 ? 
                    `<span class="badge-dependencia">${dependencias.length} dependencias</span>` : '-';
                
                html += `<tr class="task-row pendiente" data-id="${t.id}" data-titulo="${escapeHtml(t.nombre)}">
                    <td><strong>${escapeHtml(t.nombre)}</strong> ${t.descripcion ? `<br><small>${escapeHtml(t.descripcion.substring(0, 50))}</small>` : ''}</td>
                    <td>${recurrenciaTexto}</td>
                    <td>${t.prioridad || 'media'}</td>
                    <td>${dependenciasHtml}</td>
                    <td>${t.fechaInicio || '-'}</td>
                </tr>`;
            }
            html += '</tbody> </table> </div>';
            
            if (recientes.length > 0) {
                html += '<h2>🔴 Tareas Realizadas Recientemente</h2>';
                html += '<div class="table-wrapper">';
                html += '<table><thead> <th>Nombre</th><th>Recurrencia</th><th>Última realización</th><th>Realizada por</th> </thead><tbody>';
                
                for (const t of recientes) {
                    let fechaStr = t.ultimaFecha ? t.ultimaFecha.toLocaleDateString() : '-';
                    let nombreUsuario = await obtenerNombre(t.ultimoUsuarioId);
                    const recurrenciaTexto = traducirRecurrencia(t.recurrencia);
                    html += `<tr class="reciente">
                        <td><s>${escapeHtml(t.nombre)}</s></td>
                        <td>${recurrenciaTexto}</td>
                        <td>${fechaStr}</td>
                        <td>${escapeHtml(nombreUsuario)}</td>
                    </tr>`;
                }
                html += '</tbody></table></div>';
            }
            
            const container = document.getElementById('tareasList');
            container.innerHTML = html;
            
            // Agregar event listeners a las filas pendientes
            document.querySelectorAll('.task-row.pendiente').forEach(row => {
                row.addEventListener('click', async () => {
                    const tareaId = row.dataset.id;
                    const titulo = row.dataset.titulo;
                    if (confirm(`✅ ¿Marcar "${titulo}" como realizada?`)) {
                        await completarTarea(tareaId, titulo);
                    }
                });
            });
        }
        
        // ============================================
        // COMPLETAR TAREA (NUEVA ESTRUCTURA)
        // ============================================
        async function completarTarea(tareaId, titulo) {
            try {
                // Verificar espaciado mínimo
                const tareaDoc = await db.collection('tareas').doc(tareaId).get();
                const tarea = tareaDoc.data();
                const espaciado = getEspaciadoMinimo(tarea.recurrencia);
                
                // Obtener última realización
                const ultimaSnap = await db.collection('historial')
                    .where('tareaId', '==', tareaId)
                    .orderBy('timestamp', 'desc')
                    .limit(1)
                    .get();
                
                if (!ultimaSnap.empty && espaciado > 0) {
                    const ultima = ultimaSnap.docs[0].data();
                    const ultimaFecha = ultima.timestamp.toDate();
                    const dias = Math.floor((new Date() - ultimaFecha) / 86400000);
                    if (dias < espaciado) {
                        const nombre = await obtenerNombre(ultima.usuarioId);
                        alert(`⚠️ No puedes realizar esta tarea.\nÚltima vez: ${ultimaFecha.toLocaleDateString()} por ${nombre}\nEspaciado mínimo: ${espaciado} días.`);
                        return;
                    }
                }
                
                // Guardar en historial con nueva estructura
                await db.collection('historial').add({
                    tareaId: tareaId,
                    usuarioId: currentUser.uid,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                alert(`✅ Tarea "${titulo}" registrada`);
                await cargarDatos(); // Recargar
            } catch(e) {
                alert('Error: ' + e.message);
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
        }
    </script>
</body>
</html>
