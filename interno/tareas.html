<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas · Casa Verde Canas</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        /* ── TASK CARDS ──────────────────────────────────────── */
        .tasks-list { display: flex; flex-direction: column; gap: var(--space-3); }

        .task-card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: var(--space-4) var(--space-5);
            border: 1.5px solid var(--color-border-light);
            border-left: 4px solid var(--color-border);
            box-shadow: var(--shadow-xs);
            cursor: pointer;
            transition: box-shadow var(--transition-base), transform var(--transition-base);
            position: relative;
        }

        .task-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        /* Color izquierdo por urgencia */
        .task-card.urgencia-gris     { border-left-color: #bdc3bc; }
        .task-card.urgencia-verde    { border-left-color: var(--color-success); }
        .task-card.urgencia-amarillo { border-left-color: var(--color-warning); }
        .task-card.urgencia-rojo     { border-left-color: var(--color-danger); background: #fffafa; }
        .task-card.urgencia-en_curso { border-left-color: #0277bd; background: #f8fcff; }

        .task-card__top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: var(--space-3);
            margin-bottom: var(--space-2);
        }

        .task-card__nombre {
            font-size: var(--text-md);
            font-weight: 700;
            color: var(--color-text-primary);
            line-height: 1.3;
            flex: 1;
        }

        .task-card__badges {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-1);
            flex-shrink: 0;
        }

        .task-card__meta {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-3);
            margin-bottom: var(--space-2);
        }

        .task-card__meta span {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .task-card__meta .material-icons { font-size: 13px; }

        .task-card__desc {
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
            background: var(--color-surface-2);
            border-radius: var(--radius-sm);
            padding: var(--space-2) var(--space-3);
            white-space: pre-line;
            line-height: 1.6;
            margin-bottom: var(--space-3);
        }

        /* Colaboradores trabajando */
        .task-card__colabs {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
            margin-bottom: var(--space-3);
        }

        .colab-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px var(--space-3);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 600;
            background: var(--color-info-light);
            color: var(--color-info);
        }

        .colab-chip.yo {
            background: var(--color-warning-light);
            color: var(--color-warning);
        }

        .colab-chip .material-icons { font-size: 12px; }

        /* Acciones en card */
        .task-card__actions {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
            margin-top: var(--space-3);
            padding-top: var(--space-3);
            border-top: 1px solid var(--color-border-light);
        }

        /* ── MODAL DETALLE ───────────────────────────────────── */
        .reserva-info-box {
            background: var(--color-primary-xlight);
            border: 1.5px solid rgba(45,90,39,0.15);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            font-size: var(--text-sm);
            line-height: 1.9;
            margin-bottom: var(--space-4);
        }

        .reserva-info-box .separador {
            border: none;
            border-top: 1px dashed var(--color-border);
            margin: var(--space-2) 0;
        }

        .colab-row {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            background: var(--color-surface-2);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            margin-bottom: var(--space-2);
            flex-wrap: wrap;
        }

        .colab-row__nombre {
            font-weight: 700;
            font-size: var(--text-sm);
            flex: 2;
            min-width: 120px;
        }

        .colab-row__tiempo {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            flex: 3;
            min-width: 140px;
            line-height: 1.7;
        }

        .colab-row__monto {
            font-weight: 700;
            color: var(--color-primary);
            font-size: var(--text-sm);
            white-space: nowrap;
        }

        .monto-resumen {
            background: var(--color-primary-light);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            margin-top: var(--space-4);
            font-size: var(--text-sm);
            line-height: 2;
        }

        .monto-resumen .total {
            font-size: var(--text-xl);
            font-weight: 800;
            color: var(--color-primary);
            margin-top: var(--space-2);
        }

        /* ── TABS ────────────────────────────────────────────── */
        .tabs-bar {
            display: flex;
            gap: var(--space-1);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-full);
            padding: var(--space-1);
            margin-bottom: var(--space-5);
            width: fit-content;
        }

        .tab-btn {
            padding: var(--space-2) var(--space-5);
            border: none;
            background: transparent;
            border-radius: var(--radius-full);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--color-text-secondary);
            transition: all var(--transition-fast);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .tab-btn .cnt {
            background: var(--color-border);
            color: var(--color-text-muted);
            border-radius: var(--radius-full);
            padding: 1px 7px;
            font-size: var(--text-xs);
            font-weight: 700;
        }

        .tab-btn.active {
            background: var(--color-primary);
            color: #fff;
        }

        .tab-btn.active .cnt {
            background: rgba(255,255,255,0.25);
            color: #fff;
        }

        @media (max-width: 600px) {
            .tabs-bar { width: 100%; }
            .tab-btn  { flex: 1; justify-content: center; padding: var(--space-2) var(--space-3); }
        }
    </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────── -->
<header class="admin-header">
    <div class="admin-header__brand">
        <span class="material-icons">cottage</span>
        Casa Verde Canas
    </div>
    <div class="admin-header__actions">
        <div class="user-chip">
            <span class="material-icons">person</span>
            <span id="userName">—</span>
        </div>
        <button class="btn-logout" onclick="CVC.cerrarSesion()">
            <span class="material-icons">logout</span>
            Salir
        </button>
    </div>
</header>

<!-- ── NAVEGACIÓN ──────────────────────────────────────────── -->
<nav class="admin-nav" id="appNav"></nav>

<!-- ── CONTENIDO ───────────────────────────────────────────── -->
<main class="admin-content">

    <!-- KPIs -->
    <div class="kpi-grid" id="kpiGrid">
        <div class="state-loading" style="grid-column:1/-1;">
            <div class="spinner"></div><span>Cargando tareas...</span>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs-bar">
        <button class="tab-btn active" data-filter="pendiente">
            <span class="material-icons" style="font-size:15px;">schedule</span>
            Pendientes <span class="cnt" id="cntPendiente">0</span>
        </button>
        <button class="tab-btn" data-filter="en_curso">
            <span class="material-icons" style="font-size:15px;">play_circle</span>
            En curso <span class="cnt" id="cntEnCurso">0</span>
        </button>
    </div>

    <!-- Lista -->
    <div id="tareasContainer">
        <div class="state-loading"><div class="spinner"></div><span>Cargando...</span></div>
    </div>

</main>

<!-- ── MODAL DETALLE DE TAREA ───────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="cerrarModal(event)">
    <div class="modal modal--lg" onclick="event.stopPropagation()">

        <div class="modal__header">
            <div class="modal__title" id="modalTitulo">
                <span class="material-icons">checklist</span>
                Detalle de tarea
            </div>
            <button class="modal__close" onclick="cerrarModal()">
                <span class="material-icons">close</span>
            </button>
        </div>

        <div class="modal__body">

            <!-- Info de reserva (solo limpieza) -->
            <div id="reservaInfoBox" class="reserva-info-box" style="display:none;"></div>

            <!-- Descripción -->
            <div id="modalDescBox" style="display:none;" class="mb-4"></div>

            <!-- Colaboradores trabajando ahora -->
            <div id="colabsActivosBox" style="display:none;" class="mb-4">
                <p class="section-title">Trabajando ahora</p>
                <div id="colabsActivosList"></div>
            </div>

            <!-- Colaboradores que pausaron / terminaron -->
            <div id="colabsHistBox" style="display:none;" class="mb-4">
                <p class="section-title">Sesiones anteriores</p>
                <div id="colabsHistList"></div>
            </div>

            <!-- Acciones -->
            <div id="accionesModal"></div>

            <!-- Resumen final (tarea completada) -->
            <div id="resumenFinalBox" style="display:none;"></div>

        </div>

        <div class="modal__footer">
            <button class="btn btn-ghost" onclick="cerrarModal()">Cerrar</button>
        </div>

    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="utils.js"></script>
<script>
(async () => {
    const { user, userData } = await CVC.verificarAuth(['admin', 'user']);
    document.getElementById('userName').textContent = userData.nombre || user.email;
    CVC.renderNav('tareas.html', userData.rol);

    // Mostrar nav completa solo a admins
    if (userData.rol === 'admin') {
        document.getElementById('adminNav').style.display = 'flex';
    }

    const db = CVC.db;
    const {
        escapeHtml, formatFecha, formatFechaHora, formatHoras,
        urgenciaTarea, badgePrioridad, showEmpty, showError, showToast,
        iniciarTarea, pausarTarea, finalizarTarea
    } = CVC;

    const currentUser  = { uid: user.uid, nombre: userData.nombre || user.email };
    let tareasCache    = [];
    let filtroActual   = 'pendiente';
    let tareaModal     = null;

    // ── Colores CSS por urgencia ─────────────────────────────
    const urgBadge = {
        gris:     'badge-neutral',
        verde:    'badge-confirmada',
        amarillo: 'badge-pendiente',
        rojo:     'badge-alta'
    };

    // ── Cargar tareas ────────────────────────────────────────
    async function cargarTareas() {
        try {
            // Sin where+orderBy combinados para evitar índice compuesto
            // Filtramos y ordenamos en cliente
            const snap = await db.collection('tareas').get();
            tareasCache = snap.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .filter(t => t.activa !== false && t.estado !== 'finalizada')
                .sort((a, b) => {
                    const fa = a.fechaInicio || '';
                    const fb = b.fechaInicio || '';
                    return fa.localeCompare(fb);
                });
        } catch (e) {
            showError('#tareasContainer', 'Error al cargar tareas', e.message, cargarTareas);
            return;
        }

        actualizarKPIs();
        renderTareas();
    }

    // ── KPIs ─────────────────────────────────────────────────
    function actualizarKPIs() {
        const pendientes = tareasCache.filter(t => t.estado === 'pendiente' || !t.estado);
        const enCurso    = tareasCache.filter(t => t.estado === 'en_curso');
        const urgentes   = tareasCache.filter(t => {
            const u = urgenciaTarea(t);
            return u.color === 'rojo';
        });
        const hoy = tareasCache.filter(t => t.fechaInicio === new Date().toISOString().split('T')[0]);

        // Actualizar contadores de tabs
        document.getElementById('cntPendiente').textContent = pendientes.length;
        document.getElementById('cntEnCurso').textContent   = enCurso.length;

        document.getElementById('kpiGrid').innerHTML = `
            <div class="kpi-card">
                <span class="material-icons kpi-icon">schedule</span>
                <div class="kpi-number">${pendientes.length}</div>
                <div class="kpi-label">Pendientes</div>
            </div>
            <div class="kpi-card info">
                <span class="material-icons kpi-icon">play_circle</span>
                <div class="kpi-number">${enCurso.length}</div>
                <div class="kpi-label">En curso</div>
            </div>
            <div class="kpi-card danger">
                <span class="material-icons kpi-icon">warning</span>
                <div class="kpi-number">${urgentes.length}</div>
                <div class="kpi-label">Muy atrasadas</div>
            </div>
            <div class="kpi-card success">
                <span class="material-icons kpi-icon">today</span>
                <div class="kpi-number">${hoy.length}</div>
                <div class="kpi-label">Para hoy</div>
            </div>
        `;
    }

    // ── Render lista ─────────────────────────────────────────
    function renderTareas() {
        const lista = tareasCache.filter(t => {
            const estado = t.estado || 'pendiente';
            return estado === filtroActual;
        });

        const container = document.getElementById('tareasContainer');

        if (!lista.length) {
            const msgs = {
                pendiente: ['¡Todo al día!',    'No hay tareas pendientes.',   'task_alt'],
                en_curso:  ['Sin tareas activas','Nadie está trabajando ahora.','play_circle']
            };
            const [titulo, desc, icono] = msgs[filtroActual] || ['Sin datos', '', 'inbox'];
            showEmpty(container, titulo, desc, icono);
            return;
        }

        container.innerHTML = `<div class="tasks-list">${lista.map(renderTareaCard).join('')}</div>`;

        // Click en cards → abrir modal
        container.querySelectorAll('.task-card[data-id]').forEach(card => {
            card.addEventListener('click', () => {
                const t = tareasCache.find(x => x.id === card.dataset.id);
                if (t) abrirModal(t);
            });
        });
    }

    function renderTareaCard(t) {
        const estado    = t.estado || 'pendiente';
        const urgencia  = urgenciaTarea(t);
        const sesiones  = t.sesiones || [];
        const activos   = sesiones.filter(s => s.fin === null);
        const yoActivo  = activos.find(s => s.uid === currentUser.uid);

        const claseUrgencia = estado === 'en_curso' ? 'urgencia-en_curso' : `urgencia-${urgencia.color}`;

        // Chips de colaboradores activos
        const colabChips = activos.map(s => `
            <span class="colab-chip ${s.uid === currentUser.uid ? 'yo' : ''}">
                <span class="material-icons">engineering</span>
                ${escapeHtml(s.nombre)}${s.uid === currentUser.uid ? ' (vos)' : ''}
            </span>`).join('');

        // Botones según estado y rol del usuario
        let acciones = '';
        if (estado === 'pendiente') {
            acciones = `
                <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); accionIniciar('${t.id}')">
                    <span class="material-icons">play_arrow</span> Iniciar
                </button>`;
        } else if (estado === 'en_curso') {
            if (yoActivo) {
                acciones = `
                    <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); accionPausar('${t.id}')">
                        <span class="material-icons">pause</span> Pausar
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); accionFinalizar('${t.id}')">
                        <span class="material-icons">check_circle</span> Finalizar
                    </button>`;
            } else {
                // Puede unirse o finalizar
                acciones = `
                    <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); accionIniciar('${t.id}')">
                        <span class="material-icons">play_arrow</span> Unirse
                    </button>
                    <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); accionFinalizar('${t.id}')">
                        <span class="material-icons">check_circle</span> Finalizar
                    </button>`;
            }
        }

        return `
        <div class="task-card ${claseUrgencia}" data-id="${t.id}">
            <div class="task-card__top">
                <div class="task-card__nombre">${escapeHtml(t.nombre)}</div>
                <div class="task-card__badges">
                    <span class="badge ${urgBadge[urgencia.color] || 'badge-neutral'}">${urgencia.label}</span>
                    ${badgePrioridad(t.prioridad)}
                </div>
            </div>

            <div class="task-card__meta">
                ${t.fechaInicio ? `<span><span class="material-icons">calendar_today</span>${t.fechaInicio}</span>` : ''}
                ${t.tipo       ? `<span><span class="material-icons">${t.tipo === 'limpieza' ? 'cleaning_services' : 'checklist'}</span>${t.tipo}</span>` : ''}
                ${t.monto > 0  ? `<span><span class="material-icons">payments</span>R$ ${t.monto}</span>` : ''}
                ${t.recurrencia > 0 ? `<span><span class="material-icons">repeat</span>Cada ${t.recurrencia}d</span>` : ''}
            </div>

            ${t.descripcion ? `<div class="task-card__desc">${escapeHtml(t.descripcion)}</div>` : ''}

            ${activos.length ? `<div class="task-card__colabs">${colabChips}</div>` : ''}

            <div class="task-card__actions" onclick="event.stopPropagation()">
                ${acciones}
                <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); abrirModal(tareasCache.find(x=>x.id==='${t.id}'))">
                    <span class="material-icons">info</span> Detalle
                </button>
            </div>
        </div>`;
    }

    // ── ACCIONES ─────────────────────────────────────────────

    window.accionIniciar = async function(tareaId) {
        try {
            await iniciarTarea(tareaId, currentUser);
            showToast('Tarea iniciada ▶️', 'success');
            await cargarTareas();
            // Refrescar modal si está abierto
            if (tareaModal?.id === tareaId) {
                const t = tareasCache.find(x => x.id === tareaId);
                if (t) abrirModal(t);
            }
        } catch (e) {
            showToast(e.message, 'error');
        }
    };

    window.accionPausar = async function(tareaId) {
        try {
            await pausarTarea(tareaId, currentUser);
            showToast('Tarea pausada ⏸️', 'warning');
            await cargarTareas();
            if (tareaModal?.id === tareaId) cerrarModal();
        } catch (e) {
            showToast(e.message, 'error');
        }
    };

    window.accionFinalizar = async function(tareaId) {
        const t = tareasCache.find(x => x.id === tareaId);
        if (!confirm(`¿Finalizar "${t?.nombre}"?\n\nEsto cerrará la tarea para todos los colaboradores y calculará los montos proporcionales al tiempo trabajado.`)) return;
        try {
            const colaboradores = await finalizarTarea(tareaId, currentUser);
            // Mostrar resumen
            const resumen = colaboradores
                .filter(c => c.horas > 0)
                .map(c => `• ${c.nombre}: ${formatHoras(c.horas)}${c.montoRecibido > 0 ? ` → R$ ${c.montoRecibido.toFixed(2)}` : ''}`)
                .join('\n');
            showToast('Tarea finalizada ✅', 'success');
            if (resumen) alert(`✅ Tarea finalizada\n\n${resumen}`);
            await cargarTareas();
            if (tareaModal?.id === tareaId) cerrarModal();
        } catch (e) {
            showToast(e.message, 'error');
        }
    };

    // ── MODAL ─────────────────────────────────────────────────

    window.abrirModal = async function(tarea) {
        tareaModal = tarea;
        const estado   = tarea.estado || 'pendiente';
        const sesiones = tarea.sesiones || [];
        const activos  = sesiones.filter(s => s.fin === null);
        const cerradas = sesiones.filter(s => s.fin !== null);
        const yoActivo = activos.find(s => s.uid === currentUser.uid);

        // Título
        document.getElementById('modalTitulo').innerHTML = `
            <span class="material-icons">${tarea.tipo === 'limpieza' ? 'cleaning_services' : 'checklist'}</span>
            ${escapeHtml(tarea.nombre)}`;

        // Info de reserva (solo limpieza)
        const infoBox = document.getElementById('reservaInfoBox');
        if (tarea.tipo === 'limpieza' && tarea.reservaId) {
            try {
                const rdoc = await db.collection('reservas').doc(tarea.reservaId).get();
                if (rdoc.exists) {
                    const r = rdoc.data();
                    infoBox.innerHTML = `
                        <strong>🏠 Cabaña:</strong> ${r.caba}<br>
                        <strong>🚪 Huésped saliente:</strong> ${escapeHtml(r.nombre)}<br>
                        <strong>👥 Huéspedes:</strong> ${r.huespedes || r.adultos || '—'}<br>
                        <strong>📅 Check-out:</strong> ${formatFecha(r.checkOut)}<br>
                        ${r.notas ? `<strong>📝 Notas:</strong> ${escapeHtml(r.notas)}<br>` : ''}
                        ${tarea.proximaReservaHuesped ? `
                            <hr class="separador">
                            <strong>🛎️ Próximo huésped:</strong> ${escapeHtml(tarea.proximaReservaHuesped)}<br>
                            <strong>📅 Check-in siguiente:</strong> ${formatFecha(tarea.proximaReservaCheckIn)}
                        ` : ''}
                        <hr class="separador">
                        <strong>💰 Monto limpieza:</strong> R$ ${tarea.monto || 0}`;
                    infoBox.style.display = 'block';
                } else { infoBox.style.display = 'none'; }
            } catch (e) { infoBox.style.display = 'none'; }
        } else {
            infoBox.style.display = 'none';
        }

        // Descripción
        const descBox = document.getElementById('modalDescBox');
        if (tarea.descripcion) {
            descBox.innerHTML = `<div class="task-card__desc">${escapeHtml(tarea.descripcion)}</div>`;
            descBox.style.display = 'block';
        } else {
            descBox.style.display = 'none';
        }

        // Colaboradores activos ahora
        const activosBox = document.getElementById('colabsActivosBox');
        if (activos.length) {
            document.getElementById('colabsActivosList').innerHTML = activos.map(s => {
                const inicio = s.inicio?.toDate ? s.inicio.toDate().toLocaleTimeString('es-AR') : '—';
                return `<div class="colab-row">
                    <div class="colab-row__nombre">
                        ${escapeHtml(s.nombre)}
                        ${s.uid === currentUser.uid ? '<span class="badge badge-en_curso">vos</span>' : ''}
                    </div>
                    <div class="colab-row__tiempo">
                        <span>⏱️ Desde: ${inicio}</span>
                        <span style="color:var(--color-info);">Trabajando...</span>
                    </div>
                </div>`;
            }).join('');
            activosBox.style.display = 'block';
        } else {
            activosBox.style.display = 'none';
        }

        // Sesiones cerradas (pausadas)
        const histBox = document.getElementById('colabsHistBox');
        if (cerradas.length) {
            // Agrupar por uid y sumar horas
            const porUid = {};
            for (const s of cerradas) {
                const ini = s.inicio?.toDate ? s.inicio.toDate() : new Date(s.inicio);
                const fin = s.fin?.toDate    ? s.fin.toDate()    : new Date(s.fin);
                const hrs = Math.max(0, (fin - ini) / 3_600_000);
                if (!porUid[s.uid]) porUid[s.uid] = { nombre: s.nombre, horas: 0, sesiones: 0 };
                porUid[s.uid].horas    += hrs;
                porUid[s.uid].sesiones += 1;
            }
            document.getElementById('colabsHistList').innerHTML = Object.entries(porUid).map(([uid, d]) => `
                <div class="colab-row">
                    <div class="colab-row__nombre">${escapeHtml(d.nombre)}</div>
                    <div class="colab-row__tiempo">
                        ${d.sesiones} sesión${d.sesiones > 1 ? 'es' : ''} · ${formatHoras(d.horas)} acumuladas
                    </div>
                </div>`).join('');
            histBox.style.display = 'block';
        } else {
            histBox.style.display = 'none';
        }

        // Acciones según estado
        const accionesEl = document.getElementById('accionesModal');
        if (estado === 'pendiente') {
            accionesEl.innerHTML = `
                <button class="btn btn-primary" onclick="cerrarModal(); accionIniciar('${tarea.id}')">
                    <span class="material-icons">play_arrow</span> Iniciar tarea
                </button>`;
        } else if (estado === 'en_curso') {
            if (yoActivo) {
                accionesEl.innerHTML = `
                    <div class="alert alert-info mb-4">
                        <span class="material-icons">info</span>
                        Estás trabajando en esta tarea desde las ${activos.find(s=>s.uid===currentUser.uid)?.inicio?.toDate?.()?.toLocaleTimeString('es-AR') || '—'}.
                    </div>
                    <div style="display:flex; gap:var(--space-3); flex-wrap:wrap;">
                        <button class="btn btn-secondary" onclick="cerrarModal(); accionPausar('${tarea.id}')">
                            <span class="material-icons">pause</span> Pausar mi trabajo
                        </button>
                        <button class="btn btn-primary" onclick="cerrarModal(); accionFinalizar('${tarea.id}')">
                            <span class="material-icons">check_circle</span> Finalizar tarea
                        </button>
                    </div>`;
            } else {
                accionesEl.innerHTML = `
                    <div style="display:flex; gap:var(--space-3); flex-wrap:wrap;">
                        <button class="btn btn-primary" onclick="cerrarModal(); accionIniciar('${tarea.id}')">
                            <span class="material-icons">play_arrow</span> Unirme
                        </button>
                        <button class="btn btn-ghost" onclick="cerrarModal(); accionFinalizar('${tarea.id}')">
                            <span class="material-icons">check_circle</span> Finalizar tarea
                        </button>
                    </div>`;
            }
        } else {
            accionesEl.innerHTML = '';
        }

        document.getElementById('modalOverlay').style.display = 'flex';
    };

    window.cerrarModal = function(e) {
        if (e && e.target !== document.getElementById('modalOverlay')) return;
        document.getElementById('modalOverlay').style.display = 'none';
        tareaModal = null;
    };

    // ── TABS ─────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filtroActual = btn.dataset.filter;
            renderTareas();
        });
    });

    // ── INIT ─────────────────────────────────────────────────
    await cargarTareas();

    // Refrescar cada 30s para ver cambios de otros colaboradores
    setInterval(cargarTareas, 30_000);

})();
</script>
</body>
</html>
