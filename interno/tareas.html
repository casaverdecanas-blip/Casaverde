<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas · Casa Verde Canas</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        /* ── TASK CARDS ──────────────────────────────────────── */
        .tasks-list { display: flex; flex-direction: column; gap: var(--space-3); }

        .task-card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: var(--space-4) var(--space-5);
            border: 1.5px solid var(--color-border-light);
            border-left: 5px solid var(--color-border);
            box-shadow: var(--shadow-xs);
            transition: box-shadow var(--transition-base);
        }
        .task-card:hover { box-shadow: var(--shadow-md); }

        /* Urgencia por color de borde izquierdo */
        .task-card.urgencia-gris     { border-left-color: #bdc3bc; }
        .task-card.urgencia-verde    { border-left-color: var(--color-success); }
        .task-card.urgencia-amarillo { border-left-color: var(--color-warning); }
        .task-card.urgencia-rojo     { border-left-color: var(--color-danger); background: #fffafa; }

        .task-card__header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: var(--space-3);
            margin-bottom: var(--space-2);
        }

        .task-card__nombre {
            font-size: var(--text-md);
            font-weight: 700;
            color: var(--color-text-primary);
            line-height: 1.3;
            flex: 1;
        }

        .task-card__badges {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-1);
            flex-shrink: 0;
        }

        .task-card__meta {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-3);
            margin-bottom: var(--space-3);
        }

        .task-card__meta span {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .task-card__meta .material-icons { font-size: 13px; }

        .task-card__desc {
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
            background: var(--color-surface-2);
            border-radius: var(--radius-sm);
            padding: var(--space-3);
            white-space: pre-line;
            line-height: 1.6;
            margin-bottom: var(--space-3);
        }

        /* Chips de quién trabaja ahora */
        .task-card__working {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
            margin-bottom: var(--space-3);
        }

        .working-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px var(--space-3);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 600;
            background: var(--color-info-light);
            color: var(--color-info);
        }

        .working-chip.yo {
            background: var(--color-warning-light);
            color: var(--color-warning);
        }

        .working-chip .material-icons { font-size: 12px; }

        /* Monto a cobrar */
        .monto-chip {
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
            background: var(--color-success-bg);
            color: var(--color-success);
            border-radius: var(--radius-sm);
            padding: 4px var(--space-3);
            font-size: var(--text-sm);
            font-weight: 700;
            margin-bottom: var(--space-3);
        }

        /* Botones de acción — grandes y claros */
        .task-card__actions {
            display: flex;
            gap: var(--space-3);
            flex-wrap: wrap;
        }

        .btn-accion {
            flex: 1;
            min-width: 120px;
            height: 44px;
            font-size: var(--text-sm);
            font-weight: 700;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            cursor: pointer;
            border: none;
            font-family: var(--font-body);
            transition: all var(--transition-fast);
        }

        .btn-accion.iniciar {
            background: var(--color-primary);
            color: white;
        }
        .btn-accion.iniciar:hover { background: var(--color-primary-dark); }

        .btn-accion.pausar {
            background: var(--color-warning-bg);
            color: var(--color-warning);
            border: 1.5px solid var(--color-warning);
        }
        .btn-accion.pausar:hover { background: var(--color-warning); color: white; }

        .btn-accion.finalizar {
            background: var(--color-success);
            color: white;
        }
        .btn-accion.verificar { background:#f0faf5;color:#0F6E56;border:1.5px solid #1D9E75; }
        .btn-accion.verificar:hover { background:#1D9E75;color:white; }
        .btn-accion.finalizar:hover { background: var(--color-primary-dark); }

        .btn-accion.detalle {
            background: var(--color-surface-2);
            color: var(--color-text-secondary);
            border: 1.5px solid var(--color-border);
            flex: 0;
            min-width: 44px;
            width: 44px;
        }
        .btn-accion.detalle:hover { background: var(--color-border); }

        /* Cronómetro activo */
        .cronometro {
            font-size: var(--text-xs);
            color: var(--color-warning);
            font-weight: 700;
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: var(--space-2);
        }

        .cronometro .material-icons { font-size: 14px; animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.4; }
        }

        /* ── TABS ────────────────────────────────────────────── */
        .tabs-bar {
            display: flex;
            gap: var(--space-1);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-full);
            padding: var(--space-1);
            margin-bottom: var(--space-5);
            width: fit-content;
        }

        .tab-btn {
            padding: var(--space-2) var(--space-5);
            border: none;
            background: transparent;
            border-radius: var(--radius-full);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--color-text-secondary);
            transition: all var(--transition-fast);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .tab-btn .cnt {
            background: var(--color-border);
            color: var(--color-text-muted);
            border-radius: var(--radius-full);
            padding: 1px 7px;
            font-size: var(--text-xs);
            font-weight: 700;
        }

        .tab-btn.active {
            background: var(--color-primary);
            color: white;
        }

        .tab-btn.active .cnt {
            background: rgba(255,255,255,0.25);
            color: white;
        }

        @media (max-width: 600px) {
            .tabs-bar  { width: 100%; }
            .tab-btn   { flex: 1; justify-content: center; }
            .btn-accion { min-width: 100px; }
        }

        /* ── MODAL DETALLE ───────────────────────────────────── */
        .reserva-info-box {
            background: var(--color-primary-xlight);
            border: 1.5px solid rgba(45,90,39,0.15);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            font-size: var(--text-sm);
            line-height: 1.9;
            margin-bottom: var(--space-4);
        }

        .colab-row {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            background: var(--color-surface-2);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            margin-bottom: var(--space-2);
            flex-wrap: wrap;
        }

        .colab-row__nombre {
            font-weight: 700;
            font-size: var(--text-sm);
            flex: 2;
            min-width: 120px;
        }

        .colab-row__tiempo {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            flex: 3;
            min-width: 140px;
            line-height: 1.7;
        }

        /* Link a admin solo visible para admin */
        .admin-only-link {
            display: none;
            font-size: var(--text-xs);
            color: var(--color-primary);
            text-decoration: none;
            margin-top: var(--space-2);
            align-items: center;
            gap: 4px;
        }
        .admin-only-link.visible { display: inline-flex; }
    </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────── -->
<header class="admin-header">
    <div class="admin-header__brand">
        <span class="material-icons">cottage</span>
        Casa Verde Canas
    </div>
    <div class="admin-header__actions">
        <div class="user-chip">
            <span class="material-icons">person</span>
            <span id="userName">—</span>
        </div>
        <button class="btn-logout" onclick="CVC.cerrarSesion()">
            <span class="material-icons">logout</span>
            Salir
        </button>
    </div>
</header>

<!-- ── NAVEGACIÓN ──────────────────────────────────────────── -->
<nav class="admin-nav" id="appNav"></nav>

<!-- ── CONTENIDO ───────────────────────────────────────────── -->
<main class="admin-content">

    <!-- KPIs -->
    <div class="kpi-grid" id="kpiGrid" style="margin-bottom:var(--space-5);">
        <div class="state-loading" style="grid-column:1/-1;">
            <div class="spinner"></div><span>Cargando tareas...</span>
        </div>
    </div>

    <!-- Link a admin — solo visible para admins -->
    <div id="adminLinkBar" style="display:none; margin-bottom:var(--space-4);">
        <a href="tareas-admin.html" style="display:inline-flex; align-items:center; gap:var(--space-2);
            background:var(--color-primary-xlight); border:1px solid var(--color-primary-light);
            border-radius:var(--radius-md); padding:var(--space-2) var(--space-4);
            font-size:var(--text-sm); font-weight:600; color:var(--color-primary); text-decoration:none;">
            <span class="material-icons" style="font-size:16px;">bar_chart</span>
            Ver gestión y estadísticas de tareas
            <span class="material-icons" style="font-size:14px;">arrow_forward</span>
        </a>
    </div>

    <!-- Tabs -->
    <div class="tabs-bar">
        <button class="tab-btn active" data-filter="pendiente">
            <span class="material-icons" style="font-size:15px;">schedule</span>
            Pendientes <span class="cnt" id="cntPendiente">0</span>
        </button>
        <button class="tab-btn" data-filter="en_curso">
            <span class="material-icons" style="font-size:15px;">play_circle</span>
            En curso <span class="cnt" id="cntEnCurso">0</span>
        </button>
    </div>

    <!-- Lista de tareas -->
    <div id="tareasContainer">
        <div class="state-loading"><div class="spinner"></div><span>Cargando...</span></div>
    </div>

</main>

<!-- ── MODAL DETALLE ────────────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="cerrarModal(event)">
    <div class="modal modal--lg" onclick="event.stopPropagation()">

        <div class="modal__header">
            <div class="modal__title" id="modalTitulo">
                <span class="material-icons">checklist</span>
                Detalle de tarea
            </div>
            <button class="modal__close" onclick="cerrarModal()">
                <span class="material-icons">close</span>
            </button>
        </div>

        <div class="modal__body">
            <!-- Info de reserva (solo limpieza) -->
            <div id="reservaInfoBox" class="reserva-info-box" style="display:none;"></div>

            <!-- Descripción -->
            <div id="modalDescBox" style="display:none;" class="mb-4"></div>

            <!-- Quién trabaja ahora -->
            <div id="colabsActivosBox" style="display:none;" class="mb-4">
                <p class="section-title">Trabajando ahora</p>
                <div id="colabsActivosList"></div>
            </div>

            <!-- Sesiones cerradas -->
            <div id="colabsHistBox" style="display:none;" class="mb-4">
                <p class="section-title">Sesiones anteriores</p>
                <div id="colabsHistList"></div>
            </div>

            <!-- Acciones -->
            <div id="accionesModal"></div>

            <!-- Link a admin (solo para admins) -->
            <a id="linkAdminDetalle" href="#" class="admin-only-link" style="margin-top:var(--space-4);">
                <span class="material-icons" style="font-size:14px;">bar_chart</span>
                Ver estadísticas completas de esta tarea
            </a>
        </div>

        <div class="modal__footer">
            <button class="btn btn-ghost" onclick="cerrarModal()">Cerrar</button>
        </div>

    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="utils.js"></script>
<script>
(async () => {
    const { user, userData } = await CVC.verificarAuth(['admin', 'user']);
    document.getElementById('userName').textContent = userData.nombre || user.email;
    CVC.renderNav('tareas.html', userData.rol);
    CVC.initAyuda('tareas.html');

    const db = CVC.db;
    const {
        escapeHtml, formatFecha, formatHoras,
        urgenciaTarea, showEmpty, showError, showToast,
        iniciarTarea, pausarTarea, finalizarTarea
    } = CVC;

    const esAdmin     = userData.rol === 'admin';
    const currentUser = { uid: user.uid, nombre: userData.nombre || user.email };

    // Mostrar link a admin solo para admins
    if (esAdmin) {
        document.getElementById('adminLinkBar').style.display = 'block';
    }

    let tareasCache  = [];
    let filtroActual = 'pendiente';
    let tareaModal   = null;
    let cronometros  = {};  // { tareaId: intervalId }

    // ── Prioridad de ordenamiento ─────────────────────────────
    // 1. Limpieza siempre primero
    // 2. Rojo → Amarillo → Verde → Gris
    // 3. Por fecha (más antigua primero)
    const ORDEN_URGENCIA = { rojo: 1, amarillo: 2, verde: 3, gris: 4 };

    function urgenciaReal(t) {
        if (!t.fechaInicio) return 'gris';
        const hoy = new Date(); hoy.setHours(0,0,0,0);
        const inicio     = new Date(t.fechaInicio + 'T00:00:00');
        const diasAtraso = Math.floor((hoy - inicio) / 86400000);
        if (diasAtraso < 0)  return 'gris';
        if (diasAtraso === 0) return 'verde';
        const ciclo = t.recurrencia > 0 ? t.recurrencia : 3;
        if (diasAtraso > ciclo || diasAtraso > 10) return 'rojo';
        return 'amarillo';
    }

    function ordenarTareas(lista) {
        return lista.sort((a, b) => {
            const aLimp = a.tipo === 'limpieza' ? 0 : 1;
            const bLimp = b.tipo === 'limpieza' ? 0 : 1;
            if (aLimp !== bLimp) return aLimp - bLimp;
            const oA = ORDEN_URGENCIA[urgenciaReal(a)] || 5;
            const oB = ORDEN_URGENCIA[urgenciaReal(b)] || 5;
            if (oA !== oB) return oA - oB;
            return (a.fechaInicio || '').localeCompare(b.fechaInicio || '');
        });
    }

    // ── Cargar tareas ────────────────────────────────────────
    async function cargarTareas() {
        try {
            const snap = await db.collection('tareas').get();
            let todas = snap.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .filter(t => t.activa !== false && t.estado !== 'finalizada');

            // Para colaboradores: solo sus tareas o tareas sin asignar
            // (todas las tareas son visibles para todos — es operativo)
            await invalidarSesionesOlvidadas(todas);

            const snap2 = await db.collection('tareas').get();
            tareasCache = snap2.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .filter(t => t.activa !== false && t.estado !== 'finalizada');

        } catch(e) {
            showError('#tareasContainer', 'Error al cargar tareas', e.message, cargarTareas);
            return;
        }

        actualizarKPIs();
        renderTareas();
    }

    // ── Invalidar sesiones olvidadas (> 8h) o absurdas (< 5min) ──
    async function invalidarSesionesOlvidadas(tareas) {
        const LIMITE_HORAS = 8;
        const MIN_MINUTOS  = 5;  // sesiones de menos de 5 minutos no cuentan
        const ahora = new Date();

        for (const tarea of tareas) {
            if (tarea.estado !== 'en_curso') continue;

            try {
                const sesSnap = await db.collection('tareas').doc(tarea.id)
                    .collection('sesiones').get();

                let huboInvalidacion = false;
                const batch = db.batch();

                for (const sesDoc of sesSnap.docs) {
                    const s = sesDoc.data();

                    // Sesiones ya cerradas: verificar si duran menos de 5 minutos
                    if (s.fin !== null && s.fin !== undefined) {
                        const ini = s.inicio?.toDate ? s.inicio.toDate() : new Date(s.inicio);
                        const fin = s.fin?.toDate    ? s.fin.toDate()    : new Date(s.fin);
                        const minutos = (fin - ini) / 60000;
                        if (minutos < MIN_MINUTOS && !s.invalidada && !s.olvido) {
                            batch.update(sesDoc.ref, {
                                invalidada:    true,
                                motivoInvalid: 'Duración menor a ' + MIN_MINUTOS + ' minutos — no acumula horas',
                                invalidadaEn:  firebase.firestore.FieldValue.serverTimestamp()
                            });
                        }
                        continue;
                    }

                    // Sesiones abiertas: verificar si llevan más de 8 horas
                    const inicio = s.inicio?.toDate ? s.inicio.toDate() : new Date(s.inicio);
                    const horas  = (ahora - inicio) / 3600000;

                    if (horas > LIMITE_HORAS) {
                        batch.update(sesDoc.ref, {
                            fin:          s.inicio,
                            olvido:       true,
                            invalidada:   true,
                            motivoInvalid: 'Sesión abierta por más de ' + LIMITE_HORAS + 'h sin cierre',
                            invalidadaEn: firebase.firestore.FieldValue.serverTimestamp(),
                            nota:         'Cerrada automáticamente por inactividad'
                        });
                        huboInvalidacion = true;
                    }
                }

                if (huboInvalidacion) {
                    await batch.commit();
                    const sesSnap2       = await db.collection('tareas').doc(tarea.id).collection('sesiones').get();
                    const quedanAbiertas = sesSnap2.docs.some(d => d.data().fin === null || d.data().fin === undefined);
                    await db.collection('tareas').doc(tarea.id).update({
                        estado:          quedanAbiertas ? 'en_curso' : 'pendiente',
                        sesionesActivas: []
                    });
                    showToast('⏰ Sesión de "' + tarea.nombre + '" cerrada por inactividad.', 'warning');
                } else {
                    await batch.commit();
                }
            } catch(e) {
                console.warn('invalidarSesiones:', tarea.id, e.message);
            }
        }
    }

    // ── KPIs ──────────────────────────────────────────────────
    function actualizarKPIs() {
        const pendientes = tareasCache.filter(t => !t.estado || t.estado === 'pendiente');
        const enCurso    = tareasCache.filter(t => t.estado === 'en_curso');
        const urgentes   = tareasCache.filter(t => urgenciaReal(t) === 'rojo');
        const hoy        = new Date().toISOString().split('T')[0];
        const paraHoy    = tareasCache.filter(t => t.fechaInicio === hoy);

        document.getElementById('cntPendiente').textContent = pendientes.length;
        document.getElementById('cntEnCurso').textContent   = enCurso.length;

        document.getElementById('kpiGrid').innerHTML = `
            <div class="kpi-card">
                <span class="material-icons kpi-icon">schedule</span>
                <div class="kpi-number">${pendientes.length}</div>
                <div class="kpi-label">Pendientes</div>
            </div>
            <div class="kpi-card info">
                <span class="material-icons kpi-icon">play_circle</span>
                <div class="kpi-number">${enCurso.length}</div>
                <div class="kpi-label">En curso</div>
            </div>
            <div class="kpi-card danger">
                <span class="material-icons kpi-icon">warning</span>
                <div class="kpi-number">${urgentes.length}</div>
                <div class="kpi-label">Muy atrasadas</div>
            </div>
            <div class="kpi-card success">
                <span class="material-icons kpi-icon">today</span>
                <div class="kpi-number">${paraHoy.length}</div>
                <div class="kpi-label">Para hoy</div>
            </div>
        `;
    }

    // ── Render lista ──────────────────────────────────────────
    function renderTareas() {
        // Detener cronómetros activos antes de re-renderizar
        Object.values(cronometros).forEach(clearInterval);
        cronometros = {};

        const lista = tareasCache.filter(t => {
            const estado = t.estado || 'pendiente';
            return estado === filtroActual;
        });

        const container = document.getElementById('tareasContainer');

        if (!lista.length) {
            const msgs = {
                pendiente: ['¡Todo al día!',     'No hay tareas pendientes.', 'task_alt'],
                en_curso:  ['Sin tareas activas', 'Nadie está trabajando ahora.', 'play_circle']
            };
            const [titulo, desc, icono] = msgs[filtroActual] || ['Sin datos', '', 'inbox'];
            showEmpty(container, titulo, desc, icono);
            return;
        }

        const ordenadas = ordenarTareas([...lista]);
        container.innerHTML = `<div class="tasks-list">${ordenadas.map(renderCard).join('')}</div>`;

        // Iniciar cronómetros para tareas en curso donde yo participo
        ordenadas.forEach(t => {
            if (t.estado === 'en_curso') {
                const sesActiva = (t.sesionesActivas || []).find(s => s.uid === currentUser.uid);
                if (sesActiva) iniciarCronometro(t.id, sesActiva.inicio);
            }
        });
    }

    function renderCard(t) {
        const urgencia   = urgenciaReal(t);
        const activos    = t.sesionesActivas || [];
        const yoActivo   = activos.find(s => s.uid === currentUser.uid);
        const estado     = t.estado || 'pendiente';

        // Badge de urgencia
        const urgBadge = { gris: 'badge-neutral', verde: 'badge-confirmada', amarillo: 'badge-pendiente', rojo: 'badge-alta' };
        const urgLabel = estado === 'en_curso' ? 'En curso'
            : urgencia === 'gris'    ? 'Próximamente'
            : urgencia === 'verde'   ? 'Hoy'
            : calcDiasAtraso(t) + 'd de atraso';

        // Chips de quién trabaja
        const workingChips = activos.length > 0 ? `
            <div class="task-card__working">
                ${activos.map(s => `
                    <span class="working-chip ${s.uid === currentUser.uid ? 'yo' : ''}">
                        <span class="material-icons">engineering</span>
                        ${escapeHtml(s.nombre)}${s.uid === currentUser.uid ? ' (vos)' : ''}
                    </span>`).join('')}
            </div>` : '';

        // Cronómetro — solo si yo estoy activo
        const cronHtml = yoActivo
            ? `<div class="cronometro" id="crono-${t.id}">
                   <span class="material-icons">timer</span>
                   <span id="crono-time-${t.id}">00:00:00</span>
               </div>`
            : '';

        // Monto estimado a cobrar
        const montoHtml = t.monto > 0
            ? `<div class="monto-chip">
                   <span class="material-icons" style="font-size:14px;">payments</span>
                   R$ ${t.monto.toLocaleString('pt-BR', { minimumFractionDigits: 2 })} por esta tarea
               </div>`
            : '';

        // Botones de acción según estado
        let accionesHtml = '';
        if (estado === 'pendiente') {
            accionesHtml = `
                <button class="btn-accion iniciar" onclick="accionIniciar('${t.id}')">
                    <span class="material-icons">play_arrow</span> Iniciar
                </button>
                <button class="btn-accion verificar" onclick="accionVerificar('${t.id}')"
                    title="Revisé — no era necesaria hacerla">
                    <span class="material-icons">check_circle_outline</span> OK / No necesaria
                </button>`;
        } else if (estado === 'en_curso') {
            if (yoActivo) {
                accionesHtml = `
                    <button class="btn-accion pausar" onclick="accionPausar('${t.id}')">
                        <span class="material-icons">pause</span> Pausar
                    </button>
                    <button class="btn-accion finalizar" onclick="accionFinalizar('${t.id}')">
                        <span class="material-icons">check_circle</span> Finalizar
                    </button>`;
            } else {
                accionesHtml = `
                    <button class="btn-accion iniciar" onclick="accionIniciar('${t.id}')">
                        <span class="material-icons">play_arrow</span> Unirme
                    </button>`;
                if (esAdmin) {
                    accionesHtml += `
                        <button class="btn-accion finalizar" onclick="accionFinalizar('${t.id}')">
                            <span class="material-icons">check_circle</span> Finalizar
                        </button>`;
                }
            }
        }

        accionesHtml += `
            <button class="btn-accion detalle" onclick="abrirModal('${t.id}')" title="Ver detalle">
                <span class="material-icons">info</span>
            </button>`;

        return `
        <div class="task-card urgencia-${urgencia}" id="card-${t.id}">
            <div class="task-card__header">
                <div class="task-card__nombre">${escapeHtml(t.nombre)}</div>
                <div class="task-card__badges">
                    <span class="badge ${urgBadge[urgencia] || 'badge-neutral'}">${urgLabel}</span>
                    ${estado === 'en_curso' ? '<span class="badge" style="background:#e3f2fd;color:#0277bd;">▶ En curso</span>' : ''}
                    ${t.tipo === 'limpieza' ? '<span class="badge badge-neutral">🧹 Limpieza</span>' : ''}
                </div>
            </div>

            <div class="task-card__meta">
                ${t.fechaInicio ? `<span><span class="material-icons">calendar_today</span>${t.fechaInicio}</span>` : ''}
                ${t.recurrencia > 0 ? `<span><span class="material-icons">repeat</span>Cada ${t.recurrencia}d</span>` : ''}
            </div>

            ${t.descripcion ? `<div class="task-card__desc">${escapeHtml(t.descripcion)}</div>` : ''}

            ${cronHtml}
            ${workingChips}
            ${montoHtml}

            <div class="task-card__actions">${accionesHtml}</div>
        </div>`;
    }

    function calcDiasAtraso(t) {
        if (!t.fechaInicio) return 0;
        const hoy = new Date(); hoy.setHours(0,0,0,0);
        return Math.max(0, Math.floor((hoy - new Date(t.fechaInicio + 'T00:00:00')) / 86400000));
    }

    // ── Cronómetro ────────────────────────────────────────────
    function iniciarCronometro(tareaId, inicioTimestamp) {
        const inicio = inicioTimestamp?.toDate ? inicioTimestamp.toDate() : new Date(inicioTimestamp);
        const el     = document.getElementById('crono-time-' + tareaId);
        if (!el) return;

        function actualizar() {
            const diff = Math.floor((new Date() - inicio) / 1000);
            const h    = Math.floor(diff / 3600);
            const m    = Math.floor((diff % 3600) / 60);
            const s    = diff % 60;
            if (el) el.textContent =
                String(h).padStart(2,'0') + ':' +
                String(m).padStart(2,'0') + ':' +
                String(s).padStart(2,'0');
        }

        actualizar();
        cronometros[tareaId] = setInterval(actualizar, 1000);
    }

    // ── ACCIONES ─────────────────────────────────────────────
    window.accionIniciar = async function(tareaId) {
        try {
            await iniciarTarea(tareaId, currentUser);
            showToast('Tarea iniciada ▶️', 'success');
            await cargarTareas();
            if (tareaModal === tareaId) cerrarModal();
        } catch(e) {
            showToast(e.message, 'error');
        }
    };

    window.accionPausar = async function(tareaId) {
        try {
            await pausarTarea(tareaId, currentUser);
            showToast('Tarea pausada ⏸️', 'warning');
            await cargarTareas();
            if (tareaModal === tareaId) cerrarModal();
        } catch(e) {
            showToast(e.message, 'error');
        }
    };

    window.accionFinalizar = async function(tareaId) {
        const t = tareasCache.find(x => x.id === tareaId);
        if (!confirm('¿Finalizar "' + (t?.nombre || 'esta tarea') + '"?\n\nSe calcularán los honorarios proporcionales al tiempo trabajado.')) return;

        try {
            const colaboradores = await finalizarTarea(tareaId, currentUser);
            const conMonto      = colaboradores.filter(c => c.montoRecibido > 0);
            if (conMonto.length) {
                const resumen = conMonto.map(c =>
                    c.nombre + ': ' + formatHoras(c.horas) + ' → R$ ' + c.montoRecibido.toFixed(2)
                ).join(' · ');
                showToast('✅ Finalizada · ' + resumen, 'success');
            } else {
                showToast('✅ Tarea finalizada', 'success');
            }
            await cargarTareas();
            if (tareaModal === tareaId) cerrarModal();
        } catch(e) {
            showToast(e.message, 'error');
        }
    };

    // ── ACCION VERIFICAR ─────────────────────────────────────
    window.accionVerificar = async function(tareaId) {
        const t = tareasCache.find(x => x.id === tareaId);
        const nota = prompt(
            '¿Por qué no era necesaria esta tarea?\n(Podés dejarlo vacío)',
            'Revisé — todo en orden, no era necesaria'
        );
        if (nota === null) return; // canceló
        try {
            await verificarTarea(tareaId, currentUser, nota || 'Revisé — no era necesaria');
            showToast('✅ Verificada y registrada', 'success');
            await cargarTareas();
            if (tareaModal === tareaId) cerrarModal();
        } catch(e) {
            showToast(e.message, 'error');
        }
    };

    // ── MODAL DETALLE ─────────────────────────────────────────
    window.abrirModal = async function(tareaId) {
        tareaModal = tareaId;
        const tarea = tareasCache.find(x => x.id === tareaId);
        if (!tarea) return;

        const estado = tarea.estado || 'pendiente';

        // Leer sesiones
        let sesiones = [];
        try {
            const sesSnap = await db.collection('tareas').doc(tareaId).collection('sesiones').get();
            sesiones = sesSnap.docs.map(d => d.data()).filter(s => !s.invalidada);
        } catch(e) { sesiones = []; }

        const activos  = sesiones.filter(s => s.fin === null || s.fin === undefined);
        const cerradas = sesiones.filter(s => s.fin !== null && s.fin !== undefined);
        const yoActivo = activos.find(s => s.uid === currentUser.uid);

        document.getElementById('modalTitulo').innerHTML =
            '<span class="material-icons">' + (tarea.tipo === 'limpieza' ? 'cleaning_services' : 'checklist') + '</span> '
            + escapeHtml(tarea.nombre);

        // Info de reserva
        const infoBox = document.getElementById('reservaInfoBox');
        if (tarea.tipo === 'limpieza' && tarea.reservaId) {
            try {
                const rdoc = await db.collection('reservas').doc(tarea.reservaId).get();
                if (rdoc.exists) {
                    const r = rdoc.data();
                    infoBox.innerHTML = `
                        <strong>🏠 Cabaña:</strong> ${r.caba}<br>
                        <strong>🚪 Huésped saliente:</strong> ${escapeHtml(r.nombre)}<br>
                        <strong>👥 Huéspedes:</strong> ${r.huespedes || r.adultos || '—'}<br>
                        <strong>📅 Check-out:</strong> ${CVC.formatFecha(r.checkOut)}<br>
                        ${r.notas ? `<strong>📝 Notas:</strong> ${escapeHtml(r.notas)}<br>` : ''}
                        <br><strong>💰 Monto limpieza:</strong> R$ ${tarea.monto || 0}`;
                    infoBox.style.display = 'block';
                } else { infoBox.style.display = 'none'; }
            } catch(e) { infoBox.style.display = 'none'; }
        } else {
            infoBox.style.display = 'none';
        }

        // Descripción
        const descBox = document.getElementById('modalDescBox');
        if (tarea.descripcion) {
            descBox.innerHTML = '<div class="task-card__desc">' + escapeHtml(tarea.descripcion) + '</div>';
            descBox.style.display = 'block';
        } else {
            descBox.style.display = 'none';
        }

        // Activos ahora
        const activosBox = document.getElementById('colabsActivosBox');
        if (activos.length) {
            document.getElementById('colabsActivosList').innerHTML = activos.map(s => {
                const hora = s.inicio?.toDate ? s.inicio.toDate().toLocaleTimeString('es-AR') : '—';
                return `<div class="colab-row">
                    <div class="colab-row__nombre">${escapeHtml(s.nombre)}
                        ${s.uid === currentUser.uid ? '<span class="badge badge-en_curso" style="margin-left:6px;">vos</span>' : ''}
                    </div>
                    <div class="colab-row__tiempo">⏱️ Desde las ${hora}</div>
                </div>`;
            }).join('');
            activosBox.style.display = 'block';
        } else {
            activosBox.style.display = 'none';
        }

        // Sesiones cerradas (agrupadas por usuario)
        const histBox = document.getElementById('colabsHistBox');
        if (cerradas.length) {
            const porUid = {};
            cerradas.forEach(s => {
                const ini = s.inicio?.toDate ? s.inicio.toDate() : new Date(s.inicio);
                const fin = s.fin?.toDate    ? s.fin.toDate()    : new Date(s.fin);
                const hrs = Math.max(0, (fin - ini) / 3600000);
                if (!porUid[s.uid]) porUid[s.uid] = { nombre: s.nombre, horas: 0 };
                porUid[s.uid].horas += hrs;
            });
            document.getElementById('colabsHistList').innerHTML = Object.values(porUid).map(d => `
                <div class="colab-row">
                    <div class="colab-row__nombre">${escapeHtml(d.nombre)}</div>
                    <div class="colab-row__tiempo">${formatHoras(d.horas)} acumuladas</div>
                </div>`).join('');
            histBox.style.display = 'block';
        } else {
            histBox.style.display = 'none';
        }

        // Acciones
        const accionesEl = document.getElementById('accionesModal');
        if (estado === 'pendiente') {
            accionesEl.innerHTML = `
                <div style="display:flex;gap:var(--space-2);flex-wrap:wrap;">
                    <button class="btn-accion iniciar" style="flex:1;min-width:140px;"
                        onclick="accionIniciar('${tarea.id}')">
                        <span class="material-icons">play_arrow</span> Iniciar tarea
                    </button>
                    <button class="btn-accion verificar" style="flex:1;min-width:140px;"
                        onclick="accionVerificar('${tarea.id}')">
                        <span class="material-icons">check_circle_outline</span> OK / No necesaria
                    </button>
                </div>`;
        } else if (estado === 'en_curso') {
            if (yoActivo) {
                accionesEl.innerHTML = `
                    <div style="display:flex; gap:var(--space-3); flex-wrap:wrap;">
                        <button class="btn-accion pausar" style="max-width:180px;"
                            onclick="accionPausar('${tarea.id}')">
                            <span class="material-icons">pause</span> Pausar
                        </button>
                        <button class="btn-accion finalizar" style="max-width:180px;"
                            onclick="accionFinalizar('${tarea.id}')">
                            <span class="material-icons">check_circle</span> Finalizar
                        </button>
                    </div>`;
            } else {
                accionesEl.innerHTML = `
                    <button class="btn-accion iniciar" style="max-width:220px;"
                        onclick="accionIniciar('${tarea.id}')">
                        <span class="material-icons">play_arrow</span> Unirme
                    </button>`;
                if (esAdmin) {
                    accionesEl.innerHTML += `
                        <button class="btn-accion finalizar" style="max-width:220px; margin-top:var(--space-2);"
                            onclick="accionFinalizar('${tarea.id}')">
                            <span class="material-icons">check_circle</span> Finalizar tarea
                        </button>`;
                }
            }
        } else {
            accionesEl.innerHTML = '';
        }

        // Link a admin (solo admins)
        const linkAdmin = document.getElementById('linkAdminDetalle');
        if (esAdmin) {
            linkAdmin.href = 'tareas-admin.html?tarea=' + tarea.id;
            linkAdmin.classList.add('visible');
        } else {
            linkAdmin.classList.remove('visible');
        }

        document.getElementById('modalOverlay').style.display = 'flex';
    };

    window.cerrarModal = function(e) {
        if (e && e.target !== document.getElementById('modalOverlay')) return;
        document.getElementById('modalOverlay').style.display = 'none';
        tareaModal = null;
    };

    // ── Tabs ──────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filtroActual = btn.dataset.filter;
            renderTareas();
        });
    });

    // ── Init ──────────────────────────────────────────────────
    await cargarTareas();

    // Refrescar cada 60s solo cuando la pestaña está visible
    let _timer = null;
    function iniciarRefresh() {
        if (_timer) return;
        _timer = setInterval(() => {
            if (document.visibilityState === 'visible') cargarTareas();
        }, 60000);
    }
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') { cargarTareas(); iniciarRefresh(); }
        else if (_timer) { clearInterval(_timer); _timer = null; }
    });
    iniciarRefresh();

})();
</script>
</body>
</html>
