<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corregir Calendar IDs — Casa Verde Canas</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e2e8f0;padding:16px}
        h1{font-size:16px;font-weight:800;color:#fff;margin-bottom:4px}
        h1 span{color:#10b981}
        .sub{font-size:11px;color:#64748b;margin-bottom:16px}
        .card{background:#1e2130;border:1px solid #2d3250;border-radius:10px;padding:14px;margin-bottom:12px}
        .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:7px;border:none;font-size:12px;font-weight:700;cursor:pointer;margin:3px}
        .btn:disabled{opacity:.35;cursor:not-allowed}
        .btn-green{background:#10b981;color:#fff}
        .btn-blue{background:#3b82f6;color:#fff}
        .log{background:#0d1117;border-radius:7px;padding:10px;max-height:350px;overflow-y:auto;font-family:monospace;font-size:11px;line-height:1.9;margin-top:10px}
        .ok{color:#34d399}.warn{color:#fbbf24}.err{color:#f87171}.info{color:#60a5fa}.muted{color:#475569}.title{color:#e2e8f0;font-weight:700}
        .cabana-row{background:#0d1117;border-radius:7px;padding:12px;margin-bottom:8px}
        .cabana-nombre{font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:6px}
        .antes{font-size:10px;color:#f87171;font-family:monospace;word-break:break-all;margin-bottom:4px}
        .despues{font-size:11px;color:#34d399;font-family:monospace;font-weight:700;margin-bottom:8px}
        .badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
        .b-ok{background:#064e3b;color:#34d399;border:1px solid #10b981}
        .b-err{background:#450a0a;color:#f87171;border:1px solid #ef4444}
        .b-warn{background:#2d1f00;color:#fbbf24;border:1px solid #92400e}
    </style>
</head>
<body>

<h1>🔧 Corregir <span>Calendar IDs</span></h1>
<p class="sub">Extrae el ID correcto del iframe guardado y lo actualiza en Firestore</p>

<div class="card">
    <div style="font-size:12px;color:#64748b;margin-bottom:12px;line-height:1.7">
        Algunas cabañas tienen el iframe completo guardado en <code>google_calendar_id</code>
        en lugar del ID limpio. Este script extrae el ID automáticamente y corrige el campo.
    </div>
    <button class="btn btn-blue" id="btnLeer" onclick="leerYAnalizar()">🔍 Analizar cabañas</button>
    <div id="analisisResult"></div>
</div>

<div class="card" id="cardCorregir" style="display:none">
    <button class="btn btn-green" id="btnCorregir" onclick="corregirTodo()">
        ✅ Corregir todos los IDs incorrectos
    </button>
</div>

<div class="card">
    <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Log</div>
    <div class="log" id="logEl"><span class="muted">Esperando...</span></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
const CFG = {
    apiKey:    'AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4',
    authDomain:'casaverdecanas-199.firebaseapp.com',
    projectId: 'casaverdecanas-199'
};
if (!firebase.apps.length) firebase.initializeApp(CFG);
const db = firebase.firestore();

let cabanasACorregir = [];

function log(msg, tipo='info') {
    const el = document.getElementById('logEl');
    if (el.querySelector('.muted')) el.innerHTML = '';
    const d = document.createElement('div');
    d.className = tipo;
    d.textContent = `[${new Date().toLocaleTimeString('es-AR')}] ${msg}`;
    el.appendChild(d); el.scrollTop = el.scrollHeight;
}

function extraerCalendarId(texto) {
    if (!texto) return '';
    // Ya es un ID limpio
    if (texto.includes('@') && !texto.includes('<') && !texto.includes('http')) return texto.trim();
    // Extraer del iframe: src="...?src=ID@..."
    const m = texto.match(/[?&]src=([^&"'\s]+)/);
    if (m) return decodeURIComponent(m[1]);
    // URL embed directa
    const m2 = texto.match(/embed\?src=([^&\s"']+)/);
    if (m2) return decodeURIComponent(m2[1]);
    return '';
}

function esc(s){ return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

async function leerYAnalizar() {
    document.getElementById('btnLeer').disabled = true;
    log('Leyendo cabañas desde Firestore...', 'info');
    cabanasACorregir = [];

    try {
        const snap = await db.collection('cabanas').get();
        const cabanas = snap.docs.map(d => ({ docId: d.id, ...d.data() }))
            .sort((a,b) => (a.orden||0)-(b.orden||0));

        let html = '';
        let hayProblemas = false;

        for (const c of cabanas) {
            const nombre  = c.nombre?.es || `Cabaña ${c.id}`;
            const actual  = c.google_calendar_id || '';
            const extraido = extraerCalendarId(actual);
            const esIframe = actual.includes('<') || actual.includes('http');
            const esCorrecto = actual.includes('@') && !esIframe;

            if (esIframe || (!actual && !esCorrecto)) {
                // Necesita corrección
                hayProblemas = true;
                cabanasACorregir.push({ docId: c.docId, nombre, actual, correcto: extraido });

                html += `<div class="cabana-row">
                    <div class="cabana-nombre">${esc(nombre)}
                        <span class="badge b-err" style="margin-left:8px">❌ Necesita corrección</span>
                    </div>
                    <div style="font-size:10px;color:#94a3b8;margin-bottom:3px">Valor actual:</div>
                    <div class="antes">${esc(actual.substring(0,120))}${actual.length>120?'...':''}</div>
                    <div style="font-size:10px;color:#94a3b8;margin-bottom:3px">ID extraído:</div>
                    ${extraido
                        ? `<div class="despues">✅ ${esc(extraido)}</div>`
                        : `<div class="antes">❌ No se pudo extraer — necesita corrección manual</div>`
                    }
                </div>`;

                if (extraido) log(`  ⚠ "${nombre}": iframe → "${extraido}"`, 'warn');
                else log(`  ✗ "${nombre}": no se pudo extraer el ID`, 'err');

            } else if (esCorrecto) {
                html += `<div class="cabana-row">
                    <div class="cabana-nombre">${esc(nombre)}
                        <span class="badge b-ok" style="margin-left:8px">✅ Correcto</span>
                    </div>
                    <div class="despues">${esc(actual)}</div>
                </div>`;
                log(`  ✓ "${nombre}": ${actual}`, 'ok');
            } else {
                html += `<div class="cabana-row">
                    <div class="cabana-nombre">${esc(nombre)}
                        <span class="badge b-warn" style="margin-left:8px">⚠ Sin Calendar ID</span>
                    </div>
                    <div style="font-size:10px;color:#64748b">No tiene Calendar ID configurado. Usá "Configurar calendarios" en Mantenimiento.</div>
                </div>`;
                log(`  ⚠ "${nombre}": sin Calendar ID`, 'warn');
            }
        }

        document.getElementById('analisisResult').innerHTML = `<div style="margin-top:12px">${html}</div>`;

        if (hayProblemas) {
            document.getElementById('cardCorregir').style.display = 'block';
        } else {
            log('Todos los Calendar IDs están correctos.', 'ok');
        }

    } catch(e) {
        log(`Error: ${e.message}`, 'err');
    }
    document.getElementById('btnLeer').disabled = false;
}

async function corregirTodo() {
    const btn = document.getElementById('btnCorregir');
    btn.disabled = true;
    log('=== CORRIGIENDO CALENDAR IDs ===', 'title');

    let ok = 0, err = 0;
    for (const c of cabanasACorregir) {
        if (!c.correcto) {
            log(`  ✗ "${c.nombre}": sin ID extraído, omitido`, 'err');
            err++;
            continue;
        }
        try {
            await db.collection('cabanas').doc(c.docId).update({
                google_calendar_id: c.correcto
            });
            log(`  ✓ "${c.nombre}": guardado "${c.correcto}"`, 'ok');
            ok++;
        } catch(e) {
            log(`  ✗ "${c.nombre}": ${e.message}`, 'err');
            err++;
        }
    }

    log(`Corrección completa: ${ok} OK · ${err} errores`, ok > 0 ? 'ok' : 'err');

    if (ok > 0) {
        log('→ Ahora probá el Test calendario Airbnb para verificar que la API responde.', 'warn');
        document.getElementById('analisisResult').innerHTML += `
            <div style="background:#022c22;border:1px solid #064e3b;border-radius:7px;padding:12px;margin-top:10px;font-size:12px;color:#34d399">
                ✅ ${ok} Calendar ID${ok>1?'s corregidos':'corregido'}.
                Ahora abrí "Test calendario Airbnb" en el panel de Mantenimiento para verificar.
            </div>`;
    }

    btn.disabled = false;
}
</script>
</body>
</html>
