<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CasaVerdeCanas | Cabaña 4</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <header>
        <div class="top-nav">
            <div class="langs">
                <button onclick="changeLanguage('es')">ES</button>
                <button onclick="changeLanguage('pt')">PT</button>
                <button onclick="changeLanguage('en')">EN</button>
            </div>
            <button class="admin-btn" onclick="openAdminModal()">⚙️</button>
        </div>
        <h1 data-key="welcome">CasaVerdeCanas</h1>
    </header>

    <main id="detail-view">
        <h2 id="detail-title" data-key="cabin-4-name">Cabaña 4</h2>
        <p id="detail-desc" data-key="cabin-4-desc"></p>

        <div id="photo-gallery" class="gallery"></div>
        <button id="add-img-btn" class="admin-only hidden" onclick="addPhotoUrl()">+ Agregar Foto (URL)</button>

        <div class="cal-container">
            <h3 data-key="cal-label">Disponibilidad Cabaña 4</h3>
            <div id="calendar"></div>
        </div>

        <a id="wa-link" href="https://wa.me/5548999999999" target="_blank" class="wa-button" data-key="btn-book-wa">WhatsApp</a>
    </main>

    <div id="booking-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-date-label">Nueva Reserva</h3>
            <input type="text" id="guest-name" placeholder="Nombre del Huésped">
            <label>Salida (Check-out):</label>
            <input type="date" id="checkout-date">
            <div class="modal-btns">
                <button onclick="saveBooking()" class="save-btn">Guardar</button>
                <button onclick="closeModal('booking-modal')" class="cancel-btn">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="languages.js"></script>
    <script src="occupancy.js"></script>
</body>
</html>
