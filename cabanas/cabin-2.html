<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <title>Cabaña Familiar con Entrepiso | Casa Verde Canas</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --casa-green: #74E3AE; /* El verde de tu fachada */
            --forest-green: #2E5A31;
            --warm-yellow: #F9D976;
            --charcoal: #4A4A4A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Quicksand', sans-serif; background: #fdfdfd; color: var(--charcoal); line-height: 1.6; }
        
        header { background: var(--forest-green); color: white; padding: 30px 20px; text-align: center; border-bottom: 5px solid var(--casa-green); position: relative; }
        
        .lang-picker { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .lang-btn { background: none; border: 1px solid white; color: white; padding: 4px 12px; border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: white; color: var(--forest-green); font-weight: bold; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .back-link { margin: 20px 0; }
        .back-link a { color: var(--forest-green); text-decoration: none; font-weight: 600; }

        .cabin-title { text-align: center; margin: 10px 0 25px; color: var(--forest-green); font-size: 2.2rem; }

        .description { 
            font-size: 1.1rem; margin: 25px 0; color: #555; text-align: center; 
            max-width: 850px; margin-left: auto; margin-right: auto; 
        }

        /* Advertencia de Movilidad Elegante */
        .mobility-notice {
            background: #fff9f0; border: 1px solid #ffe4bc; padding: 20px;
            border-radius: 15px; margin: 30px 0; color: #856404; font-size: 0.95rem;
            text-align: center; font-style: italic; line-height: 1.5;
        }

        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin: 30px 0; }
        .feature-card { background: #f4f8f4; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #eef3ee; }
        .feature-card .icon { font-size: 1.8rem; margin-bottom: 5px; }
        .feature-card h4 { color: var(--forest-green); font-size: 0.9rem; }

        /* Sliders de Fotos */
        .category-group { background: white; border-radius: 25px; padding: 25px; margin-bottom: 35px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .category-group h2 { color: var(--forest-green); font-size: 1.5rem; margin-bottom: 20px; border-left: 5px solid var(--casa-green); padding-left: 15px; }
        .slider-track { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scroll-snap-type: x mandatory; }
        .slider-slide { flex: 0 0 300px; aspect-ratio: 4/3; border-radius: 15px; overflow: hidden; scroll-snap-align: start; }
        .slider-slide img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        #calendar-container iframe { width: 100%; border: none; min-height: 500px; border-radius: 20px; }

        .btn-whatsapp { 
            display: inline-flex; align-items: center; justify-content: center; gap: 12px;
            background: #25d366; color: white; padding: 18px 40px; border-radius: 50px; 
            text-decoration: none; font-weight: bold; font-size: 1.1rem; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
        }

        footer { background: var(--forest-green); color: white; padding: 40px 20px; text-align: center; margin-top: 60px; }

        @media (max-width: 600px) {
            .slider-slide { flex: 0 0 85%; }
            .cabin-title { font-size: 1.6rem; }
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <header>
        <div class="lang-picker">
            <button class="lang-btn" id="btn-es" onclick="changeLanguage('es')">ES</button>
            <button class="lang-btn" id="btn-pt" onclick="changeLanguage('pt')">PT</button>
            <button class="lang-btn" id="btn-en" onclick="changeLanguage('en')">EN</button>
        </div>
        <h1>Casa Verde Canas</h1>
    </header>

    <div class="container">
        <div class="back-link"><a href="../index.html" id="back-text">← Volver al inicio</a></div>
        
        <h1 class="cabin-title" id="cabin-name">Cabaña Familiar con Entrepiso</h1>
        
        <p id="cabin-description" class="description">Cargando...</p>
        
        <div id="mobility-notice" class="mobility-notice"></div>

        <div class="features-grid">
            <div class="feature-card"><div class="icon">👥</div><h4 id="feat-guests">5-6 huéspedes</h4></div>
            <div class="feature-card"><div class="icon">🏠</div><h4 id="feat-layout">Entrepiso</h4></div>
            <div class="feature-card"><div class="icon">🍃</div><h4 id="feat-air">Ventilación Natural</h4></div>
            <div class="feature-card"><div class="icon">🍳</div><h4 id="feat-kitchen">Cocina Completa</h4></div>
        </div>
        
        <div id="categories-container"></div>
        
        <div id="calendar-container" class="category-group">
            <h2 id="calendar-title">Disponibilidad</h2>
        </div>

        <div style="text-align: center; margin: 40px 0;">
            <a id="whatsapp-link" href="#" class="btn-whatsapp">
                Consultar Disponibilidad
            </a>
        </div>
    </div>

    <footer>
        <p>© 2026 Casa Verde Canas - Canasvieiras, Florianópolis</p>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4",
            authDomain: "casaverdecanas-199.firebaseapp.com",
            databaseURL: "https://casaverdecanas-199-default-rtdb.firebaseio.com",
            projectId: "casaverdecanas-199",
            storageBucket: "casaverdecanas-199.firebasestorage.app",
            appId: "1:417825635316:web:ff7f4fe52edcab43d8d7a1"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const CABIN_ID = 'cabin-2';
        let currentLang = localStorage.getItem('lang') || 'es';

        const UI_TEXTS = {
            es: {
                back: "← Volver al inicio",
                mobility: "Debido a su diseño rústico de concepto abierto con áreas de descanso en un entrepiso de madera, esta unidad cuenta con escaleras pronunciadas, por lo que podría no ser la opción más confortable para personas con movilidad reducida.",
                guests: "5-6 huéspedes",
                layout: "Entrepiso",
                air: "Ventilación Natural",
                kitchen: "Cocina Completa",
                cal: "Disponibilidad",
                wa: "Consultar Disponibilidad Directa"
            },
            pt: {
                back: "← Voltar ao início",
                mobility: "Devido ao seu design rústico de conceito aberto com áreas de descanso em um mezanino de madeira, esta unidade possui escadas íngremes, portanto pode não ser a opção mais confortável para pessoas com mobilidade reduzida.",
                guests: "5-6 hóspedes",
                layout: "Mezanino",
                air: "Ventilação Natural",
                kitchen: "Cozinha Completa",
                cal: "Disponibilidade",
                wa: "Consultar Disponibilidade Direta"
            },
            en: {
                back: "← Back to home",
                mobility: "Due to its rustic open-concept design with sleeping areas located on a wooden mezzanine, this unit features steep stairs, so it may not be the most comfortable option for guests with reduced mobility.",
                guests: "5-6 guests",
                layout: "Mezzanine",
                air: "Natural Ventilation",
                kitchen: "Full Kitchen",
                cal: "Availability",
                wa: "Check Direct Availability"
            }
        };

        function getText(obj) {
            if (!obj) return '';
            return obj[currentLang] || obj.es || Object.values(obj)[0] || '';
        }

        async function loadCabinData() {
            const snapshot = await db.ref(`siteData/apartments/${CABIN_ID}`).once('value');
            const data = snapshot.val() || {};
            
            document.getElementById('cabin-name').textContent = getText(data.name);
            document.getElementById('cabin-description').textContent = getText(data.description);
            
            // Renderizar Fotos por Categoría
            const container = document.getElementById('categories-container');
            container.innerHTML = '';
            Object.entries(data.categories || {}).forEach(([id, cat]) => {
                const section = document.createElement('div');
                section.className = 'category-group';
                section.innerHTML = `<h2>${getText(cat.name)}</h2><div class="slider-track">
                    ${(cat.photos || []).map(p => `<div class="slider-slide"><img src="${p.url}" onclick="window.open('${p.url}')"></div>`).join('')}
                </div>`;
                container.appendChild(section);
            });

            if (data.google_calendar_iframe) {
                document.getElementById('calendar-container').innerHTML += data.google_calendar_iframe;
            }
            updateUITexts();
        }

        function updateUITexts() {
            const t = UI_TEXTS[currentLang];
            document.getElementById('back-text').textContent = t.back;
            document.getElementById('mobility-notice').textContent = t.mobility;
            document.getElementById('feat-guests').textContent = t.guests;
            document.getElementById('feat-layout').textContent = t.layout;
            document.getElementById('feat-air').textContent = t.air;
            document.getElementById('feat-kitchen').textContent = t.kitchen;
            document.getElementById('calendar-title').textContent = t.cal;
            document.getElementById('whatsapp-link').textContent = t.wa;
            
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${currentLang}`).classList.add('active');
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            location.reload();
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadCabinData();
            document.getElementById('whatsapp-link').href = `https://wa.me/5548991181246?text=Hola! Consulto por la Cabaña 2`;
        });
    </script>
</body>
</html>
