<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loft Moderno - CasaVerdeCanas</title>
    
    <!-- FullCalendar CSS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/main.min.css' rel='stylesheet' />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; color: #333; }
        header { background: #2d5a27; color: white; padding: 20px; text-align: center; position: relative; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .back-link { margin: 20px 0; }
        .back-link a { color: #2d5a27; text-decoration: none; font-size: 1.1rem; }
        .cabin-title { text-align: center; margin: 30px 0; color: #2d5a27; }
        .main-photo { width: 100%; height: 400px; object-fit: cover; border-radius: 12px; margin-bottom: 20px; }
        .description { font-size: 1.2rem; margin: 20px 0; }
        .btn { display: inline-block; background: #25d366; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; margin: 20px 0; }
        .lang-picker { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .lang-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 10px; border-radius: 20px; cursor: pointer; }
        
        /* Estilos para el calendario */
        #calendar {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin: 30px 0;
            min-height: 500px;
        }
        
        .fc-event {
            cursor: pointer;
        }
        
        .admin-only {
            display: none;
        }
        
        .admin-mode .admin-only {
            display: block;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .modal.hidden {
            display: none;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
        }
        
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .admin-corner {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: #2d5a27;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0.3;
            z-index: 999;
        }
    </style>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <header>
        <div class="lang-picker">
            <button class="lang-btn" onclick="changeLanguage('es')">ES</button>
            <button class="lang-btn" onclick="changeLanguage('pt')">PT</button>
            <button class="lang-btn" onclick="changeLanguage('en')">EN</button>
        </div>
        <h1>CasaVerdeCanas</h1>
    </header>

    <div class="container">
        <div class="back-link">
            <a href="../index.html">← Volver al inicio</a>
        </div>
        
        <h1 class="cabin-title" id="cabin-name">Loft Moderno</h1>
        
        <img id="main-photo" class="main-photo" src="https://via.placeholder.com/1200x400?text=Loft+Moderno" alt="Loft Moderno">
        
        <p id="cabin-description" class="description">
            Diseño contemporáneo con todas las tecnologías para el huésped moderno. 
            Ideal para trabajo remoto, con espacio de home office y WiFi de alta velocidad.
        </p>
        
        <!-- CALENDARIO -->
        <div id="calendar"></div>
        
        <div style="text-align: center;">
            <a id="whatsapp-link" href="https://wa.me/5548999999999" class="btn" target="_blank">
                📱 Reservar por WhatsApp
            </a>
        </div>
    </div>
    
    <!-- Modal para admin -->
    <div id="booking-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Nueva Reserva</h3>
            <input type="text" id="guest-name" placeholder="Nombre del huésped">
            <input type="date" id="booking-start" placeholder="Check-in">
            <input type="date" id="booking-end" placeholder="Check-out">
            <div class="modal-buttons">
                <button onclick="saveBooking()" style="background: #2d5a27; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">Guardar</button>
                <button onclick="closeModal()" style="background: #666; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">Cancelar</button>
            </div>
        </div>
    </div>
    
    <!-- Botón admin -->
    <div class="admin-corner" onclick="toggleAdmin()">⚙️</div>

    <!-- FullCalendar JS -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
    
    <script>
        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4",
            authDomain: "casaverdecanas-199.firebaseapp.com",
            databaseURL: "https://casaverdecanas-199-default-rtdb.firebaseio.com",
            projectId: "casaverdecanas-199",
            storageBucket: "casaverdecanas-199.firebasestorage.app",
            messagingSenderId: "417825635316",
            appId: "1:417825635316:web:ff7f4fe52edcab43d8d7a1"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const CABIN_ID = 'cabin-4'; // ID para Cabaña 4
        
        let currentLang = localStorage.getItem('lang') || 'es';
        let editMode = localStorage.getItem('admin') === 'true';
        let calendar = null;
        let selectedDate = null;
        
        // Traducciones para Cabaña 4
        const translations = {
            es: {
                name: "Loft Moderno",
                desc: "Diseño contemporáneo con todas las tecnologías para el huésped moderno. Ideal para trabajo remoto, con espacio de home office y WiFi de alta velocidad."
            },
            pt: {
                name: "Loft Moderno",
                desc: "Design contemporâneo com todas as tecnologias para o hóspede moderno. Ideal para trabalho remoto, com espaço de home office e WiFi de alta velocidade."
            },
            en: {
                name: "Modern Loft",
                desc: "Contemporary design with all technologies for the modern guest. Ideal for remote work, with home office space and high-speed WiFi."
            }
        };
        
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.getElementById('cabin-name').textContent = translations[lang].name;
            document.getElementById('cabin-description').textContent = translations[lang].desc;
            
            if (calendar) {
                calendar.setOption('locale', lang);
            }
        }
        
        function toggleAdmin() {
            const pwd = prompt("Contraseña admin:");
            if (pwd === "Casaverde-199") {
                editMode = !editMode;
                localStorage.setItem('admin', editMode);
                document.body.classList.toggle('admin-mode', editMode);
                alert(editMode ? "Modo admin activado" : "Modo admin desactivado");
            }
        }
        
        // Inicializar calendario
        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            
            db.ref('reservas/' + CABIN_ID).on('value', (snapshot) => {
                const reservas = snapshot.val() || {};
                
                const events = Object.keys(reservas).map(key => ({
                    id: key,
                    title: reservas[key].guest || 'Reservado',
                    start: reservas[key].start,
                    end: reservas[key].end,
                    color: '#e74c3c',
                    allDay: true
                }));
                
                if (calendar) {
                    calendar.removeAllEvents();
                    calendar.addEventSource(events);
                } else {
                    calendar = new FullCalendar.Calendar(calendarEl, {
                        initialView: 'dayGridMonth',
                        locale: currentLang,
                        events: events,
                        height: 'auto',
                        headerToolbar: {
                            left: 'prev,next today',
                            center: 'title',
                            right: 'dayGridMonth'
                        },
                        dateClick: function(info) {
                            if (editMode) {
                                selectedDate = info.dateStr;
                                document.getElementById('booking-start').value = info.dateStr;
                                document.getElementById('booking-end').value = info.dateStr;
                                document.getElementById('booking-modal').classList.remove('hidden');
                            }
                        },
                        eventClick: function(info) {
                            if (editMode) {
                                if (confirm('¿Eliminar esta reserva?')) {
                                    db.ref('reservas/' + CABIN_ID + '/' + info.event.id).remove();
                                }
                            }
                        }
                    });
                    
                    calendar.render();
                }
            });
        }
        
        function saveBooking() {
            const guest = document.getElementById('guest-name').value;
            const start = document.getElementById('booking-start').value;
            const end = document.getElementById('booking-end').value;
            
            if (guest && start && end) {
                db.ref('reservas/' + CABIN_ID).push({
                    guest: guest,
                    start: start,
                    end: end
                });
                closeModal();
                document.getElementById('guest-name').value = '';
            }
        }
        
        function closeModal() {
            document.getElementById('booking-modal').classList.add('hidden');
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            changeLanguage(currentLang);
            
            if (editMode) {
                document.body.classList.add('admin-mode');
            }
            
            // Cargar foto principal
            db.ref('fotos/' + CABIN_ID).limitToFirst(1).once('value', (snapshot) => {
                const fotos = snapshot.val();
                if (fotos) {
                    const primeraFoto = Object.values(fotos)[0];
                    if (primeraFoto) {
                        document.getElementById('main-photo').src = primeraFoto;
                    }
                }
            });
            
            // Inicializar calendario
            initCalendar();
            
            // Configurar WhatsApp
            document.getElementById('whatsapp-link').addEventListener('click', (e) => {
                e.preventDefault();
                const cabinName = translations[currentLang].name;
                const msg = `Hola! Quiero reservar ${cabinName}`;
                window.open(`https://wa.me/5548999999999?text=${encodeURIComponent(msg)}`, '_blank');
            });
        });
        
        // Exponer funciones globales
        window.changeLanguage = changeLanguage;
        window.toggleAdmin = toggleAdmin;
        window.saveBooking = saveBooking;
        window.closeModal = closeModal;
    </script>
</body>
</html>
