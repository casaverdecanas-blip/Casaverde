<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabaña Vista al Bosque - CasaVerdeCanas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; color: #333; }
        header { background: #2d5a27; color: white; padding: 20px; text-align: center; position: relative; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .back-link { margin: 20px 0; }
        .back-link a { color: #2d5a27; text-decoration: none; }
        .cabin-title { text-align: center; margin: 30px 0; color: #2d5a27; }
        .main-photo { width: 100%; height: 400px; object-fit: cover; border-radius: 12px; margin-bottom: 20px; }
        .btn { display: inline-block; background: #25d366; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; margin: 20px 0; }
        .lang-picker { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .lang-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 10px; border-radius: 20px; cursor: pointer; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <header>
        <div class="lang-picker">
            <button class="lang-btn" onclick="changeLanguage('es')">ES</button>
            <button class="lang-btn" onclick="changeLanguage('pt')">PT</button>
            <button class="lang-btn" onclick="changeLanguage('en')">EN</button>
        </div>
        <h1>CasaVerdeCanas</h1>
    </header>

    <div class="container">
        <div class="back-link">
            <a href="/">← Volver al inicio</a>
        </div>
        
        <h1 class="cabin-title" id="cabin-name">Cabaña Vista al Bosque</h1>
        
        <img id="main-photo" class="main-photo" src="https://via.placeholder.com/1200x400?text=Cabaña+1" alt="Cabaña">
        
        <p id="cabin-description" style="font-size: 1.2rem; line-height: 1.6; margin: 30px 0;">
            Rodeada de árboles nativos, esta cabaña ofrece paz y conexión con la naturaleza. Ideal para parejas.
        </p>
        
        <a id="whatsapp-link" href="https://wa.me/5548999999999" class="btn" target="_blank">
            📱 Reservar por WhatsApp
        </a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAUwzXfj-eVeOKX1IcVrQwusblTvr0WrT4",
            authDomain: "casaverdecanas-199.firebaseapp.com",
            databaseURL: "https://casaverdecanas-199-default-rtdb.firebaseio.com",
            projectId: "casaverdecanas-199",
            storageBucket: "casaverdecanas-199.firebasestorage.app",
            messagingSenderId: "417825635316",
            appId: "1:417825635316:web:ff7f4fe52edcab43d8d7a1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const translations = {
            es: { name: "Cabaña Vista al Bosque", desc: "Rodeada de árboles nativos, esta cabaña ofrece paz y conexión con la naturaleza. Ideal para parejas." },
            pt: { name: "Cabana Vista da Mata", desc: "Cercada por árvores nativas, esta cabana oferece paz e conexão com a natureza. Ideal para casais." },
            en: { name: "Forest View Cabin", desc: "Surrounded by native trees, this cabin offers peace and connection with nature. Perfect for couples." }
        };

        let currentLang = localStorage.getItem('lang') || 'es';

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.getElementById('cabin-name').textContent = translations[lang].name;
            document.getElementById('cabin-description').textContent = translations[lang].desc;
        }

        document.addEventListener('DOMContentLoaded', () => {
            changeLanguage(currentLang);
            
            // Cargar foto principal
            db.ref('fotos/cabin-1').limitToFirst(1).once('value', (snapshot) => {
                const fotos = snapshot.val();
                if (fotos) {
                    const primeraFoto = Object.values(fotos)[0];
                    if (primeraFoto) {
                        document.getElementById('main-photo').src = primeraFoto;
                    }
                }
            });
        });
    </script>
</body>
</html>
