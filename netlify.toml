# netlify.toml — Casa Verde Canas
# Reglas de redirección para el panel administrativo

[build]
  publish = "."
  functions = "netlify/functions"

# Timeout extendido para funciones que procesan PDFs con Gemini
# El límite máximo en Netlify es 26 segundos en plan gratuito
[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/interno"
  to   = "/interno/index.html"
  status = 200

[[redirects]]
  from = "/interno/"
  to   = "/interno/index.html"
  status = 200
