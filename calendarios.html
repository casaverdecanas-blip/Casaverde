<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Calendarios Airbnb - CasaVerdeCanas</title>
    
    <!-- FullCalendar CSS y JS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
    
    <!-- iCal.js para parsear archivos iCal -->
    <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: #2d5a27;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        /* Pestañas */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab-btn {
            background: #e0e0e0;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #2d5a27;
            color: white;
        }
        
        /* Contenedor de calendarios */
        .calendar-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .calendar-panel {
            display: none;
        }
        .calendar-panel.active {
            display: block;
        }
        #calendar1, #calendar2, #calendar3 {
            min-height: 550px;
        }
        
        /* Estado */
        .status {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }
        .status.warning {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        .legend-color.airbnb { background: #FF9800; }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .tab-btn { padding: 8px 16px; font-size: 0.9rem; }
            .legend { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Test de Calendarios Airbnb</h1>
        <p class="subtitle">Verifica que las URLs con parámetros funcionan correctamente</p>
        
        <!-- Pestañas -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showCabin(1)">🌲 Cabaña 1 - Vista al Bosque</button>
            <button class="tab-btn" onclick="showCabin(2)">🏢 Cabaña 2 - Loft en Canasvieiras</button>
            <button class="tab-btn" onclick="showCabin(3)">👨‍👩‍👧‍👦 Cabaña 3 - Familiar Premium</button>
        </div>
        
        <!-- Contenedor de calendarios -->
        <div class="calendar-container">
            <div id="status" class="status info">🔄 Cargando calendario...</div>
            
            <div id="panel1" class="calendar-panel active">
                <div id="calendar1"></div>
            </div>
            <div id="panel2" class="calendar-panel">
                <div id="calendar2"></div>
            </div>
            <div id="panel3" class="calendar-panel">
                <div id="calendar3"></div>
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color airbnb"></div>
                    <span>Reservas de Airbnb</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // URLs CORRECTAS DE AIRBNB (con parámetros)
        // ============================================
        const AIRBNB_URLS = {
            cabin1: 'https://www.airbnb.com/calendar/ical/1337276103911358917.ics?t=dae43f43820441b886a5167ef71c8533&locale=es-419',
            cabin2: 'https://www.airbnb.com/calendar/ical/1110346888721141996.ics?t=a51528fdc71c427ba5a3ca4b75c368a1&locale=es-419',
            cabin3: 'https://www.airbnb.com/calendar/ical/1230287544066345753.ics?t=57d2ae8677694038b86ca635030c6020&locale=es-419'
        };
        
        // Proxies a probar (en orden de preferencia)
        const PROXIES = [
            { name: 'allorigins', url: 'https://api.allorigins.win/raw?url=' },
            { name: 'corsproxy', url: 'https://corsproxy.io/?' },
            { name: 'cors-anywhere', url: 'https://cors-anywhere.herokuapp.com/' }
        ];
        
        let calendars = {
            1: null,
            2: null,
            3: null
        };
        
        let eventsData = {
            1: [],
            2: [],
            3: []
        };
        
        // ============================================
        // FUNCIONES PRINCIPALES
        // ============================================
        async function fetchICalWithProxy(url) {
            for (const proxy of PROXIES) {
                try {
                    console.log(`📡 Probando proxy: ${proxy.name}`);
                    const fullUrl = proxy.url + encodeURIComponent(url);
                    const response = await fetch(fullUrl);
                    const text = await response.text();
                    
                    // Verificar si es un iCal válido
                    if (text.includes('BEGIN:VCALENDAR') && !text.includes('<!DOCTYPE')) {
                        console.log(`✅ Proxy ${proxy.name} funcionó`);
                        return text;
                    }
                } catch (e) {
                    console.log(`❌ Proxy ${proxy.name} falló: ${e.message}`);
                }
            }
            return null;
        }
        
        async function loadCabinCalendar(cabinNumber, cabinUrl, cabinName) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `🔄 Cargando ${cabinName}...`;
            statusDiv.className = 'status info';
            
            try {
                // Intentar obtener el iCal
                const icalData = await fetchICalWithProxy(cabinUrl);
                
                if (!icalData) {
                    throw new Error('No se pudo obtener el archivo iCal con ningún proxy');
                }
                
                console.log(`📄 iCal obtenido, longitud: ${icalData.length}`);
                
                // Parsear iCal
                const jcalData = ICAL.parse(icalData);
                const comp = new ICAL.Component(jcalData);
                const vevents = comp.getAllSubcomponents('vevent');
                
                console.log(`📅 Eventos encontrados: ${vevents.length}`);
                
                // Convertir a eventos de FullCalendar
                const events = [];
                for (const vevent of vevents) {
                    const event = new ICAL.Event(vevent);
                    const startDate = event.startDate.toJSDate();
                    const endDate = event.endDate.toJSDate();
                    
                    // Airbnb usa fecha fin exclusiva, ajustamos
                    const endAdjusted = new Date(endDate);
                    endAdjusted.setDate(endAdjusted.getDate() - 1);
                    
                    const start = startDate.toISOString().split('T')[0];
                    const end = endAdjusted.toISOString().split('T')[0];
                    
                    let title = 'Reserva Airbnb';
                    if (event.summary) {
                        title = event.summary.replace(/Reservado:|Reserved:|Réservé:/i, '').trim();
                        if (title.length > 30) title = title.substring(0, 30) + '...';
                        if (title === '') title = 'Reserva Airbnb';
                    }
                    
                    events.push({
                        title: title,
                        start: start,
                        end: end,
                        color: '#FF9800',
                        allDay: true
                    });
                }
                
                eventsData[cabinNumber] = events;
                
                // Actualizar calendario si ya está creado
                if (calendars[cabinNumber]) {
                    calendars[cabinNumber].removeAllEvents();
                    calendars[cabinNumber].addEventSource(events);
                }
                
                statusDiv.innerHTML = `✅ ${cabinName}: ${events.length} reservas cargadas correctamente`;
                statusDiv.className = 'status success';
                
                // Ocultar después de 3 segundos
                setTimeout(() => {
                    if (document.getElementById('status').innerHTML.includes('cargadas')) {
                        statusDiv.innerHTML = `📅 Calendario listo. ${events.length} reservas visibles.`;
                    }
                }, 3000);
                
                return events;
                
            } catch (error) {
                console.error(`Error en ${cabinName}:`, error);
                statusDiv.innerHTML = `❌ Error en ${cabinName}: ${error.message}`;
                statusDiv.className = 'status error';
                return [];
            }
        }
        
        function initCalendar(containerId, events) {
            const calendarEl = document.getElementById(containerId);
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                events: events,
                height: 'auto',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth'
                },
                buttonText: {
                    today: 'Hoy',
                    month: 'Mes'
                },
                eventClick: function(info) {
                    alert(`📅 Reserva: ${info.event.title}\n📆 Fechas: ${info.event.start.toLocaleDateString()} - ${info.event.end ? info.event.end.toLocaleDateString() : info.event.start.toLocaleDateString()}`);
                }
            });
            calendar.render();
            return calendar;
        }
        
        function showCabin(cabinNumber) {
            // Actualizar pestañas
            document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
                if (idx + 1 === cabinNumber) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            // Mostrar panel correcto
            document.querySelectorAll('.calendar-panel').forEach((panel, idx) => {
                if (idx + 1 === cabinNumber) {
                    panel.classList.add('active');
                } else {
                    panel.classList.remove('active');
                }
            });
            
            // Actualizar estado
            const cabinNames = {
                1: 'Cabaña 1 - Vista al Bosque',
                2: 'Cabaña 2 - Loft en Canasvieiras',
                3: 'Cabaña 3 - Familiar Premium'
            };
            const eventsCount = eventsData[cabinNumber].length;
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `📅 ${cabinNames[cabinNumber]} | ${eventsCount} reservas cargadas`;
            statusDiv.className = eventsCount > 0 ? 'status success' : 'status warning';
        }
        
        // ============================================
        // INICIALIZACIÓN
        // ============================================
        async function init() {
            // Crear calendarios vacíos primero
            calendars[1] = initCalendar('calendar1', []);
            calendars[2] = initCalendar('calendar2', []);
            calendars[3] = initCalendar('calendar3', []);
            
            // Cargar cada calendario
            await loadCabinCalendar(1, AIRBNB_URLS.cabin1, 'Cabaña 1');
            await loadCabinCalendar(2, AIRBNB_URLS.cabin2, 'Cabaña 2');
            await loadCabinCalendar(3, AIRBNB_URLS.cabin3, 'Cabaña 3');
            
            // Actualizar calendarios con los eventos
            if (eventsData[1].length > 0) calendars[1].addEventSource(eventsData[1]);
            if (eventsData[2].length > 0) calendars[2].addEventSource(eventsData[2]);
            if (eventsData[3].length > 0) calendars[3].addEventSource(eventsData[3]);
            
            // Mostrar mensaje final
            const totalEvents = eventsData[1].length + eventsData[2].length + eventsData[3].length;
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `🎉 Prueba completada! Total de reservas: ${totalEvents} en las 3 cabañas`;
            statusDiv.className = totalEvents > 0 ? 'status success' : 'status warning';
        }
        
        // Iniciar
        init();
    </script>
</body>
</html>
